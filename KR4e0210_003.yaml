  - {type: page-break, offset: 0, content: '', id: KR4e0210_WYG_003-1a, image: WYG1287/WYG1287-0243c.png}
body:
  text: 衡廬精舎藏稿巻三明胡直撰五言古詩雜詩悲風響庭樹白露凝清霜躑躅不能寐怨此秋夜長攬衣三四起鳴鳥驚且翔屣履歩前除明月鑒我裳明月忽西沈仰見心與房理瑟成商曲撫劍涕縱横丈夫七尺軀志欲攬八方雞鳴苦不早引領觀扶桑二捉衿不厭短曳履不辭穿所嗟白日馳當我盛壯年盛年不可再憂思起纏綿精衛何㣲眇銜石填滄淵大人志亨屯匪為識玉憐策我千里驥膏我文木軒朝遊漱渤澥暮宿層城巔三早欲巢衡霍匪為欣其名上有金簡峯猶存神禹文又欲歴泰山不辭路險艱日觀凌蒼蒼可以撫朝暾朝暾旋赫赫洗耀出咸池流光盪八表穹谷無不輝綿歴億萬禩𤣥雲無蔽虧人欲天不違胡為長盱睢四沈湎事詩書回回起憂嘆憂嘆何嗟及緬思古姬旦吐食意已殷執贄何繾綣山髙不謝壤海深納澌漫澌漫既無遺何况江與漢千秋長已矣夢寐見顔面五漢家奕葉盛弼亮建豪英魏其一引疾武安揚嘉聲悲哉聲利子得氣何驕盈巍甍迫象緯曲旃羅前楹除吏傾人主襜褕入宫庭恨恨杯酒間兩賢一朝傾剉櫱方染黄須臾變丹青對面揚洪波千載詎能平董生求仁義誰為欽其名六巢父傲帝堯季札輕其國胡為世俗人刀錐動顔色辟如羣狙公朝三不自得斯人之相逺何啻千與億不自臨嵩少安能小陵丘蜥蜴舞行潦鼓舌譏潛虬彼此殊趨舎是非不相謀斗筲自營為焉用反謗尤七薄遊寫煩襟驅駕欲焉之朝登千仞岡延矚潁水湄潁水不可遊改馬莘野馳路逢一老叟秉耒適東菑我見問津途拱立於路岐頫首但耘薅鳴鳥相追隨却略再拜問逌爾指中逵咄咄濁世子誰能測其㣲我馬何虺隤淚下不能追八總轡首北極反登𤣥㝠州黑蜧舞我前檮杌嘯我後回車歴太行詰屈摧我輈輈摧馬已瘏狨貙向我留轉顧阻山河欲濟無輕舟九域不能騁不如事逺遊逺遊何所之飛駕凌崑丘曄曄若木枝遙觀青雲浮九崑丘不足步我欲廬太虛豐隆搖雲旛羲和駕日輿上仙鬱華翁偓佺弟子隅先過東父宅復息西母居西母何嬿婉揖上上清居上清十二層歴歴見白榆鞭虯從空舉倚鳥戲虚無縱覽六合表放心而夷與俯觀嶽與海何異杯與盂人生苦鬱紆無乃成籧篨予將汗漫游與天同歡娱十幽幽山上蘭鬱鬱園中葵葵生欣有托零露滋黄蕤朝葩迎扶桑夕艷傾崦嵫幽蘭秘隂谷而無朝日晞山鬼日經踐荆棘相蔽虧二物殊顯晦貞心如一揆北風終不痿嚴霜有餘姿豈若桃李輩一朝失所持志士存本性天命永為期十一騏驥行千里捕鼠不如狸太阿能剸象不為膾臛資神龜遭網罟騰蛇殆即且松栢雲漢髙乃復守門閭君子既大受焉用譏小知寄言匠石子棟桷有良宜十二至人握瑾瑜鶉結蔽璀璨飛鳶矜腐鼠黄鵠豈相羨嗤彼卞和氏荆玉求自衒三獻而不得憤恨起哀怨寗戚胡自悲挽衣不至骭唯有榮期子可為達士願遊仙三首調笑丁戊山人崑崙乗左馳日月從右沒人生居其間猋熻若行客榮華成朝電驕奢翻自堲生時斳一髪奄後肝膽隔秦項蕩飄風堯舜亦荒忽今古貌榮名枯骨何所獲我聞丁令威乗鶴獨超越千秋復歸来舉手謝舊國乃知好道人匪為托髙潔二王子參白鹿游戲紫雲臺老君乗青牛西去還復回歴數踰宇宙神行遍九垓回觀商與周短世安在哉世儒阻聞見難為語其該不見棲真士遺世養丹胎日精足朝食朱芝亦間栽手把軒皇書不與洛誦偕抱一載營魄𤣥牝自閉開曰此山澤癯未果陟蓬萊寧知神内王孰與斃囂埃應龍未天飛羞比凡骨駘整駕吾將逝願言處不材三大道雖可受虚無為之先當其産大物嘘噏成地天二儀既以剖靈氣於中旋壯哉廣成子出入握渾元一朝啟天扃授道羲與軒落落千嵗間傳者有周耼周耼既隠矣靈均發其詮縱讀逺遊詞託意何濬淵寓言沈湘曲千秋徒憤悁寧知驂玉駟晞髪九陽門嵇生何倜儻結志纉沖元赭衣適東市顧日彈素絃兵解無驚怖俗士焉能原人生測有形焉得契空𤣥金石徒區區疇能獲大還虞恐衆士笑為君陳篇端詠懐揮刀裁流水流水不可裁討古寫煩憂煩憂鬱以絯弱小事文翰結慕左馬場踰冠改初服馳精虞與黄卑彼雕蟲技欣此日月光長劍倚天外耿耿飛英芒大業無階陛盛年掩空房斂志仙真侣希心寥廓翔豈由心好道實乃意無疆羨門不我遇中路成悲傷整駕欲焉之沈思所行藏古有適志人鹿門與柴桑百爾非所珍耕鑿庶自將晨往從之游寧憚歴冰霜曹溪瞻六祖塔朝策度平陀南華瞻縹緲谷斷意若冥崖飛神欲悄鑿山自何年重嵌出幽眇瞥見西天明引觀慧日皛山似耆闍尊溪即恒河淼借問何方隅祖宅神為表天路無術阡塵蹤失繳繞漱泉沁心脾聞梵徹昏曉禪榻托髙眠寥然天下小同張京兆九日遊茅山和韻二首宿展華陽頌結慕靈山巔仰禄寄兹土引睇脰空延君侯京洛貴雅志雲霞鐫共歡九日期擥賞出郊埏遵流涉紆窈破莽蠟􅀈碞側見青琳闕合沓丹霄懸矯然並躋登邈若翔飛烟迴覽隘八區放歌通九乾仙人喜我至玉沼沸神泉飜哉羣鳥呼寧非白鵠躚情澹吾喪我神超理忘筌坐得蘇門嘯詎論天禄元欣兹諧佳願矧復追髙賢二三君起炎漢靈跡彌千年僕也欽元軌長揖問真詮抱一理則契何當授九還三君去已矣玉珮疇將宣安得九華女秘寳颯然傳孰是都不勤坐看飛羽翰福地倚惝怳丹竈撫留連㣲禄焉足緤人理難即捐未承慈母歡寧論婚嫁牽仰慚羅姑洞俯悵陶公泉連鑣出洞口相嗟且停軒歸還縳塵鞅轉復憶㠝岏何用理幽緒高吟雲藻篇送同省王君歸覲建業同居不知心白首成按劍何况江東西生小不相面于焉傾盖初忻若宿所善奏我紫瓊琴贈我琅玕簟交歡苦未週飈忽起長歎明月蔽𤣥雲榆葉飄若霰涼風吹行轂回盼不得睠所欣南斗傍持節返鄉縣入門拜黄髪華屋羅芳宴持觴訴久離悲罷言笑晏兄弟各具觴南陔慰繾綣所願懐靡盬佳期遇能踐送朱鎮山參政之河南二首翳翳廣陌塵伶伶羇客蹤羇客多感思欲語誰將通夫子枉英盼傾倒愜素衷小言刺蟣蝨髙論破鴻濛沃若飲瓊漿心愉顔貌豐云何疾乖違飛斾指洛東睠兹春陽穉𤣥隂蕩迴風廣望迷四野沈憂不可窮焉能雜林鳥奮翅起相從二夫子起南服弱齡富丘墳手醫青琅玕咳唾蘭芷芬翩其振苞羽照曜雲中君大音無慢響亮節凌埃氛以兹淹程路不自言苦辛曰予夙仰止匪但閭里親送之潞水涯屏營不忍分牽裾少延佇回盼帝城闉帝城一何麗軒盖何繽紛皇路豈不廣良遘㑹有辰斗酒重致辭詎云兒女仁同省魏張二君奉使二首鮑明逺體與君繆通籍覿面縻心期擥挈金門游連翩公府趨詩書同流覽杯斚亦互持心知景光娱潜恐㑹晤移整駕居然迅銜命詎能遲鱗鱗起寒雲獵獵飄涼颸涼颸吹我心憖然逺懐思無由竟宿昔含悽奉别巵二出門渺何之所之吴與楚蕭瑟涼海隅霮䨴長江嶼揚舲遵濟流挂帆連鴻舉悅懌遂旋思飛躍貪鄉渚春園記故桑秋場歡新秬忻君使命嘉惻予歸思阻登車千里遙蹔留庭戸語贈别胡侍讀奉詔歸省二首有引予雅同宋大理丞望之張編修伯端胡侍讀子文談心論文間時一聚首焉今張史歸滯江陵宋丞方欲乞歸侍讀且先行矣予情同三君獨爾羈留索居寡侣臨别慨然爰贈二首松栢生挺直不為桑蔓牽磁石能引鐵於金終不連自余遊上京塊思寡懽顔良覿二三子談笑芬若蘭但言同聲氣寧知異鄉園爰作一巢鳥分飛忽别山宋丞懐五嶽張史滯江闗矯矯吾宗兄何復理征驂征驂不得停悵隔増憂嘆豈無京洛客車馬羅翩翻親交念獨違心結不能言二巍巍太清間繁星燦以麗煌煌帝者居乃在棟隆具之子嶽降英夙齡紬金匱茂脩篤文網達觀超名位名材為世珍寧與凡質儷總轡出東門匪伊江海思上有黄髪雙懐哉不得寐恭荷天子仁詔歸遑敢滯入門謝久濶下堂敕中饋長跪進霞觴頽光願有繫東公及西母延年樂萬禩豈不稱榮遇何以答明恵願言返明光皇風挹逺裔别李伯承令弟得弟字人生苦乖違無論兄及弟當此嚴風晨胡然生逺思輶車送城闉執手嘆迢遞借問嘆者誰齊國有二士一士良易知易知獲難棄譬彼雙靈鳥竒毛各有異一飛耀天衢一養凌霄翅㑹短苦别長何由判衣袂噭噭鴻鴈音聆之不能睇我為語阿伯神物終當嫓願仲奮来儀雙鳴無終離衡嶽感懐二首弱齡慕遐舉中為世網嬰雖抱及物志而無濟時英家本衡廬交早負泉石盟秉憲涉湘沅吏道滋牽縈靈嶽奠疆域渺若隔蓬瀛恭承帝新命駕言事西征迴車恣探歴寥然夙心傾朝暾蕩雲巘翊我游上清吾衰疲塵鞅人已焉所成巻懐慚伯玉逺遊謝尚平學道未有聞悵然迫心情安得同心友眷言事耦耕潛龍期晚得混燿入無名二恭聞夏后聖秉志切元元洪波蕩中土隠若裂肺肝不辭排決力寧論胼胝艱去家七八載三過不入門誠精格𤣥昊金書下層巒禹拜受此書治水識其端鞭撻蛟與螭疏鑿江與漢江漢故湯湯河淮無溢湍九州一以平四隩罄歡顔上啟重華帝巡狩駐瑤幡𤣥冕照林阿韶韻播江潭爰以上公秩望兹南維尊秩秩虞夏文郁郁䕫龍班緬思此盛際千嵗不可攀測知聖哲心匪恣一身安顧予道未至願言歸山樊山樊有故侣終焉擊壤歡觀日臺肅此葵藿志候彼扶桑巔元氣闢混沌大明升重淵浮雲莫蔽虧赫曦以中天㑹仙橋石梁駕空壑飄颻凌風躋道遇古皇仙指我上天梯我揖謝仙人先後天在兹戲作最潔詩口號何物稱最潔予憐山下泉出石全無滓涵光自有漣無令許由至洗耳汚清涓何物稱最潔予憐岡上雪如鹽非火燔比玉無蠅湼無令樵父行踏破山前白何物稱最潔予憐江上月散之有餘輝攬之不盈結能照一切物不染一切物過匡廬阻雪不得登悵然増懐因賦短篇報九江牧射陂朱君危磴忽驚呼巻帷萬峯矗岧嶢迴斗杓連亘横地軸積雪石門髙屯雲外相逐上有古仙人雙雙騎白鹿我欲造其廬饑餐瓊蕋馥塵鞅乏凌風層冰阻迴轂神超無来往蹟隔成躑躅睠思故交親綰符在山麓形骸疲劻勷心神棲元穆長共僊人語入室披瑤匵薄暮吾當来相見叩元幄願言同斯人永結霞外輻五嶽儼巖峋遍綴青琳屋縱浪出方區何啻踐兹谷登峨眉山至楚狂接輿隠處旁有玉液泉羣峯屹中天迴巒閟芳谷流泉遞宫商隠約聞鳳曲楚狂去千秋髙風表幽獨僕本黄虞徒雅志稷契躅繆負宇宙身豈甘泉石牿狂者亦何為諒哉非所淑彊年挂簮紱饑溺意頗篤宿疴疲縟節神襟躓繁牘根荄氣自劣枝葩艷空續時乎不再来天命詎終復困思漆開言暗與接輿觸往轍已無追来軒尚可贖決策希潛龍匪徒躭薖軸歸與貴自裁親交難共告九日遊仙女山懐有訓信卿是山為先祖謙謙府君舊遊仙女山居雲吾祖昔臨賞九日乗清飈挈客恣如往層嶂列重幃前川脩以朗殘椒猶可捫絶磴步難廣振袂猋升霄翔身出穹壤生負丘壑姿矧復稅歸鞅以兹釋天刑焉用祛塵想但無王子晉吹簫雙偃仰引睇忽忘言孤月流歸舫仲冬初三之日乗霽再遊仙女度螺塘江聞水聲冬暖似春暄晨度螺江水窈窕發清聲奔湍激石齒彷彿松風翻凌空忽在邇漸逺變瑤瑟泠泠雜宫徴飛鳥適相從鳴音和交美聞此意歡然脈脈如有㫖遊鯈一何多相與偕行止思昔車馬間繁吹喧且侈孰若澹遊遨天機為吾使冬日登仙女峯絶頂曾聞商山境上有仙娥峯四皓邈已久千載慕遐蹤兹山名豈劣選勝將無同既疊青玉嶂豈乏紫芝叢餐芝愜所志安劉詎足功矧兹續遊遨素襟益以沖霽極冬欲煦葉落天彌空飄颻凌絶頂縱浪倚𤣥穹下山若有㑹把酒挹商風春日近湖族叔枉過小酌螺塘江滸卜遊非不早宿疴滯霪霖景霽散新暄和飈動神襟欣此竹林侣相送出江潯起矚原上樹早已貯清隂百卉競芳葳羣溜奏徽音乍言嵗序易猋忽春已深欲攬青皇轡其如白髪侵不為人外遊恐負枝上禽遵渚發輕舠擊汰和清唫斗酒酌船艎對坐四山岑昔仕各鄉土結托歡從今緬思慰同隠道真以相尋陽能卿過宿孟山菴中稺陽回淑景曠原汎初旭曽無車馬喧遲此求羊躅忽有素心人睠然慰幽獨及辰相遊遨結托同春服沖襟期邃古寧與塵氛逐疑義邀共析發篇時来續廣步並林塘聴禽出幽谷至樂超名跡世訾焉所局得君何翛然乗風共沂浴二嵗月自駒隙皓髪忽以齊吾衰踰耳順君今五十期欲揮魯陽戈白日不肯移孔公美全歸川上嘆在斯念子服官年已謝趨時資眷言同丘壑世路焉足縻榮辱本忽區道真無等夷知命固翳如勉矣貴知非永願均切琢淇澳乃為歸丙子杪秋驕陽蒸熱踰月不雨偶坐南軒承少保鎮山先生佳篇屢贈蹶然有感懐答三首蒸暑隆三伏胡然劇杪秋驕陽乗時令無乃乖蓐收循疇菽並萎臨池埃欲浮芳蘭摧通谷時菊零京丘靈雨不相濟田父空告愁舎置坐中軒已矣非吾憂發篋来瓊玖清風慰吾求二昔多君子朋乃在黄金臺卑彼聲利徒諧此金石懐予拙終畎畝學道無取材君本濟世英夙名播九垓中嵗簡帝心竒勛列上台何當佐聖日乃復棄華階鴻冥分有托虯潜匪諒哉鵬鷃同一棲鳬鶴靡所乖永願陪清唱不受俗塵猜三㡬載殊燕粤尺書嵗難陳今歸依南斗上下漳水濵漳水日悠悠客懐亦以新良覿未有期名篇睠獨殷伐木聲瓌瑋開逕意清真所媿巴曲俚胡以賡陽春申章謝存慰報李詎能珍衡廬精舎藏稿巻三
