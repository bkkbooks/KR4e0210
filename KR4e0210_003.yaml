body:
  text: 衡廬精舍藏稿卷三明胡直撰五言古詩雜詩悲風響庭樹白露凝清霜躑躅不能寐怨此秋夜長攬衣三四起鳴鳥驚且翔屣履步前除明月鑒我裳明月忽西沈仰見心與房理瑟成商曲撫劍涕縱橫丈夫七尺軀志欲攬八方雞鳴苦不早引領觀扶桑二捉襟不厭短曳履不辭穿所嗟白日馳當我盛壯年盛年不可再憂思起纏綿精衛何微眇銜石填滄淵大人志亨屯匪為識玉憐策我千里驥膏我文木軒朝遊漱渤澥暮宿層城巔三早欲巢衡霍匪為欣其名上有金簡峯猶存神禹文又欲歷泰山不辭路險艱日觀凌蒼蒼可以撫朝暾朝暾旋赫赫洗耀出咸池流光蕩八表穹谷無不輝綿歷億萬祀玄雲無蔽虧人欲天不違胡為長盱睢四沈湎事詩書回回起憂嘆憂嘆何嗟及緬思古姬旦吐食意已殷執贄何繾綣山髙不謝壤海深納澌漫澌漫既無遺何况江與漢千秋長已矣夢寐見顔面五漢家奕葉盛弼亮建豪英魏其一引疾武安揚嘉聲悲哉聲利子得氣何驕盈巍甍迫象緯曲旃羅前楹除吏傾人主襜褕入宫庭恨恨杯酒間兩賢一朝傾銼櫱方染黃須臾變丹青對面揚洪波千載詎能平董生求仁義誰為欽其名六巢父傲帝堯季札輕其國胡為世俗人刀錐動顔色辟如羣狙公朝三不自得斯人之相逺何啻千與億不自臨嵩少安能小陵丘蜥蜴舞行潦鼓舌譏潛虬彼此殊趨舍是非不相謀斗筲自營為焉用反謗尤七薄遊寫煩襟驅駕欲焉之朝登千仞岡延矚潁水湄潁水不可遊改馬莘野馳路逢一老叟秉耒適東災我見問津途拱立於路岐俯首但耘薅鳴鳥相追隨却略再拜問逌爾指中逵咄咄濁世子誰能測其微我馬何虺隤淚下不能追八總轡首北極反登玄冥州黑蜧舞我前檮杌嘯我後回車歷太行詰屈摧我輈輈摧馬已瘏狨貙向我留轉顧阻山河欲濟無輕舟九域不能騁不如事逺遊逺遊何所之飛駕凌崑丘曄曄若木枝遙觀青雲浮九崑丘不足步我欲廬太虛豐隆搖雲幡羲和駕日輿上仙鬱華翁偓佺弟子隅先過東父宅復息西母居西母何嬿婉揖上上清居上清十二層歷歷見白榆鞭虯從空舉倚鳥戲虛無縱覽六合表放心而夷與俯觀嶽與海何異杯與盂人生苦鬱紆無乃成籧篨豫將汗漫遊與天同歡娛十幽幽山上蘭鬱鬱園中葵葵生欣有托零露滋黃蕤朝葩迎扶桑夕艷傾崦嵫幽蘭祕隂谷而無朝日晞山鬼日經踐荆棘相蔽虧二物殊顯晦貞心如一揆北風終不痿嚴霜有餘姿豈若桃李輩一朝失所持志士存本性天命永為期十一騏驥行千里捕鼠不如狸太阿能剸象不為膾臛資神龜遭網罟騰蛇殆即且松柏雲漢髙乃復守門閭君子既大受焉用譏小知寄言匠石子棟桷有良宜十二至人握瑾瑜鶉結蔽璀璨飛鳶矜腐鼠黃鵠豈相羡嗤彼卞和氏荆玉求自衒三獻而不得憤恨起哀怨寧戚胡自悲挽衣不至骭唯有榮期子可為達士願遊仙三首調笑丁戊山人崑崙乘左馳日月從右沒人生居其間猋熻若行客榮華成朝電驕奢翻自堲生時斳一髮奄後肝膽隔秦項蕩飄風堯舜亦荒忽今古貌榮名枯骨何所獲我聞丁令威乘鶴獨超越千秋復歸來舉手謝舊國乃知好道人匪為托髙潔二王子參白鹿遊戲紫雲臺老君乘青牛西去還復回歷數踰宇宙神行遍九垓回觀商與周短世安在哉世儒阻聞見難為語其該不見棲真士遺世養丹胎日精足朝食朱芝亦間栽手把軒皇書不與洛誦偕抱一載營魄玄牝自閉開曰此山澤癯未果陟蓬萊寧知神內王孰與斃囂埃應龍未天飛羞比凡骨駘整駕吾將逝願言處不材三大道雖可受虛無為之先當其産大物噓吸成地天二儀既以剖靈氣於中旋壯哉廣成子出入握渾元一朝啓天扃授道羲與軒落落千嵗間傳者有周聃周聃既隱矣靈均發其詮縱讀逺遊詞託意何濬淵寓言沈湘曲千秋徒憤悁寧知驂玉駟晞髮九陽門嵇生何倜儻結志纘沖元赭衣適東市顧日彈素絃兵解無驚怖俗士焉能原人生測有形焉得契空玄金石徒區區疇能獲大還虞恐衆士笑為君陳篇端詠懷揮刀裁流水流水不可裁討古寫煩憂煩憂鬱以絯弱小事文翰結慕左馬場踰冠改初服馳精虞與黃卑彼雕蟲技欣此日月光長劍倚天外耿耿飛英芒大業無階陛盛年掩空房斂志仙真侣希心寥廓翔豈由心好道實乃意無疆羡門不我遇中路成悲傷整駕欲焉之沈思所行藏古有適志人鹿門與柴桑百爾非所珍耕鑿庶自將晨往從之遊寧憚歷冰霜曹溪瞻六祖塔朝策度平陀南華瞻縹眇谷斷意若冥崖飛神欲悄鑿山自何年重嵌出幽眇瞥見西天明引觀慧日皛山似耆闍尊溪即恆河渺借問何方隅祖宅神為表天路無術阡塵蹤失繳繞漱泉沁心脾聞梵徹昏曉禪榻托髙眠寥然天下小同張京兆九日遊茅山和韻二首宿展華陽頌結慕靈山巔仰祿寄兹土引睇脰空延君侯京洛貴雅志雲霞鐫共歡九日期攬賞出郊埏遵流涉紆窈破莽蠟􅀈碞側見青琳闕合沓丹霄懸矯然並躋登邈若翔飛煙回覽隘八區放歌通九乾仙人喜我至玉沼沸神泉翻哉羣鳥呼寧非白鵠躚情淡吾喪我神超理忘筌坐得蘇門嘯詎論天祿元欣兹諧佳願矧復追髙賢二三君起炎漢靈迹彌千年僕也欽元軌長揖問真詮抱一理則契何當授九還三君去已矣玉珮疇將宣安得九華女祕寶颯然傳孰是都不勤坐看飛羽翰福地倚惝恍丹竈撫留連微祿焉足緤人理難即捐未承慈母歡寧論婚嫁牽仰慚羅姑洞俯悵陶公泉連鑣出洞口相嗟且停軒歸還縳塵鞅轉復憶巑岏何用理幽緒高吟雲藻篇送同省王君歸覲建業同居不知心白首成按劍何况江東西生小不相面于焉傾蓋初欣若宿所善奏我紫瓊琴贈我琅玕簟交歡苦未周飈忽起長歎明月蔽玄雲榆葉飄若霰涼風吹行轂回盼不得眷所欣南斗傍持節返鄉縣入門拜黃髮華屋羅芳宴持觴訴久離悲罷言笑晏兄弟各具觴南陔慰繾綣所願懷靡盬佳期遇能踐送朱鎮山參政之河南二首翳翳廣陌塵伶伶羇客蹤羇客多感思欲語誰將通夫子枉英盼傾倒愜素衷小言刺蟣蝨髙論破鴻濛沃若飲瓊漿心愈顔貌豐云何疾乖違飛斾指洛東眷兹春陽稚玄隂蕩回風廣望迷四野沈憂不可窮焉能雜林鳥奮翅起相從二夫子起南服弱齡富丘墳手醫青琅玕咳唾蘭芷芬翩其振苞羽照曜雲中君大音無慢響亮節凌埃氛以兹淹程路不自言苦辛曰豫夙仰止匪但閭里親送之潞水涯屏營不忍分牽裾少延佇回盼帝城闉帝城一何麗軒蓋何繽紛皇路豈不廣良遘會有辰斗酒重致辭詎云兒女仁同省魏張二君奉使二首鮑明逺體與君繆通籍覿面縻心期攬挈金門遊連翩公府趨詩書同流覽杯斚亦互持心知景光娛潛恐會晤移整駕居然迅銜命詎能遲鱗鱗起寒雲獵獵飄涼颸涼颸吹我心憖然逺懷思無由竟宿昔含悽奉别巵二出門渺何之所之吳與楚蕭瑟涼海隅霮䨴長江嶼揚舲遵濟流挂帆連鴻舉悅懌遂旋思飛躍貪鄉渚春園記故桑秋場歡新秬欣君使命嘉惻豫歸思阻登車千里遙暫留庭戶語贈别胡侍讀奉詔歸省二首有引豫雅同宋大理丞望之張編修伯端胡侍讀子文談心論文間時一聚首焉今張史歸滯江陵宋丞方欲乞歸侍讀且先行矣豫情同三君獨爾羈留索居寡侣臨别慨然爰贈二首松柏生挺直不為桑蔓牽磁石能引鐵於金終不連自余遊上京塊思寡歡顔良覿二三子談笑芬若蘭但言同聲氣寧知異鄉園爰作一巢鳥分飛忽别山宋丞懷五嶽張史滯江關矯矯吾宗兄何復理征驂征驂不得停悵隔增憂嘆豈無京洛客車馬羅翩翻親交念獨違心結不能言二巍巍太清間繁星燦以麗煌煌帝者居乃在棟隆具之子嶽降英夙齡紬金匱茂修篤文網達觀超名位名材為世珍寧與凡質儷總轡出東門匪伊江海思上有黃髮雙懷哉不得寐恭荷天子仁詔歸遑敢滯入門謝久濶下堂敕中饋長跪進霞觴頽光願有繫東公及西母延年樂萬祀豈不稱榮遇何以答明惠願言返明光皇風挹逺裔别李伯承令弟得弟字人生苦乖違無論兄及弟當此嚴風晨胡然生逺思輶車送城闉執手嘆迢遞借問嘆者誰齊國有二士一士良易知易知獲難棄譬彼雙靈鳥竒毛各有異一飛耀天衢一養凌霄翅會短苦别長何由判衣袂噭噭鴻鴈音聆之不能睇我為語阿伯神物終當嫓願仲奮來儀雙鳴無終離衡嶽感懷二首弱齡慕遐舉中為世網嬰雖抱及物志而無濟時英家本衡廬交早負泉石盟秉憲涉湘沅吏道滋牽縈靈嶽奠疆域渺若隔蓬瀛恭承帝新命駕言事西征回車恣探歷寥然夙心傾朝暾蕩雲巘翊我遊上清吾衰疲塵鞅人已焉所成卷懷慚伯玉逺遊謝尚平學道未有聞悵然迫心情安得同心友眷言事耦耕潛龍期晚得混耀入無名二恭聞夏后聖秉志切元元洪波蕩中土隱若裂肺肝不辭排決力寧論胼胝艱去家七八載三過不入門誠精格玄昊金書下層巒禹拜受此書治水識其端鞭撻蛟與螭疏鑿江與漢江漢故湯湯河淮無溢湍九州一以平四隩罄歡顔上啓重華帝巡狩駐瑤幡玄冕照林阿韶韻播江潭爰以上公秩望兹南維尊秩秩虞夏文郁郁夔龍班緬思此盛際千嵗不可攀測知聖哲心匪恣一身安顧豫道未至願言歸山樊山樊有故侣終焉擊壤歡觀日臺肅此葵藿志候彼扶桑巔元氣闢混沌大明升重淵浮雲莫蔽虧赫曦以中天會仙橋石梁駕空壑飄颻凌風躋道遇古皇仙指我上天梯我揖謝仙人先後天在兹戲作最潔詩口號何物稱最潔豫憐山下泉出石全無滓涵光自有漣無令許由至洗耳汚清涓何物稱最潔豫憐岡上雪如鹽非火燔比玉無蠅涅無令樵父行踏破山前白何物稱最潔豫憐江上月散之有餘輝攬之不盈結能照一切物不染一切物過匡廬阻雪不得登悵然增懷因賦短篇報九江牧射陂朱君危磴忽驚呼卷帷萬峯矗岧嶢回斗杓連亘橫地軸積雪石門髙屯雲外相逐上有古仙人雙雙騎白鹿我欲造其廬飢餐瓊蕊馥塵鞅乏凌風層冰阻回轂神超無來往迹隔成躑躅眷思故交親綰符在山麓形骸疲劻勷心神棲元穆長共仙人語入室披瑤櫝薄暮吾當來相見叩元幄願言同斯人永結霞外輻五嶽儼巖峋遍綴青琳屋縱浪出方區何啻踐兹谷登峨眉山至楚狂接輿隱處旁有玉液泉羣峯屹中天回巒閟芳谷流泉遞宫商隱約聞鳳曲楚狂去千秋髙風表幽獨僕本黃虞徒雅志稷契躅繆負宇宙身豈甘泉石牿狂者亦何為諒哉非所淑強年挂簮紱飢溺意頗篤宿疴疲縟節神襟躓繁牘根荄氣自劣枝葩艷空續時乎不再來天命詎終復困思漆開言暗與接輿觸往轍已無追來軒尚可贖決策希潛龍匪徒耽薖軸歸與貴自裁親交難共告九日遊仙女山懷有訓信卿是山為先祖謙謙府君舊遊仙女山居雲吾祖昔臨賞九日乘清飈挈客恣如往層嶂列重幃前川修以朗殘椒猶可捫絶磴步難廣振袂猋升霄翔身出穹壤生負丘壑姿矧復稅歸鞅以兹釋天刑焉用祛塵想但無王子晉吹簫雙偃仰引睇忽忘言孤月流歸舫仲冬初三之日乘霽再遊仙女度螺塘江聞水聲冬暖似春暄晨度螺江水窈窕發清聲奔湍激石齒倣佛松風翻凌空忽在邇漸逺變瑤瑟泠泠雜宫徴飛鳥適相從鳴音和交美聞此意歡然脈脈如有旨遊鯈一何多相與偕行止思昔車馬間繁吹喧且侈孰若淡遊遨天機為吾使冬日登仙女峯絶頂曾聞商山境上有仙娥峯四皓邈已久千載慕遐蹤兹山名豈劣選勝將無同既疊青玉嶂豈乏紫芝叢餐芝愜所志安劉詎足功矧兹續遊遨素襟益以沖霽極冬欲煦葉落天彌空飄颻凌絶頂縱浪倚玄穹下山若有會把酒挹商風春日近湖族叔枉過小酌螺塘江滸卜遊非不早宿疴滯霪霖景霽散新暄和飈動神襟欣此竹林侣相送出江潯起矚原上樹早已貯清隂百卉競芳葳羣溜奏徽音乍言嵗序易猋忽春已深欲攬青皇轡其如白髮侵不為人外遊恐負枝上禽遵渚發輕舠擊汰和清吟斗酒酌船艎對坐四山岑昔仕各鄉土結托歡從今緬思慰同隱道真以相尋陽能卿過宿孟山菴中稚陽回淑景曠原泛初旭曽無車馬喧遲此求羊躅忽有素心人眷然慰幽獨及辰相遊遨結托同春服沖襟期邃古寧與塵氛逐疑義邀共析發篇時來續廣步並林塘聽禽出幽谷至樂超名迹世訾焉所局得君何翛然乘風共沂浴二嵗月自駒隙皓髮忽以齊吾衰踰耳順君今五十期欲揮魯陽戈白日不肯移孔公美全歸川上嘆在斯念子服官年已謝趨時資眷言同丘壑世路焉足縻榮辱本忽區道真無等夷知命固翳如勉矣貴知非永願均切琢淇澳乃為歸丙子杪秋驕陽蒸熱踰月不雨偶坐南軒承少保鎮山先生佳篇屢贈蹶然有感懷答三首蒸暑隆三伏胡然劇杪秋驕陽乘時令無乃乖蓐收循疇菽並萎臨池埃欲浮芳蘭摧通谷時菊零京丘靈雨不相濟田父空告愁舍置坐中軒已矣非吾憂發篋來瓊玖清風慰吾求二昔多君子朋乃在黃金臺卑彼聲利徒諧此金石懷豫拙終畎畝學道無取材君本濟世英夙名播九垓中嵗簡帝心竒勛列上台何當佐聖日乃復棄華階鴻冥分有托虯潛匪諒哉鵬鷃同一棲鳬鶴靡所乖永願陪清唱不受俗塵猜三幾載殊燕粵尺書嵗難陳今歸依南斗上下漳水濵漳水日悠悠客懷亦以新良覿未有期名篇眷獨殷伐木聲瓌瑋開徑意清真所愧巴曲俚胡以賡陽春申章謝存慰報李詎能珍衡廬精舍藏稿卷三
