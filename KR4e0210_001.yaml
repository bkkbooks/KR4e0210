body:
  text: 衡廬精舍藏稿卷一明胡直撰賦雙松賦有序去桃源六十里鄭家驛堂背雙松喬碩竒古閲人多矣豫數過加瞻仰焉近年採巨材雙松以非杉楠幸完莊生所謂材不材之間驗矣豫獨訝其不托深谷而處孔道終非其所故為賦云猗與雙松閲幾百齡豎雲漢以布葉掩日車而抽楨偉峻極之瓌質匪羣品之攸京奚結侣之太狹爰伉儷以居貞類海濵之二老嫓魯國之兩生爾其違文陛謝上林逃岱嶽之封爵脫閟宫之斧斤抱貞陽之烈氣乃根托於置亭雖隱約於一舍終挺特於霄旻參日月以飛節貫四時而晶英欽為德之崔嵬虞處身之未諶背幽寥而弗都據闤闥而稱永撫孤操以嶢嶢匪藏珍而匿景此之孰得孰失孰智孰愚豫獨鬱伊而絪緼將卬言之弗恂請決策於詹尹誚螢火賦有序豫夏夜候月堂皇觀流螢下上飛明因感世儒小明不能窺乎大道遂為之賦用自警云維朱明之熇蒸御空館而偃仰候明月以延佇覩夜色之沆漭闃熠耀以飛螢懸三五而下上突流星之的爍熲隙光而搖揚紛瓊葩以繁滋散蠙珠而輝晃抱孤明以自照奮重隂而如煻或循涯以飄颻時出林而穿莽類明哲之篤保豈奔熱而蒙戕同飲露於寒蟬焉嘈嘈以競響長虞表乎忠貞安仁綴以殊奬豫獨悲子之姱修曽未覩太陽之焜爌贊昊清以赫曦焜八荒而非廣偉大明之無外熯萬物之穰穰彼月星之霄出破暗曶於窮壤或隱翳于靉䨴亦明德之中朗豈若子之耿耿終何禆乎參兩子且不能煒華燈於堂皇抑照乘而晶爽獨悄悄而涼涼恣違物而惚恍將矚子以大道寧辭豫之譙讓感蒼蠅賦有序余暇閲室中有青蠅挂蛛網得脫者復鑽窗紙求出不得翊日幾斃因鑿竅出之感而為賦眇兹一室窗楮玲瓏光生虛白案几昭融青衣羽客倐爾遊從三三兩兩營營翀翀于時有舍隅爾朱之宗家世網業手口並攻儀天象之懸畢類虞師之設罿有翼而來必絓其中既資夕膳復薦朝饔嗣覩一客蒼顛修容已縶復脫一奮殊功人曰是其族之傑雄也已乃欣一生於九死依容光以遂沖背巍閽兮弗趨鑽故紙兮求通雖縱掉於羅罻終悲吒於樊籠淹翼日以枵餒將枯死於櫺櫳爰有博德先生眷矣其恫鑿竅方寸導使由從復乃厲色聲而誨之曰爾蒼顛者能弗忘縶網之厄鑽楮之忡乎爾乃弗知一膜之表曠浩靡窮下何地而非衍上何天而弗窿子將翺翔兮汗漫逍遙兮混濛放身太虛飲露餐風笑尋芳之太汙眇附驥之非隆縱鵬飛而九萬亦胡大於域中於是彼蒼者子俯首鞠躬聆言若怵一躍騰空弟子晉曰若非遘先生將朽此蟲矣先生儼然正襟愀然改容曰弟子識之彼世方以觸網為恱鑽楮為工不知幾千萬兮羌靡方以瘳其曚徒惝恍於目前抑胡樂以自功志歸賦余媯州之瑶裔兮胎初諜乎顓昌淑有周之錫茅兮卜鳳皇之鏘鏘中綿邈而幽寥兮延明德其幾千祀維先大夫之黯修兮遵重華之遐軌代跖鉤而儀矩兮重擷英于芬藝赤奮若之麗文明兮會壯月􅜋以蒞幼絓慕古之靈哲兮嘗夢寐而見之衷竒服以為豫兮冠切雲而佩纎離罹元天之不弔兮浸綰髮而殞余怙身惸惸而繚悷兮抱悽惻而血為雨伏蓬衡之圭竇兮操瓢瓠以奉慈母雖頷顑而瀕九死兮志不跌而山峙縱時命之長遻兮儕醜旅之為恥紛其嗤此鶉結兮竊黼衣而自比登賢書于幾壯兮猶枵腹而突不燬幸至人之􅜋遘兮指孔道于中天曰塗人為禹而不越塗兮啓跬步而覽羲軒子則繇周露而端履綦兮毋爾蹈岐劇之旁偏豫趨風以雀躍兮蹇惟溺博而騖言詮逖道真之醇腴兮親時俗之漓言珍遷固之瓌瑋兮口尼軻而足延攬荆玉扺飛鵲兮曽不識重輕之所緣左豫軿于𥅆伽兮亦罕為犁其城庭既仰祿于三茅兮紛多岐而戰此修名時曖曖其強齡兮猶狐疑而因仍繆連袽而升南宫兮攀紫極以攸征宅爽鳩之卑仄兮鼓蟬翼而補青旻遘時路之蕪穢兮䨴元雲而蓋夫皎明羿不逞而執衡兮浞強圉而奪要津赫乳虎之銜命憲兮糅玫玉之均焚豢鴟梟于家弄兮斥鳳雛於雞鷷恣闔國之狂泉兮莽叨餮而酕酲六合澒洞若顛舟兮乾坤幾頗而不平余煙悒飲涕兮射天狼之未能奮欲斬此長虹兮恨無倚天之斧斤後賈子千祀兮弔靈均于湘潭掇江蘅以充餓兮亦何埤乎時難撫祝融不足舒嘯兮酌洞庭而隘吾盼改吾幟于巫峽兮涉九折坂而停驂吾騰騭萬仞之岷峨兮摩金乾而撫兩丸睇北辰之在睫兮猶欲叫乎帝閽悵疢疾之遄摧兮緬白髮于高堂朝勃然舍紱而東兮返翼軫之故疆倐三嵗之薖軸兮旋回節乎武昌猋徙斾于八桂兮又結軫乎禺陽惟豫躬之贔屭兮世齟齬而卒莫當余安能賈冕冔于甌脫兮奏那頌乎揚阿之場方再請而返服兮足彳亍而吭弗張盼太階之爧爧兮思美人於西方仰華蓋之連座兮懷三台之煌煌鞭扶搖而清挈二兮顧日月之自芒扣洪鏞而排閶闔兮亶非余之所臧巫咸既與余違兮又寡妁介以相將老冉冉其彌晏兮塗漫漫其愈長邊馬虺隤而不進兮河鼓不可以服箱彼孔席之靡溫兮孟車數十乘而弗侈吾誠菲修𡨢下兮亦奉教于君子余故敶曰萬宇吾一軀兮時夏吾一肢胡嶄絶而卷懷兮倐與世而長辭魂一宿九繚兮疇弗惕乎明時已矣哉河清之難俟兮允閼志而節彌鳥獸不可同羣兮指箕山而非期昔夫子欲浮海而遁九夷兮亦匪余心之所如思九埏之博幅兮羌奚處而頓輿赤將氏謁豫而欷兮悲世故之嶮巇導豫以天路兮啓豫以玄珠曰真人之休逸兮豈􅗘􅗘乎濁穢餐元氣而囁金華兮焉需瓊田之蕤穟駕虛無之為駟兮靡所如之弗豫王母來宴西維兮華公款于東汜嘯父翩其響琅璈兮玄女從風而回集羽乘八景而入天門兮踐九宫之會宇吒豐隆移綵旄兮回祖洲以容與俯崑閬之下土兮曽不勝衆真之舄履極九天而至愈兮羣仙夫其咸娛超氛壒而托星辰兮閲自古之多徒薊子元放詭莫追兮豈無成公之與魯女前史班班可鑑兮奚齮齬而稱誣抑西方之有聖兮夫不治而不亂彭籛非修兮殤子非短彼恂往來天地之神精兮亦何鳬鶴之為續斷紹詹尹而龜策兮夫惟子之邁也神龍變化亡弗可兮何必都此塊也豫抗臂而莫然兮久揲蓍于宓羲唯用行而舍藏兮有孔氏之遺懿亶中道之自虞廷兮乃天命之為皇指皓皓以為鵠兮撫蕩蕩以為床古盡性而至命兮又何擇于遁藏余確乎不拔兮亦時止之為光崦嵫猋其飛曜兮曽不揮魯戈以再陽縱皓髮之萷颯兮䇿十駕于途長苟朝聞而不偭兮夕則可而勿恨唯余之坦然居休兮亦何謝養空而翺翔晚發憤兮忘老又何必去乎不死之鄉誶曰返衡匡兮故遊偕二三子兮夷猶欣鳴鳥兮出谷浴沂水兮悠悠鼓一弦兮故琴樂吾天兮何求螺水泂乎洙泗孟山屹乎泰岑不下帶而佩宇宙兮豈必罟羣籍以從禽彼磻溪釣于非熊兮久矣非吾之攸珍矧二家之齗齗兮浸若蜾螺之與螟蛉衡廬精舍藏稿卷一
