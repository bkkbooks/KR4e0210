body:
  text: 衡廬精舎藏稿巻一明胡直撰賦雙松賦有序去桃源六十里鄭家驛堂背雙松喬碩竒古閲人多矣予數過加瞻仰焉近年採巨材雙松以非杉楠幸完莊生所謂材不材之間驗矣予獨訝其不托深谷而處孔道終非其所故為賦云猗與雙松閲㡬百齡䜿雲漢以布葉掩日車而抽楨偉峻極之瓌質匪羣品之攸京奚結侣之太狹爰伉儷以居貞類海濵之二老嫓魯國之兩生爾其違文陛謝上林逃岱嶽之封爵脫閟宫之斧斤抱貞陽之烈氣乃根托於置亭雖隠約於一舎終挺特於霄旻參日月以飛節貫四時而晶英欽為徳之崔嵬虞處身之未諶背幽寥而弗都據闤闥而稱永撫孤操以嶢嶢匪藏珍而匿景此之孰得孰失孰智孰愚予獨鬱伊而絪緼將卬言之弗恂請決策於詹尹誚螢火賦有序予夏夜候月堂皇觀流螢下上飛明因感世儒小明不能窺乎大道遂為之賦用自警云維朱明之熇蒸御空館而偃仰候明月以延竚覩夜色之沆漭闃熠燿以飛螢懸三五而下上突流星之的爍熲隙光而搖颺紛瓊葩以繁滋散蠙珠而輝晃抱孤明以自照奮重隂而如煻或循涯以飄颻時出林而穿莽類明哲之篤保豈犇熱而䝉戕同飲露於寒蟬焉嘈嘈以競響長虞表乎忠貞安仁綴以殊奬予獨悲子之姱修曽未覩太陽之焜爌賛昊清以赫曦焜八荒而非廣偉大明之無外熯萬物之穰穰彼月星之霄出破闇昒於窮壤或隠翳于靉䨴亦明徳之中朗豈若子之耿耿終何禆乎㕘兩子且不能煒華燈於堂皇抑照乗而晶爽獨悄悄而涼涼恣違物而惚恍將矚子以大道寧辭予之譙讓感蒼蠅賦有序余暇閱室中有青蠅挂蛛網得脫者復鑚窻紙求出不得翊日㡬斃因鑿竅出之感而為賦眇兹一室牕楮玲瓏光生虛白案几昭融青衣羽客倐爾遊從三三兩兩營營翀翀于時有舎隅爾朱之宗家世網業手口並攻儀天象之懸畢類虞師之設罿有翼而来必絓其中既資夕膳復薦朝饔嗣覩一客蒼顛脩容已縶復脫一奮殊功人曰是其族之傑雄也已乃欣一生於九死依容光以遂沖背巍閽兮弗趨鑚故紙兮求通雖縱掉於羅罻終悲咤於樊籠淹翼日以枵餒將枯死於櫺櫳爰有博徳先生睠矣其恫鑿竅方寸導使由從復乃厲色聲而誨之曰爾蒼顛者能弗忘縶網之厄鑚楮之忡乎爾乃弗知一膜之表曠浩靡窮下何地而非衍上何天而弗窿子將翺翔兮汗漫逍遙兮混濛放身太虛飲露餐風笑尋芳之太汙眇附驥之非隆縱鵬飛而九萬亦胡大於域中於是彼蒼者子俛首鞠躬聆言若怵一躍騰空弟子晉曰若非遘先生將朽此蟲矣先生儼然正襟愀然改容曰弟子識之彼世方以觸網為恱鑚楮為工不知㡬千萬兮羌靡方以瘳其曚徒惝怳於目前抑胡樂以自功志歸賦余媯州之瑶裔兮胎初諜乎顓昌淑有周之錫茅兮卜鳳皇之鏘鏘中綿邈而幽寥兮延明徳其㡬千祀維先大夫之黯修兮遵重華之遐軌代蹠鉤而儀矩兮重擷英于芬藝赤奮若之麗文明兮㑹壯月􅜋以莅㓜絓慕古之靈喆兮嘗夢寐而見之衷竒服以為豫兮冠切雲而佩纎離罹元天之不弔兮浸綰髪而殞余怙身惸惸而繚悷兮抱悽惻而血為雨伏蓬衡之圭竇兮操瓢瓠以奉慈母雖頷顑而瀕九死兮志不跌而山峙縱時命之長遻兮儕醜旅之為恥紛其嗤此鶉結兮竊黼衣而自比登賢書于㡬壯兮猶枵腹而突不燬幸至人之􅜋遘兮指孔道于中天曰塗人為禹而不越塗兮啟跬步而覽羲軒子則繇周露而端履綦兮毋爾蹈岐劇之旁偏予趨風以雀躍兮蹇惟溺博而騖言詮逖道真之醇腴兮親時俗之漓言珍遷固之瓌瑋兮口尼軻而足延擥荆玉扺飛鵲兮曽不識重輕之所縁左予軿于𥅆伽兮亦罕為犁其城庭既仰禄于三茅兮紛多岐而戰此脩名時曖曖其强齡兮猶狐疑而因仍繆連袽而升南宫兮攀紫極以攸征宅爽鳩之卑仄兮鼔蟬翼而補青旻遘時路之蕪穢兮䨴元雲而蓋夫皎明羿不逞而執衡兮浞强圉而奪要津赫乳虎之銜命憲兮糅䂥玉之均焚豢䲭梟于家衖兮斥鳳雛於雞鷷恣闔國之狂泉兮莽饕餮而酕酲六合澒洞若顛舟兮乾坤㡬頗而不平余菸悒飲涕兮射天狼之未能奮欲斬此長虹兮恨無倚天之斧斤後賈子千禩兮弔靈均于湘潭掇江蘅以充餓兮亦何埤乎時難撫祝融不足舒嘯兮酌洞庭而隘吾盼改吾幟于巫峽兮涉九折坂而停驂吾騰騭萬仞之岷峨兮摩金乾而撫兩丸睇北辰之在睫兮猶欲叫乎帝閽悵疢疾之遄摧兮緬白髪于高堂朝勃然舎紱而東兮返翼軫之故疆倐三嵗之薖軸兮旋迴節乎武昌猋徙斾于八桂兮又結軫乎禺陽惟予躬之贔屭兮世齟齬而卒莫當余安能賈冕冔于甌脫兮奏那頌乎揚阿之場方再請而返服兮足彳亍而吭弗張盼太階之爧爧兮思美人於西方仰華盖之連座兮懐三台之煌煌鞭扶搖而清挈貳兮顧日月之自芒扣洪鏞而排閶闔兮亶非余之所臧巫咸既與余違兮又寡妁介以相將老冉冉其彌晏兮塗漫漫其愈長邊馬虺隤而不進兮河鼓不可以服箱彼孔席之靡温兮孟車數十乗而弗侈吾誠菲修𡨢下兮亦奉教于君子余故敶曰萬宇吾一軀兮時夏吾一肢胡嶄絶而巻懐兮倐與世而長辭魂一宿九繚兮疇弗惕乎明時已矣哉河清之難俟兮允閼志而節彌鳥獸不可同羣兮指箕山而非期昔夫子欲浮海而遯九夷兮亦匪余心之所如思九埏之博幅兮羌奚處而頓輿赤將氏謁予而欷兮悲世故之嶮巇導予以天路兮啟予以𤣥珠曰真人之休逸兮豈􅗘􅗘乎濁穢餐元氣而囁金華兮焉需瓊田之蕤穟駕虛無之為駟兮靡所如之弗豫王母来宴西維兮華公款于東汜嘯父翩其響琅璈兮𤣥女從風而迴集羽椉八景而入天門兮踐九宫之㑹宇吒豐隆移綵旄兮回祖洲以容與俯崑閬之下土兮曽不勝衆真之舄履極九天而至愉兮羣仙夫其咸娱超氛壒而托星辰兮閱自古之多徒薊子元放詭莫追兮豈無成公之與魯女前史班班可鑑兮奚齮齬而稱誣抑西方之有聖兮夫不治而不亂彭籛非脩兮殤子非短彼恂往来天地之神精兮亦何鳬鶴之為續斷紹詹尹而龜筴兮夫惟子之邁也神龍變化亡弗可兮何必都此塊也予抗臂而莫然兮久揲蓍于宓羲唯用行而舎藏兮有孔氏之遺懿亶中道之自虞廷兮乃天命之為皇指皜皜以為鵠兮撫蕩蕩以為床古盡性而至命兮又何擇于遯藏余確乎不抜兮亦時止之為光崦嵫猋其飛曜兮曽不揮魯戈以再陽縱皓髪之萷颯兮䇿十駕于途長苟朝聞而不偭兮夕則可而勿恨唯余之坦然居休兮亦何謝養空而翺翔晩發憤兮忘老又何必去乎不死之鄉誶曰返衡匡兮故遊偕二三子兮夷猶忻鳴鳥兮出谷浴沂水兮悠悠鼓一弦兮故琴樂吾天兮何求螺水泂乎洙泗孟山屹乎泰岑不下帶而佩宇宙兮豈必罟羣籍以從禽彼磻溪釣于非熊兮久矣非吾之攸珍矧二家之齗齗兮浸若蜾蠃之與螟蛉衡廬精舎藏稿巻一
