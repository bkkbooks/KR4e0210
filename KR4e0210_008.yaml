body:
  text: 衡廬精舍藏稿卷八明胡直撰序同年章近洲補令桐城語别序自嘉靖來江藩鄉選登甲多者稱癸卯榜焉或曰其閎瑰卓志之士亦衆今年春豫與梧陽張子近洲章子同第又同出癸卯薦者然二君質行修靈均有長者之度豫得以周旋辟猶樛木之逢繩寢容之值鑑不假告語而自覩其失也若二君非所謂閎瑰卓志者與已而近洲子先得謁選令桐城將去豫乃偕梧陽子過之語别近洲子曰子舊遊於江之南北亦與知民事有可言乎豫曰某未知民事然知今之令民者也今賢令未暇細論前後熟者得二人焉其一貴溪徐公者為句容其言曰今之令以佞上成聲吾將以不佞上成聲故其政專主養民自身及僚屬上吏供應一切裁省行之三年上吏猶數撓之屹然不以撼也至六年乃定九年遷去吾以一二事言之可知也邑舊有二簿一典糧一典馬糧簿歲啓倉有例金八百四百以啖糧判四百簿自取公聞遂躬往主收判簿不得取例金焉馬簿歲視馬馬九百餘匹匹例一金公亦自往視馬例遂絶邑歲募民兵四百每兵十金公兩分之歲更畨募止二百一歲省金二千邑當吳越之衝民疲於供公令官厫養鵝雞官池魚間地圃之賔至取供一不煩里甲歲自碎小而上數之省者胡啻萬計其養民如此其一即癸卯同年羅汝芳者是也羅為太湖豫遘之陽羡因以徐公之事訊之羅子曰公之約已省民類是也然以責之上吏恐難子不聞越富人之愛醜女者乎越人女貴室虞姑之謫女醜也月輟女之饋以饋其姑女於是得安其室越人非遺女而佞姑也斯所以善愛女也豫始疑其言亡何聞太湖之政未期而上吏弗為撓周澤得以下行由是清弊藪夷冦窟躬率民墾田若干畝踰歲得粟以代償民負興學崇禮人自遵約僻壤獷民欣歡向化訟獄為空豫乃知羅子之善愛民猶越人也然羅子性恬寡嗜既登第家食十年始仕方勸農從止二三人自攜飲饌騎步惟意上之人雖皆公稱其賢而又無有私德其情者是則羅子之政與徐公先後異措遲速異效然地之人皆稱循焉斯豫所熟今之令民者也近洲子喜謂梧陽子曰桐城與句容聲相邇而太湖膚壤也吾今得所以為桐城矣豫曰然邇者江南冦久徴兵益賦交檄旁午即徐公不獲節養羅君不皇禮教子又何以應之雖然吾聞之矣變無定適其載而不易者誠於民利之心也今夫誠心之被民辟若日之必暄隨物斯􅫥水之必潤隨地斯濊彼其至性莫可得禦也今吾子載其心以行因變而制理斯民之日與水也又曷虞旁午之不得節養禮教哉子又不見銅爵之足踰峻阪歷九折其置步益臧有吝之者日縶圉而弗馳將馳之且跅弛矣今之日設子當其難豈不益臧其步矣乎子往吾將睹桐城南國之巨障也近洲子益喜曰此何獨桐城雖繇此上之可也請書以識弗忘於是梧陽子令豫執筆書之引觴出郊以貽近洲子送薛同年使金陵序今觀政進士銓期逺者往往以部請出使去四方縱身沐冰雪呼吸滃沙冒出虎狼之口至甘心不以自憚者冀得取道奔省其親罄一朝之歡為私幸雖千萬苦不自計耳而廣潮薛某氏不能之西北徒慨然載目南睇於飛雲之表久之本兵武舉録竣例遣使留都獻成太廟於是職方大夫言於大司馬許公曰今兵部觀政進士嶺南薛某可使乃大司馬公遂上其名以行於是聮諸君子郊送而廬陵胡子則進而告之曰以子年最少則最父母所眷念今果得假餘日取道歸嶺表上慰髙堂之眷用展其一朝之歡此則諸公所賢異吾子者特厚而其行又非有苦寒滃沙之侵虎狼不測之虞將逌然鍾山之麓秦淮之濵傾都長行尊德候訊王人者人相織於道已而放南息駕於海陽愞夫鮿生咸夸問於載歸之晨此比之終童之建節東歸無以逺過然視子之色辭則以苟得歸覲償肺腸之願其他無毫髮加乎其意子豈有過人者非與今人所最患者志見不曠逺耳子生於大海之濵見莫非海也夫見莫非海則進此而庸且行之將視之猶流澌噴沫也而况終軍之事不亦蹄涔之纖潤矣乎嗟乎吾以海觀子矣雖然吾又嘗較之以四海語江河則不啻大陂之一坎井者以天下語四海則不啻九牛之一豪旋者是故觀海者既大矣意不若以天下觀天下者之尤大也吾聞嶺表奧區昔嘗有有道之士生焉子歸或有遇則吞若南海者八九於胸中異日子來吾且以天下觀子矣吾與諸君子期子者不細小也輒發其狂言庶幾足以贈子送同年黎叔期尹盩厔序初涪州黎叔期舉進士與豫同伺座主李先生門豫視黎子色辭若不欲華一第而已者豫固心竒之已而又同觀政兵部凡在兵部者餘三十人多四方俊辨之士有所論議則莫不竒黎子於時晉國李某先選得令清豐乃即謀黎子為贈文黎子則稱引聖學而激之以漢吏其言曰今天下人士童而習者類皆祖漢儒然循良之政竟不聞隆於漢者何也意者漢儒承斯文敝壞之後雖其考辨未析然各即見之所到而真意行之斯亦足有立於世今之操管為文大者罩天地而細入於無倫然言不必行行不必實及解褐登仕簿領奔謁勢利交而得失眩求如漢儒之真意者鮮矣而况聖賢之學乎一時讀者悚然知黎子之賢有本末且曰使黎子為令不獨不為今時吏且不為漢吏今黎子果領選補盩厔令諸君復委贈於豫嗟豫何以贈黎子哉聞之昔時有國主者獨喜聚榖粟金帛牧畜至不可萬計其視當時之錦玉妖姣則曰是不可以衣食人者也來輒唾而絶之客有欲為國主夀者聚族謀曰今主人性不喜珍吾雖有南海之晶珠西崑之璇樹無敢獻也若其所喜聚者則彼且山積谷量矣又非吾斗斛尺丈之可進者吾殆何以為獻或教之曰子無以獻也子惟告主人以若所蓄擇飲而安食擁輕而䇿肥少發其餘以仁其里人使日相鼓舞為主人夀斯主人之為福德甚盛噫斯言可謂工於獻主人矣今以黎子之所論説則何異國主之絶浮玩而甘實得者乎駢辭枝説吾不敢以獻豫將欲效實以語子又何加於子之自有也豫之告子則亦曰飲食斯服御斯捐其餘以及盩厔之民繇是贍於一國一世以逮無窮斯子之所樹不將出漢儒而上之者乎不然人將曰漢儒少有而少用之且效矣今大有而不大用之則與未有而無所用者其過均也是則非黎子之所自志而自誦者也若豫則終無以贈子者别同年隂定夫序天下有不可常者有可常者朝作而夕以陳宿為而明以幻此雖近暫不可得而常也而况遠久者乎生於無始而不為老延於億萬世而不知其所終此雖遠久不能以不常也而况近暫者乎然古今域內之夫不獨其身都三事肘挂六印之大者靳以為固也即有飛羽之權康瓠之儲莫不擁據以為萬世之業至於耆生碩士號稱博通者覩人地勢之巍章服之炫則見以為矯然而龍興聆人呼喏之衆頌譽之叢則見以為烜然而神變得之則魄與之俱翔失之則神與之並禠此不猶憑海以觀蜃氣黼閣璇臺竒物姣人絢焉可攬也然閴忽變消猶睢睢養養而盼其來是不知其不可常而以為常也夫以不可常為常則常者喪矣此不亦天下之至悲也乎以豫之涼菲自結髮逮今所際變若秋雲猶幸知有常者存也今年春始得舉春官列三百人之中方其唱闕廷燕省闈解褐於成均林林乎出絡絡乎入果若巨宗之昆弟之為出入者已而各觀政於部寺署數十人居合一室暮而散轡晨而聚肩果若昆弟之析而為出入者而定夫隂子則與豫合室而同志又若昆弟中可以語心者甚不可一日去也然自首夏抵今四選向之三百人去者大半數十人者僅數人今定夫又將出為南省户曹豫顧視左右稀矣豫因感斯人異時榮落顯曶不可知升之或為龍虎沉之或為蛇鼠殆亦如此矣非獨此也即凡有科以來隆貴拓落類若此也又前之楚漢曹劉齊晉湯武之事類皆若此也然則自往古以來直忽區耳其終何可常也乎嗟乎其常者奚在也守夫蜀內江人蜀之先其人之隆貴俱已朽滅久矣獨其文辭之瓌瑰功烈之輷巍至於今不朽滅者將不謂之可常也乎然其文辭功烈雖世世誦人口而其誦而傳之者蓋在人不在已也况其人亦遞相朽滅久矣是終謂之可常也乎雖然是必有為之本者矣生之無始而不為遠延之億萬世而不知其所終斯其有藉於物者乎亦不藉於物而貴傳於人者乎抑不必藉於物傳於人而獨在其一身也乎定夫合而觀之其略可知矣定夫以文辭首蜀士其他日功烈非可量其能不以隆貴易志意者不以豫言也而豫猶欲定夫知文辭功烈之必有本也然則天下之至可常者不在定夫之身而又孰望之定夫之邑有銀臺趙公者同志之楨表也至南省以豫言訊之然也不然又略可知矣若豫與諸君子之不得常晤處也固無憾矣夀徐桐湖年伯先生七十敘餘姚徐桐湖先生少治禮經不為訓詁而好研其旨歸凡受經先生門者類陟顯仕已乃魁鄉士先後令福清古田治教節養一切以禮其語民若語在門者所至以異政稱而上吏有嫉其好古者撓之遂發憤謝去民至攀號莫留乃為建祠樹石以志不忘既歸授學三子子某第丙辰進士官比部郎又再歲先生年七十矣比部君以縻於官守不得躬觴懷悒悒不自得而其竂友聞之則謀所以夀先生者以廣君意且曰先生砥躬治民進退巨節為世禮宗夀得如禮可乎某惟古者先王養老之禮隳已久矣今猥欲以子弟親好之私行之其將不為瀆歟夫先王之養也視其老且視其所以老是故國老隆矣非莫為奉也而必以鄉射之節崇焉非莫為使也而袒酳鞠􅎽躬為之薦焉非以無議臣也而一有所問則躬就其室以珍從焉天子所以擎拳跂踶若奉其王父母者何哉誠以老者道德之尊匪是不足以導愈而示嚴也夫導愈則引年之道備示嚴則憲德之忱將此先王之上下所以交相成而事業隆也今是禮既闊絶而先生又珍其道德寥然屏乎山窈水奧之區天子不為聞有司不為問而獨其子弟親好各以其意願瀆而伸之可歟雖然先生再仕不樂而去身隱矣又焉所歆慕於其間故以彼膠序鄉射之勞其躬孰與其子弟親好奉席撰杖於山窈水奧之為適也以彼袒酳鞠􅎽之警其衷孰與子弟親好致其菽麥蕡稻椇榛飴蜜雜饘酏酒醴芼羮隨所欲敬進之之為飫也以彼笙簧琴瑟歌咢之煩其耳孰與擊土鼓扣瓦缶而歌烏烏之為快也孔子不云乎禮失而求諸野是故先王非蘄乎人之愈之也蘄自愈其愈而已非蘄乎人之嚴之也蘄自嚴其嚴而已然則先生之為夀誠在此不在彼也而奚所歆慕於其間某也請為先生以是焉頌比之土鼓瓦缶附諸奉席撰杖之末即先生其寧有拒乎若其嘉謨懿畫天子有問而遠不可致則幸有比部君得於過庭者之既閎也君出而賦政入而告我后有日矣是則所以夀先生之大者而又奚囁囁焉以躬觴為送周縣丞之元氏序余與萬安周繕部君同年友善因熟其從子某者某始為府掾守吏部十年得元氏縣丞職典馬於是介鄉之搢紳及繕部君請余言為贈余雅聞繕部君之論官也曰比民莫如令最比而狎則莫若丞簿丞簿良耶民將謂保母否耶民將謂家虎故擇邑二宜慎乎郡二信斯言也君之語子也篤矣余復何言然子職馬也無已則請為子言馬夫牛羊之馴伏童子得麾肱而來之馬則不然馬有駿駔使牧者弗得其性則將奔踶逸駕騫坂超塹顛而斃者多矣不然者則宿無半槽之飼而朝有毒箠之威其豗而斃又多矣故牧馬視牧牛羊難五方之民各殊獨燕趙有慨慷悲歌結客少年之氣使牧者弗適其情則將鷙悍鷹擊鼓煽相起其顚於法也亦不少矣不然者則身有繁賦之纍而官有圉奪之災又未嘗不蹙蹙然豗也故牧燕趙之民視他方亦難然馬誠得其性則可以過都越國他畜弗能望燕趙之民誠適其情則可以急公死義他方弗能先是又在乎善牧者而已矣今元氏趙地也子素稱謹敏溫克急人甚已其能使人馬之兼適也斷可識矣其為保母不為家虎也亦斷可識矣雖然豫又有感焉天下一大馬也既已首燕趙則項臆齊梁腹腋吳楚肋脅閩越蹄足廣蜀尾滇貴肩背長塞以之今自項以下未嘗無事獨首領得密邇皇仁然亦已疲矣牧者不尤為大急乎夫一邑一方之積一職一邑之積也子行試之可也送太守范君之任淮安序代作淮治左海而右河河又挾沂泗沭漣汜濉之流以合淮而入於海近代又疏𨝍溝泄湖水以達之河為運道以故淮之𨽻地畎畝半為巨浸民歲食或不能半菽而况公租不可後又况公租之外必給力以奉文武大吏分司郡邑之需且以當孔道上下往來之衝不重難乎哉然是三者均不可以貸且殺也而頃年益以寇警民外苦劫戮之慘內困兵餉之繁其間桀黠拳勇逋公販私之徒輒復舍法從賊滋為民盩故淮之疲為可矜而其轇轕最為難治又今仕者之所聆而畏也往豫之撫淮也適寇始為災民力已不支甚矣今豫去淮已四五年豫不知淮之可矜而可畏者其狀何也今年之夏豫秋官曹郎會稽范君承命守淮將行而請所以為治豫以淮之為郡辟之孱弱之人外有迵風不留食之病內有癰毒莫可忍之害偏治之則傷其一兼治之則勢不可意非人醫能醫之也必有神醫醫之而范君其謂之何雖然古法有云安榖者過期不安榖者不及期然則榖氣者生人之原而病所從治者也即令有神醫者作非不兼治也而治之必自迵風始豫家濵海往聞海上戰常北訊其所以則曰下之人困於取財而從冦為鄉也故北上之人困於乏材而賞罰難操也故北夫以下方困於取財上方困於乏材而上吏之給一供不啻伯之四方往來之給一供不啻十之川泛觴濫之給一供不啻倍之此上下之所以益困而畔敗隨之者蓋榖氣薄也榖氣之既薄揭揭然唯癰毒之治則其人棄已久矣醫雖神奚為也噫以江南之壯實且爾而况淮之孱弱乎豫往有慨於淮不得良二千石相與戮力反本而圗之則其病必不可瘳今幸獲范君以往方人皆畏淮而范君以恬介獨得淮然范君惇大中堅有逺謀其於治淮蓋其人也不然淮南北之喉領也淮終不治將又有大可畏者存焉范君之行也既先植其榖氣為之三年有勇知方捐其所自畏以釋天下之大可畏者又孰與於淮民之易異日天子徴神醫能造命元元安利社稷者非范君誰耶别王尚涵序余結髮共學忘形期許內托骨肉之誼而外承拂弼之交者則與歐陽文朝氏王尚涵氏為最而尚涵以庚子舉鄉試第一人余得踵上春官久不相離也則又為最二人幼貧食苦其道所經嘗肝膽相悉又最當是時二人方年少氣徑今忽忽偕年四十髮星星白矣前年丙辰余始以學諭就試成進士乃尚涵復試己未不第亦復授華亭學諭以行邑之縉紳以為贈尚涵者宜莫如余始余之少也騃不曉事覩尚涵精敏持重揆物中情悚然而慕余性駘蕩多易好為往古之談覩尚涵之擇地後蹈擇言後發則瞿然而却余入慕道德出悅紛華欲寡過未能也覩尚涵之揭揭自果成於少不易於強則茫焉以不恆懼三者余方資鏃羽於尚涵自視枵然無所用之也余又安能以無用之言而益夫有用之器也耶雖然物有之矣工之為輪也規之萬之量之權之既無不至矣然必水之以眂其平者何誠以水無心而虛也故函牛之鼎萬石之鍾中實其窽則不足以入溪毛而鳴巨梃而况於用乎周道之繇也以其廣也有好計者曰人之厠足方尺之外無繇也盡方尺之外而塹之人尚能繇之乎故曰九層之臺其下千畝尚其基也馬之良也非不直中繩曲中鉤也自九方視之則曰此法馬耳非康衢不行也然而以之峻坂則躓是故君子未嘗不揆物也而虛者通未嘗不擇地也而宏者逺亦未嘗不自果也然蹶而後臧習而後調蓋屢遷之為善也由是言之無用者固有用者之所為用也余又安知無用之言不益於有用之器也耶曩余之教句曲也走師而問焉師曰教不在學乎嗟乎教固難言而學尤難言也尚涵夙為今少傅徐公所器華亭公梓里也公必有以語尚涵者矣尚涵往矣觀於水得東海焉景於人得少傅公焉聆於學得公之言焉進之為水鑑為鼎鏞為千萬人所厠足為康衢峻坂不易其轍寥乎為逺浩乎為大又惡知此之為用彼之為無用也嗟乎斯尚涵之所為用於世者也余於尚涵分當為規不當為諛余言果奚以益之别諸南明太史歸越序始紹興諸南明君以丙辰對大廷天子親擢第一官翰林修撰縉紳榮之而君弗有也則退與二三友講求仲尼孟軻之道將大肆力焉既三年君得貤恩贈所後父封其母乞恩贈封所生父母如所後又得請告奉二母歸咸出殊典縉紳又大榮之而君弗已也則又日與二三友求所以肆力斯道者曰吾將山居而靜觀焉比部羅子鄒子侍御耿子及二三友咸有贈言令直為之序直常偕君試南宫凡就試者不下三四千人此三四千人者始嘗登等於數萬人已而得對大廷者止三百人而君獨冠獨能致殊典於其親是君固千萬人之一人也君之於親誠榮矣然觀之古今制科冠者不知凡幾人惟宋之吕王張文數公獨著使今有數公則又億兆人之一人也然數公雖著於世謂之聞仲尼孟軻之道則又未也至近代羅吕二公逮今羅贊善公始皆有志於道蓋上下千百年數人而已乃茲復有君是君之為志固可以輩推而世計之者哉夫仲尼孟軻皆旅人耳而聞於其道即不可以世計則其道果在於榮遇而已乎君又豈以一日之榮遇為足顯其親而已乎雖然自宋以來尼軻之道明矣然使人知皎然求之於心者自越始而後之學於越者郎未有能臻於其道此又何哉意者悟未達乎則既有敏識元解稱妙悟者矣説未詳乎則既有廣譬博喻稱篤論者矣抑未有必為之志乎又或不免重內輕外與尼軻之旨殊乎非直足知也君越人也然則今日不溺於悟不耽於説有必為之志而無輕外之弊用能光大越學以紹尼軻之緒果不以輩推世計以顯其親者非君疇則勝之某聞之仲尼之徒顔子至矣而其所聞為仁之目則唯曰非禮勿視聽言動軻氏亦曰行有不慊於心則餒矣而卒歸其功於集義嗚乎此所謂尼軻之旨未始以內外異觀之者也君將山居而求諸此焉則靜可也動亦可也異日出而柄世而君之復我者必不有殊於尼軻之旨而可以行者也胡氏世敘胡氏之先衛國公贇自金陵辟地來吉伯公霸居廬陵至資政殿學士銓而著仲公貞季公陽居秦和至屯田員外衍南城縣丞箋而著語在楊文節文貞二公載記中衍家南岡官至工部屯田員外郎階朝奉大夫所至以循良稱與黃魯直友善倡和語在省郡志中又幾世曰太字宗元始徙今義禾田繇宗元公幾世為子忠府君子三伯曰雅字興詩國朝永樂丙戌進士未官卒季曰和字成樂成樂府君子四仲曰哲字亶明寶坻訓導以儒行著稱子爾極爾極府君早世娶月池彭孺人生子二伯曰行恕字民悅仲曰行恭字民敬是為謙齋先生謙齋先生生六月而孤幼穎敏強記絶人不為兒弄家貧感奮常夜樵柴讀書忘寢弱冠作運甓論師陳公異之令請於母彭孺人為縣諸生而祖姑固止之曰汝孤無作業行孰為資又孰為若娘持門戶者先生泣下已之遂去里中嚴莊蔣氏為童子師因得備朝夕間辦滫瀡奉彭孺人盡歡平時出必揖以告夕入如之晨起櫛縰伺寢問所宜苦夜則張枕衾夏扇冬燠以時抑搔之竟後日力彭孺人末年病不能卧起先生率其妻蔡孺人更持抱之藥必親嘗溲必視色夜呼未嘗不在側也如是者三年歲戊辰彭孺人終哀毁幾絶忌日必哭以祭其天性篤孝如此彭孺人既逝家無儋石食芋半菽或竟日絶炊披誦坐中庭曠然若不記餓否也先生於讀書嗜古亦出天性書貧不能購則從其從伯教諭君匡及所善蕭載沃者乞假手録至數十部由是博通六經子史下逮醫卜隂陽小説靡所不窺初得性理羣書近思録即手録誦曰此鄒魯正脈也遂殫思天人之際究極物理之原每有意會輒箋疏其義旁於易書詩禮行間家居稱引內則少儀及孝順事實為善隂隲二書語懇懇敷腎腸羣從子弟服行凛凛無飲博忿爭者四時家祠經費祗祀獨首族人率一歲間不授徒講業必半之祠下也雅慕范文正之義田曰吾家作者無忘吾所欲為族人寓楚囊家譜如楚編名養生鴈二以歸曰有行親迎禮者得遞獻之衆雖迂其言不敢駁於時廬陵琅湖蕭氏闢義孰重請師乃禮先生教之先生之為教也先孝弟容禮然後舉業雜體文科授之故其在門言辭繭繭如也體貌雍雍如也見者覘知出先生門以是鄉黨延頸致之恐後始先生從授學者陳公名某篤行有矩度遊其門者獨器先生而所善蕭載沃者即出琅湖敏辨有志操喜栁子厚之為文既連蹇鶩為卓詭不可目前人操行與先生異然相親友稱莫逆云少又與里中故刑部尚書郎周公尚化友善周公砥節剛亷居鄉獨推先生一日貽書及詔書裁抑生員私議其可否先生報書曰吾子校論吾儒者今日事甚幸教我與世俗議異然伏覩今上嗣位之初下懷材抱德一詔布天下此則神謨睿算絶等於後代萬萬者若今頒裁抑生徒冗濫一例遍天下此恐佻者倡和為茲無俚之畫豈宸斷之初心哉且今青襟冗濫固宜更張之日遂例裁定額以為尊聖祖訓非不謂韙也至於大邦千百中僅存其什一不至數盈而強小邑數十輩中不刲其一二不至數虛而縮使大邦所出如小邦所存之上上者則在大邦何不幸之多也使小邦所存如大邦所去之下下者則在小邦何幸之多也假有希竒佐王之夫挺出其後亦以例格而不得入則何以能無棄玉之嘆况大邦既黜之徒將襲籍來於小邑是導使欺君而翼於弊敗之風為甚者也以此廣材埤國豈不增撓哉僕則以為不如因人才為去取不以衆寡格因風土為希稠不以郡縣拘倘可為取士之效歟且窮居懷天下憂布衣談當時事誠莫逃出位之譏然因吾子論難輒次裁答亦柄世者之樂採也幸不為過其再書曰裁抑之説昉於青襟之子規免差徭請謁公事假私蹊以備員名借冠服以圉齊民此則流弊之甚吾子所以齗齗言之豈不然與僕則以為周士之貴秦士之賤皆有繇來非可以一一罪士也夫提調教官造士之本也督學憲臣簡賢之綱也誠令在上者教育絀録首士以德行導士以公正則本端綱挈就有竒邪之人懷無狀之心者不得厠其間矣乃欲膠為定額以抑之不亦後乎且科舉之法未有悉今日者然而弊之不衰才之不昌則以荐舉之未行舉主之未坐故也夫欲導為射示人操矢欲導為御示人執轡今盡以科舉而督實行是猶誨射而示轡誨御而示矢也豈可值乎是故科舉之外必行荐舉則篤行之風倡必坐舉主則憑私之路塞此不可易之勢可見之績也或者因謂士稽德行則有刲股廬墓轉用為欺之患此又不究其原而猥以俗議掣之也僕甚不然昔者三代教以德行而賔興之若是則人當無完股而墓舍充郊鄙萬不爾矣漢舉孝弟力田又舉孝亷國初首重荐舉纍纍得名世士豈聞有殘軀舍塜以規之者乎夫殘軀舍塜以規進非今獨難雖古亦難也寡悔寡尤以得祿非古獨易雖今亦易也彼豈有輕捐其易而重幾其難者乎且今患不有此等人耳假誠有此等人即賈名干世猶當登而揚之以樹標於末世比之買骨以為駿招豈不可也今奈何遂以臆見拒良法哉萬一今日能復此法則雖踵虞廷之比屋蹀文王之濟濟不足難矣僕之區區祛弊振靡亶先於此為國禔祉不竟大乎吾子異日圗之周公得書嘆服且曰使若國初薦舉法行則首詣公車者舍先生誰耶已而又擬為䇿問自代為對詞旨偉特一時并傳誦焉蓋先生雖伏蓬虆不忘當時雖行鄉閭要亦有所及非苟沾沾自好已也最後都御史王公講學虔臺其意指出入朱子先生心不然之會公道吉上書陳辨公曰待歸相見細講先生退曰昔之處士多遊公卿以相引重吾不為也遂竟不往年踰五十意嫌逺出遂館族之陽田時孫直方六七歲挈以教又手録國朝名臣言行録授焉今手澤具在館數年猝病中風輿歸一夕不語卒時嘉靖丁亥十月某日也得年五十有九鄉戚知者嗟悼涕下中桀黠者更為之痛曰嗟乎寧天斃我何殱乃善人先生生平仁愛無猜先人後已雖優𨽻禮若嚴賔雖戲劇臨之對必誠悃其容人慕婁師德有暴之者獰甚直面壁而已或延謝則歡然往雖曵止之不得其楮墨卷帙衣篋皆有常置倘迫無疾言遽色步履御用不可得亂也故人雖以莊見憚又皆樂傾其誠至指目之曰劉髦先生也劉先生者永新人故學士文安公父質行悃愊出言為世口實與先生頗相埒故云故居扁曰謙齋又自稱謙謙子所著詩文旨逺辭鬯頗類豪者吉水贊善羅公嘗讀其貽子帖題曰先生誨子以知行為學以務名為戒富貴利達一不置諸口斯言覩見其心矣書法鍾王徑逸如其人配蔡孺人宋安撫某之後生有賢德能始終成先生之髙誼既卒歐陽文莊公為銘其墓生子三伯某是為晴岡先生仲某季某皆早卒女一適同邑南溪蕭胤仲嵗庚寅附葬廬陵某都之小江邊祖塋園乙辰向晴岡先生天鳳字時鳴貌晳白遒雅自童逮壯未嘗就外傅獨受學父謙齋先生謙齋先生先授小學孝經稍稍通記始授四書詩傳以貧故未冠出為童子師謙齋先生悔曰吾不忍貧令兒子奪舉業不可也於是先生復專業舉子數年里中故刑部郎周公延之教子姪眂先生所為偉之先生天性介特既內承嚴訓又得周公觀摩故其行益方格不可犯卑視儕俗之懻忮機利者里士有機利自喜先生恥而絶之退著蛙説以自廣嘉靖癸未年二十八補邑庠士時家益窶食益繁乃出館虔州之蕭氏又數年館雩都之袁氏袁氏有士曰貢號稱博通獨與先生莫逆相期許而雩士又有何公秦黃公宏綱皆學於陽明先生最久稱髙弟日過從論學曰聖人之學貴反諸心不事窮討先生初不然之已而疑半信半時冬夜思家感更鼓之失然後釋然信曰陽明先生之學蓋獨有本矣於是著自信篇曰余家雩陽冬暮思歸中心忴忴怦怦靡有定也乃夜從友人家劇談久之返舍已漏下三鼓矣既返踰時而后寢若熟寐而後晤既晤而聽猶三鼓也余曰噫何三鼓之永也久之聞鼓聲已四下余復就寢又若熟寐而後晤既晤而聽猶四鼓也余曰噫何四鼓之繆猶三鼓也余乃攬衣起坐覩窗櫺隱隱有光自計初寢夜且踰半今其時愈久矣東方之白豈非將昧旦耶而司更者繆盩若此使吾為令必笞司更者為上吏必詬為令者於是起而步於中庭視窗櫺光則月色瑩瑩然白也已而憶曰尚未鳴雞耶諏之僮曰果未也又諏鄰壁亦曰末也余乃正襟危坐俟之良久才聞五鼓頃之雞聲始喔喔然浹耳矣瞿然悟曰吾過矣過矣夫司更者始非加疾也以吾劇談而忘其永也故疾後非加永也以吾憂思而望其疾也故永心之歡戚以意遷時之疾徐以心移是吾且繆盩若此奈何以罪司更者哉使吾誠為令也而司更者是罪誠為上吏也而令是詬焉則吾之繆盩不尤為甚乎吾是以知心之所係大矣故一塵眯目則天地易位一指塞耳則鐘鼓失聲苟由吾繆盩之心以察物而窮理是猶眯目以求上下之分塞耳以求清濁之辨也不可得矣故鑑誠明然後妍媸别焉衡誠平然後輕重異焉人心誠定靜而安也然後至理得焉故曰唯深也能通天下之志唯幾也能成天下之務不然未有不繆盩而妄欲罪人者也余於是信陽明先生之學蓋獨有本矣今夫靈哲煌煌萬理從生物眯以塞病孰為甚曰飢渴之害莫甚焉孟子曰人能無以飢渴之害為心害則不及人不為憂也噫是豫存心立本之始也吾於是著之篇以自信且以告諸同志請事終身不敢怠棄於是先生慨然發憤反出諸宿學者尚矣館暇則從何黃二公及諸同志切劘退而靜坐默觀雖夜不輟讀書唯紬大旨為舉子業貴發其精意不為訓詁又著理論其略曰後儒所以異聖學者惟以理為外者之弊也後儒既曰性即理也而又曰在物為理則謂性為在物可乎既曰在物為理而又曰處物為義則謂義非理也可乎又作常勝論散佚不傳戊子冬謙齋先生病中風暴卒於家先生奔歸痛哭欲絶終身以不得永訣飲恨言之未嘗不隕涕覆面也乃著思親記以自警其言痛切觀者感動庚寅冬先生既襄事復如雩都究異同於何黃二公蒸蒸乎造宏深矣壬辰雩歸病痢醫者投以熱劑遂病瘵癸已之臘月十日先生辭世終矣得年才三十九臨終語不及家惟痛恨不得終養老母而絶先生生平以學古為期濟物為心其既聞學也則以孔孟為期以不愧屋漏為功以得其本心為的以一物不得所為恥以恭忠敬為日履其再至雩也其氣春融其色玉瑩其謦咳如金石鏗鏘其遇事如遊刃而有餘地其人之接也如登臺飲醇莫不薰心戀慕而交稱其誠也一日著新履行道上有荷擔者擠之泥淖履盡涴乃族人從旁欲毆擔者先生力止曰彼非故也誤也麾其人速去之先生從邑庠歸天未曙憩鹽水嶺之石上見一人卧石側齁齁然酣也袖有物嶐起先生懼人掠去乃偕僮候守抵曙視之即其族子鬻産金以輸官者也先生立戒遣之先生居雩三年其及門士唯今袁侍御某周訓導文最諸生文嘗從遊山寺見一人病痿攣臠局地旁一人曰使得一金謝我我有竒方起之先生為探囊不及一金與之同行者曰是安能待其起而驗之耶先生曰吾聞言不自已吾又安能待其起而驗之耶文一日侍行問曰今人視色輒動心何以止之先生曰今人子女雖容未嘗不愛然未嘗有不善之心者一體故也若能視天下色皆子女也何動心之有先生言行類此以某年月日葬坤塘大隴西盤形之原負辛戌面乙辰娶里中漆田周氏子三長即今湖廣按察司僉事直是也直字正甫第丙辰進士初授刑部河南司主事以三年考升雲南司署員外郎於是先生蒙貤典亦贈為刑部雲南司署員外郎次諒字誠甫邑庠生次問字缺甫孫四人順字進道庠生顒字進逵顯字進通頴字進迥龍洲稿序豫方捉髮好攻文詞至厭棄舉子業久不録歲丁未既壯始有子雲悔少之嗟故所為古近詩多散落不記存賦二首竟亡逸丙辰官上都庚申出補楚臬歸檢故簏及門弟所藏讀之如隔世語追憶夙抱似亦有所寓寄且多野人之况因令存之間涉靡冶如白紵諸詞促為削去題曰龍洲稿龍洲在余邑南二水夾出廣袤五六里中有各故姓果園花榭修竹巨材回塘疏澗槿籬棘巷蓊蔥莽蒼負勝而奧余少與數子者讀書其上雖去餘十年心常到焉故自豫未試以前雖有四方之作咸附是編表歸志也詩文凡若干首如左辛酉二月日識華陽稿序華陽者金陵句曲三茅山之第一洞余昔仰祿教句曲蓋三登三茅山焉山殊無竒詭獨華陽洞幽勝志稱洞與江通山擁波下上故昔名地肺洞其竅也自茅盈後若左慈陶𢎞景之徒咸依洞居余雅遊輒徘回不能去然時方溫經治章句應南宫試因有覩於聖人之旨誠不欲殫精於詩所作詩僅八九首遂題曰華陽稿云白雲稿序豫不喜弄翰踰二年矣丙辰官上都覩詞家學士麟麟稱盛又方為社會雅亦引豫豫故以病自卻然豫獲在西省省居禁城最西其入則陌紆而徑窈兩廊槐栁夏春交蔭諸分司咸有砌草盤花甕魚怪石修竹嵬松碩柏古藤稚蘿蔚蔚夭夭與塵案敗几掩抑宛若古剎其南有白雲樓樓北瞰上谷羣峰其西西山也豫雅與二三子卧省闥經旬簡出四時相羊登樓四眺若可攬結曰曛若綺雨霽若黛雪晨月夕若白虹素練東與黃屋熛闕相映照卒然遇之若依嶠壺而覩神宫夜則乘月步庭階隱約若在林麓當休沐偕出西直門尋各名剎步溪流登西山往往直罥幽耿輒不能無感發吟咏或酬贈追逐間作咸歸寄情而已始雖有求工之心然知終不能工竟亦置之弗為深求因并録存曰白雲稿比部古稱為白雲司因以名樓又豫懷也故云唐詩律選序世多以律詩為非古豫獨不然詩之古不古不繫於體之律不律也辟之求古人於世將以其質行耶抑以其狀貌耶如以其狀貌則必若植鰭削瓜然後為古人可歟其取冠服字畫皆然有聖人者出雖貴麻冕而用必巾幘雖貴蝌斗而行必真草夫豈聖人不好古哉以為取古於裁製點畫固不若取古於頭容心畫之為真也其於用詩何獨不然詩之作義取含蓄溫厚足以感人而體製次之今世唯騖詞葩體竒以為勝其於感人之義咸蓋而不彰漢儒議司馬相如勸百而諷一者以此夫相如之文體古矣使皆勸百而諷一則又何以貴為豫與郡人鄒繼甫官西省政暇間取唐人律詩刪其繁猥令吏人録為四帙相與讀之往往有當於心者若今世所共道者不假言矣其他七言律如張燕公云空山寂厯道心生虛谷迢遙野鳥聲張曲江云遺賢一一皆羈致猶欲髙深訪隱淪王摩詰云為乘陽氣行時令不是宸遊玩物華五言律如張燕公云山城豐日暇閉戶見天心忽有南風至吹君堂上琴岑嘉州云勤王敢道逺私向夢中歸儲光羲云恬淡無人見年年長自清如此語其幽懷忠抱雖千載猶能感動其於古三百篇之義何以加焉若獨以其律體而異之是專取狀貌而不貴頭容心畫也豈可格乎昔王荆國選唐詩百家後自悔曰費日力於此良可惜也豫與繼甫遊而詠之未嘗費日力焉因并敘其意以歸繼甫送履菴萬公赴江西憲長序某嘗從武進唐先生遊則聞履菴萬公詞㙯為勝鄭大司寇聞之曰其政事蓋兼優云時公在湖北某方被命為同官或謂公已有休疏某蓋惝然戚也尋聞疏上不報乃翻然喜辛酉春某至湖北公一見語合歡若平生久之蓋知公之為有道士也詞藝政事祇緒餘耳已而同寢食接舟車事至纎巨重輕唯唯否否雖不語亦合其相期也非獨某不可一日無公而公亦不欲以一日去某也公治湖北期年首先教化痛抑貪吏導以亷恥公私往來宿所溢費盡汰而令甲之懷撫苗民動中其情故自公所在獄無滯囚驛無濫供吏不敢為暴閭閻安堵流民襁負不煩秉戈而苗土歸者至萬餘指天子奬賚有加自他人視公雖一楮蔬不煩民一夫騎不使盡力以為難而自公行之自若也是嵗夏公以資遷為江西憲長以去而共事兩憲副若南昌張公臨淮李公與公遊從尤習咸不忍别相屬為言某以公之遷也其喜也同而憂也獨公連疏請休今操柄者能陟公以奬恬而又適在豫省固某與二君子之所同喜也然公行則吾身逺於蓍蔡而湖北驟失保母其為某一人之憂豈可勝道哉然則公當有以處某而某又奚暇以言溷公也且使某也告公以職事之內則公所有也某不必言也使某望公以職事之外則勢所難也某不當言也雖然公固今之有道而望於人者也古之人曰達不離道故民不失望今者號稱有道享一時之望天下唯恐不為大吏作而為大吏也則斯民竟失望何哉某嘗有大憂於此而非公則誰為言又誰為慰彼有道者以為不曲而通則道不行不知其曲而通也未嘗不逺道而病於民也民病而望失焉又烏取所謂行其道哉孔孟非古之有道而望於人者乎孔子於佛肸公山欲往矣然所之不三年淹又何其逺引也孟子嘗後車數十乘矣然萬鍾不以槩受又何其介然也孔孟烏有以變通而先失所以為行者哉夫孔孟之不忘天下視衆人什百也然得之不得而猶曰有命而况衆人乎然則衆人豈欲踰於孔孟者耶其皆未忘上進而不知命也耶公學乎孔孟其道上退而不上進詞藝政事雖所兼擅猶粥粥焉懼人知而名之公之往矣作而為大吏其不離道而答民之望也決矣公豈獨為吾黨慰且為天下慰公其無嗜退不返也而又令人憂督府董近淮先生疏稿序有為進西崑之璧貢南海之珠者焉有為漕江東之粳運關西之粟者焉二者其孰良於用乎曰子不聞昔之人有握珠璧不得食而斃者未聞有積穀粟不得珠璧而飢者也當其燕豫則庸璫嬖媛貴家紈袴之子寶珠與璧何啻千金一逮窘急則珠璧豈可與穀粟同年而語哉有用之與無用不待較而明矣君子之獻言於君也亦然著封禪之書申與引之論非不有宏詞爛説馳騁天下之巨麗絢然如西昆之璧南海之珠然使人皆循其詞以陳事於上則上必不能曉辨以有行皆循其詞以諭事於下則下必不能曉辨以有承雖自享以千金之價其無救於生人之枵腹也久矣則又將焉用之信陽近淮董公以節鉞鎮川湖貴三省暇日出其疏稿示直因命以序直伏讀嘆曰若公之言則誠所謂漕粳運米人得食之以寄其生者也異夫世之聚璧珠以蠱時人者矣公自辛丑起家進士兩為令民食其德咸為之祠及晉為御史視鹺兩浙移按貴陽陟撫延綏政績多顯白今總督川湖也則逆酋授首而膚功適成凡此公皆豫疏於上已而奏效不易其畫辟之朝而食夫人也則朝生暮而食夫人也則暮生其鑿鑿乎有實用於當時蓋讀其疏即知其政不假論也豫獨以寬海禁一疏則當時讀者或未盡悉未嘗不為掩卷而嘆公之言曰海隅窮民無田可耕若居者禁不下海下者拒不入關彼豈肯俯首就死鳥窮則攫兔駭則奔此嚴海禁之隱禍也已而數年之後公言一一皆驗其極至填人於壑連結數省之禍竭東南之血髓到今而未巳噫公之言用而福未用而禍辟如饋之穀粟食則生弗食則不得生存乎其人而已公又可少乎昔者賈生欲分割諸侯王消未萌之禍當時弗能用已而主父偃舉之而漢室用安今公以名材簡陟方未艾又安知不身究其用而無假諧偃之言乎直於是知君子之言必為穀粟之可食以生夫人使誠足以生人即或以斛珠而易斗粟吾不與也夀總督中丞近山羅公序國家涵育無類函夏內外欣欣恬謐生理之極唯楚西南連蜀貴陽萬山嶵嵬攢戟刺天巗谷谽谺箐薄蓊阻間出平陀人獸藂育則昔所稱苗鬼西南夷之鄉魋結蝟聚間山編屋貌人性獍慓輕易亂一不可意動相鏦剚猱奔蠆擁不可櫛理酣怒豪吞劉我邊氓雖屬羈縻實作不憓逮於庚子辛丑之年剽肆日猖朝家始議遣重臣出督楚蜀貴陽兵事開府沅水之上授以不御之權繇是奉聖天子威靈芟夷斬刈如解髖髀如搏虬螭既數年而稍定已而屯戎設哨星羅棊列如障逝水大勢浸息滲沫猶滋又數年而始靜方稍定也邊氓咸曰吾民幸哉更生而未逮安生吾督府謂何及始靜也邊氓又曰幸哉安生而未逮樂生吾督府謂何歲之壬戌今大中丞總督南昌近山羅公適來鎮撫而容山小醜方就奴纍羣夷仄立且震且疑公至則下所屬各條利害採擇可行著為令甲耳目不怠昕夕有程節靡簡苛堲墨導亷汰弱易窳飭藩銷萌將必遴驍哨必厯久鎮扼其衝苗雖獍也不絶以獸聽民交易無相紿敓於是車轍之邇旬月之迅文經條達武緯恢章德施廣密聲威旁鬯民恬耒耜士狎鋋戈將卒無私漢土輯和近臨夜郎卭筰僰人西極冉駹南帶粵猺綰轂昆明貢獻相望昔在撻武之君三年始克漢戈船將軍屢出之不能收者公一旦緩紳而坐撫之魚魚然畜也詵詵然馴也頺乎若髖髀之迎刃而解也遊乎若虬螭可引係而豢也寂乎若淵停之不波雖滲沫而不為溢也山險斯夷水奧斯明千里旄倪咸欣以躍曰吾何幸獲樂生矣匪我督府孰胎孰成何以報之願永千齡而午月之穀日實為我公初度之辰湖北各屬大參蔡君兵憲李君都督石君參戎洪君李君梁君申士民之請乃觥五溪之水俎明山之簌登獻為夀公曰唯聖天子大德曰生宵旰靡寧斯繇以致我何有焉羣屬不已授簡末寮某撰述以晉某乃為公誦江漢之詩曰虎拜稽首天子萬夀又為士民諸大夫誦魯頌之詩曰三夀作朋如岡如陵於時上下永貞同禔於治如天生而地成靡有疏數靡有竟既豈唯遐壤食福匪替西曹集序始豫入西省省中稱山東人李伯承嫺詞賦而伯承語豫輒推轂郢人髙伯宗當此時兩君結都中文學士為詩社稍亦引豫相從好日篤然豫稔病才詘間睨諸君搦筆席間咄嗟成篇往往縮朒不敢進豫又與伯承論相抵伯承重氣骨喜瓌壯語豫以氣骨尚矣而神韻先之辟人之生有頎然魁碩鷙飇虎視叱吒風雷者至扣其計畫無所之則何取焉假令志意摧三軍智勇饒王公雖身不七尺或狀類女婦子其烏可鮮哉是故人不專頎碩貴在神智詩不專瓌壯貴在神韻雖然世之語神韻者希矣伯承聞豫言或然或否至相與共讀伯宗詩則又未嘗不交口同然目相視而笑也豈伯宗與豫二人所稱道庶或有兼之者與豫嘗塊卧省署伯宗時叩寢縱論天下大計自負其竒不肯與世比方廕臣竊魁柄頥指中外士伯宗獨據法裁其私人屢堅請不回又嘗贈言事者詩柄家大銜遂因藩封出伯宗為右史時豫先佐楚臬逢伯宗郢上相與道舊引滿盡歡出詩數篇皆灑然冷汰於物無吊湘之悲已又出西曹稿指曰此非子與伯承曩所然可者與伯承既敘之矣子寧獨默乎豫聞楚有杞梓不用棟章華而置為􅍻麗禪榜其文采猶炳炳著也他日匠石顧之始徴其餘材為棟今是篇固伯宗之炳炳者也惡覩其不徴於匠石者與豫因述疇昔伯宗修業之勤并逮其大節若此覽者不為膠體而談藝局藝而論世也則庶幾哉知伯宗矣刻擊壤集摘要序豫既以致學而又苦病侵時時思歸田野以求所未至適同郡蒙山陳子與豫同官川南而又同此懷也則相與追憶吟望無目不在青原白鷺之濵匡山湓浦之間且云吾二人者非獨歸也蓋將有大歸焉暇日取古人歸田詩共讀之以寄所懷多見其有激而云獨淵明之作可謂敻矣亦終不免於杜子美枯稿之譏豫二人者雖愛之咏之而未足以盡當其衷何則以其猶有人之言者存也一日豫為出堯夫擊壤集視陳子陳子手而讀篋而玩踰歲復豫曰吾讀他詩非不如珍羞可口然似有遺旨焉讀此詩則知天下無遺旨矣異日水邉林下舍此奚歸因相與摘其要者將刻之而屬豫以述其故豫少聞先師歐陽公曰堯夫聖之樂者也今讀其詩然後知先生之樂非常樂其學充焉爾矣先生之學非常學其幾先焉爾矣幾先故體微體微故應妙應妙則化而順化順則達而充夫既充充然達矣然後能交食於地而交樂乎天故樂非欲言也而不能不為言言非欲韻也而不能不為韻韻非為詩也而不能不為詩今夫大造至矣唯剝而復乃見天機始胎而姤姤孕而震震上坤下雷出地奮庶物馮生此先生之所為矢詞而成篇也豫雖能知其然而不知其所以然而况能與於其幾也哉豫將以晚節師淑先生之萬一以庶幾所為歸者非陳子其誰豫挈之雖然大音不響大羮不嗜久矣摘而刻之者匪獨為豫二人水邊林下之計亦將有和而好之者矣或以其辭非漢魏調非盛唐則又如九方臯之馬吾知其千里而已而詰之者曰是牝且牡耶驪且黃耶非惟豫不能言亦不能知也刻喬三石先生文集序文章之作何近代品議之異乎蓋近代作者暗於大道而專倣子長以稱勝其語人曰是規矩在焉其實襲也夫古之文衆矣子長與莊荀孫韓老左凡六七家咸未嘗相襲等而上之讀彖象者若未知有典謨讀雅頌者若未知有訓誥讀語孟者若未知有繫辭何則彼文者道法之所出不得而襲焉故也譬之為居棟角肖也然各一其材今曰阿房靈光材最古乃採截而益之亦曰規矩在焉可乎今夫規矩各一物自巧匠運之為規而員出焉橫之為矩而方出焉故規矩者方員之母也而方員豈規矩哉是故道法者聖人之規矩也道法備而文言之以詔諸世此聖人由規矩出方員之迹也方員之迹無定體故為典謨為彖象為訓誥雅頌不可窮極執之則窒子長之雄健則亦方員之迹見乎一體而已乃獨逡逡焉執子長以為規矩而襲用之是焉知規矩當時惟何大復力爭之惜矣知言如大復而早世未酬也關西三石喬公自少為大復督學髙第故其文雖不顓倣子長而實鬱然有漢人氣考其人悃愊介特憂國急民厚倫樹風瞿瞿慕道法者也讀其言可見公他行具豫友孫淮海君敘中獨其一事世罕聞方嚴氏盛時天下名人無不序鈐山堂集者徴文逮公公遂引避不復仕若公可謂壁屹偉丈夫矣公又豈肯承他人涎唾緣襲為文者耶淮海攜其集入果果守慎齋伍君又公督學髙第弟子也將翻刻於果而屬豫敘之於右南富王氏續修族譜序方豫齡齒已知邑南富王氏族屬繁爚至捾髮侍海陽尹自齋公常德二守劈泉公自齋方格恂亮劈泉宏濬明懿一見咸以古聖賢之學見屬豫時喜􅛅宕莫入也後又與自齋公家子貢士仁卿姻婭因謁其伯父太僕修齋先生覩其儀刑癯然長者繼與子敏侍御同年子薦太守惟弼令尹同試南宫三君子語余必以學而余亦下上切劘不敢自委放余然後追嘆自齋劈泉二公之逝不得復相從為可悲也今惟弼與余又同宦西川荷麗澤有加焉而惟弼乃緘其家譜示余曰此修齋與半峰郡伯續編屬為之序閲其先世自唐荷山長者邁種潛德肇居連嶺奕世有明逺翁始移今南富又再世生明道美道二公當宋之時二公子孫蟄蟄麟麟昌家勤王聲光已爛江介到今七百年內井竈第宅蕃數萬指冠緌鼎甲侍從方面兩𣲖埒峙煜乎盛矣乃以余所覯則又特異蓋王氏之盛自太原琅邪勳庸文藻非不都麗然未有翩聮以興於學若今南富諸君子之衆者也夫學學為仁者也仁者以天地萬物為身而莫先於親親今惟弼與諸君子訂譜敦宗約範嚴飭以興一家親親之義偉焉乃又有循政裨於民物其學非沾沾者倫雖然豫嘗見自齋劈泉恆有憂先天下之志而未之酬諸君子繼出譽髦任重彌力寖明寖昌雖以仁夀斯世欣合天地而族萬物可也然則大王氏之學者自茲譜始豫故樂為序之刻督學集序道原至一而散見於至不一是故以至不一求至一固不可得以至一而拒至不一尤不可得何者至不一者固至一者之無為為之而不能不為者也不觀日與月乎貞明之體至一而散見於下土雖寸壤尺波容光隙地莫非明之所被夸父逐之於隅谷犀牛矚之於兩角固不足以得其體然謂下土與隅谷兩角所見非明也乃欲截而拒之以專求於無所被無所見之間則亦將二而違之矣是故苟不得一則雖塊立尸居杜機忘言固非一也苟誠得一則天地之持幬日月之臨照山川之峙流庶物之馮生吾得絯而論之無非一也上之二帝三王下之九流六家內之六經外之諸子百氏巨之家國朝廷郊廟庠序貢舉餉餉軍府之制細之禮器樂舞少儀內則藥工場師稗官小説之故吾得絯而論之無弗一也古今之學術上下之政治吾得絯而論之無弗一也然而一之一也易不一之一也難豫不能知一而幸友於淮海孫子方豫與孫子足未相數言未相洽駸駸乎合矣已而足相數也言相洽也不知孫子之為豫豫之為孫子也孫子生神穎長學於道林子視其氣杜機忘言弗諜一光至讀其詩文凡數千萬言達於天地庶物究於帝王辨於諸家放於上下內外巨細尤嚴於學術政治而皆出於幾微之所絯其韻不假揣度而靡不應律其辭不煩比擬而靡不合軌豫知孫子之無為為之而不能不為雖千萬言無言也進乎一矣孫子督學關西門人嘗刻其詩曰督學集今台山邵子刻藏保寧者增文類復仍其名豈不以孫子悟道得一自居關中寖盛也夫孫子名滿天下而莫逆莫豫若序而傳之以明孫子之學非豫誰耶刻正學心法序學術之異同非謂近代蓋自孔門而已然矣孔門弟子唯曾子子夏最少至晚年各以其學為列國師蓋曾子之學一貫自得而發之大學以傳子思孟子孟子之後凡幾千年始續於濓溪與明道子夏之學篤信聖人其言有始有卒意以末為聖人始事以本為聖人終事故傳其學者能遵聞見謹器數今著於記者可考波被漢儒而訓詁繁增太史公稱當年莫竟其指屢世莫究其説者蓋其極也已而浸淫晚宋到於今而盛行故二家之學皆出孔門傳及後世而異同相訾何哉蓋為曾子之學以由本達末為序為子夏之學以溯末探本為序由本達末者心外無理而物無不通也遡末探本者索理於物而求通其心也是故本末異序心理殊觀而異同之訾興焉此豈一朝夕之故哉當子夏在聖門夫子已詔之曰無為小人儒夫子夏豈若後世騖利小人哉蓋警之無為小儒也已孟子論北宫孟施一曰似子夏一曰似曽子已而又曰不如曾子之守約則學之大歸蓋已較然辨矣明道以後作者非一然斷然示人先本後末反求諸心則未有顯赫如近日陽明先生者也直長不知學方壯遊南野念菴二師與聞先生大旨弗克自決及讀濂溪無欲為要之語已渙然矣已又見明道述天理由自體而得又曰不可以窮理為知之事曰天理具備元無欠少曰以誠敬存之不待防檢不須窮索其訓致知格物曰物至知起物各付物不役其知則意誠不動又曰人心莫不有知惟蔽於欲則亡天德然後益信陽明無一語不與濂溪明道合其逺接孔曽以上遡道心精一之旨復何喙焉乃摘取三先生語彚之以時觀省蓋自知其贅而未能已兹者柄學蜀土日語諸士雖興發頗衆猶復牽於文義有若豫昔之不決者同門髙泉謝公謂曰子盍以三先生語刻示之聞之今撫臺二華談公公曰此正學心法也遂以名篇巡臺近麓李公重嘉韙之乃屬果守慎齋伍君入梓因以二師論學數書附焉直因序其所繇為諸士朂嗟夫諸士不豫信而信數先生不數先生信而自信其心可也然猶有懼焉學莫辨於本末尤莫辨於身口學墮諸末不及反本猶懼其牿若墮口耳則將奚救此又直之反躬自皇而重望諸士也賀撫臺三川劉公晉陟少司徒序事變之興非一日成也蓋必有積而醖之者焉戡難定傾遏劉保大發噓吸之猷而樹瑰雅之烈亦非一日成也蓋必有待而藉之者焉益州之部三面阻夷不隔一塞自卭筰以東冉駹稱大綰轂夜郎也黔相牙其間皆土夷酋長及江介逋逃所為都宅而竄伏者非一日矣其俗雜氐其民易動而難戢旋撲之則振起而衆緩治之則虎負而深夫既緩之而醖其禍矣然欲以一旦戡定而殄戢之非誠文武忠猷任事之臣何可幾也唐南詔之亂得李贊皇乃服宋李順之變得張忠定乃安國家往為藍鄢寇劇至司馬彭公西來乃定越茲五十年矣復見今三川劉公嗟乎此豈非所謂待其人而藉之者耶公之始臨也支羅挾冉駹之𣲖憑虎負之勢抗命已五六霜先時備兵憲臣莫敢孰何唯日撻我民冀泄賊忿賊視而笑如是者數年去年八月公議親征有司猶上書諷上公愸然曰吾弗往則臨敵將佐何取進止維時九月之初秉鉞東征某不佞覩公文武忠猷可動鬼神贊曰行其捷乎公果夜夢巨神仗劒叩寢告曰吾為若殺賊公占之曰是必神翊豫破支羅也詎謂白蓮黨從中崛起神乃翊公而戮之耶白蓮黨者故妖賊張寅亡命潛秦晉蜀地糾煽為逆積數十年凡一省中從者不下數十萬而蜀蔡伯貫者亦魁傑也蔡之徒䇿曰重慶蜀壯郡吾出不意破之則與支羅連坐遣一酋擁兵北取漢綿直薄成都其先置者內應舉火則全蜀定矣不虞公提重兵臨重慶若從天降潛伐其計不得逞攻破旁州縣公立命中軍受方略分兵搗賊賊見有絳衣巨神遂敗乃盡根株斷之而先遣伐支羅兵將亦以是冬蕩定俘斬至不可勝紀蓋未半年而二巨寇盡平寇甫平則公晉陟司徒之命下矣或曰公歷卿佐舊矣往權家燀赫薰炙而公獨外出乃茲始從蜀臺晉今秩則前之拓落而艱關者固為西川待之此豈人力也哉其天也夫而西川人士與官西川者何其幸與以某竊觀公才猷近贊皇剛決近忠定然敬寡屬婦􅀢墨作亷退然以民隱攖念宏度虛衷從善如流溫恭而有禮則於古人不知孰後先嗟夫天之所以待公者蓋又有大者存焉於是凡西川在蜀三司咸曰吾黨被陶教席勛猷非欲一日舍也然又無能奪乎其大者則授簡小子某敬為之言以發其眷眷又為天下賀其待之大者故序刻武經七書序直嘗慨古軍政司馬法不傳而孫吳獨以辨譎徼稱武經非王者宜用有長老先生哂曰子無異也夫易傳戒機事不密孔子貴好謀有成兵家多算勝少算不勝此雖黃帝太公不能違也而况後世乎方猾夷之剽攻巨盜之盤噬羽燧交施主震民搖師興十萬日費千金存亡死生噓吸霄淵而將兵者不有竒算密畫以取勝敵乃曰我為王道是不仁之大也黃帝太公之異孫吳非異其法異其心也心之公私即道之王伯分焉子烏得廢其法乎久之目擊倭虜為變一時諸將敗衄漂血千里其間非無鷙擊颷發之士而傭帥寡於密策愞夫詘於先發往往為賊計所乘然後知孫吳之不可已而訝上之人之未有以教也孫吳之書具在世之武胄有終身莫諳其名文者或諳其名文矣又止於墨誦應科竟未能有皎然試之其身者則何殊吾黨之誦孔氏而未能身明其道者也夫孔氏之能興治已亂至明也人不能身明孔氏而治之莫興亂之莫已則尤孔氏之不效是重誣也今之誣孫吳者亦然以不教之將撫不鍊之兵一旦事起上下靡從徒使文臣輟民務以經武事齊民既出食食兵矣乃復荷戈而代之死以至近募逺徴莫非朘閭閻之膏以填其腹蓋寇未殄而國已先疸矣所用非所養所養非所用則以不教將之繇弊也而談者乃咎諸時勢將卒之乏不亦左乎侍御近麓李公承命按蜀曰吾所按惟文武大事而樹風正表既丕振斯文矣又念蜀地近多故而武辨坐遐僻無從得書乃屬閫司管君某陳君某刻武經七書遍示各將佐而屬直以引其端直因述其旨為執事者深矚其六韜非出太公穰苴尉繚文非古茲不遑論著瑞泉南先生文集序豫自童喜攻文詞騖為竒詭不肯休頗自矜嚴以號於人曰古詩文法當爾也比壯有先生長老訓之曰若小子奈何以萬鎰珠彈飛肉不可還以連城湛盧闢錦石不折則闕寧不慳乎今夫人至靈者心也而道出焉可以三天地首庶物自陶唐氏得之以協萬邦有虞氏得之以光海隅三王得之以式九圍清四海尹陟得之格皇天周公得之興禮樂孔子得之卒為萬世師繫其大哉奚啻萬鎰連城而子小用之奚翅彈飛肉掘錦石吾不暇為子笑且為哀之豫始聞搪焉若有阻也而問曰文終不可為乎曰文者聖人之所有事也吾告子以協萬邦光海隅式九圍清四海格皇天興禮樂師萬世文亦至矣聖人奚不為文哉且子之所謂文是猶女歸刺繡文之工而未覩山龍火藻之從生是猶宋人雕楮葉之竒而未知徂來新甫之松柏之為真也是奚足語文子不見自漢司馬相如工富麗中人心髓延及魏晉六朝凡數百年劫奪不可已甚矣哉其禍天下萬世之蠱毒也子尚攘攘焉慕之以夸嚴於人仁者固樂為乎豫於是惶然汗下口禁不能言又恍焉若有醒也已而悔棄所習凡有年矣雖未得於道然灼然知蠱毒不可近又未嘗不自哀且以哀人雅聞渭南瑞泉南公少喜詞賦日為數千言既守紹興偕其弟薑泉公聞陽明王先生語學遂悔棄其宿習奮志求學蓋有先得豫心之所同者當其時王先生始以學倡東南要歸於本心正所謂三天地首庶物者而信者尚希公生關內居西北為辭賦藪乃一旦棄去變而之道豈非所謂天下大勇者哉公既聞學以書扺其侣馬西元溪田諸君挈而之道諸君錯愕不能決第稱公之言以為宏大不知公既澤於道而文之猶之覩山龍火藻自不屑組繡樹徂來新甫之松柏者固知楮葉之不足矜也先生既終之幾年薑泉公裒其先後詩文得若干卷已付之梓薑泉公之子叔後豫友也以序見屬豫考公方強聞道未傳年而逝孝友之德循良之政風被四方久矣向使天假之年公所就不可涯進則格皇天興禮樂退則求為萬世師無不可企者悲哉已矣茲集之刻俾世之彈飛肉掘錦石而矜為組繡楮葉者讀而思之慨然感於公之大勇咸有得於大小虛實之辨則斯道斯世之從繫不鮮小也序惡可辭别趙堯卿序果州趙景雍堯卿少慕聖學遊庠厭舉子業求諸物理茫無入又厭之遂偕其友二三子者去而學仙釋既獨反正閲十年矣適豫視學按果乃介其子庠生從吾者從豫訂學無一不契時年六十餘而志彌徑而功彌殷豫以病致歸堯卿買舟浮江别數百里外請曰雍也幸有省又安得令二三子翻然歸乎豫仰而嘆蹙蹙然而惻曰吁哉難言夫二氏之於聖人不異於異而異於同今世儒守吾之粗而異攻彼之異而粗非不厲戈矛嚴藩塹也不知肘腋之士方退考其有同而內顧決裂靡所從歸則又安得不舍而趨之乎是則世儒之驅之也久矣吾與子又惡能使之歸哉雖然子不聞之有天者有天天者有地者有地地者二氏以為吾得其天天地地者足矣吾焉知其他不知聖人得其天天者以成天而物無不覆得其地地者以成地而物無不載是故二氏之私不如吾聖人之公也二氏以為天有時隳而天天者無隳地有時裂而地地者無裂吾得其無隳無裂者足矣吾焉知其他不知聖人雖物無不覆而不隳者固自若也雖物無不載而不裂者固自若也是故二氏之偏不如吾聖人之全也堯卿盍為吾告二三子公者聖人之所以盡性者也全者聖人之所以至命者也二三子全性命無以為則又惡能必為其私且偏而不為公且全乎是故善辨二氏者辨異於其同吾知歸者之不獨二三子也此豫之所以别堯卿者也復何言梁陶貞白先生集序夫性命之精不以生存不以死亡故老子曰死而不亡曰夀其謂不亡非後世名與教之云也彼其身有不可亡者雖以後天地長存可也是以孔子與老子未嘗二然孔子翕張變化如四時之並運而大業以生歲功以成故萬世仰其為聖之宗老子固欲治天下而張之意取數也少翕之意取數也多是猶執秋冬而廢春夏其於歲功乖矣然遂謂其秋冬之氣非四時並運之氣也則可乎故孔子不惟不絀老子且復嘆其道而師之後世儒者動舌則絀老子然其於性命之道莽如也是當為純孔子徒否耶夫純孔之徒已不可多覯借後之世有純老之徒焉雖與之遊而咨之可矣况夫有得於性命之道而不為老之純者謂不可因其遺文以得其人之世也斯不亦過乎貞白先生陶𢎞景生於齊末少讀仙籙敻焉有志然猶貫聯於周孔之教研精於金石之奧憮然以濟天下拯蒼生為念仕於亂世優遊卒歲而未嘗遽藏年及四十神靈知幾乃始挂冠神武門外遁去時既以隱居自號茅嶺自終而猶有敖散談空之慨與奪紛紜之悲則又未嘗不心在當時而隱惻於含靈也恭雖翕之意多而亦與丈人荷蕢之儔異矣至其耆年遷化屈伸如常而顔色不改此非性命既全離合在手所謂死而不亡者歟是其宗雖逺出於老子吾不謂其純老之徒者也嘗讀其傳思覩其人以為後世儒者或不及求其遺文閲之迄不可得虔吏部黃君大雅博物搜求竒藻得其文集寫本於吳郡黃勉之勉之欲梓未及餘十年吏部君因復校緝屬蕭氏刻之而以序見命直始得覽閲其指發元旨則略具於答朝士大夫一書當時序者欽其博綜咸方之劉向馬融之徒是議其毛甲而遺其膚肉其於神髓大相萬矣余因推廣其道爰達於孔老遂以復吏部君碩輔寶鑑序儒者稱大人之學豈虛語哉孟子云萬物皆備於我既曰備我則天地民物通諸人心有痛癢焉其大者固然也而君相者所以行其大之具而制與文乃所以行大之迹而大弗在是也是故得其痛癢之固然者以立大之本而出制與文則可以裁成輔相左右斯民夫是之謂大人之學繇載籍以來若古臯益之徒大者著矣而尤詳於伊尹之事尹始一耒夫耳非其道義雖千駟一介不以自滑如其道義雖五就桀湯不以自嫌弗自滑故忘利不自嫌故忘名利與名既交忘矣則尹何心哉心乎堯舜君民而已矣夫尹心乎堯舜君民故君不堯舜若撻之市民不被堯舜之澤若已推而溝之尹之負痛癢甚矣尹能一日已乎故尹之道所以能佐時保衡格於皇天卒售其志蓋其大有本也是故尹者古今之相凖也山甫以後斯義無聞孔氏之徒闡發大學歸於知本可謂至矣而未嘗一試由秦逮宋閲嵗二千閲君凡百閲相凡幾百然皆不知所學之大豈天未欲續堯舜三代之治者與抑後之儒者暗於反本徒以其制與文者當之世君時宰望其籓垣悸而却焉故也而斯民一何罹於涸轍之久豈不悲哉余友耿在倫氏持御史符督南畿學日以大學迪士間托古今碩輔事要凡若干人編曰碩輔寶鑑附以讃述意勤而旨逺緘書數千里外屬為序題某何足以與此然俯仰數千年間未嘗不撫卷低回蓋繇山甫而上其道行繇山甫而下其事近耿子之意以為事近於道者當時君民尚食其福向使此諸君子皆志於大學而反其本其福斯世詎止是哉乃若時際道明之朝身事聖修之主贊平章而翊協和咸揆自瘝躬敷錫皇極俾天下士有不知反本而甘為葉言者則樵夫恥之罄伊尹之衷蹀臯益之輒償孔子孟軻之所未酬斯則萬世一時也宇宙一機也寧不重延頸於今日王氏內外篇序夫學得其本而後治得其要學不得其本而獨堂皇其言曰吾學在是吾治天下在是是猶舉亂絲不辨其緒其禍斯人必無救矣往荀况氏好論修身治世纚纚焉其言之也然而其待試之則以亂世王荆國自恬經術齗齗然語於君也然而其身試之則以殘民何以故荀氏迄不知性荆國主在法制固皆恣其習聞而自謬為實見也且夫登泰山者身履其全雖概言之而全者見其他得其一曲一隅往往詫為圖記以彰大之後乃有因圗記加圗記者足未嘗一涉而曰是真泰山也異時有躬履泰山者語以神霄之巔坐撫羣峰而籠簇八荒輒反彈射之謂非吾圗記所有則習聞者奪之也彼又烏知禍之所抵也哉是故君子非必得已也而言不可苟已豫邑王自齋先生生有操持既長聞東越之學曰是獨有本也遂私淑而學焉已而舉鄉籍得令揭陽以不諧上吏遂歸既老學益明觀於時務益審則慨然自幸曰此非一人一家事也乃不自已攄而成書其首篇曰靜談次篇曰法言而又有勢論及馭夷禦盜關治體者别見於文集中欲以示諸人人而逮來世豫獲讀之未嘗不三復三嘆也昔者成湯與孔子非所謂身履泰山者乎其於性咸槩言之曰惟皇降衷下民若有恆性曰成性存存道義之門夫衷與存存蓋言心也謂衷為性謂性之存存為道義之門則自古未有外心求性外性求道義者也故知性則能盡心盡心則天地萬物之理得故曰正其本萬事理雖治天下有餘地矣季世儒者非不見泰山然止得其一曲一隅而獨圖記之為詳後之專信圗記者則喁然曰理在物當物物而求之不揣其本而齊其末其流紛而無統執一而不可達而猶自信為圖記之真間有躬登泰山若東越一二君子則至今彈射之不已天下學士至於諱言本而甘守習聞之一偏則已非一日矣先生之學得之東越為多其曰性也者心之本體也又曰惟無物然後能物物無物見心物物見性斯則上與湯孔所槩言下與無欲為要廓然大公之旨如出一撰雖其內外篇中節目扶蘇殆數萬語然皆遡其本而出之絶不狃於舊聞之謬將令是篇示諸人人逮於來世皎然而明且行之胡不可也豫昔炙先生覩其方格凛若嚴師又性不喜辭華則其為言豈欲苟與窮愁著書文采表見者爭後先耶仲子一俞與豫同出羅文恭公門嘗手是篇屬邑大夫唐仁卿校之屬豫序之豫因題曰王氏內外篇而其他文則犂為王自齋先生文集而論敘於其首蓋益幸知本之舉必有明且行於世也先生名貞善字某自齋其號一俞字信卿今為吳川令衡廬精舍藏稿卷八
