body:
  text: 衡廬續稿卷九明胡直著墓志銘曲江蕭處士墓志銘豫昔為郎時同里蕭令尹永陵以謁選晤都中覩其人禔身靖飭詢知為曲江公子曲江公吾先子宿與也益起敬焉嗣聞令尹嘗典教常熟而從兄教授式並時教江隂相去僅百里迎養曲江往來二邑間嘗乘畫舫徜徉倡和遂成帙集適七旬士夫夫觴詠慶祝縉紳榮之豫亦嘆羡慨豫先子早世未逮也今年豫自蜀解文衡令尹以兄式所為曲江公事狀謁銘豫曰是世誼何可辭按狀公諱籌字充猷號曲江其先宋大理評事德寬公由吉水之螺陂徙居泰和之祿岡螺溪自大理而上逺有端緒九傳至誥封工部員外郎璁是為曾祖生尋甸太守公集號半菴生邑庠生絢絢生四子公其季也公少敏有巨人志以詩補邑庠弟子員天性淳懿不事華好平居務繼先志事父母善承顔色惟意欲為罔不殫心生事葬祭要不詭于禮奉母嚴孺人尤謹事伯叔父猶父也未嘗先以賢智訓子姪義方曰汝祖半菴公豈獨甲第顯乎其清白足傳也以故令尹與教授有聞時里人盜葬德升公墳側又侵大理公塋公毅然率子姓白于官竟抵其罪而墳無毁中年承詔例榮以冠服遂絶舉業行吟江滸之間意泊如也娶唐福黃氏繼沙隴胡氏咸守公家範男五人長曰崇即永陵附籍楚逺安以貢擢常熟鄰水教事升尹山東萃邑次崑邑庠生次嵿例受冠帶次巖幹蠱克家次嶪王府典腆俱黃生孫男七某曾孫男十一某曾孫女二距生成化丁未十二月初十卒嘉靖某年月日享年七十有九兹卜葬于本里丁山癸向之原葬之日六月十九之吉也嗚呼公可謂不怍世德而奕奕有貽榖矣于是乎銘銘曰承先不怍豈曰其贏貽後有榖豈曰其榮卜兆厥里曾孫伏臘咫步林林千秋萬嵗誰哉侵上林苑監署丞平溪王君墓志銘王君諱一覺字智卿號平溪蓋諱貞譽恥齊公仲子也用王父命後太僕卿諱貞吉修齊亦仲子少治易嘉靖乙卯補邑諸生戊午為太學生辛酉例授上林監署丞待次給假歸養嵗庚午部檄當行君不忍去八旬親留家食侍修齊公若干年乃後修齊公天年下世服闋萬厯辛巳始謁選都下今年六月上林苑署丞員缺將實授先二日暴病竟卒嗟乎始檄選而以親故不赴甫選而輒以疾奪且死其命也哉其命也哉君體癯若不勝衣然天性剛耿不設城府見者接容貌聆謦咳已覩見心腑矣既後修齊公生能養卒當大事無弗盡誠信而及恥齊公夫婦之卒葬亦無弗如事修齊公者王氏出後能兩盡子道謂僅見君上世塋為勢力者侵奪君奮發倒私槖協族人理之族之人數萬指莫不指目君服其首義其它周所識窶無為食鰥無為室者凡若而人廬陵太學生段某同舟疾疫從者莫能興君周旋其間不因人言自便卒亦亡恙識者髙之族里有爭君毅然指曰若直若曲若可若不迄無吐茹態以故善者悅其直即黠者無怨也豫雅遊修齊公公篤信古人之學君從父貞啓從弟一俞世其業而又皆善豫豫嘗辱挈登嫵姥講業虎鼻龍洞之間君聞有味乎其言退自感發恨得之晚告其族姻曰不學詎可踐斯人哉於是延知學士訓其二子必隆禮際腆餽餉故二子亦蒸蒸期上達衆誦君遺子以善不以金諒哉蓋君淵源先世又嘗從其族祖南巖大夫學而浸潤者非一晨夕故君之履以孝為根幹其趨義棄利如此咸非苟而已也君生嘉靖壬辰十一月卒萬厯癸未六月十五日年凡五十有二母梁氏封孺人前母龍氏周氏贈孺人本生母郭氏娶張氏水部玉屏公姪女子三萬昹邑庠生萬曈業舉皆有雋才所謂蒸蒸期上達者是也萬曜庶母出君方强仕即營夀藏於五十九都剛角之原逮今十餘年驗視之吉將以某月日厝君于斯而以南巖大夫狀來請銘銘曰彼其之子絶裾呈身曾不如君部檄臨門而留以親彼其之子持籌課利曾不如君倒槖靡時而急者義豈不悲哉臨銓告殞一命未歷孝實為之匪天攸抑旅囊既匱孤櫬蕭颯義實為之匪人攸厄爰悲爰繹貴弗以祿夀弗以世天定報覃有爚其嗣剛角之原以延萬祀楊母蕭孺人墓志銘楊母者楊仁叔母蕭氏諱曰重關出南溪故相尚約公之族父諱其陶號履素有行誼嘗出身濟公家事寓上都拾金索金主還之主剖金贈謝不顧已而受冠服所至稱長者取周氏生母母自童靜重勤女紅年十幾歸贈君贈君諱紹祖字善卿號慕雲故相楊文貞公六世孫以仲子義叔貴贈文林郎時大母王孺人孀居治家嚴密有法度母方稚弱輒能躬勤左右理中饋謹出納事事當大母意退餐􅀈糲服浣敝無難色大母憐之大母病母晝不安坐夜不寧寢手調藥餌食飲亦無倦既大母病愈而母疾作矣大母憐益劇藥餌食飲亦若母事大母然大母故禁巫至是百求禱掩涕呼天願留新婦已而母果愈乃竟以産難不復起大母哭幾絶月餘廢家平時憶思詔其子寅春曰爾不自樹曷慰我與而母地下哉言訖涕零零下母宿嗜蓮房忌祭輒辨以羞嗟嗟乎非母也誠孝曷以致之故中外莫不悼傷曰孝婦逝何遄耶時王貞穆先生倡學於家贈君為其甥嘗左右之豫得友貞穆遊於君習母事屬者仁叔遊子門泣請銘因托其大者為銘以傳母生嘉靖辛已月日歿嘉靖六月十四日得年二十有四男三長寅春即仁叔母所出也次寅秋即義叔第甲戌進士令東莞縣次寅冬女一適上舍生胡起鳴俱繼母蕭孺人出孫男六某某孫女六母葬清溪園某山某向銘曰為婦無曰幼而孝靡右為母無曰夭而𦙍孔厚需樂丘兮永臧衍千祀兮百昌誥封周母王夫人墓志銘夫人王氏諱某生吉水花園里右族上世徙自臨川世有顯人父二池翁某博物君子也早著聲邑庠間母丘孺人夢仙女導從被九珍服下臨卧內遂舉夫人夫人自童靜慧端莊方三嵗時王氏一夕罹巨盜䦨入獰甚㑹丘孺人病艱逺竄皇遽挈抱夫人匿舍傍委巷中幾不免矣忽覩兩紫衣人遮蔽寇不得見既去丘孺人以語翁翁曰異哉此女之祥曷不為丈夫子樹吾門耶稍長􅈺姆教勤女紅敏絶人翁為擇對適周簡肅公前熊夫人逝耳熟夫人賢聲懇翁特篤遂許配歸時方韶齒熊夫人已有子女各一咸稚夫人鞠若己出先是公在諌垣疏請復王新建伯爵忤㫖謫太倉判後移宿州夫人始從宦時公家故窶而操獨嚴夫人躬率績紡佐費常食脫粟半菽無不欣欣及行每見途市中餓殍必令家僮豫食飲或授之衣賴全活者衆既公參粵藩遷憲司副使遘諸寮婦宴㑹諸寮婦衣飾爛如夫人以布素列坐迄無自嫌意及公歷參政方伯俱在閩中夫人未嘗一歆艷閩物故公獨以官望著稱上下丁未公入覲尋升都察院右副都御史撫應天明年揔督兩廣都重鎮而夫人猶衣不完綵食不常珍自視不知有異庚戌公以三品滿封淑人是年轉刑部侍郎出掌南臺頃之為南冡宰改南兵書夫人禁約內外如曩時立二子膝下時訓之無乘時蹈機利溷若翁清德戕若家慶小子誡之未幾公以簡命為左都御史掌內臺是時廕臣席勢擅魁柄頥指諸大寮無弗應者然每有關說逮公公不為應廕臣􅋦公時時隂令人偵公短長為甘心地夫人聞益約束僮奴絶外交偵者連嵗竟不得隙於是廕臣父子咸嚴重公不敢以私奸朝臣望公若霜雪之獨有松筠也其賢者倚以自樹則夫人之助翊豫矣繼公二品上績晉封夫人自夫人之歸至是垂四十年篋中唯一鳳冠及被袍其它無希奇之服是嵗前室子守謁選為中軍都事夫人諭誨至於泣下明年守感疾不起夫人痛哭連數月不解少間則謂公曰守不祿妾不若携幼歸理家政便既歸歷數千里越百驛餽遺一無所受底舍鄰婦走女奴候訊㑹夫人仍被布素理庖事輒問夫人何在夫人曰固我也女奴不謂然而家人喻之乃縮頸咋舌曰甚哉夫人儉德固至是耶蓋是時郡邑風習稍變閨閫咸以璣翠綺縠競高而夫人獨守淡約無貴顯家氣聞者嘆曰是敬姜再覩矣一時閭閈侈風為之少息某嵗公薨于位夫人聞喪哭欲絶者數矣族婦勸為弱孤計乃稍近食飲已而訓其子宣時舉公生平與古人行事督令服習不則繼以聲色至宣納婦訓尤厲久乃授以家政性喜周貧有叩為倒槖恐後待中外昆弟子姪有恩庚辰冬夫人病偶作遂不藥病革執宣手訓曰若考宦中外四十餘年清德為朝野推高汝其勉承無貽九原戚言訖呼諸婦櫛髮甫畢端坐而逝時十一月十有六日也自其生𢎞治壬申某月日享年六十有九子二長即守中軍府經厯娶張氏次即宣太學生娶楊氏女二長適庠生羅思與守俱熊出幼適太學生李祖庚孫女一許聘庠生曾復亨夫人出也夫人生平閫模與公官針家範相伉儷終始如一日今宣卜以某年月日奉厝某山某向之原乃撰次夫人行事蒲伏百里外泣血請銘于豫豫往在都辱公知誨又其姻家中丞曾公豫篤友也恆語夫人懿德為里中內則欽風非一日矣不辭而為之銘曰翼翼簡肅握憲先朝有竊魁柄乳虎雛梟乃羿乃浞如沸如蜩公獨正色式是百寮如魯靈光巋立弗搖彼狂雖驇貌靡敢驕群彥倚公如倚嶽喬狂欲虺噬靡隙以招孰其翊司閨德孔昭偉偉夫人天植不佻勤朴且惠閭井世標甫傳而逝徽音則遙天胡埤之𦙍也秀翹我銘兹宅百世一朝尹蕭兩賢婦合厝墓志銘某年月日歐陽子將改二亡室之塋而合厝之因手其事狀授親友胡子委之志銘胡子曰是嘗聞豫師所稱兩賢婦者銘詎可謝耶兩賢婦其一尹孺人諱瑞蓮出灌塘名族初母劉有身父松岡先生夢巨人履空舁彩障張樂喧填降止其家就視絢爛金書有字曰尹氏瑞蓮已乃得孺人故名正德甲戌五月九日也年草歸歐陽子又九年為嘉靖辛丑十一月草一日以免乳卒年才二十有八孺人始至能期歐陽子貌榮名為姑執勤雖夜不休方未乳時㑹襄大父事劈畫督辦往往浹曙又喜浮屠法不肉食用是益耗憊臨絶泣曰吾憊矣死無憾獨憾弱孩纍吾姑子二伯宗符邑廪生娶胡氏仲宗翰國子生娶張中丞女生子念稼二女適京衛經厯王良鴻國子生王良懷孺人亡時歐陽子年未及壯卜繼室得蕭孺人蕭亦寧村著姓父時滔母羅氏以嘉靖丁亥六月草六日生孺人名曰秀蘭行曰六娘嵗癸卯歸歐陽子雖在冲年撫前室子絶慈御下不施鞭箠咸廩廩趨令方産女女死而身繼之其前子女號踊索母啼甚由是王姑蕭淑人姑康夫人咸酸楚痛之翁文莊公自撰文令猶子代為奠其言曰吾哀其賢而不永諒哉其賢矣夫歐陽子文雅為胡子􅀈曰尹性婉惠蕭敏給然咸仁孝儉勤為門內嗟思並長富室而咸恬簡素並有丈夫幹蠱才而咸無自擅之意痛矣吾兩得之而兩不吾偕今將合厝某山某向之原乃吾益思悲焉吾家自先公以下非子莫悉也子其表著吾二亡室事毋讓胡子于是系之辭曰豫師文莊公海內競相宗依恐後者也而兩孺人父之豫友歐陽子學道有文天下名賢相屬繩武于公者也兩孺人君之符翰二子嘗從豫豫稔其國器也兩孺人母之豈當時所夢金書之祥固在兹耶猗三娥兮儷德慰合窆兮與與過從慶生前兮遇同篤後祜兮靡窮萬有兮千嵗偉封鬛兮嶐嵸誥封賀母周宜人墓志銘曩豫交心泉賀大夫于官已而遘冢嗣學史君覩竒雋知象賢有自矣而其從父少龍憲伯則曰豫嫂氏周宜人乃亦有內則焉鳯陽賑饑之事此嫂氏畫也今食其德矣萬厯庚辰月日周宜人棄世去學史君卜某年月日奉宜人從大夫窆某山某向之原乃躬扣豫山樊手憲伯所狀行事屬之銘豫慨然曰不佞習宜人行事舊矣矧辱世講義無讓按宜人出林原右族父周長者某母某氏以某年月日産宜人自童端淑長者異之數謂所親曰是詎可嫓凡子賀大父莞溪翁聞乃遂為大夫委禽焉年十六歸賀氏大夫方業文辨髦生産家故匱宜人輒能勤女紅佐家費大夫舉甲午鄉書連上春官未第宜人始以親老祿仕諷謁選為鳯陽學正頃之鳯陽嵗大饑宫傍殍相枕生者竊相啖以苟活宜人聞之顰蹙而告大夫曰鳯民至是即寒官奈何可坐視乎于是謀易粟人粥之繼而粥者至數百人又至千人虞弗給乃盡鬻叉釧及别貸纍日夜所活至不可勝數至今鳯民歸德賀公乃不知贊決自宜人也三年大夫擢令太康退食從容諷曰側聞痛楚聲得無桁楊過乎願少寬之繇是大夫益省刑贖以賢聲著則又勸置側室張以廣嗣生子女鞠若己出自大夫宦遊一切家務屬弟而宜人亦以閫寄屬弟婦至妯娌姑姒咸能身下之常容人所不堪大夫欲均己産于弟力贊就之乃呼學史君諭曰非若母安能成吾志頃大夫自龍陽令遷守威州威逺在西徼外念二老親不忍行宜人勸曰君受寄邊城乃不肯窺左足動者知非以逺憚也意者為二老親然締觀二老親翔健善飯吾保任􅎵􅔱矧窺二老親肺腸戚君弗往往而得封章以償生平其視録録膝下不尤快乎大夫感其言涓日行又更為置側室王偕以往踰年大母病宜人偊旅床第間至厠牏或躬滌浹月餘蓋未嘗釋衣而寢安坐而食也深夜獨屏息稽首籲天請身代大母病革前宜人曰若賢孝乃爾願我它生為若婦如若事我今已矣聞者愴焉已而大父繼病宜人毣毣心相語曰夫不欲行我故强之乃有今日倣徨達旦以身禱于天曰是咎在我願隕我身貸我翁遲夫歸然大父竟弗起鄉族聞者為酸鼻曰賢孝賢孝大夫歸泣謝宜人曰微子吾罪戾難言矣亡何學史君登第初除溧水令取道迎養宜人輒訓飭曰廉明若世業也若欲為一身祿養孰與以一邑賢聲養矧若父故倦遊吾難獨往行矣勉之已而果以上最擢臺史乘傳按晉辭于家宜人泣送牽裾曰往聞繡衣使蒞吾邦盱衡間已若摧山嶽奚止菅蒯民命已哉願勿似之則又屬從者到部中申囑戒暴無輕用重典即我日坐邸第羞五鼎不啻也學史君服膺名大起乃即以才御史受簡督北畿學宜人又申囑戒無枉士如前語學史君繇是造士益力旋膺察舉為天下首冠隆慶庚辰上覃恩以夫階封宜人宜人既鳯冠霞帔珠燦珮鏘爛然榮也處妯娌間愈姁姁不勝衣適鄉閭旱荒宜人曰吾昔不忍于鳯民今寧忍于鄉之人乎乃出學史前後寄養百餘金悉令人買穀分濟里民負穀載道兢相呼曰宜人生我里有上觀橋圮久病涉漲則漂溺不支宜人倒槖金百餘鳩工橋之里人為樹石紀其事又橋螺岡田坊凡幾所一日郡宅火惡少乘劫空其帑藏已縶在官宜人弗豫者纍日曰是天災也乃竟貸惡少勿問平時見寒饑者必謀與衣食病與藥喪與槥有急稱貸與應貧不能償者無論子錢即母錢無問也晚乃取積劵可千金火之其素所自奉雖褐布粗糲恬如也病作諸婦慰曰冡君旦夜且至瞪目應曰無乃差使至耶己而果然人咸異之既逝距其生正德七年十二月十七日享年六十有六鄉族悲慟有哭至失聲者咸曰失賢母矣嗟乎此豈一食羔足致哉子三長一桂即學史君娶蕭氏宜人出次某某出夫宜人固羣然閨流也始未嘗事詩書然為孝至欲捐身為慈活可千餘人則視世之冠纓業詩書口仁義者乃未能以涔流潤澤尺寸者何其徑庭哉豈非其天性獨至者與矧曰襄其夫穀其子允有令名較論功德可不謂今之女儒乎哉銘曰大車之將孰云翊之副轄其那太溟之瀇孰云啓之開先者河鬱鬱宜人抱淑孔多孝腸繚結慈澤汪沱靈修天至靡事琢磨彼冕者儒慚莫肩何翊維夫子如車斯載載以令名啓維哲嗣如溟斯涵浴日化鵬禮閫師匠髙門鏡衡生生之德馨聞帝庭帝實眷之祚𦙍崇閎京丘合璧長發其榮亡妻蕭安人墓志銘安人蕭氏諱閏莊出邑茅園巷聮科里父碧池翁諱傑世系行誼語具豫所撰志銘中母鍾氏生安人敏慧絶出童時一日覩天門轟闢中有人冠衣偉煜翁聞異之嘗呵譙富人弗與㛰嘉靖癸已先員外郎晴岡贈君方為豫卜㛰而其友曾公璜劉公元語曰㛰莫踰蕭氏女已而聞諸邑大夫成都陳公邑博廣濟文公咸以屬翁遂委禽焉是冬先贈君背棄丙申豫解服乃僦負郭居畢㛰時豫㷀且窶先世無尺宅儋粟上有祖母蔡太孺人髙年母周太安人孀居下有兩弱弟靡為朝夕安人愕曰窘至是乎豫乃出授徒安人亦漸鬻諸奩具佐給俯仰而自啖者率半菽間出衣布應二弟束修癸卯豫舉于鄉連弗第往往糧絶至浹旬咸得安人脫簮始見突烟甲辰蔡太孺人卒安人手嫁時新衣為斂見者戄嘆生平嫺女紅節縮字畜有方繇是家稍起亦稍贖故田宅始還故義和滄洲里僅僅樹門户矣癸丑子仰祿教句曲丙辰登第官刑曹以三年考封安人于是安人兩從豫宦耳熟兩京國服飾繁麗未嘗從臾購一珍竒物方分宜甚盛居舍右晝夜輻輳請求如響安人亦未嘗一日强所不可蓋久諳豫朴拙知弗可强也豫少負不羈既長折節妄意古人之學安人初弗懌已而習之又嘗慕尚古文辭故豫雖凉劣一時門多偉夫名士車即舍中罄竭安人必力辦酒漿蔬饌俾豫得罄歡以上下古今為愈快知豫志意在也庚申豫出僉楚憲駐湖北安人侍太安人居衙舍尤能嚴扄鑰慎左右故豫得為所欲為無返顧知豫意有樹也豫既獨身赴蜀乞休復起宦楚粵先後十年安人家居夙夜纎嗇自喜凡豫所有廪祿帛繒咸舉以拓産葺居比癸酉冬豫為太安人再疏乞養歸視安人布素􅀈糲猶然句曲刑曹時四方縉紳青襟日見叩者充廬安人治具不皇寢食有昏暮至者輒輟己飯飯其從既終夜而枵腹者不知凡幾矣獨族戚百口莫不誦安人慈濟狀曰匱告必粟餒告必食以葬告必槥有急必應己豫訊之則曰吾習子夙懷久矣吾豈不亟承之嗟嗟豫謂安人之終不懌耶乃其知豫而翼之也類若是丁丑偕豫襄太安人事僅踰四年至辛巳之八月遘病九月八日即長逝矣遡其生丁丑閏十二月之九日得年六十有五嗚呼痛哉子一某邑庠士配西門張氏女一適某孫男四長士統聘江口陳氏次士紀聘永新環湖尹氏次士經聘本里羅步蕭氏次士綸聘廬陵敖城曠氏孫女二長聘栁溪陳𢡟㑹次聘原缺今順卜以壬午子月厝于吉水張渡下流之龍家邊申庚向即豫夀藏右方其卜兆始末詳吉水見臺曾公所為夀藏記中兹不述第述安人生平茹百艱與其韙行大者用詔後人蓋實録云銘曰􅗆􅗆乎挈青原蜿蜒而西也水則縈其下沄沄乎導白下浵涎而北也山則挹其右君歸休兮安以宥宜爾子孫兮祜孔厚故太學生陳芙野君墓志銘陳氏自先代歷明興以文學甲邑中然未有林林嶽嶽如尚寶先生盛也于時從子太學君斯一羣從斯道二三子咸以古文語潤色時義羽翼詞林而太學君尤工為左國體人讀之誠左國也時人稱曰珠林陳區一鳯二雛嗟乎盛哉太學君名參字斯一以髙祖正夫公從塔下徙芙塘遂取號曰芙野曾祖某俱未仕祖某以仲子尚寶昌積貴封禮部儀制司主事行誼著里閭父某號東洲翁始業舉後修封君業娶白氏獨生君君生而炯目方頦儀觀偉碩東洲翁竒之猶昔之竒尚寶而督課殷也撻之血其衣白孺人有憝辭君遽伏地請曰母無憝父增兒咎淬礪力百之已而從其族兄僉憲公某學尚書時尚寶冠壬午解試名大起臺司推轂唯所請意引君遊庠校君止曰參必自致身進取不則非夫後竟以文補弟子員君既優業舉沉酣左國復肆力莊列太史淮南擷英嘰馥鼓舞筆端邑令陳侯讀其卷驚曰是必嫺古文詞者非經生能並驟也自是為深知當此時君女弟夫尹大夫仲烈以宏詞魁江介次女弟夫歐陽文朝文質咸斌斌與君並宗匠尚寶若鼎峙然君屢弗舉僅僅補增廣生初尚寶念君諷從近例入太學君固不從己而尚寶忤柄家歸君適赴試逆諸南浦尚寶復理前語君勃然曰敢不唯叔父命明年秋遂隨部牒援例赴北雍行次臨清病作竟客死焉時嘉靖丙午七月日也訃聞鄉縉紳士痛惜之君天性與家法咸篤孝友翁嘗被訟君請代撻竟得直白孺人病癱君不去左右藥湯手上不就內寢者終母之身尚寶中危病君侍疾盡瘁一如侍母異時有傳柄家欲甘心尚寶追正潜歸之罪詔逮將及門矣君為尚寶分畫扶侍逆使者于途已而知出訛言而君之為義烈矣故君沒餘三十年尚寶言未嘗不􅐵噓沾裳也生平剛直面折人過是非廩廩難犯然好與賢已者為深分才識濟變有餘地乃竟短世未嘗試一割以殞豈不可重悼哉距其生正德乙丑十二月得年才四十有九元配王氏文端公裔也繼陂邊楊氏子三伯貞觀娶王氏繼東城楊氏仲貞頥娶陂山康氏季貞兑娶學後楊氏俱邑庠生女三長適龍太尹子某次王某子某俱母王出季適蕭太尹子某母楊出孫男六某某曾孫男五某某女二諸孤卜某年月日葬祔尚寶塋右首某趾某尹大夫狀君行謂君存缺侍文叔豫志而嘆曰允哉後有過車必且式于兩文先生墓矣銘曰符臣咳唾闢瓊圃手披琅樹列采璑庭階一枝赤英翹燕璧晉棘難並數風流阮咸豈足言勳業封胡期坐覩白虹紫氣空連牛三獻不得成珩瑀已矣埋光珠江頭竒種千嵗産琳璆處士蕭介齊翁偕配嚴孺人墓志銘嵗萬厯甲戌六月草四日里中蕭介齊處士逝里人悼焉越丙子七月十一日處士配嚴孺人逝里之族戚悼焉又明年為丁丑十二月之十四日諸孤奉處士偕孺人合葬龍門大坪山首坎趾離少子九韶手其外孫國學生楊應弼所為狀謁豫銘豫不得辭按豫里中望族蓋推先蕭氏蕭氏上世自吉水螺陂曰大理評事德寬始徙豫里之祿岡九世至本質婚豫胡氏生宜休公器用仕至廣東按察僉事子七仕者凡五第七子道軒公諱瀾獨未仕娶栁溪陳氏實生處士諱僖字國和介齊其别號云處士生質絶羣兒十嵗為文有驚人語既冠補博士弟子員㑹道軒公下世母寡家纍倥匆未久棄學而專修封君業然天性孝誠奉母昕夕定省嵗時燕喜終母之世翼翼愈愈如也每上觴退輒感思嚴父不得偕引滿飲痛至孺兒啼族故蕃輒聮屬倡建祠祀捐資先羣衆平日謹護遺書以誨諸子其少子頴則敕遣從豫聞正學力戒華縟訓飭不欲墮家聲自御粗糲而喜利濟嵗儉輒倒廩無難色邑中丈田議起荷推擇為都長輒秉公勤人不敢奸以私里人到今稱平若處士豈所謂盛世遺民者歟配孺人嚴氏諱明莊父敏齊諱悅母曰樊媪自幼靜重協婦儀處士少多交名士費匱率脫簮珥替助恐後其後資大起母則操儉茹淡紡績字畜無殊宿昔遇妯娌臧獲宗戚人人各厭其心處士素剛稜忌者阱械百出訟獄糾黴孺人既竭力內應又數數潜為之和解焉四被盜槖中裝盡去處士無問孺人亦靡有懟色晚相對益欣欣談者稱偕老匹休云翁生𢎞治壬戌六月初八日距其卒七十有三孺人生先翁一年辛酉三月初九日卒後翁二年蓋七十又六矣子四人長梧早卒娶萬安陳氏次材娶歐陽氏次森初娶康氏繼娶龍氏又次九韶邑庠生娶康氏女四人長適嚴沃夫次適庠生曾一桂次適羅重桂又次適故通政楊君載嗚孫男九人某某某某其幼孫原缺初通政君之講婚也翁嘗語孺人曰世非無貴乃楊君名德非凡貴人今來議婚復何言已而通政君婚五十日遽别甫一年寡乃忍死不二今十又五年矣自非處士暨孺人義方素篤其烏能致是哉銘曰奕奕祿岡簮緌世叢處士承廕靡榖而豐爰擬素封逴逴處士姱修維義孺人贊力內周以瘁繁祉孔儷峩峩龍門桂蘭合藏後千百祀幽閼攸光銘與俱長明故劉母張孺人祔冡子德藴秀才墓志銘曩五雲艮方劉生德藴者雪涕而告豫曰炫母以嘉靖甲子嵗逝今霜露已十餘改而卜兆弗一吉炫茹痛毒欲籲天靡從也頃侍家君陟赦原之岡矚其形勝僉曰吉將為母藏炫慚不能自見于世以報母于是又泣濕衣退以狀請曰得枉先生一言甚幸既二年為萬厯辛巳德藴復來徴言已負疴至嵗之仲冬月報德藴亦逝矣豫哭之慟曰德藴方為母卜兆乃遂從母逝耶癸未秋德藴父太學生鯉江君某以書抵豫曰將卜某月某日亡子祔母歸赦原之兆并得先生枉一言也尤幸豫曰嗟乎豫于德藴曷忍無言按德藴狀母張孺人諱順娥為橫塘太學生張名世女年十七歸鯉江君越九月姑方沒孺人哭泣治喪遇妯娌少長咸有禮又二姓故巨宗紈綺珠璣競華也而服御獨喜淡不從華㑹舅志齊翁某以上世故謫戌稽勾牽連羈官相去百里凡七易稔矣嵗辦轉餉未嘗日乏家族為頌以詩家故多僮奴間有非義之饋輒峻卻之鯉江君雅謂孺人有丈夫識是善翊我生子三長炫即德藴次某次某從襁褓母導之友愛嚴出入慎外交毋令臧獲以黷辭誘不者必呵禁之故三子咸從義方攻詩書屢遨藝有聲郡邑則閫內之教篤也女一嫁為某配孺人終以痰火得年才三十六族戚莫不悲之德藴之從豫也以丙子往來處豫精舍之同人齊計四年奮欲以學自荷瞿瞿汰其宿嗜性剛直不能詭隨人意為舉業必精求作者意㫖不襲故常凡從豫遊者昕夕履屩充户庭而德藴識度其傑出云豫亦竒德藴終可入道詎謂德藴竟舍豫輒先往嗟嗟自德藴往而豫孤矣德藴得年若干遊庠若干年既不得志又早世其命也夫祖即某受學安成劉獅泉先生為髙弟家世行誼見豫所撰墓志銘中父即某有才識德藴娶朱氏無嗣今以季弟次子某後之仲弟亦庠生娶東門朱氏生子幾季弟某娶橫塘張氏子幾次即出後德藴女一聘豫之第三孫士經嗟乎若張孺人與德藴母子相從一丘壠間同為地下遊豈亦生者之悲而逝者之慰與豫慟德藴不後鯉江君故并為銘云猗劉母之淑兮餉厥翁百里七冬翊彼夫子為孝孔隆猗劉生之慕兮奮厥躬植學績文爰冀顯親際命之窮膴膴赦原天畀其吉母子相從於鑠來葉榮光佳氣盤礴鬱葱處士執庵王公墓志銘處士王姓旦名于湛字執庵其號晉太傅導之苖裔南唐時繇金陵家泰和太學生叔可卜居西關之垇街六世祖子與國初徴聘不就與仲氏侍御子啓俱以文行名世高王父直少傅吏部尚書贈太保諡文端曾大父稹封中書舍人贈奉訓大夫後軍都督府經歷大父休生志號慎齊是為公父母蕭氏生伯兄升劉氏生公公幼警敏揆事多中慎齊翁最愛幸家政必咨嘗為翁爭論偃室竟得直而翁益竒重公及遘竒疾醫家見以為不可治翁􅘨甚夜夢有語云識真惟有段先生俄而覺蘧蘧然夢也厥明候門有段姓者至自言神醫公果愈公奉慎齊以孝稱伯兄升雅有調度公師事靡有失意初慎齊翁寢疾以至大故公侍病治喪一切如禮性最儉朴雖世祿後即一布袍服之屢嵗月無斁庭訓諸子孫純用此道其操執若不可拔故以執名其庵公接人恭睦族􅍦殷生平不毛舉人隂事居常有言夫人既不幸有不美吾從暴其短何心哉公産埒封君然逋責力不足者悉折劵示弗用素慎疾往往以經驗竒方藥人人以此德公誦義無閒言㑹外姑葬地未善發視繁蟻公手為除蟻而加綿帛如故其厚類此公美髯靣頳玉偉然丈夫絶肖先貴人素鮮疴人謂公當永年嘉靖丙午二月倐足不仁公計畫無可如何卻藥曰天之亡我我何藥為嚴命諸子擇日治服敦匠事立諸子訓榻下母墜先業時有南宫士李君日守者視公疾公笑曰恆言過半百非為夭余幸耳順即不諱已安之明年五月旁死魄正首丘距成化戊申十月初二懸弧凡五十有九載初配雲津大尹松筠劉公之子生三男長霄次霽又其次霈繼配凰岡蕭子先公卒五越月霄善貨殖娶某氏霽邑諸生授儒官娶某氏霈初仕留京庫大使至梧州府經厯娶某氏孫男女子蓋林林多未艾也孫淵渙等將以某年月日厝公于某山之原以公子壻詹事府主簿歐陽君狀來乞銘銘曰公生仕族而封君是業公承世祿而布袍自屑有類隱者公執儉約而施反近博公濟人藥而已固自卻有類達者吾何以知王氏之世昌哉翳其積厚而流故長康東沔先生偕配胡孺人合葬墓志銘豫邑嘉隆間有詩人康東沔先生諱恕字求仁其先匡氏至宋避太祖諱改康傳至伯瑀為泰和州學司書子克俊始家邑東至十四世仁安早卒妻陳氏以節著詔旌其閭今康氏城居者咸節婦後也先生髙王父宜順贈御史曽大父𢎞敬官至僉事大父文秀封評事父諱紀壬戌進士為南京大理左評事母王氏以乙卯如月之二日生先生方越十嵗大理公卒於官先生隨王孺人護柩歸窆是時家四壁立燬西鄰火出依外家村居者八年刻勵治經書與曽松山封公雙溪藩參均研席莫逆交然先生獨負竒質有敏才補學官弟子員遂以舉子業髙一時非其好也曰今士多自擅時義迄不知慕古此無異鏤脂烏能久故自為秀才輒博綜羣書作為古文詞歌吟搦管刻就竒藻坌涌蓋不屑近代亟欲方駕兩漢上書法王趙邑大夫臺山周公賔禮訓子􅀈等後擢進士有聲而先生以嘉靖壬午始舉於鄉已丑㑹試下第卒業南雍于時文名著公卿間涇野吕公整菴羅公雅稱其詩文逼古念菴羅公尤服其詩謂選蹀顔謝律頡頏髙岑乙未繼祖母羅孺人卒以眇身承重獨當大事無弗嫺於禮家貧食淡然喜姱修矜名檢居舍綰轂縣門不百武非公不曵履辛丑蹶南宫其妹壻朱芝山督學慨曰以公之才乃竟左一第豈命也夫力勸謁選授福建漳浦縣令漳浦届山海民雜蛇虺險且嚚甫下車㑹造户籍均賦役能力汰積弊以公平服四境訟絶干請篤意學校首尚行誼而亷慈溢閭閻間民議生爼豆之顧以直已忤直指使枉論罷歸今浦志云康公博學好古清介不阿未究厥施讀者謂實録云既歸翛然故儒生舊廬卑隘苦市喧力不逮徙山樊先是圃龍洲之上有别業乃攜子姓讀書其中臨池學書晚益工暇必挈羣從燕笑雖一豆觴盡歡又時引諸文士倡和若廣平郡守曽二潭中丞魯原二公不敏直歐陽生文朝至則未嘗不握手相羊樂而忘人間世也已乃鄒歐兩文莊公劉晴川先生招㑹青原雲津間輒命駕往往則相與究析羣疑曰吾乃今知學之尤樂所貴力行先耳生平手不釋卷虛已好善見人一字之勝輒揚不置口與廬陵吳澄塘君為文字深分詩歌力相埒出處亦符或謂二君子咸幾淵明風致而先生為勝云所著詩文稿若干卷配胡孺人出義和世族直從姑也外父樂善公以𢎞治丙辰三月之望生孺人孺人端嚴純明歸先生適窶輒解奩槖脫簮珥佐家無難色夙夜瞿瞿躬操作凡閫以內取裁輒片言決中外斬斬無敢佚家節者中饋蒸嘗多手辦賔從日填而內供必㫖且時故先生得肆力文學逌然無內顧憂者則贊助力殷矣蓋孺人繼室先生先室楊有子誼方五齡孺人褓撫不啻已出後乃得談悉督以學凛若嚴師焉事羅孺人誠敬踧踖羅稱於人也必曰賢孫婦處妯娌族屬閭里恩意咸隆篤晚益勤治生衣疏食糲迄不自德提撕子孫婦咸然先生以隆慶己巳十二月八日捐世甫一月而孺人亦以哀病不起蓋隆慶庚午正月十四日也長男誼娶桃源蕭氏繼南富王氏仲談娶冠朝鄧正郎孫女繼大岡郭氏俱邑庠生咸有文孫男六公望庠生娶二守李文溪女蚤卒公器娶太守曾二潭孫女公朝娶太守梁少嶽孫女公暉聘寺正王茶泉女公亮公寅女四一適庠生蕭九韶一適庠生聶挍一適庠生陳懋寀一適王悅臣曾孫男一雲翰女一適髙壠楊大經誼歿戊寅年而談又獨當大事以今萬厯甲申年十月二十九日合厝於觀音山靣卯之原屬銘直直憶捾髮時辱先生知與稔語孺人無以凡子遇今皓且録録靡能報稱銘豈敢謝銘曰逴維先生文雅天植髫能吐英千夫辟易顔謝古風髙岑近律如操龍囦西蕩東擊陽燧之精夜光之璧價大售艱竟宰巖邑近民政猷儒術緣飾才豐命儉名窮身抑返服龍洲世味滌如泛宅浮家藥欄花榭髙朋唱酬羣從絡繹一觴一詠與化無極先生之饗五栁足匹嫓也如翟內則孔翊後有式者必曰此明詩人之𤣥室佳氣鬱于子孫奕奕衡廬續稿卷九
