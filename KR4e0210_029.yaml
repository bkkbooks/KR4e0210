body:
  text: 衡廬精舍藏稿卷二十九明胡直撰雜著博辨上弟子問於胡先生曰孔子之亟稱博學也何哉胡先生曰博乎哉博乎哉知博者希也夫伏羲所謂聖非以結罟網立庖厨而稱也軒轅所為靈非以教熊羆推神策而擅也神農所為神非以察百藥斫耒耜而號也夏禹所為智非以製橇檋沉金匱而名也周公所謂才非以造指南立土圭而推也孔子所為至非以對羵羊識專車而謂也彼其所以聖所以靈所以神所以智所以才所以至則有歸也孔子教人以博學明也他日語多能則曰君子多乎哉不多也語多知則曰吾有知乎哉無知也語人以博而不自與博孔子非故也彼其所以學所以博則有歸也今夫人性一也故兔罝野人可與上聖同腹心才質殊也故巖廊上聖不得與匹夫爭技能是故大撓造甲子蒼頡立書契力牧著兵法羲和明日月胡曹製衣服奚仲作車輿禹專水土稷任稼穡夔樂夷禮契教陶刑皆終身不易其能能者非侈而不能者非詘也誠以才質殊而實用顓也其在後世若后羿之射王良之御師曠之音郢匠之斤各不易業非不欲易也以之易業則顛其藝大夫種之治國蠡不知也范蠡之治兵種不知也子房之運籌決勝淮隂之戰勝攻取玄齡之謀如晦之斷各不易用非不欲易也以之易用則顛其國昔者樊遲之在聖門請學稼曰吾不如老農請學圃曰吾不如老圃子入太廟每事問夫農圃之役太廟之事孔子且不能兼知况學者乎子思子曰雖聖人有不知不能此非獨才質殊也勢力弗兼也而後之儒者惑窮理之誤訓則謬悠其説曰一物不知儒者所耻夫既耻一物之不知也於是焉騖知所不能知騖能所不能能騖兼所不能兼辟之臨海算澌而欲以窮源登嶽辨枝而欲以探本非獨失其源本其疲天下後世不可竟也天文地理古之人有布算者要多出于偏長專家而君子難強焉世儒者曰聖人仰觀俯察吾何獨不然不知此觀察者非聖神弗能也故惟伏羲而後能仰俯觀察窮極象數吉凶與民同患不然者則一毛千里矣唐一行之厯法得之國清郭景純之地理受之錦囊陳圖南數學傳穆伯長以逮堯夫象學傳种放至范諤非獨受者弗可以強雖授之者亦弗以強之人而宋之蔡元定之徒必欲強知之強能之而又強兼之豈不左甚矣哉始元定以天文傳諸其子載諸書傳既自謂得之人莫有非者矣明興高皇帝軍中置表乃歷驗書傳天文之謬亟語羣臣改削蔡傳劄示天下學子無蹈其誤又嘗閲宋龎元英記元定與鄉人卜壠咸繆鄉人至作詩刺譏之然則元定之天文地理亦何殊於見夢中之蕉鹿而晝訟于官家者也夫夢蕉鹿非誣也然而以夢求則不可執而訟矣此奚獨元定哉參同契者漢魏伯陽所作火記之亞篇也雖假諸易卦而義實不貫不注可也晚宋儒者必為較釋而托諸鄒欣至令丹家者反譏其失天之為體也尤不可推測求也宋儒者或言如弓或言如蓋或言如磑或言如卵而皆未可知晚宋儒者必曰有天殼吾未知殼之外又孰物也亦孰從而覘知之也嗟乎宋儒者何其好博哉孔子曰知之為知之不知為不知是知也若宋儒則幾於不知為知矣雖然俾宋儒者誠知之則亦可謂博物而未可謂博學也當春秋已貴博其著者左史倚相子産叔向然三子者治國不倚于博漢臣博者稱司馬遷東方朔劉向揚雄方朔至能辨劫灰識畢方事涉竒晉臣博者稱束晳杜預郭璞張華華能識寶劒之氣明銅山之崩辨龍鮓之色審石鼓之扣記然石之異認海鳬之毛事浸竒唐臣博者稱虞世南段成式杜佑賈耽耽能兼曉隂陽象緯醫卜居相位時民有失牛者叩之馬上耽發笥推盤知牛所在有病蝨癓者即知龍水之為療又知枯井藏書事尤竒又有人主者石書輒乙其處又有曰讀書萬卷猶有今日至于辨食蘋之非藾蕭識跳脫之為腕釧之數君臣者可謂博矣然而以議道則荒以窮經則賊以制事則繞以修詞則靡曽何補於是非之實理亂之原莊生所謂駢於足者連無用之肉拇於手者樹無用之指此後儒者之為博也雖然使數君臣者誠用之則亦可謂博物而未可謂博學也夫水一也而臾兒易牙辨味淄澠陸鴻漸則能辨江水與南零水之殊一斛之中孰首孰尾乃李贊皇亦能之贊皇辨江表水與石城水咸不爽此皆為異然猶以口飲而别之也若鴻漸飲茶知為勞水所烹此尤為異耳之數子者之於物博矣然亦未可謂博學也漢真玄搜曹元理數人者咸稱名博達一日陳廣漢謂元理曰吾有米二囷忘其碩數子為吾會之元理以食箸十餘轉曰東囷七百四十九石有竒西囷六百九十七石有竒後果覆如其數已而元理復算廣漢資業甘蔗草五區應收一千五百卅六牧蹲鴟卅七畝應收六百七十三石後皆覆如其數又有用勾股法算南北極曰相去不踰八萬里又云東西南北相去二億三萬餘里自地至天半八極之數又云地去天八萬一千三百餘里又云日去地常八萬里之數子者之於物之於天地博矣然亦未可謂博學也博辨下曰夫子所稱博學豈異是與曰夫子所稱博學言無適非學也彼誦書考古博物洽聞特學一事耳而非言博學也子不聞夫子無行而不與二三子公明宣從于曾子無所不學知夫子之無不與公明宣之無不學則知博學矣語曰非禮勿視非禮勿聽非禮勿言非禮勿動曰出門如見大賔使民如承大祭曰居處恭執事敬與人忠曰君子無終食之間違仁造次必于是顛沛必于是曰言忠信行篤敬立則見其參于前在輿則見其倚于衡曰視思明聽思聰色思溫貌思恭言思忠事思敬疑思問忿思難見得思義學如是何其博也記曰素富貴行乎富貴素貧賤行乎貧賤素患難行乎患難素夷狄行乎夷狄曰立如齋坐如尸曰足容重手容恭目容端口容止顔容靜頭容直氣容肅立容德色容莊曰學之為父子焉學之為君臣焉學之為長幼焉學如是何其博也昔者子貢問於孔子曰賜倦於學矣請息事君子曰詩云溫恭朝夕執事有恪事君焉可息哉然則願息事親子曰詩云孝子不匱永錫爾類事親焉可息哉賜願息于妻子子曰刑于寡妻至于兄弟以御于家邦妻子焉可息哉賜願息于朋友子曰詩云朋友攸攝攝以威儀朋友焉可息哉賜願息耕子曰晝爾于茅宵爾索綯亟其乘屋其始播百榖耕焉可息哉然則賜無息乎曰望其壙臯如也嵮如也鬲如也子貢曰大哉死乎君子息焉夫以事親事君至于妻子朋友耕稼死而後已學如是何其博也若夫讀書考古博物洽聞特學一事耳而未可言博學也曰若是則夫子言博學足矣乃又教顔子曰博文約禮何也曰文者學之事也至不一者也故稱博莫非文也則莫不有吾心不可損益之靈則以行乎其間者禮是已禮至一者也故稱約苟不約禮則文失其則雖博而非學矣子知約之為博也而後知孔門博學旨歸也此不可不辨也曰若是則散之視聽言動者博文也存之勿非禮視聽言動者約禮也夫子示顔氏為仁之目其即博約之訓乎曰然曰約禮則約矣然而出門使民與執事之敬也居處之恭也與人之忠也終食與顛沛造次之仁也言行之忠信篤敬也視之明聽之聰色之溫貌之恭見得之義也富貴貧賤患難夷狄之行也父母之親君臣之義長幼之序也妻子之刑朋友之儀播穀之勤也亦若是乎其燦燦弗一也而亦謂約禮可乎曰子以謂是燦燦弗一者果自外至耶抑亦自中出根於人心者耶曰疇弗根心者矣曰子以為人心之燦燦弗一者必有宿貯分具候時位而出耶抑亦其靈則至一者無有宿貯分具隨時位而出耶曰疇弗出靈則至一者矣曰若是則謂非約禮可乎故曰苟不約禮則文失其則雖博而非學是故有是文則有是禮非文外禮內也博之文必約之禮非博先約後也子欲知禮乎請詢子之靈則明中上弟子曰學有至乎胡子曰有之靈則至也曰靈則奚謂曰堯舜之執中是也雖然子不求道心之微又烏識所謂中曰心一也曷為有人心道心之異曰心之宰性也而形氣宅焉是故心之動也宰于性不役于形氣是為道心道心故有者焉役于形氣不宰于性是為人心人心故無者焉道心則所謂人生而靜天之性是也人心則所謂感物而動性之欲是也曰曷以見微危之異曰道心者以其無為為之者也無為者其止若淵其行若雲子思所謂不睹不聞孟子所謂不學不慮是也微不亦甚乎以是知其故有向非故有則烏能微人心者以其有為為之者也有為則其動如波其行如驟抑詩所謂愧于屋漏孟氏所謂行不慊心是也危不亦甚乎以是知其故無向非故無則烏有危曰精一何居曰微哉道心弗以人心雜曰精弗以人心二曰一弗雜弗二則內無偏倚外無過不及中不在斯乎故曰允執厥中是故外執中語學非堯舜學旨也外道心語中非堯舜中旨也曰允執之中與未發之中同乎曰未發之中中也發而中節之和亦中也焉弗同與中庸之中同乎曰發而中節焉弗中庸亦焉弗同與易之天則書之皇極詩之帝則記之天理孔子之矩曽子之至善同乎曰焉弗同與約禮之禮同乎曰焉弗同然則世儒所稱至當同乎曰世儒所稱至當非不同也世儒睢睢焉索至當於物者非同也夫心盡則天下無逋性性盡則天下無逋理理盡則天下之物從之矣豈反假物哉而世儒者必曰一物而窮一理一理而求一當方其見一物一理也則雖有萬理萬當而弗之顧也方其守一理一當也則雖有非理非當而弗之恤也其去至當也朔越矣子弗觀慈母之為鞠乎時飢時飽時涼時燠時懌時咈時燥時浴時其寢處時其唲嘔時其衊作而溲溺之晨夕抑搔出入顧復慈母之愷施而曲中者豈索物而得哉彼其為處子也身不敢離閫閣口不敢齒兩髦雖有姆母焉詢鞠子然而鞠道靡不當者其天慈必至者性也故曰心誠求之雖不中不逺矣未有學養子而後嫁者也蓋言性也苟得諸性則雖億萬其感億萬其應億萬其當而億萬亦一也其疇能二曩所謂盤盂甕盎池沼淵谷江淮河海之日莫非在天之日之所括者是也故曰天下殊途而同歸一致而百慮性一之也雖然世儒區區特小當耳焉識大當既未識大當又焉知變當曰何謂大當曰古之為君者以和萬邦行海宇至鳥獸魚鱉咸若為大分以天下得人為先務而它未皇焉此大當也古之為臣以天下飢溺為已飢溺以君不堯舜一夫不獲為已辜而他未皇焉此大當也古之為子以悅志為善養以立身行道全生全歸為無忝而他弗皇此大當也古之為師以學不厭教不倦為分以得天下英才教育為樂而它未皇此大當也古之為士以仁義禮智根心生色睟面盎背四體不言而喻為所性之存而他未皇此大當也故古之儒務當其大當以該其小當雖有小弗當弗暇恤也今之儒務當其小當以拒其大當雖有大弗當弗暇問也審如世儒之論摘其小以刑其大則堯舜元聖鮮不為闕行湯武明王鮮不為逆節伊周鮮不為跋扈孔孟鮮不為遊説之數聖人者將被之以大不韙之名而不可辭而況其下乎嘗試觀之堯使二女降于一夫則姊妹之倫瀆以天下讓舜則宗廟之享易丹朱傲慢而不能化則穀子之效涼伯鯀圯族而不能辨則知人之哲矇堯且不得匹於時君世辟而又況其下乎然而堯之必為此者何也堯固以天下得人為大當而穀子則有命焉不可得而強也傳曰方寸之木可使高于岑樓語曰銖銖而稱至兩必差寸寸而度至丈必謬此世儒之為當也溺於小故也曰何謂變當曰子弗觀之雨暘水火天地且不能操其變也而何獨必于人古今大變聖人不能操而禦也久矣然一日一夕小變億萬不啻雨暘水火之不測聖人又烏能豫逆其倪豫射其形而懸定其當哉故曰易窮則變變則通通則久又曰其為道也屢遷變動不居周流六虛唯變所適不可為典要曰化而裁之存乎變推而行之存乎通當斯時也聖人曷當聖人亶知其當吾之道心雖億萬變而中常執矣聖人曷所將迎於其間哉天下非小物也死生出處非細故也而唐虞以禪夏殷以繼聖人非必欲異也唯其天微子以去箕子以奴比干以死伊尹以五就湯桀柳下惠援而止之而止聖人非必欲異也唯其仁孔子一身仕止久速非必欲異也唯其時易詩書禮春秋非必欲異也唯其經三王不相襲禮五帝不相沿樂非必欲異也唯其中且和忠質文也殊尚貢助徹也殊制校庠序也殊名楹足懸也殊器收冔冕也殊服養老則殊序又殊食聖人亦非必異也唯其用故聖人之道苟當於性則如耳目口鼻之無不相通也不假鑽磨四支百體之無不相為也不假告戒又焉用以懸定為世之儒者語養民則齗齗然曰必井田為當不知井田成而民骨腐久矣語任官則齗齗然曰必封建為當不知世祿之子淫劉以逞天子且不得時巡而易之矣齗齗然曰必肉刑為當不知末季之君一日而千百紂信不難矣齗齗然曰必明堂辟雍為當然而後世非不明堂辟雍也而未嘗底於治一深衣也而爭之數十世一桐杖也而議之數百言知汙尊古矣而不知杯斚之適于持也知章甫古矣而不知巾幘之良于服也知籩豆古矣而不知今之祖父之未嘗席于地也知篆𨽻古矣而不知今之君臣之未嘗嫺于書也刻刻然也鐫鐫然也懸定其小以豐蔀其大執一以距萬徇已以卻人矜好古之名而不怵于當務之實天下之事僨且去矣猶曰是符古禮是不符古禮縻時失日而不適於變不可通於天下之志不足以成天下之亹亹此世儒之為當也弗究于性弗由于道心弗靈弗則故也故曰世儒之去至當也朔越曰弟子聞之天下理一而分殊夫分殊故必先析精而不亂理一故必後合大而無餘今子示理一而已而未逮乎分殊吾恐仁而之墨義而之楊忠而之荀息信而之尾生執中而之子莫虛無而之老聃寂滅而之釋迦是何辭於無星之稱無寸之尺之為譏也曰世儒自以為得星寸矣然未有求星寸於所揆之物者也若求星寸於所揆之物則物未至而為之先卜境無窮而局以定畫非獨畫餅難以救餓膠柱難以奏瑟吾恐星寸不生于所揆之物而強所揆以求星寸雖白其巔不可得也孟子不曰權然後知輕重度然後知長短物皆然心為甚心者夫人之天權天度者也故有天權則有天星有天度則有天寸之星寸也孩提得之知愛其親知敬其長鄉人得之所敬在此所長在彼凡民得之冬日飲湯夏日飲水孝子得之小杖則受大杖則走時君得之大賢則師小賢則友君子得之親親仁民仁民愛物當其時也物不得先與也之星寸也堯舜得之而以揖讓湯武得之而以征誅伊尹得之而以放伐周公得之而以制作孔子得之而仕止久速各當其時羣聖得之以官天地以族萬物以儀日月以翕山川以儐鬼神以和四時以範圍之不過以曲成之不遺當其時也物不得先與也語其藏則渾渾則淵淵則空空一者不得不一非必合之而後一也語其放則斤斤則井井則睽睽殊者不得不殊非必析之而後殊也吾惟虞人之不理一也而奚虞分之不殊哉又寧先析之為殊後合之為一哉苟無分殊則不得謂理一無理一又孰為理之使分殊也何則理者吾心之燦燦者也以其至一理至不一者也非謂漫漶而靡所區分之為物也故曰親親之殺尊賢之等禮所生也此天權天度之所存也天星天寸之所出也荀氏曰兼陳萬物而中懸衡諸葛氏曰我心如稱則亦測而知其故矣若夫楊墨子莫荀息尾生老釋之偏則皆未聞盡心之學者也未始求諸天權天度者也又曷有天星天寸哉今世儒者乃自仇其心自違其性而索當於物非獨懵於星寸且并其稱尺棄之矣夫焉得當是故繇世儒之學而學焉是路天下也路而天下之趨之也蹇蹇爾矣繇世儒之當而當焉是棘天下也棘而天下之入之也戞戞爾矣然而天下猶然奔走鑽斸而不已者則浸漬之蔽深也堯舜之中旨不著于天下非一日矣悲乎明中下曰子之言盡心者謂人心乎道心乎曰孔孟之言人心也寡而言道心也多然則道心何以能當曰道心者性也性靈承于帝也靈故微微故辨辨故不入于過不及故能中而當當之不出于物也審矣曰世之人鮮不有靈性然而弗當焉者何哉曰性無弗當矣有弗當者非性罪也子不聞之浯溪之山有石鏡焉能照百里已而鑿之則不能見尋丈是人亂其天也四明之水有鑑湖焉能鑑鬚睂已而汩之則不能覩舟楫是物混其體也世之不能得當則人亂物混之為賊也所謂人心惟危者是也非性罪也世儒者仇心疑性而必欲索諸物是愈亂而愈混也且夫夜行者見寢石以為伏虎必引火而辨之當晝見石而猶曰求火則贅矣醉者見蹄涔以為濬瀆必攝衣而涉之既醒見涔而猶必攝衣焉則眩矣是心之靈何啻晝且醒也而儒者之必索諸物亦何異見晝石而求火當醒涔而攝衣者歟是愈贅而愈眩也離婁之目稱至明也而加以金玉則反昏師曠之耳稱至聰也而飾以珠琲則反聵世之儒者不自信其明與聰也而求加以金玉珠琲之為美是愈昏而愈聵也吾聞堯舜惟精惟一而中斯執矣而今也以不精不一求之文王不識不知而則斯順而今也以多知多識求之孔子無意必固我而矩斯不踰矣而今也以意必固我求之是愈求而愈離也何以然以其逺求不靈之物而近傷性靈也是亦物之相物而已其何則之可循而當之可得諸曰子言性之無弗當也則常人有諸曰有之吾請證以往事可知也昔者陳平宰肉而均于公讞獄而平此皆未始問學而能之可見常人有當者矣曰女婦有諸曰吾請證以近事可知也建文間有范氏婦者燕山衛卒儲福妻也福聞靖難兵起仰天哭曰吾雖賤卒義不忍負舊君竟不食死范氏齠年有姿奉姑特謹時哭其夫則走號於山谷中懼姑聞而痛也官有欲委禽者聞之不敢犯而范氏竟全其節焉又有牛氏者其夫龔天保嘉靖間景府護衛軍也天保病卒牛氏誓以偕死粒米不入者十有七日時有義之者爭捨槥以葬其夫一以先施言一以木美請婦泣語曰吾業已許先施者矣請必從之已而天保葬無乏事而婦始長絶夫范氏懼痛其姑牛氏誼取先施此亦謂至當非歟夫此二當者豈嘗窮索懸定而得哉彼所謂天性篤也是靈則也詩曰如彼飛蟲時亦弋獲此之謂也然得其一不得其二抑亦未聞盡心之學者也是故行之弗著習矣弗察日用而不能知故君子之道鮮也耿子謂胡子曰古之語至當者辟如索癢今之語至當者辟如訟鴈何謂索癢昔人有癢令其子索之三索而三弗中令其妻索之五索而五弗中也其人恚曰妻子肉我者而胡難我乃自引手一搔而癢絶何則癢者人之所自知者也自知自搔寧弗中耶是故求至當者求諸自知者而得之矣何言訟鴈昔人有覩鴈翔者將援弓射之曰獲則烹其弟爭曰舒鴈烹宜翔鴈燔宜競鬪而訟于社伯社伯請剖鴈烹燔半焉而索鴈則凌空逺矣世儒之求至當何異爭翔鴈之烹燔哉吾不知世之爭翔鴈之烹燔者將幾千百人幾千百載耶胡子以耿子之言語弟子曰惟自知者無爭曰然則學者奚所從入曰易繫不云復以自知又曰復小而辨于物夫自知則辨物而當自蔽則弗克辨物弗之當矣顔子有不善未嘗不知知之未嘗復行善自知也善復者也幾當矣乎小子亟學復無亟學當當乃入曰今之語良知者有當乎曰良知即覺也即靈承于帝者也良知而弗當則疇焉當雖然昔之覿良知者致之今之覿良知者玩之彼玩焉者辟諸子夜睹日於海雲之間輒跳躍呼曰日盡是矣然而未逮見晝日也又況日中天乎何者玩其端不求其全重內而輕外喜妙而遺則槩不知天權天度之所存天星天寸之所出騁于汪洋宅于苟簡而恣所如往出處取豫之間不得其當益令天下變色而疑性則委曰吾無它腸鮮不濵于琴張牧皮之徒此猶其高等也其下則多幾于妨人而病物荀氏所謂飲食賤儒非若人哉嘗試較之世儒懲二氏過焉者也其流執物理而疑心性今儒懲世儒過焉者也其流執心性而藐物則之二者蓋不知心性匪內也物則匪外也子思不云性之德也合外內之道也故時措之宜也是知當也此堯舜相傳中旨也孔徴上弟子曰弟子窺測靈則而知堯舜之執中文王之順則孔子之不踰距皆不越瞬盼而髣佛其都矣雖然孔子之身通乎上下學不知取衷孔子是猶操弓而不知正鵠之為的也運轂而不知周行之為趨也則學非其至矣夫世儒者亦豈不知孔子之為至哉其於孔子之學果有近乎胡子曰甚哉豈易言與夫世儒自以為戶籍孔子矣而不知自失其正貫也自以為爼豆仲尼矣而不知自違其主鬯也夫世儒自失正貫而違主鬯者非孔子高且逺也以孔子近在衣帶而世儒競索之道塗也今夫世之譜孔子之年者則曰孔子某年在魯某年在齊某年為中都宰某年為大司冦此特譜行迹耳而未足以得其年也惟孔子自名曰吾十有五而至於學至於七十從心所欲不踰距此則自譜其年者為獨真也世之譜孔子之宗者曰孔子之先宋之後也宋殷之裔也自微子五世至孔父嘉以孔為氏此特譜世系耳而未足以得其宗也惟孔子自名曰文王既沒文不在兹乎此則自譜其宗者為獨真也譜孔子之聰明者曰孔子辨羵羊專車識長人楛矢測釐廟之災别五土之性預知商羊萍實之應大夫諸侯有問專對若轉輪焉而不窮也此特譜孔子聞識耳而孔子不貴也孔子蓋曰君子多乎哉不多也又曰吾有知乎哉無知也已而自名曰我非生而知之也好古敏以求之者也又曰其為人也發憤忘食樂以忘憂不知老之將至云爾又曰若聖與仁則吾豈敢抑為之不厭誨人不倦則可謂云爾已矣此則孔子自譜其所為聰明者為獨真也譜孔子之形體者曰孔子身長九尺六寸月角日準龍顙河目有聖人之表又曰其頂似唐堯其顙似虞舜其項類臯陶其肩類子産自腰以下不及禹者三寸特譜其形似耳而其神不存也唯門人曰子溫而厲威而不猛恭而安而曽子之告門人曰江漢以濯之秋陽以暴之皓皓乎不可尚已此則譜孔子形性為獨真也夫世之譜孔子者非不高且逺也然而不如孔子之自名與曽子之所名者何哉誠以孔子與門人近取諸身而不在物也夫孔子之學果高且逺也則亦敦愈其自名與當時門人名之之為真也今也欲戶籍而爼豆之乃猥以已意而競索物理之表是何異于適京而禺轅引盼泰山而流沙其車也其不得為孔子正貫主鬯者則儒者自逺也豈孔子高且逺哉故亦不易言也曰孔子志何學也曰古者十五而入大學大學者即習乎古大人之學所謂在明明德在親民在止至善者是也凡十五入大學者未必能志學唯孔子十五即志于學焉所謂志即孔子所自言發憤忘食者是也非曰其心嚮慕之而已也曰發憤何與于明德親民止至善哉曰明德者人心有本明即朱子所謂本體之明是也此本體者以為君為仁德也以為臣為敬德也以為子為孝德也以為父為慈德也以交于國人為信德也是謂明德憤之義從心從賁賁即明也唯孔子發之不以氣昏不以欲蔽於仁敬孝慈信而不失其體也故曰在明明德於為君而仁以治民也為臣而敬以事君也為子而孝以事父也為父而慈以育子也為國人而信以相交也而皆不失其體也故曰在親民於為君而止於仁也為臣而止於敬也為子而止於孝也為父而止於慈也為國人交而止於信也而所謂不失其體者無不用極也故曰在止於至善凡皆啓於一念之賁一發憤之功故發憤即為孔子明明德親民止至善之學他人非不憤也而或作焉輟焉者多也孔子發憤則至於忘食可見孔子之志于學焉者與他異也故曰吾十有五而志於學曰三十而立何也曰孔子自十五而志大學其始志用力也不能無乍興乍仆乍明乍昏之病已而用力至十又五年然後此體不為氣昏欲蔽隨地應用而屹然有立矣此體屹然有立始可言志立故曰三十而立是立也即大學知止有定顔子所立卓爾孟子有諸已之謂信是也學至於立則如作室者有基矣故程伯子曰志立而學半曰孔子既三十而立則世之得失利害弗之惑矣然又十年而後不惑何耶曰古之學者能外得失利害矣而或不能外死生能外死生矣而或不能外毁譽能外毁譽矣而天下之人情學術似是而非似非而是變易紛沓雖聞道或不能無惑也孔子既立又用力十年而後不惑故曰四十而不惑即大學所謂定靜安慮得他日孟子不動心同也五十而知天命何也曰維天之命而人得之為性性即人心本明者是也孔子既能明其本明者而至不惑又用力十年則窮理盡性以至於命矣既至命則自能知命辟如登泰山而居者自能周知泰山者也此知猶乾知大始之知知即主也方其立則立此命也不惑則可以至命至是則主宰天命而造化在我矣造化在我則非無窮通而窮亦通也非無治亂而亂亦治也非無死生古今而死亦生今亦古也即易所謂先天弗違中庸所謂達天德者是也故曰知天命曰若是則孔子之學與先儒所訓窮至物理者一何其徑庭也曰儒者必曰先知後行今如所訓十五而學三十而立則為先行四十不惑則為後知其與先知後行之訓又自悖矣儒者以窮至物理為入門所謂窮其當然與其所以然皆始學事也今訓不惑則謂知其所當然訓知天命則謂知其所以然是孔子以四五十之年乃得為始學之事則在學者為過早而在孔子為過晚矣不又悖之甚乎今操筆童子莫不曰吾性之仁知其為天之元吾性之禮知其為天之亨以此為知天命是操筆童子賢於仲尼逺矣其又可通乎曰然六十而耳順何也曰聞之師曰夫人聞善言而恱耳聞不善言而拂耳者常也此在賢者尤甚伯夷耳不聽惡聲未化故也孔子至六十聞惡言未嘗不謂惡然而無拂耳之纍以其無意必固我故也熟而化也故曰六十而耳順記曰雖聖人有所不知若謂聲入心通此恐未然七十而從心不踰矩何也曰矩即所謂止至善者亦即堯舜之中文王之帝則箕子之極是也吾所謂靈則所謂天權天度者是也孔子十五志學即志此矩自七十之前固未嘗踰矩但至七十而後能從心不踰矩夫從心不踰矩則一毫意必固我無有也孔子非所謂聖不可知者歟夫孔子所自名者乃情語也非曰以是為謙而誨人者也嗟夫今人自謂從事終身乃不能望孔子之立與不惑又況知命耳順從心不踰矩乎何者以今人不如孔子之志故也然則學孔子者其亦自審其志已乎若夫求之物理則益逺矣曰發憤忘食既聞命矣然則孔子惡賁何也曰孔子惡夫賁於外者也夫惟無意于外賁然後能發其內賁矣又何患不外賁哉曰樂以忘憂何也曰人心之體本樂也唯自昏蔽其體則恆多憂方其昏蔽雖飲食歌咢讀書考古頃暫適耳憂可免乎唯能自發其本明無一昏蔽則心得其體自無弗樂又何憂焉故憤無弗樂也樂乃為憤也孔子為人終身憤樂已耳故曰不知老之將至曰孔子之多識多聞逺絶常人而自謂君子不多又自謂無知孔子豈重遺聞見哉曰孔子非重遺聞見以其本不在也本者何真知是也孔子嘗曰蓋有不知而作之者我無是也多聞擇其善者而從之多見而識之知之次也是孔子所作必出於真知而非真知者非所作也夫真知者雖不假見聞而聞見自不違故為上也若專以多聞多見為事則不免探索影響而自牿其真者多矣故為次耳孔子上真知而次聞見者即大學知本之意旨也孔子豈遺聞見或曰何以見孔子之言真知也曰孔子曰知之為知之不知為不知是知也夫知之與不知者聞見逮不逮耳假令孔子專上聞見則逮者無論矣彼不逮者乃不以踈漏斥而槩曰是知也則所謂真知者可知也蓋天下莫明於不自昧而莫不明於自昧知之為知之不知為不知則可謂不自昧矣天下孰有真知過此者哉聞見雖有踈漏何患不能隨時位以自增耶此真知即所謂心之賁所謂明德所謂本體之明所謂覺者是也他日孔子與顔子之學曰有不善未嘗不知知之未嘗復行曾子曰毋自欺曰愼獨子思曰自明誠曰內省不疚皆以明真知也舍真知而曰孔門之學蔽耶支耶曰孔門之學之出於真知也審矣真知之性生也亦審矣孔子何乃曰我非生而知之者好古敏以求之者也曰史稱伏羲生而神靈黃帝生而徇齊孟子稱堯舜性之此必其天性靈覺自少至老而無纎毫之雜且二也故曰生知孔子豈其初亦微有雜且二耶故自曰非生知觀其十五始志學至三十而後立則孔子為學知者明矣夫古未嘗言學也堯舜亦未言學而實發其旨孔子之好古敏求正從事堯舜精一執中之學也精則不雜一則不二孔子自既立至不惑則不雜不二而執厥中矣從心不踰矩則不執中自無不中也至是則孔子雖學知而實與生知者等焉是故優入聖域直同伏羲堯舜以逮文王而他聖不逮矣夫古莫古於堯舜精一之學今世儒者每言古則止以考古者當之何其淺也又或以是為孔子謙已誨人之辭若是則孔子且以知之為不知亦異乎所謂真知者矣是皆不信真知故終不識孔子孔子曰若聖與仁則吾豈敢聖與仁有異乎曰仁者聖之事也聖者仁之極也一也何謂仁曰孔孟詔之矣孔子曰仁者人也人生之謂也孟子曰仁人心也心覺之謂也唯生而覺通乎民物察乎天地無不惻怛是乃仁之全體仁雖自孔門發之然在唐堯克明峻德以親九族至協和萬邦鳥獸魚鱉咸若則仁之全體著全功僃矣二帝三王君臣上下所為民物造命天地立心者疇非仁也特未明言之至孔子始言仁可見孔子直接堯舜以來學脈暨吾儒與二氏異者在此仁耳若夫中心安仁極而化之則聖矣當時必有以聖與仁稱孔子者故孔子辭曰若聖與仁則吾豈敢已而曰抑為之不厭誨人不倦則可謂云爾已矣乃知孔子非仁聖弗學非仁聖弗教而其作聖則必自仁始異時大學自格物致知以至修齊治平中庸自致中和以至位育自至誠以至盡人物天地之性咸以譜仁也記曰仁之為器重為道逺語曰仁以為已任不亦重乎蓋為此也故孔子不以仁自居亦不以輕許人而其實則專以此為學亦專以為教今世學者語仁則悸而不敢學乃孳孳焉索之物理以為入門吾孔門無是也江漢以濯秋陽以暴至於皓皓莫尚則盡發此心之賁譬諸大明中天纎翳皆淨萬類畢照即所謂無意必固我從心不踰矩者是也匪曽子疇能傳神曰孔子以上猶有武周二聖然但言文王既沒文不在兹何也曰是非承學能盡知也雖然孔子專言文王豈無謂哉嘗讀詩窺文王之學矣詩既稱文王刑寡妻惠宗公譽髦斯士綱紀四方以至過阮伐崇求寧觀成無思不服其功業丕顯矣而其德之當帝心者則唯曰不大聲色不長夏革不識不知順帝之則若此者可見文王之學不事知識而順帝則上同堯舜道心之微而執中下同孔子之不貴知能無意必固我心不踰矩古今若一轍耳後之頌者又括而言之曰於乎不顯文王之德之純異時子思又括而明之曰此文王之所以為文也楊雄亦曰仲尼嘗潛心文王矣達之然則孔子所以為專言文王者非出此歟於乎此以俟文王孔子可也曰門人稱孔子溫而厲威而不猛恭而安鄉黨一篇極言孔子泛應曲中孟子稱仕止久速各當其可者豈皆所謂不踰矩者歟曰矩則是矣然非在外也夫人心未能忘意必則雖能輯柔其顔未有得其安者也雖能比擬安排于外未有曲中而當可者也唯孔子發憤至於皓皓則無意必于恭而恭自無不安無意必于應而應自無不中無意必於仕止久速而仕止久速自無不可人見孔子無不安無不中無不可而不知實皓皓無意必者為之故皓皓無意必即矩也是矩無不內也亦無不外也故曰君子所性仁義禮智根於心其生色也睟然又曰動容周旋中禮者盛德之至也而非輯柔比擬之可得也彼世之學者不知求孔子於此乃愈以意必求之而不知其愈不得也然則十五年學恭而安不成與夫執鄉黨一篇為畫出聖人者亦無異其愈求而愈不得也曰衆言淆亂折諸聖衆聖遼邈徵諸孔子今子以孔子之言明孔子之學亦可謂至詳矣曽有一於物理之訓乎然則世之儒者户籍孔門爼豆仲尼一何其自背也曰此吾所謂索之道塗者也嗟乎吾無徵焉徵諸孔子吾無學焉學諸孔子曰久矣世之欺孔子也曰子無欺其靈則斯無欺孔子矣徵孔子曰孔子進以禮退以義然乃皇皇乎車不維席不溫若求亡子於道路者何哉曰是乃仁也今夫人自形氣觀則一身重次及家族自宰形氣者觀則民物天地皆吾大一身也是故天地吾頭足君親吾心腑家族吾腹脅民庶吾四肢羣物吾毛甲是孰宰之哉即所謂生而覺者仁是也唯生而覺則此大一身者理而不痺矣苟天地不得理焉則頭足痺君親不得理焉則心腑痺家族不得理焉則腹脅痺民庶羣物不得理焉則四肢毛甲痺孔子之時豈獨頭足心腑痺也乎哉使孔子而無覺則已孔子先覺者夫惡能木木然不疾痛求理也孔子曰天下無道某不與易也而誰與易之故曰是乃仁也曰仁者吾性之一也孔子專為仁何耶曰程伯子曰仁者渾然與物同體義禮智信皆仁也此非識仁者不能知曰若是則孔子所以為仁即盡性是也子言吾儒與二氏有盡與不盡之異則仁與不仁是也曰然孔門言仁詳矣其曰甚於水火曰當仁不讓於師曰君子去仁惡乎成名君子無終食之間違仁造次顛沛必于是為仁若是急也又曰我欲仁斯仁至曰有能一日用其力于仁矣乎我未見力不足者為仁若是近也而記者曰罕言何哉曰記者各以見之所近筆之意其誤耶抑陋夫孔門以仁為學故各以仁問而答之各不同何也曰是因材之教也雖然語不同而旨同曰出門如賔使民如祭不欲勿施曰訒言曰恭忠敬皆所謂非禮勿視聽言動者也而皆不外存心曰克已復禮為仁何也曰自漢儒以勝私訓即子夏戰勝之意然嘗疑夫子告顔子或不然且克已由已一語而頓分二義殊未愜載觀下文孔子止言復禮之目更無克已之文乃知二已當為一義克能也孔子正言能於已而復禮則為仁矣能已即與由已應蓋為仁功在復禮而復禮在由已夫復禮何與於為仁哉人心莫不有靈則焉有靈則則無不理無不理則無不生生者矣禮也者理也靈則著也合內外而莫非生生者也故復禮則為仁復禮為仁則天下皆在已生生中矣故曰天下歸仁程伯子曰仁者以天地萬物為一體莫非已也嗟乎明矣今人不能復禮不能天下歸仁者良由不知天地萬物之莫非已而異視之不知禮之本無內外而獨以器數節儀者當之不求其本而專事其文界限日嚴藩籬日增生生之道反以痺焉孔子既曰復禮為仁然又曰人而不仁如禮何故仁一禮也禮一仁也非仁非禮又曷有乎天地萬物之得其理而生生者哉至哉禮乎大哉已乎禮本在已而復之亦由已天下歸仁亦取諸已而已矣天下歸仁取諸已則器數儀節特餘事耳故伯子又曰認得為已何所不至夫惟知伯子之認已然後知孔子之由已知伯子之何所不至然後知孔子之天下歸仁是可見孔子血脈堯舜者在是唯顔子能傳之唯程伯子達之彼言勝私者非不致力然而猶二之也曰非禮勿視聽言動何也曰此正言復禮之目也夫復禮非有所加也亦勿其非禮者而禮自復矣非禮者人心一有昏蔽而靈則忒焉弗得其理即為非禮故視而非靈則則非禮之視也聽而非靈則則非禮之聽也言動亦然夫盡視聽言動而皆出于靈則則所以應天下者無一事非禮而禮復矣天下有一不在已生生之中乎器數儀節非吾餘事乎此不由已而將誰由故顔子聞之曰請事斯語此知其由已而直為已任非顔子疇能之今之言非禮者亦止以器數儀節之失者當之此不知禮故不知仁也且如猝有邪色吾能逺之矣若倐焉而姦聲臨之吾不及掩耳又何以為非禮勿聽耶故勿之云者吾惟不昏蔽其靈則而常得理焉是謂之勿非禮故曰不外存心問出門如見大賔使民如承大祭曰存心問已所不欲勿施于人曰如心唯存斯能如唯如斯能盡唯盡心則亦天下歸仁矣曰世儒者曰賔祭之大者敬之大也則何如曰夫人一見大賔一承大祭則敬心肅然自生豈窮索而得哉誠以人心有本然之敬故也故孔子告仲弓欲其出門使民時皆如見大賔承大祭之心則無不敬可知矣非謂出門使民時恍然見一大賔承一大祭也若恍然有見有承則惑矣又安得謂之敬矧曰敬有小大不尤惑乎曰何以為敬曰存即敬也曰訒言與恭忠敬又何也曰無不存則無不敬曰若是則孔子之語仁亦詳矣亦嘗有一于物理之訓乎且夫樊遲之在聖門先儒謂其粗鄙近利其或不誣矣孔子乃不告以窮至物理以消其粗啓其鄙也乃遽告以居處執事與人之恭忠敬孔子不近于凌節之施乎又況異日屢問屢告咸弗逮物理焉以斯知物理之訓益無據矣不知先儒之窮物理胡不一窮于孔子之教而徒為是杜撰紛紛者何也曰此亦未易言也曰博文約禮何謂也曰吾于博辨見之矣曰請申諸曰昔吾業舉嘗從事先儒之訓矣然私竊疑之意者以博文為窮至物理矣然約禮之禮亦理也其亦在物乎若約禮為在物則人心竟無一理恐必不然此一疑也訓禮者唯曰節文曰儀則若使約禮者于節文於儀則一一而求之則又不得以言約矣此二疑也仁義禮智性也若禮為在物則性亦為在物仁義智皆當為在物矣孟子言仁義禮智我固有之又曰仁義禮智根於心謂禮為在物亦必不然此三疑也若以博文為窮諸物理以約禮為歸諸人心則理自理禮自禮內自內外自外既截然二假矣乃欲先博而析之於外後約而合之於內吾懼二假之不相為用也此四疑也豫有此四疑而無以自釋比得東越博約説而讀之粗若有明然似東越亦不免岐內外而觀之又以博文為約禮工夫則令始學者茫無入已而掩卷置之乃恍然若有契於孔子之旨孔子教顔子若曰夫今為學不必求之高堅前後也但日用事物變化云為皆吾心之文也而學之事在焉事至不一者也故曰博文是文也孰宰之哉莫非文也莫不有吾心不可損益之靈則以宰乎其間者禮是也而學之功在焉功至一者也故曰約禮有是文則有是禮非文外而禮內也博之文必約之禮非博先而約後也故博文為約禮之事約禮為博文之功顔子領此則知文不可違而禮不可已固無間可罷矣故欲罷而不能然不竭才終無以得竭才者盡吾力而為之諺謂獅子搏兔用全力者是也由是既竭吾才如有所立卓爾立也者言吾心之靈則卓然呈露不為事物所侵亂吾將以其至一而應天下之至不一無復髙堅前後之可惑矣此與孔子三十而立大學知止而後有定同可見其功力到也然顔子又自謂欲從末由非曰未達一間也夫如有所立則本無形象之可執雖欲從之而執之不可得矣蓋既無高堅前後之形則自不容有意必固我之私非顔子真得此體其疇能言之曰若是則禮之外不復有理約禮之外不復有窮理庶乎免于先儒兩假之失而亦不患於茫無入矣使孔顔復興子之言其不易夫曰吾安敢言不易吾又嘗求之孔子矣孔子言視聽言動之交於天地萬物者博文也非禮勿視聽言動者約禮也此其證昭昭乎又嘗證於孟子萬物皆僃於我博文也反身而誠約禮也此又不昭昭乎雖然孔子所言禮即記所言有本有文無內外者也而先儒也外之今儒也內之學者愼無以內外裂孔孟正脈哉曰顔子擇乎中庸得一善得無有類于窮至物理乎得無應一事而擇一中庸乎不然何以曰得一善也曰孔子之書具在未見有言物理者也孔門之學較著未聞有窮物理者也若曰應一事而擇一中庸則萬事而有萬中庸其可通乎況一事之中庸且與化而俱徂矣下文又何云期月守也豈以一事之中庸而期月守之乎必不然矣嘗觀孟子以伊尹夷惠孔子較言之其決擇則願學孔子之時中是非所謂擇中庸乎今如顔子始求諸高堅前後卒乃得夫子博約之訓而竭才焉是即擇中庸也得一善乃一于至善者是也夫子恆曰明善明善者明吾心之至善者也至善豈在物乎故又曰擇善然則至善之為中庸亦較然矣而謂為物理可得乎不遷怒不二過何謂也曰此顔子卓立以後事乃復禮實功夫人一怒則多為怒所遷以其心蔽而失其理也靈則忒故也唯顔子心不蔽而靈則著則雖未嘗不怒而亦不為怒所遷也夫遷怒者蔽之大者也顔子不獨不遷怒而又能不二過孔子嘗曰苟志于仁矣無惡也蓋人未志仁則有惡而已未可言過也唯志於仁則僅可免惡未能無過也顔子雖卓立然或不能無小蔽小未盡善即謂之過不二過正所謂有不善未嘗不知知之未嘗復行則知之著察亦何異太陽之中天而浮翳潛泯有不移晷而得之矣是顔子之改過改於其幾者也故孔子謂之庶幾謂之不逺復所謂復禮之實功不彰彰哉曰孔門學者多矣而對哀公舉弟子之好學唯顔子一人顔子之為好學唯此不遷不二則孔門之學不在物理也不尤彰彰哉曰然曰回也其心三月不違仁其餘日月至焉何也曰孔門以安仁為至唯顔子則有三月安仁之久故曰三月不違仁其餘則一月不違仁者有矣一日不違仁者有矣故曰日月至曰既謂心不違仁則心與仁有間矣此世儒所為疑心也曰子亦疑心非仁乎曰弟子驗之心之體仁也其有違仁者動於欲也非心本然也使心而非仁則一身之間且痿痺不貫矣即孩提何以能愛敬見孺子入井何以能惻隱見牛觳觫何以能不忍若是也世儒豈不知愛敬惻隱不忍之根于心然必謂心與仁二者則泥文執義之為過也亦自背甚矣曰子又不觀乎孔門不言事不違仁而言心不違仁益以是知外修者之逺於仁也况求諸物理乎回也其庶乎屢空何謂也曰孔子嘗曰吾有知乎哉無知也有鄙夫問於我空空如也我叩其兩端而竭焉蓋自言吾空空無所知惟叩夫人是非之兩端而盡言之舍此吾亦不能有所告也蓋孔子自得其本心不墮知識不牿聞見絶意必固我之私即謂之空空空空正見無知之意非曰如釋氏者偏於寂滅逃倫棄物者之比也自孔子以下唯顔子庶幾乎空空故曰回也其庶乎屢空屢空者即近道也今訓者特以其庶乎為一語謂其為近道以屢空又為一語謂其為空窶不獨乖孔子無知空空之本意即文義亦甚割裂不馴貫也大抵先儒以釋氏言空乃遂諱言空故其訓無知空空之義已稍戾至訓此章則大戾矣不知吾聖門言寂釋氏亦言寂吾聖門言虛釋氏亦言虛其幾微毫釐之間固自辨也又安得曲為諱忌而重乖經旨哉曰賜不受命而貨殖焉何也曰漢儒以子貢為貨殖集注因焉曰或者以子貢多學而識即為貨殖可見其不如顔子之空曰亦嘗疑貨殖非子貢事是義近也曰曾子三省其在一貫之前與曰然曰今之言一貫者以一理貫萬事如其一繩貫千百錢也其果然與曰一理敦在即所謂不二心是也以是不二心事君則止于敬事親則止于孝以是不二心應天下則無不止于至善故古人云一哉王心又曰貞夫一唯一則無不貫矣是一也豈若今人想像一理道以應天下之事乃自比于一線穿萬錢而繆謂一貫者何其相萬哉唯曽子獨知其故答門人曰忠恕而已矣忠中心恕如心夫人心至中而自如則可謂不二心矣其曰而已矣云者言忠恕之外無一也一之外無貫也先儒嘗憂有一而不能貫夫有一而不能貫則非一也且謂一為一事而謂貫又為一事是已自二之矣又烏覩所謂一貫者哉曽子異時稱夫子曰江漢以濯秋陽以暴皓皓乎不可尚已至于皓皓則一矣此得一者之言也故顔子既沒唯曽子獨傳大學得其宗也孔子與曽點者豈情與乎曰孔子而不為情與則孰為情與者曰孔子始問侍坐者曰如或知爾則何以哉蓋究其用也而點乃為之鼓瑟而慢對違衆而異撰矯然欲為暮春童冠之遊浴風詠歌之事殆與嬉遊者無别此豈足以用于世哉然而夫子情與之者不已過乎曰昔者舜飯糗茹草若將終身伊尹耕于有莘之野以樂堯舜之道咸若無意于天下者之為乃不知異時亮工格天之業則古今莫京焉此何以然程伯子曰仁者以天地萬物為一體又曰君子不以天地萬物撓已然後能了天地萬物嗚呼旨哉後之學者未始誠有天地萬物之心乃欲矻矻攘攘焉以行于天下措諸當時吾未見其不出于名與功也矧曰撓乎即若諸葛孔明其樹建非不瑰瑋亦終于方駕管樂爾已其於了天地萬物之心何如哉然吾聞孔明以靜為學而猶若是則其它憑才能意氣依倣古人以建事者其又何如哉此無他志卑而見局故也曽點所陳若已悠然有天地萬物一體之意又能不以天地萬物撓已故夫子不覺喟然嘆曰吾與點也夫子非與其即能為舜伊事業也以其志與見固已超聲利下事功而于了天地萬物之基本獨有在也其將與區區憑才能意氣建事者較然矣然點止于狂簡不能克念以入聖則固其自怠之失而非夫子之過與也雖然孔門三千惟曽子獨得其宗則點所為詔其子者亦必有在而未可以大杖事槩棄也吾景行孔門不敢于點也易不敢於與點也忽曰孔門自仲弓閔子騫南宫適數子咸亟稱之然而礱磨責望則浸加于子路子貢其不以子路剛果子貢頴達故耶曰然昔者夫子嘗誨由以知之道又告以知德者鮮蓋欲其從是以入室也異時問君子則告之修已以敬修已以安人安百姓此則揭典謨學庸大旨而盡發之至與以一貫啓曽子者無殊致而與告仲弓者若有加矣然子路似終未寤豈亦以前聞未行而終為纍者耶陸子曰子路結纓是甚次第蓋言子路雖未中道而其剛過人逺矣子貢之頴必有近似于顔子者故夫子有與回孰愈之問將啓其如回之潛心於內也而子貢不寤異時乃以屢空與億中者對言之而又不寤無言之誨其所以寤之者尤至矣而反有何述之疑故夫子不得已詰曰女以豫為多學而識者與蓋示其非多學也而子貢猶為兩可之對已而夫子明言曰非也豫一以貫之子貢乃終不能如曽子之唯以發聖人之藴異時猶判性天為二道又推夫子文章於性天之外何其岐也嗟呼頴如子貢乃反不得豈其以頴障耶然則孔門之不事多學不貴知識聞見也豈不諒哉雖然弟子築場三年子貢又獨居三年豫以為子貢獨居靜處加三年之久其所得又不可以常情竟矣今猶以常情語子貢者非也曰今先生已上徵孔子旁證顔曾授受心精源委根枝千載非遙較在目前洙泗若此末學如彼何為其然也聞之孔門弟子曾子子夏年最少至晚嵗各以其學為列國師惟曽子一貫自得發之大學知本其先以授子思逮於孟子遂失其傳子夏之學篤信聖人其言有始有卒意以末為聖人始事以本為聖人終事故傳其學者能遵聞見謹數器今著于記者可考矣彼漢儒訓詁繁增太史氏已譏曰儒者博而寡要彼儒者卒不知其與孔門徑庭而知本霄淵也嘗試究之為曽子之學者以由本達末為序為子夏之學者以遡流窮原為序遡流窮原者曩所謂臨海算澌而欲以尋源登嶽辨葉而欲以探本雖白其顛而不可得者也當子夏在聖門時夫子已詔之曰無為小人儒夫子夏豈若後世騖利小人哉所謂小儒是已孔子固已逆知有末學之卒為學纍矣雖然末學者流則猶止于遵聞見謹器數比于識其小者之倫未有主在物為理以為教也記禮者曰自中出根于心又曰無節于內者觀物弗之察蓋猶知根于心節于內之為主亦未有仇視其心而專求物理以為學也嘗試究之末學者流其在孔門比之門庭者也求物理者則直索之道途爾已曰乃今知之棄祖父而信衆子者匪一朝夕矣雖然先生指我靈則示我全全證諸父祖徵諸孔子大哉貫鬯未可以口舌承也願言請事以候百世衡廬精舍藏稿卷二十九
