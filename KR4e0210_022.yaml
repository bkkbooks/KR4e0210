body:
  text: 衡廬精舍藏稿卷二十二明胡直撰傳盛公小傳盛公者吳縣人也名昶天順間進士授監察御史以直諌謫羅江縣令為政廉明務興利寢害不誰撓吏畏而民信之時邑寇胡元昻嘯集稱叛昶著檄諭散其黨遂緝元惡平之不煩隻兵鄰邑德陽寇趙鐸者僭稱趙王所至屠戮攻成都官軍覆陷殺汪都司勢叵測羅江故無城昶令引水繞負縣田畫開四門市中各閉戶藏兵於內約炮響兵出又伏竒兵山隈陽示弱遣迎賊賊入市未半昶率義勇士開戶聞炮聲兵突出各橫截殺賊賊不相救山隈伏兵應聲夾攻殊死鬬賊大北斬獲不記數俘獲子女財物盡給其民邑賴以完父老泣曰向微盛公吾屬魚肉多矣肖其像今存初昶至邑衙後有廟神素妖左右以例請祀昶弗聽至夕有雞伏神前如釘置然昶曰神敢妖若此促毁之時前令張尚留至夜神夢張令求解張晨語昶昶弗允張夜夢如前張夢語神曰若何不自訴神曰前者乃鬼卒為耳盛公威靈何敢干也其為鬼神憚伏若此昶後升敘州守而去至今羅江民祀其像於寺嵗不廢云胡子曰余校士按羅江訪名宦誰氏署邑者報邑自創無名宦亦未有祠豫檄責之而學官導士民以盛公事狀上余覽之不置蓋為之斂容屬屬然而慕也盛公決策挫賊存無城之邑斯既以竒矣乃能使鬼神憚伏其威德此何以致哉夫行立則人知念動則神鑑然能矯于行者不能矯于念能逃人非者不能逃鬼譏若盛公事非其素念無頗不可矯而得也豈不亦至難乎余未暇考盛公始末粗傳其事將刻置祠中視吾黨士及吏茲土者得以覽鏡焉蕭丈人傳昔先太父謙齋府君布衣抱當時志方直八九嵗時屬望之固逺而直之姑丈人蕭晴川君一見與太父意合遂取而館穀之令從其族彥二岡先生學文先生語曰是子可教丈人輒欣欣解頥輒又屬先生教益篤先太父先君繼逝直昆弟俜俜疢疾唯丈人相弔問嘉靖癸卯直舉于鄉丈人迎之大噱生平難酒至是飲輒醉曰吾老矣無希于世吾獨念若祖父世修暗弗聞幸顯白有地耳久之直連落南宫不薦丈人欵接無倦或詆曰是將為不食泉矣丈人奮激大言曰焉有如此士而終不名世耶退朂直無溺古文辭病進士業丙辰直成進士而丈人已先期捐館矣隆慶改元直始從蜀臬解文柄歸始走哭丈人墓灑杯酒僅僅濡壠上草耳悲哉直去丈人二十年顛毛改矣自顧迂謭內無樹于身而外不能毗世不獨負丈人且負先太父直何以自償焉雖然以丈人之隱德沈行俾終不暴於世則直之罪戾益不貸矣乃為之托其事以傳其傳曰蕭丈人者諱川字胤仲號晴川居士邑南溪里人也性醇夷不為攢眉遇人無猜腸少事父巽菴公及繼母能得歡心兄卒遺二孤撫之尤恩賔客過從隨所有盡歡退居時時吟哦不休有紿之者後雖知其紿也無較意貸弗克償者無過督門無叱吒之聲僮奴逆節佯矯以好言謝過輒悠然不加挺事至遽委仗之出肺腑不記其嘗逆也丈人族系最逺自宫師尚約公以後纓緌文學士益彬彬稱盛丈人每見秀出者輒喜動眉睫嵗賔興族士捷者必先見夢兆無不驗故族人嵗視丈人夢卜進取丈人好形家學自以其學卜厝巽菴公埋葬之具咸已辦弗逮弟姪家故住武姥山下山竒勝有龍王洞虎鼻峯丈人嵗時尚羊其間曰吾歸骨此地足矣然竟未可阡卒年若干葬某山之原子三伯某季某先卒仲某世其家論曰蕭丈人之質行懿度休哉有古含哺之遺韻豈非煦育孝皇帝濊澤太平之盛民者與以視今之人如包瓦礫揉榛棘其疲佚安殆何其相萬也嗟哉今之人何不為丈人而為此又曰丈人田畝士耳其愛樂後雋何異世之寶璠璵育蘭芷者睢睢然覬望其成猶懼一日毁而萎也彼非有希于世豈亦其天性固然者耶向使丈人居位有力其於當世何如也余故詳著其事匪獨追感今昔已耳仙門先生小傳仙門先生始業舉輒工登等竟弗售乃改業奮曰吾豈復挾一經捐大旨鐫墨義求有司提衡哉乃精讀六經博觀羣書下逮稗官小説靡不窺治一帙則究骫骳是非善敗若擊目指掌乃釋以是作為文章無不當是非善敗者曰吾不為欵言矣讀史至盛帝哲臣事踔絶者輒作為傳贊以詔于其子伯元仁卿者曰是當倣是不當倣有王學諭者崑山人博物君子也一見大相引重至是而先生門徒履屩不啻百矣先生教人授經先行曰吾貴實不貴華始先生弱冠居約邑人弗知也鄉先達鄭令尹獨敬禮曰是吾老友竟後禮不輟嘉靖乙卯仁卿年十五侍先生館饒鄭令尹相見異之慰喜賦詩期許不淺鮮衆乃知鄭令尹有逺鑑云仙門者先生故里名也鄭令尹見輒呼仙門先生先生讓弗居則稱仙峯從門人號也鄭令尹沒先生乃敕仁卿從其子遊以明相報既去鄭令尹踰十霜語及未嘗不追慕嗟咨也先生治家恥纎然性勤約嵗督耕穫輒稍贏而性最好施豫其姻戚待先生舉火者至四五家嫁娶其女男者六七人而先生不歆其德人亦竟忘德之然先生猶多量出而配某孺人喜施益甚常時不較有無不設猜疑叩輒倒囊故閭左右感誦孺人澤彌殷也孺人初歸時見田不五畝數匱輒解叉簮資先生遊學既稍贏先生為父介菴翁上夀致客奉觴匜祝者不後縉紳家然其間多門下士覘知者曰孺人助不鮮哉生平薄視榮利忘情得失鄉人或以貴富詡也領之兢是與非也必立解之世珍膏壤巍甍綺服玉饌瓊榭仙葩姣童駿驃之以相聞也未嘗口之而獨嗜吟咏又喜間其賦詩有求間未得之慨人謂有淵明風既晚益任悃愊極其致則芚愚之為之左右也恬漠之為之酣飫也寥廓之為之行廬日月之為之燭照也羅浮潮海之為之琴瑟煙雲泉石之為之角抵意未厭也蓋其於世敻矣仁卿既長領鄉書浸知問學則獨敕曰學在實其辨在義利毋若近學者荏苒恣世譏耳其它與仁卿語者至多世咸莫得知仁卿自敘生平無外師父即師耳萬厯甲戌仁卿第進士令泰和禔身刻亷政教純用仁禮蔚為時冠而世莫不頌先生為教者豫且𢎞也已卯三年政成天子下玉書褒封如子官母為太孺人適先生暨太孺人偕年七􅐆人稱異數云先生姓唐名某字某潮之澄海縣人也胡子曰古抱珍之士逃棄塵鞅娛情泉石彼其於世豈崖然絶耶抑無所希而尚有貽耶今夫海人知其瀇漾無端涯也而不知出於河河之先又胎於星宿海其貽者逺也黃石鹿門始不欲以名姓落人耳然亟求子房孔明而授以其道者何哉彼其抱而珍者固可以立濟天下之具也故其所貽于當時之天下若響應然彼豈它有慕哉然彼挈所抱以貽人亦豈必人人授之苟得一人焉吾事畢矣甚哉一人之難遇也昔之遇于四方或遇于鄉遇于家總之皆以立濟當時之天下者雖然遇于家者則唯古賢其他鮮聞今仙門先生與仁卿令君蓋庶幾哉蓋庶幾哉墓表袁東山先生墓表昔先君抱道未試出授經於虔之雩都友其士何公廷仁黃公振之袁公育秀及育秀之從叔東山先生三公皆用學顯而先生獨隱於醫云先生子淳受學先君直幼隨侍為同學托館穀焉先生及今配王夫人視以兒子直嘗見虔人稱先生醫道能生死人四方求診視者戶外履常盈先生無論戚疏貴賤治之多不問謝貧不能購藥者則自與藥藥之無不早愈者時有竒症衆醫方縮手傍睨則必叩先生先生為之切脈一過曰是可治是不可治疑不能決者先生色恤恤焉而不皇食目睢睢焉而不皇寐必究其端崖投之往往亦愈嘗在逺鄉望見塗中人中暑死者遂停騎視之其目口血脈非人也獨其腹尚微溫曰是尚可生也因托宿二日治之竟愈訊之其人道􅀈飲水腹痛則伏地二日矣其槖資已為人倒去則又與之斗米遣之又嘗合丸製膏槩與病者絶不責償其終身未嘗倦也蓋先生少業舉已就一日感母病遂棄去學醫此其心發自仁孝非有所規而為之者故能用志不分業精而竒中又嘗居山中遇異人授以神術能呼召風霆役逐鬼疫者嘗為邑令及督府禱雨皆應已而雩都視他邑虔視他郡皆獨受有年之慶邑東五里有巨潭中窈黝俗謂有物每三年必沈其渡舟死者無算先生禱潭上旬日雷雨冥晦頽山頂石以實其潭夙患遂息直嘗視先生義重如山利薄如埃其几席置古經方書多至拂棟前植花藥穴小池種魚數百頭休暇非閲視方書則灌畦飼魚于于栩栩若不知有塵世事者故其精神旁達若此其皆有以非專術也先生名某字某嘗隱居東山故以為號先世君賢公自泰和來家雩傳幾世生端公領鄉薦教授蜀中封刑部主事先生大父也父慶雲公以貢為上杭司訓子淳第丙辰進士今為監察御史先生之始病也屬曰汝習諳青烏家其為我相厥宅兆已而郡守林公以官地某方畀侍御君覘之果勝遂以葬焉侍御君既得顯者為志銘復以墓道表委諸直直痛思先君與先生均未試今幸侍御君閎紹先生之德於先生之志當亦無憾矣又念直微時與侍御侍兩父如前日今皆忽忽髮漸斑不知何者為兩父酬其於述先生之遺行彌有感焉遂含涕撰所覩聞以表諸石處士屠宜菴先生配汪孺人合葬墓表余間閲今之縉紳士有能發言悃幅兢兢為約躬之行大率皆有所興發不然則其先世喜修者也余於同年中昕夕切劘若三四君子者試發其先世咸然而寧國屠子因得悉其祖宜菴翁行義習吾耳已而屠子祖母汪孺人以今年某月日卒則又過豫泣涕請曰昔者羲英先祖方盛年已能傾廩囷賑里中飢既匱竭即又剖資買粟伺有急多寡食之既又匱竭至自嚼草根木實不厭非直不厭也方食即又憮然語吾祖母汪孺人曰吾思某某家絶炊煙久將殍卧填壑也吾與若其奈之何而吾祖母汪孺人亦忍餓節蓄恣吾祖之為義日力先祖生醇厚自童至白不知有公門內行孝友外謙退好急人其天性使然又素諳青烏家為人相埋輒吉意未嘗責報至延禮名師教兩叔父逮羲英而汪孺人皆贊佐成先祖意然先祖初欲羲英等不隳落士者業非知榮祿位而趨之者今羲英乃得從朝仕末惜不及吾祖猶幸吾祖母汪孺人存今又背棄去矣羲英旦夜莫為心乃者家大人書來以今某年某月將合葬於先祖某山之兆誠得子一言表諸墓斯羲英之為愜顧不小余諾而退曰信哉屠子之賢有以也余因念古今之孕賢昌嗣皆自其隂善玄德隱惻天至當上帝生生之心以翁孺人所施則非獨今日將世世閎耀其衣德表于不可窮豈以余言足發者於是為次其言系之羲英舉進士為戶曹主事即余所稱屠子昕夕相切劘者是也曽秋潭先生墓表豫邑南月岡曽氏有砥行之士二其一已用子貴其一則秋潭先生是也先生之行余不暇細舉豫獨舉其大者三四事而槩可知也先生少為時文初試有司見有賄合者即怫然棄去關戶不出盡讀其家藏書遂卒志蓬虆而不自悔父東峰公晚官嶺表先生留侍已數年因自念曰大人適暮齡而不忘仕情吾兄弟過也力告公謝去公感其能養遂致以還先生率其昆弟竭力娛意凡八年而公歿一日江行感暴尸慘然命棺瘞之因嵗豫貧者棺至終其身而上所居文水溪決旱涸先生首倡鄉人建堤數里躬荷鍤畚跣行赤日歌笑以勸工方工之成而先生告終鄉人哭之曰不有曽公疇或稷我至於今而里得有秋者皆曰曽公惠也先生之行多矣若此三事者余嘗較諸今世之士其守人閽戶借譽賈寵者弗怪也而先生則寧謝去而不悔子弟之幸利席資溷其先聲者且有也而先生則寧善養以為安今官至上吏都侯邦者亦尊矣然能不殺人挺下暴虐取者即謂為難其有恩施於暴骸力竭於旱潦者十不可一二人也先生直布衣耳理亂不挂心是非不聒耳乃能為古良有司之事以此而觀彼其相去何如也嗟夫古之王者以六行教民行成而上則有族師閭胥書之鄉老鄉大夫獻之天子令內史二之於是進最於朝退憲於學而殁祭於社上之待者甚殷而下之所自待者其有所憑也矣自後世純用文辭不稽行誼故雖有賢望由夷行齊曽史者不得書於族閭焉况其他乎今先生之為此又孰為之書曰某行為孝友某行為任恤由前則無族閭鄉老內史之録由後則無殿最憲老祭享之榮上無所憑而下無所利而獨為之不已者是非所謂傑特之士乎哉先生名某字某自號秋潭逸人卒以嘉靖某年某月日年才六十有一子四人某某治進士業今以某年月日奉先生葬某里某之原見委為墓道表豫愧恧所言不能比於族師閭胥故為敘古今之慨俾鑱諸石用以答孝子之心南太僕少卿仁山劉公墓表酃縣仁山劉公卒於南太僕之官邸其南省寮大司馬以下涕洟而誄曰天不弔殱兹賢哉大事疇屬楚之薦紳自元相而下咨嗟以唁曰天不弔殱兹賢哉卿士誰則四方同志縉紳以下欷歔以嘆曰天不弔殱兹賢哉斯文疇依而孤時舉等則奔奉旅櫬歸卜某年月日葬公某山之原其宗督學劉公為狀其事其友少司空連江吳公為銘其壙時舉等以豫之友公不後二君子也遙請表其墓道而某之始聞訃也哭不置今而表公也奚暇愛言按狀稱公上世出永新劉楚公沆五世徙茶陵石陂又幾世徙中溪後割創酃縣遂稱酃縣人傳至諱崇者以禮經領貢授縣令不赴則公曽祖也崇生灝灝生一峯翁泰一峯翁以貢丞嘉善服除補合肥取孟氏母有淑行先是一峯翁夢鹿鳴于堂又徵鄰夢輒卜産竒已而公生警敏殊羣兒稍長習春秋尋改讀易邑令張某者試屬對含譏姍公對亦諷令令大驚改容器之十六補博士弟子員督學使者至試輒髙等癸卯舉鄉書時衡守德清蔡公有文名獨偉公而公名益著丙辰第進士當此時四方赴公車者類多名士公既喜交遊而四方士亦多縻公之謙而傾其誠公于是始折節叩聖賢之學從太僕何公遊退而究異同于友人羅惟德鄒敬甫耿在倫偕豫三四子而識者已覘公幹濟才乃除公南兵部武選主事歷職方員外郎車駕郎中時大司馬克齋李公始未相知已而熟公行事乃獨才公公嘗以徵料奉檄行江西湖廣間抵吉州謁羅文恭公北面而稟學焉曰此吾宿志也又之安成謁鄒文莊公參訂學旨然後渙然當於心曰道在是矣往復書問具見文恭集中公官留京幾四祀最莫逆連江吳公暇則偕之燕磯牛首間吟嘯若遺世然秩滿蒙恩贈封父母如其官尋得擢廣東僉事備兵南韶時南韶獞賊負固恣睢民習苦之公按部咨禍胎過在鹽禁而猾商遂鼓煽為亂激使然也公不謀衆乃單騎突入賊穴諭以吏禁之過今皆貸不兵計自新各獞賊始愕眙繼相感泣羅拜聽公約束不復亂山寇馬五陳倫盧本清等剽掠為患衆頗虞之公悉以計擒不戰而耘迄無蹀血兩廣總督南贛軍門兩吳公偕繡衣使者咸偉公代疏諸朝就陟南韶兵備副使仍理道務公感奮曰諸寇幸夷獨黠賊官祖政者智勇雙絶為羣冦雄長不殄戢之是翊於諸寇為暴者也乃陽為不問狀以懈其防密令祖政妻舅何某者圖之故泄其事於祖政馬夫口于是二賊生猜互相格殺部落死者幾六百人公曰事可舉矣乃上書督府題請大征分兵六哨夾進公督翁源哨追殺祖政於黃洞俘獲被虜男婦幾千數餘黨撫化不為窮治羣黎歡呼動地至今翁源與黃洞各省公像樹祠祀焉又以英德邉各賊巢相地增築外城鬱為巨障韶郡故有明經書院公為葺修羣諸生督之課延宿學者一二導以正學昕夕樂育雖兵旅劻勷中意藹如也公體故癯以是積勞感病遂惄然有歸志聞之兩臺兩臺與士民固留不可得乃為代請得旨暫還調理疾痊舉用尋以前功蒙欽賚者凡二公既歸敕家事勿關白棲迹祝融天臺間復構精舍于鴈峯之麓鑿石為洞嘗默坐其中中丞汝泉趙公問俗湖南造訪題曰龍鴈書屋公因稱龍鴈山樵云又嘗與同郡僉憲易公某南宮士危君某廖君某曾君某舉會相為切磨逺近興者頗衆丁卯偕廖君出逰太和山從止一僮遇意會處輒徘徊詠歌以寄獨往之意相繼撫楚臺若唐岩劉公幼溪陳公文川郜公疏薦靡不首公隆慶辛未省臺大臣以下應詔咸交口推公於是起補廣西副使分巡桂林道公聞報愀然曰吾仍病骨豈堪驅䇿擬疏乞罷而當事者力止之公不得已戒行會豫亦起畎畝從楚臬擢廣西藩參蓋與公同年同門又同治一道喜不自勝時古田甫平尤艱善後撫臺殷公獨信仗公凡一經公畫者輒抵掌稱善亟行恐後豫亦感公相得咸不忍夷其民也相與撰粵嶠俗諭以開其迷謬正其瀆亂獞民至今誦焉西粵靖江王府故貪殘自失勢不能制諸宗室諸宗室中多鷙悍好圉奪齊民挾持有司甚則趣入縣廨鎖吏莫敢訶又嘗手劍逐方面官走署邸以是益得氣不可孰何豫至會一宗室殯二尸當分司孔道豫入司輒紆徑非體而以謀諸公公乃創殯室郭外遣兵卒移其殯殯焉已而公與豫出則宗室子婦咸攀號且譁且詈時豫已追攝其姻戚撥置者施之桁楊而攀號者覩之始戢退不敢復譁自是凡宗室暴民者各司輒罪姻戚而西粵強宗掃迹矣兩臺聞之喜曰二君治強宗勝治獞矣時府江分憲員缺公兼署其事公以府江為兩廣襟喉而各獞憑險出沒戕殺官吏劫掠民商有年矣若不請兵大加刪戮則兩廣梗塞禍亂無已寧獨古田哉議上三院是之合疏題請大征會東廣缺海道副使吏部難其代遂就近以公調補職典夷市凡南夷賈舶貢艦極天下之珍希者萃焉前者雖名人猶有點公立法既蕳又請同藩司官共閲而夷人莫不欣其便服其公焉天子篤念邊臣加恩贈一峯翁如其官母為太恭人尋升公參政仍兼憲秩理海務公益殫心刻期清海氛巨冦林道乾朱良寶依據島嶼跳梁勢益熾而殷公時為督府公則時時為殷公畫策以是朱良寶就擒而林道乾遁海外餘黨解散他如增戰艦創縣治設參將諸所條畫殷公悉采納題請施行且寓書政府屬公為已代又以廣西府江征勦捷聞而撫臣郭公疏曰原任分巡桂林副使劉某倡議請兵鋭情討賊凡諸機宜悉有成畫尤宜優敘為用事者勸於是吏部采兩省功最陟公南京太僕寺少卿蓋暫假優間託寄重大之意公至任得見峯王公明宇韓公為寮無不相契許公暇則追先哲歐陽公王陽明先生舊逰而公方新脫戎馬遨神散局足稱吏隱乃不謂公拜表入南都宿疾復發醫藥罔效竟考終太僕行臺之邸蓋萬厯乙亥之十月某日也距其生某年月日得年伍十有七當疾革時公自知不起索筆書貽時舉等唯孝友語略不及家南都知厚若少泉汪公合浮萬公坪石屠公巽川李公暨王韓二公咸為買棺視斂靡不周備亡何復以廣東功蒙恩升一級而公已不逮矣嗟乎豈不痛哉公孝友出天性教育異母弟不後其子至于與人交不設畛域開口若出肺肝有為出力罔恤其他而友誼之篤遂聞天下居鄉恂恂喜利濟睦宗敦故無問賢愚又多奬借後進口不臧否人以故人樂為親食其德者不鮮為諸生時受里人侮至入仕未嘗口之即加侮者服其量談學必先事功蓋亦曰不如見諸行事之深切著明也生平貌不勝衣至其憂國奉公有萬夫莫奪之勇而天下名賢矚望以為總文武憲萬邦者屈指必公孰謂公遽已矣則謂天之不吊非耶自豫取友海內大半多楚材而同官合舍久而彌親者則孰踰公往公從廣西别豫之東廣輒涕泗橫下曰吾安能舍子已而豫至東廣赴覲北首公又涕下曰豫安能舍子嗟嗟豫既與世違而所期在公今公也奈何先舍豫逝哉豫喪所期矣雖然豫不兩侍公于粵則安知公之碩畫偉伐若是詳也然則表公之墓則亦孰踰豫故為敘次行事最詳而不為讕言封監察御史朴菴張公配楊孺人合葬墓表自昔稱義俠貌榮名蓋獨推關中焉豫同年出關中者類多竒而豫嘗礱德礪業下上古今者則韓城張君最亡何張君以監司蒞豫郡豫歸自粵謁君君掔豫從容談兹兹有利濟當時之忱豫曰君其有自來耶君曰豫幸濡先大夫身訓耳已乃出豫友耿侍御所為朴菴公志銘求豫阡表意甚篤豫因嘆公始未有名位而利濟若是博也其古稱義俠非與按志公諱孟德字天與朴菴其號居韓少梁里之芝川為著姓曾王父樊大父幹父蓮配秦氏生公乃出後于從父摧公生而隆凖廣額炯目方頤聳眉修髯音吐洪鬯創見若神人少坐貧勉為僧然剛敏倜儻不以地局而氣蓋諸瑣瑣者矣奉所後母王氏難滫瀡遇腆饌不忍置筯因告主人挈以享母而自甘脫粟復乃得肆力農桑又得楊孺人操井臼冶蠶繭勤績紡揭揭畜畜始能充朝夕而伯仲氏故猶窶公為推食外內無難色伯氏子負貸不能償公惻然為鬻産代之償孝友蓋天性也又嘗為里中折豪暴者伏之里中以是推髙其義有爭輒來質平公為之排解措畫曲中人情至倒囊屈體不恤絶不為勢家利孔髙下其手以故訴者咸服雖至重辟有不之官府而之公之舍公一口裁罔經官府若奉成案莫復平反如是者凡數十事里中免破産隕命皆公惠也嵗乙卯張君舉于鄉有司例徴里中麥贍其家公重困里人亟令辭麥自後韓士薦者習其風卒不為韓人病繼舉進士授紹興府推官滿最貤封公文林郎顯里中矣顧嘗著短褐閲耕隴畝有時襲錦綺翺翔貴遊間又無縮朒態已而君晉為御史聲采大著人或以榮公公恬如也公卒之時適張君上御史考詔改封如子官而里人有哭同張君哀者其感深矣豫嘗見史稱郭解能解人紛關以西延頸願交然彼特有挾焉耳若公好義利濟其天植與故曰義俠然公始教君書則繇楊孺人夙夜督課每令君讀書紡車燈下而公之蒸蒸為義亦多出孺人贊佐力孺人故里中楊公諱某者女也不二年繼公卒可不謂存殁伉儷哉子三長某仲某季士佩即君今為江西按察司副使張君先後厝公偕孺人鎮北之原其生卒葬日語具今耿侍御及馬太史志中兹特載其行誼磊砢著者表之碑後張氏子孫得覽鏡云衡廬精舍藏稿卷二十二
