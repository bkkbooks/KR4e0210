body:
  text: 衡廬精舍藏稿巻二十明胡直撰書奉復念翁師某千里奔歸期决所疑并求鞭䇿然一瞻盛德之容一聆有道之言宏度虚襟蕩乎恢乎如覩蒼旻如遊溟海如乗條風而飲甘露不覺醉心又如貧子見富人之樂取不暇乞金而及以鉛鐵襍物傾而獻之者以縻於虚而移於大也即此一段吾師真得聖胎而不肖媿死矣連日與有訓文朝感誦求不負師門重托以仰報與人為善之盛心但自惟平日質駁習深雖稍見性命影響又坐氣浮不能深造總緣立志不貞築基不堅故也恐無以勝此仔肩虚靡一生將若之何復荷差使逺將鉅篇篤誨虚心不休一語何以承領何以承領而箋示又退若引躬俾不肖某益無以自容師門敎望若此不肖某若復不自痛癢不自勉憤真物也夫真物也夫嗣兹猶希吾師直指切責葢實不敢憒憒度日而尤自懼于内荏也乞師仁而植之龍谿指乍見孺子即堯舜心亦必以其無二念者言之也此處佇俟明請不復煩聒二昨差吏馳壽計以後期殊深疚於心當已至久矣數日間乃得吾師七月内手教知道體又少愆和恨未躬侍甚為悵瞻吾師杜門靜息何應復有忘病竊疑吾師每事覩記過詳雖出肫肫淵淵若不見其勞然耳目精氣無有用而不損者太史公引老氏精大用則竭之語似非虚漫陽明先生亦云發散是不得已此處在吾師亦自有天則而不肖某不能忘言以所天者在師真猶子之於親不容已也栁子厚所謂欲久存其道是已惟師教之然吾師完養深至尚有此在吾輩當何如哉此某所以臨境而思歸也不肖某近無他進惟見宦況如水而已歸興實有七八分矣三六月間差人回拜領教㫖且悉起居繼又於周經歴處承翰誨且示朝聞夕死與物無對不染順應之實令人快慰警發何可言也此所謂後死者與於斯文天其專屬吾夫子乎某號名學問歴年種種有請證者然生平色念最溺每自考謂色取行違良以此念不時竊發剚吾腹中圮吾德業未能自信至近月妄謂按伏此箇葛藤似斷其餘亦覺稍易頗有自信之意比得耿侍御寄到吾師文集一部内閱與蔣道林公及尹道輿論宇宙渾成一片而一身乃其發竅固驗與物同體之意不肖某數年間實僭謂從事於此非此則非堯舜以來脉路故有博約之請天則之說然反身未誠尚不免有以已合彼之時方其順手亦自謂是約禮順則是與物同體是不為免毁譽畏法度而為之者然前念一剚吾腹則所謂天則同體頓失其真雖費力認之亦不易得是日此念稍淨似此理日在目前得師此二書讀之益覺顯然張子西銘雖亦是此意猶覺稍有間隔道林公所謂一體似亦尚在同氣上看終不若吾師所認一箇精神為真也今師所謂不染順應無問可否其亦順應於同體之間否乎猶希再證何如辱師問及用世一節夫既稱同體之學則用世自是本分不肖唯有見於一體也然後知吾斯之未信未信者正所謂以已合彼者也且師門既逺短世有限又濕病潛伏久勞益増老母家居弟兒輩不知承順生平身不行道種種未盡未有用世之本自入夏來已欲舍去但告行甚艱今覲察在邇或得挂名其間不費辭說而去何幸過此則亦不得為人留耳向年承手教多紙其間甚有𦂳要語今集中皆未入豈編者遺耶向求啟賢書院記蒙師垂允即日得成之至幸遣僮歸報請質皆出情語惟便翼不靳示答趙太洲先生某之不學秪可躡屩從間世巨賢林泉遺老奉匜撰杖昕夕左右於數十年之間則庻幾哉有所薰浸而從入矣宿昔海内諸有道俱長逝今之遺老東南惟我念翁西北眀公而已某初有蜀命獨以得從眀公游及登大峨為肺腸快向過貴邑獲謁眀公聆緒論近出眉陽引瞻峨眉皆得其形貌大畧至其峻極發育之實均未領也區區吏事頗不為牽纏第近有土司殺戮逆命不免修防以冀彈壓坐是遂稽續請且日覺滯漏動入有為功德殊媿無以對大覺者言前録寄念翁以門下教語亦皆圖其形似而已感思精髓幾欲棄而走從乃辱翰教儀從眷然先及且動鳴鳥出谷之懐乃知眀公眷眷於某此即一體之仁藹然峻極發育流形矣第即日尚阻前役孟夏有按院臨審五月漸暑不知能出臨霧中瓦屋以俟秋初登大峨可乎霧中即隣鶴鳴及瓦屋皆某本轄地縱有官羈亦不相病也二昔之任道君子方其出而宰世日與禁近之賢圖惟亮弼之功猶虞疎逖者違於左右豈不曰吾既得大奉而行之者之為慰又不若兼得夫領而傳之者之尤為慰也故俾其解而伏於林泉其求疏逖之士甚于士之求已其誠有以也今者辱眀公眷眷于不肖某而不肖某亦已窺見任道君子之至意矣乃其心亦欲乗此時以求領其㫖歸是可謂交相需而勢甚便也然兩承相期卒以人事天時不果相從若此豈非天哉此某所以重自慨而望無已也某本乏才能比來一切與民為簡盡汰向日操切之政朝夕唯以空言决士民嚮似覺上下精神比前反鬯第未得再面請以畢宿疑徒惘惘自憾耳又濕病日増决計明春東歸已訂二三友為終焉計至于摳衣門墻竟未卜遲迅及遂否也前所乞六經堂記文計已就草明公主盟斯道註脚六經知必俯借以發矇瞽匪獨為訓廸不肖某而已者不肖某得領其㫖歸而南也倘因是以窺其大都則明公之道南矣三前差舍回辱垂教語有大事未眀之嘆所云云豈非吾儒所謂全歸者歟孔子云生寄也死歸也父母全而生之子全而歸之自後世儒者懼入於禪遂以吾儒全歸之學皆歸之形體之完而不關於性命之復其亦左矣若以為形體也則凡臧獲盗跖得保其首領完其四體者皆可為全歸而比干之剖巷伯之刑子路之結纓屈平之懷沙以至顔魯國文信國之徒將不得以完人稱其可通乎曾子之全歸在觀其易簀與吾知免夫之所指而不在於啓手足之間曾子疾革時令人啓動手足此病者常事非欲門人啓驗其手足之完否也曾子手足之完門人豈不知而曾子亦豈不知門人之素信也乃又欲啓視而驗之則亦失之偽矣故某嘗以身體髪膚不毁傷者此孝之始事惟孔子知天命乃至命之地全歸之日此為孝之終事楊龜山引老子死而不亡惟顔子當之而晚宋儒者遂詆其近於禪家輪迴之說豈不尤左乎不知禪之說某亦闢之盖其害道有在也今晩宋儒者但知禪之害道而不知聖人之全歸乃兼有夫禪者也某嘗以為聖人能兼夫禪禪不能兼夫聖以其間有公私之辨此其所以成毫釐千里之異也夫晚宋姑不辯而吾儒不至此不得為仁孝今某年已四九矣視此尚若泛海未有所歸得明公借佛語相督發讀之汗不覺發背霑衣也六經堂記重荷不鄙俯示發明垂光百代如不肖某何以為報夫經大道也某未能由于大道今幸得大賢指示五子以為參合入路若不知勉從而獨執偏小之見求之則逺媿聖訓中慚先世近負巨篇亦與仁孝逺矣但先世事蹟尚具别幅惟門下再加詳定尤幸先師念翁以去年八月中秋日長棄至昨二月十二不肖乃得聞訃某歸將何依哉此真天喪予也痛可言哉今先輩達者俱已凋落西南巋然唯獨我公某輩若不早圖禀教以求指歸何以自終且荷來諭有霧中瓦屋垂訪之意乃發原僧踵請倘慨然命駕某當撰杖留俟之上川南也遲此必欲力告求東為築場計矣專啓布謝并以奉期扣心請質統俟面罄答謝高泉書金大醫行力病撰啓未卒所請頗抱鬰於某自捉髪喜操詞章然幸不能詭隨人意以獵時稱所為古近詞雖亦追響於黄初正始辨音于貞元天寳總轡緩驂以馳古人之遐軌矣然必發自肺腸扣衷而出必不肯為無愉而歌無悲而哭之聲既壯稍知問學所從始悔而决捨之邇年仕都中諸詞家學侶邀入社㑹往往以病自卻後雖間嘗為之自知不工亦多不録方諸君子柄盟斯文雅尚氣骨某獨以為氣骨尚矣而神韻先之故宿昔所作未嘗出以相示非獨悔而决舍之也庚申之冬歸檢故簏時取讀之似亦有所寓寄因並與都中所作録次沈藏終不敢以出前金大醫過述門下追徵鄙作傳示勤篤繼又得文博士轉致翰教誘掖不倦徃曾聞呉霽寰中丞論及明公有囊括古今網羅述作之意每下逮於鄙作是明公於某若斯其殷也某又固以悔捨之故終沈藏而不肯出也其可乎某嘗觀曹陳思稱丁敬禮好人譏彈其文應時改竄曰後世誰相知定吾文者稱引以為達言某竊笑而鄙之夫君子進德修業咸不諱於三益而況文辭小藝倘獲大匠繩削而約正之其又何諱於後世之相知定吾文者耶某既感門下相求之殷實乃祈大匠繩削而約正之為重也矧繇此進於德業之大將或門墻所不靳者詎不在今茲哉尚惟門下還示一語以相導正至惠答張泰嶽宫諭書别五易歲矣才兩得公書所最慶鬯者荷不鄙棄賜撰先人墓表夫以畎畆之逸夫而辱鉅公名賢為之表章閭巷之沈修而煩雄篇大雅為之述序讀之閎深典宻遒潤圓通無勞苦欝閼之狀即来教所謂浸涵醲厚不得已而後發者葢自道也視公徃日他文似加勝焉先祖籍以有傳九原其不死矣弟何幸何幸頗已自盟及飭弟兒軰當終生不敢自委棄以辱高文媿雅教即不至悖先人地下矣其他則靡足為公報者謝豈盡言哉謝豈盡言哉朝政丕新仕路載清皆藉有道共為維持上下省事不小但如貴省及蜀中瘡痍尚多怵目最苦州縣官不得人大抵不肖者速去賢者久任乃可善治然必不能行奈何近得耿楚侗書謂公訝弟前久任疏為不識性體縁不當於澄水起波斯言教我深矣雖然俾弟專為一身計誠自波也若令斯世皆久任自弟始則波之潤廣矣又安知其不為澄水也哉不然豈習見者皆性體因循者盡順應耶弟即日病濕欲棄而東懼以逃譴自覺世味如水而瘝曠亦加甚矣公復何以教焉今日主宰斯文斯世自存翁外所望在公及石麓公二三老耳珍重不宣答程太守問學前月楊教官致到三書僕於冗病中具答計二幅以未起草故莫記次第大要言吾心獨知之體通乎天地民物古今故天地民物古今皆已責也故行有不得皆當反求諸已其說頗詳不謂未到復勤下問反覆周悉則知足下之求道誠有不啻饑渴者也僕寧不復盡其愚以求足下之歸一庻幾復有以正我也且承命歴歴詳答謹如敎條之于左來書云孟子所云行有不得皆反求諸已者為突兀語以致孟子之後無真儒云云孟子所云反求諸已即來書所謂反其智仁敬非突兀語也大抵學問貴知頭腦若得其頭腦則聖賢千言萬語非是突兀如使孟子不先言愛人治人一段而止云行有不得反求諸已亦非突兀語也孔子學而時習一章竟不言所學何事孟子一日又曰行之而不著亦不云行何事此皆為突兀語乎孺子滄浪之歌尤為突兀自孔子聞之則得其自取之㫖非得于孺子葢自得也孟子之後真儒不獨晦翁如濓溪明道二公不謂真儒孰為真哉且不論其學問足下試觀其治行為何如其它如邵康節即宋之栁下惠也象山之學盡出孟子荆門之政有三代風葢皆以其大本達道不為支離虚寂可以直接堯舜一派之學故謂之真儒今足下謂孟子之後無真儒且謂是孟子出語突兀所致則似求之太過而失之愈逺矣何如來書云大學則云必慎其獨中庸云云獨知一語乃千古聖學真脉更無可擬議者曾子獨得孔門宗㫖其著大學推極平天下而功夫只在慎獨子思受業曾子者也其作中庸推極位天地育萬物而工夫亦只在慎獨斯豈可以文義求哉徃僕於晦翁獨知之訓未甚𦂳也後因學問不得力無可倚只有其中獨知䖏耿耿不自安已又觀曾子之言曰十目所視十手所指其嚴乎子思又自訓曰内省不疚無惡於志所謂嚴所謂内省所謂疚所謂無惡非獨知誰也乃知晦翁獨知之訓已得千古聖學真脉又知此訓非始晦翁乃曾子子思自訓解已明白矣僕嘗訊鞫大盜雖刑之不肯輸服及至一二語中其獨知盜不覺服所以然者非盗不閑掩飾以觸其獨知若天所管押雖欲掩不可得也可見此知不容一毫虚假乃天下至誠之動者也在盜且然而況于學者乎其所謂明德所謂天之明命所謂虚靈所謂天理天則天聰明所謂仁體所謂生理所謂性所謂人之生也直皆不能外此吾人舍此更何所倚故唯慎其獨知則可以誠意而至平天下可以致中和而致位育曽子子思豈欺我哉夫獨知如此其顯是曾子子思自訓如此其明白豈可視為突兀語而復致疑於其間哉陽明先生雖憂傳註之蔽所云良知即獨知也又豈能舍此而别為異說哉今吾人止當求獨知為大頭腦其或言必慎或止言慎獨而不言必此各因行文不同不必大泥也來書云易獨知之時為獨知之體非憂慎獨云云雖然獨知一提便明其能識獨知者難矣晦翁認獨知為動時事不知靜時炯乎湛乎不可得而昧者非獨知乎是故獨知無間於動靜者也近時學者亦嘗以念頭初動分别善惡為獨知以念頭既動為善去惡為慎獨此雖愈於一不用工之人然亦未見獨知之體者也此體不假推測不事湊泊不生二三非無念也念而未嘗為念非無慮也慮而未嘗為慮葢立於念慮之先而行乎感應之間通乎天地民物古今無所為而不容己者是也故古之善慎獨者唯顔子顔子有不善未嘗不知知之未嘗復行所謂未嘗不知則亦未嘗成念者也豈以念頭初動而後分别其善惡乎所謂未嘗復行則亦未嘗成行者也豈以念頭既動而後為善以去惡乎此處則真有不容混於意者足下亦信之乎上李石麓相公某萬不肖曩者天幸獲荷相公睠誨引之道義之末有同骨肉之好自天下士蒙知與於門墻若不肖某亦可謂至渥矣然濶絶七八載未能一通書政府者非為薄也葢亦固守其愚不知其過耳雖然以天下若斯之大犇走下執事若斯之衆而獨某之猥陋不敢以形迹事左右則又寧非相公所終與不忍棄者乎方某伏林莽祗聞相公首秉鈞衡私念姬公以來未嘗無真儒若孔孟周程竟未大試惟今代獨相公以真儒首贊皇序葢數千年一覯見而已徃昔相君非不有意斯文然言醇疵者或相半焉若相公衆所謂醇如也故二三年來端揆之上好惡不作誠有蕩蕩平平雅道以浸浹於天下士而天下士無不延頸思見道化之成豈不休哉雖然孔子聖之時者自今人觀謂孔子時乎為任時乎為清和而已也某獨不然某以為時乎為任則有時弗任矣時乎為清和則有時弗清和矣此非所以語孔子也夫時者葢孔子無時弗任而不為任之跡無時不清和而不為清和之形者也今者思相公所以為天下計則惟無時弗任而己雖然相公葢覿孔子之深者也某何足以測前者家食時晝談夕夢未嘗不在相公左右然亦未遽通書乃辱相公㧞之畎畝且托陳太常歐中舍督示之不肖某感激不敢自錮今至楚五月矣適今歲場期迫又三楚實録未竣方披冗力疾勉緝成帙遣承賫奏并獻覽正但踈謬之病竊所不免冀惟相公曠然寛貸儻不至罪譴幸可言哉外惟為國為道崇䕶以續姬公之績償孔孟之所未酧則某與天下均幸不細小矣上江陵張相公去秋山中具復倉遽未能自道其意中語葢斯學自堯舜啓之堯舜雖未嘗語仁而明峻德親九族下至鳥獸魚鼈欲其咸若此非為大也以仁體固然也故堯不吝二女禹不念三過伊尹恥君不堯舜一夫引為已辜非相湯時有之也其在畎畆樂堯舜之道則已然矣是數聖人者莫非仁也而至孔子始發之自孟氏後發孔氏之㫖則莫過明道與象山眀道曰仁者以天地萬物為一體莫非已也象山曰宇宙即是吾心吾心即是宇宙是二言者夫固得堯舜孔子以來之學脉也斯脉隠久矣所以然者葢未能信天地萬物之即已宇宙之即吾心也吁信者果難也唯近代自東越發之於是乎大明東越之徒得者固不少其間一二不見其全多喜玅而違則遂至漫漶無章卒并其妙者無得也而東越之學且淆于時海内傑識士慨然懲焉則又專求諸虚寂夫人心之體無虚實寂感一也故語虚則與實對語寂則與感對有對則二矣彼以為得其虛寂則無心而天下之物綜焉而不知有二之心終與天地萬物為對欲其有堯禹伊尹之大且周不可得也而要之必窒於天下國家之理是故有虚寂而不足語仁者矣未有仁而不虚寂者也昔先師羅文恭公始嘗言虚寂其後悟遂置之觀其答蔣道林書可知已而近時學者似喜言虚寂以為覿體浸浸乎視已也愈峻而視物恒貳某懼仁之道益逺而堯舜伊孔之脉左矣抑不知其不窒於天下國家焉否也今夫理天下國家若調鼎然古之善調鼎者非獨俾鹹酸辛甘之適宜固將轉陳為鮮易腐為芬雖五味之變若一味也夫然後可以上供大官而下不螫於衆口否則赤芝青精非不苾且潔也欲以通於天下之口難矣故學如調鼎乃仁之致曲者也某近十餘年始若粗窺其門户然未得也伏惟相公淵然嘿也而任天下恒迅於雷動山然立也而憂當時恒宻于雲族方其任且憂天下莫得窺其際也以相公蓄養若斯之厚不知有取于仁道致曲之功否也抑欲俾堯禹伊孔之脉不至隠且淆則舍相公其孰為如徃者兹者因進奏實録布所欲請惟俯焉教其所以至幸上趙大洲相公某自違相公東還忽忽幾年日與同志商理舊學未嘗不以門下為歸昨歲辱朝命㧞起畎畆復典楚學行及中途乃聞相公簡自聖衷入踐台階一時欣躍為斯世斯文慶幸誠唆唆不能道辭也自庚戌間柄國事者集議通貢于時相公引春秋大義廷斥其非議遂得寢中國頼以尊安到今二十年皆相公力也而海内有識延望登樞以幸天下亦既二十年茲晚矣乃獲酬所望雖然以相公之荷任蒙主上之特知則猶未晚也某逺臣又迂謭無能稱道為賀雖然相公昔嘗教某以莊子知經某始疑之近締觀其天道篇乃知莊子真知易也非獨知經也天道篇曰無為也則用天下而有餘有為也則為天下用而不足又曰驟而語刑名賞罰此有知治之具非知治之道可用於天下不可以用天下葢嘗讀易而知其言有自也易首乾坤而聖人繫之曰乾知大始坤作成物夫曰知則乾虚而無為曰作則坤實而有為惟其知而無為然後能運其實而有為者也是故以君道較臣道則君為乾臣為坤以大臣之道較小臣之道則大臣為乾而小臣為坤何則君與大臣皆朝夕相與以用天下者也非用於天下者也雖然乾之中又有道焉葢嘗讀易至九二見龍在田是龍已離潛出淵矣然至九三猶朝乾而夕惕九四則或躍而在淵若是乎畏懼退遜不舍夫淵者何哉葢九四雖已稱見龍然而聖人無自見之意夫惟不自見然後能循乾之體懋惕之功出淵而未嘗弗淵也淵乎淵乎此聖人所以無為而天下歸雖欲使天下吾釋不能也天下不吾釋則用天下矣此所謂乾之深也又非莊子能盡之也某嘗經怪賈誼蘇軾以彼其才不能用漢文宋神以及其在廷之臣卒至于弗自用此非獨逺于易即亦逺莊子耳若張子房則善用漢高與蕭韓矣然而功烈如彼乎卑甚者葢又特知莊子而未嘗知易以未有聖人之學故也嗟乎古今有聖人之學而得乾之深者幾何人與今天下有志聖人之學者孰愈相公相公一旦荷主知踐台階是既有九二之見矣將使相公與天下優游而厭飫日需而月磨嘿然以用夫天下而天下熈然求為相公用而不可釋此其消息闔闢淵乎微也謷乎大也則惟在相公耳某固知未晚也某念天下士慶幸固同或未知所以賀相公者某辱相公知與誨督自謂先天下士也故述所夙聞為賀相公果不倦夙眷也必有以教之啟江陵張相公某辱相公教眷無假言矣兹值相公秉軸所欲效助左右者亦所謂千百載遇之猶旦暮也然思主少國疑劑調乂安相公才度游刃有餘苐以天下大計有三欲入覲時獲遂面展不虞老母病稽此真命也夫真命也夫直今亦病困他不暇詳其三大者猶不忍不為相公盡也其一正聖功某聞主上冲齡聖明殊絶然三代之下亦有冲齡異資第以大臣無格心之學不能引君當道以志於仁遂致苟且相狥終成雜伯為可嗟耳所謂三代又非欲以井田封建為也唯其志出于仁體根諸誠心則即以三代之心行近世之法何不可者禹稷思天下饑溺由已伊尹一夫不獲時予之辜此仁體之著也繇兹仁體父母天下自既厥心不為名歆不以功幸此誠心之操也然漢唐以來人主未有臻此者今者惟在信臣日誘以唐虞成周帝王誠心之韙日辨以漢唐宋諸君雜伯之年以日興主上之志夫是乃謂飬正之聖功故下有格心之功則上有飬心之學三代心政不見於天下乆矣乃若漢文帝唐太宗宋仁宗終於小康雜伯無大禆于天下所謂心政不望於今日聖明殊絶之主則數千百載之間無復望矣豈不自左矣哉某又不喜相公昔年試䇿中法後王之說夫我神祖六官八度孰非法先王者而奚顓顓以後王語也或者以兹一語之小不必拘而不知天下人心之趨係之此不可無辨也其二豫人才某觀近日人才多以事功進夫事功誠急務也然黠者激作粉飾未有為民長利為國逺猷之心某在外覩之殊確毎退與一二知者嘆之而已至為氣節尤可笑凡為是者皆色厲内荏吐剛茹柔觀望以下上其手者也又議論嚄唶罔覩大體即如陽明先生從祀爭論不一殊鮮平和匪獨不知陽明學脉所繇乃亦不知朱子學術所底以某近日細觀朱子晩年學術即陽明無異耳而談者徒自燕越隨人附和以為姸媸可不悲哉至於多種浮議此自古非常之人所不免者如大舜有臣父之譏伊尹有要君之誚孔子䝉尤不尠小近代篤行如程伊川人猶詆之為市井五鬼之魁則聖賢何嘗不挂當時之多口哉此事惟在相公審擇如陽明果不詭于孔子之學即自與一二執事君子定決之耳又焉用紛紛為也雖然今日之人心猶未回也說者猶多智識者以鼔動致然耳自非在位大人一以重大體正人心明學術為上務其能使回心嚮徃哉且翰館儲相地也即如相公及淮南公咸由前哲以斯學淬磨成之故今天下食福不鮮今相公豈不欲為後人地乎此仁體先事也故云為天下得人謂之仁不然則相公之仁窮矣計相公己先得之非逺臣所知特一言之為泰岱加飛埃耳其三培元氣夫民為邦本本固邦寧此元氣之說也自分宜秉政聚歛成風倭患相仍徵輸無藝南北交困久矣比年某再履荆湘之間有遍邑蒿莽萬畝波漂孰為吊訊至如敝鄉昔時腴民十喪八九詢諸呉會之間亦莫不然搢紳之素涼者將匄貸而無門說者謂陵粟穴金踊在墨吏之家豈不然哉然令今日盡殱墨吏斯民困猶故也若神祖時間歲免民租稅今已不可望乃當宁猶以催科為上課豈亦為無何之計故耶稽之唐書其中葉猶以催科為下考今盛世乃如此雖然使今不催科則國計不充使仍以催科為課則民困不知何所終也十餘年来計國大吏咸畫無所之此元氣之弊也或者謂安邊即以安民某則謂安民乃以安邊今姑不暇持籌條言之幸有相公燮調羣賢贊佐所為計安元元必有得其大者相公慎無以汰一幕官省一傳厨為足務也此三事者誠朽生迂談然野人芹曝以是為大乆未皇獻今自念與世絶矣豈忍不為一盡力疾無次不任區區寄何古林亞卿某結慕明公廿餘年屬者獲遂炙侍坐羈場事繼以覲行平昔請益宿忱竟未能達其一二某今又以老母病遂亦自抱病身既隠矣即安得復叩門墻問更端耶今世之語學稱明且悉矣彼濫竽假道者靡足語乃至談高妙席圓通者害道殊不淺至或以定性為宗者恐亦未可以得性之本體也古人語性曰養曰存存未可以定論故横渠語定性而程子非之以性本定而又欲强定之者意也白沙先生詩曰定性未能忘外物良以是耳近談學者開口即稱程子定性書不知程子言兩忘則性自定両忘者即養與存存之謂也固非以有意定之者為是也今據學者自用力即可驗雖然此固在夫人黙識何如耳夫黙識亦難矣伏惟明公巋然海内巨儒葢有得於成性存存者奚啻識性所輯白沙先生言行録俾天下學者曉然知先生貞履足為今之談高妙席圓通者深警其功德後學者膴矣然序中亦似微取於定性之說豈一時行文固當爾耶抑别有所見耶風便布謝并申請質不備答山甫中丞歸來已全成白髭癯叟矣喜聞吾丈復起鄖臺正欲得仕楚者附數字相問訊忽拜逺使累緘長篇短語又惠及老母一時若覿面承音傾領不盡來諭别已十年弟屈指計之誠十年矣念之不啻懷丈之篤且增過時不學之懼讀至末有握手造膝不可再期至為下涕弟亦不能不踟蹰濕裳也盖弟徃日見先師羅文恭常命千里之駕獲遂四方之遊初欲效之謂與海内知己如丈必有晤不自意前度告休以病阻遊及起補楚亦無由與丈覿今歸為老母足病至今歲弟亦病足近病痔不能坐臥其衰態可想見此心雖未巳然其勢不能相從左右如徃昔恐當如論矣嗟嗟豈不可念哉雖然弟與丈所求不相負者必有在矣彼世俗之交不足論嘗見紫陽與象山因議論不一即有斷來章之說如此亦未可語同心之交也今弟與丈從事此學弟數年前雖名學孔然舉孔子不能無悸意向得丈委記甚有激發之益是與丈相期在孔子相見在發憤皜皜之中古人所謂不約而同者不在兹與弟前者起楚亦非敢漫然葢弟實見一體之真不以隠顯家國殊致隱非離羣而顯非為邪家非在内而國非在外故濓溪云古人束髪為學將以有為必不得已止未晚也所謂不得已顧自觀精力與事勢何如耳今弟之精力憊矣止可収拾作全歸計將來苟真有得傳一二人足矣即不能傳亦罔若何丈少我十年精力尚健不識過之今方出事勢正可為即有微恙居鄖臺調理似較便而來諭乃又有行且告之語似猶以隠顯異觀恐終墮意必耳夫一體而無意必乃真以血髓學孔而非以膚甲學孔也不然則弟記内所謂蔀其賁者其能免乎丈可一笑矣拙記謹如命因稽來使力疾成之而自顧功不副文詞不達意幸丈正之然所以報丈一二者亦不出此外惟為時為道百倍珍調則非言語可能既也不宣答唐明府書承示别四生序仰見明府篤意問學雖政冗不為倦雖以僕之衰落而不為棄也甚荷甚服僕方索居正喜明府臨教已而延引之情既顓講求之意亦至僕忻願祗領不啻口出然辱首談即曰世所稱心學二字最可惡僕時漫然畧致其愚已而思之必明府之有懲而云然也非誠以心學足惡也僕近壯始知所慕今者年躋耳順之期尚慚不惑之實焉敢置喙語學然進承師資退稽于堯舜孔孟嫡㫖而下訂於四方之耆宿葢苦心者有年矣誠以道固有本而學貴知本此大學明訓也大學所引明明德於天下一條究其序之所先在致知格物而經文以知本訓格物亦皆犂然辨析灼然可證乃知道之本在身心意知而要在知本然又非創自孔孟昔者虞廷之訓葢曰道心惟微固知道不離心則學不離心精一執中之為學曷嘗離心以求之哉伊訓曰一哉王心周公訓成王曰殫厥心至于文王之緝熈武王之執競雖不言心實不能踰心而必謂心學為非恐未可也自孔孟後子思慎獨之功極于中和孟氏慊心之學配乎道義乃至詩人之語善牧者猶曰秉心塞淵騋牝三千曰思無邪思馬斯徂其治兵曰克廣德心桓桓于征記之語射曰内志正外體直唐人之語弓亦曰脉心不正則木理不直語書曰心正則筆正然則天下事孰外心而況於學乎昔某居刑曹其刑家比擬招詞凡盗曰不合輒起盗心凡淫曰不合輒起淫心葢非心有盗淫之端則盗淫曷従生哉故春秋者必誅心而刑家法之然後刑情始確刑事始革是世之不善者起於心而謂善事之不起於心其可乎哉孟子又謂是心足以王舉斯心加諸彼有不忍人之心斯有不忍人之政曰生於其心害於其政發於其政害於其事曰盡其心存其心曰此之謂失其本心又曰學問之道無他求其放心而己矣而已矣者無餘藴之辭也而必謂心學為非恐未可也自漢儒溺於逐末當時遂以末學為訓故唐宋與國初儒者但知競末至於爭一字一文之義始則纏轄於器數而不知器數之所由來繼乃恇惑於訓詁而不知訓詁之所從出歴數千年而知道之原者不一二人故韓愈曰軻之死不得其傳雖以濓溪明道極力捄正然而繼世則小明大晦而視知本之學反若仇敵嗟乎世不得堯舜孔孟以為證而俾學者倒施至是亦何怪之有哉僕以為見今之語心學者當謫議其力行與不力行而不當竟詆其學之為非也然則明府誠必有懲而云然而非誠以心學足惡也又明矣即若高文所引三物者又孰能外心三物者一曰六德二曰六行三曰六藝以六德言之則首智智者吾心之靈覺而紫陽夫子所指本體之明是也謂之覺則伊尹所稱先知先覺詩人所咏有覺德行是也其總之則謂之智又自此智之惻怛而流行也曰仁通明而無滯也曰聖裁制而得宜也曰義一無偏倚也曰中一無乖戾也曰和中和焉至矣其謂六行即六德之見於倫者也其謂六藝即六德之見於事者也非有二也要之三物皆道三物之従出皆心故道心盡而天下之物從之可見心非專内也應天下之物必出於道心而後當可見物非專外也然君子之學無内無外而其本末先後之序則不可以倒施是故非不煩也而其求端則始於簡故曰易簡而天下之理得焉非不博也而其致力則歸於約故曰以約失之者鮮矣此皆本末自然之序為之亦非有擇也故曰貴知本高文又致重於禮樂直不敢杜撰一語記禮者曰非自外至也自中出生於心者也記樂者曰凡音之𧺫由人心生也而夫子括以一語曰人而不仁如禮樂何若此又未可謂心學為非也明府又謂民可使由不可使知以故深咎學者語心之非愚則以孔子斯言未必即如先儒所訓倘如所訓則亦所以語齊民之事而非以為大人之學也古者七歲入小學十五入大學夫十五既入大學則所講者皆明德親民止至善之說曷謂不當語心也況如某之學且白首矣明府今亦近强年已臨政居上處大人之位矣其所誨四生亦皆今時嚮用之人又寧不告以大人之學奚必拘攣齊民之事以誨之哉且孔子又曰百姓日用而不知故君子之道鮮孟子曰行之而不著習矣而不察終身由之而不知其道者衆也觀此則孔子貴人之知道而不貴人之不知也不可推歟不可使知之語寧非民日遷善而不知為之之㫖乎是故君子之語學貴本而不可貴末貴近而不可貴逺貴虛而不可貴執也又不可推歟以某目中所覩所期不滯世塵而單騎見古人者如明府不二三人惜哉有獨徃之力有邁古之志意在求道不免燕指而粤轅也豈非有奪於其中歟三公之貴百鎰之富不足以奪明府而獨奪於韓愈之高識與工言乃遂謂斯道惟韓愈為盡之嗚呼斯亦不左矣哉雖然此猶衆人之所為疑明府也某不盡然觀今學者重内而輕外喜妙而遺則談先飛龍而行後跛鼈言踰尋丈而事儉方寸至于妨人病物阻天下嚮徃者之心此則近世志不真者之過而非語心學者之罪也然則眀府所懲果在是此非惟明府雖某亦惡也明府豈誠以心學足惡哉或者又謂明府最惡老佛以為語心學者之近於老佛也故惡之深而逺之嚴非得已也某則以為老佛之言或類吾儒而吾儒之言亦有類老佛者此則譬之食稻衣錦雖莊蹻皆然有賢人者則曰莊蹻之所食而吾弗食焉莊蹻之所衣而吾弗衣焉此卒不可格也今以老佛之學在心性而吾因以弗心性焉此亦卒不可格也何則莊蹻従事衣食以為不善而吾人事衣食以為善寧不衣食乎哉老佛從事心性以度生死而吾人事心性以盡倫物寧不心性乎哉今之君子豈非所謂因人之噎而廢已之食者歟嗚呼是誠左也已乃若明府之虛心求善必不因莊蹻事衣食而遂棄衣食亦猶之不因老佛事心性而遂疑心性也此某之所為進衣食提心性以報明府豈容後哉明府所師中石翁所友史君惺堂今二君之言具在也誠以印諸不肖之言有弗合與吾固知明府有懲而云然非誠以心學足惡又豈俟辨而後明哉聞道駕遄發語不隠括然大意則不敢踰堯舜孔孟與大學知本之㫖而已所望明府亦不為韓愈而為堯舜孔孟而已惟明府舟次熟覽果不以心學惡而還教焉則所謂斯道之托在左右者亦不必下帶矣答人問獨知來書及仁論俱以中在仁前仁在獨知前為言此似未嘗證驗於心而猶為文義與舊說牽繞故也來書曰獨知是仁不識未知時作如何㸔此乃專泥於先儒以意念動時為獨知即謂有有知時又泥於先儒未發前氣象一語而謂有無知時此大誤也夫心虚而靈者也即獨知是也此獨知者不論動與靜有念與無念有事與無事總之一虛而靈而已决無有冥頑不知之候即睡時人固謂冥也然觸而覺呼而醒不可得而冥也今之學元嘿者每自謂冥心坐忘然知冥者又為誰可知其不可冥者以虛而靈故也是故當人心靜時縱無一念一事此虛而靈者昭乎不昧未嘗遺物其與應事接物者無減故曰未應不是先當人心動時縱有萬幾萬應此虚而靈者昭乎不昧未嘗倚物其與未應事接物者無增故曰已應不是後殆如鏡之明體不拘有物無物總只一明豈有專屬知一邊之說此知即是天之明命人之明德亦即是源頭更何别有源頭可尋亦如鏡之明即是源頭又豈另有鏡源頭耶若如吾子言有未知前一段則人心必有冥然不覺槁木死灰時矣此安得為源頭亦猶鏡子以不明為源頭可乎今之語靜與寂者適近乎此此在二氏尚斥為靜縳頑空若吾儒寧有此哉縁吾子只認念頭動時為獨知又為先儒未發氣象一語所泥故有如許層數如許疑擾而不知獨知本然虛靈不倚一物不遺一物固不容以動靜及有念無念有事無事偏言之也此獨知不倚處即為中不遺處即為仁又安有中在仁前仁在獨知前之異哉故無私當理謂之仁即謂之中亦即謂之性中與仁與性名雖異而體則一也要之皆獨知也剥復數語皆是慎獨求仁工夫故孔子語顔子曰有不善未嘗不知知之未嘗復行夫有不善未嘗不知知之未嘗復行者以獨知之體常知故也亦如鏡體常明雖有纖塵不能掩也夫是乃為剥復真工大抵獨知之體若能直下承當常用剥復之功俾之覿體見面則自無如許層數如許疑擾矣辨之勉之疏謝欽賞疏奏為恭謝天恩事嘉靖四十一年月日該兵部題為仰仗天威擒獲元惡剿平逆苗邊患悉除地方安寧事奉聖㫖李心學等各賞銀拾兩一表裏欽此欽遵臣係李心學等内員數隨於本年月日接到承差某順領禮部發出欽賞銀拾兩紵絲一表裏到臣當即焚香望闕叩頭謝恩祗領外竊惟蕞爾醜苖恃險負固釀亂數年剿撫一旦皆賴我皇上聖德丕顯於九重神威逺加於萬里故一時督撫諸臣為之運籌而虎賁將士咸爭恊力是以元兇授首而邊徼以寧臣等何功敢叨重賞但奉命自天感恩無地賜霑内帑庸資幸荷於陶鎔賁及逺臣矢志曷忘乎衣被覩金思德益堅砥礪之真捧幣捫心願切絲縷之報臣無任悚惶感戴之至為此專差承差某親齎謹具奏聞祈行乆任疏奏為懇乞天恩准辭新命照舊供職祈行乆任以隆聖化事臣江西吉安府泰和縣人叨嘉靖三十五年進士由三十六年四月二十九日除授刑部河南清吏司主事三十九年四月二十八日陞授本部雲南清吏司署員外郎主事本年五月十八日陞授湖廣按察司僉事四十一年十月二十八日伏覩邸報以九月二十八日㫖下陞臣四川布政司叅議欽此臣聞人臣委質惟命所之朝而聞報夕而戒途勉效馳驅圖禆涓埃此非獨大分抑亦大義也是以國家之制凡厥庶寮小臣及列在藩服之外各有奔走之責者咸無辭免之例至如臣某一介微賤誤荷陞級榮寵自天欣戴無地臣非上大夫焉敢以辭言但自臣分限言之榮踰則媿恧愈滋㤙盛則惶悚益深此臣所以不能已於鳴也臣少不自飭長益無聞逮於邇年叨録制科始知勉修以圖少效遽佐楚臬冒玷大方爰自命下以來甫及三年到任之後日事奔走自顧蹇鈍之資竟無及民之實況湖北連年旱澇疲憊尤甚以臣閲歴至今始諳民隠大畧而已銓部偶因乏人抑或以臺臣誤薦之頻又或以臣素抱迂愚故持少假無非仰承皇上望治求才之盛心不知臣非其人也臣竊窺皇上以天縱神聖恭事帝天彌乂彌殷無非為生民計也而楚地實為龍飛之鄉故與其早移臣於蜀叅以試未歴之政莫若姑留臣於楚僉以展未竟之功臣雖菲薄或因積棐之故少有禆於楚民亦庶㡬報皇上萬一也且臣聞之自昔帝王興致太平皆以久任收效葢歴乆則民情愈諳施久則民情愈馴此古之政治所以功不勞而實惠流也況新舊頻更迎送煩數時日曠逺靡弊不貲而當官者亦皆自比傳舍陽浮度日始無鞠躬盡瘁之心而繼有轉顧他方之望奔競之風所由以長生民蠧害莫此為甚凡此之弊臣實親覩至於大吏方面之頻更尤非地方所宜近日言官建議久任陛下已賜允俞葢大聖靈哲既洞鍳于茲矣臣復何言故臣願陛下勅行乆任請自臣始俾臣仍守原職遲之歲月果有寸效則惟陛下甄録遷轉以成其始終臣尤當摩頂放踵捐犬馬之身命報聖恩無窮也縁臣今遷未踰常格臣之辭免雖僣非矯倘蒙聖明憐其一念區區意在久任别無他故容臣仍以湖廣按察司僉事照舊供職所有四川叅議缺官别選賢能以充其任庶㡬陛下乆任之㫖不虚而天下人心以定是則事體雖至微而關係者非細舉措雖至簡而禆益者良深臣嘗以為陛下有萬年靈長之禧則必有萬年乆安之治自今觀之計無有踰此者惟陛下裁之臣直幸甚天下幸甚臣不任惓惓乞休疏奏為在途驚聞母病憂惶成疾十分危篤不能赴覲懇乞罷斥歸田事臣年五十七歲江西吉安府泰和縣人由進士初授刑部主事陞授員外郎歴陞湖廣按察司僉事四川布政司叅議按察司提學副使嘉靖四十五年因病乞休致仕囘籍隆慶三年六月内䝉命起補湖廣按察司提學副使陞廣西布政司左叅政萬厯元年正月内續陞今職本年九月間例該大小官員應三年朝覲准本司關臣督同首領官該吏領齎册又已於本月二十日離任赴覲外行至江西贑州府地方得報臣母周氏蹷病痛苦在褥臣聞之不覺驚疑浹夜憂惶漸成痰咳又為在廣水土不服侵冒瘴癘時作冷泄日夜數行時欲中止重思入覲大典簡書至嚴矧聞皇上冲齡睿質聖學日新思竊快覩曷敢以私情逗進不虞行至臨江府地方續報臣母病加痰喘眩暈瘦損鮮就飯食臣愈增驚悸旋亦眩暈傾跌伏地心内怔忡亦成痰喘泄瀉不止肌骨柴立神思昏懵飲食頓減强行轉篤臣猶欲力疾前驅其若病勢沈痼伏枕難移臣不得已告鳴臨江府撥醫調治屢藥無痊若不以血誠上訴君父放還調理恐一旦先狗馬填溝壑臣母聞之必成不諱是使臣進退維谷忠孝兩虧終為不韙大罪臣胡以自解故臣寧不避斧鉞冒昧陳情矧臣屢歲扶病供事奉職無狀分應擯棄懇乞聖明將臣特賜罷斥放歸田里臣與母氏互免憂虞病勢獲減殘喘苟延是臣母子將來餘生皆陛下賜也若是則陛下仁孝之勸既廣幽明之典亦彰匪獨臣母子甚幸臣不任冒死干犯之至為此具本令義男胡安抱齎謹具奏衡廬精舍藏稿巻二十
