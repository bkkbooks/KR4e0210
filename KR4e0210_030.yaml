body:
  text: 衡廬精舍藏稿卷三十明胡直撰雜著談言上談子曰東壁之子嗜尚陸博至忘寢食遺遠父母捐棄妻子胡若是之癖也浮休山人曰古今嗜尚奚必斯人昔唐潘彥嗜陸博一日浮海舟破彥猶手握陸局口銜骰子翌日達岸兩手見骨而二物不離漢劉雍嗜瘡痂嘗詣太守孟靈休適痂墮地雍即俯取餐之至有鞭撻健卒以供痂食宋明帝則嗜􅢡􅜽唐鮮于叔明嗜食臭蟲權長孺嗜食人爪而海上又有嗜臭之夫今夫人性常嗜之外有剩嗜焉鮮不為癖奚必斯人子獨不知文王嗜昌獨楚王嗜芹薤曽晳嗜羊棗屈到嗜芰魏徵嗜醋與芹皆剩嗜也推之宜僚之丸成公之鐻嵇氏之鍛阮氏之屐顧氏之畫劉氏陶氏之酒王氏張氏之書又推之五侯之爭六王之戰蘇張之辨楚漢之攻衛霍之貴王石之富皆剩嗜也子又不知談天衍雕龍奭公孫堅白惠施五車鬻熊子華韓非虞卿司馬子長相如子雲之徒迭相著述列屋盈家末儒訓詁百葉千葩自賊根芽競相雄誇皆剩嗜也夫孰為不癖又何此之愈悅而彼之咈嗟客曰若山人者舍軒裳耽林壑是亦所謂煙霞痼疾泉石膏肓者耶山人既有剩嗜寧責他人山人曰與其癖詞章訓詁寧癖煙霞泉石弟子以告曰甚哉山人之言先生顰蹙而語曰剩嗜乖性枝見賊道山人之言甚則甚矣而為吾徒者可無辨哉可無辨哉隋田楊與鄭法士俱以能畫名法士自知藝不如楊也乃從楊求畫本楊不告之一日引法士至朝堂指以宫闕衣冠人馬車乘曰此吾畫本也子知之乎由是法士悟而藝進唐韓幹以貌馬召入供奉明皇詔令從陳閎受畫法幹因奏臣自有師陛下內廏飛黃照夜五方之乘皆臣師也帝然之其後幹畫遂果踰閎若陳韓二子可謂能求其真者也彼以似求似者則益遠矣今之學者雖曰求聖人之經固已非其真乃舍經而專求訓詁則又求似其似之者矣不尤遠乎昔者楊子華畫馬于壁居者如聞鳴齧李思訓畫罨障波濤而玄宗夜聞水聲此非馬鳴與水聲也聽者自聲也吳道玄畫鬼神數壁而颯然風起馮紹正畫龍而白雲出廡此非風起而雲興也覽者自興也學者可以知妍􅑦之從生矣是故知物所從生則物物而不物于物漢儒者馬融自擅知經又善推步常算渾天不合羣弟子莫贊一辭唯鄭玄一算而決及玄業成辭歸融心忌焉嘆曰詩書禮樂皆已東矣乃潛欲殺玄推式以算玄當在土木上躬騎馬襲之玄亦預知乃入橋之底俯伏柱上融踟蹰嘆息而反玄由是得免嗟乎融之所為是烏知詩書禮樂之豪芒哉故曰漢儒尊經而經愈亡雲之樵遇設罿者于途曰慎無獵人設罿者曰吾所獵者跂而角毳而翼何謂獵人雲之樵曰子弗聞昔者羽山之熊貝丘之豕牛哀之虎其先固人也况乎都末之野彘彭世之鹿又王祜之道士鹿也劍南之猓􅛊中牟之馴雉茂先之鸚鵡賈人之秦吉了也之數者形則物矣而心人焉子謂之人非耶今之跂而角毳而翼者安知不有若人然則子之獵人多矣設罿者聞言而懼遂裂罿折矢誓終身不復獵它日設罿者從上邑通都逰而歸謂雲之樵曰曩所謂形物而心人者為其有義也吾頃見冕而相圄辨而相奪競利忘義者何啻十九不亦形人而心物乎謂之物非耶况以人獵人世不見罪而子獨罪豫之獵物雲之樵恍然不能答久之吁曰吾奚忍天以人而相物且相獵也海壖生曰海之渚有海鏡焉其腹空洞無臟唯中藏紅蟹子小如黃豆而螯其足海鏡飢則蟹出拾食蟹飽海鏡亦飽或迫之火則蟹出離腸腹而海鏡立斃矣彼其所為斃者以其所假在外不在內故也水母者亦出海中胚渾凝然而絶無眼常有數蝦寄蹲腹下代為之眼蝦行而行蝦止而止一日波蕩蝦離而水母竟躓死泥沙彼其所為躓者以所假在物不在已故也弟子以告先生曰異哉學者之違內迷已而終弗困躓者希矣弟子識之星之徒問于扶桑君曰子不見昭昭者之為光也非神明乎扶桑君曰非也子不觀吾扶桑之日輝映四海神哉明哉豈昭昭者與之星之徒曰允哉日之為神明也太一丈人曰日雖大俾墐户而塞牖則光無入矣奚其神且大若夫神明在我五通十達無所不之之天地而天地焉之四海而四海焉之古今上下而古今上下焉四海何足以竟雖然則無不自昭昭始夫星與日雖影有大小其為外一也影烏足以達神明吾重悲今之以影學也曰學明以不墮於影曰子思子曰內省不疚無惡於志君子之所不可及者其惟人之所不見乎日南之國倮人所居倮生既長則縳制大樹取物如紫粉然畫其胸而刺之班班若異物謂之文身華人視其文也恆用為慅而彼視華人之弗文則亦用為怪然世徒怪倮人文身之非而不知自文其性之非下士畸人姑不逮其儒而搦管一日之間不知幾淫思而溢慮也幾讕言而枝説也何况體節之繁注疏之多熳爛瀰漫于天下冗踰九牛毛彼其于真性何啻素之受繪􅀈之受和將求其初而弗得抑且以繪和為真矣視彼文身者一何多寡之遠然則君子奚彼之慅又奚怪怪乎哉􅀈俗多賈有士人父壯時賈秦隴間去三十餘載矣獨影堂畫像存焉一日父歸其子疑之潛以畫像比擬無一肖拒曰吾父像肥晢今瘠黧像寡鬚今髯多鬢蟠乃至冠裳履綦一何殊也母出亦曰嘻果遠矣已而其父與其母亟話疇昔及當時畫史姓名繪像顛末乃愜然阿曰是吾夫也子于是乎禮而父焉夫父天下莫戚者也乃一泥于繪像致有妻子之疑彼儒者獨不知經史亦聖賢帝王之繪像也何則帝王聖賢之道出于心著于事而載記于經史是即所謂影堂父像者也經史載記有定體而道之出于心者無定形今世儒顓泥經史而忘求聖人之心是即所謂泥繪像而拒真父者也於乎彼儒言者其不泥繪像而拒真父者蓋幾人哉客至自建為言武夷大王峯之升真洞洞中有雷文瓷􅣙五以盛仙人蛻骨洞外有黃心木為棧雖險不墜而久不爛又有四船相覆以盛仙函船皆圓木刳成外懸如半枕于洞土人禱雨者輒用竹繩綴梯造其處又有小藏峯二小船大藏峯橫插板木中有圓器如筥方器如筐餘者如杵如盤咸不知幾千萬祀而未有毁也此何理以致之通一先生曰是何理可窮也同坐客曰以豫所經仙岩亦有床匱之異其他如西川之火井油泉峨眉之光相登之海市靈岩之飛瀑華陽之喜客泉是皆不可理喻豈惟是哉稷生以武敏契育以鳥卵其事表諸經君子雖不語怪然前史昭晣若晉杜車騎出于蛇是蛇而人也疑非獨杜預也唐張路斯出于龍龍而人也疑非獨張氏也宋韓蘄王出于虎虎而人也疑非獨韓王也李侍郎出于龜龜而人也疑非獨李椿也夫人物相去遠矣物之能為人則人之能為物亦可知矣儒者必曰理則無是是何理可窮也子思有言及其至雖聖人有不知歐陽永叔曰治其所可知置其所不可知是之謂中道先生曰是則理也吳門之貴胄其先世田廬資藏稱雄膴而有三子其伯長唯日鶩飲博恣聲伎駘宕不返卒為窶夫莫以享其業其仲懲之則卸醴絶聲身不離閫研稽業籍窮所自出畫畝而記刻銖而題下逮于彘盤榖枷之微簿札充楹自謂握祖父之遺算矣然而田卒汚萊泉貨內耗事至必曰俟案籍為之籍日紛紜而家隳猶伯兄也至季弟則大懲曰吾二兄均左矣于是躬履南畝目徴貨器日課子母錢不多載記而先業益充妻孥享其嬴鄰里食其餘伯兄恚曰是齪齪者異我仲兄鄙曰是未嘗觀農器譜而妄治農也未嘗讀貨殖傳而遽治貨也至詬之不容口季終不顧而修業自若洞先子曰季得矣季得矣夫人心受命于天萬理皆備比之先業孰不雄膴然而衆人奪于聲利色欲則伯長是也世儒荒于物理載籍則仲兄是也今也反諸身心直求天命之性有類季弟之為者則世懦莫不詬之猶二兄之詬季不已也雖然人固已享其嬴食其餘矣詬何患為樂仲子曰吾昔好種橘吾種輒前春而植私竊懼晚也植而遂者十不得一二焉訊之老圃圃曰橘不可以前春種也盍後之吾從而後之植而遂者十嘗得八九焉又訊老圃圃曰冬榮之木其氣外周外周者非陽盛不可活也冬謝之木其氣內固內固者雖陽未盛活也推此則百種百活矣仲子俯然嘆曰吾益信枝葩繁者之本根隳也周公曰冬日之閉凍也不固則春夏之長草木也不茂天地不能常侈費而况於人乎是故君子貴斂其真不隳其根萬類以生南海鍾生曰吾國西樵山之坡陀有行木一則可滋千百茗種茗者覷一行木之地則躍然喜已而樹之千茗雖有旱乾不灌而榮甕無俟汲也桔槔無俟聞也非他有繆巧也行木性能召水者也有一行木則其地之百泉為之瀵涌津液而餘潤被茗者多矣故時稱行木有賤工者憂曰是亦一木也夫惡能生水况以障吾茗遂集斧而薪之搰搰然走于山澗之間朝汲而灌暮負而溉人百其勞而榮弗若之矣胡子謂弟子曰小子識之夫人心之生理豈啻行木哉而世儒者不反諸心而求諸物又奚啻工人之舍行木而走山澗者哉嗟夫行木世不恆有者也而人駭於希遘乃曰人心亦為希遘智乎談子曰昔唐郭元振未第時已能為汾民祛烏將軍之害其膽志蓋一時異時忠孝文武已兆茲矣又有言元振嘗山居夜有人面如盤瞚目出于燈下元振了無懼徐染翰題詩其頰題畢吟之其物遂滅若元振膽志豈其獨鍾耶抑人皆可學而有者耶洞先子曰稽之元振讀書大學時適其家寄資錢五萬有叩者曰吾五喪未葬願有丐也元振即舉五萬錢盡畀之不復問其名元振器量固若此然則膽志其有本哉力本則可以學矣弟子以告先生曰器量生于明明為本也子不聞濟南郡方山之南有明鏡石焉方三丈餘也山魅行伏了了然著鏡中莫之遁至南燕時山魅惡其照也而漆之俾弗明自鏡石漆而山魅晝熾人足掃矣夫人莫不有鏡能照魑魅魑魅隱不皇矣皇害人哉雖然吾見今之人有自漆其鏡以悅魑魅者矣其不為魑魅怖伏者誰夫弟子曰昔宋顔延年嬖其妾且畏之妾一日撲跌延年幾斃妾死延年反哭之慟已而恍見其妾出于屛間驚悸遂卒然則魑魅夫人自為之也先生曰然談言下戎夷違齊如魯而後門天大寒與弟子一人宿於郭外寒愈甚謂其弟子曰子與我衣我活也我與子衣子活也我國士也為天下惜死子不肖人也不足愛也子與我之衣弟子曰夫不肖人又惡與國士之衣哉戎夷大息曰道其不濟夫解衣與弟子夜半而死弟子遂活夫戎夷始欲為天下惜死不嫌生也終能為弟子救生不辭死也戎夷可謂知處死矣使戎夷識知道則雖為天下士可也彼陳三之徒侯嬴之流區區殉名何足道哉何足道哉宓子賤治單父彈鳴琴身不下堂而單父治巫馬期以星出以星入日夜不居以身親之而單父亦治巫馬期諏其故於宓子宓子曰我之謂任人子之謂任力任力者故勞任人者故佚夫任人者匪直佚也人衆必周而不漏也任力者匪直勞也力寡必偏而不咸也任人者匪直不漏彼蒙任者可以使不肖者肖也任力者匪直不咸彼不蒙任者且將使能者不能也此古今嘗試之驗也故曰堯舜垂衣裳而天下治又曰恭已正南面而已言任人也梁天監中有扶南大舶獻玻黎之鏡鏡面廣尺五內外皎潔方圓照三十里訊其直曰此波羅尼斯福樂寶也約值百萬緡帝令有司算之傾府庫償之不足朝臣無敢議其值者已而有國工沉隱士也舉鏡熟視斥而去之曰此照不過三十里奚足貴吾中夏神州有神鏡能照左右爰及秋毫咸徹表裏以逮萬里四燭無疆則天子之心是已夫天子神鏡有赫其明有濯其靈而德威政刑出焉內無苛核外無姑息則天下拱手而治福樂孰踰此焉用傾府庫以酬彼鏡帝不能用竟酬其值晚年專務姑息政刑大弛卒有侯景之難國亡鏡亦隨喪談子曰南海之濱有鼉市焉鼉儤背海隅邊幅廣修不知幾百里也居民視為石洲漸創茅茨鱗列成市不知幾何時也異時有穴其肩為鐵冶者天旱火熾鼉不勝熱怒而移去沒者凡數千家或譏之曰是置居者不審也而不知置天下者不處其安而虐且熖則鮮不成鼉市也東海之濱有蜃陽焉蜃居海中吐氣則結成城墉樓臺人馬五色縹眇出煙霧之表髙鳥倦飛就棲輒墜氣中竟以溺死或譏之曰是為鳥者不審也而不知人之宅富貴者不擇其從迷昧終身則鮮不墮蜃氣是故惟大人者視天下為鼉市不以欲熾眇富貴為蜃閣不以身迷斯人也雖為天下處富貴也可矣昔唐寧王嘗獵於鄠縣介搜林莽草際一匱扃鑰固甚王命發視之乃貯一麗妹問所自姓莫氏出衣冠家夜遇賊僧劫至此王驚悅之載以後乘會獵者獲一生熊因納匱中乃扃留草間時明皇方求極色王以莫氏殊麗即表上之具奏所由上令充才人經三日京兆奏鄠縣食店有二僧以萬錢賃店作法事惟舁一匱入店夜久腷膞有聲遲明寂然店户人怪之啓視有熊衝出脫走尋二僧已骨矣上知之大笑曰寧哥大能處置此二賊也談子曰彼二僧自謂得麗妹如莫氏足樂矣而不知匱中之忽化為熊也明皇自謂得莫氏矧又得太真足樂矣而不知域中之幾屬犖山也明皇能笑二僧後之人又笑明皇於乎人主其無令相笑無已也談子曰齊桓公唐明皇二君皆始治終亂而皆起于好內桓公始聽鮑叔薦管仲遂忘射鈎怨而獨任以政人不能間何其難也已而修內政興海利贍貧窮祿賢能踐盟曹沫割地燕君拜胙周使歃血葵丘責楚尊王平戎安周九合諸侯一匡天下何其智也比管仲卒近用易牙開方豎刁三子專權於外嬖長衛姬等如夫人者六人長姬淫于雍巫雍巫又厚結豎刁以蠱惑於內桓公病易牙豎刁作亂築塞宫門桓公欲食食絶欲飲飲絶慨然涕曰吾何面目見仲父乎遂蒙衣袂死既死五公子爭立桓公尸在床六十七日尸蠱出於户夫先後一桓公也始任管仲以一夫命令天下終惑內嬖近用小人不能庇一身抑何悲也雖然仲有罪焉初仲齋袚受相桓公曰寡人有大邪三其尚可以為國乎寡人不幸好田田莫不見禽而後返仲曰惡則惡矣然非其急者也公曰寡人不幸好酒日夜相繼曰惡則惡矣然非其急者也寡人不幸好色而姑姊妹有不嫁者曰惡則惡矣然非其急者也夫人之好內瀆宗則亂莫甚矣仲乃云非急仲固導之內仲又安能禁辟嬖於身後乎仲雖平戎其若女戎何哉故曰仲有罪也明皇自少已定難刪亂誅韋黨而安廟社又誅滅李元楷等隂謀立殺長孫昕之怙威可謂不英哉任用姚宋聽諫柳澤增置侍讀以𢎞嘉謨追封五王以配廟廷不可謂不英且明也橋陵襄事已踰年矣猶不受朝賀踰十年猶望陵灑泣既耕藉田猶種麥後苑自太子以下令躬收穫示重粢盛兼知民艱可謂能皎然為義者也史臣贊曰焚後庭珠翠以戒奢禁女樂出宫嬪以懼荒敘友于敦骨肉以厚俗搜兵責師以明軍法朝集計最以校吏能西蕃競欵北狄趍風冠帶百蠻率書萬里咸非溢美然九齡既踈林甫日親太真擅內而漁陽羯鼓遂震蕩於寰宇明皇倣徨望賢朝食不供頓輿馬嵬六軍不發乃勉誅國忠而縊貴妃宗廟丘墟生民塗炭明皇雖掩袂涕泣不既晚乎明皇晚節詔天下祖奉玄元皇帝習四子立學官博士弟子員尤為亂命又招集張果羅公遠葉法善之徒且欲從公遠學遁漢文帝云朕乘千里馬將安之明皇學遁亦安所之耶當其在望賢馬嵬之間曷為不能遁耶其倒謬益甚孟子曰不仁者可與言哉安其危利其災樂其所以亡者不仁而可與言則何亡國敗家之有此桓公明皇之謂也夫桓公明皇英主尚有是而况其下者乎然則女禍于人國也烈矣談子曰女禍有二一內嬖二外戚外戚則漢甚吕王唐甚武韋王氏至莽遂竟移祚吕與武韋移祚且十之九其原出漢祖唐宗無刑家大道亂不亦冝乎史又稱莽將篡時挾漢婚已女為平帝后平帝崩后年才十八為人婉嬺有節操莽既篡乃更號黃皇室主而令别婚后大怒因病不肯起莽不能強也及漢兵誅莽燔宫后曰何面目見漢家遂投火死夫以莽之篡漢廷大小臣工爭頌功德宗室子為作符命而其女獨不欲更節且為漢死然則人性之善不以類移不以習易若莽女尤難也嗟夫人主創承無刑家大道以為子孫型模欲無亂也艱哉秦二世三年丞相趙髙欲為亂恐羣臣不聽乃先設驗因持鹿獻曰馬也二世曰丞相誤耳問左右或言鹿或言馬髙遂隂中言鹿者以法羣臣莫敢不聽髙及二世責讓髙以盜賊事髙乃隂與其壻咸陽令閻樂謀弒二世使郎中令為內應閻樂將吏卒入望夷宫數二世曰足下驕恣無道天下共畔足下其自為計二世曰丞相可得見否樂曰不可二世曰吾欲得一郡為王弗許又曰願為萬户侯弗許曰願與妻子為黔首樂曰臣受命于丞相為天下誅足下足下雖多言臣不敢報麾其兵進二世自殺髙遂立子嬰去帝號為王以黔首葬二世談子曰髙之威燀矣詩曰匪教匪誨時惟婦寺三代以來女婦稱妲褒乃寺禍未有甚髙者也秦惟祖龍稔禍二世倒執太阿授髙其柄乃至求見丞相乞為黔首而不可得皆秦之取也秦乎其孰讓談子曰寺禍自東漢唐末浸盛史稱漢仍秦制中常侍雖至親幸止金璫石貂不復雜調自和帝朝竇憲秉權鄭衆謀除大憝遂獲封侯超任宫卿至鄧太后女子益近刑人手握王爵口含天憲已非復掖庭故步矣其後孫程立順曹騰建桓單超誅兾乃遂植茅分虎南面人臣者紛然若拾果焉其邸第擬諸天家養子出自帝制忠良摧陷毒盈海宇曹節張讓彌為魁雄竇武何進之徒雖以周戚上將機事未密先飲其劒已而袁紹兵入根苖痛絶而國隨以殄矣豈不悲哉唐制貞觀以後七十年間內官為職守禦中宗乃濫署七品以上員外官至千餘人而衣朱者尚寡玄宗中官稍稱旨者即授三品衣朱者亦千餘人而兵柄朱與後李輔國從幸靈武程元振翊衛代宗乃至三公王爵柱國尚父與天子共政事矣已而魚朝恩為監軍容使又有護軍中尉分掌禁兵自是神策天戚軍柄亦全歸於璫臣貞元之後威熖日赫五位之廢置九重之生死咸出掌握遂有定策國老天子門生之稱文宗謬托匪人謀用不臧甘露之變幾已覆國昭宗被季述等持撾數罪收置幽辱鎔錫固扃鑿竅通食至不忍言崔胤雖快仇屠戮流血成川而國祚旋亡不太晚乎昔者周制閹人領于冡宰止供掃除無假名器矧曰兵權唯漢和唐玄古今至愚乃首假以權敗禍至毒天地為之倒列日月彌以晦冥身殱國亡室闈不保千載有餘悲焉然則為人主者尚無以權假刑人至喉癰不剪浸成古今悲􅛐而卒無救也於乎慎哉其惟明辟僖宗吟曰紇紇山頭凍殺雀何不飛去生處樂固以外逼強藩內窘家奴欲棄萬乘為齊民而不可得讀之彌足悲焉昔王守澄教其黨曰無令人主近賢士親詩書則吾儕可以得志嘗試辟之斯語也固亦所謂貝母藥耶昔江左有病人面疽者試以百藥莫不掀唇當之至貝母閉口不欲納病者喜曰此藥治矣因以葦筒灌之數日遂愈故治病者當求病之所忌賢士詩書閹寺忌之久矣人主治閹寺唯親賢講學夙夜􅕽於知人安民勿皇其他寺人賚功唯資無惟名器唯恩無惟事權亂不假刋也是曰上䇿談子謂把翁曰自趙宋氏立國未多見婦寺大禍此非獨大綱正抑亦不與權之效與把翁曰宋之兵禍則豈後婦寺哉宋懲藩政不飭武備唯恃賂獻馴至大亂而後亡國則藝祖與趙普之謀非也藝祖既下河北欲乘勝取幽燕走書詢普普回奏止之藝祖遂班師及雪夜幸普謀取太原又以幽燕地圖示普問䇿普皆力止且曰可取孰可守吁普言左矣即如藝祖取天下而帝之又曷必後世之無守也然自是君臣竟不以幽燕圖兵權釋一時之杯酒而戰爭藏異日之疆場豈獨失中國故地哉遂俾戰櫓泛江淮黎民受鋒刃此非其胎禍與宋之敗蓋有三一懦敗二議敗三恩敗夫天下好戰必危忘戰亦必危自普以銷兵為長䇿其後太宗始奮力收太原已而北伐契丹互有勝負乃至寰州之陷太宗君臣遂絶口不言兵真宗之朝民不識兵敵逼門庭乃用冦凖謀躬率濟河大禠其氣然竟以嵗幣定盟罷兵神宗語及太宗中箭自謂不共戴天憤恨為之泣下後值王韶等覆敗遂弛幽燕之念總之皆襲普智識者慨焉蓋當時不議將兵者之非其人而猥以兵不可用為言不究平日無籌邊之實而徒以邊不可擾為心歐陽修曰臣見朝廷常有懼敵之形而無憂敵之心夫不憂而懼則積懦之為纍也異時敵至城下徽欽父子竟不守死相繼請降懦劫之也故曰懦敗歐陽修曰近年朝廷開發言路獻計之士不下數十至於臨事誰策可用又曰言多變則不信令頻改則難從斯語誠中宋政之膏肓凡皆多議之為過也敵人譏曰待汝論定吾已渡河其言足警矣而南渡士大夫議戰者則不知所為守議和者則不知所為戰曽無范蠡一定之畫坐成秦檜賣國之姦羣臣罔知厝火乃至區區弊精故紙奔走一世以趍窽言雖言滿上下何資實用故曰議敗宋既增益嵗幣計數十萬至於郊祀覃恩任子之多乃逮于女夫外孫濫亦甚矣當賈似道秉政國事已去猶推恩至太學生是何異于疏旱苗之水以沃魚藻兩無救矣故曰恩敗此三敗者儒者與有責也把翁曰前代尚有文臣樹將業若羊祜杜預謝玄韋裴行儉張仁願之徒偉然為世虎臣至宋室鮮有文臣能將者亦懦纍也夫吳越之人狎舟燕趙之人輕騎豈其性能哉習使然也古者男子生則有桑弧蓬矢以射四方六藝有射豈獨教文亦所以修武也昔者諸葛讀書獨觀大旨李靖不欲作章句老儒知其無裨而有妨也故國莫病於畏言兵士莫忌於疲虛文假令宋之君臣不局局於聲容訓詁間以困踣其傑氣礱銷其英氣俾士之才力相近者習於武事而試用之亦可以廣材而破儒矣詎至以中夏之甲兵甘為臣僕哉雖然此非獨宋過也談子謂把翁曰子過宋甚矣然而未知擇將之弗易也乃若今日擇將獨難而子胡易之把翁曰嗟哉宋耶繇神哲而上未始擇之而謂曰世乏其人則誣世繇髙孝而下未始任之而謂曰人非其材則誣人夫觀日之玉照夜之珠遠出異域來自重譯此非古今所希覯耶然無足而登王庭無翼而棲瓊庫者何也則所好存也宋徽之為艮嶽也杏岫梅嶺猶為宜土之樹若炎州荔枝素非中土冝植亦莫不集而蓊生之則所好存也向令宋君臣以搆艮嶽之心搆國家以集花石之力集將才則何患擇將之艱哉不然祿山亂而李郭顯烏珠至而韓嶽名豈假之異代哉古語云將相無種古之取將或出奴𨽻或出敵國或出亡命亦或出盜賊惟英主良相多方試之不次庸之則無弗得矣而必謂擇將之弗得是亦所謂過活烏坐待終斃者耶雖然亦非獨宋也談子曰嚴尤有言丐奴為害所從來久矣後世三家周秦漢征之未有得上策者也周得中策漢得下策秦無䇿焉當周宣王時玁狁內侵至于涇陽命將征之盡境而還辟如蚊虻之螫毆之而已故天下稱明是為中策漢武選將練兵約齎輕糧深入遠戍雖有克獲之功敵輒報之兵連禍結三十餘年中國還耗胸奴亦創艾而天下稱武是為下策秦王不忍小耻而輕民力築長城袤延萬里疆境既完民力內竭以喪社稷是為無策信如嚴尤言則籌邊終無上策其果然歟把翁曰不然昔周宣王之先周公相成王撫萬邦巡侯甸征弗庭綏厥兆民其始在制治未亂保邦未危三公則論道經邦三孤則二公𢎞化六卿分職率屬以倡九牧以阜兆民而大司馬則克詰戎兵以陟禹之迹方行天下至于海表罔有不服當是之時敵雖夭驕不敢望壯月南牧矣此非上策而何然則策莫上于修內政莫要于得賢相得賢相則能得大司馬得大司馬則能擇良將飭武備其禦之也不在彎弧鳴鏑後矣而必謂籌邊無上策者是猥以後世之事言之者也又焉知帝王者之為策曰帝王者為策何如曰不策于策而策于道夫唯策于道者治未然把翁曰不聞宋仁宗時有張吳二士者負縱橫才不事干謁而規禮聘其作詩有踏破賀蘭掃清西海之句韓范守邊咸狂視之異時二士刻詩石上灑泣過市二帥竟弗之省二士無所適遂亡走西夏易名張元吳昊觸夏主諱聳其聽聞夏國收為謀主𫝑日強大關右震懼遂不可制韓公時為四路招討駐兵延安忽夜有人持匕首入卧曰某西夏張相公遣取相公頭不忍加刃第取金帶去蓋宋君臣之用人狹矣談子曰孔子曽子豈非所謂前知者耶孔子修書終秦誓曽子著大學亦以秦誓一個臣終之彼一聖一賢豈皆知秦之繼周者耶不然何偕取于秦誓也洞先子曰孔曽之前知吾弗得知已然吾知秦誓一個臣之足以相天下也相天下舍此雖有善者如丙魏姚宋亦節士耳何足與于大臣之道哉曰然則後世孰為近曰韓范升其堂房玄齡遊其藩談子曰大臣之事大矣然使一個臣斷斷兮無他技而坐辦天下大事恐未可也洞先子曰子不見龍乎龍赤身耳然能以雲為輿以風為駟以霆電為徒御上下變化而雨澤天下者龍非有他技也以其體虛而用神也方龍之始潛也不患不神而患不虛惟虛無弗神矣風雲霆電之從之者役於虛也龍曷虞不辦大事也假令龍如贔屭喜能負重則技止龜趺而已如螭吻喜能望遠則技止獸首而已如蒲牢則技止鍾紐如狴犴則技止獄門叨餮技止􅀢蓋睚眥技止刀環為此者􅠶彼為彼者蹶此又安能役風雲霆電而變化雨天下哉故大臣無一技然後能用天下之技用天下之技為技猶用天下之耳目為耳目用天下之手足為手足謂一個臣不辦天下大事亦未可也不然則亦贔屭螭吻之尤而已又惡足語大臣且夫大臣學道不學技曰大臣學奚道耶曰休休是已彼休休者芚乎若愚綽乎若暇恢乎若無畔渾乎若無擇視天下人皆我人視天下耳目手足一耳目手足也我方有羡技何患無技是故大舜善與人同舍已從人樂取諸人以為善樂正子好善優于天下則善用休休者也休休已天下治矣曰然則周公多材多藝何哉曰周公有而無實而虛故曰公遜碩膚赤舄几几周公何技焉曰使天下皆為龍不為贔屭螭吻則孰為起而作事者與曰古之人臣有坐而論道者龍之徒是也有起而作事者贔屭螭吻之徒是也雖然自其修者言則不可以定擬是故有坐而論道者之道而下兼乎技則未始不可以作事也有起而作事者之技而上學乎道則未始不可以論道也是亦在乎人耳雖然世固有論道之賢而宅作事之地則稷契之分職孔子為乘田委吏繼為司冦皆是也猶曰得龍之道而任贔屭螭吻之事龍之道奚少也管子相三月請論百官桓公曰諾管仲曰升降揖讓進退習間辨辭之剛柔臣不如隰朋請立為大行墾草入邑辟土聚粟多衆盡地之利臣不如寧戚請立為大司田平原曠牧車不結轍士不旋踵鼓之而三軍之士視死如歸臣不如王子城父請立為大司馬決獄折中不殺不辜不誣無罪臣不如賓胥無請立為大司理犯君顔色進諫必忠不避死亡不撓冨貴臣不如東郭牙請立以為大諫之官於是桓公聽管仲立五子者而國大治談子曰若管仲亦幾于大臣之道者與洞先子曰管仲善用才者也加時相多也然而非知道者管仲自云君若欲治國強兵則五子者存若欲霸王夷吾在此夫管氏不知帝王大道而徒以霸王自處夸被世主之前於休休几几何啻千里管氏而知大臣之道孰不知道談子曰晉大始中劉伯玉妻段明光者性最妬伯玉一日讀洛神賦語其妻曰娶婦得如此足矣明光曰君奈何悅水神而輕我我死何患不為水神其夜乃自沈死越七日夢語伯玉曰君本願神吾今得為神矣伯玉覺遂終身不敢渡水其後有婦美者渡此津雖枉粧風浪暴起卒不得渡醜婦雖盛粧無弗渡也故稱妬婦津齊人語曰欲求好婦立在津口婦立津旁好醜自彰妬婦何其烈哉嗟夫後世不有妬臣津耶凡人臣賢者未有能涉妬津者也或曰唯大人者秉衡則無津而賢者利涉矣小説家載則天末年有益州父老賣藥城市得錢即博濟貧乏經歲餘病者得藥無不愈常時遇有識者輒告之曰人一身一國也人心帝王也旁列臟腑宰輔也外且九竅羣臣也故心病則內外不可救矣何異君亂于上臣下無不病者故凡欲身無病必先正其心不使氣索不使思彺不使嗜欲迷惑則心先無病心無病則其餘臟腑有病不難療而外九竅亦無由受病矣况藥有君有臣有佐有使故病則君先臣次然後用佐用使如失其序必自亂矣又何能救病此猶家國任人也吾老賣藥常以此為念每見愚者一身君不君臣不臣使九竅之邪恣納其病以至良醫名藥不效猶不自知悲夫父老之言指哉豈隱者耶談子曰莊子所言聖人之道聖人之才岐矣夫有其道斯有其才未有有其道而無其才有其才而無其道者也故曰岐也洞先子曰否自吾涉世而驗之世之不岐也難矣何以明之昔者漢髙武唐文皇非謂有聖人之才而無其道者與不然何其能一天下而不能與湯武齊化也衛武伯夷栁下惠非謂有聖人之道而無其才者與不然何其擅聖稱而不能與周孔比迹也若夫以聖人之才行聖人之道兼有而不岐者其惟堯舜三王契臯伊周孔子乎其次學聖人之道而近其才稷夔傳説曽子是已具聖人之才而有其道顔子子思孟子是已傳説之後程伯子近之孟子之後東越王子近之雖然古未有遠聖人之才而能大濟天下者也孔子曰才難不其然乎夫難也者難夫兼有不岐者也談子曰昔宋蔡絛著古器圖説極言當時好古風盛至元符間憲章古始眇然追唐虞之典及大觀初乃倣李公麟老古作宣和殿博古圖所藏禮器則已五百有幾故有一器值金錢數十萬後動至百萬天下冢墓破伐盡矣政和間尚方所貯至六十餘數百器已盡見三代典章而讀先儒所講説有可哂者始端州上宋成公之鍾而後得以作大晟及被諸制位於是聖朝郊廟禮樂一旦復古當是時天子尚留心政治所重唯三代之器若秦漢諸物非殊特不收及宣和後則纍至萬餘若岐陽宣和之石羈約文翁禮殿之繪像罔問巨細索入九禁有稽古博古尚古等閣咸以貯古諸鼎彛禮器及圖畫然世事則爛漫上志衰矣非復前日考驗俄遇僭亂悉入虜營若孔父子産之景行散召公季之弦辭牛鼎象首之規模龍瓿鴈燈之典雅皆以食戎馬供熾烹散滅不存中國之耻莫甚乎此言之可為於邑若是則好古非歟洞先子曰好古何可非也雖然古不在書亦不在器物宋人君不好古道而好古器物其覆國廢古也冝哉古道奚貯乎貯在人心載記在六經是故正諸心措諸事與政以敷錫生民施及蠻貊則可以坐對文武而寤寐堯舜也好古孰踰此而奚以器物為若必唐宕其心窊事與政而唯沾沾焉器物之好圖録之妍雖盡移三代禮器樂章充溢于後世之朝野亦何以别于操顔氏瓢而乞太公九府錢之譏也耶唐安樂公主嘗令尚方織百鳥毛布二匹而服之正視一色也旁視一色也影中一色也日中一色也而百鳥之狀悉見方出降時益州獻單絲碧羅裙縷金為花鳥細同絲髮大比黍米眼鼻嘴甲皆具唯瞭視者能覩之韋后效之亦集鳥獸毛為韉各肖其形貌工費為之巨萬談子曰左氏服妖之譏至是極矣洞先子曰子弗知之世有居妖則迷樓艮嶽焉極也有器妖則髮幕珠炬焉極也有文妖則風雲月露焉極也文妖胎于宋景成于枚馬盛于建安而靡于顔謝徐庾之徒自是則末士狡童第知剪綴是富而不知六經是何指也雕繢是妍而不知仁義誰何物也枚馬是師而不知孔孟誰何人也詞賦是業而不知經綸誰何事也蓋數百祀懵乎若不旭之夜其後陳叔寶江總輩當隋師壓境猶然與狎客賦詩為娛彼豈真能忘利害哉誠以淫詞蔀目而豔曲塗耳也其禍若是烈也久之王文中出天下始聞六經仁義之言而唐室以興蓋世與文交興交喪非一代矣今也復何忍崇妖辭禍斯世也或曰聖人用文乎洞先子曰文非聖人不能用也聖人用文為道與法孟子曰上無道揆下無法守道揆法守不可一日寢則文亦不可一日弛是故文者聖人所以夀道法教萬世如一日也孔子曰言之無文行之不遠蓋為教也彼能言者乃不知聖人之為教乃徒頊頊焉􅕽為文采表見于后世且曰易與春秋皆聖人發憤所為作嘻其左矣于是有不得勢則窮愁而為著書有得勢則招集遊談者而為著書咸以徼後世名彼其畔道圮法已甚後之讀者鮮不醜其德而腥其人即不醜不腥亦何足以肉枯骨血遺胔哉今之世尤喜稱詞客文人曽不知此優伶工耳優伶愈稱于人則愈工當其愈工也雖嗾之魑魅即工為魑魅嗾之犬彘即工為犬彘三尺之子鮮不詬優伶彼巍丈夫乃不自知為優伶且將決性命而蹈之其不諡曰倒置之民乎魏文帝曰文章者不朽之盛事彼其父子雖好文然畔道圯法后世所醜而腥者至也其不朽也奚在故曰文非聖人不能用也曰文有古今乎曰有曰古亦有體乎曰有然而無定體曰文猶諸人也夫人莫不橫目而𥪡鼻也文猶諸居也夫居莫不橫梁而豎棟也而謂無定體可乎曰夫人莫不橫目而豎鼻然欲朔之面肖粵之面可得乎夫居莫不橫梁而豎棟然欲秦之室肖楚之室可得乎今語人必曰肖堯之八采舜之雙瞳是古也則司命不如塑師之能語居者必曰肖楚之章臺魯之靈光是古也則般輸不如畫史之便子不知世之為古非獨優伶且將為塑為畫史二者雖極肖似而師古之精神亡矣曰然則聖人好古述而不作何哉曰聖人好古好道法也述而不作述道法也是故惟聖人之言為能傳神曰漢唐宋之言孰優曰道法暗鬱姑論其槩漢渾而蓄唐漸明鬯至宋彌昌弟子以告先生曰吾知聖人之道法已爾吾焉擇漢唐宋續問上弟子問曰昔之語物理者曰菱芡皆水物然菱寒而芡暖者以菱華背日芡華嚮日故也稻麥皆土物然稻滋而麥燥者以稻生卑濕麥生髙壤故也此其理在人乎在物乎曰子即以背向卑髙為理乎枊以别擇其背向卑髙為理乎如以背向言則向日理也而背日豈理哉夫此四者方其在背向卑髙也塊然物而已矣物各無有也及其離背向卑髙也塊然物而已矣物亦各無有也而奚理之言惟自人而理之則曰是為背向故有寒暖是為髙卑故有滋燥品而題之區而用之鮮不自人心故理在人不在物也且夫參蓍世謂補物芩連世謂泄物而內熱者則以芩連為補蘇麻世謂泄物薑桂世謂補物而氣虛者則以薑桂為泄然則補泄之理亦在人不在物也天下之草木多矣其且寒暖燥滋補泄之質奚啻此數物哉自人弗識之而品題之未加區用之弗逮則烏覩其為理哉夫點蒼之石備山水之態桂林之洞繁人禽之形苟人迹之弗至與至而弗遘者寧復有山水人禽哉是故知山木人禽之從出者則知理矣昔有國工善畫鬼者盡鬼之怪異時見而畏之以為真怪也不知其怪自已出也善畫姝者盡姝之美異時見而愛之以為真美也不知其美自已出也今之求理于物者亦何異國工之畏怪而愛美者哉然則理之不在物而在人也益明矣弟子問曰庖丁氏之解牛也曰循乎天理言循其經絡天然之理者也然則經絡不謂理乎今人恆言地理脈理腠理膚理韓非子曰理者成物之文也故人有文理今皆不謂理乎曰經絡與地理脈理腠理膚理文理此取類而言之曷不謂理哉猶之曰物情曰藥性水性金性文猶之杜子美曰岸容山意亦皆取類言之曷不謂情與性容與意哉雖然盤盂甕盎池沼江河湖海之日疇非上天之日之所括也然則經絡與地理脈理腠理膚理文理疇非人心之理之所絯也苟無人心則惡覩所謂經絡地理脈理膚理云哉曰天之髙也地之厚也苟無人焉髙厚之理不自存乎理豈盡在人哉曰苟盡無人焉則天地且荒忽久矣又焉有髙厚而况經絡地理脈理膚理云乎弟子思之三日夜復曰諒哉苟盡無人焉向無天地理孰從生蓋聞之曰人者天地之心豈謂是與曰然問殺人者必償貸債者必酬世以為償之理起殺人酬之理繫貸債不曰士師殺至十百則曷為不償父子相取至十百則曷為不酬殺而必償貸而必酬是將孰區之又孰行之此理之在人易辨矣曰若也使雞司晨使犬司夜夏葛而冬裘燕車而越舫謂理不在物則未易辨曰苟非人心則焉有晨夜又焉有雞大矧曰使司之者哉夏葛冬裘燕車越舫莫不皆然問曰理弗晰于世者以性弗明故也昔孟子獨曰性善而孔子曰性相近又有上智下愚不移之説故荀氏言性惡楊氏言善惡混韓氏言性有三品宋儒恇惑三子之言而又不能異孟子輒又曰有天地之性有氣質之性意以為天地之性即孟子所言性善是也為氣質之性即韓氏所言上中下三品是也又有言孔子所稱性相近者謂中人孟子所稱善者謂上智荀氏所稱惡者謂下愚是皆不能出韓氏之説也其果然與曰孟子言性善非好言也孟子蓋試諸孩提與見孺子入井觳觫不忍者而知人性之必善也孟子豈好言哉書曰若有恆性若性有善惡不一則烏覩其恆哉孔子繫易曰繼之者善成之者性孔子未嘗言性有不一也又曰成性存存道義之門若性有不一則道義曷從生哉其所云性相近正以其善相近耳聖人辭多不迫類如此中庸言道不遠人豈道與人相去有里許哉言道不外人身也孔子又曰人之生也直直即善也孔子曷嘗不言性善哉所謂上智下愚乃承習相遠而言子思曰天命之謂性率性之謂道若性有善惡不一則天命亦有不一而人之率之又烏得謂道哉三子之言皆不達相近之語而多以氣質與習成者言之非言性本然也竊嘗驗之使人性不善則天下父子不相保久矣雖有禮樂刑政奚為哉小人見君子而厭然盜跖覩孝子不忍加害是孰使然哉夫貪者能言亷亂者能言治苟非性善則奚知亷與治而言之然而終為貪與亂者則氣質習俗移也人性賦于氣質猶清泉出于土沙既久為泥淖則有貪無亷有亂無治矣氣質與物相物者起于欲也故曰感於物而動性之欲也言性動於欲猶清泉久而為泥淖也陸賈曰天地生人以禮義之性人能察已所以受命則順謂之道自子思孟子以後吾以陸賈為知言矣且夫氣者隂陽五行錯雜不一者也二五之氣成質為形而性宅焉性者即維天之命所以宰隂陽五行者也在天為命在人為性而統于心故言心即言性猶言水即言泉也泉無弗清後雖汩于泥淖澄之則清復矣性無弗善後雖汩于氣質存之則善復矣由是觀之性自性氣質自氣質又烏有氣質之性哉且古未聞有兩性也性之文從心從生今夫物斃矣其質猶存而生奚在刲鱉入沸蕩矣而一足在器者猶動其氣猶存而生奚在然則謂氣質有性者貿也亦舛也又有言曰由太虛有天之名合虛與氣有性之名合性與知覺有心之名嗟夫吾不知當時誰為之合也且虛安在也而能令之與氣合矧虛與氣皆非有知覺物也而能令之與氣相合為性則性亦甚哉其頑不靈者也又烏取其為善哉又合性與知覺則性與知覺特若狼狽相倚矣其可通乎是則人心所貯有虛與氣有知覺三物焉其又可通乎仁義禮智惻隱羞惡辭讓是非謂為虛乎謂為氣乎謂為知覺乎此皆未可通然則性與知覺奚分曰覺即性也曰然則有淫知惡覺者何也曰是泉之汩於泥淖者也而泉之本清固自若也故曰澄之則清復亦猶覺之汩于氣質習俗也而覺之本善固自若也故曰存之則善復是故性善與性相近一語也而好言者自異之也子又奚疑理為問曰世儒決言人心之無理大患不知性而其端尤在不信心彼以為心不過知覺知覺者虛而屬諸人也虛則理非所出屬諸人則所發必私故當即物窮理而後能無私以合乎天是不但于心外求理亦且于心外求天蓋不免昔人疑泉之説昔有疑泉者謂泉虛竇也安得有水此必有汲江海而注之者不然何若是其汩汩混混也乃不知泉竇虛而水斯出雖江海之水千條萬𣲖疇非泉也其疑之者見江海不見泉故也亦猶覺體虛而理斯出雖萬物之理千變萬化疇非覺也其詆之者信萬物不信覺故也且夫人承帝降之𠂻天命之性故能為萬物之靈唯靈則能為惻隱羞惡辭讓是非而萬理皆備必如世儒之説則人心不當有惻隱羞惡辭讓是非而孩提之愛敬與夫見孺子入井之怵惕見牛觳觫之不忍皆當為誣矣世儒朝夕所運皆心即古禮亦古人之心為之考古禮亦心考之即人能無私而合天咸以心揆而決之曰吾當為而無私而合天蓋惟合吾之本心即為無私即為合天非物能詔之無私合天也然則心者無私之宰而合天之符者也今世儒反謂心虛不能無私而理非所出是所謂疑泉者也故曰其端在不信心異時以告先生曰疑泉似矣而未近也吾以為今之不信心者猶自疑其身曰是身是我身乎猶自疑其名曰是名果我名乎猶自疑其祖父曰是祖父果我祖父乎然則身與名與祖父皆當求諸物理而後信之可歟弟子問曰吾有知乎哉豫欲無言幸矣出孔子也苟出今之世則必斥曰是言語道斷者也神以知來至誠之道可以前知幸矣出易繫中庸也苟出今之世則必斥曰是慧光神通者也盡信書不如無書幸矣出孟子也苟出今之世則必斥曰是不立文字者也夫今之世之斥之也雖孔子子思孟子曷辭曰然問劉歆曰夫子沒而微言絶七十子卒而大義乖夫果有微言大義哉曰自六經四子莫不有微言大義詩書語孟大義悉于微言易繫中庸微言詳於大義故由大義可以升堂由微言可以入室今也學不達微言而反以謷訾之是猶欲入室而自閉之門夫弟子問曰荀卿曰人性偽又曰性惡始未嘗不訝之及讀其書曰草木有氣而無知禽獸有氣有知而無義人心有氣有知而有義若是則人性未始惡也荀卿之言不自背矣乎若世儒必謂人心無理是何别于荀卿之性惡哉雖然荀卿猶知人心有義而世儒不云然也世儒亦愎矣哉先生曰然曰若是則子所謂螻蟻虎狼之有君臣父子又何以哉曰禽獸有有知無義者有有知有義而弗全者人心得其全者也故理莫備人心理備者性全者也故曰天地之性人為貴曷以物理為渭南南大夫謂胡子曰昔豫伯大夫告馬少卿曰知行一也唯行乃為真知馬君曰今夫水溺人火燎人孰不知之亦豈必身經溺燎而後為真知哉伯大夫未有以應也子則謂何胡子亦未有以應也有坐客曰古人有身親經虎者見談虎而色變此出于真知固也然亦有不必盡然者此不可定擬也已而一客傳郭黃門使琉球録羣披誦之見録稱今琉球與杜氏通典載盡異或曰杜氏年久遠與今異者冝也已而又讀星槎勝覽亦多異勝覽載其國山形合抱有翠麗大﨑之髙聳今録稱無之載田沃榖盛今稱則沙礫而不碩載氣候常熱今稱雨過遽涼而亦有霜雪載造酒以甘蔗今稱以水漬米而謂之米竒其它不合者更夥勝覽所載出本朝永樂間今去尚遠乃不合如此自非郭君親厯而目較之鮮不以勝覽者為是也然則不躬行而云真知者豈不誤哉即若吾黨今皆身履蜀地故知蜀國之事雖然亦猶有不盡知者彼由灔澦入者而談劒閣則為夢劒閣語也由劒閣至者而談灔澦則為夢灔澦語也然則今郭君録者其不為夢語矣胡子謂南大夫曰善乎哉其言知行者也大夫曰其若溺燎之辨何胡子曰夫人者雖未身經溺也然日有溺者矣故知溺為真雖未身經燎也然日有燎者矣故知燎為真且水火昕夕庸之耳目逮之安得不為真知其它未庸未逮而必曰知之皆夢知也即若兹堂也吾與子升其中然後真知斯堂之景物彼在外者縱工考訊亦徒想像已耳吾與子若久居斯堂則所知尤詳若遂有而主之則何啻詳也而且忘所為知矣故謂知為行始行為知終可也謂真行即知真知即行亦可也彼必謂知行異者夢語也哉想像也哉南大夫曰夫升斯堂而知其景物者知及者也久居斯堂而遂主之終與堂而相忘者仁守者也知行一而仁智亦一也弟子曰允哉諸君子之言一也雖然易繫有言曰百姓日用而不知彼日用則行矣而又不知何也曰百姓雖日用之然而冥行多矣非真行也然則何以為真行曰真知則無不行真行則無不知客有與先生論學者曰學在行事先生曰然行事在存心異日復論曰學在修身先生曰然然修身在正心弟子曰請竟其旨曰學固在行事矣然生于其心害于其事則謂何故學在存心學固在修身矣然心不在焉視而不見聽而不聞食而不知其味則謂何故在正心問理一分殊宋儒語之審矣苟非有分殊鮮不入墨氏兼愛乎子弗之然何耶曰非無分殊也謂分殊即所以為理也夫理條理也唯其條理固無不一亦無不殊今以理一分殊對舉言之似乎理與分為二物理不可以分言言分不可以理言也一與殊為二事一者不復能殊殊者不復能一也其旨岐矣故不若曰一本萬殊則渾而未嘗不析問曰古之君子多謗何也曰古今唯鄉願則無謗若聖與賢謗未始不相踵也子不觀之舜與伊尹皆大聖既去千餘嵗而舜有臣父之譏尹有要君之議况其它乎歐陽永叔好修而中媾為誚程正叔篤行而五鬼是詆自孟子至于宋亦千餘嵗也而李泰伯猶譏之曰孟軻之欲為佐命何其躁也然則聖賢謗滋多矣曰古人謂止謗莫如自修然乎曰謗焉能止哉且夫自修非故為謗也為止謗而修匪真修矣今夫食而欲飽者非謂避枵譏也是故君子遁世無悶不見是而無悶其要在于識已問曰今之學者有欲冒毁以直達性命之真即令此生叢謗于身埋沒一世迄弗之恤是則性真可以覿體其果然乎曰然非也夫君子之欲復其性真固不知前有譽而趍之後有毁而避之若欲冒毁以達性真是前後皆意之矣非真體也君子即有不得已蒙世之大詬固皆付諸無意而天下後世亦未嘗不終諒其心精也且夫天下至大矣湯武以放伐得之而人莫不知其非弋取也奔婦至穢也下惠不辭而內諸室而人莫不知其非為淫也叛逆至不韙矣夫子一聞召而即欲往而人莫不知其不磷而不緇也何者以人心至神故也若謂君子必埋沒一世終黯墨而不白則子思所謂言而民莫不信行而民莫不悅百世俟聖人不惑者為誕誣矣此必不然也雖然君子固意也續問下問曰子言續書考古特學之一事然考古莫首六經六經之旨浩穰豈皆語心哉曰六經雖浩而其大旨則有歸且夫六經首易易首乾其言乾元亨利貞豈在外哉文言曰元者善之長亨者嘉之會利者義之和貞者事之幹舍人心則疇見其長善嘉會和義幹事也未至于乾者則其功自復始而要必以占占也者占諸其心視諸其履而以考祥焉非必盡在蓍策間也亦非盡如世人之避凶而奔吉也故孔子譏無恆者曰不占占之時用大矣哉古之善占者莫如顔子顔子有不善未嘗不知知之未嘗復行此幾占也唯幾占則由復可以至乾此所謂吉之先見者也言有吉無凶也使家國天下而皆以幾占則豈復有亂且亡哉此易大旨也書之大旨則首精一執中精者即所謂幾占者也幾占則不雜不雜則可以不二而能執中其後建中建極之訓皆不出此此書大旨也詩之大旨在思無邪禮之大旨在毋不敬春秋大旨在誅心誅心者誅其未嘗心占者也故六經傳心之大經也疇謂六經不語心哉曰陸子言六經注腳過矣曰使我占諸心果能精一執中無邪而常敬則雖曰六經注我可也使如世之違心以求經違經以求物理則六經與我不相為又何注腳與不注腳之議問乾坤果屬天地乎抑屬人乎曰乾坤者其義為健順其變化為易其實體即隂陽天地人三才莫不由乾坤以生莫不各有乾坤非謂乾即為天坤即為地也故有言天地之乾坤者有言人之乾坤者伏羲畫卦專為人事故易首言乾元亨利貞自初九以下取象于龍坤元亨利牝馬之貞自初六以下取象于馬皆自人事言之自此六十四卦莫非乾坤莫非言人事其間有言天地之乾坤者咸取象以為證繫辭之傳錯言天地人三才其終歸于人事唯善玩者通之善占者得之説卦乾天也故稱乎父坤地也故稱乎母蓋言乾坤為衆卦之父母乾為天言乾所以為天坤為地言坤所以為地咸非謂乾即為天坤即為地也注疏以乾即為天坤即為地者非問學以聚之奚為聚曰聚即凝聚之謂非劈積而聚之之謂也傳曰敬德之聚又曰苟不至德至道不凝凝聚之功大矣哉問天地人三才皆由乾坤以生然作易者獨歸人事曰彌綸曰範圍曰成能曰成位乎中則人者管天地矣夫天地至大也人至藐也而人管焉何哉曰天地人莫不由乾坤生而發竅則在人心是故人心乾坤之大目也故易即人心也非人心則疇為彌綸疇為範圍疇為成能而位乎中作易者蓋曰直陳則膚矣是故擬諸形容象其物冝上稽天地而下托于蓍策欲人反諸心而自得之其要存乎幾其次存乎介又次存乎悔幾無悔也故曰易者所以極深而研幾也後世不信人心而獨信物故大天地而藐夫人非作易者本旨也問先天而天不違豈所謂無極而太極者為先天耶曰然曰老子曰有物混成先天地生莊子曰長於上古而不為老在六極之先而不為髙此皆語先天也然則夫人孰得與之曰先天而人弗與則聖人何以能先天而天不違後天而奉天時耶今夫人心莫不有本然未發之中即先天也即夫人之無極而太極者也有本然發而中節之和即後天也即夫人之隂陽五行者也匪先天則後天靡所宰匪後天則先天為幻矣是故聖人致中和則先而非先也後而非後也一而已矣若夫二氏則先先天而後後天其失則偏雖然老莊所言先天亦未嘗不在人也吁哉古今知先天者蓋無幾矣問艮其背不獲其身行其庭不見其人何謂也曰陸子靜無我無物之訓雖聖莫易也曰未達曰夫人語身而止于背則身為全矣而反不獲其身非果無身也吾心固無我也語人而行於庭則人必多矣而反不見其人非果無人也吾心固無物也曰艮其背止其所者何也曰唯艮背而不獲身夫斯以止其所問同人于宗為吝于郊為無咎至于野乃為亨不幾于兼愛乎曰此正示一體之為仁也夫于野則雖九州之外靡所限矣所謂天下一家中國一人是矣故惟有是心也而時于宗焉則不為吝有是心也而時于郊焉則不止無咎矣曰其間重輕緩急差等可無辨乎曰一體豈能無差等乎今人自視元首心腑為重為急視手足毛髮為輕為緩可謂差等之至而一體之心未嘗輟也故惟一體則統同未嘗不辨異辨異未嘗不統同乃天也匪人也故曰禮所生也與墨子兼愛敻矣問洗心退藏于密何謂也曰夫人心本有易焉本無思也無為也寂然不動感而遂通天下之故蓍卦之德與六爻之動一無思無為而已夫斯以員而神方以知易以貢而吉凶出焉此豈人力也哉聖人以此本然無思無為之體而洗心退藏至于知識不作聲臭俱無虛而自靈故亦能知來藏往固有不蓍而神不卦而知不爻而貢吉凶與民同患者出焉中庸曰至誠之道可以前知故前知必啓于至誠而通于無思無為之體亦豈以推測億度為哉若謂由於燭理不免於測度而愈蔽其天矣未有能前知者也曰昔先儒深辨以心察心一語至比於以口囁口以目視目之繆則洗心似亦非也乃不知口目有形者也物也故以囁以視而不可得心無形者也神也故以心洗心而自藏于密奚不可哉是故江漢以濯秋陽以暴至于皓皓則無思無為之體復矣問惟精惟一先生固以不雜不二訓之夫不雜則靡有二之者矣而又何待於惟一乎曰一難言也夫道心至於不雜精矣然亦或有重內而輕外喜靜而厭動者是二之也至於靜無動有則皆不免於二之夫學雖精然有內外動靜有無之二見則一為難也記曰其為物不二則其生物不測不二而生猶一而貫也非如今人所言一理貫萬事之謂也問曰古未始言中而堯言之未始言微言精而舜言之未始言止言幾而禹言之未始言性言禮義而湯言之未始專言一而伊尹言之未始言學而傅説言之未始言皇極而箕子言之未始言明德而康誥言之未始言覺而衛武公言之未始言仁言誠言理而孔子言之未始言至善而曽子言之未始言中和言中庸言篤恭而子思言之未始言浩然之氣言良知良能而孟子言之曷為其言之不一也曰言雖不一莫不知其出人心故自傅説而上傅説視之古也其曰學于古訓學此而已自孔子而上孔子視之古也其曰好古敏求求此而已後世則捨此以博物為好古已而專求物理則古非古矣嗟夫問上帝有諸曰苟無上帝則乾坤毁而天地萬物息矣夫上帝天地萬物之真宰也詩書孔孟之語上帝也悉矣豈訛言哉小心翼翼昭事上帝敢不勉夫問鬼神有諸曰苟無鬼神則上帝亦虛器矣夫在天之日月星辰風雲雷雨在地之山川海嶽五方八蠟莫不各有神祗故國家莫不各有祀典書曰禋于六宗望于山川遍於羣神詩曰靡神不舉靡愛斯牲夫豈虞周聖人知其無神而繆為崇祀哉孔子曰曽謂泰山不如林放則泰山之有神明矣迎貓迎虎皆有神其他者安得謂之無神但君子當自盡人事行求無負敬鬼神而遠之不可諂瀆以自為戾故曰國將興聽於人國將亡聽于神子不語神貴盡人也非謂無神也若夫鬼則易繫遊魂之説已著之矣人之逝始有招繼有靈帛末有主嵗時有祀欲其魂得所依也子産曰鬼有所歸乃不為厲亦非為漫也記曰人死則魄降於地其魂氣無不之夫曰無不之則非可以窮詰髙者如詩所謂於昭于天在帝左右次者如蘇氏所謂幽為鬼神而明復為人其下則如賈誼所謂忽然為人化為異物凡此皆繫於其所習故君子不可罔生老子曰死而不亡莊子曰無情死又曰火傳此皆有深者未可槩以其學而廢之也曰若是則輪回之説亦有之矣曰輪回吾未敢言然嘗觀史稱羊祜先為李氏子唐時如房琯顧非熊宋時如蘇軾真德秀諸君子之事而宋史載王貞婦之事尤竒近時聞見頗不鮮豈盡誣哉大要體魄有形有質者固常以聚散為有無性靈無聲無臭者詎當以生死成聚散哉但性靈因所習為變則不可知耳在吾儒苟人人如文王人人不罔生則自不至于此惟佛氏乃盡棄倫物而專力超之佛氏非欲趍輪回規再生利也今儒者攻佛氏輒謂其欲規再生利益則不能中其病矣曰佛氏之病奚在曰佛氏病在于專力超輪回而盡棄倫物者也問夫子語詩曰多識鳥獸草木之名豈盡遺物哉曰聖人非獨不遺物而已也且欲盡物之性而後吾性始盡若遺物則二之矣非聖人之學也雖然物有本末而知本先焉蓋夫子教人學詩莫先於興興者興於善即思無邪是也故曰可以興其末乃有多識之訓亦猶行有餘力則以學文之意非謂先以多識為窮理之事也且言多識其名亦非謂多識其理也夫子之教其本末不昭昭哉夫多識鳥獸草木古之人未嘗廢如堯嘗取華蟲火藻以作服伊尹嘗取湯液本草以教醫此皆盡性餘事而堯與伊尹之本務不在是也若專以多識鳥獸草木為窮理事則後世若張華陶𢎞景假成式輩當度越顔閔矣必不然也問曰今人語詩謂賦物詠情爾已不知古之語學其簡徑而明辨者尤莫如詩曰不顯亦臨無射亦保曰相在爾室尚不愧於屋漏即慎獨是也曰無然畔援無然歆羡即無欲是也曰於緝熙敬止曰有覺德行即明明德是也曰思無邪即正心誠意是也曰殫厥心曰秉心塞淵即盡心是也不大聲以色不長夏以革不識不知順帝之則即無意必固我從心不踰矩是也天生蒸民有物有則即形色天性是也民之秉彛好是懿德即可欲之謂善是也古今語學不煩辭説其孰踰是然而今之作詩者率嫌心性而違問學則何如曰今之語學者且嫌而違之矣作詩者曷責為問禮曰禮自中出根于心孔子曰人而不仁如禮何言不仁者失其本心則禮不為用是故禮非自外至者曰禮者制自先王三千三百條貫匪一今也槩求之心則將入於空疏而先王意荒矣世之譏曰是區區心學者且將有齋戒而無盛服有恂栗而無威儀有廣大髙明而無精微中庸其終不可言崇禮不可語于先王之道曰是不然且子以為先王之禮果天降地出乎抑自其心而制之乎子不聞昔宰我欲短喪孔子不汲汲曰先王之禮不可廢也而獨啓曰食夫稻衣夫錦於女安乎女安則為之然則三年之喪自人心之弗安者制之也非自外至也夷子從薄葬孟子不汲汲曰先王之禮不可廢也而獨詔之曰蓋上世嘗有不葬其親者矣他日過而視之其顙有泚其泚也非為人泚中心達于面目然則厚葬之道自人心之有泚者制之也非自外至也記禮者曰自中出根於心然則先王之禮三千三百蔑不自人心矣孰謂心學不可崇禮而反違先王哉曰聞之禮本太一分為天地轉為隂陽變為四時列為鬼神則果自心乎曰子又不聞人者天地之德隂陽之交鬼神之會五行之秀氣也然則太一天地隂陽四時鬼神之理固皆萃人心矣故惟人心敬而無失則以人而官天地和隂陽儐鬼神序四時用五事無不至也豈自外至哉今之心學即毋不敬是也既毋不敬矣孰謂齋明而不知盛服恂栗而終無威儀廣大髙明而不能精微中庸者哉曰禮有器有數有文有義可弗知乎曰是何可廢因其時位勿之有慢焉爾矣將周知之乎曰籩豆之事則有司存問曰昔子桑户死孟子反琴張倚尸而歌子貢譏之二子嘆曰是惡知禮意漢戴良曰禮所以制情佚也情苟不佚何禮之論阮籍曰禮豈為我設哉而邵堯夫詩亦云然然則意與情無佚也而禮可間乎曰禮何可間也禮雖有本有文然而無內外無常變靈則行焉者也故未有內不佚而外故自佚者也昔子桑伯子不衣冠夫子譏其欲同人道於牛馬夫不衣冠何遽至牛馬哉然而裸泄不已則尤之至于踰垣之繆箕踞不已則尤之至于張蹶之狂此亂所由生也奚啻牛馬哉故不仁則不可以為禮而去禮則不仁甚矣故孔子言復禮則萬物得所而天下歸仁乃知仁禮非二物也然則禮豈可以內外異而斯須去哉唯後世不知禮之出于靈則一切殉於其外則徒是古而非今膠此而遺彼溺器數而盛聲容禮之本槩失而文亦非故老子詆其忠信之薄然而非禮之本然也近有士焉父子議禮而爭至失色反唇者其子猶忿然曰我禮是也夫父子失色反唇而猶曰禮是焉嗚呼此今之所謂禮則亦非禮之本然也夫禮之本然則內外本末何可間也問樂曰樂音之起由人心生而其道主於和此世所共知也雖然不節則不可以和故有禮而後有樂曰律所以和聲也古樂不作由千百年律吕之制不明清濁髙下失所凖故屢興而屢廢其至則苟焉成聲爾已不知當曷以制律返古也曰人心有自然之節得其節證諸器數可以制禮人心有自然之和得其和證諸律吕可以作樂非謂禮先在器數樂先在律吕也今夫燕秦之音悲壯吳越之音柔婉質使然也若仍其悲壯之質而求柔婉仍其柔婉之質而求悲壯則雖有律吕而不可為矣是故君子必先有陶化氣質之方而後和可得和可得而後律可制矣曰和者均可治律吕乎曰均是人而有和不和均是和也而有能不能非和則雖能者不調非能則雖和者不治苟和矣天下豈無有能者出其間乎而又何憂吾獨憂夫人心之莫由和也是故君子陶化氣質之方則莫若以學學之莫若以慎獨而致中和其次則先盡去天下妖淫之曲與忿厲之詞而後人心節節故和也夫妖淫忿厲古之謂夷風夷風之侵人肌髓不啻鴆毒不去則終不可以正樂故柄化者必重禁而烈燼之慎毋若管仲曰酒色不害伯也孔子不云放鄭聲鄭聲淫問中心安仁天下果一人而已乎曰非也言中心安仁則視天下之人即我視我即天下之人故曰一人所謂一體是也若孔子謂止于一人則亦非安仁者語矣故又曰大人耐以天下為一家中國為一人非意之也曰耐曰非意則即安仁之謂也問曰人能𢎞道非道𢎞人道豈無用之物哉曰夫人能靈萬物參三才者以有覺也充其覺則無往非道是謂𢎞道非曰人身之外别有一道而可以𢎞人也故曰非道𢎞人記曰道不遠人傳曰成性存存道義之門可見道在人身非謂道無用也問何事於仁先儒謂何止於仁信乎曰施者以物與人之謂也博者廣與之謂也子貢以此為仁之事夫子謂此何事於仁哉蓋言此非從事於仁之意若以博施為事於仁必也聖如堯舜而猶病不能矣其辭意亦非抑仁而揚聖也若抑仁則下文又何以專言仁若揚聖則不當以堯舜之聖為病也大意不在以博施為事而當以一體為心已立立人已達達人乃得其本然一體之心則不必博施而自無不博矣其次能近取辟亦惟諸已而已矣又何事以博施為問中人以上可以語上中人以下不可以語上是孔子之教人有序固如此也今也不顧中下而槩語以心性此與孔子循序之教其終協乎曰吾於六錮詔之矣曰未達曰今也誠有中人以下者問於子子且語之以物理乎抑以心性乎若語以物理則大而天地幽而鬼神散而萬事萬物求其所當然與其所以然窮髙測深蓋頃暫而馳千里撫六合者數矣是為語上乎語下乎有序乎無序乎曰是未可言序也然則當何以語之曰中下者正當語之以收放心約其情合於性焉可也夫心性在上智不增在下愚不損愚不肖可以與知與能者此也非當以心性獨為語上也故有語中下者曰斂爾身心約爾性情則雖窮竒未有不瞿然而反顧至告以物理則茫乎莫之索矣何則物理遠而心性近也孰謂心性為非序哉曰若是則語上語下何謂也曰學之不明則上下之序不明久矣古者自十五而入大學大學之道先明明德非致力心性乎大學豈槩語人以上而失之紊乎乃不知古之人舍心性無為學故凡致力于心性者均謂之下學几得力于心性者均謂之上達若中下者方其求明明德也而遽示之以止至善則為不顧其安而槩以得力者語之不免致其狂惑之非是果為無序之失矣非當以心性而獨為語上也雖然明明德之中又有序焉苟方其致知格物也而遽語以知止方其求知止也而遽語定靜安方其求定靜安也而遽以能慮與能得凡此皆謂之失序然則致力心性者之為序不尤為次第乎若也窮至物理則所謂未能定靜安而遽語慮與得也不以是為失序而反謂心性為非序不亦左乎曰今者之學誤在格物終何以明曰大學上文曰物有本末下文曰格物言知本也本豈在外哉故其傳曰此謂知本此謂知之至也是經文初無不明而世儒乃增言物理而補竄傳義及泛濫而不得也乃始贄以居敬之説夫居敬則又非以心性為先乎大抵學既不明則序亦不明復何説之辭弟子悟曰諒哉所謂未能定靜安而遽言能慮猶之未磨鏡而先照物未平衡而先稱物失其序矣曰吾與子皆中人吾語子以序也請自求放心始問曰人之生也直仁遠乎哉我欲仁斯仁至矣此孔子語性善也曰然問曰孔子言自十五志學至七十從心不踰矩孟子言自可欲之善至聖不可知此序之大較也序之中又有序焉蓋不可以悉數者矣曰然問孔子於仲弓原憲猶不許仁而許管仲之仁何也曰孔子未嘗許管仲也吾聞諸鄒先生曰子貢問召忽死之管仲不死曰未仁乎是明言管仲不如召忽之仁也故夫子舉其功而答曰如其仁言亦如召忽之仁而已非誠以管仲為仁也故未有一體之心則雖如召忽之死管仲之功皆未可語仁而况不如召忽管仲者乎曰無意必固我夫子所以為空空也然又曰誠意則何如曰意者作而致之者也有作則罔而不誠故不作于意以事親則誠孝不作于意以事君則誠忠是母意乃誠意也然則何以驗之曰孩提知愛知敬見孺子入井而怵惕見牛觳觫而不忍寧待作于意乎其泚也非為人泚中心達于面目寧待作于意乎然而莫非誠者此也曰存心非意耶曰存者存其不作者而已矣有作不可言存繫曰成性存存道義之門蓋存而非意者也曰古也以無意必固我求之今也反欲以意必固我求之此古今學術之大介也曰然問天命之性果兼物乎曰物非無性也而人為全若中庸所言天命之性則專屬人未始兼物也故下即言率性言修道豈物能率性修道哉書曰維皇上帝降𠂻下民若有恆性言下民則亦未兼物也是故率性修道盡人物天地之性者其責在人問中庸首章自修道以下不復言性何也曰獨知即性也中即獨知之未發者也和即獨知之發而中節者也曰發與未發異乎曰發與未發時也而獨知則一而已辟之鏡焉未有物之先鏡炯然者無增也既有物之後鏡炯然者無減也故未發而謂之中中即和也發而中節謂之和和即中也無有內外無有動靜無有先後故曰未應不是先已應不是後何者性一故也然則求喜怒哀樂未發以前氣象則何如曰豈獨未發時無氣象即已發時亦無氣象有氣象者是意想方所為之也而况其求之有先後乎此則意象紛紜辟諸皎日而加以燈炬無論未發已發皆非其真體矣曰然則養其未發以為發而中節之基可乎曰猶二之也夫致中和者固不能離和為中離中為和也問獨知自朱子言之然嘗考而證焉易復卦之翼曰有不善未嘗不知知之未嘗復行又曰復以自知孔子誨由曰知之為知之不知為不知是知也則古之語獨知也審矣曰豈惟是向所謂中所謂帝則皇極所謂矩所謂靈則舍是奚取則哉詩曰不愧屋漏曽子曰自慊子思曰內省不疚孟子曰行有不慊于心皆獨知之始功也百姓日用疇非此然而不自致其知故君子之道鮮使致其知則君子矣雖然世之言獨知者類皆以念慮之始動者當之是亦未致其知者也曰獨知何如曰夫獨知者宰夫念慮而不以念慮著貫乎動靜而不以動靜殊也唯得於幾先者惟能慎獨問世儒語獨知者謂專屬於已發而子獨無分于未發已發無分于動靜先後而且以鏡喻明矣然弟子猶未釋然于世儒之説也則謂何曰子試觀于未發之前果皆𡨕然無覺而已乎抑尚有炯然不昧者存也冥冥之中常見曉焉蒙莊尚能言之而世儒忽焉何也子思既曰莫見莫顯而又曰隱曰微則謂獨知專屬已發豈其然乎曰嘗觀鏡之明雖十襲之而照之用如故雖百照之而明之體如故明鏡不以照不照異則獨知誠不以發不發分也曰鏡唯蝕焉則無論已發即未發亦非其體矣故學者慎獨則可以無自蝕矣慎之義猶慎固封守之謂功在幾先于時保之者是也若曰必待動念於善惡而後慎之則不慎多矣曰獨知即良知乎曰獨知固有誠而無偽也非良而何曰或謂良知必用靜與無欲何如曰言用則二也夫良知本靜也本無欲也靜與無欲皆以致吾良知之本然者也而奚以用為問世多以鳶魚為上下察其與君子費隱之道何與哉曰此正所謂遠人以為道者也夫中庸本語率性之道率性孰踰聖人其次莫如君子故于是曰君子之道曰大哉聖人之道皆不遠人以為道者也今以鳶飛于上者為道之上察魚躍于下者為道之下察則不但無與于君子之身且鳶魚之外所遺者多矣曷足以見道之費隱哉蓋子思言君子之道其具于心而率于性不可睹聞者為隱其率於性而見于倫物可暏聞者為費是費而隱者雖愚不肖之夫婦可以與知與能者即性也即孩提知愛知敬之類是也非止居室之間而已也蓋此與知與能在愚不肖不為損在聖人天地不為加故充其量之所極究其責之所在誠有聖人所不知不能而天地猶有遺憾者焉可見此道雖至隱而其費則無不至鳶飛戾天自人語之鳶之飛也而不知吾與知與能者之察于上者也魚躍于淵自人語之魚之躍也而不知吾與知與能者之察于下者也故是道也造端乎夫婦之與知與能而其至則察乎上下以際于天地此子思語君子之道本如是也奈何訓者必外君子之身而專求天地以及羣物不果遠於人乎且鳶之飛魚之躍雖曰無心然不過為形氣驅之使然非鳶魚能一一循乎道也即如蛙之鳴蟬之噪皆氣使然也豈道之謂哉曰鳶魚既非道然在記者又曷以風雨露雷為教而莊子亦曰道在稊稗在瓦礫然則彼皆非與曰風雨露雷稊稗瓦石何莫而非與知與能者之所察何莫而非吾率性之道之所至也夫既為率性之道之所至則孟子所謂萬物皆備大程子所謂天地之用即我之用是矣何但曰鳶魚即道而已哉又何但曰風雨露雷稊稗瓦石即道而已哉若必謂天地萬物皆有道而人獨無道則何以稱曰君子之道故曰道不遠人人之為道而遠人不可以為道問尊德性道問學果一乎曰大哉聖人之道具諸德性見諸倫物隨處充滿洋洋乎發育峻極優優乎三千三百其本也廣大精微髙明中庸則故而已矣學之者苟非德性之至又何能凝此大道故君子必以尊德性為主然非道問學則德性莫之尊矣廣大精微髙明中庸則皆尊德性事致之盡之極之道之則皆道問學事非有二也如是則吾所故有者溫矣能溫故則日新又新而大德敦化始足以崇三千三百之禮而道于是凝矣然則聖人之道不外德性昭然可見又豈德性之外别有道問學哉夫惟崇禮故能居上不驕為下不倍有道足興無道足容皆道德之至自然而然者固如此非有二也問勿正勿忘勿助曰正心之弊程伯子以為擬心之差是矣然忘非怠忘也夫既必有事則自不至怠忘蓋世有以坐忘為功者矣故言勿忘助者言未剛而強為之剛未大而強為之大有若周恭叔之擺脫者則自賊其根矣故類揠苗惟勿正勿忘勿助則心得其體而行無不慊矣是曰集義問曰子言性一也吾儒與二氏異者在盡與不盡之間曷言乎其盡也曰盡之義即親喪自盡之盡所謂知明處當無所不用其極者是也唯盡則莫先于盡倫其次盡制由盡倫盡制至于盡物盡天地然後吾性始盡孟子又曰盡其心盡心即盡性後儒訓盡心為窮物理遠矣二氏止明心未嘗盡心止見性未嘗盡性夫斯以逃倫棄物而不返也故曰在盡與不盡之間然聖人雖曰常盡亦若太虛浮雲然其歸無不空空問存心養性有二功乎曰無二功也性者心之體當其放心必加操存故曰存心存久自明性靈著矣則當以㴠養為功故曰養性存者存於既放之後養者養於既存之餘但有生熟淺深之異耳非心性有二體存養有二功也問良知不慮而知曷為又言慮良能不學而能曷為又有學曰慮者慮乎其所不慮者也學者學乎其所不學者也慮而後復其不慮之體則以不慮慮而莫非良知矣學而復其不學之體則以不學學而莫非良能矣問萬物既皆備矣何待反身而誠而後能樂曰萬物之理雖備人心然動於欲而有不誠則自失其理而弗之慊矣烏能樂故必反歸于誠而理既足則自慊而樂矣如為子而能誠則孝之理慊為弟而能誠則弟之理慊寧有弗樂乎曰強恕何以能求仁曰萬物之理備于人心仁體固然者也惟如心則亦能誠而求仁近矣夫人心本欲孝也有不如其心必勉強盡孝以如其心則孝之理近本欲弟也有不如其心必勉強盡弟以如其心則弟之理近求仁豈遠乎如心即所謂慊也至于恆慊則亦無不樂矣孔子曰能近取譬已所不欲勿施于人皆勉如心義也曰若是則物理固無與也問曰子之言無欲也亟矣無欲亦豈易哉曰子必寡之以至于無可矣曰聞之淮之南之學則異是淮之南曰孔門唯言欲明明德于天下欲仁而得仁孟子言可欲之謂善未嘗言無欲也曰不然今夫人不能欲明明德于天下不能欲仁而得仁者何哉以有欲也既有欲矣而曰吾能欲明明德於天下者偽也蓋彼欲重則此欲輕勢固然也故孔子曰無欲而好仁孟子曰無欲其所不欲乃謂孔孟不言無欲不幾誣乎昔者文王上聖猶必無然畔援歆羡而後登於道岸成湯智勇猶必不邇聲色貨利而後建中於民况以今學者懷多欲之私而欲明明德於天下未有不理欲交雜而終歸於霸也然則淮之南之學則左矣雖然今之學者苟不先見無欲本體亦未能致其功也曰然則曷為能見無欲本體耶曰是非真志不可也有一弟子問曰弟子非不有志然而興仆不一若不能為特操則何如曰今之學者以意之嚮慕為志夫是以不能不興仆也昔者孔子之志於學則以憤忘食樂忘憂為功蓋志在是則功在是非曰嚮慕之而已也故學之十五年而有立也辟之有志長安者必裹足啓行以日計里始為真往長安者也若盤桓家食未有行期雖峙粻治具日訊程途則何益矣故孔子曰終日不食終夜不寢以思無益不如學也非學不可以言真志弟子曰嘗聞諸先生曰人心本在長安此又何説也曰人心無不備具無不照臨而道義由出辟諸人身本在京都苟不昏寐則不必别求長安矣蓋人惟昏寐不自著察則亦夢中長安而已故曰百姓日用不知者此也今也唯求時不昏寐又何俟裹足而後至長安乎雖然唯時不昏寐乃真裹足唯真裹足即時不昏寐可矣甚矣時不昏寐者之不易覯也有一弟子問於胡子曰先生奚學曰吾學以盡性至命為宗以存神過化為功然獨慚老未得也曰神化豈易言哉曰性也者神也神不可以意念滯故常化程伯子所謂明覺自然言存神也所謂有為應迹言過化也而今之語盡性者失之則意念纍之也曰是非弟子所能企也請下之曰以仁為宗以覺為功以萬物各得其所為量以通晝夜忘物我為驗以無聲無臭為至曰亦非所企也復請下之曰以一體為宗以獨知為體以戒懼不昧為功以恭忠敬為日履以無欲達於靈則為至曰若是則弟子敢請事矣曰是與性命神化豈有二哉第見有遲速故功有難易習有生熟要之皆非可以意念滯也雖然其惟在真志乎問曰昔者羅先生贈子有疑濓溪之語濓溪可疑乎曰濓溪何可疑也自孟子後百千年學者耳目若蒙汚墁得濓溪夫子抉之人始能張目而覩皎日故濓溪近代之祖父也吾何敢妄疑祖父哉吾獨疑太極圖説非濓溪作也吾所疑有十不可解者夫以太極既稱無極不落形體方所又何團而圖之若鏡若環然果孰覩而孰傳耶此不可解者一也大易以乾坤言隂陽取象竒偶而畫之卦可謂明矣今圖則左白而右黑之右白而左黑之隂陽果可以左右分而白黑定乎視大易不贄乎此不可解者二也説曰太極動而生陽則未動之先果何為耶亦何似耶若果有未動則當謂之靜矣是則先靜而生隂也何得謂之動而生陽抑何待生陽之後乃曰靜而生隂耶此不可解者三也且曰動極而靜靜極復動當其時二儀未分七政未立不知幾何時而為動之極也幾何時而為靜之極也昔之言天者莫如易詩與中庸易曰易有太極是生兩儀詩曰上天之載無聲無臭中庸曰其為物不二則其生物不測槩未言鴻濛之先有若是之次第也且不知動靜者果謂理耶抑謂氣耶如以理則無始無端不可以動極靜極求之若以氣則動者謂之紛擾轇轕可也而靜者常謂何狀其必凝結為塊而已此不可解者四也無極之真二五之精妙合而凝不知未合之前此精此真各置之何所又何以見其有合時耶此不可解者五也上言五行之生各一其性而下言五性感動則此五性即五行之性也此五行之屬於人果在內耶抑在外耶若謂五行之性即五常之性則何不直以五常言之不尤為明且當耶且五行各一性特其質耳於人性何與哉今言五行而不及人性此不可解者六也形既生神發知言其始也方人之始生而遽有五性之感善惡之分則人性果善惡混矣此與易繫言繼善商書言恆性大雅言秉彛孟子言性善者不大為悖耶此不可解者七也立人之道曰仁與義衆人與聖人同也聖人特先得人性同然而身為之教耳豈因人性有善惡之混而待聖人定之以中正仁義哉且周子通書但言仁義中正未嘗言中正仁義也中正仁義果可四分而列言之乎此不可解者八也其始言太極也動靜兼之今特言聖人主靜不為偏耶夫心好靜而欲擾之致虛極守靜篤此老氏家貴靜語也大學雖言定而後靜然亦不以靜為主也若聖人專於主靜則又何嫌虛無寂滅之為教耶或謂周子自注曰無欲故靜夫周子通書曰無欲則靜虛動直是周子固未嘗以無欲為靜也此不可解者九也言者曰二程子始從周子學周子手授是圖示之然考二程子立教數十年遺書數千萬言未嘗一語及圖與説也豈其師特授之而弟子特遺之與楊謝之徒豈真無一人可語者與此其尤最明顯不可解者十也豫有此十不可解故疑非濓溪作也非敢疑濓溪也豫昔在蜀時嘗著之辨蜀有固陵先生讀之嘆曰此雖周子復作不易斯語嗚呼知我罪我其在斯乎問曰昔子從遊於二先生其緒論要旨可得聞與曰豫自捾髮聞先君子論學未識從事年二十六始從歐陽先生問學聞致良知萬物一體之訓至年三十復從學羅先生羅先生訓以無欲首嚴義利之辨然豫苦質駁習深壯聞而中弛既皓始戮力而猶無得也雖然不可不為二三子舉其崖略豫少駘蕩好攻古文詞始見歐陽先生先生誨曰大人天下為度故盛德若愚塗人我師而淺中莫容摽已自賢烏能成其大者夫藝達於道故遊焉而不溺志役於藝故局焉而胥喪子曷早辨之豫聞言悚然自悔始有發憤刋落之意先生見豫嘗有疾惡之病一日謂曰仁者能好人能惡人夫好惡孰不能之何獨曰仁者能好能惡豫因請問先生曰今人非不好惡然嘗作之好作之惡則好惡反為纍是不能好惡也惟仁者得其本心而以天地萬物為一體故視人有善猶已之善雖無不好一以本心好之未嘗有加于本心而作之好也故其好無張皇之失卒不為好所纍是曰能好視人有惡猶已之惡雖無不惡一以本心惡之未嘗有加於本心而作之惡也故其惡無忿恨之失卒不為惡所纍是曰能惡且古仁人見人有惡猶有哀矜之意可以救正則救正之不可則止老子曰常善救人故無棄人今也見惡人一切忿恨不平若不墜諸淵不已是先已失仁體而墮於惡矣又何惡人之有豫時聞之憮然則欲汗背或曰曷由使人皆入於善先生曰昔者大舜隱惡而揚善此所為與人為善者也曰何謂隱惡揚善曰常人未必盡善亦未必盡不善若苟於其不善處指摘而亟攻之則人愈激為不善矣惟大舜見人不善則姑隱默未嘗遽加指摘唯於其善者發而揚之則斯人嚮善之心愈興嚮善心生則所為不善有不假詔告而潛消之矣故孟子於齊王不斥其非止即其愛牛一念言之而王遂有戚戚向善之心此亦可見與人為善之驗先生每誦曰無有作好遵王之道無有作惡遵王之路無偏無黨王道蕩蕩無黨無偏王道平平無反無側王道正直匪是不足以平天下其心休休焉其如有容人之有技若已有之人之彥聖其心好之不啻若自其口出實能容之匪是不足以用天下先生曰今之學者有二病卑者溺嗜欲髙者滯意見其不得入道均也曰意見曷生曰學不見本心故或牽文義或泥名迹此意見所由生自荀楊以至今日意見之害不鮮矣先生答羅文莊公書曰天命之真明覺自然隨感而通自有條理是以謂之良知亦謂之天理又曰學問思辨皆明善之功善者天命人心之本然所謂良知者也良知至易至簡而其用至博若孝親敬長仁民愛物千變萬化不可勝窮而其實一良知而已故簡者未嘗不繁而繁即所以為簡非有二也又曰蔽於私而後有不能則必學而后能是故本能愛親蔽於私則有所不愛學愛親而後能愛矣本能敬兄蔽於私則有所不敬學敬兄而後能敬矣又曰有蔽而后有學然其真妄錯雜善惡混淆必有不知不明者問者問其所不知思者思其所不得辨者辨其所不明皆就所學之事真妄善惡之間講究研磨察識辨别求能其事而后已學而能之則善復矣拳拳服膺而弗失所謂篤行之者也其再書曰夫人所謂天地之心萬物之靈者以其良知也故隨其位分日履大之而觀天察地通神明育萬物小之而因天用地制節謹度以養父母莫非良知之用離天地人物則無所謂視聽思慮感應酬酢之日履亦無所謂良知者矣若於天地人物之理一切不講豈所謂隨其位分修其日履以致其良知者哉惟是講天地萬物之理本皆良知之用然或動於私而良知有蔽昧焉權度既差輕重長短皆失其理矣必也一切致其良知而不蔽以私然後為窮理盡性一以貫之之學良知必發於視聽思慮視聽思慮必交於天地人物天地人物無窮視聽思慮亦無窮故良知亦無窮其所以用力者唯在於有私無私良與不良致與不致之間而實周乎天地人物無有一處安著不得而置之度外者也豫始見羅先生先生教由靜坐以入豫初登第先生移示以不榮進取致誨曰不榮進取即忘名位忘名位即忘世界忘世界始能為千古真正英雄作千古真正事業炫才能技藝規時好視此路背馳也豫乃浸知好名溺文詞之非先生雅曰古人有天下不與與萬物一體非二語也豫入蜀時先生訓曰正甫所言者見也非盡實也自朝至暮不漫不執無一刻之睱而時時覿體是之謂實知有餘而行不足嘗若有歉於中而絲髮不盡是之謂見正甫蜀歸尚以實修者盡言之及豫請告歸欲請質者非一而先生已逝越嵗矣先生將逝先以書示豫曰朝聞夕可庶為近之豈非永訣語耶先生初嘗語靜又言歸寂中年不同答武陵蔣君書曰此心中虛無物旁通無窮有如長風雲氣流行無有止極有如巨海魚龍變化無有間隔無內外可指動靜可分上下四方往古來今渾然一片而吾之一身乃其發竅固非形質所能限也是故縱吾之目而天地不滿吾視傾吾之耳而天地不出吾聽𡨕吾之心而天地不逃吾思古人往矣其精神所極即吾之精神未嘗往也否則聞其行事其能憬然憤然矣乎四海遠矣其疾痛所關即吾之疾痛未嘗遠也否則聞其患難其能惻然䀌然矣乎是故感於親而親焉吾無分于親也有分于吾與親斯不親矣感于民而仁焉吾無分于民也有分于吾與民斯弗仁矣感于物而愛焉吾無分于物也有分吾與物斯弗愛矣是乃得之于天者固然如是而後可以配天也故曰仁者渾然與物同體又曰知吾心體之大則回邪非僻之念自無所容得吾心體之存則營欲卜度之私自無所措先生此書蓋與孔子天下一人子思上下察孟子萬物皆備之旨千載一致非可驟與未寤者言也終之月書麻城周君册其中篇曰落思想者不思即無落存守者不存即無欲得此理炯然隨用具足不由思得不由存來其中必有生生一竅敻然不類申言上有難于弟子者曰子之先生以菱芡稻麥雞犬決理之不在物也輒曰理自人理自人斯疏矣且天下之物衆矣物若無理則子午針曷為不東西指也嶰谷之竹曷為能制律子穀之黍曷為能起籥也陽燧曷為致火方諸曷為召水磁石曷為連鐵琥珀曷為引芥葵何以嚮日珠何以應月橘柚曷不度江芍藥曷不踰嶺此皆無知之物也寧不有定理乎星辰未必其有知也乃若龍角見而雨畢天根出而水涸帝車正而四時調三能著而上下和景星見于中道則泰運昌旄頭盛于街北則胡狄熾亦不有定理乎鳥獸之斃也無知乃亦有貴賤之異龍以骨貴龜以殼貴犀以角貴麝以臍貴象以牙玳瑁以甲猩猩以血鸞以膠故皆可庸亦可器其次若蟾酥之合玉翠羽之屑金鳥糞之塵石犬膽之榮樹龜溺之漬木蟹黃之解漆鰻骨之消蚊巨勝之延年威喜之辟兵又不有定理乎然則謂物無理未可也曰子之擬也詳矣子豈不知氣類之有相感者寧獨此物哉雖然太陽無不照矣而蜀犬曷為其吠日也太隂無不貫矣而嶺犬曷為其吠雪也水至清冷而有溫谷之湯泉火至炎烮而有蕭丘之寒熖重類冝沉而南海有浮石之山輕物冝浮而牂牱有沉羽之流古人有云不可以一槩斷之然則理奚在哉夫品而題之區而用之制自人心昈然有條是乃所謂理也而不在物也曰然則理氣二乎曰盈天地間氣也疇非吾心之理之為絯也先儒曰性即理子必以氣類之感者為理則謂性在子午針與陽燧方謂可乎難者無以應異時以告先生曰誠如難者之求理也我則不暇難者曰漢儒有言子順父臣順君妻順夫何法法地順天也男不離父母何法法火不離木也女離父母何法法水流去金也娶妻親迎何法法日入陽下隂也長幼何法法四時有孟仲季也朋友何法法水合流相承也其他言父子君臣兄弟善善惡惡皆有法其法皆不出乎隂陽四時五行之數魏徐氏曰太昊觀天地而畫卦燧人察時令而鑽火帝軒聞鳳鳴而調律倉頡視鳥迹而作書斯大聖之學乎神明而發乎物類也後之言本天而窮物理者豈不出此而子之先生胡非之也曰由漢儒言則無人性矣先儒之本天亦豈至如漢儒之謬哉雖然先儒與漢儒不信人心而信氣與物者則其弊一而已夫二五之氣鼓行乎萬物者天命宰之也天命具于人心曰性惟人性為萬物之靈故二五者得天命之散殊氣用者也人心性靈得天命之主宰神用者也聖人先得人心性靈之全故能理燮二五和調四時綱紐造化贊佐民物蓋天地之賴于人心多矣今儒者于萬物則曰此出于天而為理故即物窮理以求天也於人心則曰此出于人而易私故一涉人心輒譙訶仇敵之不皇嗟夫吾姑不言天地之賴于人心也吾獨莫知本天者之能外人心否也吾恐先儒外心以本天其不為漢儒之繆亦無幾矣雖然吾聞莊列之言天曰曲者不以鈎直者不以繩圓者不以規方者不以矩附離不以膠漆約束不以纒索馬不以羈􅎗篋不以扄鐍魚不以網罟鳥不以畢弋治天下不以斗斛權衡與符繭推先儒之本天反若隂與于莊列之言多矣然則聖人之理燮和調咸當為私而易所謂裁成輔相云者不將為誣歟此先儒與漢儒所為均非也曰魏徐氏之言何如曰古之聖人先得人心性靈之全以故仰觀俯察近取遠取觀鳥獸類萬物將以開物成務制器尚象以成理燮和調之功裁成輔相之道蓋其先有本也非曰以是窮至物理為學者事也而徐氏未諳也異時以告先生曰然難者曰子之先生以為人心通天地萬物惟不痺為仁然則禪者之逃倫棄物是亦非痺歟曰禪者之顓顓焉出死生為事也夫安得非痺曰禪者亦自謂明心矣曷為其至于痺曰禪之言曰山河大地皆妙明心中物彼豈不知心之通天地萬物哉彼知心之通天地萬物而不肯盡心于天地萬物者則其出死生之為痺也是學之偏也非心之本然也夫心一也以盡則為儒以不盡則為禪猶人之手一也以拱則為禮以擊則為暴足一也以蹈則為善以踰則為非豈有二手足哉甲兵亦一也以在湯武則為仁以在桀跖則為虐亦豈有二甲兵哉而世儒必謂本心者之為禪則是天之生人心豫厝之毒而為禪也其生萬物豫貯之理以業儒也其果然乎難者憬然曰天之生人心夫寧有豫厝而為禪耶甚哉不盡心之為痺也明矣難者曰禪者之言出死生也出則曷之曰先生嘗詔之矣即莊子所謂有旦宅而無情死與天地精神往來而不毁者是也此非獨莊子老子曰死而不亡曰夀非獨老子吾聖門曰父母全而生之子全而歸之歸者豈歸其形軀哉夫曽子戰兢常如臨深履薄豈常憂形體之不全哉其曰吾知免夫亦豈免於形體者哉且夫盜跖胥靡至老而斃獲保首領全其形體滔滔皆是也固知曽子憂不在是矣曽子之憂憂性不全爾性不全則不得為仁孝不仁不足以嚮帝不孝不足以嚮親故曽子將死自幸其全而以曉門弟子雖然豈獨曉門弟子哉曽子不又曰君子之愛人也以德細人之愛人也以姑息以姑息者憂在形也以德憂在性也曽子之辨形性也審矣豈肯自居姑息而徒為懷形者倫哉曰曽子曷為令門人啓手足哉曰病者令人起動其手足以便興居此非異事豈欲門人為是而驗其手足哉且曽子手足之全門人豈不習知門人習知之而曽子復欲其啓驗之則相率為偽矣况古之全歸非必以形體為也如以形體已矣則比干之剖心萇𢎞之流血顔魯國文信國之徒皆不得為全歸孔孟所謂成仁取義將反為不仁不孝者也豈聖門之教哉是故君子夭夀不二全性立命上也身體髮膚不敢毁傷則其次耳曰若是則聖門亦以出死生為事乎曰聖門盡性以至于命則不假於逃倫棄物而死生弗滯矣聖門豈顓顓為死生哉夫二氏顓顓為死生故其學為偏其流為無父無君雖然非心罪也難者曰子之先生齦齦焉以覺為性鰓鰓焉引物連類而強證之獨未考朱子答廖德明之書乎書曰賢者之見不能無失正坐以我為主以覺為性耳夫性者理而已矣乾坤變化萬物受命雖所稟之在我然其理則非有我之得私也又曰性即是理不可以聚散言其聚而生散而死者氣而已矣所謂精神魂魄有知有覺者皆氣之所為也觀此則性屬理知覺屬氣其不可混也明矣今必以覺為性亦終認氣為理耳雖千萬辨奚益曰子之語理所謂舉三隅不能一反者也今吾也不復有言請借子之言為詢可乎夫先儒曰性者理而已矣此雖孔子不能易也然所謂性果能外仁之惻隱義之羞惡禮之辭讓智之是非乎曰未能外也曰仁之惻隱義之羞惡禮之辭讓吾姑不言吾請詢智之是非果又外於覺乎曰未能外也曰智之是非未能外覺則仁義禮豈又二物哉今夫人其耳目口鼻異官而要之皆一形也其父子兄弟異倫要之皆一身也其仁義禮智異發而要之皆一覺也子知仁義禮智之出於覺也而謂覺非性可乎謂覺性非理可乎若惟以覺為氣則五常四端皆當為氣而不當為理矣其又可乎且先儒曰乾坤變化萬物受命雖所稟在我然其理非有我之得私夫既曰稟之在我則乾坤之理已在我矣亦豈能外我之覺乎未能外我之覺則所謂以我為主以覺為性者未為非也亦未為私也而謂覺非性可乎謂我之覺性屬于氣不屬于理可乎且夫不以我為主則必以物為主不以覺為性則必以不覺為性苟以物為主也則物如木石皆可為主乎吾未聞人靈萬物而反不如物也苟以不覺為性則不覺如木石可謂有性乎吾未聞人性至善而一無所覺也孔子曰成性存存道義之門又曰父子之道天性記曰毁不滅性是皆以無覺者為性乎抑亦以有覺者為性乎即如先儒之與德明辨自謂有理矣不知是理也其果無覺者為之乎抑亦有覺者為之乎先儒何其與易書孔孟異也又何由之而不自知也不然則先儒所謂性者理而已矣必别有一性别有一理出身心之外非五常四端非至善存存之謂矣其又可乎蓋嘗觀之盈天地間升降闔闢凡有聚有散者疇非氣也而孰宰之則帝天為之宰焉者是命也即理也故詩稱維天之命於穆不已者是也人生天地間呼吸作止凡有聚有散者疇非氣也而孰宰之則心覺為之宰焉者是性也即理也故書稱維皇上帝降𠂻下民若有恆性者是也然則乾坤變化亦豈能獨私其理而不以畀諸夫人也哉故理之在人也宰之一心而達之天下不期而凖主之一時而施之千萬世不約而協是我之知覺本通于人之知覺本通于天下後世之知覺本非有我之所得私所謂以我為主以覺為性者本未為非亦未為私也孟氏所謂不知足而為屨我知其不為簣蓋謂此耳如曰求理於物以為無私吾見其憧憧焉戞戞焉不任其安排布置不任其有我之私未見有得其理者也至如德明異時以書論學乃遽加以咆哮而拒之其能不為有我之私難矣哉此由不以覺為性故失而不自覺耳曰然則人心之覺生而聚死而散者謂非氣也可乎曰曩先生於鬼神篇已詔之矣今夫人心之覺不以生存不以死亡是故文王於昭于天孔子至今猶存此未可為世儒言也難者曰甚哉二氏之不可不排也今之學者大要溺死先鶩簡徑故雖逃倫棄物之教咸爭趍之苟不遏其流則率天下而皆去君父矣今子之先生非不知之反若隂為之地者何哉曰排二氏非不韙然貴知所以排知所排者吾既得其全而以攻彼之偏則雖有好偏者其趍全也若歸矣不知所排者吾方守其偏而以攻彼之偏則雖有慕全者其趍偏也若驅矣吾見今之排二氏者將授之魁柄而驅之矣又惡能遏其流子不聞之昔者唐韓愈任道排佛既自比孟軻矣已而見大顛以理自勝則瞿而服見三平諭以智入則􅋏而聽是排二氏者其言也而趍二氏者其實也此何以然哉則繇其以偏攻偏終折而入于禪也蓋不知所排者也宋富鄭國趙清獻劉忠定陳忠肅吕侍講楊大年張無垢及蘇氏兄弟文信國皆天下之英偉絶出人也皆莫不從禪以樹于世其間若富趙劉陳文信國忠孝貫日月死生如旦夜彼豈死生能劫之哉韓楊張蘇咸稱博物君子亦豈空疏自便於簡徑哉此其故又何也嗟乎此固諸君子之過抑亦儒者之驅之也自孟軻沒學浸忘本若左丘明以下咸以遵聞見謹器數為事至有窮年若究纍世莫殫之弊太史公已譏之曰博而寡要勞而無功漢文帝賢君也蕭曹汲黯賢臣也當時鏡其弊已棄而從老老之後禪説盛行周程二大賢生于最後雖能辨别幾微昭揭吾儒之本要而二氏之熖熾已久矣周程既沒物理學行其意欲以勝禪亦非不韙也然而聞見器數之故塹若有加焉此諸君子者咸亦洞鏡其弊豈肯復從人臨海算澌登嶽辨葉而不知反顧哉惜哉諸君子鏡其弊矣又莫能自反其家室則左轡禪氏以為歸宿路也亦勢使然耳方其在諸君子則如坐炎熇而急就夫清冷在諸儒者則如倒持大阿授二氏其魁柄也然則諸君子之從二氏寧非儒者之驅之哉而儒者不自知其偏且遠也而獨曰吾能排二氏攻異端則烏能得其反顧哉今之日誠有真儒者出遡求孔孟之真指陳知本之學辨别幾微以廓聖􅀢而世儒猶復執吝物理托拾近似增壁加壘騖相拒敵既自棄其家室猶復攻人之返室者反曰是隂為二氏地吾不知精一一貫之旨何日而明彼算澌辨葉坐違其家室者何時而返也哉後之阻此而趍彼者愈無日矣李覯有言無思無為之義晦而心法勝積善積惡之誡泯而因緣作噫嘻諒哉是疇之愆歟是疇之愆歟難者曰昔者孔門誨人不一其説如問仁一也而答屢異其它答問孝問君子語皆異四教則有文行忠信之異至于孟子則有五教今子之語若畫一焉是不失之徑乎徑固禪者流矣胡子曰不然昔者唐虞三代上無異教下無異學道德本一風俗本同故不必畫一其語而趍者無不一孔孟之世去古未遼故其為教亦不必畫一其語而趍者無不一何則知本故也然自今觀之唐虞三代具于書者可考雖千萬其語而其歸為敬與中則一而已孔孟之教具于論語與七篇者可考雖千萬其語而其歸為仁與義則一而已然則古人何嘗不畫一為教哉至如孔門告為仁曰非禮勿視聽言動曰出門如賔使民如祭曰訒言曰恭忠敬要皆不外存心然則孔門又何嘗不畫一為教哉子以四教此自記者各以所見言之如文行猶可析忠信則不可析孔子屢言忠信未嘗析蓋未有忠而不信信而不忠者也四教之説疑亦非孔子本旨矣至若孟氏教宋勾踐遊説之徒咸不出仁義其它可知此則自孔孟已不欲有異教况在後世處士橫議百家雜出詁訓繁興不一其門大要騁于射覆之見肆為專門之説磔裂臠割轉相攻刺至有膏肓痼疾之非風角讖緯之流吾嘗辟之臨海算澌登嶽辨葉天下唯識其澌與葉益以利祿蒙之而帝王孔孟知本之學蕩然不知所底至宋道州夫子始揭其要曰誠曰無欲大程夫子復示其宗曰識仁曰天理其它雖千萬其語要不外是然則此二夫子豈皆好徑而趍禪也哉嗟哉自帝王孔孟與二夫子的的乎訓若畫一而世猶異之乃今則尤有異焉算澌者反若執一澌以譏全海辨葉者反若珍一葉以攻全嶽有語源與根者鮮不揮戈逐之天下學士髙者欲歸其室又畏甚戈戟則寧野處而不還其它則如甘海錯者寧便其地産而竟忘其肉食買珠貝者寧愛其櫝美而竟棄其珠貝蓋亦壞爛極矣而言者又操不一之説以滋多岐之毒是將疲斯世斯人而剚之其亦不仁甚矣是故畫一非得已也子終有疑則從算澌辨葉可也申言下或者曰載觀近儒嘗搜考楞伽全剛傳燈反覆辨證著書萬言深排釋氏以為心性不可離而亦不可混性者出於天命而有定理心則不過知覺妙用而已佛氏有見於心無見於性認知覺而違定理故終有逃倫棄物之失又曰佛氏所謂性者覺吾儒所謂性者理良由不知性為至精之理而以所謂神者當之故其應用無方不失圓通之妙而髙下無所凖輕重無所權卒歸於冥行妄作今之儒可無省哉曰近儒非獨以詆釋氏實以詆今之儒者之言覺也其辨為甚審而語亦甚確矣以愚觀之近儒固矣吾不知近儒所指天命之性果在人心乎抑在心外乎若性在心外則天下古今無心外之性而孟子亦不當有仁義禮智根心非由外鑠之訓若在心內則非惟釋氏不當違性以求心而吾儒亦不當違心以求性也且夫心性不可混則謂如火之明如水之清可也謂當外火以求明外水以求清則大不可也其曰定理非覺疇定之乎至精之理非覺疇精之乎髙下之凖輕重之權非此覺為之天權天度天星天寸其疇為之乎近儒必欲外覺以求理則亦所謂外火求明外水求清非特不可亦必不能也乃猶以覺理分心性以心性分佛儒吾恐心與性儒與佛皆不得其服矣故曰固也夫覺即理也然至於無凖與權者則所謂感物而動失其本知本覺者也失其本知本覺而本知本覺之體固未亡也故精者此精也凖與權者此為之也若夫釋氏主於逃倫棄物者曩吾析之明矣要其學止於明心而未逮盡心止於見性而未逮盡性是有覺而未能履之為德行者也非心覺之專為釋也詩曰有覺德行四國順之夫以有覺德行責釋氏則釋氏誣矣有海濵李君讀近儒書悱然若有得於儒釋心性之辨因友人見質胡子而氣鋭然胡子曰吾言滋嚽矣友人曰子海濵士當知海水之鹹若能外海水以求鹹則亦能外心言性矣君默然去三日則來見曰吾觀近儒之辨儒釋誠過也既曰釋氏所謂性者覺吾儒所謂性者理乃又曰理經而覺緯則是以儒為經以釋為緯未可通也且天之生人豈使之心為釋而性為儒乎必不然矣胡子謂弟子曰李君窹速矣李君曰近儒則云理果何物也哉通天地亘古今無非一氣而已而一動一靜一往一來一闔一闢一升一降循環無已為四時之溫涼寒暑為萬物之生長收藏為人事之成敗得失為斯民之日用彛倫千條萬緒紛紜轕轇而卒不可亂有莫知其然而然是乃所謂理也又曰日月之食彗孛之變未有不旋復其常者兹非天理而何若是則近儒皆以氣言理耳乃又以此言性是果以性在心外矣果當求性於天地萬物之散殊而所謂仁義禮智所謂惻隱羞惡辭讓是非不忍人之心皆一不相涉矣其可通乎乃若易繫所謂繼善書所謂降𠂻記所謂生而靜皆當求之天地萬物之動靜往來闔闢升降之間吾終不知其何所著也其可通乎或曰此以推本其性之所自來者曰以是為推本猶告人子之為孝者而推本其父母婚媾之始往來之儀則亦何與哉盍亦告以良知良能之不可解者是乃孝也性也亦理也而推者遠矣胡子謂弟子曰吾見今之學者莫如李君達理李君曰近儒自謂理氣無縫隙矣然其言天地萬物之聚即聚之理其散即散之理是既以氣之聚散為理之有無也可謂無縫隙乎向所謂定理者果安在乎且於人性之善亦安所與哉至是則理與性又各為縫隙不相顧也曰然曰近儒曰理只是氣之理當于氣之轉折處觀之往而來來而往乃轉折處也若是則兩頭皆無理唯在中轉處乃有理如春夏故無理唯春夏之交始有理秋冬固無理唯秋冬之交始有理然則性亦當于二時求之乎曰噫吁何以辨為曰近儒自謂朱子小有未合蓋朱子云理與氣決是二物氣強理弱理管攝氣不得近儒又自謂于程朱語纍年不能歸一及以理氣二字參互體認亦竟不能歸一一旦于理一分殊有悟于是始渙然自信至語理一分殊則曰人物受氣之初其理惟一成形之後其分則殊良以為得矣吾不知受氣與成形相去幾何而理一分殊乃爾頓異其果然乎又曰若有恆性理之一也克綏厥猷則分之殊成之者性理之一也仁知百姓則分之殊天命之性理之一也率性之道則分之殊觀此則凡以屬天地者均為理一而無分殊屬夫人者均為分殊而無理一恐未可也且仁者知者百姓日用不知者謂為分殊則是楊子之義墨子之仁百姓由之而不知道者皆當為分定不可移易而人無責焉耳矣恐未可也夫近儒謂先儒為未歸一吾恐楚固失之而齊亦未為得也曰然曰朱子曰思慮未起知覺不昧近儒易之曰所覺不昧不知思慮之未起也而覺者奚其所曰思未起而覺存覺即理焉而覺無迎也感既通而理行理即覺焉而理無將也無迎無將曷求其所弟子悟曰思未起而覺不昧即所謂喜怒哀樂未發之中者是也又奚其所曰然曰近儒所引程伯子之言曰天地間有亭亭當當直上直下之正理此正理孰存乎曰嘗試觀之井有人焉救自井上則為正理其從之也則非正理是正理在井乎在人心乎昔者司馬公兒時嘗舉石擊甕以救溺于是正理在石乎在甕乎又嘗考物而為之乎抑亦在司馬之心乎皆可辨矣稽伯子本言中者天下之大本繼曰天地間亭亭當當直上直下之正理出則不是以是知伯子所謂中所謂大本所謂正理固不在物也曰然曰夫人靈萬物心天地出于書與記近儒豈不諳哉而其譏楊氏之已易也曰人以藐然七尺之軀乃欲私天地為已物多見其不知量信斯語也則書與記之言妄矣其然乎曰靈萬物心天地者固不在七尺之軀而以宰七尺軀者即以宰天地萬物者也且夫以物觀之則天地大以道觀之則天地亦道中一物耳夫率性謂道修道則中和位育不在身外然則七尺軀則又不藐矣嗟乎是未易諳也曰楊氏之學何如曰楊氏吾不深知而已易難廢也曰近儒曰未發之中非惟人人有之乃至物物有之夫謂未發之中物物有之則發而中節之和亦當有之矣是犬與牛皆與人性無異皆當責之以中和位育之功也其可通乎近儒又謂天命之性不獨鳶魚有之花竹亦有之又云在人心者與在鳥獸草木金石者無異夫然則鳶魚花竹草木金石皆當責以中和位育之功不獨人人當窮物之理而物亦當窮人之理也其可通乎且夫中庸言天命之性率性之道本以人言未嘗及物也下文修道及君子戒慎致中和皆責在斯人亦未嘗屬物也而先儒乃強以人物並訓之亦誤矣大抵先儒欲證成在物為理一語以便格物窮理之説乃遂謂物物皆有未發之中則是堯舜所為精一而執之者今則物物皆有之是物物皆堯舜矣其可通乎雖然此無足多辨也乃若人物之性其偏全邪正以逮有無子猶未悉也則當為子竟之昔者告子問生之謂性是以知覺為性明矣孟子未嘗非之惟欲告子辨犬牛之性不可同于人以人得其全而正焉故也亦猶羽雪之白不可同于玉以玉得其堅而貞焉故也書與記所謂靈萬物心天地孔子所謂人為貴不以是與然則鳥獸雖有知覺亦不可以擬人而况草木金石乎且天之生人與鳥獸也其知覺之性則一而已至其氣質輕重清濁相為低昻而偏全異矣全則成正偏則成邪而邪正出矣何以言之蓋氣質輕清者近天為陽重濁者近地為隂故其最輕清得陽多者為上知上知全性無蔽者也輕清重濁隂陽互勝者為中材中材者性因氣質為通蔽而可上下者也最重濁隂多者為下愚下愚多蔽而鮮通者也自下愚而下愈重濁隂愈多漸易其形者為夷狄夷狄中之良者不以其例愈重濁隂愈多大易其形者為禽獸禽獸中之良者不以其例夷狄禽獸非其良者唯有蔽而已矣是則性一也而以氣質之低昻為偏全為邪正于是有人與禽獸之分故謂人性異禽獸者固非而曰同禽獸者不尤為非哉若夫草木金石則惟有氣質相勝而已蓋既無君臣父子亦無飲食男女于其親義序别信罔所著也乃謂其有性謂其有未發之中可乎又必謂其與人心無二則舛而近于誣矣推其意惟欲以證成在物為理之一語而不自知其墮此耳然則物理之説愈不可通矣曰近儒又以天性為本體明覺為妙用且曰天性正于受生之始明覺發于既生之後若是則受生之天性其稟也為無用之體既生之明覺其發也為無體之用受生與既生截然兩人也本體與妙用判然二物也其可通乎且夫性者近儒所謂理也是理既正于受生之始矣乃復欲求理于物又欲求理于氣之轉折處其不為增懸癭而重駢拇乎苟謂此明覺者不出天命之性則此明覺胡為乎求哉又胡為其若是妙用哉天亦胡為生人以明覺而徒為無體之用哉若是則凡人之既生皆止為無體之用而已其可通乎乃不知覺一也未發則為體發而中節則為用性之德也合外內之道也二則非也曰然曰近儒曰今以良知為天理即不知天地萬物有此良知否乎又曰求其良知而不得安得不置度外耶此近儒之憂憂夫天地萬物無良知而人之獨有良知者必置之度外也曰近儒左矣夫使天地萬物無良知而人亦無良知焉則亦孰知天地萬物之為度內與度外也今而草木金石之無知則天地萬物自不相涉矣惟人獨有良知則固所以通天地萬物而理之者也良知之通天地萬物而理之是乃所謂天然條理者也苟謂良知而反外天地萬物是必如草木金石未始有良知者也曰近儒謂人物為度內者蓋推本其同得天地之理為性同得天地之氣為形焉故也又焉假夫良知曰此推本之説未為非也乃不知其所為推本者苟無良知則孰使然哉且夫孩提知愛知敬見入井而怵惕見觳穀而不忍當其時非惟不知推本而亦不皇為推本也則又孰使然哉嗟夫使人無良知鮮不以耳視目聽又鮮不以鼻食哉且將朔越其肝膽秦齊其骨肉子不以父父臣不以君君者蓋比比矣則以何者為天地萬物度內哉子獨不知仁者以天地萬物為一體則以良知弗痺故也非假推本而後能也然則謂良知為天理明矣曰近儒又言今以良知為天理則是理全屬安排無復本然之則矣此近儒之憂憂夫良知之涉于安排也曰近儒又左矣夫良知者乃吾人之天權天度天星天寸者也吾致其良知以應物是猶平衡定凖以稱量天下之物者也夫是以順乎本然之則而不涉于安排者也今若舍吾天權天度天星天寸而推以窮索臆度懸定物理之輕重長短是未嘗平衡而欲以稱物未嘗定凖而欲以量物則非獨涉于安排且以顛越其輕重長短者多矣又烏覩所謂本然之則哉且終不知其所為窮索臆度者則亦良知之未光者為之而衡凖則未見其平與定也盍亦反其本哉雖然世儒之良知固自在也使世儒而先從事于平衡定凖焉然後知天權天度天星天寸無事于窮索臆度為也然則謂良知為天理益明矣曰近儒語良知謂良者不過自然而已自然果可以訓良乎曰説文有之良善也賢也長也故書稱元良孟子曰良心曰良知良能皆善義也善固無不自然而以自然訓良者非本義矣近儒又以知為虛字知果該虛乎曰一字而數義者多也一字而虛實不倫者亦多也如親仁字本實義也然而曰親民仁民則虛用之言行字本虛義也然而曰善言善行則實用之又若明明德一語上明則為虛字下明則為實字良知即明德也抑何疑于虛哉甚哉世儒泥文執義之自為蔽也雖然君子明其大者而小蔽無多辨也或曰世儒必以無知覺者為性然古今未有無知覺之性吾請折中曰知覺之中正者為性可也世儒必以事物之有名義者為理然名義亦人心之知覺者為之也吾請折中曰名義之中正者為理可也弟子以告先生曰知覺之中正者性善是已名義之中正者乃所謂善也今必曰名義生于物不生于人心又曰吾憂其近禪而畏虛而以物理别之是天蔽無瘳者也亦復何辨曰自三代後不幸有釋氏故有是紛紛今也則何以袪焉曰昔者歐陽修曰修其本以勝之良然哉良然哉然修又曰性非所先則亦倒執其柄而與之矣又烏能勝夫善治病者當究其原彼釋氏欲明心見性以出離生死者是病原也欲明心見性以出離生死乃至逃倫棄物而為之者則病症也何以辨之昔有得寶鏡者二其一磨礱使明而懸照乎物曰吾將盡鏡之性而無愛吝也其一磨礱使明而襲藏諸篋曰吾將任其長明而無復翳也夫鏡非異也磨礱非相遠也然一則懸照而盡鏡之性一則襲藏而令其長明則公與私之分也猶之心性非異也存心養性明心見性亦非相遠也然一則以是盡已與天地萬物之性一則以是而出離一己之生死則亦公與私之分也雖然聖人既公矣既能盡天地萬物之性矣乃未嘗以天地萬物撓已則亦未嘗不出離生死者也且夫文王不顯之德中庸擬曰上天之載無聲無臭大雅又曰文王陟降在帝左右則固有不存存不亡亡者在死生烏得而囿之又如孔子無意必固我而從心不踰矩則謂孔子之心終與形俱化焉吾不信也若是則釋氏所憂為死生大事者吾聖人無憂也為吾聖人之學又何必逃倫棄物以為出離計哉雖然吾聖人惟其公也故獨得其全焉又何辨之今夫一日之間方在詰朝冠櫛未施文理未著沖沖融融若遊于天地之初行乎萬物之始此一時也則黃老家類之及其嚮晦弛衣卸冠晏寢以息泯泯默默若處溟滓內不知有已外不知有天地萬物此一時也則釋迦家類之夫惟至晝日焉冠紳禮樂文際揖讓斤斤郁郁其應天地萬物較若星辰之燦川原之辨此一時也則吾儒家者類之嘗試較之自其偏一時而言則在晝日者為是而在詰朝與嚮晦者為非也自其全一日而言則在晝日者固是而在詰朝嚮晦者亦人之所不能免也是故黃老釋迦各專一時之偏其過不可貸矣乃不知吾儒家聖人之大全則又未嘗不兼有二家者也非故欲兼也亦猶全日之不能外詰朝嚮晦者也何則吾儒者存心養性以盡已與天地萬物之性此正脈不待言然使暴其氣則不能也故無暴其氣則兼有黃老矣而聖人固不嫌有黃老事也使不全歸則不可也故全生全歸則兼有釋氏矣而聖人亦不嫌有釋氏事也此聖人之所以為公而全也故程伯子曰句句同處處合然而不同則亦公私偏全毫釐之間耳然毫釐之差而千里之繆由之是則同此心性而毫釐千里出焉則學者所當早辨者也若徒分心為釋分性為儒吾恐心性終不可分則儒釋終不可辨耳吾故曰辨儒釋者當辨異于同而不當辨異于異乃為明也然則今之祛異端者惟辨異于同之中則彼且愧其異而無不服惟示同于異之中則彼且追其同而無不悔彼亦天下之髙朗人也苟有見焉則將曰公且全焉是無乏吾事也吾又何必為其私且偏而不為公且全哉若是則不但得其病原以治之而太阿之柄亦在吾儒不在二家二家之歸也有日矣所謂修其本以勝之其在此歟孟子曰歸斯受之嗟夫使孟子在今之日則亦如是而已若曰駢拇物理以自辨于釋氏如畫鬚者之别于中常侍則徒自違其天矣嗟夫今之君子蓋重辨異端之名而輕違其實知修其本之説而莫識本之所底假令今果有孟子則吾言是矣使竟無孟子又鮮不以豫為推儒入墨者而壁塹弋鋋反射之矣豫于今之日也亦曷以辭曰釋之家以三界為心凡一身罪福果報以至天地萬物之治與亂皆歸諸已老之家曰天地大爐造化大治凡一身富貴貧賤吉凶夀天以至天地萬物之治與亂皆歸諸天是二家者之相反也孰則是曰斯二者皆是也唯吾儒為兼之吾儒不曰作善降祥作不善降殃惠迪吉從逆凶禍福無不自已求之者是未嘗不歸諸已也不又曰死生有命富貴在天行止非人之所能為也是未嘗不歸諸天也故曰吾儒兼之兼之者通之也不執一廢百也曰是亦可以見吾聖人之公且全也曰然曰今之儒者之語學獨喜援二家言者何也曰是亦所謂不執一廢百也是故孔子問禮于𣆀比業于彭孟子且不廢陽貨之言而况其他乎程伯子訓孟子之勿正心曰動意則乖擬心則差非釋家語乎紫陽夫子作調息針曰守一處和千二百嵗非老家語乎且紫陽夫子既耄矣猶復輕參同契其它文與詩至于廣成之風屢嘆息焉若程朱二夫子豈真從二氏哉故曰君子不以人廢言不以言廢人然則君子之學莫病泥文尤莫病執迹彼執一廢百者則執迹之為害也是故君子慎母泥文執迹以達乎全全衡廬精舍藏稿卷三十
