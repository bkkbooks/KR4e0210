body:
  text: 衡廬精舍藏稿卷十明胡直撰序刻白沙先生文集序夫人心者天地萬物之都宅而道之本也記曰物有本末事有終始知所先後則近道矣故古之學未有不先本後末者也自後世以趨末為工苟有為古之先本者則不問其所底輒羣然詆之曰是非老則禪也而世之末儒畏形而避影者乃又甚其說以自表異曷怪乎數百年之甍甍而和懵懵焉而趨也夫先本非絶末也以為非本不足以生末故古之君子先從事焉善養其易知簡能者而天下之理自得則天地萬物將為舉焉故曰正其本萬事理又曰本立而道生猶之樹材者先壅溉其根柢則枝葉自從而敷榮焉非必若剪綴然枝枝以營之葉葉以修之者也故記者謂之近道若夫老與禪則顓焉以閟其根逆焉以銷其枝葉與吾聖人先本後末之學大有間矣夫惡得擬其所似而槩詆其真反以拒天下知本之士甚哉後之末儒之難與語學也白沙先生自少有志聖人之學始從臨川吳聘君未有入乃返求諸約端居十有二稔然後見吾心之體隱然參前倚衡應務觀書若馬之有銜勒水之有源委乃渙然自信曰作聖之功在兹矣而措之日履堅貞明懿孝友天至雖寠極且劃田廬以食太夫人之兄子買婢出良族輒選配為婚友喪服緦佐奠至數千里外自彭惠安劉志宣羅文毅以下靡不景從邑令執弟子禮服行其教輶軒過者挹其德容至稱之活孟子云片撰隻語咸踔絶出塵表可輔世而翊道嗟夫若先生之學豈嘗枝枝而營葉葉而修者哉蓋亦崇其本而自豐其末者彼二氏者有是乎哉而世之談者未誠有嚮道之志知嚮之矣又未能若先生反約而深造且不亟考先生之貞履則皆逐塊尋聲隨陽浮而爭置一喙是猶守澮洫而議淵海執碔砆而評荆璧亦左矣夫或者經怪其出語間用釋氏是又不然昔程伯子亞聖儔也蓋亦間用之而尼父徴言于老聃軻氏借證于陽貨咸自顧真脉何如耳豈必善避其語者哉苟不以其脉而獨屏形聲取善畏避者以為韙是亦自附剪綴之工已耳而于先生又曷為有無于時豫寮僉憲何君重刻先生文以傳豫慚無能為役乃為叙其先本之學或以回避影者之轅而知學聖之有歸然則世欲繇先生以入聖則亦求諸先生致虛立本之㫖而自得之慎無逐末儒自左其趨以日逺于大道何君名某字某南充人贊其成者劉君某字某某縣人李君某字某思南人南溪蕭氏續修族譜序豫少好覽觀郡邑志而知邑蕭氏之蕃且著也邑蕭氏以十數而瀘源甲瀘源𣲖分以十數而豫里南溪甲南溪上世語具信史暨先哲載記中迄五代時軍巡覺始避地禾溪七世至大承事遷今南溪又幾傳為堯舜漢三祖自三祖之支裔繁碩厯宋到今其著代不下十數世嵗時伏臘被服楚楚相與謁拜乎祠屋者其擢指不下數萬衆列井分竈聮甍纍第穀鍾萬廩薪藳萬畦蔬萬牛驥犬彘蹄躈萬粳千釀魚陂千畝後列千章之材奄山跨谷奕布而雲騫者其奠方不下數十址入國朝自宫師以下官臺省部司以逮郡牧邑長其繩武不下數十人拽青矜逰黌序者其列籍不下踰百士其一丘一壑以行誼賦咏稱者不可以數嗟夫若南溪豈獨甲蕭氏哉南溪譜修自某公至某公凡幾修矣乃者其族彥黃陂令樓岡君韶府丞武泉君今將樂學論君集羣議續修之而屬序於豫蓋豫捉髮客武陵橋蕭徴士家學文于二江先生繇是獲讀其駢義傳知自成鵬舉二公叔姪爭死雖古今希矣已又與鶴臯侍御並遊邑庠與樓岡武泉並試南宫而將樂君又挈其羣從從豫問學有年則所為序南溪譜者孰與豫豫嘗稽之矣昔蕭之先其宅端揆任相導者何承承也自鄼侯下逮嵩復俯倣勛名灼爚照當時流後世者抑又何磊磊也然鄼侯僅獵柱下之㫖而宋國世溺泥洹之教其於儒道詘焉今南溪繇孝友發家其子孫若宫師之文學給舍侍御之讜直郡邑之政教雲仍斌斌非周公孔子之道弗詢也閲其譜絶不有近世駢枝之弊則誠所謂儒家者冠也夫儒之道始孝友行家邦加海隅而漸被於鳥獸魚鱉草木則天地萬物舉矣古之大人所以相天下者用此道也豫所望於南溪之後豈不有希古之大人者作而儒之道始全正終稿序余讀友乾江君正終稿而泫然涕下也豫踰冠從學夫子得友君交若弟昆然余强年才稍知自力每移書激君君晚刻勵出豫上又日移書余規余方倚君共老以幾全歸何啻斷金然朝飛書而夕報冥遊矣余奚獨君恫哉今藳中學針醫戒皆默與余心契者蓋出其終之先三五日而晚修篤矣時君喪大夫人已踰禫猶以未襄大事固持小祥服夜侍靈輼忽晨興端坐正襟委化以今世人若君之得正而斃復誰何哉二孤方劈踊未皇治君他文而先刻是稿貽後死者讀之且恫且慕自不知終之所至能幾君一二否因雪涕題簡端云醫戒附月在季夏豫抱濕痰之疴行坐弗良日偃仰床褥痛苦弗寧也醫脉之曰是其原久矣君手百家之編竟日忘疲不久坐乎豫曰有之握管操觚無輟思乎豫曰有之夫坐忌太久久則血氣凝滯天地蒸濕之氣淫之與俱滯矣思極傷脾腎為智府亦且傷腎脾傷則食凝而為痰腎傷則水不升而火熾火痰之母也此豈一嵗之積哉豫然後恍而覺慨而悔曰嗟乎豫之罪也不謹疾乃至是哉坐與思二物者非能病我也內賊主之釀之以成而又治之不早治也蓋豫始而殫思則病萌矣謂暫廢而靜默其可也果未踰時良已矣始而耽書危坐則病萌矣謂暫拋而徙倚其可也果未移晷良已矣始而驅馳刺謁則又病矣謂休騎而端居其可也果未踰日良已矣不知因芽之萌而札其根又不知其根之存第隨發而剪其芽無乃蓄之使滋茂必待斧斤於醫乎是故上醫不治已病治未病養生者而達斯理和扁無竒功夫人而臻壽域矣乎凡治貴防於未然而萌為已後貴慎乎微而著為難遏感醫談悟治心治國之理因著之篇為戒云送郭相奎冬官赴任序豫嘗陟巨嶽未至數百里間其地維已嶐起連數郡故其髙能興雲而造天異時顧視他山凡突兀㠑巉拔起者其為髙亦僅僅無甚峻至若培塿與平地逶迤者又不足言矣豫然後知天下有殊物巍峨絶出之髙非大其基則不可以成古之聞人多矣而學者必以大人為至夫大人豈好為大哉其天之授斯人人之受於天本大故也昔者伊尹氏耕於莘野方其表操固已有撻市內溝袵席斯世苞裹宇宙之心已乃翻然從湯堯舜君民上格于皇天若反手然又豈以一旦突為之哉彼固樹基于本大者非一日也近時自一體之學倡天下學士知欣欣從大矣然或至汪洋浩蕩大而無當出處取豫之間日踰其間猶曰此一體也斯蓋未覩本大之實而恣其意見精魄以當之其於大千里矣余嘗覩為大之實在微愈微故愈大古先峻德始於惟微子思語大至位育而其幾則肇於不覩不聞記曰聖人耐以天下為一家中國為一人非意之也此為大之實也余對學者每不敢語大蓋有懲也南冬官尚書郎郭君相奎舊學於余然資故溫懿服官著聲廉明今其赴南署也特走别余余無為贈則獨以大進語曰適千里者三月聚糧則大之貴積也審矣夫風之積不厚則不可以負南溟之翼水之積不厚則不可以浮萬斛之舟然則積豈易言哉其惟微乎若夫切琢浸磨以入於微則有留京諸君子者在豫可省言也刻濂溪先生集序甚哉學術之難言也非學之難言言之者異也嘗試譬之祖父之造家莫不肇蹟南畝樹榖務本然後能操贏以殖其貨此非獨人事亦其勢然也而後之子孫徒見貨殖之利唯旦夜持籌課算子母記籍充棟而居積自矜遂捐舍南畝任其汚萊有務之者則詆之曰是西鄙野人之事吾祖父無有也力本之論不勝其逐末之說故談者恆難于言雖然亦取衷于祖父而已矣堯舜者中古之祖父也文王孔子近古之祖父也濂溪明道二先生又近世祖父也堯舜語學曰人心道心精一執中何其詳也豈不以心一也惟動于欲而失其本然者為人心惟不動於欲而不失其本然者為道心然則道誠不出于心而欲固賊道者與至哉道心精精是而不以欲雜一一是而不以欲二蓋自堯舜千百載之前而無欲之㫖已彰彰較著矣其在文王無然畔援無然歆羡乃造于穆穆孔子江漢以濯秋陽以暴乃底于皓皓皆是㫖也四代聖人先天開人鮮不自道心精一而盛德大業繇斯以出始未聞外心而專求物理也濂溪先生去孔子千有餘載其著書不多唯獨揭示聖道曰聖誠而已矣而指其學聖之要則曰一為要一者無欲也無欲則靜虛動直靜虛則明明則通動直則公公則溥夫誠非道心乎無欲非精一乎靜虛動直明通公溥非執中乎是近世開先肇家逺與四代聖人異言同符固孰與濂溪先生今先生遺書具在其㫖尤彰彰較著亦未聞外心而專求物理也異時學者恇惑影響之間眇忽道心之㫖謂理不生心而出於物乃至鰓鰓瞡瞡博求諸物以有涯隨無涯至於當年莫䆒纍世莫殫迄不自知其逺人以為道而猶尊近聞珍末見以相雄長其間有能原本道心亟先無欲者則反詆之曰是不為老必為禪嗟乎是不知老與禪相去且千里也乃俾學者盡棄南畝專趨貨殖而重怖于西鄙之訶將益為逐末者增赤幟而堅壁壘天下後世莫不畏形避影聞謦悸響孰敢為力本者一置其喙吾故曰非學之難言言之者異也嗟乎是當如祖父何哉且夫天地之運不息自窮天地觀之後千百年將不知有幾聖人者作而為之開先肇基以祖父乎天下斯學豈不復大明中天哉彼區區兢逐末者又何虞其不終醒且瘳耶直獨虞今之未逮乎醒且瘳者將倀焉適燕而越轅避渴而海飲而卒莫之救也可不為悲乎雖然亦取衷於祖父而已矣某曩督楚學竊不自揆雅欲釐正先生遺集刻視學者以見取衷之意庶幾少回逐末者之瀾迄未皇也萬厯甲戌太平崔君某為永州理官念先生昔嘗判永乃求先生集删其附益者刻永郡中明年先生冡孫博士君某命其子某某走余山中以新刻寄且曰道州故刻亦漫漶久矣今且圖復刻請為之序豫聞之躍然因推本學術重有感于本末古今之異而妄欲為天下瘳且以驗崔君并刻之贈别習豫南太史序明興吉郡以文學蟬嫣都館閣者麟麟稱盛至𢎞正後稍陵夷希矣至近愈希既閲多年乃有今豫南君嘗試較之當時事業籍甚則莫與楊文貞文貞之膚公天下士所熟誦競書不絶也豫獨喜誦其一二細微而知當時名哲之履蓋文貞以元宰歸省過湖中邂逅一張參政者風駛舟上下則各舉手一笑竟别底維揚郡守令先日候無耗翊日舟至守令竟不相聞過去訪友人則相與聮寢語達旦自常廩外無别供鄉人得以隻雞束薪相辭受其細如此其大可知也豫因是又知當時上下省事殫力民務而化國日長矣豈其人與世咸幾於有道者與然豫觀文貞為此良有本文貞雅言天下事當以天下萬世心處之嗟夫末世之有天下萬世之心者誰哉乃又較之古近事業籍甚匪一人豫則獨喜誦伊尹事豫所誦非以其出處勛伐為也伊尹恥君不堯舜至引辜于一夫其自任之重蓋自畎畝而已殷矣夫伊尹以一荷鏄寒畯任天下之重如此亦豈無本哉尹之自名曰先知先覺彼其所以先天下而知且覺者其體量固𢎞也故曰大人耐以天下為一家中國為一人非意之也豫南君與余同事念菴先生學大人之學舊矣今以銜命事峻歸報天子將繇是踐大人位而君且停驂過顧别豫山中豫慚無為别僭以文貞之事伊尹之言納諸行李意者繼文貞以振起吾邦而道則上志乎尹者也賀朱兵憲平黃鄉寇序夫哲人治國若神醫用藥然神醫之為用苟當其病雖射干甘遂咸使伐毒及非其病雖耆參烏頭反為毒胎乃其進退盈縮之間則非庸瑣者能諳曉也吾省贛南兩郡綰轂嶺海通道漳泉習為盜區自正德間新建公始仗鉞平之公初招各酋唯黃鄉葉氏先附公用以平各賊繼征寧濠能出死力以是督府例用葉家兵而葉家兵驕氣日哆哆張矣嘉靖間逆節稍著逮今萬厯乙亥巨酋葉楷等席威肆鬬動號數千殘剚良民不啻百家其極僭稱元戎自署中軍睥睨城池蔑法踰制叛跡至不可勝道于時督府新原江公握鉞適臨奮然議征乃屬兵憲朱公偕分守張公簡將矢師期在殲魁蕩巢脅從撫之則又屬贑守葉侯密馳招檄而各保聽招咸鼓舞更生爭先鄉道各將佐益麾兵死戰斬其伉健賊衆遂潰已而分哨疉進圍屯火攻自楷以下巨酋盡血刃下其戮死捉生俘獲及收録器仗踰制者咸不計其數而百十年奧隩逋寇一旦盡蕩滌之于是督府請于朝建縣治以永鎮撫其地遂埒則壤而齒平民功何穹也贛之南既多盜區而黃鄉自怙宿勩獨雄各區兵動輒躓適今不剪則上通潮海積逋下厝毒于吉臨滋厚即若辛酉之變猋忽蜂起將胡以禦之自非魁賢操符定畫威德竝運而又獲同心協䇿動應機宜吾未知其厝毒復何如也然則今日之捷自吾吉以下咸衽席而嬉矣其功豈獨在贛南哉蓋昔在新建公是用射干甘遂之力也今督府監司是除耆參烏頭之毒也其為國計一也而贛南兩郡侯咸曰是役兵憲朱公功最多爰徴豫言以頌且曰是當勒石傳諸永永朱公諱某叙州人贑守葉侯某某方人南安守某某方人重刻王心齊先生遺録序心齊先生遺録若干卷始嘉靖間門人張水部峯刻諸江浦隆慶間先生仲子某偕諸門人編校年譜并遺録刻永豐仲子嘗屬豫序而未之逮今萬厯四年水部重刻于家乃亦以序見督豫少讀遺録而得先生學脉之大較矣今且半皓乃以水部所刻讀忘寢食而益得其㫖歸然後掩卷吁曰是刻其可已乎先生之學先知本故立其身以為天下國家之本則位育有不襲時位者此㫖歸也然先生所以語立身者甚詳非曰不辨不肖之身而徒出身以師帥一世之謂也先生所自為立身者甚嚴非曰不辭不腆之倄而輒委身以鼓舞一世之謂也先生録中曰顔子有不善未嘗不知常知故也知之未嘗復行常行故也又云誠意忠恕强恕致曲皆為立本工夫平時揭示無欲之訓不一而足所著勉仁等篇則又循循示人遷善改過反躬自責不為葉言是先生所語立身之事如此水部雅為豫言先生最嚴取豫不苟一縑一葛豫又考先生自童不􅈺文義而孝誠天至厚義薄利咸出性成及聞東越致知之㫖而深造自得日以光大巨節細行咸可昭日月通神明故嘗以一身而活千萬人以褐衣而師表乎王公非獨纓緌詩書之士欽風而起覿顔而消而下逮農賈儓𨽻齠稚秃翁一間謦咳若澡雪其胸臆而牖發其天機是先生所為立身之實又如此而今之學者未少有得則皆好為人師至南面抗顔號召後生猖狂鼓舞自為大于一時亟髙其言曰吾學即止至善又焉用致知焉有所謂無欲之功其極至習為圓通恣為權譎以便功利大德既隳猶自與曰吾誨不倦即學不厭不知所誨果何物也所謂出身以為天下國家果何身也嗟夫先生所為訓與其自立者豈端使然哉夫衡懸則不可欺以重輕繩陳則不可欺以曲直規矩設則不可欺以方圓水部既重刻遺録而又附以墓文志傳豈非所謂懸衡陳繩申飭規矩以示斯人之徒者歟雖然聖賢立言猶善醫者因病而施方非可以方執而局泥也先生録中有云出則為帝者師處則為天下後世師豫則以為聖人出為帝師而未嘗不師天下後世處為天下後世師亦未嘗不師帝者是故時潛時躍時見時飛而未嘗有家舍用舍行藏莫不在天地萬物是乃先生所學孔子家法學者亦善觀善學之而已矣水部嘗令江浦有惠政民生祀之豈亦有先生一體者歟是刻為學者慮至殷也故援其意為之序且以復仲子别曽舜徴序夫研窮非不學也然而滯物髙儒未嘗入其門焉褆修非不學也然而泥迹通儒未嘗入其門焉主敬而嚴主靜而寂非不學也然而涉念聖儒未嘗入其門焉夫聖儒曷宗宗乎盡性而已性之體非有內外虛實動靜之别亦非有先無後有先寂後感之異尤非可以知識求意見測語其量則囊括宇宙發育萬物而其實不越乎至微學者誠得其微非不研窮由吾性而窮焉則雖物非物也非不褆修由吾性而修焉則雖迹非迹也非不敬以靜也由吾性敬靜而無所主焉則雖念非念也是故其學能開物成務裁成輔相盡人物天地之性而不為勞夫盡性不勞則真全不毁矣故又曰盡性以至于命性也儒者知言之而不達微之體故雜百氏微也老釋能言之而不求盡之之功故成二氏甚哉知微之難言也耒陽曽子舜徴自衡五百里訪豫孟山之麓留十日與語聖人盡性宗㫖而莫豫逆也巳而浸及於微舜徴躍然屬豫著之篇以示人人嗟乎道心之微自虞廷啓之豫雖未深知而曷敢愛言雖然舜徴寧知今之患乎患不在不知微而在知微也不知微之患譬之食蘇藿者其病吐吐者易療知微之患譬之食參耆者其病茹茹者難泄子盍觀于今之士可省也雖然又有譬焉外入者非家寶貨羡者非居積然則豫非患知微而患真知者之艱也子行勉哉子將聖儒其志盡性其宗精之一之乃見其微以執於中姑毋多談賀劉養旦憲副歸省齊壽序豫友少衡劉君始以江西藩參請告歸侍其父封吏部公母陳太安人餘十年矣㑹朝家强起君補粵藩屢陳辭不可不得已行踰年䝉命陟雲南督學憲臣君聞報舍然取道歸覲請得復告終身二大人側于時封吏部公壽八十有四太安人壽七十有九雖誕生殊時而少衡君將集宗戚併舉一觴冀解頥申告已意而或者語君曰先生之悅親左矣夫二大人豈不願君膴仕哉君倘順二大人以行則必能萃四方之珍以腴口腹奚止取諸湘湖之芳洞庭之鮮必能僃四方之音以娛耳目奚止取諸激楚之調思郢之曲必能為明天子外握斧鉞內提銓樞龍光溢被親闈加尋常萬矣奚止為里閭之頌禱宗戚之燕逰先生胡不為彼而為此乃先生門弟子聞之紛然起曰是且未識吏部公之心焉識先生蓋昔者公方年强食貧猶然勑先生逺從羅文恭公學古聖賢之學斯時豈以口腹之腴耳目之娛龍光之溢營計念哉况今加耄矣其所期於先生有不珍而腴不音而娛不斧鉞銓樞而光被膴仕又焉為有無乃相率敦談生某走數百里謁豫言以為二大人歡又介其門人萬安令某申之夫豫與君同年同學兹又同情蓋豫嘗請告重怫慈㫖乃亦舉一觴跽告吾慈闈曰若子在千百里外念大人奚能越晷刻若大人念子在千百里外脫有急盼不得即從左右亦奚能越晷刻若是雖日飲餐大官綰黃金章不樂也今得奉一觴唯阿在左右無乏事其樂豈與身都三事論哉而吾慈闈及宗戚相聞絶倒盡歡若公與太安人豈不同情而少衡君且必有先得豫心同然者矣子歸將覩公與太安人心愈色康飲餐日加眉壽之綏以莫不增君以是燕喜亦且日臻于壽考祺吉殆相為無彊子又奚虞談生聞言喜津津執簡請次其語為獻歌南山而行贈唐曙台父母入覲序君子之學始於仁身終於仁天下後世夫君子一身何以能若斯逺且大哉惟仁則非獨四肢百骸身也其在天下後世疇非身也吾以其宰四肢百骸者命令天下後世各以其相宰者仁其身而君子其庶仁矣哉當其在上為君而明明為相而休休咸必曰吾為天下得人以為仁而處於其下日命令天下後世相宰而為仁乃所為左右君相以毗得人而佇其用也吾嘗譬諸醫國者採擇上藥以佇主人緩急其視為人解一紛拯一厄其功豈百一論也然而君子惟曰吾以既吾仁而他非所知也昔者子游為武城夫子問以得人儒者止知其足以益政而未知夫子之意蓋出此也吾邑人文陵夷漸矣自唐曙台公以更賢來首政在易俗節靡而尤孳孳務典人才日進諸生從業舉中講習卒澤於道其意其饑渴今翩翩與計偕陳生以躍秉浩梁生滂廖生同春康生夢相皆朝夕侍更端髙第弟子也於是吾邑中皆感公善能作人竒諸子得師行且彚征豫則知公之為天下得人毗也公以是月某日戒車入覲此四五子者請為贈子以為公持此報主上較四方循政孰功哉孰功哉公志在既吾仁不自功公且為吾君相進明明休休之道其亦不踰此夫西昌鄉約後序昔豫食司守上川南嘗飭保甲寓行鄉約而駁之者曰是將於里甲外增民役也無乃為厲與豫應之曰昔周室井牧兵賦與比閭族黨義取相維豈故相厲哉乃下令行未周期而民訟大寢㑹四封妖冦盛作境內獨完繇是兩臺臣遂檄行全蜀焉豫歸里人聞而慕亦相與講行不􅀢輟萬厯丁丑豫邑大夫唐令君來臨首議民風輒欲以鄉約從事出其科條語簡而義尤僃未幾士民舉欣欣趨繩束積俗丕變閭閻若更生焉公復露冕躬履四境作新考成誠精為竭且過豫曰子不可無一言以相豫見是約也它方有行者矣然而非有保民之忱則功令寄諸彌文而民不可孚非有安民之政則殘蠧生於弊穴而民不暇為始令君甫下車民覩顔色已知其恤恤焉學道愛人矣乃豫邑宿號逋賦公為更令不施桁楊而輸先峻過此豫知其吏格囹虛比屋嚮方化國日長而三代之政左驗一邑矣豫何幸躬親揖讓其間而敲壤歌成也於乎休哉副將康氏續修族譜序夫自昔有食邑相襲簪笏充家奕世乘朱輪者至數十人有世業詩書代擅著作一門文集至七十餘人是何其名位之穹而文藻之郁也然其子孫皇皇樹利浮華罔實若楊惲劉孝綽焉則禍敗隨之君子之語世家與所為遺子孫者其孰為藉甚哉是故食不必八珍要在菽粟雖終身弗餒也衣不必紈綺要在布帛雖易世足溫也遺子孫者不必名位與文藻要在德義雖百世弗匱也雖然自孔門以知德為難苟有閭巷砥行慕義若渴內睦於家外誦服於鄉人衣德傳於世世則有不膺爵而穹不摛藻而郁者存它不逺引即吾江介若陳伯宣布素士耳乃獨以雍睦利濟訓迪子孫鄉邦化之後不數世有昉有競有旭與度而簪紱科第輒磊磊焉金溪陸公賀嘗以學行教授鄉閭而成其子稱三陸先生及孫持之咸為一代大儒彼其在當時若蔡秦父子孫曽厯世鼎鉉其後人至不敢俎豆而莙蒿之覩此何相萬也然則古今稱世家與所為遺者可彰彰見矣豫邑東南康氏最古其先家金陵十世有二十評事生延孝延孝生八十評事國輔國輔取司馬氏一乳三子南唐主喜曰此人瑞也咸錫封為京兆男伯曰子文為正將仲曰子忠為參將季曰子信為副將以世亂咸奉母避地泰和卜曰聞鍾則止於是伯居銅庒仲居橫乾季居古瑞山皆邑近地今所續修譜則為副將季派季之後仕朝之系多居古瑞至德隆分徙達舍道泰徙談山武城徙千秋象嶺仕玉之系叔忠徙金灘雖咸未有燀爚赫奕而其間著於鄉者為武城永髙著於官者為玉成為遇衷與某某名位文學亦有聞舊譜歐陽恭簡公叙之今續修曰堯圖氏獨捐費二百餘金其兄堯命集子姓編梓成帙皆可謂慕義偉然者矣康氏長少某某以姪思齊受學於豫乃相介紹屬以序豫昔受學於歐陽文莊公公與千秋亦世姻也嘗館榖其家為述康氏習朴近古而公又壻於金灘以其先譽髦翩翩如也頃者康氏義問彌著若古之雍睦利濟競嚮往焉而金灘夢相氏已與計偕試南宫又多蒸蒸慕學其燀爚赫奕孰禦哉雖然子所矚望康氏繇其慕義則九江無弗可繇其慕學則金溪無弗可其它名位之穹將以翊世非為榮也文藻之煜將以明道為非侈也昔者文莊必有語康氏矣爵譽康氏重修族譜序儒者之治譜也鮮不以宗法言此特歆其名耳而非實也古之宗法有世爵以臨之夫是以導則率禁則齊而理在其中其在庶人兩賤之勢不以相使而况為大宗者或顓愚而售詬則又將孰導而孰禁之是故先王之於庶民家有廟以萃渙黨有孰以發矇而導善禁不善之為理者寓焉烏在乎宗法之舉與廢也至於後世則又有譜以為著代叙齒之辨自譜作而廟之萃益篤孰之教益明推諸先王所為理者益周以洽故譜足尚也而譜之行不患無宗法而患其家無老成之人譽髦之士不足以觀磨申飭則雖其譜牒不軌於宗法亦奚以禆雖然古者又有比閭族黨相翊於導善禁不善故能一道同風雖在環堵之中咸有老成與譽髦者相望而駢起此先王所為必世而仁者也乃若以今之世而責以昔之人而欲其旦暮遇也不亦北首而南轅乎嗟夫此豈獨一家為然哉豫鄉在邑北最平衍巨姓棊布而康氏稱著焉康之先在宋立極府君繇金陵宦太和留家爵譽厥後分徙雷岡至幾世祖仲衍來壻里之周氏因復居其故趾始作爵譽康氏譜其後乃有舫川司馬務信徴君樹聲相承繼有存吾處士養浩贈君復編譜牒菊庒二尹北轅長史又續修之越今踰四紀而齒日繁居日析家老長暨文學至德等咸以譜不可無修也乃申諭其子弟某某等增修之而請序於豫豫不揆方以孔門求仁之學為鄉士興而康氏子弟從者獨多已而約束為鄉㑹而其家老長咸嚮往焉頃豫以講學㑹友登其門巍甍古第麟列櫛比班行中龎眉皓首冠纓履綦抑抑顒顒望而知為老成人也子弟從事請席奉匜匪舒匪棘望而知為譽髦士也此康氏譜之繇成也非苟然矣豫既辱世戚又若是習也豫固不可無一言以揚之夫古之比閭族黨之相翊於導善禁不善者咸以處仁而已仁者非小器近道也而人豈槩能之蓋大賢由是以達於道小賢由是以習其事今康氏譜一事耳而有三善世之援華胄襲穹爵以相詡而實則決裂枘鑿不蓋其贋惟康氏自立極公以下首末若引繩然靡有附麗之謬其義例則曰賤藝弗遺老佛弗録又何其厚且正也康氏厯宋元逮明興以明經發家相繼登賢科膺貢辟簪組嬋嫣承承到今未艾而譜之速就未嘗伐其能雄其成此三善者皆世所難而獨易之康氏其將為仁里前驅哉若夫雅志求仁以漸漬乃祖康公之業而際于馮翼孝德之盛休也是在二三子者張氏續修旌忠録序吉郡忠義推文丞相雖孺婦咸知誦之然不知其一時景從艱關勤王則邦之子弟居多若張履翁之徒是也履翁生永新巨宗官學士院檢閲雅與丞相妹壻彭震龍善當丞相督師嶺外柬震龍為援履翁聞輒傾資起義結邑人顔司理偕震龍為城守候王師不至城屠死之三族為赤悲哉入國朝𢎞治丞相得專祠故里震龍配食獨遺履翁嘉靖間御史李公採公議疏諸朝履翁竟得從祀而吉人士聞者莫不咨嗟咏歌尸祝肸蠁宛有生氣履翁之裔始避荼陵安成者代有顯人其居泰和沙里自學正君惠幾傳登正德戊辰進士為煥煥弟某等感先烈榮國典因録刻省郡志所傳履翁死事及䝉褒巔末題曰旌忠屬豫友王尚涵氏序諸首今二十年餘梓燬孫元澗等又續刻之請豫為序豫嘗怪荀子言性惡及讀其書曰物之動者有氣而無知禽獸有知而未有義人生有氣有知而有義夫人有氣有知而有義則性未始惡也荀子之言不自左矣乎今觀履翁事豫益知人心之義之不可後也孟氏云所欲有甚於生豈不諒哉雖然自宇宙來未有若丞相之義烈亦未有若從丞相者奮義之多也即後之崇報雖人列俎豆祇益為勸曷為繁當其時豫邑死事劉士昭出針工豫宗靜山當敷天為元矣而獨以一夫操耒抗之其事尤最竒士昭未知得從祀否靜山後履翁十年始得從祀祀不祀不足言豫獨信人心之義不可後而又慶奮義者之必有後也序可寢乎亡何元澗等又率其家之游豫門者曰朝儒朝海暨豫妹壻可大偕來視成遂奮筆著之篇端賀陳柱峯六十壽序昔陶淵明冲襟逸度絶交賖於世途而獨卷卷責子之篇其故何哉今夫大夫士之在世也鮮不欲其身長久身長久矣然返顧無繼志之男承學之嗣則雖壽等老彭德幾周孔而其衷未能以盡釋蓋觀於詩書所稱則古今人情大略可知也何必淵明然則人子期為釋親之衷壽親之至者豈不誠有道哉雖然此未可易語也何則道之所存世之為親者鮮不曰是奚所與於已奚所為修短而為子者亦鮮不曰是奚與吾親奚所為修短然以是語於親之喜刀泉田舍者則可而以語於其冲襟逸度之前者則咈矣以是安於其身之營刀泉田舍者則可而以安於繼志承學者之衷則疚矣彼固不知為人子者圮道與不圮道其為親修短尤不眇小也嗟夫此其為父子者蓋不易值矣而矧為易言乎豫昔與柱峯陳君始為友相取在古文詞非獨舉業也而為姻又為鄰相左右在德業不督縟文蓋君先世元總管梅村先生嘗壻豫之先世總管有行誼不濵於俗故君世其德而於豫為姻亦非若世之以機利相與者豫叨仕官而君厯試竟弗舉然君之情致髙朗忘懷得失遇酒輒引滿不醉不已蓋有類淵明之為人君與豫今年偕六十而豫皓首柴立不若君青鬢翛翛酣嘯勝夙時是秋君嗣子惟直適登鄉籍與計偕而文學友某某等謀先惟直北行奉觴申祝以為致詞莫踰豫豫觀君自任曠懷灑然出物表視世人鰓鰓仰機利者其所享已十百之矣乃又獲淵明所不可必之願此非所謂天人交鬯者哉為之賢嗣所為壽親之至則將曷以君家之先元方季方咸有勳德以承太丘非不偉煜惟直豈以是為道之存乎夫道之存以萬億世為期者也其身以萬億世為期則其親亦以萬億世為修其視世之以一勛一德顯親者何啻徑庭之逺即世之巍膴者已非其匹而况懷刀泉田舍區區相矜嚴者乎惟直辨夫否則未可為至而終咈且疚非惟無以事冲襟逸度而亦非所謂繼志承學者也於是諸君咸欣曰然乃相率介豫言登堂再拜慶洗腆致用酒歐陽南野先生文選序歐陽先生文莊公既薨之十有五年其門人淮南李公晉秉大鈞闕天下學士大夫延頸歡曰歐陽先生抱聖人之道未獲大行今恢而張之終先生志必李相君也於是李公慨然嘆曰宏先生之學者豫不得讓焉乃取先生文集摘其要者彚成若干卷江陵公序而廣之以屬方伯馮公謂吉故先生鄉也謀諸太守周君刻置郡齊而先生仲子中書君復屬直叙之直少從先生游最久且密面授手勒更僕莫殫未嘗屬草故多不見集中然耳習先生之學則直亦不得委焉自孔子語理曰易知簡能天下理得夫易知者即吾心良知是也故明道之訓格致曰物各付物不役其知則意誠不動不役其知非所謂良知乎學者不信孔子明道惟取決在物為理之一語兢力窮討莫克反其本學術皆為天下裂陽明王公起自絶學亟示之曰大學致知乃致吾之良知非專外也一時豪傑響應而獨稱歐陽先生為盛先生始學近空寂而從政疑於思索乃以書質諸公公答以自私用智喪失良知之語先生遂悟良知真體明覺自然隨感而應燦乎條理自周於天地民物不見有動靜寂感內外之殊是以謂之良知亦謂之天理繇是沛然不疑躬行益篤不遺日履而上達淵微根心生色人我靡形積久宥密愈真醇而愈輝吉筮仕州牧民士尸祝兩守成均教學寢昌天下士方沈訓故競詞章信學者希然一聆先生謦咳飫其誠飲其和莫不爭師事之先生教人不事規條而雅善開發要其㫖則以自知為入門以庸言庸行一循其獨直而行之不動於氣為格致之實以大人萬物一體明明德於天下為志願以無有作好作惡蕩蕩平平為操鵠以與人為善為程課蚤嵗貽書大宰羅公中年往往復雙江聶公決千古疑若指諸掌稽其所語人者其即所自得者歟故言出而天下莫不傳誦事成而天下莫不悅服推其心惟懼一人不入於善遊其門殆亦不下三千非獨元夫巨人競相師慕雖夙稱神奸炙先生言貌未嘗不瞿然傾化也晚起宗伯荷知先皇益以斯世自任若有宇宙在手之意弼亮閎猷已見崖略血誠至公風動上下其利害不入心故憑河而不却其毁譽不奸志故包荒而忘遐遺其度休故常任天下而人不疑其道遷故變通鼓舞以盡神災異建儲二疏皆當時所禁舌難言者而獨發之識者謂先生之學允乎周於天地名物上承孔子明道之正脉而跡之在朝則夷䕫之直清寅恭伊旦之瘝躬吐握殆兼有之自陽明公後稱全才者先生弗可班矣而時勢之左竟莫遂其初志乃聞退語所親有捐世之意比寢疾方欲乞身而不幸長終矣悲夫先生視宇宙誠吾身矧曰斯道大行不在其身已在其門人而淮南公又能紬繹遺言以嘉惠今天下士將逮於無窮至是則先生復何憾焉直獨念良知之體其本無一物而其䆒則所謂周天地名物者不可以聲臭求而形骸隔故先生雅言良知無外而有外之學非真致其良知者是以先生之學芻蕘可備採擇而罝兔可為腹心其能自任天下之重良以是也雖然是道也廣矣向使有一物岐於其中則崒乎其為之隔矣又烏能通於天下之大彼隔焉者不足言而世之學者又多以有物之體依傍於無外之道遂至縱任自恣無復格致之實以致憂道君子又復救以虛寂若指良知為不足者誠如是則異乎吾夫子所謂易簡理得者矣噫此非良知之不足也由學者未能真見良知故也夫良知本無一物則既不可以縱任而亦未嘗不虛寂故必有真志然後能真見其良知真見其良知然後能以無物達無外家國天下可坐理矣此固淮南公之深矚亦先生遺㫖也直何足以竟其藴衡廬精舍藏稿卷十
