body:
  text: 衡廬續稿巻十明胡直著墓表族祖順菴公墓表於戲世孰不知貽子孫哉贏而筐箱不如樸而義方腴而廩庾不如瘠而詩書何則義方在則可與知趨詩書事則可與有植也若予義和近代累葉迄無豐産惟幸抱樸喜義務治詩書自予有識以來覩記曾祖行若愚菴公拱南園公教此二老者皆近無懐氏民也祖行自謙齋府君以下則有樂善公行福心田公仰耕彛軒公昌徳最少為順菴公其樸而近義咸足以䕶持元氣維植家範為盛代醇民順菴公諱錫字仰祚即南園公冡嗣也少負義氣非公正不發憤以窶遊東粤為下賈時城中豪家有逆僮盜百金餘匿公舍中公執之僮願輸金于公以遁公曰吾豈以金易義乎卒白其事粤人至今髙其義不置口越數十年稍贏嚢有羨貸人不責重息服食則仍與最下者埒平生非禮聲色未嘗入耳目事南園翁務得歡心有疾藥湯親嘗嘉靖癸夘翁卒哀毁骨立塟祭稱力要不詭于禮母陳孺人孀居生事塟祭一如翁禮嵗壬戌例行丈糧邑侯楊公署公分任其地鄉鄰咸誦服之三族議修譜建祠皆曰各族非無長者惟順菴公端謹諸凡監督請都其事數年不少倦族人莫有以私議者時舉家約推公為約首長公率以正又能堅忍不憑氣族中萬指莫不唯公聽鄉有槎灘陂灌兩郷九都宋中元末五姓築陂吾胡氏其一也至是陂圯公與衆姓鳩力修築兩鄉利賴如先世焉末年二子不禄公力教諸孫萬厯丙子次孫裘補邑庠弟子員公督從予問學一時學博縣侯稔聞公髙義肅弟子賔公鄉飲又因八袠欲以例榮公冠帶公皆固郤曰不爾則吾且入山之深矣庚辰伯孫胃甫授徒東粤夜夢大雪見公夢中囑以人道大端遄歸時五月之三日公尚健飲不日輒呼諸孫示弗寧趣治後事又戒以立身立家語語畢告終正寢矣實五月十日也遡其生某年月日享年八十有三袝塟西岡南園公塋左某向配長隴張孺人生子二長某次匡羣娶蕭氏孫四長即胃甫娶某氏次軫甫蚤卒次即裘字箕甫邑庠生娶某氏季昴甫娶某氏曾孫某皆羣後予嘗觀太史公言閭巷砥行立身若斯人亦豈易覩哉彼巍爵膴禄與阡陌萬鏹之夫尚林林騖恣睢圉奪不肯休况布褐士乎以公所操執行事獨端且知義終其身有禆族里焉允哉其閭巷醇民夫故曰不易覩然吾所述數君子者其後皆能毓雋治詩書安知天道不有在耶吾故表順菴公墓而三致意焉贈監察御史慕雲楊公墓表公諱紹祖字某邑楊文貞公五世孫也先世具史傳暨諸載籍父諱思堯白雲其號故公號慕雲向白雲公遊道日廣蚤客死䖍中人睥睨公孤且孱謂白雲後將落也而公則日夜泣恐墜先人緒既長聞舅氏武陽王先生講業龍灣之間公師之聽其言躍如也一時龍灣子弟自以篤實出公下母王氏拮据勤家尋卧病不能治産公壹禀令而後敢言行事藥必嘗乃敢進是時太母劉春秋髙而王又向依外王父居公知王所以􅔵􅔵如有失者凢以劉故則迎劉來並奉之㑹劉七十公日為擊鮮倫膚上觴跪祝又集諸里婦置酒大洽而劉始驩甚其年公舉今侍御君王抱侍御君弄之膝上以嬉劉曰抱孫抱孫而劉益驩甚久之王病痢且劇又不欲醫來公曰柰何束手以從母命苟能獻海上仙方者不難千金已乃果得秘方而王竟起及劉病公無以異乎侍王病也先是劉最愛少子視白雲公稍後其視公如之公誠孝得當劉驩心而劉卒幸愛之視猶少子斯益見公哉公自問學以來日窺古人行誼嵗時伏臘雖𤓰祭必敬而尤嚴于祠墓白雲公初塟清溪以形家言刻日改厝㑹有言日在大火之次不利已諸公曰吾憾不旦夜安吾親也寧事異日亦寧有火墓者哉趣啓棺果見蟻公且泣且詈曰幾敗乃事畢事三日而廬室火公竟無悔其篤於養生送死類此公喜賔客又不侵然諾一旦扣門有急必應或乞錢於公不給則乞諸人以應之而不收劵書至人負之勿問也里中往往誦義而族兄通政公亦曰是且類我公既晩尤勤誨子知御史君之頴脱也乃日夜程督君學大要重先世清白故君以甲戌成進士始令東莞課最贈公如其官既登御史臺未幾月即撃去秉銓大奸天下咸誦文貞公有賢孫而莫知慕雲公式榖之為力殷也公於是䝉恩改贈某道監察御史元配南坑蕭繼大蓬蕭贈封咸孺人有丈夫子三人長寅春嘗從予學南坑出仲即侍御君今為浙江按察司僉事季寅冬咸有文女一適予族子太學生起鳴則皆大蓬所自出公生某年月日卒某年月日得年四十有七塟今某山某向之原侍御君謂予故好也以墓表請予雅聞侍御言人子欲論譔其親之美當如畫史傳神則庶幾哉子孫仰瞻若將見之予深有味其言雖然俾畫史者未逮親覩見其形容則能彷彿未盡也昔者吾武陽先生抱道士也公舊學于武陽予得因武陽交驩公以予之鄙為公論譔而表著之者豈獨彷彿哉矧曰文貞公以四朝元勲光昭于先後嗣若侍御君又以直節鳴天下公上承下啓而姱修若此公誠可表于世夫龍池劉公墓表余往在都下友人麻城耿伯子屈指海内同志必稱其邑友劉君師召因得習君先子龍池公茂行隆慶庚午余視湖廣學與二三君論學齊安劉君在焉遂手耿伯子所為公狀暨大司馬劉端簡公銘示余而謁為墓表按公諱光字徳厚麻城河東故有黒龍岡劉氏世居曽祖王父而下隂行善公少敏治春秋以諸生髙等舉正徳庚午上春官不售嘉靖丙戌母老謁選授汝寧别駕甫下車能決屠鬭誤殺傍人者如律遂以敏練著稱確羅二邑獲盜出官兵誣服者移成獄于公悉平反之初執成案者始不悅已乃知公無它腸遂反相得自是旁郡有疑獄争質成劉别駕者尋巨盜殺守備官兵亡他所莫可孰何監司檄公擒捕卒用竒計縛二首惡獻當事者奬以百金公悉頒諸用命者郡守復用五十金相勞公還之府藏曰吾分也敢受上賞事聞闕下下本兵論公首功而公丁何安人憂服除補廣州府所屬連州二水洞巨盜叛服不常時且薄城聞公先聲乃悉就撫聴繩束不月餘而境内平視篆南海大豪數與民争淤田莫能制公至爭所著為令甲曰已納賦者直不者曲豪乃帖相率勒石記之公素彊直亷峻廣故多珍貨而公澹然􅍦以不善脂韋失督府意調栁州㑹安南有釁檄從勑使往勘問既至夷皆輸服不煩一戈是時公已搆疾遂乞歸先是公用廣州判奏績進承徳郎贈父母如官歸自栁州杜門謝事非公不見邑令日與熊司理某者徜徉吟咏有塵外風致鄉人稱河東二老云公悃愊不修喜怒不見與人處油油然居常儉朴糲飯疏布意恬如也其家範可世世法邑大夫欽風造廬扁堂曰耆徳有大事則就問公忽謝世卒之日邑愽黎君大鵬汝寧人甫至聞同僚出吊未知吊公已乃拜于幕曰自公去吾汝且三十年吾汝尸祝之如一日孰謂大鵬至是邦不得奉色笑言未竟涕霪霪下易簀時立仲子等床下訓曰吾年將及耋何憾若第能俾余與程太中同遊地下死即瞑目仲子即劉君師召氏也公有丈夫子四伯某邑庠生先公卒仲師召仕至松江府通判叔師皋亦庠生季師啓嗟乎公望仲子等逺且大仲子果淬礪躬行自麗于道居官政教與俗吏異指卒偕楚侗耿君栁塘周君發明孔孟宗緒世因君益信學君蔚為醇儒善成公志公所遭固不庶幾大中同流者哉予以是表公于石不辭行太僕卿進階嘉議大夫月川王公墓表昔吉水羅先生文恭生平慎許可雖貴勢人百方不能繆得一語之褒惟黄陂月川王公來令吉水文恭眎其循亷則為扁其堂曰清白又為對語有生我桐鄉期君清獻之詞一時覽者謂公得重語不啻榮衮自非質有其事其烏能致之時吉水方行丈田公必與文恭講求行之卒不為厲邑故樸而文公與民興革條教法令不為鉤距境内大治已而遭旱魃禱雨輒應又賑濟有方所全活不可數嘉靖癸夘予時領鄉書出公門下公因語曰吾政無它長惟晝覩耕犂夜不聞鳴犬足矣然公用是一不為表襮故知者希三年陟為南户部主事毋憂去服闋補北戸曹出理宻雲糧餉恊謀督府擒虜有功䝉恩賚白金拾兩尋遷郎中督邊儲先是宿蠧蝟積公悉守令甲月成嵗㑹遂絶乾沒之弊擢守保寧公至㑹採木命下亟為調畫夫役迄不至擾又嚴束黠吏力禁民暴辯雪士寃弭蒼昭巨盗民為樹古閬遺愛碑士為著亷二千石説人為實録辛酉陞雲南按察司副使至則訊黔國之毒解黎副使林叅議之誣御史始猶難之公奮然曰若是則寧褫吾官吾焉能誣人以媚人哉御史竟不能奪壬戌陞甘肅行太僕寺卿居二年遂以疾請致政歸既歸絶不口時事暇則以圖史花卉自愉予昔兩持楚憲公未嘗以事干既晩課孫以文日鬯如也隆慶改元覃恩晉級嘉議大夫秩三品萬厯乙亥春偶疾竟弗起得年七十知者謂公位與年咸未獲上躋以為公悼予常觀古之傳循吏者或以縣令或以郡守不必其官或以一事或以三載不必其時若公則令守操若畫一而先後譽出一口古人所稱奉法循理可以為政則公之謂也公所為顯與夀者固不在兹乎矧公臻上大夫之階登古稀之筭子孫三世又斌斌足繼也而固曷少哉公諱霽字汝明月川其號父某以公貴贈戸部江西司主事母熊太守𢎞女贈太安人配余氏封安人先公卒子一化熙太學生孫男一師曽亦太學生曾孫男一嘉元化熙以予習知公屬予門人熊生徴䕫越江蹈湖厯數千里請表公墓嗟乎此予分也曷敢以不敏辭乃為首掲公吉水保寧事以俟傳循政者考焉若夫公之孝友質厚則有家族鄉閭之口實存固沒世不諼也兹不具載確齋處士墓表吾胡氏自仲祖承先大夫緒業以富厚甲閭右其後多匱約雖詩書纓組相繩而約自若迄無陵粟穴金之藏然家世負氣仗義又勤朴不事侈靡即窶極亦能以纎嗇逐時致積居取充衣食無至餒絶而有義舉即爭奔走焉視里中數百年間富厚者屢興屢仆而吾胡氏亦自若故不以貲著而以完稱若吾確齋處士則亦以纎嗇致積居又不獨充衣食已者也處士名厚字仰堅父靜軒翁沄母陳氏以某年月日生處士自其少已有心計能忍嗜欲時節縮勤菑播不遺餘力又嘗從靜軒翁遨嶺表行子母錢不過督逋貸人競趣之中年致有葢藏然處士喜信義一然諾不肯自食又恂恂謙慎覩其體貌𦕈不勝衣然聞倡義即無不踴躍于時兩鄉興求仁之約吾胡氏亦故有家約而從㬰後先之者則處士力多也末年敦樸猶故不一御綺麗訓其子素無廣田宅素守其言到今不敢違生平自以仗義惇信履謙守儉四者確乎無以易也故自號確齋郡搢紳大夫士髙其為人咸有文叙述處士行事具悉嗟夫使處士非質有是四者載而行之則無以居享而致斯譽也故觀所享而知仁義亦諒矣哉處士以某年月日卒得年若干子二某某今子素以某年月日奉處士塟某山某向之原乃徴同邑尹大夫十洲君銘其墓而屬族子某為表之夫人飾情矯行可欺遐方而不可愚里閭窽言令色可媚里閭而不可範子嗣處士逝幾何年矣而子某急義後利獨殷如捐陂金輸社榖助搆求仁約寓出力不尠是非處士遺訓懿􅚘而孰使然哉向使予族人行皆處士則古所謂安其居樂其食時吏不至呼門可以幾矣予故叙而表之用勗夫嗣處士者益勸而成乎兩封安人王母張氏墓表子越舞象之年起諸生交茶泉王子王子少予一嵗已先遊庠有聲稱矣既予先受室而王子踰數嵗乃婚予鄉沙里張安人張安人與予室蕭去舍許睦若妯娌嵗時問訊織道萬厯辛巳予室背棄張安人抱哀甚今年癸未之夏六月乃安人亦相繼逝矣豈相為期耶悲哉張安人諱某父遇自號清溪居士正徳戊辰進士煥其族父也母蕭氏以嘉靖甲申九月十七日舉安人居士相攸耳王子名授意妁者聞諸贈公矢齋先生遂締姻焉年十六歸王子時嘉靖已亥卄九日而明年庚子大比王子亦以是日掲榜列江省第一人是時劉太安人治家嚴勤衆虞安人少婦難膺乃安人折節自女紅外旦夜不自休躬親臼爨習庖割始戛戛乎久乃便焉遊刃若畫一薦諸姑姑已心賞之又能先意承順無弗姑是悦劉太安人乃大愉曰少婦誠賢而安人未嘗一日自伐其能居妯娌間詵詵如也贈公病膈賛王子迎國醫供糈恐後越嵗如一日劉太安人晩病怔忡易恚安人益俛俛候伺弗越寸晷既沒哭彌痛曰操習成我語未嘗不濕衣也乙未王子謁選厭吏事告受校官得華亭華亭士習稍稍異鄉邑王子每扑其不若于訓者安人則毎諌曰子無以鄉邑眎也恐叢怨于子躬王子為怵然聽之繼遷國學寓禁城東北凢客訪自西南來者十里而遥王子必延留安人具饌必時必腆雖僮從腹不逮枵它家多不爾客以是知王子有賢相後轉大理亦然于時王子有審録雲貴之命偕安人南旋丁夘莊皇帝改元覃恩明年冊立東宫安人兩膺封典翟冠霞帔族戚交榮而安人固退然一若少婦時自家庭至疏屬卑行類能絶甘分少有急必應貸而逋與償不足劵者置勿問其自御蔬食疏布恬然王子未五十自解官安人無不從臾晩年喜佛晨夕禮足歴二紀無懈視臧獲不忍加撻撫妾媵迄無猜意以是中外咸誦安人賢如出一口無不祝安人遐算閱及孫曽然安人竟病瘠弱又鬱鬱為孫晩遂逝得年才上六袠豈其夀不以年而振振繩繩者已逆覩身後矣王子慎遴塟所獲四十八都下龍門洛坑虎形某向以是年某月日安厝乃自誌壙内而属予表墓外且曰安人益友也予耳熟安人閫行良然王子諱渤字尚􅉼號茶泉以大理寺寺正致歸子一扆庠生有雋才女二長適予友歐陽子子斯敬亦庠生安人出次聘康太尹孫某側室李出予猶憶歐陽子與王子及予相為賛婚事如昨朝然今歐陽子夫婦與斯敬久故而予室又偕安人同往予乃為詳其事如右葢既可述而彌有可感者存夀藏志新創吉水龍家邊夀藏志胡子以萬厯癸酉上書解廣東按察使歸養丁丑周太安人終窆邑東之鄭家原牛䦨丘背距贑江八里許胡子服除益抱瘵遂謝當時跧伏山隩凡十霜而年且六十五矣于時配蕭安人亦棄去方艱卜兆友人侍御賀文南君以壤讓葢在吉水張家渡之下流三里許曰龍家邊山脈自青原蜿蜒歴數崇嶂為雙峯逆奔踞江而止贑江走其下其右砂逆抱而成案案内水左旋若螺旋乃出江江外特朝即娑羅山若冠葢焉青烏家靣勢為夘脈申庚向宜又狀其形曰伏地獅或曰下山蜈蚣交稱吉胡子乃令子順塋其右厝蕭安人遂自營夀藏居左方而親友觀者紛紜諗于胡子曰先生之營是也亦蚤矣胡子曰嘻君何覩之晩也夫有生必有死古之賢聖唯以朝聞夕可為難而事詎可免昔司空表聖既豫為壙又引客飲酒賦詩其間謂曰吾寧暫游此中哉雖然此有數存非予能就避之也予曩嵗偕同郡諸君講學青原山夜夢見山巔嵬崔踴躍矗矗下其麓有塜人曰此君家塜也詰曉以語門人鄒子元標鄒曰夜中王君某亦為先生叶此夢王與鄒俱吉水人也已而君至諏之良符今此壤𨽻吉水山脉乃果自青原山發也豈不異哉雖然尤有異焉去嵗之春予方溯小艇謁先太安人墓于牛闌丘取道龍家邊眄而躡其山足已心卜斯壤矣然先宿夢予邑龍西華先生以物見畀晨睹此壤諏之為龍家邊有龍姓者宅其左又半里為西華觀心益自竒以其地逺置勿問乃不知侍御君之讓即斯壤耶豈不尤異乎哉人之視生死大矣乃不知生與死以逮歸藏之所則皆前定久矣而君果何嫌又何蚤之疑為觀者亡以應於是築之翼如皋如賁如其友䝉山陳子為題其額曰泰和義和里胡氏佳城胡氏上世繇醴陵轉金陵徙泰和之義和里胡子名直字正甫始號廬山子嘗游衡卜隠未果而所居據衡廬之交既晩稱衡廬耕雲老農云胡子少孤年卄六始慕聖人之學乃從學歐陽文莊公繼學于羅文恭公三十七入仕今自顧老矣而又稔瘵莫能大樹以光斯道有慚徳焉然自信惟朝聞夕可日有孳孳兀然不知死生之將代乎前而又况世之榮辱毁讃乎哉所著有胡子衡齊八篇詩文若干巻高祖哲寳坻訓導曾祖爾極祖行恭父晴岡府君諱天鳳贈刑部雲南司員外郎母漆田周氏封太安人生子三長即胡子娶茅園巷聮科里蕭氏即蕭安人以今年仲冬十有八日安厝右穴生子一即順也孫男四士統士紀士綸士經胡子以龍家邊去舍七十里而遥乃獨詳墓事著其本末用祈于知言君子以詔來葉作夀藏志衡廬續稿巻十
