body:
  text: 衡廬精舎藏稿原序先生之所謂䇿府也阿平無險四徹中繩寡草木而無鳥獸悉其所制作可掩古可昭来者舉而藏焉荆揚之間語無險而中繩者孰逾衡廬蓋神禹經之矣尚書惟揚州彭蠡既豬惟荆州荆及衡陽山海經載南海之内有衡山有三天子之都一名天子鄣即廬山也而禹各有藏衡之藏在岣嶁雲密嶽麓凡七十七字廬之藏在紫霄石室中百餘字不可辨堇識所謂洪荒漾余乃攆是已廬陵凑二山中北距廬東距衡俱不能千里予師胡正甫先生生於其間自號廬山名其居曰衡廬精舎先生少讀古人書長學於歐陽文莊羅文恭二公契餘姚之㫖以上窺孔孟之際所著書若干巻其宗鄒魯其文洪範國雅其詩賦建安大厯脩胸中之誠以攄之書棄知棄意以明道而畧物閎而盧牟六合斂而綜攝一貫鉅而敷陳皇王纎而箴縷醫筮靡不蹠其元閫協厥六經子章自少從先生游得而卒業焉間請付之剞劂先生曰非吾志也吾名吾書曰藏之衡廬耳子章曰有藏則有副以俟後世聖人君子乃謀之二三子而刻之嗟乎衡廬之藏兆自神禹文不盡解大都紀決排敘疆理至其見知堯舜為萬世文命之祖說在人心惟危道心惟㣲精一執中數語予觀先生所藏不禹之績而禹之心其教子章曰聖學始於仁而要在無欲語學至於無至矣克伐怨欲不行不得為仁有所恐懼憂患忿懥好樂則心不在有所未無不行未盡無而何以名仁孟子論養心在寡欲養浩然之氣在無害故曰無適無莫君子也無意無必無固無我聖人也無聲無臭天也至於無則道心㣲而中執是乃所謂仁是先生藏稿之大都也楚周元公論聖學以一為要而直以無欲當一先生之教恍若券合而說者謂元公産於衡止於廬先生宅於廬締於衡其跡亦若片合豈二山之靈兆於禹嬰薄於元公而凝翕於先生耶嗟乎禹之學以柏翳光元公之學以洛陽衍今所為先生柏翳洛陽者屬之誰乎子章不敏敬告吾黨諸君子相與共淬礪焉欽定四庫全書集部六衡廬精舎藏稿目録别集類五明巻一賦巻二古樂府巻三五言古詩巻四七言古詩巻五五言律詩巻六七言律詩巻七五言排律五言絶句七言絶句巻八序巻九序巻十序巻十一記巻十二記巻十三辯巻十四論巻十五議說巻十六解頌賛巻十七策巻十八題跋巻十九書巻二十書疏巻二十一碑祭文巻二十二傳墓表巻二十三行狀巻二十四行狀巻二十五墓誌銘巻二十六墓誌銘巻二十七雜著巻二十八雜著巻二十九雜著巻三十雜著衡廬精舍續稿目錄巻一賦詩巻二序巻三記巻四書巻五頌賛跋巻六行狀巻七祭文巻八墓誌銘巻九墓誌銘巻十墓表壽藏志巻十一傳臣等謹案衡廬精舍藏稿三十巻續稿十一巻明胡直撰直有胡子衡齊已著錄泰和人嘉靖丙辰進士官至福建按察使是集為其門人郭子章所刻凡賦一卷樂府一巻古近體詩五巻文十九巻雜著四巻又續集詩賦一巻文十巻不知何人所編巻首悼才賦下注少作二字殆其後人取初集簡汰之餘與其晚年未刻之作裒為一帙也直家泰和東距衡山不千里北距廬山亦不千里故取二山之名名其書室因以名集直初從歐陽徳游又從羅洪先游其學一以姚江為宗故所作胡子衡齊八巻大抵闡明心學然明儒學案稱其少駘宕好攻古文詞年二十六始講學故其文章頗雅健有格無抄撮語錄之習又其宗㫖謂釋氏主於出世故其學止於明心明心則雖照乎天地萬物而終歸於無有儒者主於經世故其學在於盡心盡心則能察乎天地而常處之有故其文章亦頗篤實近理未至王學末流之誕放至於雜著諸篇如設罿獵人之類詆訶薄俗未免少傷忠厚考直初見歐陽徳時徳病其疾惡太嚴一切憤憤不平是已先失仁體殆亦其夙見未融故嬉笑怒罵不覺言之過歟乾隆四十五年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
