body:
  text: 衡廬續稿卷四明胡直撰書復沈蛟門侍講書夫士戒無因而前者此為末世遊士語豈足準哉古者友天下之善士又尚論古之人未嘗藉介紹論因由者何哉以其因在我故也因在我者道術是也而人與已古與今不異觀矣某未足語此乃何幸有門下某嘗妄謂後世士以事功見者至難遘而君子猶不許其知道若夫瞡瞡焉以文辭見而已者其逺道又何假辨雖然道固何嫌于事功文辭哉辟之水焉事功者道之流濟也而文辭其流濟之著于方迹者也故謂道必有事功文辭則可謂専求事功文辭而視道術若拼拇無所用之則雖欲為流濟而水非其水矣水非其水者非謂無水也謂斷港汚瀆是也此斷港汚瀆者久矣自埒於江與河然而不可欺于易牙竟陵子之口矣又况柄文詞者內史而外經聖馬遷而傭孔孟乃至翦裁模畫不敢離黍米其極則盜哭為悲借笑為歡不自知所從來于是有能求六經孔孟之為文則曰此文之别種有能發其精意微言以揭示人人則世益起而彈射之甚哉世之好似而不好真何其紛紛也故僕雅曰不憂文而憂世不憂世而憂道謂憂夫水非其水者之為弊深也往遊四方得門下文讀之再四矯然嘆曰是何其言不從人之哭笑以為哭笑者也蓋必有見于水源者矣是必為江河既歸懷此無與語間者以語蕭夷陵不謂聞于門下輒先以瑤緘纁幣逺賁及于山椒之間夫以禁近臣不鄙草莽此固門下餘事若乃自忘白雪之髙致而欲定同聲于下俚之音又何其舍己者過而從人者輕也某以是屏息知門下且將為巨海又亡論江河雖然某固慚非據矣抑何為門下報夫今世士好言馬遷乃不知馬遷雖未達孔孟門庭猶欲以史記繼春秋當其發迹龍門遊齊魯至浮沅湘其志力已凌出庸衆故抒為文辭制作亦豈肯從人翦裁模畫盜哭笑以為哭笑哉然馬遷終不得為江河以未嘗從事道術而得其源也馬遷且爾而况以翦裁模畫希馬遷者乎假令馬遷嘗從事道術而得其源則當凌出漢臣為禹稷伊衡其又孰禦歐陽氏曰修于身施于事不見于言可也假令果修于身見于事如禹稷伊衡三公則雖百馬遷何足道哉昔者嘗觀禹稷伊衡三公至于粒我蒸民格于皇天其流濟至博也乃又不知其啓于思而已禹稷思天下飢溺由已伊衡思天下一夫不獲若已推而溝之當其仰而思則將欲為馬遷迄不暇矣又况以翦裁模畫希馬遷者乎是則思固所謂水源者也締讀來教有曰操約而欲奢不可以幾約意懼鄙人者之以約自限也鄙人者何足以知約彼三公者操一思至賴于萬世則約之未始非博也某誠懼天下不同三公者之思思同矣而奚奢不奢通方不通方之患瞻今天下若門下固睿于三公之思者也夫是以不從人為哭笑夫是以忘其高致而逮下俚其蓄逺矣且夫禹稷伊衡固亦門下職業存焉者也故曰門下當為巨海某也沈病柴而立人間矣久跧山隩即家問樊之不通頃因家弟貢生敬赴南宫念無以為知己者報聊布一二二昔子美著詩有許身稷契之語或謂子美詎逮此已而讀其贈吳郎詩至憫惻撲棗窮婺則恤恤焉以恐懼須親為囑然後知子美誠有稷契之一斑者也偉哉三代以下文士籠挫古今非不巨麗乃有子美之心希矣雖然子美有其心無其學故其自獻止欲企及相如枚臯而與曩自許者若兩人不相為不可惜哉夫稷契奚學也大哉帝堯克明峻德稷契之學豈異焉記曰大人耐以天下為一家中國為一人非意之也此非峻大其德之謂乎故誠有峻大其德之學則疇非峻大而非其學也即一斑之明滅終無以為矣頃家弟貢士胡敬赴銓率爾通左右書固知門下有其心又有其才乃因是僣以學叩也抑見林莽間欣欣快稷契復覯良為斯世預慶家弟兩書感誦眷引不遺下士類此兹擬蕭希之赴計敬附布謝伏冀珍護以幸斯世與郭相奎衡齊之作専為斯學蓋自癸酉乞養歸不期丁丑以後哀疚相仍遂抱沈疴既謝世塗又不能出遊四方就正有道且不能似前為鄉中及四方士講磨故不得已著此書大意因前哲雖發明此學尚似有懷忌含諱不敢直前盡發乃不知不直則道不見以致談者狐疑指摘莫決從違而同志中好立門戶與務竒爭異者亦自矛盾斯學何由明人心何由定古人一道同風固若是乎僕不忖漫為八字打開一口説破直將此學盡頭究竟不敢仍為先儒顧惜門面如昔人狐媚以取天下者之倫蓋亦實見此理非由外鑠由本達末先貴知本夫崇本非遺末也乃正所謂本末一致也大要明中徵孔二篇則宗旨工夫證據不杜撰明矣孔子曰言之無文行之不逺故又不得已而文之非欲為文以表見也其間頗有苦心有聖者作或有取焉知我罪我曷恤哉吾子必諒於此矣復布以見熲熲答郭相奎承遣使解到拙稿刻板凡若干片費足下工力巨矣巨矣及得印發者適羅近溪在座共閲佳序辭旨法度髙古爛郁令人不敢正視已而細誦知以禹與元公言則益令人慚􅋏無地不穀初學文亦止欲與時好爭鴈騖行其後涉道之藩乃浸知學問發明亦不越是而古人文斷斷必出于道始為正法眼藏漫欲融漢宋為一治通古今為一轍以為斯道傳神然力終不逮雖然亦取其略窺古人緒餘少澤於道而已矣詎敢以禹與元公言哉來旨毋亦誘而至之不穀於文而已矣其道敢不勉夫所謂繇無欲達無意必極於無聲臭此非遠不可即也願賢者共加力焉不穀灰心世途足下所悉繆荷當寧再録畎畝自顧朽劣欲復從事簿書期會間勢非便也以是不果閩行辰下欲赴界上繳憑遂為從姑之遊期來月中而發少旋必得榮轉佳報計必便省可以握袂傾倒也使行迫甚力布不罄所懷衡廬續稿卷四
