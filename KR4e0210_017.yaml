body:
  text: 衡廬精舍藏稿巻十七明胡直撰策問問自三代以下兵家者流獨喜言智算故孫子曰多算勝少算不勝或者謂非仁義之師良然矣然詩美大將則曰克壯其猶易戒害成則曰機事不宻孔子行三軍亦云好謀而成則智算若不可廢者不識古聖王仁義之師果皆不用智算如陳餘房琯自矜儒者聽其善敗可歟苟不聽其善敗必如易詩孔子之言則謂仁義不廢智算亦可歟至如崤谷兵寡兼行增竈智矣今若兵寡可復增竈乎歴城運竭唱籌量沙智矣今若運竭可復量沙乎不戰收保衆指為怯卒至以奇陳大破殺匈奴十餘萬騎留兵分屯人訝其遲卒能以重兵大擊先零降斬四萬有餘此皆以智算勝者不識今若禦敵亦可襲而用之歟或云虚者實之實者虚之虛虛實實形人而我無形以極於神且微者此兵家勝算之妙也不知亦有可指言者或又云善廟算者先間諜今用兵者既不善間又多以偵諜失真致敗果何道以致其真庶有裨于仁義之師歟凡此皆兵家要機爾諸弁士訓習有年矣試悉心以對用觀折衝之略古今談兵事者浩矣檢括其論議甄別其功用則其家有二蓋言仁義者下智算語智算者迂仁義二家之説交持域中而世之用之者則咸瞡瞡睢睢左仁義而右智算趨若江河變若風雲若是者何也則言仁義者之過也彼言仁義者曰仁義之師堂堂皇皇惟主於問罪令自服而已故有舞干之格而無寢鼓之襲有因壘之降而無絶幕之誅若乃區區伐謀致勝是為詐力而已儒者不道也嗟夫是說也其于智算眊矣而仁義亦未為瞭也愚請姑言智算兼明仁義漸復明問可乎今夫天下有上智有中智有下智何謂上智治未亂保未虞其為化理感通者豫也故有協和之德斯成舞干之化有求寧之政斯致因壘之效彼二聖人者豈一朝夕然哉易所謂聰明睿智神武不殺者是也斯非上智哉故上智即仁義也外仁義無上智也何謂中智葢世主非先有堯舜文王之治一旦内憂猝起外患洊臻人臣上急君父中援社稷下厪生民徐俟之則血已赭於原隰微懐之則燼已飛于都邑近募逺徴日銷萬金主震國揺生民鼎沸當此之時乃曰我為仁義不用智算内不能為可勝外不能得敵之虛實而制其變坐視危亂莫之能救是不仁義之大者也故田單不為火牛炫燿則即墨將為墟陳平不出女子于城髙帝且坐虜矣此必不可也然猶曰田陳不足語也不曰郭汾陽伏士壁内陽為逃遁以敗慶緒范文正宻備板築不告士卒而城大順是二君子者覩其心何心也故智算者仁義之妙應也以其未能先圖而出應變故曰中智何謂下智則詐力是也若劉先主欺劉璋而奪其國唐太宗以宫人私侍髙祖而脅以臣突厥此固不可言仁義而亦難言智算也孟子曰行一不義殺一不辜而得天下不為君子之心必出于此而後可以用智算繇斯以談智算而謂之仁義者無他以其出於公焉故也智算而謂之詐力者亦無他以其心出于私焉故也知此則執事之明問可復矣今夫天下之事既出于公尤必凖諸經折諸聖而後可以無憾執事引詩言壯猶易言機事以及孔子所稱好謀則既凖經質聖瞭然知有仁義之智算矣又豈獨曰仁義不廢智算已哉若夫孫子所云多算勝少算不勝其言雖有符於詩易孔子而其心則純以兵家為詭道以伊吕為間臣是亦惡足與語仁義也哉至于陳餘絀廣武不用而斬于泜水房琯用劉秩車戰而敗諸陳濤是非獨不知智算則亦未可言仁義者至哉仁義之智算可易言乎何則兵家有不可豫圖之變時勢是也用兵有因時審勢以成致勝之機虛實是也夫曰不可豫圖則執成見以馭之者必格而左曰因時審勢則席故智以行之者必膠而漏虞詡兵寡兼行増竈檀道濟運竭唱籌量沙此不足而示之有餘所謂虛者實之是也今若遇兵寡運竭而復用之則亦觀于其勢而已苟有善者雖虛而虛之可也李牧椎牛饗士不戰收保趙充國上書闕下留兵屯田此有餘而示之不足所謂實者虛之是也今若遇疆埸有事而襲用之則亦審于其時而已苟有善者雖實而實之可也雖然虛實豈可以定擬哉時勢者其變也强弱贏絀大小治亂衆寡勞逸堅瑕遲速者其形也庸將泥形以待變故我有形而人得形之智將因變以制形故形人而我常無形愚也請指言其一二而執事試採聽焉法曰十則圖之五則攻之言貴多也故王翦取郢非六十萬人不可而謝𤣥則以八千精鋭涉渡淝水破苻堅百萬衆此多寡之形不可預泥也法曰以飽待飢以逸待勞言貴逸也昔王國攻圍陳倉不克疲敝解去董卓謂歸衆勿追皇甫嵩率兵攻之連戰大㨗國走而死而段紀明追羌出奢延澤輕兵一日夜行二百餘里擊賊破之至士卒飢渴又勒衆推方奪賊令鮮水上此勞逸之形不可預泥也法曰攻堅則瑕者堅攻瑕則堅者瑕故孫子教田忌取上駟與中駟取中駟與下駟蓋攻瑕之方也而韋叡攻魏小兒城反先挫其驍勇因以㧞城此堅瑕之形不可預泥也法曰兵貴拙速未覩巧之遲也故李靖征蕭銑秋濤漸漲諸將請江平進兵靖曰兵以速為神於是進兵銑卒以降葢用速之利也而郭子儀討賊邠州諸將請擊子儀曰客深入利在速戰吾緩之賊自攜貳也已而賊果敗走此遲速之形不可預泥也夫兵家衆勝寡逸勝勞堅挫瑕速摧遲此常形也然善者用之則反以之相勝者何也𤣥固知堅衆之可亂而段知東羌為易與叡知己子儀能知彼故也若是則兵不可以定形不可定形則不可以窮極故守之藏於九地之下敵不知其衆寡之孰分攻之動於九天之上敵不知其奇正之孰從作之若轉圓石千仞之上作乎不得不作止之若散滃霧皎日之下止乎不得不止故曰兵無常形能因敵變化而制勝者謂之神又曰神乎神乎至于無形微乎微乎至于無聲嗟夫此虛實之極變也然而非間諜不能致也執事䇿末又以間諜為問愚敢不為執事盡之今夫間者離人者也彼離人君臣父子其為仁義者必不忍也然為間以間與國則不可為間以間寇賊則雖仁義弗之違也故陳平用於閼氏而主全忠武用於烏珠而國賴是故間者仁義之師所擇而用者也若夫諜則不然諜者所由得敵之虛實也用兵而不知敵之虛實猶登山而不知道之險易不知道險易雖孟賁罔弗顛也不知敵虚實雖太公罔弗僨也故諜者兵家勝算之權而仁義所必資也豈獨裨仁義乎然今之時用兵者不知用間諜雖用矣不能得敵之真此其故何也則孫子已言之矣孫子曰事莫宻於間賞莫厚於間非獨言間也諜莫不同也今欲得敵之真豈有它詭哉其惟制其命而厚其賞乎法曰興師十萬日費千金過此相守一月則費且三萬金相守三月則費且九萬金然獨愛千金不以賞間諜而忍於僨蹶喪師辱國而不顧非生諡至愚者不爾也乃今天下未見有千金予間諜者又烏能得其真乎雖然蓋猶有本領先焉今夫射者之教射使衆工人教之則必有惰弓使后羿教之則人人􅋏視而持滿矣匠者之教匠使衆工人教之則必有佚斧使郢人教之則人人運斤成風矣故將者國之后羿郢人也自古國家未有不得將而可語用兵者故苟得孫武則宫壼之姬可使赴湯火無難也苟得郭子儀則市井之衆可收召而趨敵也苟有韓淮隂諸葛忠武則嚢沙背水之䇿木牛流馬之技可不督而能也今天下羽檄日馳邊隅報敗者非兵法亡也以不得將之害也且今為將臣秉鉞掛印開府侯食者豈無人哉然號而問之曰孰可為孫武郭子儀非獨人弗許彼固無任矣是法雖存其又孰舉乎將不得法不舉則邊陲事愚莫知所終矣雖然昔者韓信一亾卒耳蕭何一與之語即知為大將髙祖即信而拜之孔明一耒夫耳徐庶與處即知為卧龍𤣥德即任而相之不知蕭何徐庶曷為凴空言得真將耶今天下脫有抱仁義智算之士亦或有如二子者不知今之君子曷由識而取之是故用法固難而得將尤難得將固難而識將尤難試以是登而獻焉可也問學術為天下裂廓而正之者存乎其人蓋自孟軻氏没學者不一家楊墨之下可略而言稽之周秦之間有鬻熊子老子已而有南華沖虚文始三子有子華亢倉鄧析鶡冠尹文子五人有慎子鬼谷子文子商子孫子吳子尉繚子公孫子韓非子孔叢子其最著者荀子漢六朝之間有新書有繁露玉杯淮南鴻烈有論衡有潛夫論有昌言有申鑒有說苑有中論有世説其最著者揚子文中子唐宋之間有天隱子𤣥真子聱隅子有潛虚有意林其最著周子程子此數十子者總之則道德縱横刑名儒家者流國朝儒臣宋氏蓋嘗疏剔而詆排之始以鬻子終以周程其歸依可知己要之夫人之學各蔽所見而失其本若道家葢求其本而過者也縱横刑名則依彷之以相馳騁而儒者反屑屑於其末其極則博而寡要宜不足回數十子之轅也嗚呼周程至矣非所謂由本達末者哉今之論學術者欲令數十子咸知所歸依豈亦當反觀其本者歟諸士涵泳問學乆矣矧昔海濵嘗有嚮道君子出焉由其說廓而正之諸士責也曷正言之毋辭三代而上道術出于一故行道者衆而言道者希三代而下道術出于二故言道者衆而知道者希夫道之在天下有本有末本者人見其藏於内也而不知非内也末者人見其散於外也而不知非外也非强一之也雖頃暫不得而二也不觀諸日月乎今夫日月貞明之體至約也而其耀下土皦八埏鉅而山川細而草木莫非日月之末光豈嘗有二物哉自人之求日月者或獨索諸貞明之體則嘗拒山川草木之光而𦕈忽之是固謂失也而愚者謂日在淵而逐於淵狂者謂月在江而攫於江則其失益逺矣是本末二之也嗟乎此所謂後世之語道術者也夫道之本果安在哉心者斯道之日月也性其貞明之體也率之為五倫散之為萬行置之塞天地横四海貫古今則貞明之寓於山川草木者也是則有本即有末夫惡得二唯孔子既没大義既乖微言幾絶而天下之異議起異議則二之為患也雖孟氏獨得其傳而當其時固已有楊墨諸子並駕其說於天下故孟子曰吾為此懼閑先聖之道距楊墨放淫辭邪説者不得作彼楊墨孟子既距放之矣庸知其後愈熾愈盛言人人殊何啻駕五車汗九牛哉然則廓而正之者寧不望斯人歟執事發䇿以諸子著述下詢承學將廓而正之而愚非其人也請得而彷彿其大都鬻熊著書二十篇老耼著五千餘文莊周著内外雜三十一篇世稱南華經列禦寇著凡二十篇世稱沖虚經闗尹喜著九篇世稱文始經至於文子研著十二巻亢倉子九篇鶡冠子四巻子華子程本著十巻鬼谷子一名𤣥微子或云即王詡著十三章孫武著十三篇吳起著六篇尉繚子著二十四篇公孫龍著六十四篇尹文子著二巻韓非著五十五篇孔叢子名鮒著七巻荀况著三十二篇此則周秦間之著作者然猶有曽子子思子言子管子晏子者世皆知其贗故弗及也漢六朝之間陸賈賈傳並有新書暨董子玉杯繁露世咸偽之淮南鴻烈解出漢劉安招集其徒著二十一篇論衡出王充二十五篇潛夫論出王符凡三十六篇昌言出仲長統三十四篇說苑出劉向二十篇申鑒出漢荀悅五巻中論出魏徐幹二十篇世說新語無足論揚子法言十三篇文中子王通門人所記十巻唐宋之間天隠子或曰即司馬承禎所著凡八篇𤣥真子出張志和十二篇聱隅子出宋黄晞凡十篇潛虚出司馬公意林唐馬總㑹元撰其他作者百家咸弗論嗟乎自周秦而下何其多言哉何其多言哉不有周程則漫然無旦天下曷所趨國朝儒臣宋氏嘗著諸辨以為鬻子非自著於老子稱豪傑士傷其本之未正而末流之弊至貽虚𤣥長晋亂之機於莊子則惜其未見孟子於列子則疑其多同竺法於荀子則譏其才甚髙而不見道於揚子則云雜黄老於文中子則辨其附託而取其為近其他評騭是非鑑别真偽若辨白黒而於篇終則惟以周程為歸宿其㫖瞭矣然而未究本末之實未致㡬微之辨則趨者終莫已也葢孔子既没其本末一貫之宗先本後末之序傳諸曽子以逮軻沒不得其傳獨西河以文學名其學尊聞見謹器數後代傳之寖失其真至有累世不能通當年不能究故譏者曰儒者博而寡要勞而少功不幸老氏直窺本原已出久矣而其言象帝之先知常曰明其與大易先天不違神明其德之㫖無以大異謂其無得于本不可也雖然至于此而愚有二慨焉嚮令老子者從是而培其本順達其末不使失序則何惡於老哉彼則以本為精以物為粗嗒然獨與神明居而竟嗇其末迫焉後動不得已而後應此則所謂獨索貞明之體而拒山川草木之光謂其本之能正亦未可也此一慨也當其時又令吾儒咸務其大而先其本不牽於聞見器數而漸進其末則為老之徒必曰儒者之道有本有末而大學之序先本後末一何其全且中也彼之賢而蚤智者必有歸也然吾儒者猶復以末為先以六藝為工以聞見器數為上至争一典一器之是非攻若聚訟膠若刻舟誠有累世窮年而莫殫者則彼將憚其艱苦其多而悲其泛不反顧而走哉是吾儒之驅之也甚矣又何異乎逐日於淵攫月於江而竟㤀其本此所謂益失之逺者也此二慨也由是莊列鼓其波諸子煽其焰而天下不之儒而之老者葢紛如矣是故谷神不死𤣥牝之門則神仙家之焉聖人不仁芻狗萬物則刑名家之焉將噏必張將弱必强則縱横家之焉以竒用兵以無事取天下則黄石張良之徒之焉我好静而民自正我無事而民自富則蕭曹與漢文帝之焉然蕭曹文帝卒使天下食寧一之福致刑措之盛終漢之世而老氏不為無功雖然使語以五倫萬行塞天地横四海貫古今若堯之協和舜之風動以及鳥獸魚鼈咸若若此者老氏寧有之歟然則有志斯道者欲廓而正之者果何以也嗟乎本末之序愚既言之乃若㡬微之辨謂不以老氏常嗇於其内而後儒徒渉於其外將本末胥病之歟漢儒他勿論若揚子葢嘗考其年無仕莽之實而宋氏已病其涉黄老矣文中子雖近而附託淆訛終駁書耳執事謂人各蔽所見愚不意一蔽而千百年之久也其不足以回數十子之轅亦曷疚哉天運徃復于是乃有周程二君子出周子通書則以無欲為明通公溥之本程子則以大公為順應之本而尤致意於性無内外之一語其於聞見器數未皇急焉當此時非獨有老蓋亦有釋獨賴二君子倡明其間天下乃知學之有本末而先後之序亦彰其視二氏與他諸子猶日月一出而羣星不得以肆其芒孟子以後至是一明豈非廓而正之者之得其人歟然廓之者未㡬而蔽之者復衆所謂蔽者又非若諸子之舛謬怪賊也葢末詳則本略此重則彼輕其勢然也于是天下士莫遡其源則又鮮之老而多之釋焉然而儒者猶復増壘濬塹以拒其來歸乃至吾儒中有詳於立本之㫖明於先後之辨者則槩以二氏拒之嗟乎大學訓曰物有本末事有終始知所先後則近道矣又曰此謂知本後儒咸倒置焉愚不知斯道之奚所底也我朝成化間海上嚮道君子若陳獻章者初非不知求諸繁也葢其始從臨川繁而無得乃反觀而求之約體道於勿㤀勿助之間悟道於至近至神之妙固已近登濂洛上窺孔孟而多自得矣其時天下識者至稱之活孟子云愚讀其言曰我大而物小物有盡而我無盡則我物猶二也其於程子性無内外之㫖猶未盡也雖然其亦今時之詳於立本者歟其間博極羣書者反詆之為禪然則今天下之語學者葢轉喉而觸之諱矣學何由入道何由正學者既莫取衷而彼嘵嘵若數十子者何以回也雖然執事已言之矣斯道猶日月也日月之明體末光雖各因於所見而日月自若也知本之學非曽子始言之孔子葢曰女以予為多學而識之者與然非也予一以貫之由是上稽帝王之業𢎞矣而其學曰精一曰建中曰懋昭曰緝熙敬止葢未有不始自吾心本體之明者也吁世之任道君子豈無有揭日月而行之者與而執事曷憂愚生竊有志焉幸進詔以竟其㫖衡廬精舍藏稿巻十七
