body:
  text: 衡廬續稿卷三明胡直撰記忠義亭記族之社溪蘄州守近湖先生偕從子常州通守濟川以書抵族子某曰先祖可山靜山二公咸以布衣死宋室子所諳也頃年二公幸從祀台之仙巖又祀郡之螺山咸列配信國丞相左右亦子所韙也然二處皆獲名賢紀載傳逺獨站口故有忠義亭久圮嘉靖丙寅奉督學徐公檄徙金臺渡口峙搆一亭中樹木主祀丞相而二公各以主配享皆其子孫自出力經始出台州通守姪濟世而措畫則常州姪獨殷蓋二郡則因丞相逮二公今子孫則因二公逮丞相咸以忠義故歷今二十年矣則子所過而徘徊者也子不可無言以紀其事直按省郡邑志與諸載籍及吾家譜可山公諱文可有謀略擅騎射方丞相輯兵勤王公散家資起義先夕丞相夢火明日覩公緋衣謁軍門喜甚曰殆天以賚我耶更名曰夢炎辟為都巡又嘗贊公推蓬一見圖有忠肝義膂之稱及丞相敗公被執間脫歸復集兵赴難至徑口馬蹶而卒靜山公諱文靜公弟也丞相嘗過龍泉訪妹壻彭震龍宿公家靜山得並謁署為提督可山公後提兵過贑以詩二首寄勉靜山期奮義作竒男子巳而元滅宋天下罄為元矣靜山公猶亢不服元乃起兵將屠泰和邑何侯曰今不靖者惟冶陂胡文靜一家爾邑何與焉乃集鄉兵入冶陂執文靜至站口欲招致之文靜仍亢不屈曰吾寧死不負宋遂被殺屠其家數百口一時人悲公昆弟死事呼胡氏為勤王家云第在元時猶多諱言明興邑侯余公耀過站口訊故老得其事為建昆弟忠義亭于其地後圮乃移金臺渡口即今所建是也然靜山公事獨記于楊文貞王文端二老而邑志以向諱言逸之比者邑唐侯復修邑志某數為語靜山公事侯固竒之則以當事者庸墨竟格弗入悲夫二公者當時乃心唯在宋舉數百口糜之不顧其祀不祀志不志即亭不亭又曷足計哉古之忠義夥矣夫唯懷忠與義也則各有所荷有荷則欲有存弗存則不能不與俱亡故有荷一城死一城者荷一國死一國者荷天下死天下者未有荷中華死中華如二公者也丞相宋大臣力荷而不能存死固宜爾二公故一匹夫而靜山公又當敷天為元之日乃挈錢鏄棘矜而欲與亢此豫雅謂古今特覯者也今猶幸俎豆布列各方子孫麟麟然詩書纓組鄉評官針咸不詭于先世相與葺亭于既圮之後數百年間如揭日月轟震霆瑰瑋􅀢峛足以慰答人心鼓舞世教風乎天下功施于無竟安知異時不如夷齊獨附驥於孔子哉為二公子孫者平時欲效忠義則莫貴於有荷有荷則死不死亦各惟其時爾且夫二公所爭者華夷大介人孰不知之乃不知有是忠與義即為華不則夷爾頃暫之間大有徑庭焉此又吾黨之所當繹思而慎辨也于是先生又飭其子南宫士某從孫太學生某庠生某某等來督記敬書以復貞夀堂記豫族子肇亨搆堂右之舍如堂制而少儉將以奉母蔣孺人為昕夕歡乃手其外從王父二川君其所記孺人節行以諗于族父廬山子曰吾母出嚴莊里故姓祖隱逸公孚佐父竹墟公端文母王氏生吾母未笄而竹墟公逝吾母日夜侍外王母同事女紅于時外大王母即吾義和胡孺人公三從姑也以吾母幼失怙而性莊飭絶愛之俾獲聞古烈女之訓長擇配得吾父諱冠羣及歸事二姑孝敬嵗時惟謹而奉夫子甚順已而新寡哀毁幾絶惟奉姑鞠子復蘇踰大祥長者謂其盛年諷令他志母仰天泣曰二姑煢煢孰與奉養以代有終孤子呱呱孰與植翊以永厥祀未亡人所以朝夕拊膺泣血者懼天不弔耳豈暇有異心哉且夫垢面從人吾恥之久矣苟欲奪吾志吾有死爾勸者乃止自是不夜哭不見至戚敕肇亨務篤孝友力儉勤弗為啙窳曰汝必從名師學縱無成宜有觀法為世家子無忝先人吾願遂矣當此時以先太母世寡稔蒙凌噬于人不幸吾父繼逝而凌噬者益獰辟諸未造之室風雨又漂搖之吾母不得已發憤求理中間勤勞憂瘁萬狀至有今日幾五十餘年今七十餘矣肇亨嘗耳熟吾母及吾舅氏言今外從王父記者又如此肇亨無能養搆斯居侍左右嵗時伏臘聊相為歡耳敢徼叔父錫名斯堂垂一言為不朽廬山子曰古今閨闥抱節槩者不鮮矣然當急難慷慨著有竒迹者類傳于世而平居積纍忍千百死守義不移者卒暗沕而無聞不知平居急難勢異而堅貞一爾非可以軒輊視也今蔣孺人豫族嫂豫諳之舊矣假令孺人當內外諷勸之殷覬覦者凌噬之獰一旦心如石又如席焉則寧有今日垂老而永終令譽者哉豫獨喜孺人貞而夀安知異時不聞賢有司不表見朝著顯有褒嘉下子之宅里耶子且拱而俟矣豫請以貞夀揭名斯堂遂記之以為後券嗟乎貞之時義豈易言哉子且知古頥貞之道乎盍思請事以報罔極庸不靦于豫言敦典堂記漆田周氏綰轂豫義和蓋在邑北之信實鄉幅員數里間惟二姓世婚媾若古之陳雷然而先太安人實周出往嵗豫解四川督學歸嘗為諸鄉邑士講業集者日繁周氏時一館穀仁社之創也其助金為獨腆會次有安成劉獅泉先生者故宿儒也與周亦婚媾家適覩周氏長行導迪其子弟齗齗顒顒然而子弟佐長者視賓具瞿瞿抑抑然顧瞻其祠屋有時思之堂問所為祀濟濟漆漆然相與嘆曰是不覩世家禮義哉又若干年為隆慶庚午周氏以齒衆堂隘聚族長幼謀拓而大之鼎建中堂凡若干楹標曰惇典仍以時思堂為後寢其長行某某等則豫外王父行也次某某舅行又次某某等昆弟行相率屬豫記之豫考周氏出三國公瑾之後公瑾傳都鄉侯胤胤以罪免徙廬陵烏東又五世自烏東徙泰和之南岡庫下其後傳矩為西臺御史傳翰為平章學士而泰和之周浸盛南岡四世為廷美字評高始徙今漆田凡三傳禮瑞潭州路司理禮端萬安縣糾曹又二傳慶章官為郎迄于今著仕版者不絶而漆田之周浸昌漆田十一世孫良舜有子二彥明彥仲彥仲他徙彥明獨守漆田今堂則創自漆田一派視昔規模又奕奕乎膴膴乎稱其族之衆矣堂既成周之長行則有申禁曰繼是而祭必與志物必以盡不者罰于斯繼是吉嘉禮必以告有登于朝者必以告嵗時必以告不者罰于斯繼是而毋以貴陵賤衆暴寡強侵弱不者罰于斯敢有不逞其如惇典何且夫五典我惇虞書記之周氏之尚論于虞書者寧不明且備哉余行天下多矣燕代不假言即鄒魯亦未有尊祖睦親加吾鄉邑者然吾鄉邑非右族蕃碩則力不贍非夙嫺于禮義則亦不可與有明也而周氏厪厪矣記曰賢者之祭也必受其福余于是卜周氏之穀祿彌逺無疆而禆益仁社之流風長也故詳為記云衡廬續稿卷三
