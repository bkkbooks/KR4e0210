body:
  text: 衡廬續稿卷五明胡直撰頌文翁頌贈楊春宇郡公有序國家建置郡邑自守令下若戎稅盜三務咸有専曹而庠校士獨無典者此其故何哉已而讀文王之詩曰肆成人有德小子有造古之人無斁譽髦斯士然後知古者作人養士之大固諸侯大夫與邑宰者専職也而他曹奚能與之然則國制所由來不眇矣夫士者國之楨而世之表也假令郡大夫邑令君奮迅才猷能致虎旅如林金穀積山丘潢池無弄戈之徒亦可謂劬所效矣乃獨忽視養士猥抑逺而挫衊之士緣是不自貴重其身罔以究道業之所存儢儢然冠進衣逢嗜飲食為賤儒則上下一何賴哉故曰周之士貴秦之士賤非士貴賤之也乃上之貴賤之也夫使士至自賤而上下一無賴則雖劬所效亦寧能為報國上考乎漢之初惟吳公獨重士賈生由以著相繼文翁甚盛然文翁事在後世雖有之而未嘗數數覩也賈生曰夫移風易俗使天下回心而鄉道類非俗吏之所能為嗟嗟豈不諒哉蜀南春宇楊公守吉凡三霜循政𢎞猷殊操休績吉人飲之上下誦之語具他紀載中已不可殫述乃不知公所為惟作人養士其大者焉公固文翁治鄉之竒産也公始臨覩吉士風憮然嘆曰吉士故有聲稱于世今稍陵夷靡矣作而新之其惟在父母師帥乎昔文翁時尚未創學乃多飭學子齎刀布蜀物詣京師遺博士獲受業方今天下郡邑庠校咸列樹博士為之師導兹惟風勵博士使知自貴重則弟子員莫不知貴重矣故公獨優禮諸博士平時進見命坐訊問學事重護諸士時蒸其髦者與之稽業講課亹亹循循不啻家子姓吉之師弟子語公必曰是大父母即大師帥迄無間言今年春公以猷望遷補江省憲使監巡湖西仍駐節于吉郡郡邑諸博士君以書抵胡子曰公今之文翁也吾黨慚無報稱冀得子一言庶以藉手豫既以病謝而固不豫捨豫乃抽素追文翁而為之頌頌不以公而以文翁者從諸博士君所稱欲令見公為今之文翁也其辭曰奕奕文王爰肇物軌燀其德音譽髦斯士士多濟濟惟周之楨惟王以寧居者興讓訟者質成故孔子觀學而知王道之易易原伯非學閔子以卜周之失義秦彌不道斬絶王跡仇學殱儒顛乃社稷偉哉文翁挺出炎漢乘轓西維教化爛煥既親誨勵復隨計吏刀布蜀物遺都人士士獲受業經明行飭是用察舉署之右職興校樹官以地之才廣招下縣士莫不來蔽芾槐市祁祁蹌蹌受事傳令蔚為龍光蜀民榮之欣歡鼓舞墨卿儒彥洸洸楚楚而蹀跡齊魯貢于帝廷表于四方帝曰休哉洵二千石之良爰詔天下建學斯始維文先生之令模王道續啓於乎千祀誰哉踵繩有蜀竒産關西瑶裔玉瑞頌有序蓋聞古語王者慈仁則芝草生又曰王者德至草木則芝生然多詫金𤣥五色而鮮逮玉瑞及覩神農草木經有曰白芝生華山又曰白者如截肪而抱朴子亦曰白苻芝髙四五寸似梅然則玉瑞豈易遘哉屬者守軒陳公持斧來按江藩以讞獄清聞格穹玉瑞産于蘭臺公遜不居曰此皇仁所格敢不敬承遂自記其堂曰承仁于是同臺有豫鄉賀公示豫題曰承仁玉瑞為之頌曰懿昔聖皇上德孔膴四靈競臻朱草斯舞猶有竒卉不根而吐太清為垣太寧為圃玉燭分華卿雲是母曄曄瑩瑩禎符自古遐哉天葩季世希覩偉兹端公手承天斧鐵冠神羊直指南楚八章時飛六察鏡睹英稜徑風輷轟天鼓蒸蒸百寮疇敢苦窳乃江之國魚龍安堵天吳徙窟虺蜮禠所乃至岸獄亭疑當暑雷風勃興怵焉中憮曰惟皇仁太上同普一夫不獲疇為罪罟乃偕庶司夙夜靡盬淑問如臯祥刑必呂罔以腥穢而干天忤豈曰玉瑞産兹蘭府維天鑒斯宛若攜取氷姿綽約瓊華容與匪木威喜匪狀龍虎皎然人豎懸柱離礎匪柱史之仁醇和孰鼓公拜稽首碩膚不處曰惟皇仁員于輻輔泰階坐平蒸黎遐撫天地既欣休徵彌寓嘉穀元稷甘露靈雨繼生白符以彰衆甫慶蹀黃軒房陋漢武何以承斯敬共心膂何以踐斯俾民無庾猗與一時明良並翥繁祉戩穀上格皇祖草莽作頌無然揚詡曰惟天子萬年其宇曰惟斯臣衮職永補贊仁社三逸圖讃有序豫以嘉靖丁卯蜀歸而鄉縉紳青襟耆舊英髦敦為學㑹動至數百迄無憩所又創社祭鄉約議得隙壤樹屋可以畜衆相率卜勝咸曰覺山寺之右宜是山之岡有喬松數百十株可䕃前橫槎灘江水江外嫵姥對峙東列玉華西有虹岡羣峰造天列若圖畫孰勝兹壤隆慶己巳豫起畎畝至癸酉冬復以乞養返于舊社友人康宗望暨諸耆宿復申前議至萬厯丁丑遽起崇搆危堂奧室傑閣嶸嶸邑侯唐君題曰求仁書社為記其事而豫方侍慈膝相尋哀疚幾化去者數矣萬厯辛巳始得擔篋為久寓計閲歷夏秋竒玩日腴于時宗望偕樂君以能相與聮集洞啓重門則山色水光若浮几案松濤颯颯時挾水聲間答禽語若遞宮商晨夕登閣平疇曠衍逺山崒崿紆青繚黃翔雲飛靄晴雨殊態江中四時商帆漁艇葭洲栁渚日與白鷗數百共蕩波心月擁波光與閣下上豫與二君憑欄嘯歌二三子和之互發交鬯洋洋灑灑豫誠不知其身已都于太虛而人間何世也次年壬午豫乃令工圖其髣佛置豫三人者其間因稱仁社三逸圖蓋豫方欲老此以為偶去此則圖與俱是山川一日不我違康君抱用世才屢蹶即早棄繻著隱士服以去年八月際六袠樂君少從獅泉劉公學性喜治花果自食一圃中年遽謝跡庠序亦以是年某月際七袠而豫年六十六適介其中豫將假是夀二君令三圖分藏三人者家是二君亦一日不我違且將俾三人者之子若孫又以惇世講無既焉贊曰蜿蜿覺山其下維几千松近䕃三華遙倚槎江自西映帶前駛坐挹平疇橫亘百里奕奕嫵姥如賓斯峙玉華虹岡左右如掎突矣崇搆在山之趾曰惟求仁翩翩學子勝日良辰冠裳萃止蔚蔚吾鄉鄭鄉難擬維二三君實倡實始祈祈衆宗佐資盈簋沈沈室堂既靚既偉豫獲息焉講習燕喜時哉二逸儷然來戾樂君疇希善信是勵早謝世途仲蔚齊美康君談詩匡生娓娓夙斂才情退遁于世遊好詵詵切琢亹亹載歌載笑觴間行只山水同休風月並㫖豫衰抱疴世味如洗晚得二君意益有啓並豫為三如鼎如錡古有六逸匪豫攸擬猶祈二君眉夀多祉豫從下上如魚泳水優哉游哉以樂餘齒梅村陳公像贊有引陳氏自五代入泰和稱仕族少雙元至正間有梅村先生者蓋吾宗子壻也先生仕為元總管推官世系出處大節概見於前承㫖廣平程公所為序及劉槎翁先生狀中今先生裔孫世紹締豫好而子進士秉浩則又與豫子順為婚媾嘗奉先生遺像請言於豫豫乃拜手而為之贊贊曰西昌有陳大丘延兮五季拓基金陵遷兮都幹瓌哲長發賢兮公降至正幼清廉兮辟教瑞金行發端兮庾梅而廣四坐氊兮卻金夜暮反庠田兮瘴風蠻雨桃李翩兮帥府借掾司獄䖍兮囚解石械民弗寃兮老乃宰瑞循政綣兮民始弗紿終弗諼兮贑路總管朝優恬兮既賦歸來餘草年兮武華之間時發篇兮梅花百咏馥遺編兮待制楊公伯仲仙兮伉儷偕老儀不愆兮穀祿纓緌世嬋嫣兮鄒魯厥心冠則元兮玉姿鶴鬢儼具瞻兮我家奕葉締姻緣兮登堂拜讃生氣旋兮於萬斯年清德綿兮跋跋永寶圖卷後世之好古圖籍者平時得瞻一賢人肖貌而閲其事行已足慰景行思矣矧多賢不亦難哉又矧曰並出一姓豈不尤難歟吾胡氏逺遡虞舜舜古今大聖莫與埒而顔氏輒曰舜何人豫何人有為者亦若是顔氏豈不以形逺而性近宗殊而道各在我者耶今卷內自安定而下若文定忠簡汝明凡四五公咸肖其形貌又録其敕命傳贊志銘以表著其事行豫不知圖者果以同出一脈而作耶抑以同姓賢者必圖録一方為來裔者則耶雖然此四五公者其性與行既一致即使人異姓事異家者瞻肖貌而閲行實鮮不欲步趨其遺武勃勃興九原可作之懷而况其同姓從事者耶脈之一不一無論矣是卷藏豫宗弟常州别駕某屬豫題識其後豫以為吾宗來裔能不慚此四五公即舜可企矣豫將觀於斯圖之後吾宗子弟孰可續者無若豫老洫無足傳也衡廬續稿卷五
