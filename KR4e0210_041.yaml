body:
  text: 衡廬續稿卷十一明胡直著傳少保趙文肅公傳趙文肅公諱貞吉蜀之內江人字孟靜號大洲宋丞相趙文定公某其先世也公生而神頴六嵗誦書日盡數卷人呼天童又曰公輔器也年十五讀王文成公傳習録驚曰豫固疑物理之逺於本也今獲所歸矣白二親往從不許遂遍誦六經以自求之同舍生方沾沾程舉子業非所好也嘉靖戊子領鄉書竣走謁故相楊文忠公里第文忠延語稱曰是將為社稷器吾兒慎弗逮也明年下第歸太夫人逝泣曰人世飇忽若是遂兼修出世業習靜古剎不櫛沐解衣者數年父資政公强令赴試舉禮部廷對都御史王公廷相撫其卷曰是雖治安策弗能絶也上嫌其語直置二甲尋悔之乃首列庶吉士特㫖留館授編修公因感思上初年鋭意聖學後稍陵遲頗惑方術遂疏言敷求真儒以贊大業執政見之不懌公退與同志友尹公臺徐公樾敖公銑等切劘不與世比踰嵗謁告歸蜀邑士雲從乃為發明大學致知本訓西蜀士浸知有問學出呫嗶上者則昉自公也二年出與冊封事再謁歸三年復出教司禮監同修㑹典充㑹試同考試官未幾三謁歸又三年復出始與內廷供奉遷右春坊右中允管國子監司業事當此時天下士髙者固守物理紛若射覆一聞知本之學反加詆訾其於聖門性道之㫖蓋莽如也公慨然曰學之不明由性不明也進諭六館士首揭中庸性道教為訓大意以天命本然者即良知也此萬事之母百行之主習識雖蔽不能滅其眀習氣雖纍不能害其真是天之所命不容人僞焉者也為性率云者以之為則不失其度繂也自一念至百為感應自一身至家國天下皆則於天命不失其度則道不可勝用矣為道孔子曰性相近習相逺夫以萬有之習日馳騖以求勝其欲則天下之日入於亂不難矣于是有聖哲出皆欲人反已漓之習以修道而復性也為教諸士聞者悚然有立志汰習以求復性者若濯而新是嵗為庚戌公嘗語當事者曰敵將大入盍為防禦計已而八月之望敵果䦨入古北口內蹂通州進薄都城公乃上獻計破敵疏請急遣官捧詔激勵各軍營許開損軍令凡獲一級賞銀百兩是時敵方有求貢嫚書入朝上詔禮部尚書徐公階集百官議可否日中莫有發一談者徐公將取簿二署名書之公獨出班大言曰城下之盟春秋恥之且既許貢則敵必入城要索不已即內外夾攻胡以禦之徐公曰足下必有退敵竒畫公曰為今之計煩為請主上出御正殿下詔引咎録周尚文之功以勵邊帥釋沈束之獄以開言路輕損軍之令重賞功之格飭文武百司為城守遣官宣諭諸將監督力戰其它無可為竒畫者上已偵知公言手詔輔臣嚴嵩曰趙某言是第不當及周尚文沈束事命下嘉公壯猷升左春坊左諭德兼監察御史領敕宣諭并給銀惟所措然未有督戰事權可統攝諸將以行者也公亦先以是請于嵩嵩故有郤又其黨趙文華者素銜公冀相齮齕而甘心之故既不與事權即兵曹一護卒不可得于時敵騎充斥公獨單騎出城先詣總兵仇鸞營次過諸將咸宣上㫖激勵付賞功銀一時將卒感奮惟趙國忠一營駐沙河隔敵則屬鸞傳諭而公以次晨入城復命方公之入也仍欲上請事權督戰已撰有疏草矣而鸞隂畏公至遂令人請備謄疏故為遲之公入朝趣疏不來獨以宣諭事畢奏上上怒謂公領銀未覩措畫第為周尚文沈束懷怨詔錦衣衛逮杖遂落職補廣西慶逺府荔波縣典史然一時海內識者誦公主張國是大義凛然令邊釁不開國勢日尊者皆公力也公至荔波久之總督軍門張公嶽檄議經略公行遂便歸省癸丑量移徽州府判稍遷南京吏部文選司主事未至進郎中乙卯升南光祿寺少卿遷南通政司參議先是嵩已嗾吏部推公藩參因上問趙某何在故有是遷丙辰升南右通政是嵗以賀萬夀入都中明年升南光祿寺卿聞三殿災公移書執政言大工復作不宜以提編加賦為第一義嵩見大忤又三年乃升公南户部右侍郎時公已聞外艱歸矣辛酉服闋得㫖改北户部右侍郎然初非嵩意也抵任上即屢遣代祭示眷嵩滋不樂亡何有建議薊州增設户侍一員職督糧以便練兵嵩遂以屬公意在出公為異時連坐計且召公酒詭曰是行非公不可公曰人臣之義死生以之復何諉哉酒半公徐曰今欲户侍專管督糧督京運乎抑民運乎若二運已皆有職掌即部中催與出薊州催何分添官徒增擾耳况兵之不練其過宜不在是縱十户侍出無益練兵也嵩作色怒且罷適嵩請告上遂手詔次相徐公問薊州事次相對以查理當用習邊糧者吏部因得易管理為查理而以林侍郎行嵩出愈忿公而詬林侍郎嗾其親張給事益劾林不數日遂并劾公竟奪官去公平日持論以二氏學通吾儒謂必出世乃可經世道汴逰嵩髙抱犢伏牛諸山巡撫蔡公汝楠逆而問學公遂列為圖明三教之所繇起曰儒者見之曰儒仙者見之曰仙佛者見之曰佛意一之也蔡梓以傳公家食多居玉溪莊嘗為諸生復申致知之㫖又為講說人心道心精一執中大要以中即性命即天然之則也而後儒乃不指言中為何物至以為物物有之是有同於刻舟之愚雕形之苦殊失其㫖丙寅肅皇帝崩公哭最痛曰先皇知我隆慶改元詔起公吏部侍郎兼翰林院學士掌詹事府事補修實銀副總裁官㑹有言登極幸學祭酒坐講當預擇老成醇德者攝之遂奉㫖以原官暫掌國子監祭酒事是嵗八月朔聖駕幸學賜坐講禹謨之后克艱章上見公闡發有指音鬯儀端大為感動垂問知為先朝新起用臣益喜動色尋命充日講官釋祭酒事賜賚有加先是北兵破石州公因與執政數議邊事稍二乃求補南禮部尚書既行御史李惟觀南户科給事岑用中等交章言趙某才德居啓沃之任可以格天心贊治本不宜置逺地適上顧講筵無公不悅諭曰前有年大往南京去者仍令日講吏部遂題復以禮部尚書兼翰林院學士協管詹事府事戊辰三月公還京階資政大夫贈祖某父某如其官時文武邊臣建議欲招練南兵十萬于張家灣公執不可曰往年南京建振武營致大變今乃欲建十振武營於都城之側哉况燕薊乃戎馬場豈藉南兵當事者寤遂移練兵于薊鎮惟揀南兵三千教鳥鋭識者謂為得算頃奉命教庶吉士徐顯卿等三十人仍充講讀纂修又命代祭先師孔子為皇太子千秋講唐太宗喻太子章賜賚無虛日時薊鎮奏修敵臺幾千座公以為徒費無禆戰守欲因講語中力言之語具為執政格不得上公遂邑邑懷去志而上之眷用意益篤尋詔以原官兼文淵閣大學士同諸閣臣入輔大政既辭不允一日于講筵謝上面諭盡心輔佐公稽首對臣敢不竭股肱之力效忠貞之節第近朝綱邊防弛廢臣欲捐身任事惟陛下主之上色益喜于時上多恭默而面諭公者凡再羣臣謂自臨御以來未嘗有也翌日御便殿手詔閣臣謂公已有年當同任閣事又撰敕令中貴捧詣閣下咸出特典公已注門籍不出矣先是大同邊臣或有棄城失機事為巡按暨科道官交參而閣臣未有言治罪者公謂宜照元年山西失事酌治不宜含默執政不得已乃行巡按覆勘公為是遂注籍上聞溫諭遣醫賜羊酒瓜菜公感上眷乃復出仍上疏乞解輔贊重任退供講職且言大同之罪惟祖法國是公論清議八字勘之足矣今兵部仍循回護閣臣俱出姑息臣欲爭論而力不能故懷慚思退矣上以公忠誠亟慰留之是日上以原票還閣中改擬有不襲昔年虛套之論而閣中猶以將才難得題復上姑兩解之然一時鋭意委任亟欲閣臣同心共理實近代希覯事公益感奮明年庚午遂上言遵祖制收兵權以飭戎務其略云我朝內外御兵分𨽻五府乃髙皇帝定萬世太平計俾免前代權臣握兵之害永樂末年因聚府兵北伐旋師後遂結營團操乃以三千神機二營附之因號三大營其實皆五府兵也正統末年嘗變為十團營𢎞治間又加為十二團營正德間又添置東西官㕔然五營之號未泯而五府意猶存也至嘉靖庚戌嚴嵩欲為賊將仇鸞地遂請特設戎政㕔括內外兵籍鑄總督戎政印以授鸞夫以五府外而别立一㕔則盡變太祖分府之意以十餘萬衆而統於一人則盡變成祖分營之意向使鸞遲於伏誅則時事之危未可測也合無將見操官軍九萬人分為左右中前後五營各擇一將以分統之責令開營教習仍以文臣巡核之每嵗春秋校閲凡將官之能否軍士之勇怯技藝之生熟紀律之嚴緩皆得奏聞而賞罰行焉要令五營齊成精鋭有事則領敕掛印命將於閫外事畢則徼敕納印歸將於營中如是則大阿之柄獨持於上而輦轂下有數萬精兵隨所用而宜矣奏上稱公忠謀且曰分營練兵乃祖宗舊制遂下廷臣議行時本兵兵科挾前議大同功罪事遂蜂起異同乃至朝更夕改反失公建白本意上以公贊理機務仍加太子太保是時閣臣高拱兼掌吏部事方欲挾權籠制諸臣意假公為分謗地故推公兼掌都察院事已而本兵霍冀被科臣論劾贓私疑公前議大同及已乃於求退疏中誣公主使公既辨明且欲付法司究問贓私以糾官邪繼兩上疏乞休上一稱公忠直任事一稱亷直老成宜副眷倚勿再辭句日間授從一品榮祿大夫散官賜蟒衣鸞帶寵賚且增然公歸志已决乃上給假回藉遷葬不允拱尤銜故相徐公欲中以重法疏言當時議事臣假托遺詔凡先帝所去如大獄及建言得罪諸臣悉用超擢死者贈官廕子無乃仇視先帝為無父無君之事又引𢎞治間彭程事欲有以治之閣中擬票將如請公拂衣起曰若是則將如宋時奸黨碑矣拱色變强留公乃共改票止於吏部通行曉諭而已又因公言去大獄字拱以是迄不得逞於徐公後又以故錦衣陸炳為徐婚家己嗾張御史追劾炳而刑部以炳一品爵例在應議列當請敕三法司集議定之奏下閣中擬票是日公當秉筆而自院至閣逺拱遲公久不至既至又未忍遽書拱遂代書徑擬以削爵沒産自是拱與公勢不兩立第厝火未發爾亡何宣大督撫王崇古等奏俺答孫把漢阿吉等入降議處置公預語輔臣李公春芳曰此亦邊疆幸事已而本兵奏上李公票㫖僅曰是公曰大約浮言謂開邊釁然自俺答橫行五十餘年每年邊餉數百餘萬何年無釁豈在納降是關廟謨今惟當從閣中請暫與降人官職慰來者心其制敵機宜當令督撫自善為措乃同改票如公言加那吉指揮使阿力哥正千户當此時朝議紛然敵求封貢邊臣進退維谷獨公與今輔臣張某力主其議亟令王督撫姑置封貢事徐議之第令俺答速獻投敵叛人趙全等九人者易其孫且當慎交質防敵劫盟又貽王書曰吾外憐悉怛謀之附人內恐李文饒之失助公為邊計篤切類此先是給事中張齊者為拱嗾劾徐公而王都御史因訐齊贓事抵戌後齊倚拱辨復力擊王都御史與毛司冦欲因以傾徐乃奏行法司而刑科給事中舒化參寢不得行拱懷怒思欲一逞於是考察科道㫖從內降出公曰是將倚法為報復計非所以惜人才成聖治也上疏請止之拱聞即上揭謂有成命竟不可止公曰此既出朝命吾不可不與共事遂赴吏部偕行考公執筆有給事中吳時來者故嘗劾嵩父子謫戌起用守抗直不附拱者也拱鋭欲去之公獨不可爭至日中拱知公不可奪竟從公故臺省名士得全者衆然拱益恨公次骨業己嗾心腹給事中韓楫者枉劾公公疏懇乞歸休且曰願上准臣放歸田里令拱復還內閣母久專大權樹衆黨别選老成掌部院庶上不悖祖訓下不失諸臣之職掌命下以公屢辭遂允暫馳驛去時上雖倚眷而拱恃故邸舊講交通中外亟謀逐公天子不得自持時論惜焉公行後敵乃還叛人趙全等獻俘禮成上以公與議廕一子某中書舍人明年春公抵家舊在門及舊遊髙君某等咸請設教聖水寺公示之立誠己而報穆宗大漸公哭臨至水漿不入哀毁成嗽疾乙亥遂杜門鮮復㑹講第作擬述二通移諸門人內篇曰經世通外篇曰出世通二通各分二門內篇門曰史通曰業通外篇門曰說通曰宗通內通之門八部史通部曰統曰傳曰制曰志業通部曰典曰行曰藝曰術八部具而百代九流之緒備矣外通之門四部說通部曰經曰律曰論宗通部曰單傳直指四部具而頓漸半圓之㫖悉矣所貴俾三千年未經折衷之籍勒聚一處以俟來哲是嵗十月即開局編述乃為文祭諸聖賢告始事其略曰身居臣子之地每懷經世之憂心慕道德之門時發出世之願邇來垂白謝事忽生勇猛乃取舊書以類昈列隨文㸃布各就部曲約要而言經世者不礙於出世之體出世者不忘於經世之用然後千聖一心萬古一道聖人憂世之念可少慰矣語詳公內外二篇都序及貽曽巡撫書中至冬末嗽疾復作輟編丙子正月疾良愈作詩貽同邑馬君某示所詣亡何子左府都事鼎柱自都歸省公喜甚攜展先墓宿墓祠覺憊遂絶口家務醫來卻藥勿用自是斂目淵默至三月望端坐薨春秋六十有九訃聞上輟朝一日諭祭褒揚誥贈少保諡曰文肅天下士大夫識與不識聞之悲嗟公孝友天至從綰髮與弟頤吉自相師友剛忠英偉稱其氣貌解褐即身任天下憂先一世雖百千挫不回稍激勇退倬有鳳翔千仭之志至其問學淵源上探堯孔之微而并包逮於伯陽子羽爰達泥洹雅自命曰經世出世其亦希古之博大人哉將與天地精神往來遨乎其初荀揚諸子未足窺其奧也海內士業文章者爭髙模擬公負特操不襲人後而博辨雄深瓌瑋變化如出溟海起神龍不可端崖要歸于道所著詩文子鼎柱偕門人某某詮次得若干卷進講録若干卷行于世胡直曰豫曩聞公訃率爾長號遽以病解及讀公行事年譜又未嘗不掩卷涕下也夫公兩當巨奸若摩壘然亟欲以一身橫塞其衝雖以帝眷勤篤終弗獲安其位亦勢使然也况欲行所學耶然公之匡救弼拂齗齗行其問其功豈下握衡者哉豫往幸覯公請曰吾儒能兼二氏二氏不得兼吾儒以吾儒與二氏有全偏之殊且夫性一也吾儒惟盡性故能處之有則雖經世未始不出世也二氏止見性故特終于無生雖出世未始能經世也是吾儒異二氏者固在盡不盡之間而全偏繇分也公曰不然夫二氏咸有萬行豈獨出世而不能經世哉今觀公內外通與都部序即嚮面談語豫何足知之豫何足知之雖然豫見今時士喜攻二氏自附孟子距楊墨例不知楊墨非孟氏莫知距也即嵬瑣黷墨如分宜者搦筆動舌類多攻佛以若所為曽不當佛之奴𨽻而反自嘵嘵不可悲哉彼加忮害于公不亦宜乎以是觀二氏雖稍偏然而害天下不在二氏而在功利諒矣諒矣不然公曷以能卓偉昭揭挺出斯世若此而分宜新鄭之徒嵬瑣黷墨貽詬百代乃若彼耶於乎宗伯尹洞山先生傳洞山先生尹氏諱臺字崇基吉永新人也其取號以居左有石山空洞故咸稱洞山先生云母劉太淑人夢神人餽美珠白粲始有妊大父夢神登中堂而生五嵗受小學誦至立身行道揚名後世語作而指曰至言也聞者異之甫齓侍父少宰公某司訓吳縣業已慕故相王文恪尚書劉鐵柯二公心自負束髮又隨往潜嘉靖元年公卒于潜哭幾不生居喪如禮以孝聞戊子舉鄉書明年入南雍名震白門乙未登第肅皇帝御覽子大夫列十二卷者命與一甲並梓行世改庶吉士讀中祕書故相顧文康張文忠二公屢簡先生文與內江趙公更相雄稱二雋云費文憲公再秉國髙先生名欲致見竟不可武定侯郭勛怙寵驕恣先生屢弗下之勛忿欲中以它事文康為力解諷令造謝亦竟不可丁酉授編修乙亥奉命往諭楚諸侯王未入境先檄長史司罷一切饋餉及覩先生儀節迄不敢言饋事使竣登衡嶽窺金簡上祝融慨然思禹功而詠歌之追尋朱張軼步割俸建二賢祠辛丑充㑹試同考試官癸卯請乞終養三年劉太淑人即世又哭幾不生既襄事猶粥食羅大宰鄒大司成兩文莊宫贊羅文恭數勸勿滅性始肉戊申除舊官乙酉同修大明㑹典庚戌復充㑹試同考試官策問及重臣權臣上覽亟取臣鑒録賢姦傳省覽為之感動繇是稔先生名一時上下有延頸相天下之望而不相中者進讒輔臣嚴嵩曰權臣蓋指公也嵩陽答以好言而中心怨次骨矣國子缺司業序得遷㑹趙公新起復槖裝罄先生既分俸助又諗於嵩曰趙窶甚司業有衙舍馬皂願先趙嵩笑曰是當成君之美未幾趙坐封事謫先生以春坊右中允管國子司業督六館生首在端習所奬拔多為名士辛亥以舊官兼翰林修撰回坊専理誥敕先生曰是所謂代天言也故其言騖古雅不為偶麗咸寧侯仇鸞新柄兵請互市隂實憚敵欲以欵之鸞知先生言泄執政所入朝裂眦而視弗顧也明年承命主南京鄉試策陳祖宗馭將制兵甚備先生謂同事郭公鎜曰有如上怒逮君奈何郭曰即有是固所願也先生壯之巵酒㑹鸞先伏逆誅録入上覽摘策中數事密問嵩嵩方欲求婚好因善為對乃令廕臣世蕃介劉某置酒蹴席致求婚語先生竟確辭之以是怨日深癸丑冬升右春坊右諭德兼翰林院侍講管坊事明年升南祭酒嵩舉巵酒曰何以别不穀先生從容請曰楊繼盛狂言自取死第願相公勿貽主上有殺諌臣名嵩避席謝先生退為司業王公材述其事因屬之王曰頃有王生世貞者亦云王果謁嵩以請嵩諾而曰昨尹司成嘗及此而私心猶豫未肯决謀諸鄢懋卿鄢持不可楊竟論死乃海內稍知王救楊竟莫知出先生也甲寅過家見邑士五科弗舉㑹文廟火乃相邑西廢署徙之捐百金贊厥成自是登名天府者橋起是年艤舟𤣥潭期鄒文莊羅文恭二公及郡搢紳士無逺近咸集盡攄所學諸士喜曰得先生斯學其益昌乎蒞任首革典簿㕔宿蠧太學諸生欣欣向往遽改北道三茅時鄉士胡生直為句容學諭挈而登焉浹日慨然語曰吾嘗以新學墮言說鮮躬行邇歸頗有觸于鄒羅二公且見諸士中操節厪厪不鮮則又喜曰學在吾郡因重相朂過京口又期武進歸安兩唐公再訂學抵京獨與宗伯歐陽文莊公講磨無虛日己卯上諭嵩遴忠謹文臣二人供奉內直意在先生嵩乃以少宰茅公某及先生名進改少詹事兼侍讀學士掌院事召見上於簾內指曰前行者狀元後者學士也二月特傳御劄令侍郎尹某代拜祭孔子廕臣以金花鑲帶一輿一賀曰上念公深故特晉侍郎秩吏禮二部惟孰擇先生曰上不以某無狀得與陪末議當出廷推若傳奉非敢承命嵩謂沽名揭覆仍以少詹事銜行祭初莊皇在東宫時康妃服未畢生元子上弗懌乃諭嵩曰禮官得無言乎嵩陽為畫無所之而訊諸朝士朝士皆莫敢對先生一人獨曰曷不舉孝慈録序中不禁民間服內生子語乎嵩用其言以對上釋及莊皇即位首問先生左右莫言或諷先生自陳白先生哂曰吾為國大體慮也豈計此哉丙辰上命同閣臣餘姚李公主㑹試事録後序有士平居自養始進自擇之語時上方修𤣥每疑羣臣心誹以為不經乃諭嵩曰尹臺言自養自擇豈以朕為此不經之務乎又諸臣撰青詞多習為𤣥教語而先生止言𤣥德或逮青宫字皆拂上意而嵩得以行間㑹禮部右侍郎缺同寮有欲擠先生以進者用趙文華謀賂廕臣搆蜚語誣先生忽㫖從中出指謫先生曰某受朕簡任問安于曹光著罷直供本職曹光者乃上所怒侍御史名也詹事府缺先生應推補又有與鄢懋卿戚者賄得之鄢故傳嵩慰語先生戲之曰君為都御史乃為相門傳語客耶亡何升南吏部右侍郎明年丁已京察與太宰王公黜陟惟允大司馬談公少宗伯殷公方面朱君薛君為郎時以與嵩有郤部欲罷之有附嵩者部欲庇之先生皆持不可善類獲賴以全㑹次當祝萬夀節既至上降溫㫖賜銀綺復念舊直之勞出內帑緋羆衣一襲銀十五兩賜焉嵩迎上意故欲留北乃竟復南乙未三年滿諸闕進階通議大夫贈父祖如其官適南都營兵變上下危疑甚先生昌言曰有李侍郎在狗鼠輩不足慮也己乃果然李蓋豐城襄敏公遂也詔舉邊才先生首以王公邦瑞曹公邦輔胡公松應薦後皆起為名臣癸丑升南禮部尚書故事教坊司供應公曹長及臺省諸司先生以非典裁之是時新政府與先生及趙公皆疇昔同志相翼已而以事與二公異議黠者搆蜚語間之丙寅秋先生將以南尚書三年赴考御史王某乘風遂誣奏沮其行奉㫖為民然有識者知為讒中相與愕曰清朝乃有是耶而言者亦竟以是取詬今上元年詔起原任不允所辭介行與親族决曰吾感主上知遇出即還耳未朞再疏乞骸骨遂歸先是嘗割腴田三百畝入社備賑復歸乃别建鳳西書院又割田四百畝給來學蓋先生早極崇信紫陽韙泰和羅文莊公獨至中年因有寤於大學知本之㫖浸與鄒羅二公語合晚年益以明學術為首務讀書至老不倦為文槩主六經而體裁一準西京蓋自廷對已然詩歌儕建安天寶間無辨四方謁文者充户所著詩文及永新志凡若干卷暇則偕田畯野老談笑或乘笋輿棹小艇夷猶江畔覩者不知故上卿也己卯秋感疾既革無惰容晨興櫛髮瞑目而薨年七十有四先生忠孝大節文武才猷谹言讜議著天下耳目而卒未柄用于世有識者重慨之胡某曰吉郡昔繁甲第盛勛節乃若儒學則興自正嘉間蓋踔偉無前矣于時有豫邑羅歐兩文莊安成鄒文莊吉水羅文恭永豐聶貞襄永新則有大宗伯洞山先生相與下上羽翼洙泗人謂吉郡後伊洛而盛豈不信哉直最晚出恆繆以文字謁先生數倒屣焉及丙辰乃出門下方文場啓彌封時先生目睢睢佇覩有直名則為欣躍揖謝房考者曰得士得士蓋先生為國憐才推轂海內士為世名卿者不鮮若尹秉衡劉顯武士中錚錚者耳先生亟為引重不遺餘力曰世所需也先生豈私樹人哉伯子參軍某又與直子締媾因屬狀先生行事不敏狀之又懼文蕪不足傳乃著其大者為傳視狀不能十之二三猶掇之耳給舍事齊楊公傳始豫為諸生從歐陽先生于海智古剎則獨與楊事齊公相切也豫時録録舉子業黴纒文義牢甚事齊公故簡默語出則能剖膠解韜發歐陽先生意㫖沃吾黨膈或問曰知行果一乎公曰非今强一之蓋本一爾即若紫陽訓窮理則先居敬此謂一耶二耶孔子十五志學三十而立咸未嘗先知非弗之先也行即有知知即有行故曰本一巳而偕之南宫同舍生多駘宕騖為滑稽不羈豫亦時逸矩視公燕處若超然雖戲弗虐間出莊語則滑者之意也消公素練事負濟世才吾黨有疑事咨公輒不大繆私語豫曰今欲天下平非盡汰虛文殺縟儀必不可昔者晉弊於清談六朝抵唐以浮詞弊宋以空言弊吾懼今時之以虛文弊也豫一時心推益友則未嘗不屈指公公諱海字汝容號事齊少師文貞公四世孫上世語具史志中父北渠翁某負才纍不舉期在公公狀貌修癯骯􅗣不自下為諸生時邑令數抑扼之翁大不懌乃督應詔入太學因居歐陽先生門友四方士相淬磨者六年舉順天庚子鄉試丁未第進士觀政刑曹日讀律不厭大司冦試假如同儕多倩吏代草公必親製曰此皆職業也既官行人承命護費文通公柩歸葬故事喪家重王人謝必金幣而王人亦不以金帛嫌公至視葬畢即登舟趣解纜雖一蔬禇莫致也久之復使瀋府鄉戚方醵金餞公公竟遄發及歸同鄉勞之曰向行何疾也公曰吾度歸無為饋答敢辱餞耶其先後皭然不滓若此公故有肺病不時作踰嵗授工科給事中識者謂公古道素抱當時志一時蹇諤批鱗匡濟時艱表見出流輩者竚獨望公未幾肺病復作竟卒卒之先日告親友曰天下事公等勉之又曰吾年已四十有七過顔子多矣無所恨獨家大人未有貤典徒飲恨爾又索筆作書寄别翁迄無亂語覩者曰觀於死生之際而知學之重禆人也聶貞襄公哭公慟曰楊汝容孔門狷者嗟乎若孔門狷者豈易及哉子二伯子髙州二守某有才識世其業手公行事屬豫表諸墓豫病未逮也病間乃為傳傳公巨節軼事俾世知狷行大都云其世系生卒則有聶貞襄林太史所為銘表在誥封中憲大夫都察院右僉都御史靜菴耿公傳公諱金字宗秀别號靜庵楚黃之麻城人也今屬黃安先世家浮光賽山里勝國季國寶以才官挈仲子必安占藉幽燕伯子必順奉母周氏徙麻城三角山居之自必順公至大振處士凡五世皆業善處士欲以儒發家弗克逞丈夫子四人公第三少頴敏嗜學乃處士欲未老而傳則以家政委公公後舉今伯子中丞中丞稟內美長有修能公庭誨期以逺且大者不􅍦博一第致顯庸以是中丞六通四辟嚮往古聖賢之事蓋自為諸生而己然矣中丞為諸生時所至無前邑令延禮異等里中有劉某與盜同名真盜亡逮劉劉畫無復之公故習劉良民隂諭中丞以曾參同姓名不殺人言之令釋奉厚幣駿馬跪上夀公忿然作色曰吾命孺子生若以若非盜非盜以責報報我我將盜魁姻家吳童子才乞公屬中丞受知令中丞敬諾後忘之吳後得髙等德公公曰汝之才乃爾孺子何與卻謝幣公先世故豐資至處士稍落公毅然不淄非分即一介不取大都若此類者未可更僕數嘉靖己酉中丞未登賢書鄰人子彭某先登公曰彭子故親昵彭登猶吾子登也壬子報中丞舉者至公擁帚自若中丞既第進士為侍御史迎公都門見中丞日與其友泰和胡子某南城羅子某偕諸君子相從問學公喜而笑曰苟人人可聞道也勿以我耄棄我自是駸駸乎究問學大㫖逌然一以淡怡神而尤斤斤嚴於禮法之程義利之辨一時京師大夫士咸謂公有李初平風而益多中丞薰染有自公思東歸今太宰汝陽趙君中丞同年進者也趙方用司徒郎奉差還汝副車載公偕行趙後見今成都守叔子曰若翁以侍御史父所過州縣致餽即一臠一蔬若將凂焉其介如此我鮮前聞中丞奉直指西夏之命亡何改南京督學使者時邊官走千金請公為中丞關說者叱之出佯入以紿秦恭人曰此可取乎恭人怫然與公意符公曰業已麾去蓋嘗子耳己而中丞迎公白門與中丞往來者皆同志士公最敬重史君桂芳以為古道則令守嚴事之踰年天子封公御史中丞已拜廷丞又踰年得在告凡八年隆慶庚午中丞為故相新鄭見銜謫西粵公聞曰自吾子以封事批逆鱗吾固知有今日何憾辛未守初第進士公猶然曩時擁帚態癸酉今上即位中丞再起晉遷尚符璽奉命使魯歸省公曰魯夫子之邦得幸奉使吾子勉夫是嵗公以守計部最封屯田主事乙亥中丞遷中執法佐院事而守且郎比部未幾秦恭人下世明年公八十中丞奉公山中躬執爨以皤髯當子舍鼎鐺間公為燕喜有加公好明農中丞率候以服田公杖往觀聞田歌益樂灑灑當此時耿氏父子若不知人間世有何樂可踰也戊寅天子以中丞鎮撫八閩公聞命曰吾父子居畝畎若將終身其若今命何中丞疏辭其執柄者格不得上欲再疏士大夫曰庚辛之際公方震懼間者天王仁聖不期年而躋躐崇秩未有涓埃報乃兹疆埸大役閩方多故需君節鉞于斯豈得晏然自適已閩有警報至公乃强中丞輿疾入閩受事閩人卒食其賜公於家報時聞閩人得中丞始晏堵益慰悅見顔面己卯上兩宫徽號得晉封今官公三承命御錦綺迄無貴人態公方日夜走書中丞督報主而忽微寢疾遂捐館舍得年八十有四公天性儉朴醇厚少外慕喜施豫不欲毛舉人過失恆以德報怨雅善引義解人忿爭既病猶趣裝嫁族中貧女峻節姱修雖一言動若中繩然卒之夕神識不憒楚人蓋稱儒長者云中丞守皆名世仲子某季子某孫某某咸飫聞是道直與中丞同年同志海內號最能脫形骸相切琢期翊于道視公伯叔戚也中丞自閩候代不至毁絶不幾生病間乃能屬門人建業李君登撰述公行事冀得直著之篇又不欲為揚詡以庶幾焉覩公之生氣俾少抒其繚結某於是上下李君言著為傳以傳又用慰孝子心嗟乎某昔者親奉几杖飫醇炙朴公亦子姓近之倘令某有揚詡非所當非所謂脫形骸相切琢者也然則公雖未仕官而實後先宋之程公珦其人蓋昔者程公二子實産黃陂黃安乃割陂麻黃三邑創成後世安知不爼豆公配程公為黃安國故哉不然何子嗣之肖又何地之近也後之君子盍以是覽公焉三才子傳三才子傳何傳豫邑羅夢傅陳良敬羅鵬三子也三子者豫夙友豫悲三子蚤世又不偶于時然實軼才詎當使湮沒不少概見耶故為述崖略傳三才子云其傳曰羅夢傅者字良弼世居邑東禪巷德安同知子理之後十嵗擅舉子業未弱冠業己博通經史搜羅百家睥睨古作者軌轍邑令濮陽吕公異之舉補博士弟子員是時學士家方喜模左傳文夢傅曰是節短而氣弗鴻鬯乃獨喜為先秦西京體雅推髙賈朝子長曰三代以下大文匠也為舉子業至論䇿輒攄所藴下筆汪洋卓詭文彩爛郁迄不為晉唐以下語連試督學使者驚異僅列髙等分宜令山隂陳公博雅士也嘉靖庚子與外簾得卷二一為胡某一為夢傅曰是足以方駕古人矣並薦弗録恚而語曰將留為後來者冠夢傅以書謝陳公其大略曰夫葉公好龍而真龍至則震且奔齊王好音而九韶奏則倦且睡誠以二君者好其名弗好其實抑靡有名賢魁哲相後先故也是龍與韶未為失遘也今也有名賢魁哲先之矣而見聽者猶若二君之奔且睡則失遘未有若今日者也雖然夢傅測所原矣且夫純鉤湛盧世知其斷蛟剸犀也矧有薛燭為之遊談然鞸室夫襓不足屬目則越王􅌓眙輕之矣奔宵逐影世知其一日千里也又有造父為之驂乘然而轡靶銜勒不見其飾則穆王中道舍之矣何則人情非獨好名乃又好其名之膚末則古今所稱希世神物又曷所借賴以行于世哉雖然世之靈修偉夫抱其席珍有以自腴不虞失遘唯虞失所知于名賢之門今夢傅䝉知于名賢左右者既馮谹矣則今日雖萬被擯落終身弗遘于世奚以戚為哉舅氏都給舍曾公雅謂人曰使夢傅得志則伯仲李何何有哉然竟不舉以死得年才四十生平與故通政楊君載鳴同學齊名既終載鳴哭曰悲哉世不能外驪黃求千里也君寧得遘耶搜其遺文以子宋卿等幼不能緝藏竟不可得傳其業而著者今靳州守同邑胡汝礪其外則今禮部侍郎莆田陳某是也陳良敬者邑珠林江口人也字仁甫先世出栁溪父昌福舉進士為華亭令良敬生絶敏十嵗讀五經日誦至十又五葉十七八時從父華亭聞江左徐迪功􅈺丈辭祝允明工書唐伯虎工畫此三人者稱東南竒雋絶藝也心慕嚮之乃時時輟舉子業竊效三子者之撰力能追之乃自寫蟾宫圖及為賦贄巡撫秦公秦公讀之驚曰子異時必獨步文苑矣丹青曷足從事是時良敬獨喜六朝文且曰六朝精麗莫踰王融劉協若江淹上建平書此特下俚語耳而世反登諸上選不既左乎既歸與羅夢傅胡某一見莫逆嘗與某同舟約口占為賦良敬矢口至數千言不竭試録之輒可觀某大異之因相勸為東京以上文良敬大喜遽曰吾與子當彎臂為弓交射于先秦西京矣已而屢不舉則以書抵某曰古今人有能有不能若良敬今日則可能不能者也世之祖虛皇氏者捐家而宅太清休糗而餐太和驂駕九陽稅于赤將氏之庭此謂良敬不能則誠不能者若乃抽世儒之末緒擷時士之落英醖釀為舉子業此近日辨髦童子類多能之又類以是獵第蜚聲虎視寓內士此豈良敬誠弗能哉子知之乎夫舉子業非必欲囊宇宙攢萬彚而為也而吾以囊宇宙攢萬彚求之非必欲濬墳典攬百家而為也而吾以濬墳典攬百家求之夫鑽木者不操錐而操龍淵捕鼠者不䇿狸而䇿蒲稍終必不相為矣故曰良敬可能弗能者也後某折節浸為古人學以書招良敬良敬謝曰是亦豈豫不能哉顧言者越飛兔而為者不蹀跛鱉則吾亦曰不能可也某讓之曰是亦所謂可能不能者耶良敬竟笑不從久之挈其從兄文中登匡廬絶嵿覽彭蠡退讀書白鹿洞感李渤朱文公之遺風慨然悟曰若吾黨豈盡在科第詞章哉嘉靖壬子始領鄉書又屢不第辛酉赴試道淮心動悸曰吾念老父得歸侍足矣返棹抵儀真遂寢疾竟卒年四十四良敬生平為酬應文不自惜好事者獲短牘寶之不啻拱璧族父昌積有海內文名哭之曰才子才子天忌才耶羅鵬字日表邑浩溪人其居近歐陽文莊公宅少學文于公弟昱昱教讀五經左氏傳通其大義既長又讀荀子老莊董賈韓栁歐陽三蘇皆精熟叩之可誦終篇為舉子業雖日試十目一目作千餘字咸綽如也少同胡某游庠又同舉癸卯遂為莫逆已又友歐陽昌咸若弟昆論文貴意勝客有傳李空同薄韓蘇不為者鵬奮然曰是豈知文者之言哉即如賈生治安䇿為千古絶特豈專以辭哉以其承秦之後能言教太子易風俗禮大臣偉然有三代遺意董仲舒三䇿咸流自心腑可以翊道朝錯公孫𢎞皆傑然非苟言之者與司馬相如枚皋鄒陽等絢爚辭句間者不可同年語矣故謂西漢人文為爾雅近古者以是若韓退之原道原人自今日誦者熟爛故人多易視究其先則賈董子長恐亦不能鑿空創說若斯其當也蘇子瞻之文章人尤熟爛亦尤易視也然其間如中庸伊尹留侯等論應詔䇿略䇿别等篇其㫖皆能推道法斷國是後之論治者稽焉即賈董子長復生不能絶也何則以其色象雖若異漢而其精意則漢雋也故謂此六七公文足起衰繼漢者以是它若韓之送二王秀才送鄭尚書韓重華等序蘇之明正日諭稼說蓮花漏銘清風閣記又它如歐陽子之序廖氏文釋祕演詩送徐無黨等篇曾氏之序戰國策梁書列女傳禮閣新儀各目録等篇此文皆發天地之祕闡六籍之微詞淡而理腴言近而指高凡多漢儒未逮至如李空同論道與事要不出晚宋末議獨變其音節艱其辭句模擬秦漢間俠客狂態䇿士口吻緣飾而張皇之乃又木彊乏金玉之潤碎裂非江河之浸古人有云若正言則人人知之矣其間皆韓蘇所不屑乃曰薄韓蘇不為豈不誣哉于是客不能難而歐胡二子聆之大省退取六七公文讀之良然亦始知讀六七公文有味乎其言也鵬貌不揚喜詼諧善謳引滿謳發音嘹喨如簫管士大夫始以貌易之及浹談謔爭親狎之已而病卒短嗣亦無遺文可採録識者莫不悲云論曰三子之生咸在閭左右跡其少已敏辨有文采豈不稱一時才子哉昔文考子安咸有著作流後代以時無經生時義縶維其竒逸故能摛藻以傳若三子則縶維之者梏矣寧責著述哉豫邑上世人文不可殫知明興劉尚書王竹亭昆弟又陳海桑蕭正固以逮楊文貞王文端二公咸逺為端緒為一代文區而其間布衣居多𢎞正嘉靖間歐陽侍御雲少宰鐸宗伯陳尚寶昌積尚寶族兄工曹德文曾廣平雲康漳浦恕曾靈璧洋尹合州宗武次第以文起而布衣則時有劉公鴻及蕭輝氏頃者楊通政載鳴歐陽工曹紹慶咸踵修先哲之業其間天資卓絶則遜三子而三子又以布衣終甚哉才難而才之出乃不俾傑然者享爵祿夀考與鳴國家之盛上蹀諸大老相映照豈三子者修短局諸命限抑一邑之分數固使然哉悲乎豫負三子迄皓首固陋無能有樹以藉甚斯世靡足為三子者表豫慚矣慚矣已未豫寓都中夢陳仁甫癯然麻服杖而拜豫乞文豫訊曰為親乞邪為自乞邪未答寤而報仁甫己客死豫雅欲為三子撰述㑹病未逮今聞仁甫子樞又淪逝矣而良弼子宋卿既長甚欲得豫銘之豫不遑銘比自懼晚暮終不逮也故傳如右其它若亡友歐陽生昌曾君于乾咸有文采彬彬則别有稱述兹不載衡廬續稿卷十一
