body:
  text: 衡廬精舍藏稿卷十八明胡直撰題跋書大司馬許默齊公録襄毅公疏草後右疏為大司馬許默齊先生録其先襄毅公所草上武皇帝者當武皇帝時羣璫竊柄導上佚遊媟嫚極矣而襄毅公方起廢為大司馬則奮然曰是不可獨攻其標故因經筵有見疏言帝王之學在養心親賢而經筵為首務推此類具陳之於乎大哉言乎雖古大人格心之道曷以踰焉夫唐虞之世天下政務不少矣然元聖上賢交議文陛之上則獨以道心精一為授受以兢業佚欲為勸戒皇皇焉不敢以他務先之彼豈不欲咨實政而亟為此窽言哉誠以天下治忽之機在人主之一心而心之難操又非可與衆庶論也故雖以元聖輔之上賢猶懼罔念之為狂而况武皇帝左右狎溺蕩心伐性且十百尋常者乎是故公當其時人不與適政不與間乃奮其衷赤以帝王之學為言意庶幾焉君心憬悟獨斡于九重之密則彼么麼者何足難更置哉雖其時言不必行然昭然逖覽為政治先計若標世之大臣知此義者何可多覩也此又豈可與拘攣淺儒者道哉某少聞當時卿士閣臣朋力攻瑾期致之法公獨曰此屬得疏斥足矣過峻懼必有甘露之變已而果然然則公之能為斯言良有斯疏也不然公豈獨鏡其末而未究其本與公生平𢎞量逺識推轂名流為一代宗臣其征牙木蘭也雪夜深入大破敵兵獨大土刺守者八百人公皆諭而下之不􅓍一級以為功議者謂公有致身之義斯有格心之道又豈不然哉然則公所謂本末可槩覩矣默齊先生識量德位靡不同符而居勢之艱猶若倍之異日崇勛峻烈炳在史之世家固不以某小子之言稱也辱先生出示斯草屬題簡末乃拜手誦服用抒仰止且以附名焉非敢謂知名賢之世德也書唐荆川先生夷齊廟詩後唐荆川先生示豫謁夷齊廟詩詩末引王臨川疑夷齊叩馬事不經見因自以意論夷齊與文王同心則不得不與武王異志以此信其叩馬之事無疑是固已辨矣而猶未足以致其實蓋近世多以叩馬之事出莊子寓言而太史公誤信然豫觀左傳臧哀伯之言曰武王克商遷九鼎于雒義士猶或非之義士非夷齊誰也且臧哀伯前孔子數世去周未逺其言或可信以此證之則叩馬之事亦傳之久矣其不創出於莊子明矣孟子曰君子亦仁而已矣何必同然則伯夷又何嫌其與武王異耶且伯夷之論在天地間何可少而臨川膠於一是而非之亦拘矣孔子又言夷齊餓死於首陽之下而臨川謂伯夷死於北海及來而死於道路與夫至文王之都而不及武王之世其說皆無據矣書青尉傳後余讀青尉事未嘗不憮然自恧泫然而追思下涕也青尉龍陽幕官耳因民潦傷叩闕蠲賦不報遂雉經闕下死皇祖悼之錫之廟食而邑賦終免此自史籍載記未有覩者尉可謂獨行君子矣借使尉居幕職上尉所為又何若也豫忝監司分𨽻兹土目稔潦旱又苦衝疲民之䝉盩蓋什伯於尉之日每有興革不能以去就爭之矧能如尉之自捐其身乎夫天下事莫難於任苟能任則四海之內均為已責苟為弗任則雖其職事弗為責矣古之任天下者一夫不獲引以為辜矧一邑乎若尉則與古人之心又何擇焉人謂青尉過此任者過也奚過為然豫見今之人有當職弗之任者矣豫故始而自恧繼而追思不可置悲嗟嗟乎青尉書蘇子瞻書傳後昔唐荆川先生語豫曰曽見蘇子瞻書傳乎曰未也盍求之嵗之甲子豫行部至眉求諸鄉大夫張中丞得其寫本讀之益知蘇氏之學蓋豫自壯後始能讀蘇氏文喜其言能自立不為詭隨其論當時大計是非利害開闔抑揚皆有本末可以醒寤人主措諸事功不誣及讀其中庸論乃知蘇氏未有得於性道以至强非而妄斥則又怪其自立之過今讀其書傳誠有篤論獨其訓欽明文思則指以為聖人之才舉五教亦與孟子殊其病略與中庸論同然後知君子之貴於聞性道也雖然若蘇氏父子其學皆嘗逺探於經而博取於傳以發其中心之誠然所謂一家之言是巳其視今之棄經尊史附和影響者則大不侔矣乃歸其本張公而寓書其末云書郫縣志後往豫閲及揚雄仕莽投閣劇秦美新而綱目書莽大夫嘗怪雄以彼其才而媚莽心竊鄙之後見程叔子取其美厥靈根之語愕曰雄乃有是語乎又韓退之邵堯夫司馬君實諸君子咸稱引其說往來怵豫心已乃取法言讀之其紬六經翼孔顔義甚深又嘗髙餓顯下祿隱雖不韙屈原而屢斥公孫𢎞之容且曰如詘道信身雖天下不可為也豫則嘆曰世之論雄其然豈其然乎終無以決於心最後讀揚雄傳稱雄有大度自守泊如仕成帝哀平間未言仕莽獨其贊謂雄仕莽作符命投閣年七十一天鳳五年卒余考雄至西京見成帝年四十餘矣自成帝建始改元至天鳳五年計五十有二嵗以五十二合四十餘已近百年則與所謂年七十一者又相抵矣又考雄至京大司馬王音奇其文而音薨永始初年則雄來必在永始之前無疑然則謂雄為延於莽年者妄也其云媚莽妄可知矣蓋豫懷此久矣今年春按部郫縣而雄郫人也讀其邑志得豫鄉人簡公紹芳辨證尤悉簡引桓談新語曰雄作甘泉賦一首夢腸出收而內之明日遂卒而祠甘泉在永始四年雄卒永始四年去莽篡位尚逺而劇秦美新或出于谷子雲以豫校之莽自平帝元始間始號安漢公今法言稱漢公且云漢興二百一十載爰自髙帝至平帝末蓋其數矣而謂雄卒永始亦未必然計雄之終或在平帝末則其年正七十餘矣因雄厯成哀平故稱三世不徙官若復仕莽又詎止三世哉繇是知雄決無仕莽投閣美新之事而簡公謂班孟堅早世曹大家輩傳失其實豈不然哉當平帝末莽已有都四海代漢室之形矣而雄猶稱漢道如日中天力不能回莽而假法言以諷切之雄之意至矣雄其媚莽者乎諒乎叔子之言曰閣百尺未必能投曰然則史不足信乎曰太史公記子貢宰我一以為遊說一以為叛亂是亦足信乎而孔子主癰疽百里奚自鬻身在當時之言比比也何獨雄哉豫悲守道君子䝉誣逮千載故因簡公之言而畢其說讀鶡冠子鶡冠子稱一壺千金韓子讀而悲之豫讀則尤悲焉夫得壺於汝泗則濟者十八於江漢者十五於東海則十壺無一濟然俾壺有一髮之漏則汝泗猶東海耳嗜欲之賊道雖聖人不無文王至德猶必無然畔援歆羡而後誕登于岸蓋文王猶乘筏度溪澗耳若賢人之欲則汝泗也其次江漢也其下則東海矣今者欲濟東海舍萬斛舟而乘漏壺此豫尤悲也夫書陶靖節集後某少讀淵明詩喜其辭㫖沖逸不犯功力而未知其幾于道嘉靖乙卯秋忽夢侍先府君談詩先府君曰詩人最淺陋者為孟郊郊得第詩曰春風得意馬蹄疾一日看盡長安花是其器與辭咸淺陋不足觀某因質古今詩誰勝先府君曰無踰淵明某竊心識之次年登第乃寤先府君預用以示警然因是益喜讀淵明詩反覆讀至神釋諸篇然後知淵明之幾于道而杜子美未悉也不然何其明三才之中重魯叟之思乃出于道喪世衰之餘若是乎勤且篤也而世止以隱逸忠義槩之亦淺矣然淵明以彼其資乃終逃于酒弗能大有明于斯道豈亦未有以參三才之學告之者歟噫使斯人果與聞於學則冉閔儔矣乃益寤先府君之啓豫者深也暇日復讀淵明詩因追書于簡端書神留宇宙卷後是為文信國集杜絶句墨蹟有豫邑陳海桑先生題跋豫少嘗假閲陳氏異之則諭之曰是神物不可狎狎則懼風雲勃生座間將變化翔去也豫且見子屋極將有白虹紫光燭天而照夜也豫雖不識書然知大山長河不可以蹊徑辨子善寶之垂三十年是書歸豫友王有訓氏有訓遂請諸先師羅文恭公題曰神留宇宙續跋其後又七年豫起畎畝將行有訓攜以贈豫豫謝不可有訓曰子不知信國不有其身吾黨又安能長有是翰墨乎吾不以授子子不吾受皆非達也子又不觀信國方坐卧小樓日有數死焉而其字勢獨閒遠自得有隱士逸仙翩翩凌雲之氣宋之天地裂矣而公獨以一身障之公之雄槩加萬古矣覩其字畫又敻然出埃壒若不以世故滓其靈臺是豈易言哉是豈易言哉子姑藏而繹之豫于是再拜受而識諸卷尾書復合溪子語隆慶辛未之秋豫偕合溪子從端州返西粵舟中過從語學日有相發合溪子曰往見子詩嘗援用釋氏語得無令後世惑乎子之語志學也必自孔氏求孔氏之宗必曰仁體夫詩言志也志在孔氏而用釋家語可謂志乎據觀子詩後必傳子乃以釋家語惑亂後世可謂仁乎豫應曰往作詩誠有之亦偶適逸興已爾非必信從其學者也今不作詩六年矣矧釋語乎合溪子奮然曰吾期子為孔子作千萬世人極豈淺淺哉子以後慎哉無為此豫聞之不覺􅋏然色阻謝曰不敏敢不如教已而默然櫽括自心尚荏苒視孔子若未必能臻視千萬世亦若不以豫一人重輕其間也乃知豫平日自視尚眇薄其于仁體未誠有得矧豫去孔子耳順年不逺矣今若此豫將何以求孔子哉豫將何以求孔子哉雖然豫舍孔子無為學也自今日至千萬世非夫人之責無誰責也於乎中立天地負荷宇宙余雖嚮老矣不敢復諉正其鵠以中之竭其才以至之古人云死而後己不知老之將至此余事也其能否臻于孔子與夫千萬世之重輕非余所當計也因書此志慚并貽合溪子共勉旃次年合溪子遷閩藩行始書而貽之題宋髙宗所臨蘭亭帖後余曩藏宋髙宗題小李將軍畫二得是帖㸃畫無不合知為髙宗字無疑嗟嗟髙宗何時也固乃忘情仰膽而殫精灑翰棄忠武中原之烈而耽右軍梓澤之風卒之身辱國疸禍貽中夏至為慘毒可不為大哀乎是故藝成而下物玩而喪匪獨人主君子取游焉可也書子昂擊壤圖子昂畫擊壤圖又自為跋語出袁柳莊家藏余得之句曲曹生觀子昂跋語自謂有感不知子昂當宋末運感而為之耶抑元初為之耶於乎當今之時堯舜在上非宋元可幾萬一然邊圉孔棘吏上計先催科海內黔首窮蹙視二十年前加十七焉民未嘗不耕鑿然欲嬉遊擊壤不可得矣或者咎諸法乃神祖聖宗法未嘗不善也今之君子尤喜言法然而斯民若是懸絶何也儒者有言誠心而王則王假之而霸則霸今曷繇使上下皆誠心為王耶果誠心矣又曷繇使邊圉不棘催科政舒民得嬉游以樂生耶子昂衰世不足言今如盛世何哉或云前畫出子昂其後跋字為贋豫不暇深辨姑書而藏之書鄭使君家藏祝枝山書書末藝耳然亦未易言書家以畫沙印泥不落蹊徑號稱最妙者亦非可以强致大要在捉筆得法令鋒行畫內積久而神凝天放自臻其妙縱之則騰猿飛􅀢怒猊奔驥竒詭不測亦自不踰矩法之內所謂如珠走盤不越於盤者其圓體自致也彼捨中鋒而以側媚豪宕襲似之者則亦如優孟學孫叔敖其言言笑笑雖得近似終不離伶工相耳又如人之生其精神行骨肉之內則骨不􅀈肉不溢而秀傑之氣自著不然雖嫵若少女驍為健兒其神氣無觀也豫嘗習觀𢎞治以前書咸出中鋒雖有未工其生氣自殊正德後則古法蕩矣豫間以語一二工書者靡不掩口近時海內工書推文衡山祝枝山二君誠一時名家盛行在正德嘉靖間是卷出祝君為莆陽鄭公宰河源時所得君時尹興寧與公往復唱和及倣效諸家辨論各體可謂富矣其書法後必有辨之者豫不假言也豫獨羡公遺子孫唯圖書文采風流到今可想見子壺陽使君出示屬為之題因漫書簡末使君世工書視何如也書丹鉛總録丹鉛總録新都楊升菴慎所著初各本散録近好事者始彚刻為總録世咸稱升菴博物為一時冠豫獨疑天下物未必能盡博偶得是録因揭首册一二條以身所經嘗者較之則所録誠不能無繆豫然後知天下之物果不能以盡博然亦不必盡也今略記下方云升菴録稱火井在蜀之臨邛今嘉定犍為亦有之其泉皆油爇之燃人取以為燈正德間方出豫嘗仕蜀駐雅道邛詢昔唐時有火井縣以井中出火故名袁天綱嘗為火井令今縣與井俱廢而其地已隸天全招討司厥後火井乃復出于潼川州潼去邛近千里豫寮趙僉憲親往觀云井水故冷土人以物引之常時烹鹽煮繭至今為然此火井大略若嘉定犍為乃油泉非火井也其泉果類油今吏部洪雅陳君語余曰渠家亦以油泉燃燈則知與火井異地亦二物也而升菴說混矣升菴又謂積陽之氣所産何獨此二方有積陽耶又何邛之井始陽而終隂耶此皆不可知子思子曰雖聖人有不知此之謂也太史公自序上㑹稽探禹穴升菴訓云上㑹稽總吳越也探禹穴言巴蜀也又曰禹穴在蜀之石泉縣禹生之地近劉巡撫搜古碑刻有禹穴二字李白所書始知㑹稽禹穴之誤余嘗遊綿石泉實屬邑因令人之石泉塌禹穴二字字方丈楷壯奇偉然未著姓名安知出李白又考太史公稱禹黃帝之𤣥孫父鯀封崇不曰在蜀蜀安有禹生之地獨史記注引蜀王本記云禹本汶山廣柔縣人也又考廣柔自隋時改汶川取汶山導江之義括地志又云禹生在茂州汶川縣石紐山其地去石泉數百里若是則凡言禹之生蜀者亦無定在又安知果在石泉否也此皆數千載以上事相傳淆訛好事者所書惡覩其實雖博古士亦惡得執言之也書曰蔡蒙旅平書傳與水經咸言蔡蒙二山在嚴道嚴道即雅也余固已疑之升菴則云蔡山在雅州蒙山在雲南余尤不信余嘗仕蜀駐雅尋蔡山殊眇不稱名若蒙山則實在雅之名山縣山峻甚難登余嘗登巔有唐時古茶樹約二三十頭其茶今上貢品味絶天下余得一二勺以療病神效詢故老及鄉縉紳云古稱蒙山頂上茶是也而世繆以東䝉山石莓當之豈亦所謂幸不幸耶鄉縉紳又出升菴所作蒙山茶辨余曰升菴既辨茶乃云山在雲南何耶皆相與大噱雖然自書傳水經皆在數千載後其是與非不可知乃若雲南未經禹績而蒙山不在雲南似必可知也書云岷山導江注云岷山在湔氐道西徼外又水經稱岷山在蜀郡氐道縣江水所出酈氏注云在徼外今未知氐道何縣大要稱徼外則岷山非在今之汶川縣明矣蓋太史公雖以岷汶字通用然汶川實古廣柔縣至隋時因岷汶通稱之故遂改廣柔為汶川則太史公所指汶山豈端在兹縣哉後人不考遂謂岷山在汶川縣非也升菴所引蜀王觀汶水之流語亦非余嘗至汶川詢故老求岷山茫無所得復問江源則江已可浮方舟矣溯江求之三日至松藩江雖狹然非源或云在彰臘余詢彰臘守備官咸云在陜之岷州岷山自岷州岷山出穿西戎地始至彰臘蓋其先岷為蜀轄故岷峨配稱且稱松岷云余因考一統志稱岷州城北果有岷山山黑無樹嗟夫天下事不出真見必得真聞乃可信而後之儒者槩以簡册胸臆決是非左矣左矣升菴別篇云江源實自西戎萬山來是說為得之書三妙卷後是卷為白沙先生自書春日詩凡幾首余邑侯仁卿唐君得之以其詩與書兼妙也而出先生手彌足重故稱三妙爰示某題之某稽病未有言已而挾入山伏居奧洞日對層巔嶔巖峭壁嵾石窮竒極勝若或為之剞劂雕琢而絶無斧鑿跡乃嘆巨靈之工雖百郢匠莫之措也而以擬于先生之墨妙其竒勝出自然者殆不可軒輊之乃亦巨靈為之非耶嘗考先生始從吳聘君學未得因反求諸約端居久之然後洞見本心之體隱然參前倚衡而以應務觀書若馬之有勒水之有源始渙然自信曰聖功在兹而其語學遂一以自然為宗故其放于翰墨者亦即與天者相出王蓋先生之巨靈不在外矣世不知先生之巨靈取諸衷乃徒為剪綴將枝枝焉修葉葉焉排而求為奇勝以規名于後世其不自賊其天者希矣唐君後先生出東粵將亦反求光大先生之學故以余委余固自顧瞪然而不能已于言書張果傳吾嘗讀列子稱季咸能知人禍福夀夭如神而卒不能相壺丘子自失而走壺丘子曰吾與之虛而猗移不知其誰何豫以為此寓言也今偶讀舊唐書張果傳言邢和璞善算人𤣥宗令算果夀年則莫知其甲子又有夜光者善視鬼與果並坐而終莫能見以果之藏於虛故也乃知壺丘事非誣又嘗覽忠禪師者示三藏觀競渡弄猢猻則咸知之已而為之無心則三藏莫得而測何則夫人形動則人見而知之心動則神見而知之惟無心無意則鬼神不得知而况人乎此非獨二氏雖吾聖人之無思無為者無不然也然則聖而不可知者蓋必有之而遽難言也書王庠經說昔王庠以經說寄蘇軾謂二帝三王之臣皆志于道唯其自得之難故守之至堅自孔孟作六經斯道有一定之論士之所養反不逮古乃知後世見六經之易忽而不行也軾以為名言豫以為孔孟作六經歸於一定非孔孟故為定也性至一也然孔孟大要在知本反約而後儒注疏乃至逐末騖博腷臆杜撰往往强孔孟之言以就已意蓋騁其射覆之見著為畫一之論大學親民易繫窮理皆孔子之訓也其在書曰百姓不親五品不遜此親民之㫖也今必改曰新民新民雖亦通而不知其與大學本㫖有間也其在繫曰和順於道德而理於義窮理盡性以至于命此其本文相屬也今必訓曰窮至事物之理舍理於義之本文而增贅事物於其間而不知與繫辭本㫖彌逺是則孔孟雖定而後儒不以為定何尤孔孟哉夫孔孟在知本反約故常定於一而其萬之不齊不必定也後儒逐末騖博故常取其萬者而定之不獨萬之難齊而終失其一也噫孰知其愈趨於末愈騖於博而愈悖而馳也暇日偶讀庠之言感而書之書松原別語册後某將入蜀時其友王有訓歐陽文朝王信卿以册求先師羅文恭為贈語公卷卷以實修期以收斂靜定入蓋嘉靖癸亥春也距今已十有七載公與文朝先後去世而某且皓首踰六又三矣册中云自蜀歸以實修者盡言之公之䇿直至矣既公殁後四年某始自蜀歸尚未有真得悲哉俾某果實修而有得亦安得公為言之况到今仍慚斯語回顧不尤悲哉又云論宋學則首明道而疑濂溪夫濂溪無可疑某亦曷敢妄疑濂溪哉蓋嘗疑太極圖說不出濂溪手非謂疑濂溪也某獨未嘗明舉以告公致有疑之之說是亦某過也雖然某所欲質正我師者詎止若一二册中語哉乃敬識諸簡末以泄豫悲且用為惕雖然使師在今日其為豫䇿且惕又何若也萬厯己卯重陽之日衡廬精舍藏稿卷十八
