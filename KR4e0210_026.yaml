body:
  text: 衡廬精舎藏稿巻二十六明胡直撰墓誌銘梧州知府劉見川先生墓誌銘始劉見川先生齠齡文才甲等適予邑王太史改齋公以忠諫死闕下郡大夫徐公欽太史風節欲為其㓜女擇對則曰無若廬陵劉某賢當先生綰髪時父刑部公挈之介所為詩謁御史漁石唐公唐公竒先生才屬徐公廪之因締媾太史談者希艶傾一郡是年乙酉先生得與計偕上春官明年落第歸始受室乙丑再上春官再蹶而學行蒸然推儒宗矣先生方欲謁選吏部或語遲之曰焉有如此才而終蹶者先生曰不然吾窶甚親年髙矣乃卒謁選得泰興學諭庚寅丁羅安人憂起復補江隂六年擢廣平令辛丑内補刑部某司主事到官甫三月丁刑部公憂乙巳起復刑部某司主事以太廟覃恩階承徳郎得贈如制尋歴某司員外郎某司郎中八年始出為梧州守守凡四年赴覲在道奔繼妣張孺人䘮既服闋先生覩時事嘆曰嗟乎吾車縣晚矣乃遂闢芝園山房被隠居服時年纔踰六而二至甲戌年八月十三先生偶病遂不起距其生正徳丙寅之十一月念四時年纔踰六而九于時先生冢子孟雷方登第待次都下得報痛絶乃匍匐走數千里歸卜壤遴某年某月某日奉先生柩葬里馬鞍山山負癸抱丁固以壙石屬不敏某且曰孟雷幾欲從地下矣然隠忍視息者首痛先生之學未有繼明其次欲得知言士傳先生神子無讓某自念從雉髪亦知希艶者矧數遊從聆音㫖交先生父子間銘曷辭先生系出漢長沙定王發後自髙安徙安成山莊轉徙廬陵之藤橋髙王父某曽王父某王父某世有隠徳父某號某學經攻詩不為齪齪行一鄉推儒長者以先生貴贈刑部主事母羅安人出周橋先生名某字某號某七嵗即善為聲偶題壁淋漓驚座天性孝友事生死如禮訓二弟有成門内雍雍如也生平私淑太史公而切劘於郡内諸公雅務躬行尤嚴義利不為讕言居江隂廸士功令禔身先之而督課亦殷業學舎者夜必稽勤惰佐以茗飲竟後日力論者比蘇湖云廣平畿輔民鷙悍難馴先生首節浮蠧計丁均役不為詗察而事至先覺邑有𤓰訟誣為殺奪先生論曰詎至是哉此必某嗾汝為之翌日鞫審果然民以是歸心恐後嵗大旱獨廣平禱雨輒應粟入倍昔隣邑流徙載道而廣平晏如也明年大蝗先生請于當道以便宜發廪令民各捕蝗易穀亡何廪傾而蝗丘積矣又為文禱神躬率民遍鼓鈴鐸逐蝗已而蝗盡入他境而邑内無恙廣平民戴先生仁父神君不肅化行囹圄為空盖先生始至題堂柱曰視民如子知我者天已而言靡不酬刑部時分宜柄國先生方有時譽又以從叔同年通家屢招致出門下先生百計引避日散衙歸即關戸賦詩自娛㑹巨閹子弟殺人事下而郎中某故巧宦輒因戚家求外補自脱先生署司人為危之先生曰國有憲持憲得罪分也論竟如法閹竟不敢出氣大司寇石塘聞公繇是加重名益大起奉命江北恤刑尤以洗寃自盟各郡平反活者無算梧州為日南孔道綰轂南海四方賈舶夷盗出入奥區故設督府以填撫之地重且劇文武百需軍帑出納謗怨所繇叢先生之官獨攜二力盡裁一切民間供費方到三日郡士民聞新太守治行輒舉手加額曰青天青天尋又請于督府并議商供而令甲之過者覘先生澹素堅忍輒不相撓自是商人無横征而督府事亦莫不贍舉當時上官惟魏公一恭譚公大初相契許盖臭味同也既歸或問槖何寥也先生曰今人指以贓吏咸色而怒不知常俸薪馬外毛髪贓也吾槖安得不寥晚在山房日惟讀書賦詩所為詠史篇末重悼末學墨守其於孔門黙識未嘗不三致意親友過從惟竟日談學然所談即所履不騖為𤣥逺聆者信而興焉不敏某每一炙侍引瞻眉宇已若出炎埃翛然灑濯於冷風也其感深矣末年興化秉鈞㢘吉郡有二劉其一安成劉公陽其一先生皆屬起用而皆不赴人並髙之而先生尤以天官薦剡重語絶特人稱異數然獨棄之若遺豈孔門所稱逸民非歟嗟乎今先生溘然已矣邦家失典刑人斯文殞先覺士詎曰一人一方悼愴已耳不敏某悼尤䀌然幸繼明先生之學有赫奕賢嗣者在焉所著詩文有暨陽廣平西省蒼梧芝亭咏史凡六稿又有孟子筆義恤刑閒錄各若干巻藏于家子男三長即孟雷娶張布政使某女出王安人次孟雨聘蕭知縣某女次孟霖未聘出側室戴氏女三適張淵黄景性胡錫命與孟雷俱王出也於戲福亦䋲矣銘曰山曷以珍𤣥巘翠巒雖有介丘莫踰青原水曷以珍湛波濬源雖有大􅊤章貢足觀偉兹山水孕賢孔篤完節姱脩相肖何酷奚必穹廣夸世肉目維介為石維真為玉世有知者伯仲太丘予曰叔度儻可與仇六九之逝形往神留有赫顯嗣與道偕悠樂處士十松翁墓誌銘十松翁者宅邊有喬松十其意好素篤也故號翁樂姓葵名以𤾉字先世自長沙來泰和後梁徙邑之禾溪至十三世諱㫤貴州副使曽祖文鑑祖諫咸膺冠緌父泉麓公諱脩早世妣歐陽憲副之孫年十九抱節以𢎞治戊申閏正月三日遺腹生翁翁生而頴特未弱冠補郡庠生督學虗齋蔡公空同李公皆天下之鉅夫文人也莫不韙翁文第置髙等歐陽恭簡文莊二公嘗造廬讀所作泰伯至徳論咸警賞不置口銀臺楊公過從談史上下數千載燦然指掌楊公服其博顧九試不得第以太孺人孀居髙年不忍違遂謝去舉子業事太孺人備物腆過有禄者既沒哀毁欲絶鄉人以母子節孝稱雙美云平居􅀈􅀈寡競食澹御䟽然周急拯溺育孤葬貧趨義恐後其増益祭田寳襲先世誥墨至老猶盡心焉先後邑侯舉鄉飲固辭不赴至邑侯楊公行丈田禮翁為都里人總領因陳便民之法十楊公欣納著為令甲其㑹計劈畫剗虗剔詭公明並施老胥縮頸莫為奸都里人至今賴之撫臺胡公廉得其實奬以重語且檄有司建牌或者以翁之才行可施諸當時而曷止以一事一方見耶此有識所為致慨于里選也隆慶戊辰八月寢疾竟終年八十一娶廬陵北溪劉氏生二女長適縣學生楊載芳次適萬安賴某側室蔣氏男女四人宗望宗錫宗箕克世其家女適某孫男八某孫女二以某年月日葬某山之原介予門人楊能卿撰著行實謁為誌銘且曰翁其無㸃于予銘者為之銘曰徳苟腥兮雖簮紱其終穢義苟腴兮雖蓬虆其彌貴鬱鬱樂翁六經為粱百家雜饌苾馥乃膓飫為孝友饜為温恭任恤足以敦忍人公廉可以激墨風嗟哉濊潤曷為沼沚不為江河雖曰靡位頌者孔多祚躬既壽昌後既賢乃鑴𤣥宅千載稽焉胡母劉孺人墓誌銘予族之廬陵芳徑有賢母其夫子西園翁始遊邑庠連弗第已而棄去叩正學於安成鄒劉二先生二先生獨偉而器之每嵗謁安成及心所嚮往則供粻贄縑羅列出夙備賔友以講業至者饋饗無乏詢之則其内子劉孺人手治也以是人莫不頌賢婦某年月日西園翁卒又資遣子燭遊劉三五先生之門三五劉先生者名陽以髙行傾一時非其人弗與燭至則特錄門墻而殷教之既歸搆室曰求仁精舎延師友居之燭得以磨徳勵業焉人以羡燭燭曰某則安能為禀母命成父志也人又莫不頌賢母萬厯甲戌中秋之日燭不幸母亦卒又三年為丙子三月燭乃得卜吉葬萬段蟠龍形某山某向於是其里中姻友文岡蕭君懼母之賢節將闇闇弗聞也則代燭狀母行而謂予宜銘予按狀母諱某出城南故閥父某母某氏生正徳戊寅十月十九日至年十幾歸西園翁鍾英翁家故鉅母治内恊外咸有倫脊奉尊章禮尤曲至處妯娌間逮遇臧獲恩義裒然嵗饑有司檄禮翁出粟翁為之傾廪人雖以頌翁然知母之賛助多矣母之終以其始哭壯子繼哭翁曽㡬何時哭其三世遂疽發背不起距其生年五十有七子二伯某先卒仲即燭也娶某氏繼沂塘黄氏側室某氏女一適赤陂王可揚孫男一某女一某俱㓜文岡君曰西園生得與儒宗薫其道味自别於流俗又推所蓄為公私利其功盖有自云此母徳之大致其他勤儉敬慈細行不尠不盡述予亦云然予辱族屬方欲與燭偕之斯道曷忍不彰所自以相朂哉銘曰蔚房櫳之淑媛兮翊夫子于道也偉聖善之母儀兮穀其子于造也斤斤瞿瞿靡弗禔兮擢其媺不可殫號也􅉃􅉃恤恤哀此女儒兮胡殱之算弗使至皓也螺溪處士胡君偕配劉孺人墓誌銘昔文水羅文恭公語某曰子之里胡仰齋先生為給舎時雅善予後給舎以言事謪歸勅其子汝賢從予學子歸可相朝夕朂之又某五從兄為汝賢君經師遂因通家往還稱莫逆云隆慶改元予歸自蜀君率鄉士敦予問學挈二子遊予門時方盗劇自辛酉至丙寅凡六年每冬盗輒昏暮擁強攅戈入門無得脫者盖無夕不惴惴度若年既曉第聞殺人事迄數十里間相吊蹙蹙不可聊生君過予曰聞子寓蜀有鄉約團結禦冦可倣行乎予曰然乃為刪潤出覧君慨然館穀數百人偕二三友倡議决行予因題曰求仁鄉約君又為捐貲梓散之曰非家挾一冊不可也以是盗勢浸息異時有官司為盗地者約事幾殆君獨翼予維持每晤對輒相悲歎久之萬厯初予又歸自東粤鄉士以㑹所迫隘欲創興求仁書院于覺山君適病革聞即捐金首衆頃十年予里中士知嚮學家獲安寢君與力不尠也丙子季春君偕康宗望過予見羲樓投壺飲酒君指見羲字曰是先師文恭墨蹟最勝者相與賞慕極歡詎謂君遽以季秋長逝將不為永訣哉予憶君方恫君冡嗣則禹仲景禹卜是嵗十二月廿一日合葬君與元配劉孺人得灉江坤山艮向吉壤手予門人胡以兆狀來徵銘曰非師莫悉知吾父者予奚忍辭按狀君諱舜舉字汝賢號螺溪晚號東皋居士其先世建州五峯先生後名成提舉江西家泰和蟠龍山幾世生國寳徙舎溪又十三世為君曽王父曰清王父曰元讓以子貴贈兵部郎中父即仰齋先生諱堯時官至貴州按察使母蕭宜人出南溪以嘉靖壬午九月廿九日生君君生資頴貌偉五嵗先生攜如官邸之泰聞心齋王公論學躍然有發弱冠歸補邑庠生業文出人意表屢試塲屋不利竟棄去先生聞亦允之且曰吾家督得人矣故宣力四方靡内顧虞先是郎中公病君侍病旦夕躬扶抱親藥液惟謹比捐館一一如禮先生歸既痛且慰繼先生官滇聞季弟之變輒欲懸車君奉書曰大人年未艾天下事寜即委乎又論征土官事曰此國家外樊似未可以一眚輒急擊痛斷也覧者韙其言先生末年以君才猷可被物命從例貢君曰且也以累百金博一冗散官僕僕靡所濟不若舉以濟人先生尤韙之戊午先生背棄又十七年蕭宜人亦逝君盡哀毁先後卜葬瀘原靡不勤腆檢遺書或至泣下謹䕶以穀其子曰古者教人先小學曰友道貴破藩籬皆名言也嵗侵時嘗倒廩賑里族緩急無難色更倣古常平社倉遺意平糴以抑踴貴邑侯祝公多君表其閭曰敦睦之門鄉里槎灘陂每旱輒醵金倡脩衆利賴之盖君樂恬喜濟自對庭訓而已盟矣始病稍艱食已而更數醫竟弗起時九月廿三日也得年才五十有五豈不悲哉劉孺人出廬陵石溪進士呉縣令劉公輔宜女性静慤歸君得順道雖居華膴而持儉澹非大慶吊無踰閫閾事尊章禮尤至臧獲有過亦㣲讓之而已始自度艱子即賛君置側室已又賛之増置睦若娣姒無何連舉子又撫若已出稍長賛君延禮名師教育恐後諸子林林詵詵如也孺人賢可知己君卒孺人哀絶食不下咽届節辰愴傷乃後君一年丁丑七月十三日病且殁其生先君一年為辛巳七月十一日其算加君一年均未登乎上壽以故里族悼君更悼孺人盖嘗觀於今貴介子有不期進取輒嚴盖藏錙銖踰肌肉其下惟騖楚楚仙仙衣裳佩紉臺榭尊俎駘宕乎靡貳窈𦕈之間以夸毗羣豎自為多矣疇知從師友語問學哉且捐利倡義利濟不已若君豈多覯耶聞君病革猶鼓琴一曲若有遐思又何其爽然絶出也子五長邑庠生即則禹娶歐陽卿女恭簡公孫次庠生景禹娶庠生張洛女亞卿公孫次命禹聘早禾渡樂迪徳女僉憲公孫次承禹聘南溪蕭其遘女次纉禹尚㓜女五長適歐陽文莊公孫太學生宗發次適太學生歐陽宁次適漆溪周夣棨次適羅通政孫仲次亦㓜孫男三于湯聘南岡庠生李九來女次有湯聘甘溪庠生龍學羲女次翊湯未聘孫女三俱㓜君與孺人雖未上壽乃其祚𦙍振振若是天之報施其逺矣乎為之銘曰翳其才可以奮迅鋒頴剸蛟截兕馳騁時髦已而退然澤於問學終匿景乎東臯翳其力可以歌鍾滿前呉歈越趨日酣而酕已乃䕫然率先倡義唯利濟之勉蹈瞿瞿抑抑士也匪叨棣棣婉婉婦也嫓操灉坵培壘千載同牢胡以徴媺麟定鳳毛蕭小峯處士墓誌銘予邑南以儒林墨卿世其家者右凰岡蕭氏蕭之先出建康始祖銓避金亂始徙泰和之凰岡自銓幾世而有今小峯公公髙祖孟節仕至交州經歴事行載郡志生四子登甲第者二而伯子溢溢子貴禄禄二子天貞咸治書未逮仕天貞號晴峯翁以行誼表諸鄉娶康氏生公公諱朝賞字汝勲天性孝友骨鯁諤諤始嘗戮力舉子業既脱頴足進取尋以家累棄之初晴峯翁拓落有大志不欲事生産以故家益窶公因出受徒為養晴翁捐世公哭踊幾毁痛翁之弗禄也殮葬勉從腆居䘮如禮時二弟方㓜母老孀居公既朝夕承菽水歡退課二弟經史校文無弛嘉靖庚子始設教䖍郡館金無入私槖己巳康太孺人逝公治殮葬持䘮如前又明年配胡孺人繼卒公益㷀㷀劬劬罹危疾幾不起既愈乃挈二弟偕如䖍䖍人感公誠信競攀延不令之它塾曰是我家先生也不得師公者輒競師二弟謂有公之風焉幾年公自䖍之㑹昌㑹昌人爭迎如䖍亟留挽不令之宅邑曰是我邑先生也公遂留㑹昌至廿年公為教其子弟邑中無老少貴賤莫不知名㑹昌人有急反貸之公公無不倒囊至積劵數十迄勿問也前後所有恣弟出入婚娶㸑食觴豆共三十餘年友于之愛彌篤里中誦孝弟者必推轂小峯公雖愚下咸云公雖不為詭隨然素厚重未嘗臧否人環堵蕭然而賑乏恤匱之忱隠若飢渴鄉隣有競得公一言必解咸曰小峯公無他膓而言不比周故醉心焉先是邑令祝大夫暨今唐大夫㢘公篤行為鄉人推服相繼署鄉約長公曰此古三老職也敢不盡心而鄉人前已信從自是爭訟為衰晚嵗與人無長語惟孳孳勸善時語伯子廷對氏昆弟曰作善降祥貴先存心己而廷對舉癸酉鄉試鄉人頌曰諒哉作善之食報也明年廷對㑹試下第歸日夕承顔公逌爾而懽訓曰禄位固有時吾獨盼若等禔身樹業不慚先君子足矣先君子者謂交州思恩兩君子也嗟乎若小峯公行誼庶幾不靦兩公矣詎論隠顯哉公不幸卒萬厯丁丑正月初五距其生正徳庚午九月十一享年六十有八卒時廷對赴試歸自京邸抵累川始聞訃號絶復蘇卜以是年某日奉柩葬某山之原屬其友蕭州守君某撰狀行事謁予銘予習知廷對善源之有自也銘曷辭公初娶堵陂胡氏繼下模郭氏子男三長即廷對娶水南徐氏次廷㨗聘胡氏又次廷擯聘尹氏女一適前溪康一陽氏銘曰風積綦厚而鵬九萬山積綦崇杞梓維翰業矣凰岡名才是瀚倬矣小峯儒林斯冠為行不一貞一者善既積既谹如取如劵旴彼嗣人彌久彌焰處士蕭挹淇翁墓誌銘翁蕭氏諱其坤字順齡一名晚所居濵淇塘别號挹淇人稱挹淇翁云上世仕楚自長沙避地來家邑北之早禾渡幾世為大承事徙南溪里幾世為惠可徙今墊溪而又幾世傳務逺逺生慎菴某娶某氏生翁翁齠而樸天性孝友居約躬操耒畚為養已而去為賈賈不牟利輒復耕然事慎菴公悦志承顔雖半菽粗糲未嘗不令公大噱日鬯如也事異母兄嘗外禦侮友愛彌篤既卒樹其孤不後己子時從昆弟競搆重獄幾不解翁勃然作曰予其忍坐觀哉遂自奔告上官直其事獄竟平生平急公甚私輸税董役竣事常先鄉人壯年伯子元周生雋朗輒敦明師教之敕就外傅雖力不充靡不傾誠伯子學問宻友為族父鶴臯翔曜翁一見曰國器也雖匱必欵後果為名御史嘉靖丁酉伯子偕舉于鄉㨗音臨翁方輓犂耕壠端已聞報猶逶迤竟畆無驚愕態嗣是雖輟耕然與田叟談耕牧事如飴嵗時土發督先穀種芋魁輒出諸農上秋成視獲至汗淋淋下不肯休昒爽躬洒掃出課浚園豢沼夜輒問蒭牛毄畜如有程或曰貴人當如是耶翁曰吾老農耳焉知貴人其質任類如此嵗辛巳伯子下第遘病竟殞翁哭痛絶至困憒若熟寐見伯子來曰父無哭壁間不有烏龍在耶父收桑榆豈晩哉視之龍光隠約既覺愈慟時季子元岡暨伯子遺孤象僑甫十齡咸通章句時人擬曰此非烏龍兆耶于時翁室如懸罄薪桂米玉然教一子一孫遣外傅如教伯子無暫倦嵗丁巳二子咸得補邑庠弟子員翁稍慰懌既晩益喜淇塘之勝曰吾無力為亭榭惟築一園環植松竹而優游其間吾生足矣又喜飼巽羽時從籬落飲啄之曰是其中豈庸以口舌喻哉隆慶丁卯改元翁年適八十而季子繼領鄉書翁遇㨗使不異丁酉時賀者填户翁揖拜酧獻一若昔時仲冬送季子赴南宫侃侃命之不為兒女憐明年正月八日翁忽以無疾竟卒距其生某年月日得年八十有一嗟夫若翁可不謂善生善死哉翁長身鵠立目若電光音吐鍾谹雖獰暴者遇之莫不屏息然謙冲恬約愈久而篤宗祠湫圮亟督羣從葺修咸畫自胸臆衆並功之翁曰吾事且畢吾可以獻先人地下矣何功為嘗自置一杉棺佇用里有劉姓者殱於寇其子遍求棺艱所宜謀諸翁輒慨然曰吾與若父軀並修今以吾棺棺之明當還一棺如長耳或曰劉事且急儻難之可倒其槖金翁大不可曰吾曷忍至是哉常時竈突不烟而意氣軒豁雖子嗣冠時髦未嘗華其冠服為人解爭是非斬斬不為模稜處家族睦而有禮吊䘮問疾嘗先衆人賔至雖𬞞一盂酒數行無不傾竭相與藹如也或謂翁介不賈譽朴不遺俗勤不出位厚不市恩兹四言者足以槩生平大畧矣方翁考終季子在途時夢翁已又夢翁癯然有不起狀翌日而訃音至哭擗天涯絶不欲生者幾矣既歸卜某年月日葬翁龍目山丙向之原乃飲血為狀語甚酸楚而乞銘于予予與蕭世戚而季子遊吾門其政聲足炳炳矣予以是知翁之沈脩至茂厚而所享亦不尠天之報施善人何其弗爽也翁娶嚴氏伉徳安貧生子三長即元周娶某氏次元冏娶某氏季即元岡今為龍川縣令娶某氏孫四象僑庠生次象侃象鯉象岱女二適某某孫男二某某為之銘曰於昔盛民耕鑿作息内靡淫志外娛化日雖咸可封而安自食漢舉力田亦先孝悌矧翁蹇蹇衆媺攸備慨𤣥纁不賁其躬而公車乃登其嗣瞻龍目之臯如鑱貞石其焉肆水部尚書郎張玉屏先生壽藏銘予以癸丑仰錄句曲而予邑玉屏張公已判應天予見京兆扈公扈公曰子乃張公閭左右人知公才乎已而歴謁各部臺大吏無弗才張公者諏之府人人曰公自判府席未温即出署溧陽公竒政著溧陽最予諏之溧陽人則曰吾邑人工逋賦嚚訟公至㢘知積逋者乃出令專督之而緩其餘己而積逋者内悸輸輒先其餘咸感激爭輸不肯後凢四易月解竣唯成堡嵗堡二里以圩圮潦甚未輸而公方剔蠧節靡謝供却饋民感切爭欲得生祠之已鳩金若干矣公聞諭曰若欲樹祠莫如以若金入官自營各民歡然獻金公輒呼二里民曰此予祠金也以代補爾輸僉愕然為之歡呼公又詗知鄉謡九龍十虎名咸緝而置之法又痛治誣告者罪繇是良民始復樂業馬太史曰自非司命大人禔已無㸃則此􅀈虎者蹄齒及門庭相尋也今何幸空境矣于是公得稽欺隠詭寄又因審編知户口所繇銷亡繇前令不為民裒益故以下戸羣富室則貧者愈貧齊民班勢家則傷者愈傷公乃區分易置増耗祛詭凢富室勢家與下户齊民各為列繇是征輸寡于稽亢徭編艱于巧免追呼鮮至凌奪它邑寄庒者莫為遁射矣公既潔且明雖强有力者弗敢譁細民欣若更生又出鍰金築成嵗二堡圩遂成膏壤民咸家奉公而尸祝焉已而句容人曰公美政詎止是公昔在予邑議革冒聖宗免徭事辭議偉且確又有豪家誣執八平民為盗得院允者三公獨閲賍止一麵杖又㢘知豪家絶無被盗事乃竟白諸上吏而八人者生矣操江盧公嘆曰張判古人也己而應天人曰公美政詎止是盖公職司馬八縣舊有例金數百公悉革絶之己而予以耳剽目擊得知尤悉公鞠獄迄無茹吐若髙淳李諫者故和奸而以强論死宣城唐徳亨等十四人咸欠户而以侵擬遣公皆為辯釋之又宣城𨽻人湯紀因追攝劉登不得懼刑自縊死縣擬登抵命公按驗之耳後故有八字痕登竟得减死寜國曹隆與賈姓者相毆趙和赴勸曹怒熾推趙跌死訟稱挺傷濶分餘議曹抵死公覆審駁曰傷濶分餘則挺亦𦕈矣奚能死人曹隆亦竟末减懷寜謝教與從兄弟爭産辭弗直而親叔謝元實証成之始謝元入郡門時謝教等買丸肉酒酒之元啜丸二酒半盂以其餘啗從者畢乃赴官歸舎夜半腹痛死理官坐教等厝毒謀死親叔合重典獄成三嵗公乃駁曰使教等果厝毒酒中則從人啗餘者曷不死而獨死叔况取庫貯探鎞迄無黒狀此非毒謀審矣且八十而奄忽死者比比有也豈皆中毒哉於是教二命得竟釋焉公又㢘知髙淳庫役盗庫銀營子母錢公戒吏搜得劵置之罪量罰各貸家葺學宫適又懲逆併剏尊經閣而宿圮者咸煥然内翰邢公紀諸石公風裁最為人誦者則曰婺源有王郎中者既罷歸仍結柄家仗勢凌駕府縣丞劉大武旋誣劉至罷免劉奏辯下新臺史情知其寃而猶顧慮公激以大義乃行公㑹勘既兩造備王獨挺立言曰事有成按公必欲問則當牽聮入錦衣獄公曰錦衣獄非賢傑不能入我倘入幸矣若不聞欽依問犯例先受杖𨽻人即按王于地而同問官皇遽祈免免之乃鞠各里庫咸稱劉清操所指賍絶影響于是復劉職而抵王誣自新臺史以下莫不欣悦而公之名愈籍甚一時矣公尤敦風教非獨沾沾事簿書間故尚書齊泰溧水人革除死難臣也家故被籍嫡孫光裕等傭耕自活公為買腴田業之又以光裕有先人風白督學廩諸庠盖公之嚮往忠義殷矣于時公得隲本府治中南吏部題授奉議大夫公先後居應天者六年其䝉知撫院臺史咸題薦有殊稱所建白可施行者靡不允民食利者無算而大司馬克齋李公操江時嘗陳江洋事宜十二䇿咸納行之即以邊才薦嵗甲寅陞南京工部都水司員外郎時倭冦薄南都城下而徐御史者建議増髙金川等門城垣鼎挑濠十五里奉㫖㑹勘事歸工部因檄公丈量合用銀十四萬有竒公白尚書曰所議増城頃當興工第挑濠事關繫不尠今京軍以錙銖營利自活若役之挑其妻孥不免凍餒或至驕逸難制則蕭墻之憂其孰當之議銀兩取辦各府然近蘇松等壯郡皆為冦患若復加征則畿内之憂其孰當之尚書曰科道督甚當柰何公曰金川門屬皇陵右臂昔髙皇獨不濠是門豈無意耶尚書悟乃宻具奏有㫖行南欽天監勘議果碍事遂寢軍民獲免徴役之苦公一言之力也次年公得奉勅清蘆洲首追勲臣逋銀二千有竒又追豪勢占洲地以給細民是嵗冬予别公遽告以原職致仕知者莫不愕眙曰何世之輕捐才賢也公家居十有八年而予自粤歸乃挈鄒生汝瞻訪公洞巖山之館則公已營百嵗後藏室於山巔予顧鄒生曰不登洞巖山不知公之達生與垂裕之逺也盖洞巖山稱唐吉州守閻公昇仙地公且築其巔為壽藏非達疇能之故曰達生予鄉人鮮不治青烏家然逞智力千萬方莫能獲勝者頃聞公獲茲真勝今視果以是卜公澤䕃不𦕈故曰垂裕公喜即偕其三子忠卿憲卿慤卿以壽藏銘請無何三子以歐學諭所著公政行示予督銘予曰知公京兆事唯予覈若其生平則歐君覈按公名峯字子竒號玉屏世為泰和後凍里人其先有洪州叅軍剌吉曰景重者家吉之城西後徙永豐及富田井頭又三傳曰洪則後凍初祖也六傳濟字待旦清字穀旦中宋紹興開禧解試又七傳諱元方為公髙祖諱孟逺為曽祖皆以耆壽膺冠服祖諱鑑號愛山以輸粟授散官父諱泗號石坡贈應天府通判世稱京兆公云嫡母生母俱羅同贈安人初京兆公嘗禱嗣夢鯉魚山竪皂纛掲江山清氣四巨字翼日公生實𢎞治辛酉九月廿一日也公童而英喆嫡母絶愛之五嵗訓禮度七嵗為程書弱冠京兆公困訟學廢嘉靖改元公理舊業遽超等其族叔貳守魯試而竒之乙酉補庠生是嵗京兆公遘危症它藥㒺效公乃籲天刲股服之果瘥戊子舉鄉試上春官不第公自惟曰舉業詎可畢人道乎時歐陽文莊公官翰林乃謁而師之聞正學巳亥母服闋復之留都卒業文莊公門已又遊泰州禀學王心齋心齋之學與文莊公同出而指發者稍異公兩契焉辛丑四試不偶于是謁選補南海令南海居㑹城稱巖邑公至嵗當造冊邑富家多分户飛洒自等貧民貧民苦之各邑寄庄户止徴稅而弛役其後則并稅弛之而本邑富戸爭效尤公曰厲民孰踰此哉乃區分丁粮上者承里下者充甲各邑寄庄則比回該邑徴編而本邑寄者例如之雖勢家者嚄唶咸弗顧貧民稱快上吏亦多能公譽繇是起里長必拘正役不輕加刑獨械繫一二稍逋民相勸輸納不敲而竣邑中百需止辦諸六庫役破家者十而九公白郡守酌議使客公費郡邑分任各用鍰金註籍磨算既不煩里甲而庫役亦蘇矣初海涯中新起沙洲成腴田簡氏以其近而有之許氏者爭不勝遂投諸顯宦相犄具奏道斷歸許實隂以貺宦簡益不服然斃者已數人力且憊公憫之乃諭簡使并以售諸宦意者宦與之值則兩利矣簡從之果得值諸司嘆曰張令其善濟哉有潘宸者􅎱親姪殷富則乗其寡嬸孕而以用强誣之姪大稱寃行公勘公曰姦非和弗孕也叔嬸與親姪和姦律各絞嬸始供馮姓者姦乃坐宸誣而姪得釋上下快之明年壬寅公偶得劇疾太守西村胡公知公窶乃日遣醫代辦槥比痊喜曰張令生則南海民生矣時有楊兵憲者聴總甲捕盗凢七人寄縣獄中惟真盗一而六人者皆平民公鞠真盗語又得總甲歐六人攖金情乃為文申楊六人獲生焉公又出黎南友死罪致忤陳二守其急生人不避怨類此是嵗夏京兆公病終囊無辦廖安人解釵珥貿棺西村聞白兩臺咸致賻及行里老四民遮留哭奠更五日乃獲出境甲辰服闋乙巳補任江浦江浦故凋瘵又當孔道旦夜使車繹騷舊例公費月給十六金里役不足則起𣲖通邑丁嵗約八十餘度民浸不堪公曰嗟乎艱哉江浦乃定畫每年僅起𣲖二十度即省民四之三凢例供節饋及展綵設宴附餘扛解一切禁之南京四門倉派粮不及百石而中璫科索費埒它邑公乃白上吏移置之是年旱無収㑹兊運期迫公白撫院請常平稲及原估賑銀蹔那完兊院艴然曰若書生不肯嚴比徒沽譽耳公對曰民飢極矣嚴比是驅之逃也院怒叱不已公即拜辭文請罷職浦民聞輒數十羣行哭都市攀挽呈訴科道籍籍有言院始允假銀稲下縣不允罷職公乃移銀起運而躬詣各鄉行賑尚餘銀三百因為築圩費盖邑後有永豐順濟二圩自成化間盡圮田潦税懸公増措金脩築次嵗大獲粮乃有歸先是江浦原奉免􅔐江折納而勘報者不覈所免又黄冊収除與實徴大相徑庭公乃稽通邑粮數履畆對勘雖焦勞晝夜餐櫛風霜不以自皇遂勘出􅔐江平米千石有竒改造實徴貧民始免虛累每年預刻格眼方楮而户給之以杜伸縮其實逃無徴者則援望江例徑請停征繇是江浦之粮靡不有歸焉崦山周公極稱異之時侍御蘇山呉公道浦覩公政慰悦留駐因邀諸同門編校心齋先生遺錄公遂割俸鋟梓於浦公又嘗與胡栢泉公松戚南𤣥公賢同遊瑯琊定山珠泉之勝相與訂學不以疲邑故窘意豁如也是嵗秋陞應天府通判江浦民爭為樹石栢泉公製文題曰勒思丙辰公既解水部歸剖已業均諸從子巻巻睦宗緝譜改建宗祠改厝先京兆及其長兄上逮曽祖顯祖凢四壠其為貧族舉火者幾為姪孫從姪孫舉聘者幾為橋梁者幾為利濟最博者則賛佐張月泉郡公丈量邑田畆而月泉呈臺司十䇿即公所畫陳者丈田竣民咸知歸徳邑令而莫知其出月泉或知出月泉而尤莫知建自公也公又約束里中輸納不後期而倡行鄉約近耋尤力盖公力艱拯危維風變俗才志業業若水之必潤火之必燎若越人之治病隨地必効孔子曰是亦為政於公豈尠哉公又嘗為義陽書院聮鄉之子弟講學讀書其中又嘗追鄒羅二先生青原舊盟爭先倡導雖耄不倦家居改刻心齋遺錄屬予序之公功徳于斯世斯學則並逺矣丁卯穆皇登極進階朝列大夫士人特以為稱先是甲子卜居廬陵之蓮壠至癸酉乃獲兹藏藏脉亥靣丙形龍嘯天識者咸謂徳徴公先配劉安人嘗亦刲股捄姑生二子曰孝卿先卒曰忠卿邑庠生繼配廖安人生子一曰憲卿鴻臚序班側室徐生子一慤卿女二適王魁南太宰羅文莊子太守詡之子雲書孫同祖同升同倫孫女二適顔學龍生員陳杏或者謂公祚𦙍如松栢之柯條造天非遥其原本生人者多也予與公遊從久至句曲辱下交既歸以同志獨契忠卿憲卿遊予門咸世其脩慤卿樸且雋然則知公而叙以銘者非予不可銘曰伊昔聖門爰有達才迺澤庶草勿為稿荄峩峩張公孝友天培慧鑑韶朗豁度夙恢猗與循㢘兼濟長材巖哉海邑吏窊民豗公理亂緒龍淵是裁如滌穢薈而撥霧霾孰艱江浦孰獲公來肉乃孱骨生氣遄回寫鹵而稲孰俾不萊皇皇京兆趙張寔儕誾誾水部言核功魁直氣英英姱節皚皚拂衣林莽憂時孔懷顯隠殊轍澤物則偕天佑祺吉卜兹崴崔華精斯啓寸雲九垓藏哉臧哉百世昌哉循績既述復頌以該告後史管暨公𤣥來梅池郭君墓誌銘予邑邊五雲之東綰轂數十里間多郭氏一姓其風習相襲婚媾相締則最梅湖而園背即攴出邑庠生天穀其族雋也天穀蠲萬厯某年正月初八日窆其父梅池君五雲十三都西岡山下横頭之原丑山未向手其狀乞予銘至再四不懈予感其孝誠韙之乃按其狀誌曰君諱逢義字汝宜號梅池上世出南唐御史中丞瞿由金陵徙泰和之隠義岡至宋進義校尉麾轉徙薦溪幾世諱仲温徙今之五雲梅湖園背其後曰東昭曰祥祐則君之曽大父大父也父𢎞聰號秋巖隠居有長者風娶曾氏生君君自童警敏有心計從塾師不繁繩督而業常就稍長為門祚未遑治舉子遂棄去專脩封君之業下至米鹽穀纑外及更徭賔祭之需莫不劈畫昈然家以饒裕天性孝友母病躬湯藥必嘗乃進衣不解帶者數月既卒哭踊欲絶䘮祭以禮日偕形家者流蒲伏山谷間風雨疾病不休雖至勞費咸身荷不及其季又篤友愛終身如一日事繼母若事母然生平謹祀事急利濟有貸者弗克償無論子錢雖母錢勿問也遇人開口出肺肝延禮名士訓子弟以問學為他人父兄亦必以訓子弟問學言故族里間莫不信憚梅池君者君其庶幾有得於六行大都者耶君生嘉靖壬午三月上已日乃遽以乙卯八月十一日告逝得年才三十有四悲哉天之奪君算何早也雖然天以淑質厚君生前故能禔其行不墮其世以賢嗣厚君身後故能穀其子可以鳴世算脩短胡論哉君娶龍丘曾氏有節操語具其族子太守青螺君傳中生子一即天穀配鳳岡康氏副李氏女一適同邑嚴旋吉孫男二今磐今磬俱㓜孫女一聘予邑歐陽錫齡男文成侍郎横溪先生孫也狀君行者即其族弟郡博與京而父菊潭憲伯所善族中處士唯君不辱故京之言益詳覈可信云銘曰辟彼良璞不珪以璋而遽早撲辟彼良木不柱以梁而遽先撥韶有令行遺有令嗣有鬱者原有永者世衡廬精舎藏稿巻二十六
