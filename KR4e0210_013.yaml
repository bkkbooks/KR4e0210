body:
  text: 衡廬精舍藏稿巻十三明胡直撰辯太極圖說辯昔陸子辯無極太極反覆數千言予以為無極可無辯其不可無辯者圖與說也蓋據其說曰無極太極訓者曰是無形而有理夫既稱無形之理矣則惡可以形圖哉今夫圖天者蒼蒼然日月著也圖地者莽莽然山川布也而天之上地之下可復圖乎豈惟不可圖亦有不得而指言之者假令有人指言天之上何狀地之下何形則世必咤為怪誕人矣何况太極所以生天地者而可圖乎今乃規之而若輪團之而若鏡與丸也是孰覩而孰傳之耶非獨太極雖隂陽亦不得圖也據其說曰太極動而生陽静而生隂則是隂陽特一氣猶夫水之有寒燠亦一物也今乃白而陽之黒而隂之外之則左陽而右隂内之則左隂而右陽是果然哉自畫卦者以一為陽以一為隂其取象亦足矣今又為白黒而左右之不既贅乎太極隂陽之不可圖明矣而其說則尤有不可通者說曰太極動而生陽静而生隂是則太極先動而後静也夫先動後静則未動之先果何為即且既穆乎沕乎其無極矣而又何動静之可言又曰動極而静静極復動當其昆侖未生七政未立不知㡬何時其為動之極也㡬何時又為静之極也且太極之理果獨立而動静耶抑附氣以動静耶如以其獨立則穆乎沕乎固不可以動静言如以其附氣則氣之膠轕坱軋不可停止謂為動極猶可言也至其静極則又何狀是必凝乆為塊而已其可通乎既曰五行隂陽一太極太極本無極是無極與二五始無不合也則又何待於妙合而凝云者既曰五性感動是仁義禮智信始無不定也則又何待聖人先益以中正後繼以仁義而後為定之者也既曰中正是不可以動静偏言之矣則又何獨以主静云者至以五性之感屬神發之後善惡之分出五性之動則與書之恒性易之繼善益逺且誖也慿其辭繹其意非獨是非謬於聖人即其所自言者亦首尾衡决而脉理始不可尋矣是可謂周子之書哉古之善言至理者莫若易其次詩與中庸易止言太極生兩儀而未言兩儀未生之前有若是次第也詩止言維天之命上天之載中庸止言天命之性天地之道而未言天地未生之前有若是之次第也有問天之外者或對曰氣也問氣何所際際之外又何物焉則雖伏羲不能以對非不能對也不可得而對也故曰六合之外聖人存而不論而况二儀之生與其未生之故又可得次第詳言之乎後世唯三墳偽書則有太始元胎太極父母之說周子豈效之乎曰若子之言則周子手授二程子非歟曰然蓋予嘗逆於心而求二程子之書其昆仲師友天人至理殆數萬言獨未一及圖與說者二程子豈以師之所特授者而故特遺之與考之胡邦衡記周子祠亦未及焉周子自為易通書言太極而不言無極言仁義中正而不言中正仁義則其非出周子亦明矣或謂出陳希夷為之潘興嗣誤取以入誌予則曰周子必不為此希夷亦未可誣或者希夷之流為是以附聖人之教未可知也曰然則朱子表章亦非歟曰朱子尊信周子之篤者也古之傳偽命者雖忠臣孝子或信奉之非不察偽命忠孝至也朱子其亦猶古之忠孝者與夫朱子何可尤太極圖說辯後語右辯予作于蜀臺云蜀有固陵先生者讀之語予曰太極未動之先果何為耶此語雖周子復生無以答予曰予非疑周子也疑此非周子作也而從旁者贊曰此必非周子作假令出周子二程何不以示人程伊川作易傳訓易有太極章未嘗一語及圖亦未及先動後静之說伊川豈訓易而反秘師說哉此可知其非矣予又讀宋末許白雲書知昔人已疑動静先後之繆而白雲答之殊覺矯强近歸讀予邑羅文莊續稿載太極述其序略曰愚嘗熟玩其圖詳味其說雖頗通大義不能無少疑又曰圖之作雖極力模擬終涉安排視先天圖之易簡精深恐不可同年語也豈元公未嘗見耶是文莊亦指其非周子作也又謂天地造化之妙聖學體用之全易中言之甚悉於是錯取吾夫子十翼中語組織成篇以盡愚意凡皆傳夫子之舊不妄贊一詞名其篇曰太極述直謂朱子表章圖說而文莊尊信朱子素若神明豈故於兹有異同耶豈亦不得已而為是耶學者觀所述亦可知圖說之贅且謬其非出周子明矣其述云易有太極是生兩儀兩儀生四象四象生八卦是故剛柔相摩八卦相盪鼓之以雷霆潤之以風雨日月運行一寒一暑乾道成男坤道成女天地絪縕萬物化醇男女搆精萬物化生一隂一陽之謂道繼之者善也成之者性也仁者見之謂之仁知者見之謂之知百姓日用而不知故君子之道鮮矣君子體仁足以長人嘉㑹足以合禮利物足以和義貞固足以幹事君子行此四德者故曰乾元亨利貞大哉乾元剛健中正純粹精也月借日光辯月借日為光其説見叅同契宋儒遂有銀丸黒毬之譬予竊疑之今夫月隂精也腐草之蠕映書徑寸之珠照乗明星有爛雲漢為章小大雖殊咸各有光况其精者而獨無光乎此必不然也宋儒以為月晦則叠日而死月朔則離日而生月望則正對日而盈以是知其借光此又不然夫以日疉而月死則曷為不死于晦之夜而死于念八也以日離而月生則曷為不生于朔之夜而生于初三也以日之正對而月盈則月在上日在下浮雲之微尚足翳之曷為大地之隔閡而竟夜能盈乎且日月之正對即不當有分數之差池也又何月蝕而有分數之異宋儒豈未思耶無亦泥于窮理之過而强自智也夫惟其强自智也宜又有四邊光射與夫暗虛之說則亦曲且勞矣宋儒又謂星光亦受于日不知日蝕之時日尚不見而星光反著是又將孰射之然則月有死生何哉或者謂陽無顯晦而隂有盛衰潮汐珠胎魚腦與月盈虧此亦其驗與然卒未可知也噫使果有人凌倒景旁日月者則必能知之亦或能言之然而終未有凌倒景而旁日月者也衡廬精舍藏稿巻十三
