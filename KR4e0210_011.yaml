body:
  text: 衡廬精舍藏稿卷十一明胡直撰記臥冰記余曉過獻縣見荷鍤而鑿冰者紛焉亦有寢板於冰之上其頭面則垂諸冰竅若熟寐然問之乃以暖氣餌魚以伺鍤取之者也余因與同行者引觀而嘆之或曰吾與若破曉夜馳萬里道冰鬚而垢面雪沐而風餐攘攘朅朅奔名利而來其不以身餌者亦寡矣又奚彼之嘆為或曰吾與若皆將有事天子之庭所謂致其身者也非餌其身也余曰二君子之言然哉然余聞之昔王祥寢冰得鯉以奉母世以為孝意其法亦若此矣非必冰自剖而鯉即躍也以是知古今人事不相逺而其心特異假令今人之為此者皆有勤君父之心則其於致身竭力也何逺哉然吾見今之人或不然者雖謂之不餌其身吾不信也荆塘圖記距句容縣治五十里為方山自方山東折為三茅山又蛇蜒三十里萃乎回巒摐乎奧嶂望之若屏立帆駛若丈人者踞坐環瞻羣弟子蒲仗趨其間也然後降為林麓盤為周原原之上多嘉木良卉紆鬱透迤而為平壠是之曰荆干村村水自山溪而淮為巨浸曰荆塘以其地舊多荆樹故名而地著者巨姓許氏許氏有好修之士曰某少遊太學友天下士返而讀書溪塘之上益種以可實可材之木可名之葩日引羣從諸子盤旋樂之諸子以君之樂遊也命工圖之且圖荆以置諸中堂庶幾君之出而盤旋以嬉者入而偃仰無一離也始豫至句容君來訪視其氣貌知其自腴於名山佳水者既而其仲子學道果以圖來請記夫子之欲竄於丘壑久矣然有數而甚艱今君不絡一騎不輦一石悠然得諸盤旋步履之暇而諸子又致之偃仰寢食之常何其快也乃吾復以其雍睦愷悌之行日相蒸感荆且榮無日矣蓋山川之靈秀其緒者為名葩異草而精者為魁賢碩德自魁賢碩德之生則其蒸感乎草木者益異斯理之必可卜者焉君之不種於原而工樹於圖豈其意歟矧君將出而理人必能使幽巖遐壤之夫安其閭閻若已之豫復以榖其子弟茁其草木及其致而歸也其為山則光華且盛然則君必有封植於兹者矣於是記之以俟諸它日彈子洞記辰溪之乾溪北山有石洞谺然張也土人指曰是名彈子洞昔有過者又字之曰玄靈洞凡乾溪衆水咸歸洞底伏流三十里出銅馬潭合廬溪江東去豫數過異之至是始單騎往觀將逼洞口即步循亂石攀緣履口外憩盤石上仰視中巔皆峭壁壁上怪石糾拳倒垂若鱉首然旁兩崖峙天若雙門闢兩掖焉水落石間雷吼輪輷或為鏜鎝之音石勢如動豫默坐久之復攀緣度流始抵洞中洞髙廣俱可數十丈下遍水石因選石攱而外觀則見衆流之歸也如歸飲啖之內洞中之右又一小洞窈􅀈不測則伏流入深處也小洞當門有橫石負小方石又疊負一巨石其上若覆荷又若茄房咸如人所置豫欲久留則石燕數萬穢下不可坐也方未入或言穢或言無他竒既出或言竒又或言幽豫曰嘻子未遊於物之外也又烏知淨穢之辨竒不竒之分豫獨訝者今時旱虐苗稿盡矣乃不使衆流分布溉之乃獨飲啖其腹甚非仁者澤物之意而或謂楚水國也水橫溢連年江漢洞庭不得率其職則又不若兹洞獨斂而懷之之為愈也豫曰若是則洞之蓄淵矣非豫所及也因并記之以自思餘功亭記繇桃源之辰沅抵界亭萬山崴崔危若梯天至七盤嶺旋轉崒崿夫役負乘踣斃不可數守藩參履菴萬公出鍰金募浮屠人從七盤東擇稍夷坦闢新道十里接淘飯鋪經馬料洞挂洞壁飛泉數十丈下泓為湫渴者就飲困者就息過車當煩敲驟就清泠翔幽眇未嘗不毛骨灑灑稱曰此萬公功也然公來湖北絀墨節疲興學正士績膴澤沃而闢道特餘功耳於是大參雙南蔡公繼至與兵憲檢菴李公議建亭泉右題曰餘功又名其泉曰噴玉令為之記今夫功者當時所賴而非君子之所樂也天至大矣時雨時暘物孰煦而澤之惟淫霖而晹虐旱而雨則煦而澤之者衆矣其在於人朝饔夕飱神王氣和雖食以膏糜人孰德之唯夫旅餓而獲半菽之餉病亟而值一劑之良則德之者衆矣國家無事雖有聖相虎將無所為異惟當國步搶攘有賢將相易之安寧則異之者衆矣若是則功者生於患害者也豈君子之所樂哉雖然使虐旱而無雨淫霖而無暘旅餓而不有半菽之餉病亟而不值一劑之良勢危而不有賢將相之力則生民之大命去矣故功者為當時之所賴又有不可以誣焉者萬公欲以其學行天下雖使有蓋世勛非所樂居也而况區區闢道己乎諸君子與豫猶云然者誠以其賴之不容己也亭成兵憲沙城阮公亦至咸誦曰宜因併記之愛日堂記蘇子瞻云人之至樂莫若心無憂而身無病豫嘗讀而嘆曰此引年之玄樞也彼方術士豈足喻此哉雖然唯心無憂而後能身無恙自非有志之士以道自勝則出有爵位之營入有蓋藏之慮上有堂搆莫承之懼而下懷箕裘不續之虞故嘗以不能盈百之年而抱千嵗之憂以兼所愛之身而不免四百四病之侵斯人也􅘈􅘈焉蹙蹙焉雖當皎日如伏隂霾雖居廣厦而坐幽狴雖有髙車膴座如局局靡為騁雖子嗣盈前日擁長姣竭要眇之音亦暫得頃時謔浪景陳即戚矣此莊子所謂日消老洫不可以長者且縱令長至耄耊比旦暮耳其曷有享乎然自通人博士則莫不身知其弊而又身蹈之夫人身知之且身蹈之則使移以告諸其父兄曰願無其然是大不能也彼有志之士雖能以道自勝而目擊其父與兄不能自享若此則其心不尤太憂乎豫以是知仁孝君子之慶所遭也余自捾髮友歐陽文朝氏因獲侍文朝太父侍御公及嚴君鑑齋先生先生始仕守廣德清惠絶一時纍級至比部郎以年例且遷矣而先生疏歸獨殷時余留以書元相亦慰留不可奪既歸仍其先業日引族戚賔從為娛夫人尹賢德冠里閭又能贊先生唯所為文朝為之子則即所謂以道自勝之士伯孫遊邑庠且抱子先生日相閲者四世若是則先生視爵位蓋藏果奚物也而況堂搆之承箕裘之續靡一不酬天下之物孰有能攖其衷而動其憂者先生將繇兹至百齡一無恙可坐卜矣乃文朝氏又懼無以為娛别搆一堂以奉先生及夫人題曰愛日緘書千里令豫為記豫既慶先生父子之間以道交相望又交相成且相遭也豫知先生以百齡不啻之身延千億齡不可既之道又奚羡嶠壺之客享區區遐算而靡所短長反自誇而嚴之乎豫獨念童時偕文朝侍侍御公忽忽二十載咸如昨然靡有寸益而獨仕官先文朝嘗逺違老母甚逮數年感愛日之義則雖以吾百日易文朝之一日不可得也然以文朝材賢什伯于余不日為世庸亦將逺於庭闈則文朝之在今日其夙興夜寐日進無忝且以承歡膝下左右無方雖惜寸隂可也豫辱先生及其夫人宿誼最深情不後於文朝故述其意歸而為夀遂為記雅安分司題名記嘉靖壬戌冬豫以楚僉分司湖北未二期報遷蜀藩之右參議而湖北民士不豫釋也因不自揆妄意留楚久任之議戒舍人上書闕下具言久任不久任善弊之故乞勑行自臣始書至都中雖一時願治之士咸詆譏格不得上豫乃以次年夏抵蜀分司駐上南川之雅州焉既至問雅民止四里周遭山石占三之二問向之分司兹土為誰氏不能舉二三曰前至者遷去不常不能悉也余不覺嘆曰嗟乎此久任法不行則民士且不能道官司名氏况能洽而治乎乃披公移稽志籍得若干人因令有司具石書各名氏籍里及其到日書竣豫又感焉夫語治多矣而莫益於久任簡官之為大今上川南以藩參分司特駐雅良為奉璽書督建昌六衛糧餉俾各呈請核支道里近耳不知建昌抵雅千餘里往復經月值公出候益艱斃瘴癘者不少司道相去遼邈武辨侵漁弊穴百千雖神智莫得盡剔數奉欽查則衛所官罹罪網者過半况雅以四里石田之民嵗供分司百役及其往來寮屬夫騎給使之煩是固有割骨朘髓而上吏弗為覺耳凡此皆不便之大者夫考全蜀之兵糧孰愈于松茂意者當倣松茂制例即以建昌六衛糧餉就建請核支于兵道以雅黎二所就卭請核支於巡道而藩參移歸總司專職分守則道理之近稽剔之易供費之省其與前之所稱便耶否耶可不較而知已若此則雖不及簡官而所為簡者不鮮矣豫方有懷欲言又未知如久任之蒙譏訶否也乃因述題名之繇并附記於此云三峯閣記雅州在萬山中山嵾嶧􅑬􅀈霧雨常蓊翳不可時遊嘉靖甲子首秋之日適土夷平定田稼碩登余乘霽出閲城東已而渡小澗厯土神廟之前閣閣南向橫徑不二丈周井幹四眺若懸空翠屏龍觀金鳯雅安嚴道諸山綿絡蔡蒙之間咸歸几案獨其南牛心山三峯端聳卓出殊衆山若賢正士安處羣衆中雖覩者莫不辨之而亦屹無自見之意閣後周公平羌二水交焉豫顧樂之竟日至是秋之九日偕鄉大夫六臺李君復來賦詩甚適或請其名豫曰夫遴山於蜀猶遴澤於楚非以其特不足貴因遂題曰三峯閣豫嘗見洹詞詆醉翁之遊近晉風乃不曰昔文王日昃不皇食則又時在靈囿何哉晉王右軍倡梓澤之詠當時諌止玄虛則見右軍一人而已夫江湖與魏闕一致此不可為曲儒道也而余不足語此余方病骨濕將東謀藥醫陟望指白雲所在耳因諗李君而書諸石夢記豫以甲子孟冬某日之夜夢人署余考曰小醇大疵夢中惕曰余不及荀揚尚何言哉既覺憶余少駘宕壯雖學常興仆不一每自考曰難乎有恆既強頗自飭然未可以言仁復自考曰色取行違今稍知所求而習心未瘳諒哉所謂小醇而大疵也即使余醒而自驗亦何以易此以是益自惕己而至今年孟夏之望日方就假寐夢腰繫三帶其一小者或指曰此出揚子雲也其差大者曰此出董仲舒也又最大者忘其名既覺又自惕豫其為子雲仲舒所繫乎然又有繫之大者其可不察此豫之神智所為自啓發者也蓋學不出於自性即古聖與稽皆為繫耳夢之警豫深矣嗟乎是果夢耶抑非夢耶若本無繫而自繫也夢乎何醒衡廬精舍藏稿卷十一
