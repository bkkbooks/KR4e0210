body:
  text: 衡廬精舍藏稿卷二十七明胡直撰雜著首約贈同年出宰古今之言吏治者多矣然而首亷曰吏亷則民之大命舒而國之元氣植矣故亷吏者下為民母而上為國保也是以君子首尚之也胡子曰不然不如首約首約則無不亷矣何以言之昔者紂為象箸而箕子變色非為象箸變也以為象箸寧加於土簋乎必將尊罍而杯玉箸象杯玉寧飯糲而羮藿乎必將熊蹯豹胎椒漿芬芳以為饗熊蹯豹胎寧衣短褐而食於蔀屋之下乎必錦衣九重以御之已而果為瑶臺瓊榭酒池糟邱則玉府不能供而四海殫矣是不約之為過也夫天子不約則不能以亷而况其下者乎今夫越人辮髮而居跙跣而行雖進之玄冕赤舄將委而弗顧而况屨與縞乎粵人非能為亷彼其所以奉首足者約也夫鳥見樹而翔魚覩水而恱者性也然栖無羡於鄧林而泳無覬於彭蠡者豈魚鳥有擇哉其措身者有餘也是故君子之能約其躬若粵人之奉首足魚鳥之措其身則雖有金嶽彼無所用之矣是故亷者意亷者也止於守官約者不以意亷者也可以守道夫唯守道則亷非為為吏而已夫士方伏草野日啖不能重味歲衣不能十襲居不出甕牖而安寢不越匡床而佚可謂至約矣然而一旦宅民之尊握勢之便則耳必窮乎要眇而聼始馴目必極乎佳冶而視始悅口必殫乎甘脆而叨始厭身必恣乎逸豫而體始樂若此則孰取而供之乎是故吳歈越吟連歌於堂非不靡也而民必有愀嘆憂號含聲以詈者矣峨眉皓腕結袂於閫非不都也而民必有牽妻揭子狼棄以鬻者矣飛閣層榭醇醲精饌連甍充筵非不奧且芬也而民必有竄伏以給糟粳不救者矣彼士者一人之身而前後情勢若此懸者何也則以侈心之為患而末習有以煽之也今夫人之侈心其炎猶火煽之而熖則至於焦都邑燎原野不可得而鄉邇也而况可撲滅乎何以言之彼通都之廣巨室之衆俾人人文繡纂組而衣乃令一人御鶉裳以班之則不誘而效矣俾人人復道井幹而居乃令一人擁蓽户而鄰之則不約而甚矣何則彼其焦都邑燎原野之勢有不意其為而已為之者也然則君子立於群煽之中而欲以免灼躬之毒則何道以勝之也曰君子約其身非難而約其心為難約其心非難而能有徑特不回之志難是故必有徑特不回之志以約其心者庸焉然後懸揭伯夷之風以招之明厲臯陶之法以繩之而天下始更化矣夫君子之約其心者誠知其夲也非必窘形抑性矯而為之者也然溺者之於食色若緘縢然不能以脫於其心則曰是人性不可絶是説也則又愈於燎原之熖者也余復有以解之何以言之夫南威白台古今之所麗也嘗試使之蒙糞穢而衣解札則鰥夫為之却足而擁鼻焉此猶以為糞穢之不可近也假令骨肉之間有姝絶姣則雖狂男子莫有萌不肖之心矣是色卒不可使不説乎炎珠之肉濩鯀之膾天下之至味也然必越山海而後至則叨者未嘗一垂涎焉此猶以為道逺之莫致也彼大江之涘莫甘於河豚雖有過者必不以不嘗為弗嗛也是食終不可使不甘乎非獨食色左手據圖而斷其右手雖騃者弗欲諾之荆璞而寄懸於羿矣雖悍者弗取此又古今之所共明者也此猶以為有斷手之災射矢之危也乃若王侯之尊童子知其貴也然而懷王侯之願者則千無一焉千金之富駔儈之所貪也然貸之千金而不償者則千無十焉是貴富終不可使不欲乎若此者彼非有慕於伯夷而有嚴於臯陶人心固有所不欲也是故君子之約其心者視色之凡皆為家姝則色不為蠱矣視味之凡皆若河豚則味不為叨矣視貴富之凡莫不如王侯之尊千金之貸而不欲焉則貴富之不足以滑其中矣夫使食色貴富皆不以槩於心則非獨其神德王而區理彰也其服御省而供饋寡民力舒矣民力既舒雖由此以清內寢外可也而况於吏治乎然則君子之約其心者誠有其夲矣養徴有序錢塘與鹿周子以瓌文首兩浙士有年今歲春始得與豫同第補令寧國之南陵識者謂與鹿子名材頗惜其去豫於是作養徴一篇解之并以别與鹿子人之言曰君子之屈信小大猶日月之虛盈其循環之理不營而固然是故君子之不戚於屈小也以斯胡子曰非也夫屈非能伸也誠善為屈則伸也忽焉小非能大也誠善為小則大者勃焉今夫神龍之隱於沮澤也當其朋鰍鱔肖蜥蜴族之武者狎之而不與較神龍初不自計其能變化也故能以一日輿風雲握雷電矯厲太清而霖雨乎天下繇善其為屈之道也河之發也微於星宿海蜿蜒於崑崙之足千萬折而不肯回河亦不自見其㣣小也故能以一日經積石貫龍門鞶帶晉梁而東滙溟渤者繇善其為小之道也假令神龍先自計異日之變化則必與衆族較短長其德亦淺矣其曷能終霖雨乎天下哉河之行先自意其狹小不能不回阻則河之力薄矣其曷能終滙於溟渤哉故天下頌神龍為博德而贊河為完力誠其所蓄者厚也豈苟能而已乎是故君子未嘗無屈屈而為龍之博德則善為屈矣何虞其不竟伸乎未嘗不小小能為河之完力斯善為小矣何虞其不竟大乎然則君子之屈且小也豫將覩其霖雨天下而滙放乎溟渤者必不違矣夫是之曰養徴醫喻八首楚王有瞀瘈之疾三年神室圯泐言蹈喪宰娗娗諈諈妹妹嬡嬡大夫國人謁巫祠鬼朝衰暮祡歲無休改玉帛殫藏帑而牲牢嵬陵壘病弗祓將謀人禱北郭耆生戚之踵王國門叩中庶子告曰王疾與禱不相為也禱何能誅疾臣聞炎帝辨百草軒皇明九候伊姬述之遂樹醫政泰始俞祔容成岐伯之徒肄其術遂能經緯隂陽操握元化血肉尻骼噓吸髑髏制人生死坐運掌股雖有司命莫之敢取蓋醫之為功昄昄乎矣今王病有年不肯購醫乃猥從巫竊為國不取也中庶子以北郭生言進王召問曰醫果濟乎請言其證北郭生曰夫醫雖天地弗違而况人乎昔者成湯之時雨澤亢施蜚廉火噴星辰燀灼金石銷熇河漢起塺山嶽為童五穀百卉之物為之滅灺如是者七年人曰此天瘧也湯得伊尹醫而調之于是月往從畢電乃鞭雲隂陽欣合靈雨既零而天之病始瘳書曰格于皇天此之謂也唐堯之時巨浸渺彌蕩日浮乾濛汜瀇潒崑閬幾騫人巢樹杪蛟蜧蚳而食之如是九年人曰此地泄也堯得禹稷醫而治之于是九川滌源九澤既陂四隩咸宅六府孔修而地之病始瘳書曰地平天成此之謂也周官有言兹惟三公論道經邦燮理隂陽二公𢎞化寅亮天地醫證多矣臣未皇悉惟大王財擇王曰生言皆古人骨塵久矣今曷從購醫北郭生曰有屬者渤海秦氏越人遇長桑君飲上池水三十日洞矚垣表數人五臟三膜虛實畢知以是能生死人名震諸侯今雖亡去有弟子子陽傳其祕業齊名越人大王亶能謝巫而尊醫也臣請以王命敦致之來則王疾瘳矣王乃賜生赤水之騎風胡之劔介白璧一雙黃金百鎰錦綺一純遵海陽迹子陽之庭扣焉子陽問故畜然念曰生不逺數千里過臨鄙人鄙人敢以身從乃偕至楚郢謁王王曰先生固傳越人之業與子陽逡巡避席對曰然昔者臣師越人昆弟三人越人長兄於病視神未有朕而除之故名不出於家中兄視病治氣已有朕矣因而調之不一二七故名不出于閭臣師越人視形形雖斃治無不左驗故名聞於諸侯夫長兄視神則堯舜之治是已禹稷可得與也仲兄視氣夏政是已益契可得與也越人視形湯武之治是已伊尹周公旦可得與也臣習於三師之門匪一寒燠矣亦嘗總統其大都用則隨所適王曰嘻噫先生言唐哉皇哉汗渺如溟海寥逖如秋旻寡人冥頑罔明所從北郭生晉曰古語有之上醫醫國其次醫人則先生詔之矣王曰唯唯否否王曰敝邑固陋罔知道術上古之事竊有譺焉且夫藥應周天毒居其半炎農氏曷繇嘗而知之子陽對曰彼炎農氏豈誠嘗哉臣聞學醫辨藥猶治國之辨材非一手口一耳目之力也臣請言辨藥今夫翠羽屑金雉穢枯銀蟹漿水漆神砂泥鐡此皆銷物也而以之相為則左蟾肪合玉犬膽榮樹鸞血續劔虎白拾芥此皆聫物也而以之互易則膠方諸取潤不若遊波之漲涸江陽燧取炎不若猾髓之燎洪河何則彼性于天者殊也巨貘食鐡則其糞可以切玉香獐嗜柏則其臍可以辟鬼蜃脂爇蠟則樓閣為之湧出而非蠟不得龍肉濯酒則五色為之縈旋而非酒弗能何則彼制於物者異也夫血畏則紅藍之花丹紫之參氣達則蘇芥之子沉腦之香神欣則千歲之苓九節之蒲雖下工習之矣然而用違其性顛所繇制則君臣易位主使愆宜雖有聖神而莫之撰功是故或比而戕或忌而使或首尾而相反或熟生而相攻或左燥燥應或左寒寒應國老艱獨任將軍虞徑行𬋩領戒力分卒伍尚得引故曰時為帝者也不可無辨也故善用之則伏翼之糞貴玉屑不善用則太陽之草等鈎吻若乃索狼毒羊蹄于獸族求鶴虱􅀈腸于蟲譜矇益厚矣殱人焉用戟雖然彼炎農氏豈誠嘗哉維聖維靈抱虛以仁抑已下詢重譯來陳山澤之癯土著之萌莫不貢聞假令炎農運一耳目憑一手口欲以辨物則斃毒久矣惡能遍嘗北郭生喜曰知材善任虛躬廣益則先生詔之矣王曰唯唯否否王曰先生語藥既聞命矣倘亦有定方乎子陽對曰方胡可定也臣聞天有四時地有八方人有五藏五乘四八多寡爽衡疾乃蜂生方其倪也緼緼􅀈􅀈兀兀蓬蓬沈若墜囦浮若驤空既進則塌兮痟兮勃兮㣿兮􅀈兮嶽崩兮潮涌蒸蒸兮旱日之爍炙爐凌凌兮玄氷之閟隂洞醮兮若刨兮若蟄癵兮若鋜瘌兮若攧若謈若㿧若嘬若蝕鼓兮雷砰掣兮雷􅠎迅兮風翲密兮霧鬱肌骨之隟腎腸之府有物宅之吾不自主􅐓洞萬幻轇轕千齬雖有良工拱手睥睨譬若觀兩軍之鬭頃刻機決不敢妄投其一劑也方胡可定何以明之今夫勾芒行而雷雨作祝融鼓而金石流霜露降于蓐收氷雪徑于玄冥此四時之異也物生應之則蟪蛄夏死蟋蟀秋鳴鷹化為鳩雉變成蜃彼非擇之也誠篤於時也嚴道之徼鮮日番禺之區斷雪幽薊彌望而􅒾吳越彌望而波此八方之異也物生應之則貉不踰汶鸜不踰嶺榴鬱東移橘凋北徙彼亦非擇也誠局於方也惟人亦然舟車殊御毳葛殊服稻麥羜魚酒酪殊用強弱殊幹疏密殊理勞逸甘苦殊情盛衰貴賤殊勢春冬不以互治南北不以交攻爰收爰宣爰㵼爰補爰潤爰燥爰茹爰吐爰緩若文爰急若武爰升寥天爰降下土爰逆若攻爰從若撫表裏相半輕重相取及其殺大毒戡竒癖則將膏肉乎砒石珍羞乎溲溺神針刀而聖燔尉矣方胡可定是故為可為於其時則祥用可用於其地則昌否則曷殊食燕薊人以蝸醢危蜂而啖越姬以毳羶𤸈臊也鮮不至坐殺矣北郭生曰百里殊風千里殊俗因地任人則先生詔之矣王曰唯唯否否王曰先生綽乎無成方也治則奚先子陽對曰先主氣夫日月有朓朒星辰有流隕土石有窣崩木果有蠧潰匪一朝夕之害主氣盩也夫主氣未盩則雖竒疸若瘟癀痢瘧賁豚癥瘕癲癎疰痺痿􅂒蠱魅癰疹瘻􅉶可以一再劑祛主氣既盩則雖無事而都好悅澤魁磊頎修伉健雄武燕頷彪身虎闞鷙悍不可以石劑活臣聞大王之國南威白台曾不稱嫵麗浸淫逮乎巫峽之神媛也白雪陽春曾不為絶音連綿乎陽河之哀響也雲夢之野具蓲之浸剒貙剸猊伐蛟斷鯨曾不曰小啖猶欲東釣彭蠡西狩夀春未見有窮日也則主氣盩久矣臣願大王立卸此臣請進不死之藥三焉臣有藥自徇齊之帝濬哲之王莫不首飫其名曰逺志逺志之師曰益智益智之友曰苦參此三藥者臣師伯仲二兄治神氣之聖劑也非時與方能格也雖然大王誠服此三藥臣請無食鹿胃臣聞鹿嚙九草解散群藥食之則三藥之力懈矣雖然寧食鹿胃無寧餐黃耆大王獨不覘耆之毒乎填心𡋯膈雖沆瀣甘露不能入也耆而罔功祗益鬼巫北郭生曰臣聞詩曰訏謨定命逺猷辰告此古之善用逺志者也曰其德克明克明克類此古之善用益智者也書曰若藥不瞑眩厥疾不瘳此古之善用苦參者也今夫治國亦有主氣主氣盩雖通國竭人禱曷救王曰唯唯否否王曰寡人聞之急則治標今先生顓言主氣遼渺漫逭不可旦夕效也請言其次子陽對曰臣有一藥迎之無首隨之無尾非白非黃非甘非苦草木弗為族金石弗為侣食之則鼓自腎腸震驚萬里百妖逢之腦裂衆魅當之魂斃王欲購之不出五情之內臣愚不敏請名曰怒昔者臣侍師越人視病望見顔色輒曰得怒乃解臣曰怒可已疾乎曰夫怒有二有怒其已怫者是曰食鴆酒也其毒茹茹勿治有怒其已馴者是曰飲火齊也其毒吐吐乃瘳是故人主毒在內大患不怒人主大怒則大治小怒則小治昔者舜有幽憂之病流共工放歡兜而四方風動此大怒大治也齊威王有幽憂之病煮阿大夫并其左右羔之而一國懼服此小怒小治也王誠赫然奮洪響之霹靂猋霆發乎紫宮起蟄沉囦斸蔀十重大則為舜小乃威王則王之六竅闢三部通六節可調八正可順十二官可理王之去沉痾就祺吉捐悶憤登康豫辟若爬垢振飛埃爾臣所陳不死三藥王可一試效矣臣聞古語欲忘人之憂者則贈丹棘欲蠲人之忿者則贈青堂臣乃所謂贈王丹棘青堂者也願無讓北郭生曰樹德務滋除惡務夲則先生詔之矣王于是瞪乎其聽䁭乎其視頃曰此非寡人所能逮也王曰寡人聞酒之於人一也有濡吻而醺者有勺合不勝者有數石不醉者今寡人勺合器也聆先生言閎恢逴踔中心益忞忞怦怦黯黯􅂒􅂒莫識端委意者先生有它妙巧能易短令長拓隘就𢎞冥旋神斡獲從所陳子陽對曰有昔者臣師越人望見桓侯告曰君疾在腠理不治將深侯曰寡人無疾不聽後五日越人復見曰君疾在血脈不治將深侯曰寡人無疾不聽又五日曰君疾在胃腸不治恐深桓侯不恱又五日越人望見桓侯反走使人問曰疾在腠理湯尉追之可及在血脈針石追之可及在胃腸酒醴追之可及今在骨髓雖司命莫之追臣故走也又五日桓侯病果不起夫臣師猶望見桓侯而知也曩臣未至王之國臣已知王之病不在腠理血脈亦不至骨髓王病在心腑治萬倍艱王賴遇臣聼臣臣請運赤玉之斧揮九華之劒剖割王腦挈心腑就清冷淵而湔滌之淘頮其膜絡涓潔其九竅澡雪其滯霪發皇其疑慮禽其蝕王心者聲罪戮之五逹之市然後令天孫􅒆素霓為絲而縫合之王則恬焉莫焉嬉焉融焉若蹶而興若酲而醒若跂永夜而覩晞陽若伏奧穴而升層臺當斯時王必能維臣所欲為王且不知其短之猋長隘之猝𢎞將昔病之何隅追之已風化矣自王四體至四境八埏靡不滿志此天下聖神明王之所騖而馳也王豈不願之乎王乃仰天而盱摽心而答曰寡人肌肋不足當君斧鉞請終從巫顧謂子陽曰先生有疾當食何劑子陽曰臣所食藥曰蚤休北郭生聞之曰王啖董矣恤恤然眉尊哇哇然舌橋氣結面黧不復出聲於是子陽去王不留行巫之家歡聲若䨨訌於朝野病罔知底麗詩誡豫童喜詠賦然非所長又夙遭凶憫浸淫抱疴年十九而有咯血之疾夜寢恆不交睫血耗而火炎故也至年念六雖聞學罔有獲三十二得廣南鄧先生指示靜坐始稍祛宿􅂒今年四九矣屢苦未得去且承命督蜀學相知孫山甫之儔以校文勞瘁為豫憂豫因自念多岐不能入道奚啻以病骨而勝勞役之艱也因絶意作詩省思慮遂書為誡誓師惟我聖皇仁㴠義激天幬地載風自闤闥旁鬯乎函夏之外乃茲西蜀比鄰吐蕃綰轂勞寢恬諡交欣孰敢不庭西域雖遼重譯納琛慕義嚮風爭為妾臣矧惟逆賊黃中父子曩屬編民竄居獨東在楚之鄰一朝逃賊化為頑冥自以虻蚊之微不挂雷霆之誅奮臂谽谺之谷鼓翼箐薄之區剚我民腹蹂我民稼虜掠其畜産焚蕩其室廬侵疆略地嘯侣植交豪吞怒戮何啻千百負固逆命凡兹幾年勢若孟獲罪浮玉珍窮極凶虐激怒神人可謂一方之􅚣蜮當庭之􅀈獍肆我聖皇赫怒特命必征於是遴委將佐之良集調漢土之兵強弓徑弩之如羽長鋋短戈之若林叱吒而風雲起指揮而山嶽騰戮兹小醜取彼凶殘何異振炎熖以燎稿葉挾泰山以壓危卵蔑有不逞者矣夫兵者不得已而用之將以安民匪以耀衆將以止殺非以逞暴是故殱取渠魁脅從罔治此今日命師之大旨聖皇之西顧而厪厪也乃用率爾將卒共告于皇天后土以昭兹不得已之忱凡爾番番之將振振之旅或携其黨或伐其交或以計禽或用謀攻或先登陷陳或擁衆攻寨或哨探得真或用間有方或斬逆賊之首或獲群醜之級賞格已布決不食言或劫奪民財或泄漏軍情或妖言惑衆或逗留不進或爭奪功次或賣放惡黨或濫殺良民或擅離信守或違節制或亂紀律各有常刑其無少貸爾諸將其悉以此意布告多士克廣德心早集厥勳以無貸師老財靡此昔之名將所為先發而致人也上帝臨汝母二爾心其各如律令果州鴉豫校士果州行臺後圃高樹雙鴉巢焉一日鴉出鷂來奪居鴉爭不競已乃聚族數百翔鳴蔽樹欲爭復去覘者曰是咸畏耳踰再月鷂産子習飛方出巢群鴉數百􅊳來與鷂閧鷂不勝移去鴉雄雌復居焉衆始知群鴉先非畏鷂以鷂方伏卵不欲令毁棄蓋有俟也噫鴉誠慈矣哉而世薦紳道詩書或至乘危擠奪覆人巢卵視兹鴉逺矣雖然鴉巢特枯株腐草不能占樹隅方尺奚往不可然鳩族必爭者彼其智視枯株腐草不鮮也人固知笑之以宇宙之大觀人一丘一室一官一爵其於枯株腐草何如也然人亦必爭不可已不亦足笑乎於乎等而上之七國之戰爭劉項孫曹之相傾相奪也亦何以逺歟别諸生豫嘗著為功令訓諸生以學聖其言曰非耻弗聖耻弗人也諸生興者咸云有感于斯語嗟乎是諸生真感也有真感故有真耻有真耻故能有此興發之意不榖良慰良慰然觀孔子曰人之生也直罔之生也幸而免則知一念之罔即為幸免幸免者以其形體人也生也而人之實生之理已亡矣雖有爵位文章奚為孔子所謂直非曰直陳人之是非事之得失之謂也人心生理夲虛而明不作于意無索無狃無閃無待無將迎茹吐之念始可言直故無是非得失惟作于意而思作于意而言作于意而動均謂之罔罔則弗生弗生則弗人而幸免耳若如見人克伐怨欲至于機械變詐者又益逺矣於此不耻烏乎耻嗚呼豈惟可耻而已諸生誠由不罔進之有自得焉則人道近即聖道邇詩稱文王無畔援歆羡誕先登于岸易坤言敬以直內孟子直養無害皆是功也諸生勉之二國家所以育成人材欲其共生斯民而已共生斯民者仁道也天道也帝道也王道也故能成一人材則能生千萬人以一人材又成衆人材其所生豈可勝道哉此所謂體仁事天而學帝王之道之實事也不榖濫荷簡書以成人材重望之今棄而去豈得已哉反辱諸生百方勉留言之惶汗不榖寢食不寧反覆思惟坐此痼病良繇素養弗充元氣內剝故也是不能仁身焉能成人材又家有老母雖叨祿仕素未盡歡是未能仁親焉能成人材雅對諸生不任內愧此不榖所以不得不求去也不榖重負朝廷重負臺司鄉大夫與諸生罪戾何可言第此生理諸生莫不昭著但不罔生即無弗得所謂體仁事天學帝王之道之實事則亦望之諸生而已矣諸生非獨自盡其為不榖盡所未盡補愧而贖罪則所以厚不榖者亦無盡矣龍談龍之能大小剛柔修短幽顯下上逺邇能為蛇為蜴為蠶為蝎為犬豕為人神能負神禹之舟能變陶氏之梭能解角而示瑞曵尾而告凶能簸撼昆侖掩蔽三光此雖其變化叵測特賢於董父所豢與劉纍所擾者而已而未可語龍之至也客有談海畔龍起夜半風吼濤湧轟若萬雷舳艫跳躍甕盎悲鳴廬舍漂沒合抱木拔水族皆從空墮死世以為神龍變化宜然不知此亦非其至者豫昔寓蜀遊四目仙人廟覩井間龍升遺迹廟門壁及兩荔支樹相去盈丈皆無恙僧徒晏如又都司周宗者自敘守松州時親覩龍升前有物若拳舞意假氏所謂木尺是也渠時率將佐拜禱城巔城搖蕩若舟顛衆為悸廢然卒無恙天明既定視龍行處有新置坯土依然級立秋毫無損豫又遊霧中山老僧指龍升處僧舍一無犯且曰是有道之龍然也若道力未純鮮有不憑氣而傷物者豫乃知龍之有道以仁為至而變化次之如以變化而已則蛟蟒乘風雨化人物妖狐怪幻捷出豈亦稱神物乎哉是故君子之學為龍也學仁為先變化特餘事耳不然而舍仁先變化至妨人病物則與堯舜孔子之龍德殊矣曷取龍為翠峰語别吉水曾見臺子始釋服未移季而勳部命下見臺子方縻於邱園未皇遄發則期衡廬胡子蒙山陳子塘南王子合襟翠峰之剎相與語學為别居翌日二三子與見臺子語所致力既約而深矣乃以逮衡廬子衡廬子曰豫復庸言哉雖然豫不可不為見臺子别也夫學有正脈自天命之自堯舜孔孟傳之宋之諸君子明之而莫著於程伯子之言程伯子曰仁者以天地萬物為一體莫非已也故知天地萬物之為已知己之即天地萬物始可語學之從來矣雖然非有真志吾未覩其入且成也已而見臺子行則又屬衡廬子申之衡廬子曰今良知之學之行於天下幾何年矣然學者談先飛龍而行後跛鱉語析毫芒而事違邱山壯為天下師而皓無真得此豈良知之罪哉其志病也昔者念菴先生嘗憂之矣救之曰歸寂然後知良嗟乎使斯人而果有斯志則良知足矣使果無斯志也又安知不以歸寂為贅疣乎非亶贅疣又毒藥也故志非始學事也雖皓由之也孔子自十五志學至七十從心不踰而後志始成今學者語志則曰此始學事不足言嗟夫吾未見其入且成也子不見吾儒之趨二氏不有載其家珍而覆沉湘水者乎不有觸碎寶器而棄官西遊者乎已而二子皆有成若今之以儒趨儒者果有斯志乎儒者之道不捨所事而捨所慕舜禹有天下不與是也今學者其能以天下不與乎自豫嘗較之天下之最溺人者聲色而剛者不與也其次官爵而勇者不與也至於聲譽之所寄雖剛且勇者未嘗不介介於懷也已而思之吾與天地萬物一體使人吾譽是猶以左體譽右體吾何增人吾毁是猶以右體毁左體吾何損已而未瘳也則又思曰吾始生無姓名已而姓名之則孩未知也方其未知雖堯舜我無喜也雖桀跖我無慍也此吾之夲然也故惟不失夫孩之心者然後可與語一體之學故曰大人不失赤子之心雖然非有真志吾未見其入且成也程伯子不又曰志立而學半吾愧此久矣非見臺子無望也見臺子憮然作曰嗟夫志誠非始學事也於是復訂於二三子乃敘諸卷首再拜而别答客難上座客許將軍言貴縣深山有人一種土人呼山子性顓愚不為劫殺地無布縷粟谷蔽體用蓽麻芭蕉葉以藤索綴之食草木鳥獸肉自活其取獸雖虎兕熊貙踵其迹畫圈圈之口默誦呪獸伏不敢動即用藤索以一夫牽挽歸衆共剝燔分食乃不知其何所傳呪而能然也飛禽輒用毒弩射取之尋常持麂鹿等物赴猺獞易谷粟獞之徒以其素愞善亦樂與互易不相賊害又言兔無牡猿無牝猿始生玄色既老間有變金絲色者即為牝輒尾短群猿比焉始又生猿蚺蛇出左右江巨者圍二三尺能吞鹿鹿角嵯岈齟其腹未速化輒自纒巨樹絞化之然取者用葛麻藤置其身輒亦不動遂結而縳之雖童稚可引而行也其膽有二一在身一附肝者良同座因難豫曰夫虎兕至猛暴能畫圈取之猿變金絲化為牝蚺則制于葛麻此三者則何理可窮也豫答曰是何理可窮也客又曰若武夷鐵船仙巖木匱西川火井東夷鹽樹可謂異哉又若先朝嘉靖間報潼關山飛五里雖居人及鄰家麥田咸共徙一處鄰人猶訟取其麥秦普地裂出黑水成澗􅊤水中草木不一或有魚已而水涸仍為地此皆不可理曉子其謂何豫曰嘻此非獨豫雖聖人不知也曰然則將何如豫答曰其變足警其所以然不必知答客難下客告豫曰顆矣夫世之毁譽之難定也今天下冠緌三年一外察六年一內察遘變有不時之察其間以愛憎毁譽砆玉並燔善類蒙詬者歲不下二三人謂有之乎豫答曰有之同座客曰是不必逺引近時如萬安周方伯賢宣南昌魏給事時亮則衆所稱學道篤志士非獨衆人豫稔之舊也又如勾章顔副憲鯨閏州薑祭酒寶則衆所稱抱珍濟時器也非獨衆人豫稔之舊也此三四子者或因計察或用勘覆咸被之空言而不得辭此豫與子所目擊詎謂無也昔者伊尹孔子尚有割烹癰疽之誣近代有道如周茂叔而先疑于閲道篤行如程正叔而卒訾于子瞻郭元振之輕財古今罕矣而蒙掠賣之謗歐陽永叔之立節亦云徑矣而罹中冓之汚孟子曰士憎兹多口此自古到今雖聖賢弗之違矣而又何疑客因難豫曰設子遘之當何若豫曰無何可為也曰古云止謗莫如自修可乎曰未可也夫修非為謗也世固有修而謗者則伊孔是也焉用止曰使伊孔親履之當何若豫曰亦無何可為也曰古云發憤著書以自表見可乎曰未可也夫書非為憤也世固有著書而滋後世之詬者司馬相如楊子雲之徒是也焉用表見曰若是則將黯墨䀛忽終焉而已曰然曰然則子之言如躡層崖未易行曰人之生夲無名又焉有層崖平地之殊同座客曰子之言果未易行也吾黨今日惟知幾焉可也豫曰可也滄洲别語三首贈蕭崑陽子之將樂崑陽子得教將樂欲之官走别衡廬山人於滄洲之館請問教曷先山人曰而無後舉業可也崑陽子曰某也習聞先生之教先夲而後末上德而下藝今兹兹以無後舉業何也山人曰然辟之種樹談者必欲其枝幹之茂花實之繁然求其茂且繁未有不先根核者也何則根核與枝幹花實無二貫也今夫人未嘗一日不事親敬長未嘗一日不饔飱裳衣豈復能輟而曰需吾先從事於其本而後能事親敬長與饔飱裳衣乎此必不能也今國制以舉業教士士從事猶人之事親敬長饔飱裳衣豈能一日輟乎故古之學者當其事親敬長饔飱裳衣之時莫不反求其心曰吾事親誠乎敬長誠乎有他腸乎吾饔飱裳衣有貪求乎無貪求乎是即末而先本非絶末求本也然則今之學者當其業舉之時將亦曰吾業舉果能存諸心而得聖賢之旨於道有明乎抑亦有他腸乎如此則亦即末而先本即藝而立德豈必輟舉業哉夫子曰忠信所以進德修辭立其誠所以居業愚嘗以為忠信非空德也必於修辭不失忠信斯為立誠斯為居德之業若舉業則又修辭中之一業故舉業不可與德業抗言之豫嘗見湛司成有二業合一之訓豫曰是未見德業之大也故以舉業抗言且舉業既居業中一業又奚必言合哉故知舉業在德業中不合而自一則凡吾身所不可少若舉業者皆君子所為先夲而立德之地也詎可以其末而後之哉豫故曰根核與枝幹花實無二貫也雖然豫之言又非為玩物喪志者立赤幟也崑陽子其辨之今學者好為人師者咸曰已人一也誨人不倦即學而不厭豫師羅文恭公曰學不厭然後能誨不倦公之意豈不曰學者未能實有諸已即嘵嘵以學語人是雖語人者或是而其所自為者則非也是之謂以偽導偽不誣也愚又嘗求之若今之士親老而求祿仕舍教職無途矣既職其事又退却曰吾學未至不敢嘵嘵語人以免涉於偽其可通乎雖然古人有言惟斆學半然則古之人即學之時而未嘗不教即教之時而未嘗不學吾未有是與人共學其有是可也吾未能是與人共學其能是可也然則學固學也而教人亦學也故曰惟斆學半今夫人莫不有弟與子當其有弟與子之時則舍而置之曰吾學未至姑亦舍弟與子俾不學是必不能今之為教者視其門弟子即弟與子也能不教乎將謂之曰誨不倦即學不厭亦無不可雖然君子曷不反曰吾曷為學不至也而不足以教其子弟故曰所求乎子以事父未能也所求乎弟以事兄未能也又曰行有不得者皆反求諸已其身正而天下歸之若此夫然後可謂之人已一體教學一致不然雖謂之以偽導偽果不誣矣哉古之聖人以道通乎天下非他道也仁是也夫濟天下莫病乎無才尤莫病乎有才而不出於仁嘗試以人臣論人臣有才而不出於仁則不得不趨而為術張子房始終為韓非不忠也而止以術勝其次則以氣彼非好氣勝道不勝氣也賈生之䇿度越漢庭非不達也而卒以氣終其下以詐至於詐則小為𢎞湯大為莽操禍至不可言乃若儒家者流竊古帝王之遺依倣其近似以就事功又多以意行則子産叔向諸葛孔明之流是也今夫術可以應變而不可以致理氣可以發謀而不可以成務若可以致理成務而善能持世者則莫如意然所謂共成其大以臻唐虞之盛彼又未能也何則彼固未出於仁焉故也夫仁何以見哉禹稷氏以天下飢溺由已伊尹氏以一夫不獲引為已辜此仁之量也世之拘溺形骸者肝膽楚越烏能使其以天下飢溺為已飢與溺哉又烏能使一夫不獲即引為已辜哉曰彼固未嘗反觀其惻隱生生之心且與物通又曷難於與天下為飢溺而引之已辜哉嗟乎惻隱生生之心孰無之哉崑陽子試反觀得於此則向所謂存心以成德業與所謂反已以教人者其本益明矣孔子曰仁者人也仁固不易言而人其可以一日不圖哉此豫平日所肆力者未嘗時為崑陽子言今崑陽子行矣豫奚忍不為盡之崑陽子總之不外反身即得之豫復何嚽衡廬精舍藏稿卷二十七
