body:
  text: 衡廬續稿卷一明胡直撰賦悼才賦少作少華曾子侍御華山公冢子也良其鳳林育羽文毛絢五色之竒龍穴胎姿駿骨呈三花之迥少綜鉛槧遂軒藻園騁河漢之雄才峻崑丘之逸氣人固擬其東沂之詠可以攀轅南豐之撰可以方駕且將登漢苑而調治安入虞宫而覽皇鳳篤彼忠藎奕其世武者矣然而羽儀未騫黯焉先折斯可謂凋彼神樹毁厥懿璞者也悲哉侍御公哭之痛曰天毒吾多才子也僕欽挹修能遐結幽憤因抽弱素愛造斯賦題曰悼才非欲以流布遐來聊用以廣公哀膈云爾槩夫陶化之罔兩兮心耄疑而曷測將衆物之振蕩亦何殱夫魁哲彌憤悁以鞿絓綿思子之閎則昉少康之瑤葉蔭伯巫之瓊英衍沂國之神緒遂嬋連於忠貞曰維子之嚴君冠飛豸而揚鷹奮皇斧以擊姦翊絳虬而上征誕作配於良胤鴻永路有嘉聲益山抵之搆采滋江妃之孕爧分精爽於日月授文章於列星谹八殥以為胸柱四極以為肩雕琬琰而為腸厭瓊華為之面聳孤韻於秋颷騰逸氣於霄煙鑽老易於三昧鏡丘索於九淵瑋抽葉於六家邃析義於百氏旁搜厯而照璣餘檢圖而辨緯浩宇宙之竒詭固一臆之所麗譬縣圃之積琛棼沙棠與璇樹有九日之飛花爛光采於十墜肆搖翰而飛藻絢凝璧而浮綺朝百賦而鬱伊暮千詩其猶噎彼談天與炙轂將馳騁而伉儷覽當時之碌碌曾不足以睥睨衆綰纓之夙髦孰不斂衽乎雄名諒發軫於澤國邅息轡於上京紫貝闕而玉堂佇矯翼以飛騰嗟逺期之未從猋戢景其何輕包造化之一軀遂璅絶于尺墳曩吐舌而談九州倏荒䀛而無聞羅古今之竒珍誰適為發其真精豈少薇之墮采倘招搖之隕明駭增城之絳樹豈隨霜而謝榮彼夜光而明月亦孰允其無瑩洵造物之懵懵妬鸚鵡之逸鳴斯文章之胎孽反酷以殘其身醜怊悵以侘傺矧惟子之嚴君痛呼天而繚結氣萎絶而中焚曰皇毒儂之多才兮剽吾庭之蘭茝彼童烏與蒼舒雖幼眇而惻哀矧佳賓之俶儻遭圜穹之惛昧精一朝而越裂顔黴黧而耄敗豫與子之未遘獲瑤葩于羣瓌擬並駕於赤鵠胡委翮而先摧豈憤世之溷穢驂白螭于神丘將桀跖為羡門必回誼之不修斥巫咸以罪穹斯坱北其誰由覩三合之芒芒洵糾錯其曷尤於惟子之鴻烈揚芳暉于來胄雖蕙若之委化終岱霍之伉夀登高岡以長嘯曷袪吾之殷憂詩賦得三顧山贈賀郭封君兩峯翁即相奎父三顧之山乃在雲亭天柱間崴嵬直與斗牛參削出三峯成卓筆倒畫青霄河漢濕峯頭遙瞰章水江應似莊生堂坳溢蒼漭西連嫵姥雲谽谺東吞紫瑤石中有仙翁芳玉容坐窺鴻寶巢雲松鹿裘何謝晉文舉角巾嘗墊漢林宗盧生壇古去不返獨有若翁駕白龍若翁玩世成芻狗富貴何如一杯酒掉頭不肯挂金章天語還令回白首自昔大山長名材更聞崑丘生瓊玖竒峰孕賢世莫京詞賦寧為中興傾世業汾陽詎足詫許身直擬三代英我當與翁結鄰好紫芝曄曄斸雲耕儲皇是非付國手商山雲物不世情龍澄原君自黃遷辰沅兵憲兼督學政書至寄賀名才超拜著神羊節鎮新開近夜郎已有雄文程楚士還多廟略靜蠻疆沅芷澧蘭清棨戟酉山辰水濟舟航兼資督府他年事先借前籌萬里揚乞橘春回乞橘才題簡老去新栽欲待誰浸擬炎天花馥郁佇看氷雪葉葳蕤松筠成列堪為侶禽鳥深藏迥不知剖實他年逢二老彈碁應許笑相隨書社秋興八首青社虛堂暑漸輕高秋事事愜幽情覺山爽氣通匡嶽槎水滄波混太清卷幔忽然聞桂馥罷琴且復啜􅐜羮久知世味成飱蠟損益何須問向平二明時豈是棄君平身病原非濟世英僻逺曽無來節使衰殘早已謝經生晝眠靜抱松風韻晨起常占野鳥聲莫道幽人無一事秋山還自斸雲耕三有時散步自高岡颯颯涼颸灑故裳縱意坐遊天地外忘機身近鷺鷗旁當門魚戲蘆花白繞徑蜂間菊蕊黃一望蒹葭零露濕伊人宛在水中央四堂外高樓影碧灣晴窗莞爾對南山林間日月東西見席上星河次第攀釣艇互看來去好樵歌時聽短長間白雲黃鶴曽攜賞何似飄飄獨往還刑曹有白雲樓五病客終朝不掃門軒前紅葉落猶翻束書且學禽中戲散髮延觀原上村萬頃禾麻圍錦繡千峰華武玉華武姥俱在望列兒孫吾鄉莫用鄭鄉擬正笑康成著作繁六老不悲秋秪自欣一聲遙鴈却懷人四海交親書並斷三江耆舊會難頻衡廬已自違佳約吳楚相看作外臣獨有裘羊長不負濁醪時共道吾真七峩眉髙挈九穹浮曽共皇人汗漫遊别後幾回瞻白水歸來今始得丹丘神超早已齊鵬鷃身隱何辭喚馬牛最是七天橋上月清光應似社中秋八更思岱嶽號天孫長往其如老病繁三觀遙連滄海濶雙門高擁介丘尊南瞻金簡猶非匹西挹雲臺欲並鶱不得一登天下小太虛隨地且槃桓客有言朱鎮翁見訝無詩寄謝二首昔遊曽綰大司空唱和翩翩枉上公既老漸諳文字幻相思猶為道情同赤松應作留侯侶緑野長瞻晉國風肯信雲將遊象外相期還共訪鴻蒙二秋水澄江鴈欲聞秋風巗桂正初芬登高著屐懷安石掃素籠鵝羡右軍疏慵豈合勞青眼持贈那能寄白雲最是沈園饒樂事芭蕉應不費彈文中秋同王未菴周貞夫王執之訪陳蒙山翠峯别業是暮王塘南劉述亭同集玩月山巔和周生韻翠峯一名集仙臺元龍結搆傍仙臺翠滿羣峯挹斗台佳節正同泉石賞高朋還趂鴈鴻來風傳巗桂千林馥月抱江光百里回庾亮登臨何足擬應知人世有蓬萊送羅田周貞夫兼訊黃梅瞿睿夫時睿夫方有詿誤事命駕遙憐千里情才名三楚舊諸生賦成豈肯干揚意書出誰知擬論衡廬嶽去看天際逺鄱湖秋見鏡中行已瞻雙劒連牛斗何慮人間事不平九日登覺山再别貞夫詞客聊停抱膝吟佳晨臨眺且開襟菊邊對酒何辭醉江上狂歌不自禁轉見兩丸催白髮安能五臟化黃金古來離合原無定明月唯期千里心訪潁泉年兄園居以宿有耦耕之約故末聯云然久知物外起田園報客花間鳥並喧小憩亭臺穿竹塢散行山谷出江村隱居亦幸同鄉井宿世應知是弟昆欲向耦耕尋舊約春來還許叩桃源衡廬續稿卷一
