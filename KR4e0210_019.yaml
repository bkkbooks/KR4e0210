body:
  text: 衡廬精舍藏稿卷十九明胡直撰書上陳撫院論倭寇某聞天下之事非必大也誠得人則補天柱地之績可以坐奏而矧其小者焉亦非必小也誠不得人則股疥脛癬之害不可以疾除而矧其大者焉夫得人者非盡以一人之竒智長算駕等常而震當時者為足以定之也以其能收千萬人之拙謀為已之竒智收千萬人之短識為已之長計亦非曰拙可以為竒短可以為長誠以引伸而觸之者大也是故治水一也以鯀之方命圮族則敗以禹之不矜不伐則成由是而天下之善敗可知其故矣今蘇松固東南財賦之首區也比者倭寇屢獗三嵗用兵而未有顯績迄於今日環甲數郡若不敢孰何事不可謂小矣聞兩都薦紳之論天下草茅之議以為非踔絶濶達沉計之夫莫能坐定而非明公誰復其人以某之卑薄雖騃不曉事亦望之久矣某日以地里相比詢諸用事之人臨陳之卒似能得其利害妄意其一二而無所陳説今者伏覩眀公其色戚然以天下為念其氣毅然以賊之必殄為志其度恢乎若有以包納天下之短識拙謀而迄無自德之意斯誠天下踔絶闊達沈計之雄今日補天柱地之所推先者也某故自忘其短拙而妄有所陳其説蓋有十惟眀公採擇一曰審戰地夫倭寇之來發釁於寧波已而蔓於溫台繼而為浙道之兵所挫衄終乃移攻於松之上海而其鋒遂若不可攖夫寇之挫於浙者雖其將卒之良亦地形便也蓋東浙阻海皆崇嶺連亘居髙而臨下彼方仰髙而攻我則髙者勝而下者負其勢然也至在周原曠野兩兵相接其形勢之便否見若觀火是以戰計可預定而勝權在茲矣若蘇松則不然邊海皆曠衍卑下瀰漫水鄉其髙而可由者祗田畛耳方寇之整居內地畛路之利彼皆主之我兵方由畛以往攻彼已據畛待之矣夫待者實而往者虛實者勇而虛者怯以一畛之內兩兵之對而勇怯既判則我之後兵雖有千百賁育無所施矣矧溪澗蘆葦之伏一起則我兵披靡雖欲不遁散不可得也然則不審地勢而妄前進者豈非我兵之自僨耶以我之自僨而不審其由遂謂寇之不敵亦過矣聞之孫子有云凡先處戰地而待敵者佚此則今日禦寇之要計也今郡邑之側豈無曠原我能審得其地謹待而勿戰徐伺其間而擊之則實在我而虛在彼勇在實而怯在虛謂勝權不在茲吾不信也二曰嚴間諜夫敵之來以不陳為陳以不攻為攻故其始至用少見誘我墮而前伏必四起我兵遇伏萬人盡碎彼其所以然者由吾之間諜弗真故也其間諜弗真者以我無死士故也聞賊獲吾土人必質其父母妻子令為間諜人盡死力我莫孰何是賊尚能劫吾之民以間吾之邦今居吾之邦用吾之民反不得其人不亦恧乎古云香餌之下必有死魚重賞之下必有勇夫誠能不愛千金以出死士而又質其父母妻子以責後驗馭以非常之恩驅以莫逃之威則民之用命不獨可以探敵即使陽攜投彼以為內應無弗可矣三曰操刑賞夫賊既善戰又善識陳彼見吾兵必攻其瑕瑕者方壞堅者已遁方其欲遁雖嚴為掠陳兵寧赴淵而死若此者以兵不畏我而畏敵也兵不畏我者以刑賞之不素操故也惟刑賞不能素操則臨陳誅斬屠血成川亦徒自伐而已其於勝敗奚救哉是故元臣巨將操握刑賞信如四時堅如金石陽闢而隂闔海轉而山移夫然後能動於九天之上行於九地之下而無敵於前矣四曰選戰將夫文臣雖有統衆之權而無臨戰之責故臨戰必責之武臣者此國制也今之武臣怯者畏戰弗前則為敵驅而罹於敗勇者求戰甚急則為敵誘而陷於覆故今日之敗覆皆以無戰將之過也方寇之始至匪獨賊勢之叵測抑亦人材之難知故苟可以戰不必皆宿勇也苟可以守不必皆故智也今時日已久歷戰陳已屢經將之勇怯智愚亦灼然可覩矣安知下寮之夫不有名微而勇勝職卑而智巨者非督府元臣為之簡白而顯奏之則戰將奚以賴戰將無賴則三軍之命棄而三吳之生靈從之矣是故博詢逺採搜求戰將此督府寢食晝夜弗皇而先務急也五曰簡土兵蓋古今不患無兵而患無將故將有膽則三軍皆膽客也將有智則三軍皆智士也苟得膽勇戰將則如古人收召市井可以拒敵驅迫囚徒可以底功而況海濵之沙船淮揚之鹽徒孰非兵也側聞今日議者苦於寇勢之張專意狼苖之兵紛紜符檄徵調四出竊為不取夫狼苖之兵雖稱鷙悍然在彼則易於生競易競則撓功而不足以嚮敵在此則難於相制難制則撓法而不可以善內此不待智者而辨也誠令今日既已調集則貴於撫馭者之得其人至於邊海居民自沙船鹽徒之外尤當精簡預練以需後用可也若專恃狼苖而無意募練則如服砒礵者雖決於殺毒而傷人不免夫六曰善戰技今夫倭人之于中國非有弓馬之強火藥之利之難支也彼所恃為長技惟一人兩刃之為利也然彼刃雖利不過三尺餘耳繇吾無以禦之乎百步之外則彼得以相及於其相及而欲以敵之此吾之自捐其勢也今自捐其勢而遂謂賊之不可乘亦左矣不知賊之赴戰裸股而疾鬬橫足而捷奔此正中國長技之所資也今中國長技莫烈於火炮火鎗莫徑于邊箭藥弩誠令三軍之士未戰得裒而練之臨戰則操而縱之則賊之祼股橫足萬未有不斃者也聞之是賊天稟堅悍性耐寒暑一夫挺身目無瞬避若我之矢刃未制死所彼且很然以兩刃之利加我矣終始合戰迄無陳法惟有前突乃其所長而中國能抗之者恃有此火器毒弩耳若狃於尋常之矢刃拘於素講之陳法捨其長技莫知決從則猶之自斷其臂以求搏虎其為虎噬久矣昔魏楊大眼萬人敵也梁韋睿令千人并刃以強弩射之大眼忘魂而走當賊以一夫挺身及數人見誘則惟茲火器毒弩并力殄之如韋睿之法彼其能終恃乎今又聞賊身在陸而賊舟則貯滿以俟行若吾能夜用千人銜枚掩襲亟用火攻順風縱發載蘆葦以益其焰將使彼進不得前退不得後此之謂批亢搗虗之勢賊雖天幸亦萬未有不覆者也此則所謂時也機也時者難得而易失機者難乘而易隳相時度機則惟在操柄元戎立裁而坐決非數百里之外能盡議也七曰築水寨夫邊海雖有禦敵之兵然方敵之既退勢必解兵返于衛邑而沿海數百里竟無與守一旦復遇其來其長驅豪奪劫殺殆半然後倉皇而出兵兵之至日則勝地已為賊有其勝權又復在敵竊為今不取也夫今日之勢不難於攻而難於守不貴於一朝退虜之竒而貴於終身無虜攻之患此何道以致之也昔劉忠宣公平閩海寇則常總諸水寨之兵而身為訓練用之勝敵此前事之良鑒也譬諸人之居室由門而墀由墀而堂而室苟令一夫當門以為守雖數十寇無能詣其堂矣今郡邑城隅直際海畔靡有遮限則吾之堂室與寇鄰矣終安得不為寇􅐦也為今之計莫若沿海要地間築水田以為場地約以五七里從場上設寨置壘俾守禦相望聲援相應虜必不敢瞪然躋岸以相窺縱使其至亦不得越寨以攻城矣或者有力則效東北看家樓或十家為之大者或五家為之小者逺近聨絡列兵陳械時時守之寇來則拒寇去則耕惟在上者嚴其諭約俾得三五年不懈虜必不復萌內寇之心此誠數百年之上計也八曰廣戰艦夫水寨之兵非欲其擁坐而已也欲其以先聲奪虜之心而捍其勢于未至之前者也平居無事各陳艦艘以習水戰使虜知我之備嚴則其入寇之心奪矣虜或有至則負岸列艦以靜待動弓矢火藥之利我得而制之則其進寇之勢捍矣矧虜所負兩刃之利而欲與三吳之士相角於舟楫炮矢之間其長短之技巧拙之機可易而知也是故備敵莫如豫執豫之權以鼓衆士則怯者可勇謀敵莫如制乘制之良以摧孤寇則堅者可瑕孫子有云先為不可勝以待敵之可勝無恃其不來恃吾有以待之豫與制之謂也九曰破資格夫邊寇之守令非得文武才志者必不可也今皆盡用甲科為之不知甲科之能自樹者固多矣然而膽智過人臨敵出竒者豈盡出甲科哉今者邊寇守令似當置于督府而不當制於銓部苟其才瑰而智巨雖出他途亦必聼督府奏而用之可也十曰恤內地竊觀今之海內所以坐匱而不能給者其初非虜寇之為釁也彼古人所云三公之大者已不可勝數其外則士大夫之貪墨而附以虛文之為害也由是民財之費若傾河海瀰漫橫放不可以立障而坐排也然非有龍門底柱為收其勢而障之則其害不可以少息今國家之制若三公不假言矣至於內有吏部總院外有撫臺按院固亦百司之龍門底柱者也然部院不得近民按院迄無久任則撫臺獨為要焉是故自撫臺導之行則行雖泰山之重不能以不行自撫臺導之止則止雖長河之迅不能以不止然則今日之頺波舍明公德位其孰為之立障而坐排者今蘇松財賦寇攘已極其諸鄰境通邑官司往復徴兵紛擾費亦不資若蒞民者復為之乾沒則恐倭寇不獨海洋而閭閻之下皆矛戈也茲者幸賴眀公在上照若白日媺醜立彰故賢者憑聲而奮績不肖者畏風而改心誠今日庶草之大幸也然而層崖隂谷之窈洞房重閣之奧苟非為之曲照而旁燭則雖以太陽之烜赫其能無遺明也難矣且夫常例之説固有志者不忍挂口而近當事之人或視為固然非一日矣矧例之外又靡所不至乎側觀近日邑二以下者之歸資類加諸昔日之卿相此其所有者何自也夫若而人者于民最為親比辰出令而善則辰及於邑之人已出令而不善則已及於邑之人孰有美服可立而奪之衣也孰有美食可立而奪之食也蓋洽比日深則巧取有方資秩既畫則亷志寡敦雖有不然百鮮其一斯民剝膚之害孰踰此焉此惟久民間者能知而地位隆峻者或忽之矣是故不得不概察也至於近日虛文之甚其委細者固多而大端則有五一曰無名雜徭二曰浮羡供應三曰宴會多費四曰借關濫應五曰奢僣無度然則神明斷割起利出害計無有先此者矣大都上下儀文往復報施得若成化宏治之舊則吏可以省事而供職民可以節用而愛身此不獨以障今日之頺波濟方今之匱急而主上南顧之憂亦足緩矣惟眀公尚垂察焉奉大司成尹洞山先生去秋别雷平之館繼奉書丹陽以去使未識所候遂竟闊絶至今闕然每一馳瞻誠不能自解其勞結也去冬楊選部寄來手卷伏讀公見贈古詩過甚期待靈鳥神劍匪敢仰承第以斯文為短翼之修以前哲為鉛刀之磨則不敢不自前耳至於卑棲鈍割非所計也獨業舉一事終覺如鏤氷刻脂情知其戲劇而猶為之令人中心無雋永之況然欲絶之又不可也如何如何倭寇賴近日某公宣力逺近稍有望且秪以各守城隍為幸寇則伸縮自神莫敢孰何彼戰者又不審機妄前屢取挫衄將孰尤也且寇之重屯在柘林三吳之子女玉帛珍希巨麗者萃焉諸公無有逼柘林而守者則寇之伸縮宜不能制也既不能制寇兵雖各為墨守則何益矣諸公近日至計唯倚重狼兵彼狼兵各主易生競忌又重之搶虜視倭猶徑俾勝敵猶可處也不勝則雖狼兵尚未可知而況倭寇乎今日之計恐不免召募沙船鹽徒與練鄉兵為長計耳事之所終在廟廷必有成算若草莽謭陋曷敢議焉偶得便鴻敢附起居拜獻佳章石刻山中各古刻及直所奉贈拙詩繕録呈覽伏希裁教奉念菴先生書近敝邑人歸敬附書儀轉付家僮馳上計仲春時可致到桐江也奉書後又自覺勇斷一番自分此生此身在天地間只為公物何至如雞彘營營秪作一已之計以自負其天命之重以辜吾父師教督之慈然此意近似有可執憑者第憾從前荒怠今年四十方少有省發正所謂越午鳴鐘亦晚之甚也又賤軀素弱往時斫伐近憊今臨事稍過則耗倦繼矣即日雖甚護養尚未能頓起都中事體多禮外之禮情外之情雖強有力者亦不足以善其後而況於弱者乎不肖某即日意圖南補或其資序亦相愜然未必可也吾師尊體近想平復惟加珍攝又所謂酬應文之可已者近必斷謝之矣何如以今海內先後學者不少矣然高者只自繕其性命而一不恤于形迹次者於斯道甚有發明而或未能密檢身之功至於任氣機為良知者則又自憑其猖獗衒霍之資以恣其寡亷鮮恥之習此其罪浮於暴棄之人又豈有志者所忍㫑之波也此三者雖有間皆不免于過不及之弊然則直接孔子博文約禮之學以光大近日王氏之傳者宜惟吾師為獨盛但向年歸寂之説不肖亦頗疑之想近日指點又不然矣不肖近以師教之殷感發及此亦將得間以求指歸之所在耳佇俟歸日得承痛誨不任延領又正月李兄行復撰短啓計必達上相違數千里回首南天自老母之外唯吾師在念深嘆復日相從竟自空負今悔無及去歲扇翰教督語意切至正猶以應時之甘澍潤未絶之枯株其根芽不得不萌露也造化之功大矣比來病中體驗真不敢不自勇斷日覺臨境有力雖未盡灑然有手舞足蹈之妙然自信主意血脈斷不在紛華藝能也其與子夏之交戰而癯者或亦不同以此則於博文約禮隨地實際從此深造以臻孔子三十而立顔子如有所立之地或不違矣昨在馬上思吾師盡忘世界始作得千古真事業之言因念曰吾身苟足善俗雖不俎豆鄉賢可也苟足禆國雖不録名臣言行可也苟有明于吾道雖不從祀孔子可也如此則吾心更無規忌而博約乃其天則矣所謂千古真事業者豈非以其出于天為而不以人為為之者與何如何如吾師近日精采何似緬思姑射神人膚體綽約自當與凡塵􅗥絶也冀加珍攝冀加珍攝不肖南補之意頗以資序相難今尚欲力請然未可知也敝同年中同會者凡若干人用功者亦不少固不肖之幸亦吾師之欲聞也敢附及之劉太僕行力疾布此瞻繫不盡與樊户部去冬小僮南去曽戒書儀倄慰不謂渠從他道竟浮沉到今也悵嗟莫及前書重悼令弟雋才上友伯氏可以蹀迹兩蘇再著西川之盛詎謂雙羽方馳乃遽剪其一耶然聞吾兄篤念至于黧瘁何其過痛而不自知也子夏所謂死生有命四海皆兄弟之語某不能不述以進惟吾兄善解以自玉且為尊公慰至囑今春拜翰誨凡四矣每書皆若面傾知近況曠然翔于寥廓嗒然忘其不平之意此非誠有卓識逖見凌出乎方域之外其曷易能之昔者董仲舒作士不遇賦李習之猶謂自待之不厚今兄可謂之自厚其身加董子所造矣然則某之服兄文豈獨礧砢之節逸宕之氣而已乎某數多病近日齒益加長矣向時所馳鶩劻勷如詩文一事皆已若沸水之覆于淵則其他世俗所矜慕者可知也吾兄昨所示佳章皆逸才妙思倜儻高朗漾乎若春河之方泛某且驚避之不遑何遑品題哉蓋兄方年爽氣健神精煥溢且翊以留都佳勝少隙從事可以發性靈之藴探古人之心而極斯道之所究某將拱手待之藉之以發矇而娛志也惟兄益嶽積而淵藏然後出其緒餘以為之則于方駕古人也何有某近因讀劉章言田之事似悟古人為文之意兄試取觀可以一笑久不奉書臨楮不覺長語然對兄猶謂非長也亮之復朱鎮山中丞曩王僉憲行適報楚臬命下故倉卒附聞知明公素念篤也行至德州伏領差使致到翰惠內三紙俱出手勒中間教督勤切若倒肺肝而訓之守官者咸不出守道自非哲人懸域外之觀出驗白之緒軫道義之契急故舊之歡曷能及此夫不肖某朴遫頑鈍不能曉通世變此明公所熟悉也初意今秋得遂請告歸理宿恙不謂遽及今補一作外吏遂不得自由矣辱明公卷卷見問以速出之故然某速出誠有故計明公亦終當有聞也雖然在某值此亦有足自慰者試為知已者布其一二某往玷儒秩繼冒間曹素乏理人之術絶鮮潤物之功今者獲藉仁庇少試方隅倘在一日則不敢一日不罄其愚俾稍垂蹄􅏥之波以幸活徑寸之鱗即自考無憾矣此某所自慰者一也某少負不羈長墮清虛雖日嘗折莭猶覺齟齬今者得磨鈍于磬折之煩鍊志于簿牒之叢將迓足以驅惰酬應足以警懆庶幾大易撝謙之義詩人敬慎之旨此某所自慰者二也某志在遺榮而意頗矜名若糾纏然往在清宴之地得遂自全之計故每以敝帚而竊千金以燕石而冒連城未嘗不內愧發汗也今則臧否寄之他方毁譽懸之衆口欲飾躬以徼譽將獲甲而遺乙于是向日之矜重者失其憑握矯飾者喪其窟宅庶幾形骸之遺獲見性命之真此某所自慰者三也此外若世俗所競肥瘠榮落崇下一切不敢以滓靈臺即令今日蒙汚衊快當路而去尤欣欣自得焉然此特可為明公言未敢為他人道也雖道之反增疑豈復相益哉來教所謂忠信出聰明此至言也顧某於忠信未有諸已明公又曷䇿之某往奉書門下以近代馬余諸老為明公稱願邇過清濟上下數百里凡播之編民傳之輿厮騰之置郵詳之有司談鴻哲之照則秦鏡不為明誇介白之操則氷淵不為潔述惇大之休則溟渤不為容語莭養拊循之恩則慈母之保愛子不為煦也明公將以此登古人之勛閥亦猶窺左足越閫限耳其何不酬之有伏惟珍重某自兹南矣尺書往復不若燕齊之易縱厪教督曷繇即至此不能不悵望於臨岐也荷索拙稿無足可為大方呈者略書數首聊當抵掌風便還示指切尤幸奉聶雙江先生前冬便省還家取道謁廓翁念翁二老稍就正此學雖以不敏不強之資然亦已領其槩矣而獨以未得摳衣明公之門求一言之誨為慨也緣其時改卜先人文赴任期迫故未逮耳迄今為歎往年聞明公歸寂之訓某時以妄動之體得此語極有藉已而試之似尚未得明公意指之所歸也某以為心體誠無內外故莫非吾心之文則莫不有吾心不可損益之天則行乎其間者禮是已故夫子告顔子不曰理而曰禮者懼人之偏於內也近世學者處物接人進退取豫多不得其當非良知之罪也彼重良知於內而置事物于外陵遲及于是病而不知良知之無內外也以是知明公之教必不顓顓以守其靜虛為功而某輩誤承其指歸者過也不知明公近時指示又復何如别久裁候并布積懷恐負長者宿教故僣以請正倘不靳指南則幸大矣答何吉陽亞卿向陽邏驛中奉短啓雖造次猥草知明公之所必鑒念也今到楚凡四易月坐武陵分司僅一日其外靡朝不在車馬間邇以祗事新藩過貴府展趨宅上與周廣文及會上人宴坐移時相與追誦宿教又舉手相慶謂明公得息肩留省暫頥貴體其為同志之賴且慰也宏矣周君於此學甚有明如某慚負何可言數年以來第覺聖人之學自堯舜孔顔皆歸于仁體仁者通內外物我渾然為一與二氏之學敻乎異旨今學者專志於二氏無假言矣然為聖人之學者亦多詳乎內而略乎外適乎已而妨乎人則固未嘗不昉于崇二氏之為崇也其於失仁體則均矣以孔子之聖而必曰不踰矩而其告顔子之為仁不曰理而曰禮至顔子之學為仁也又必曰擇乎中庸得一善則拳拳服膺而弗失之矣然則聖人之學其必有以也夫其必不顓顓于詳內適已而已也夫明公試以今之學者觀之果當為同乎為異乎蓋近日教門既寬而慧辨之士又語之太圓宜其以二氏之意承聖人之言卒使天下之士立身臨政蕩然與世無底其極至導人于狂猾隂阻天下豪傑嚮往之志且今天下士競民窮劇且動矣使為學者而又倡為寬圓之行以濟其弊而阻其志將比于宿昔訓詁支離之害其仁不仁又何如也然則某與明公之在今日雖不能為龍門碣石其不宜以身同其波使自為謗也審矣明公其謂之何尊使報行且言道駕不久寧家先此布久濶并質所疑佇容專倄候賀以既鄙忱又去歲遘柴貢士及盛使兩奉小啓既以謝明公之宿昔而又請質别後之新得蓋盻盻然望之矣令甥嚴氏回果拜手翰情切語詳不以其愚而挈示之以心不以其柔而重屬之以道雖有拱璧以先駟馬曷如明公之貺我厚也某雖不敏不強其敢不承乎某觀今之海內仕者從事學問非一人矣然求道如飢渴愛同志如骨肉則孰與明公天下信而從之以為斯道之宗盟人倫之師表亦孰與明公至其撫江右未期年謗議沸都下已而詆之益多相知者且疑之矣然又有解者曰今之君子其他利害忘情猶易至于毁譽忘情至難若明公所為豈欲自冒天下之毁以庶幾直造性命之真者與不然何有是也某謂斯言亦可謂善求明公者數年以來反覆上下每取證於孔門然後知聖人之學固不必若此也今觀明公來書自敘所以致謗之由有自以為然者有不自以為然者以是知明公之心真如日月之食過也人皆見之更也人皆仰之豈嘗如近日之學必欲冒天下之毁而後以造於性命之真哉然則斯言也為明公今日自計則善矣而以為學問必如此恐非也明公來書謂近日學者容易承當輕率攬結某則以為近日之學非獨承當之易也恐其所承當者非孔門之學故也所承當者既非則其所攬結者自左矣夫孔門之學主於為仁而其告顔子為仁之功則唯曰克已復禮而已以孔顔之相遇也不直指之以見性成聖而必曰禮云者何也異日顔子亦曰博文約禮又何也近日學者以為禮之字義不必拘而孔門立言非有深意噫近日之學所以為容易承當者此也今夫自吾人之視聽言動以交于天下之事物有一非吾心之文乎故莫非吾心之文則莫不有吾心不可損益之天則以行乎其間者禮是已是即堯舜之中箕子之極孔子之矩而顔子所以直接之者也自晚宋儒者專求其則于事物君子固非之矣然今懲而過之遂曰但求吾心無他而已至於事物之出乎天則不出乎天則不必顧也如此則當其應事接物之時又以何者為吾心是二之矣故其應也不失之太過則失之不及不牽已而從物則病物而適已苟且以支其煩而自以為不纍任智以御其難而自以為妙用交際則有百取而無一辭仕官則有前進而無後退至於事不得理物不得所天下從而尤之則曰此吾能冒天下之毁以直造乎性命之真者也又曰吾寧甘心埋沒一世不得出頭始與性命相應如此則古之恱於天下之士與夫言而民莫不信行而民莫不從建天地而不悖質鬼神而無疑考三王而不繆百世俟聖人而不惑者皆不得為盡性之學矣是何認瞿曇蒙莊之精魄以為堯舜孔顔之性命其亦不仁之甚歟且聖人之學行其出乎天則者而止其不出乎天則者蓋欲體仁盡性以至乎命而已聖人固未嘗知其前之有譽而後有毁也如知有譽而故避之知有毁而故冒之是前後皆意之矣又惡能有得于性命之真體哉夫聖人固無意于天下之毁譽然而天則之所在聖人雖欲逃天下之譽而莫與之逃矣雖欲冒天下之毁而莫與之冒矣何則天則者天心也天且弗違而況于人乎況于鬼神乎是故天下之士恱之者非恱聖人也自恱其天也言莫不信行莫不從者非信從聖人也自信從其天也建天地不悖質鬼神不疑考三王俟後聖不繆惑者非強合也各取足其天而已也設有聖人者不幸而處非其時則若湯之征伐犯不韙之大而天下猶知其非富天下也若栁下惠之納奔婦失别嫌之道而天下猶知其非淫于色也若孔子之往佛肸赴公山始雖有門人之疑而天下終信其不磷而不緇也蓋非獨智者能知之也雖匹夫匹婦莫不與知乎聖人之心者也何則天則者天心也天且弗違而況於人乎況於鬼神乎若謂真為性命之人必至于埋沒一世內不見與于鄉戚外不見然于士大夫朋友門人之始而信者終而疑之以此為相應則是聖人性命乃同于海畔逐臭之夫不可以相通而天下之人心果若唐人所謂化為鬼魅不可以至誠動同然感必不然矣是言也彼固有托以自恣然而誤天下高明之士蓋久矣伏觀明公來書又曰由衷信古曾不多見則知公之所學本乎天則而證乎孔門以直接堯舜箕子之真緒其在今日尤宜加切而謂必欲冒天下之毁者非明公素心矣然則某與今天下士所恃為宗盟為師表者其卒孰與於明公哉來書所指不經之談者聞其間一二已置於法甚讃甚讚然斯人破露人猶易見至于倡埋沒之説以恣其所如之便而自敗壞其師門之教得諸公并直之尤斯文之大幸也某之愚柔明公所素念今也勉臨民物竊嘗自試以為誠有天則第恐燕人寶石為玉而況燕石尚未為已有者乎且憾聞此之晚徒為空論以終歸於愚之厲柔之妄則其去天則益逺矣可不懼哉明公既不忍於棄絶惟不靳反復之至幸與宋望之某與公别且四年不通書問者又一年回思都下時昕夕綰結談心論文形骸兩忘不知復在幾何時也懷之懷之去春行時曾馳小詩短啓未知達否久之復得外調之報始聞駭嘆已而思之又未嘗不為慰何則當公兩疏之時此其幾已動矣今者果朋計而亟逐之俾今日有事必需之才乃置之拓落不得當局之地此非獨某嘆之蓋人人嘆也然某嘗從公論古今人才若庸庸無所短長而坐登澤要者此不足論矣唯磈礧非常之士始未嘗不從屈抑然後乃有大樹于世何則磈礧非常之士不能無輕當世眇萬事而挾其不足為之意惟夫經承屈抑奔頓瑣尾動心忍性增益其所不能乃知當世之人無大小衆寡之可慢而天下之事有不為然後可以有為此其所以有大樹於世者豈苟然而已哉姑不論古人即如近時諸老中一二典刑士曷嘗不出此乎其不出此者必庸庸無所短長始未有磈礧非常之莭故也故龍之德始于淵潛而終于天飛其潛不極則飛不厲此某所以既嘆而重為慰也計公所自處者必灑然矣或謂望之有高氣值此必不復出某謂望之篤志問學其行止必不任氣以彼其才尚望其俯從抑屈發舒其所負此當世之幸若欲退托山林與吾郡諸老長相戮力以發明此學則隨所欲耳固不當以高氣不能屈抑者自主也某居此惟日事奔走一歲在車馬之間者十之七八即有禹稷之心亦無日力以行而況未盡禹稷之心者乎今所能者惟無積案停獄與屬吏不敢為墨耳閭閻之下頗亦傾信若謂仁意藹然行於其間則尚未也精神亦似稍長又幸楊朋石鄒繼甫來此得數會相切亦竒遇也數年絶懶作詩亦無暇刻第從僕馬寫行役之懷或迫寮友間倡和得數首今附呈庶知近況公有作得令人録示亦見解逺懷也辰下無事顒惟日會同志直求性命無墮俗塹此潛之第一義也弟與公皆漸老矣舍此即成衰翁可不懼哉久不致書披冗不覺纍幅晤對無期千萬自愛復吳峻伯某履楚踰年日惟􅀈􅀈然僂僂然支離乎車僕而徽纆乎簿領目不離印篋胥史而語不出堂皇方域雖歷洞庭之曠涉沅湘之虛遨行赤壁放登黃鶴之間泳漢沔之波挈蘅杜之芳極汗漫之遐觀躡靈均之名蹤然而心若絓結口若噤吃而不能出一竒奮一詢非故有厭也誠以矇者索處則無與為指弱者喬立則無與為倡子長不云誰為為之孰令聽之此之謂也去年思節憲長行後益樂喑默不復有云逮聞足下臨楚私心蹶然慰躍若蟄蟲之感氣自鼓於壤穴之中已而接蓋乎郢城交轡乎湘隂聆白雪之音傾談天之辨然後廓焉有指以發其矇倬焉有倡以振其弱洞庭沅湘若滋其曠黃鶴赤壁若滋其竒漢水滋其清蘅杜滋其芳靈均之遺蹤咸滋其勝然後心若啓緘以有營口若開噤以有吐也荒辭穢論不皇自恧殆磊列而出矣若是則足下非獨有德於某且有德於楚之山川厚矣然則某與楚之山川其不可一日無足下明矣差吏至沅謂有捧祝之行期在孟夏遄車戒途創聞皇遽或謂足下欲假道了婚嫁事然足下名賢久淹即留且遷則晤言遼渺某不足言其如楚之山川何哉某方以此慨慕踰日又得足下郵筒之書書云與某神交已二十年且見督朂以力主於斯文此又足下屬之過也夫足下膚才炳譽某聞自弱齡又覩巨篇於歐陽君座當此時已與足下神遊肺腑矣乃若今之主盟斯文則亦在足下囊握耳足下何自讓為某少無他腸性雖嗜文然學之二三十年迄不敢自命其故有三韓愈有言能者無他能自樹立不因循者是也如某則矇不自發弱不自奮昔嘗從事亦復觀人眉睫步人軌迹如正德間諸公模司馬子長聲口既為陋矣輒又模模之者之聲口其不尤陋乎已稍有知心切慚之然使已傑然獨樹不倚於人而合乎天乃又未之能焉此所為不敢自命也某連蹇南宮大半歲月耗心業舉每自辟雕脂鏤氷萬貌宛然靡所用之雅嘗厭薄仰求諸古則朋怪戚怒羣起而相唾晚得一第勉服官政方欲追理舊業而力已倦矣又安能奮迅筆墨與古之豪賢爭先乎此所為不敢自命也長大從先生老長遊稍知涉道之藩既又反求六經然後知古聖人之文不倚乎人而合乎天者非技也有本存焉故也今某心匱于久耗力分于多嗜本之未碩而枝莖葩葉縱極婆娑則亦終無可食之實可匠之材矣其與前所謂觀眉睫步軌迹特五十百步之間耳此所為不敢自命也非獨有兹三不敢且又有不能者存焉雖然某承足下督朂則不敢不勉於道而已足下得第最早用力最預又奮自家學本碩而末自豐辨道可與有明議政可與有行斤斤乎非當世之觀眉睫步軌迹者流也孔子云文不在兹足下不以自主則今之君子將孰望焉某既慨足下之行又縛迹當官不能相從澤畔引滿一别某所與足下别者踰此又孰望焉行矣足下努力自珍拜使長言并用為答復孟兩峯逺使復臨雅誨諒切冗中讀之如在波漂中得指南車公仁我厚矣又荷佳貺稠疊愧感無量僕向所謂本然天則者正即良知本然之覺照無內外者是也初未嘗黜覺照而言良知亦未能外良知而求天則即如好惡是覺照無有作好作惡是良知亦即是本然天則者也來教所謂不以已私參之者固已得之若專認能覺能照能感應無窮者即謂之良知則凡人之作好作惡淫知巧識狂慧苛察頃刻之間千變萬幻者孰非能覺照感應者為之也亦皆謂之良知可乎以至恣情縱欲戕人病物者亦孰非能覺照能感應者為之也亦皆謂之良知可乎故謂良知不外覺照可也其專認覺照為良知則去良知何啻千里此皆未見良知本然無內外之則未悉陽明先生致知不離格物之旨故墮於重內輕外之弊有如此者蓋恣情縱欲戕人病物則正輕外之明症也今公反以求本然之天則者為是內而非外是又未悉言者之意而似為認覺照者之地以此為平日求堯舜孔子脈路之正恐終北行而南轅也詎可至乎至謂寂體透微仁體謹節似又以仁體為不微者蓋仁無寂感無顯微而亦未嘗不寂不微也今二氏之學何嘗不寂不微而可以言仁乎雖然至於微難言矣非微不足以見本然天則姑容再盡盛儀附來使返上佇俟修報以盡款款奉少宰李石麓公某辱與明公分誼之深篤此猶其細耳所最幸者荷相期於斯文非世之所為交遊而故舊者也夫以明公所任之重大而某辱分誼之深篤又若是其相期也使某而無所疑于斯文則亦已矣使某少有疑焉而不以請質于明公可乎夫道在人心本廣大也而精微者廣大之實本高深也而中庸者高深之極今之學問士為廣大者至于宕情為高深者至于遺物其語道也首圓妙襲圓妙者則放而為元虛其行已也先活變席活變者則肆而為猖狂進退之節取豫之義蕩然與世無底其極至失已徇物妨人利已皆所不免蓋已大阻天下嚮往者之心而與于競墨之徒猶自以為超形器而脫意氣之極若此者以不知人心之有天則故也昔顔子得於孔子曰博文約禮弟子所為拱手而待也乃者正欲附布鄙臆坐迫冗頓不謂門下賜書先之逺諭勤勤朂以德業譬以不足槩懷之意某平日所奉教門墻者何也乃顧以外出為槩乎且某外出分也語資則尚越乎同列語地則猶寧于他方但使某居此不逐逐車馬日坐理于其間亦未必無小補豈若在內一不得逮人也哉以此觀之司柄者厚某多矣第地衝民瘠旱潦相仍徵運未息即欲使閭閻暢然樂生尚未知其方也尤希教其一二連得鄉音劇寇焚掠戕及方面可謂殊變自匪異才何以戡之此在門下與二三卿衮少煩採擇不容不瀆請當柄早作家門計可也江右官私士民仰藉拯援不知今呌號當何似計門下已先聞豈假多嚽盛宗居貨寓兹某方鋤一二姦貪吏以嫌不得款浹然不敢簡也告歸匆迫裁啓先謝東望眷然莫既所云又仲夏得門下宗老齎到翰惠尋附復啓時出猥草冀不深斥栁子厚云凡為門生而不知恩之所自非人也子厚所言特流俗所為門生止能銜感一朝之遇欲得當以為報此自盛唐以來凡庶士升司徒者類皆若是未足難也獨其間有出門下者卒能自力於文辭行誼以稱報無窮則曽子固蘇子瞻之於歐陽永叔是也斯固以難而亦非至也唯夫為主司者以道德望於天下而其門墻亦能以蹈道迪德為報斯未之多覩也雖謂之甚難未為過也仰惟門下行方而不為劌知圓而不為同學通天人而不自輟文高一代而不自矜汲汲騖乎周孔之途而兹兹嚴乎老釋之辨其於道德可謂勤切而宏深矣以某之下劣木強幸荷甄録依門墻之末光今六七年餘矣然未嘗以一言道謝於左右非忘之也誠以感恩思報之語非足以仰答有道之一二也昔者堯舜三代上下之相與非相為恱也而況親如師弟子又焉用區區焉以感謝之語為已而欲追步文辭之間庶幾得垂片言以不湮鬱為門墻辱然竊覩門下之文譬若溟渤之廣淵非溝瀆可望神駿之奔越非凡驟可追且又觀之古今之人其文辭非不工聞譽非不隆然即其言以責身之所履循其名以求實之所歸其不至憮然自恧者蓋寡是故無用專以文辭為也意者道之所在初不以愚不肖限俾嚮往焉而少有得以不辱乎門墻此真鄙心之所至願幸也然質駁習深號名從事已有年矣而一無所得駸駸老矣恆用為惕偶見孔門之學以求仁為宗仁者非他人心生生之理靈乎中而體乎物有天則存焉者是也故非禮勿視聽言動而居處恭執事敬與人忠皆求仁之實功晚宋儒者不知生生之理靈乎中而體乎物而繆指在物者之為理其失為支離不誣也近幸有明乃又不知靈乎中而體乎物者之必有天則也則懲而過之往往重內而輕外喜妙而踰矩甚者恣欲放情疑阻來學猶自為超形器而越方體之極此其學既已逺於求仁之實功而適以增老釋之藩垣其病視晚宋則若加甚矣此門下向者所為痛排而深辨之也非門下過也兹者不肖某不自揆量誠願畢力以此為報伏惟門下亟指其迷俾得究其功可乎往年門下曾示儒釋之辨在虛實某以為釋氏誠虛矣吾儒則不專實而已其謂虛乎則三千三百非專虛也其謂實乎則無聲無臭非專實也然則斯道固至虛而至實者與子思曰費而隱又曰知微之顯蓋儒之所以異釋氏者以其虛而實者異也非曰釋虛而儒實也若然則某所謂靈乎中而體乎物有天則存焉者或庶其近似焉門下其果許乎繇兹以往誠令某嚮道而少有得將謂主司門生以道德為施報自門下與某始豈不可也聞江省寇至萬桑梓之殘亦仁人所隱切也意者虔之軍門其貴得人乎劉主政還部敬以請質并附啓處言不盡意復趙柱野中丞某顓且侗然好覽觀古人之事而竊有慕矣古之稱名人必曰所交盡天下豪傑曰門多長者車轍然非盡以此為重之也誠取其磨德講業而宗依者有地也磨德講業宗依之有地則其人之重亦從可知矣仰惟明公以俶儻魁雄之資而宏包括宇內之度是故語才則豪傑語德則長者也某在都下於門下素無介紹之因乃辱高車眷焉先顧遂從定交每自幸宗依有地而又苦於中道之間絶邇復得明公絳騶過臨芷水督教眷眷情不殊乎骨肉而誼有加於往日某因聞所未聞言所可以言其厚幸之甚深也某誠有終慶矣乃敢倄使敬布賀謝并附小稿仰祈斧裁以終嘉惠復劉朝重舍人回辱教勤勤為師門傳諭以今之君子咸不能無欲而遂自附於一體反有秦越其骨肉之間者此篤論也領教多矣獨憾不得更共師門一面承殊耿耿也學問工夫頭腦亦只一語而已無欲一體亦一功也非謂先已無欲而後能一體若只先作無欲一段工夫則當時豈盡離人倫事物而為雪山少林之事止于一身而已耶況吾輩已臨民施政矣此心之體本時時與物相通故謂之一體時時與物相通而不以形骸世纍之故二三其念也故謂之無欲一體即仁也而非有內外也無欲所以為仁也而非有先後也聖門之學以求仁為宗故一日復禮天下歸仁其與二氏之學絶異在此若語意之間先後太重則用功亦有拘礙不獨逺仁也願兄再教之前聞幼郎變故今又有內子之憂殊為愴恍然觀兄柬中語似近得此學作主故於哀戚自有天則弟復何言夫以兄之哀戚而自能中節此正見無欲一體之非有先後也弟與兄皆長矣弟今獨學幸望時惠數語督教彼此不文可也上徐存翁相公以同志友阻未上某嘗觀唐韓愈三上相君書皆自為求試雖曰不以私利人不信也至宋蘇氏昆弟贄書當塗慷慨言天下事又皆出疏逺創謁冒無因而至之嫌是二者皆過也某之不肖自歲丁酉出相公門今二十年餘矣既不欲為私利又非同于無因之嫌然平時未敢一通問門下者亦過也況嘗奉一言之誨寧無請質以求終教於左右可乎某初出京時相公立而誨曰君子義以為質必孫以出不孫不足以成義某謹服膺到楚之日每以從事或值膠轕其言無不驗信然後知聖人經世之學為周而相公所以獨斡乎元化之機者恃有此道也往者相公雖久踐端揆共贊皇序然而權或不能以盡操力或不能以自致而相公潛握其元化之機以曲成其康濟之猷默默焉閔閔焉若辨亡子於道路不得即號而呼之天下矘然知相公之心而不知所為也蓋睢睢乎望矣邇者相公操可為之權運自致之力天下莫不昂首戴目以為有赫然迅然震動改易于世者而某知其不可也天之有秋冬方其嚴霜凌永觱發􅏮栗天下恆患苦之矣天非不愛也然未能以一旦變為煦日和風者其幾微也向使挾其愛民之意使今日方為秋冬明日倐為春夏則萬物之滅熄也久矣奚獨患若乎洪水之橫流懷山蕩石若是烈也禹非不欲與水爭地而治之然必讓而下之者其勢順也向使禹之區區焉與水爭尋丈之地以矯一旦之功則中原為大壑矣凡此者皆遜説也宋之盛時以韓范司馬之賢為明君之所眷倚然終不能有為於世為萬代惜其亦或者未得遜出之權卒然以秋冬而變春夏者與抑與水爭尋丈之地而未能少讓者與今相公晉陟元輔方半年而聲色不動其閔閔焉默默焉猶前日也相公之措設可謂孫而出微而順矣為是心也自非古之上賢誠有已溺已飢之憂若內溝中之恥必求以生天下之人者且不得而知也矧肯委蛇行之而姑待之乎雖然天之幾至微也然元陽未嘗一日而不運其鼓蕩于域中雖幽壑不能不生色禹之治水其勢誠順然而鑿龍門決淺原疏九河分四瀆以漬漸而放乎四海其功未嘗不震動乎九圍亦未嘗不歲月效也是故微者固大有所為而順者將大有所拂者也今天下誠若一身然以京師為首則趙齊為肩晉冀為背雍州為腰淮揚為咽喉中原為胸腹吳越江楚為肋脅閩廣為脛足蜀滇為兩肱數年以來自中原發難之後雍州有地震之虞淮揚吳越閩廣皆浸有倭夷之害又近有潦溢之眚江右有寇盜之殘楚蜀有木政之疲而楚又有藩封水旱之交埤燕趙則有車馬之役晉冀則有邊馬南牧之困以是語之辟諸人之一身自肩背以至脛足無不創也一身無不創使元氣足以勝之猶可為也然而元氣之弊久矣某嘗以為必有神醫如秦越人庶可以胚胎元氣血肉孱骨起沉死而回立生然今之世舍相公則孰為秦越人者某嘗過楚之公安其邑中殍者日數十人某時與之議賑邑令告曰得免催科民或不亡雖斃有所矣今斃且亡賑奚以為某聞其言而悲之然則天下元氣之弊至此蓋極矣而徵輸又非可一日寢者今相公欲以復天下之元氣雖至不可為亦必有為之所矣雖然猶有要焉夫元神者所為主宰元氣而運行之者也孰為元神則今天下在位者之人心是已自二三十年來天下在位之人氣奪于名位魄靡于權力而精髓則浸淫于錢泉如人困淩崖伏幽穽以桎梏自娛以波漂自悅而迄不知皎日之為明周原之為安其可悲也蓋又甚矣故今日必先出斯人於淩崖幽穽之表解其桎梏逺其波漂俾知有皎日周原焉則庶幾易其耳目移其肺腸然後斯人能收召其氣魄斡旋其精髓展發其四體百骸始能有為于世此某所謂元陽未嘗不鼓行而鑿龍門決淺原不免震動之為勞者其意蓋在于此其大槩要示天下人心曉然無所利之而已向使人心未回雖有秦越人止能還血肉之一二未幾而終于仆矣是故元氣至急而元神先焉者也其次則莫若盡蠲天下之虛文蠲虛文之功恐亦不後于鑿龍門決淺原之當以歲月效也不然則神氣之弊日益加矣夫虛文之大者莫首于冗員往時議革冗員矣不過以知事教官所局等官應文而已至於楚省內設總兵歲時坐分貧軍月餉此何為也某所轄湖北止二郡而監司者有守巡兵備三道每郡既有守一員矣而又加員半監司以臨之其不為冗乎舉一湖北而天下可知也其小者遷代之擾饋餉之黷內外參謁之騷夫馬供應之靡自上視之未見其弊而自下膺之弊莫有加此者也是故必行久任則遷代可無擾也必絶輕賫則饋餉可無黷也議處驛傳而品節之則供應可無靡也力謝見面而勸懲之則參謁為無騷也若此者則又在言臣一申飭之而非有大拂乎人心若果鑿龍門決淺原之難也雖然某固知相公之亦默默焉閔閔焉而必有為也某自佐楚臬甫及二年罔有寸效遽遷蜀參頗內愧于心輒不自揆令舍往往恣情欲以認性命樂圓妙而遺天則辭受進退皆不合道每自念以為陽明子之學豈端使然哉然嘗觀陽明子平生仕進之間祗見其退而已絶未嘗與當世比而老先生之居身垂訓莫不皆然然後知今之學者之未知有矩也而陽明子之教荒矣然猶幸有陽明子與老先生之矩誨在後生小子尚有歸依焉去歲同司諸君均擬致夀門墻而令不肖某為之言緣鄙薄逡巡又坐奔走不能即就所謂遊于其門而難為言者是也至今乃得勉申一言而未知其能得老先生之一二否也專使獻上并以請質焉仰惟門下鑒教幸萬萬矣奉復座主洞山先生去秋過建業撰啓奉候具告所以速出之故既還家幸改卜先兆首春扺楚奔謁無寧期今已踰半載猶尚在車馬間昔居京每痛厭拜謁事不知外出猶有煩於拜謁者乃今則化而安矣近晤衡陽劉兵曹相與仰嘆門下德猷宏密恨不蚤握魁柄俾當時蚤沐其休澤某則以天下既弊而使賢人不得當柄以庸者固天也天下既弊而幸有賢人列散以俟者亦天也天雖叵測與人相近安知其不有意於幾將哉此夫莫非吾心之文則莫不有吾心不可損益之天則以行乎其間者禮是己禮者即所謂精微中庸是已使今而言禮言天則則彼必曰是拘陳迹是落言詮而已自某觀之世以為陳迹言詮而不知妙道之存也彼其不拘陳迹不落言詮者則反依附二氏之粗以出入五伯之微二者既相混矣又自以為是遂至于忽棄聖人天則之正而自恣其一時見解之偏後生輕俊朋聲附和卒不能反其原夫是以若此蕩然也夫世道弊矣所恃以維之者有學道之人在焉今學道者又若此其復何恃乎然則今日能起而障之者非有道當樞如今元相如明公其孰能為之今夫孔顔之天則非有出乎人之外也設使有稱名人者有行而過焉雖匹夫匹婦知其過也非徒知之且從而訝之矣有行而不及焉雖匹夫匹婦知其不及也非徒知之且從而刺之矣是非匹夫匹婦反智于名人者也彼其天則所在雖至愚不肖亦不可蓋而欺也夫以匹夫匹婦不可蓋如此寧可以學道者而依附于二氏出入于五伯遂混而不知乎有道而當樞者其欲有以障之非自其身表之不可也往某之南出時門下三公子及夫人亦南也門下竟不用勘合乘傳以取官供乃獨以一葉蓬舫浮濟汶達淮泗淮揚之間凡在匹夫匹婦見者駭觀聞者竦耳以為今一命之微尚假借鷁舫充牣河腹而況天子之近臣且方膺簡眷一旦而登樞者乎以是而匹夫匹婦之上其知者莫不興矣然則明公其所謂獨為身表者耶某竊自嘆使學道者人人若明公所為作其欲見孔顔之天則也豈其難乎使在位者人人見孔顔之天則其欲返斯世於古也豈其難乎然則救今之學道者以救今之天下其孰踰於明公之所為身表者今願得明公旦夕握樞與元相下上其論即旦夕以斯道持世可也某之不肖自叨楚臬甫及二期未有寸效遽荷今遷然而愧恧不已者乃亦天則所在不容自蓋故也輒不自揆量差舍人賫疏僭辭新命祈行久任少禆聖化請自某始然事踰常調則駭者相格議出下寮則尤者相稽然非上恃明公心察而力持之斷不可也雖然使久任之法得由某以行則某雖蒙踰調之責受越分之誅所不辭矣奉大司空雷古和先生某腐劣末學然嘗奉教于明師友髣佛窺姚姒之大都矣當帝堯之御世其樹官置吏惟司空為首秩而禹之為司空也史臣稱之曰地平天成萬世永賴若是則禹之功峻乎衍乎與天壤並矣然稽其所繇致禹亦誠勞矣或語其繇曰克勤克儉又曰膚焦不毛脛疾無理又曰禹三過其門而不入史臣又記禹娶于塗山辛壬癸甲啓呱呱弗子斯其明禹也亦至矣然猶未足以明禹心也惟孟軻氏曰禹思天下有溺者由已溺之是以如是其急嗟乎此足以明禹心矣夫禹曷為其任之已也今人有居家者焉寒求衣者於吾飢求飯者於吾顛求起者於吾爭求理者於吾疾病呻吟叩醫而為之治者於吾此責之莫可辭者也苟寒弗為衣而卒以凍飢弗為飯而卒以餒顛弗為起爭弗為理而卒以仆且傷疾病弗為醫而卒以斃此心之莫可已者也禹知其責之莫辭而心之莫已也故引而自辜必曰已溺是故禹之克勤克儉不毛不理四日而行三過而不入蓋不以天下居天下而以已居天下也此禹心也是故東漸於海西被于流沙朔南暨聲教訖于四海以逮于天地平成萬世永賴者禹特以安定其一已而已向使禹非其初有天下一已之心則方勞而倦也久矣豈能強成逮此乎某觀今之宅膴位者欲其以身勞國事如明公幾何人也方三殿之議復皆以為天下且靡幾千百萬鏹閲幾十歲時而後可成又懼其無以繼也已而得明公出身主之寅入而酉出風櫛而雪餐雖片石必訊雖隻木必理奔走其五官而不知其瘁也焦愁其腎腸而不知其疢也故其費之裁也不知幾萬千其時之成也不出乎三年之間而其餘蓄又足以供主上不時之需而無至罄竭天下之力今上自縉紳下逮厮役莫不誦明公之勞而歸其功然則明公豈獨以身勞國事乎吾不知其果有已溺之心亦能以已居天下焉否也雖然禹在當時其既安定一已也禹未嘗自已也亦必有所以贍足而休養之者不然則禹能救之于既溺之日而不知養之于既救之後者尤非禹心也然則今日所為贍足休養之方在明公與二三元臣亦必如三殿未成之日奔走其五官焦勞其腎腸而某固未之能測知也昔者明公門墻甚峻叩謁之士如雲而某獨蒙以國士見遇又辱寵之雄文為先世光某嘗私竊欲以身報此猶末也惟不自棄其愚且求以粗效其一二以庶幾少報知已萬一固其心也到楚以來甫入二霜日疲道路人已無禆遽叨今遷惶悚何言兹不自揆令舍賫疏欲辭免新命乞行久任請自某始但事踰常調則駭者相格議出下寮則尤者相稽然某所以固守其愚為門下報而明公與二三元臣必欲贍足休養乎元元恐亦無能加於此者是故非仗明公委曲力成不可得也某謹離篆屏迹祗候覆題以取進止臨緘附中謝臆并布鄉往不任區區答諸殿撰别後聞吾丈旅途抱恙繼有內艱之戚則與二三知已為之惝恍恨不面相慰護蓋誠有膚肉之痛非相為好也去夏叨命楚臬歸家幸改厝先人畢事赴任適有景府之役又邊徼弄戈奔走無寧久擬修唁倥偬未皇忽拜逺翰既慰且慙讀來翰知篤志斯學則所謂哀而中節與惟疾之憂者吾丈當以先得之矣復何言哉某素支蔓多岐人也幸藉師友之訓謾嘗剿襲以求正門下不謂高明採聽知吾丈勤與人為善之心夫是以取諸人若此也此學自陽明先生發之明矣然先生欲人致其知於事事物物使不昧其則正與堯舜執中孔門不踰矩無異非止欲守其空靈而已今乃或重內而輕外溺妙而遺則甚者妨人病物疑阻來學猶自以為超形器而脫意見之極其于先生實致之旨不亦逺乎先生之旨逺則於堯舜孔子脈路益難言矣豈不亦大弊哉吾丈聰悟絶等其必豁然于本無內外之體若夫舍物則以玩空靈當不爾也今之君子非不知無內外之體以為吾心既無他而外之弗檢固無足為恙也彼一輕重之間而其弊已滋矣昔者伯子不冠而處使其于心體無恙也則未必即同于牛馬然而夫子痛譏之者何也蓋使已常不冠人亦不冠天下皆從而褫冠焉恙不亦甚乎此夫子所以譏之痛也不冠猶譏之痛而況進退取豫之際乎故非禮勿視聼言動而出門使民若承賔祭孔子且以之告顔仲焉而況始學乎大抵今之君子崇二氏而略孔門固無怪也雖然此猶高者之失彼過此者其亦藉而言之者與此天下所以弗信學也然則遡堯舜孔子之脈以回今日末流之弊非魁健如吾丈其孰望乎某近因冗劇益若有明恨無由面質故不避多言遙為請決亮之奉答鄧鈍峯先生向年寓京奉啓請質過後自悔誕妄昔者孔子大聖尚問禮於老𣆀聼其教戒若弟子之於嚴師未聞孔子遂欲以所學易老氏也孔子之不以易老氏豈非以其取諸已者當重而求諸人者未可輕歟況不肖某實蒙教於足下今日得稍不墮落懷有性命之虛見秋毫足下力也乃敢忘所自而欲以一時未定之已意易數十年已成之厚積其為誕妄不既甚乎某數年間與相知者談公則恨不得再晤以為不得晤公但得公之謦咳一言或得似公者即慰我多矣乃者忽然天假令弟默成兄致到公之手教某晤默成兄如晤公焉久違同心得默成兄一二語及讀公手教暢然灑然如更洗濯於清淵也苐不肖某所處地衝又方有冗政不得盡承默成兄教督且不暇細探公之近得要領雖獲兹竒晤亦若成夢語耳不肖某即欲揮此而去相從公于湞江曹溪之間又未能決此身浮遊蕩若泛泛之舟當如之何惟公有便尚嗣教之耳公老矣某亦四十有五晤言當復何時嗟乎使天終不棄令不肖某終有明也其必有合乎望之王公祠記容後另復衡廬精舍藏稿卷十九
