body:
  text: 衡廬續稿卷八明胡直撰墓志銘龍西華先生墓志銘豫總角遊􅓺而里中西華先生已翔文場試首冠先生不豫稚一見忘年期許覯輒歡甚嵗庚子先生得雋江藩又三年豫乃繼踵偕上春官得朝夕其論而益知先生之髙雅與俗趣殊轍後豫入仕比歸先生不金玉其章貽豫令人寶不可置心擬時時叩子雲之室而今不可幾矣先生冢嗣朝宰手其姪孫太平二守澄源君所為狀謁銘豫既辱好又欽君之嫺於文是故於銘也曷辭按先生先世由京兆令永新家焉繼徙今泰和甘溪里嘗有兄弟五人同舉其諱登騰者並登淳祐進士騰之後有震翁事母至孝時有枯梅六月而花事聞理宗朝表為孝梅命詞臣盧摯作記又御製七言詩奬異之明興樂山公諱仁安以長子驗封公貴贈祠部主事驗封公兄弟亦五其四曰某某四傳生梅坡公某娶某氏子三長諱子用舉嘉靖壬午尹行唐其季即先生諱子昂字行敬别號西華西華先生自幼奇穎讀書過目成誦文辭坌涌督學試輒高等至王公尤賞異曰此王守溪流亞也一時名動四方從者如雲然性方介不能詭隨人於遨藝時宗藩以戚好禮致之竟弗之往既舉于鄉兩上春官不第乃就乙榜補江隂學諭聘典東粵試事相繼丁艱復補休寧歙縣其墨義經㫖有大造于三邑士升令封丘封故衝疲民多鷙悍先生痛抑豪强為民刷除虛稅代輸公逋惟趨拜不以時局一自信其衷不為獵虛以是致忤上吏而卒無以中也乃以簡改上津先生辴然笑曰能改吾封丘令為上津令而奚能改吾令封丘者令上津也為之措刑緩斂禔身彌礪一意與民休養不為鈎距事暇輒閉閣翻閲古載籍衙內蕭然若僧舍督撫中丞廉其政偉之曰是真能為護養元元者委特隆篤丙辰赴覲奉部檄遴典簾外事督撫佇上章薦之而先生故弗喜仕乃竟托疾乞休連九請始得歸歸之日民泣送為之載道先生家居草餘年嘗塊坐一室外事一不挂耳課其子若孫以一經或自為時藝式之性喜賦咏值佳辰則召子姓命酒為歡既醉必為詩以咏之去城不舍許然多削迹或不通邑大夫姓字踰年繡衣使者古松段公暨撫臺應谷劉公故皆善先生各戒吏致起居先生竟弗一造謝焉後撫臺楊震崖公聞之嘆曰是淵明再見也因扁五栁髙風贈焉先生天性孝友養色承志初薦例得坊金百時方匱則以獻梅坡公為夀而公宿貯不資恣所與一弗問晚與伯兄見稍抵情故弗間伯兄暴終先生痛絶為理喪事家務悉當人益服之平生所撰詩集若干卷臨終神氣凝然呼筆示身後事又自著西華小傳曰無令煩名筆諛墓中耳先生享年七十有六元配陳孺人繼余俱前卒又繼康副張伯子朝宰庠廩生有雋才類先生仲朝賔陳出女一張出壻歐陽文孫孫男四學易學書學詩學文孫女一適楊某曽孫女一聘胡某朝宰卜今年某月某日葬本里某向之原豫既序次其事又未嘗不嘆慨思之也夫今世官比民者不啻裝幾十百槖而先生獨嶢嶢涼涼與世敻絶世並難之矣乃不知先生致歸時其傳經士楊銀臺方柄銓事朱大司空漸都顯地先生不一徊翔盼慕引手而決去若脫煩歊然於今世為幾見且夫林居市交者往往幾當塗為推轂甚則誣指上吏孰我門孰我故以攝閭左右為圉奪先聲以是較諸先生則誠談腐鼠於鵷雛間也又豈啻相什伯哉豫以是免諛墓誚矣銘曰維公竒穎疇則育之玉華炳靈維公貞姱疇則儷之甘水澄泓文敷三邑譽髦斯成澤濊兩邦腹藉殘民出膺畏塗靡斫其真處謝羣囂獨葆其神曷豐乃器而嗇厥行冥冥者鴻振振者麟蛻藏𤣥丘精歸蒼旻雲南按察司憲副毅齊楊公墓志銘豫伏石蓮吉水楊生應祥侍則談其族父毅齊公之令終然豫故善公心知公所為有原本已而二孤以豫友鄒方伯撰狀請銘將以某年月日葬公某山某向之原按狀公諱儲字元秀别號毅齊其先南唐虞部侍郎輅再傳徙吉水湴塘而有忠襄文節又幾世徙廬陵逢塘曽祖德淵祖主敬廣西桂林衛經歷父珙以公貴贈監察御史母李氏贈太孺人公其仲子也御史公嘗為廣西梧州府照磨時征叛猺例不當臨戎乃慨然請先臨敵死之時公八嵗從太孺人奔喪哭奠如成人人指目曰此真忠義後也公長身廣顙修目巨耳美髯過臍寸許弱即端重太孺人性嚴子有過輒數日損言笑公日夜跪受過少解乃已稍長以麟經補郡庠乙未援例入北雍丁酉下第乃偕同事留京邸淬礪者三年庚子中順天鄉試捷聞獨無喜色曰一舉未足以畢生平又諭同榜必勉期報國毋沾沾懷私便心衆咸􅋏曰公言是公言是丁未再上春官不第遭太孺人變哀毁幾絶水漿不入口者三日既葬猶悲慕不釋庚戌謁選授湖廣衡州府推官既至刻廉自喜遇讞獄亭疑必反覆求其生不得輒癢然見顔面雅曰與其殺不辜寧失不經故終司理之任不輕入一大辟衡陽故多逋賦公代署為破崖岸諭以至誠弛期寬刑不問多寡親收而民反爭先輸納彌月至數千金又嘗代署捕則能以竒畫擒黠寇直指使梅林胡公雅重公檄為彌封官凡春秋卷屬公者無相可否公既清約外父至訝曰署中何殊僧舍衡人無􅀈倪稱楊青天太守白石蔡公恆為嘆服常奉直指使檄查全楚人不敢私干有一邑簿以病艱迎伺暮扶疾跪獻數十金公叱而却之已而廉簿騃無他過竟貸不罪癸丑冬拜貴州道監察御史衡民泣挽不得行比行懸槖出門肅皇帝末年事𤣥公賀表致諷忤㫖廷杖四十幾斃勳戚人稍不法不少假丙辰出按河東鹽法至則貪墨吏望風解綬去者數人于是為清鹺通商牢盆之政一新值地震乃出鍰金檄有司行賑全活者衆葺河東書院羣所屬生講業其中暇則親課文品第之士益彬彬行部至衛謁子路墓增修其祠宇手為文樹碑躬致祭戊午按北直𨽻未履境有撫臣餽兼金竒貨不啓封返之事竣舉刺一無徇部中每見公疏即曰此楊侍御直筆也為覆行無異同辛酉再案晉晉故多强宗貧者至無給公處之有方莫不懷畏是秋鄉試公矢公飭度百執事咸凜凜閲卷輒衣冠端坐至夜猶凝然無跛倚極倦惟瞑目少頃或勸弛服叱曰上為主上求賢下則士進之始事也是烏可慢故事秋季防邊多委官行公躬閲三關猝遇敵衆請旋斾公曰今日正臣子致命之秋逗進者斬衆志甫定乃隲險樹營竟以先聲奪敵氣敵輒遁去公與時宰雖四門姻然絶無阿比每不得其歡心歷御史俸八年矣乃出為湖廣布政司參議分守下荆南兼提督太和山太和故有中官共事其人頗擅威福聞公至輒戒其下毋輕相犯公所行咸斂手憚服無撓有知州劉欽命者以事忤中官被奏誣荷械行公適外歸乃力為辨誣移文撫按復致書當塗且曰無令中官䉗有司中壑欲也劉竟得免幾嵗擢雲南按察司副使報至即欣然曰吾欲歸久矣遂封還璽書長往既歸杜門懸車絶聲色遊宴之娛謝綺麗不復御遇先忌必潔服茹蔬觴豆跪進畢則手自徹儼若事生居鄉務善俗乃立鄉約抑浮息訟有爭質成嵗以祀事一至郡城不謁有司盡絶干請郡縣至不識面而事關民隱最切輒慨然以書達無不為罷行晚年闢一圃常角巾布袍督植茗蔬為樂客至語及時政不答故吏門人涖江省者無隻字之交聞薦即愀然曰非吾意也先是雅與鄒文莊公遊東山講孟子雞鳴章及孩提仁義之㫖熲然有省又與羅文恭公講于石蓮咸有深契長兄休寧簿某事如父友其弟光祿署丞某靡違所欲少時與吉之高君珍彭君魯友善高同舉順天彭竟窮約嵗時問訊罔間宦遊輒致水土物彭卒為服緦麻奠賻最腆暇則期高君㑹金鼇赤石間縱談古今善敗是非不及時事高君卒公銜哀蔬食為經紀其葬而重恤厥孤時論高之其他任恤類此嵗時祖墓祠宇橋梁水利類破百金不吝嘗懸一磬座右戒童子曰若伺吾有惰容輒聲磬居聞磬未嘗不儼然危坐也對家人父子若嚴賔鄉人多嚴憚之戊寅七月中忽語二子曰生死常事吾頗不動心第惟若等當勉修以不辱宗既望猶率行鄉約冠服竟日無惰十九日與弟姪談養生歡若平時及晚沐浴更衣夜微不寧至念日端坐兩目炯然鬚髯飄飄家人訊後事不語乃知其神往矣方卒時烈風迅雷交作電燭榻席既逝天星朗燦人莫不異之距其生𢎞治壬戌四月十三日享年七十有七娶羅氏贈孺人繼王氏封孺人子二長某次某豫以鄒君狀論公之世則古所稱外不絶俗而內不失真者豫未數數見也而僅見公銘曰蓋豫聞古之至人兮尊神明而下穢粗餐正陽之一氣兮練要眇於六虛質龍蛻而鑠化兮神綽約而容與松喬不可以齊年兮翳騰精而上清都惟嶽然之藎臣兮穹德義以自廬既逺追於關西兮又近希乎襄節之故途誕齊居以精醇兮抑直氣之不回紆其夀豈兮若游其死則愈神翔大儀為列星兮嗣彥為駒金聲玉色不可挹兮瞻遺封之鬲如嘉議大夫南京太常寺卿一崖郭公墓志銘一崖郭公以某年月日終正寢季子某冢孫某既請豫友陳亞中公狀其事屬豫銘曰此先大夫治命也豫走奠恩江訊知以是月十有八日奉窆公某里某山之原豫言奚敢後蓋豫昔交公秦淮間嘉靖之著雍敦牂公為刑科右給事中㑹琉球請封其世子尚元為中山王詔遣給事中吳時來充正使行有日矣以言事謫去乃改命得公上悅仍賜一品麒麟服既陛辭告行豫時在比部則語公曰夫海古所謂長為委輸者也公往則若無色怖何也公曰夫人之死十有三豈皆犯窮溟者哉矧君命乎豫曰公忠且達矣别幾年豫歸自東粵公亦解太常正卿家食久矣郡中二三同志相與期集青原山豫因叩浮海事公曰吾浮海有四徵夫人平居語利害不大怵于心至涉境鮮有不攖者方吾始開洋梅花也潮平濤靜瞬目千里何其鬯也頃踰赤嶼遘巨魚舟顛甚雖豫與舟中人無不悸廢事竣歸國颶作柁折舟中羣號而豫亦憂栗至五日不粒食已而蹶然思曰吾學不在是乎徐自定又思曰吾以死報國分也其如五百人何于是聽舟人請捐所愛物投諸水又口占文授事檄天神即得風不怒易柁而還吾然後知涉境攖寧之弗易易也此一徵也夫人旦夜念慮淵淪飈舉蓋烈于潮與颶矣自非舟柁牢甚弗可救抑孰知吾黨以學為舟以志為柁乎孔子蓋十五得舟柁故卒登于道岸此二徵也昔讀杜氏通典紀琉球事以吾所覩記則敻異即永樂間星槎勝覽載翠嚴大竒等山及蔗酒事種種誣也豫乃信不行不為真知然則知行果一矣此三徵也吾昔泛彭鄱稱𢎞矣至海則不知幾千萬里而始覯土納已之山是山不知幾千萬里隱若泡影其若是山者又不知其幾千萬之衆且廣也豫乃知海之無不有也而不見有此四徵也吾浮海僅僅達此豫聞之􅋏然曰學非徵不自信公且坐進矣已而與二三同志期公嵗一集青原以為常而公忽已矣嗟乎豈不悲哉公永豐層山里人也諱汝霖字某號一崖上世自唐監軍公來鎮永豐子定功贅石橋吳氏為祭酒博士徙層山代有聞人侍讀公某淄川令伯庸其最著也高王父某曽王父某父中軒公諱某以公貴封吏科左給事中母吳氏封太孺人嘗夢神人指一星曰此汝子汝必為貴人母及公生果有竒表父老覘曰是當後吾鄉文毅公矣文毅公者羅先生倫也公稍長亦挺然以自任曰不者非夫也試有司日未午呈所為文邑侯臨海周公竒之再試賈生論立就數千言益大竒是年補邑博士弟子員大司馬聶貞襄公覽其文喜曰是郭氏千里駒也一時名士如羅良山陳視軒宋華陽鄒六華皆相與推許日礲礪作時義非其好也則時時從貞襄公問學及遊安成鄒文莊泰和歐陽文莊兩公門曰吾學豈以舉子業羈紲哉嘉靖庚子舉鄉試癸丑第進士授行人司行人久之選吏科給事中上平倭十議一海防二兵衛三選將四練兵五器械六招募七專任八號令九團結十糧餉又上疏極論邊防時務在廷韙之巡視皇城中貴人知不可犯不敢私役一軍比使琉球轉刑科右給事其使事本末具使琉球録及前叙述中公之始抵閩也與副使李行人某例各造一舟費不下數千金公曰合舟則費裁而力協李君從之人莫不稱便踰年公至琉球成禮中山王饋䮍蹄黃金四十兩皆作書辭之彼國法司等嘆曰天使守義峻矣不可再辱越四年復命而琉球亦遣使臣謝恩具疏言公辭金狀上益嘉悅因命使臣囊金歸而特賜公白金十兩紵絲一表裏升光祿少卿改順天府丞于時朝廷軫念通州倉儲出內帑敕公督修通州灣城議者非二十萬不可公力裁之費止二萬五千有竒六越月而工告竣人皆竒公公曰凡工踰期而溢費者弊在中官與吏胥乾沒耳第能禁中官清吏胥則事就易矣一時咸稱名言蓋公不令以一蔬一粻出有司則身範嚴也工部上公功詔升公俸二級是秋提調順天鄉試士論欣服謂得大體嘗攝府尹事吏白有羡金例請受公盡却之獨念畿輔纍經兵火邑里耗甚乃具疏請發內帑以賑貧窮寬徵徭以復轉徙上嘉納行之尋改大理少卿暇則集四方同志士講學靈濟宮往往有所發明聞者羣相稱曰實學信固在前矣公天性孝友出使語人曰吾身已置波漂矣惟念太夫人不可置既升大理力求歸養當事者知公意篤請於上補南京太常卿便迎養公因取道上觴太夫人稽首從容言迎養事太夫人性甘里居固不往公益鞅鞅不自愈明年上書乞致仕詔可適太夫人已八十公敬養盡歡踰年疾終殮祭盡禮已乃率諸族人修廣層山祖祠既屢火屢新之少不營生産既貴祿足貸人不為督償異時答太守張公訪邑利病條具五事邑人賴之疾革語不及家第語二子曰和以睦親無忤謙以處已無亢儉以制用無侈不者非吾肖子孫也又語謝君為我謝同郡諸公相見無期惟共力所學嗟乎公於死生之際視世之沾沾者何如哉公生正德庚子三月草日距終時得年才七十有一娶丘氏繼宋氏又繼王氏俱封孺人子四長奐臯丘出次奐禹皆先卒次奐伊太學生又次奐龍王出孫男四人某邑庠生次詵次謨次咨曽孫男二某某曽孫女一夫公之自貽與天之祚𦙍於公不可謂篤且繁哉公所著有石泉山稿航海漫稿使琉球録行於世又有古文竒矩古文亟要詞苑倫英自省録志學編凡若干卷銘曰疇駕天輪鞭長鯨浮乾浸坤靡有驚壯哉夕郎膽貫義不辱帝命洵上士京兆一疏瘵者蘇學道愛人勢豈紓巨節細行世莫咸唯公邁種力彌兼言念夀母懸熊車髙堂豈樂潤里閭於爍景星猋黯矣胡啻有穀貽孫子雲塘郭公墓志銘郭為豫邑南故族蓋昔稱汾陽後宋時居層溪里父僅子美之同計偕仁宗改僅為佺誥曰卿父子同登名冠朝廷邑人遂改稱冠朝里公大父一先號唯齊父公域號西坡西坡公壯未舉子唯齊公風置妾西坡公曰士無曲妻曰是矣乃令嵗蠲穀可五伯石頒族里毋收責為後嗣地乃舉公請名唯齊公曰奇美後以避四世祖集賢學士諱易曰竒士唯齊公嘗立諸童孫陽擲金錢散几上而入衆爭匿金獨公鵠立亡匿意公出曰若匿金不曰未又問諸立者於公亦曰未唯齊公心大異之曰是兒不貪妬若此束髮學易于劉鐵心先生孫公杰唯齊公乃繕其先世故學士讀書臺居公弱冠補諸生又易名彥即能輯郭氏譜又議新祠屋祠址故隘僉欲得公旁便地拓之青烏氏曰是地有吉氣築居必大若後公曰大吾一家孰與大一族乃力請西坡公捐地計若干丈祠成又以義起推祀始祖中丞公因定祀儀作孝思録年踰强仕以纍不得志亟麾舉子業曰吾將老雲塘矣遂號雲塘居士明年輸米如白門大司農顧公故善公諜米入府軍後衛衛近輸省耳掾誤亡後字悉入府軍衛費倍顧怒坐掾償輸後衛不贍計鬻子公不忍乃仍自入後衛米主廥者索羡公與之羡及見公禮于大司農歸公羡公竟與歸者既歸讀孟子曰人皆有不忍人之心遂建有心樓大究百家著甲子紀元天文地理禽書各二卷官制四復著韻海卷三十嘉靖辛酉閩廣冦至走萬安冦燹其廬諸書火者過半所不罹者選擇一覽四卷韻海已亡五卷里中有暴子弟樹黨將從寇人訩訩公率里中受憲于部使者約法重捶殺之自是夜扃不闔衆有欲抵偷兒死者公竟薄治其人乃卒改行汪忠愍公死冦後宵有物嘯號里大恐公曰鬼無歸耳明日文祭汪公及諸死寇者嘯頓息蓋公方物策事多中情迄不處賢而自與雄故鄉人藉藉倚為里君寇平率子弟省諸先冢勒石置田曰幸哉墓未踐傷松楸未薪也圖録紀之初西坡公沒公自粵步跣奔喪哭毁既葬巷口遂廬巷口書院後母蕭孺人卒亦廬傍舍咸三年二弟求分財田舍取下劣者其美好默遜二弟晚從子豪奴誣公于獄事解家益落乃盡發所藏書課諸孫曰吾産在是然公己匱而好行德愈甚里疫大作途死者駘藉公悉藁葬之又為竭力賑救身竟無恙駔㑹郭卿者涉河亡五十金于河壖詰朝索金不得將自沈死公呼而還其金邑大夫浸聞高公義固以例授儒官賓飲澤宮先是公夢負弩矢從東方射日懷而歸筮得震公曰冢子象也果舉今潮州守子章絶竒愛之故廬鳳尾草燬已七年忽挺生公搆瑞草亭曩所拓祠前方春四桂皆華公意兆在潮州時潮州以貢赴廷試居第一登順天賢書明年舉南宮官建寧公悅移書誨曰儉成廉學成政力勉之萬厯癸酉正月寢疾手義穀記疑譜各一册附寄子章成吾志夜語諸子姪曰人言將死有異我無是我死有家禮在慎勿從俗又曰吾忍死須臾遲建寧使者來果來進問狀屬力修集賢世業名世端坐卒距其生𢎞治丙辰四月天年七十有八配曽孺人前卒男子二長元鵬次元鴻以子章貴封南京工部主事配南溪蕭澗松先生孫女贈安人子章母繼羅氏又繼劉氏女子一適蕭乾岡孫男五相甲娶歐陽氏俱卒相乙字子京禮部儒士娶王氏繼劉氏相奎即潮州守子章也娶蕭氏封安人相朱夭相禮娶張氏孫女一適曽碩應曽孫五孔簠娶蕭氏孔建聘刑部郎中張公敏德女孔延聘廣西按察司副使彭公應時女孔太聘歐陽文莊公孫鴻臚寺序班宗翰女孔陵聘楊文貞公孫浙江按察司僉事寅秋女曽孫女三工部君將以某年月日窆公某山某向之兆以潮州遊余門屬為銘余嘗讀潮州所為編年而知公六行與六藝之兼備也為之銘曰孰濬其先亶集賢之名閥嫣然孰繩其後亶潮守之文采翩然於鑠雲塘上則懿孫下乃文祖不為長河之沛胡停涵為沱瀦不為應龍之升胡澤霧為豹武洸洸乎矯矯乎將導為溟海翔為靈雨不在其躬在後衆甫踔潮守兮前鋒而鼓亡友月塘曽君墓志銘豫少即好友竒節士得豫亡友月塘曽君君自舞象之年已與古人期既壯偕豫事歐陽文莊公問學又結五人㑹當時已欽君德範又善亹亹忠告㑹中無不折服唯君聽豫蓋兄事之嘉靖癸丑豫上春官適君教文莊公諸孫寓京豫方仰祿為養届期猶豫君為起擊案曰若為養乃不自果是不子也豫俯而受官退乃思曰非君疇則成我比君卒歐陽生為狀令豫銘後幾何年歐陽生繼卒又幾何年豫尚未銘也豫其忍後乎其亦有待也今豫年近髦於斯學粗有辨乃取讀君狀追而志之志曰君諱于乾字思健先世居邑文溪徙月岡自士俊士敏始俊再傳勉訓公生松坪翁才冠領正德丁卯鄉薦掌教金壇母蕭孺人有淑德君弱不喜弄顓嗜誦書一過目不忘綰髮操筆成詩題二鴉翁竒之已而從至金壇􅀈庵王公燁在諸生中才而窶翁為館穀與君同硯席數年時王公雖最稱敏不能絶君也君博涉羣書至廢眠食為文左國六子漢魏無所不之癸未翁解組歸微疾君左右養不解帶翁出藏金授三子盡讓伯兄庶弟與同舍生㑹課一日撰三場若夙搆娶康氏仕族禮成半月謝不見客人頗訝之及出所草管議二卷非非國語一卷禹貢簡傳一卷士友傳誦爭異後翁疾篤多君讓金義出劵若干曰以償汝君掩泣祇受竟不取償尋值大故堅執喪禮養蕭孺人尤曲意庶母庶弟督學范公選補邑庠弟子員首多士至是邑人士指目之曰是嘗一日課三場讓金而不肯誅券者其學行詎可犯踰冠愈端凝四方爭迎為子弟師道贑㑹關以譏私鹽久閉糴亦隨阻吉人仰食于贑嗷嗷然咨于君也君抗書謁督府錢公讀其書萬言至屈禮延納開關通糴諸鹽賈循故事斂厚資納君君弗顧邑侯陳公有威嚴與庠師二且欲危庠士衆咸避鋒君獨立堂下折數言陳莫孰何士氣為大振􅀈庵公司理吾郡下車拜翁墓登堂奉蕭孺人如母歡然道故竟無私謁時抱重獄千金求解者盈門竟不可至為雪雷丞誣及楊氏寃􅀈庵公奉若神明而雷楊弗知也蕭孺人喪忍死襄事興邑盧侯雅慕君行誼聘修邑志君亦重盧為往志成不溢美不隱惡人咸服良史才維舟螺川夜有持囊金納君袖倉皇去怪而俟之爽日囊金者至曰幸公金得不奪願分半為謝君不受詰之曰子非故而託金謂何答曰小人視公狀廉士也竟不得申謝祝天叩首去壬子秋君以歐陽文莊延禮居京師朝紳及四方名流刺滿戶外欲覩君面不得伯兄性嚴急事若父兄卒撫兄子如己子庶母沒撫庶弟與庶弟之子如兄子嘗偕從弟澧州學正今中丞諸君合長少議創明禋堂又欲本歐蘇法為譜建家孰羣族子弟胥教以廣冦興未逮也辛酉大饑請發廩不報乃出已資周本支及賑里中貧督學廉德行必首君嘗謂古道不復卷卷以正風俗成人材自任從臾從叔松山封君雙溪少參二公申訂羅文莊公雲亭鄉約鄉人尊行數十年以故雲亭視他俗稍美羣從有文者鄉有識者莫不師視大過失不願聞君及門凡百餘徒多不逺千里來君少尚氣槩讀書見烈士獨行輒義形于色見不善若凂已晚更為平友朋徵詰竒文奧字君語必詳卒無伐意有過未嘗不引義然飲人和人雖敬憚又莫不信愛焉對妻子僮僕甚肅而不見怒容厲聲郊外緩步如委蛇室中既訂五人㑹鄒文莊公引其㑹籍歐文莊居宫端聞之示以知方立志皆首望君最後念庵先生延教子處松原蓮洞者六年雅曰豫從是畢志斯學即終身焉可矣壬戌九月約諸同志趨松原求訂正不謂君遽以是月七日病中風卒于松原里第先生為痛哭具㨹斂摛詞以祭致重語訃逮邑中識與不識無不悲愴直時寓湖北歐陽生書報乃為位哭若不知慟所從也距其生某年月日得年才四十三嵗己巳邑士彚君異行陳諸督學使者乃列祀鄉賢祠大夫士聞者鼓躍若有勸焉且曰月塘君雖未仕官其視仕官而未能蒙俎豆其間者以彼易此其所樹豈不逺哉己卯君仲子仲聲與計偕乃邑人士又相與嘆食德之無既也子二一鴻庠生娶某氏一鸞即仲聲娶某氏孫某二孤以某年月日厝君某山某向之原殆今墓木拱矣一日同㑹友王有訓謂直曰或有疑君布褐士不宜埒仕官者並莙蒿也豫曰噫鄙哉言乎夫鄉賢者為閭巷砥行足勸也非以爵位為進退也今不爵位而祀不益覩公評乎乃反謂非宜左矣嗟夫君窮而早殞天也假令君而獲立文石出入乎禁闥則汲長孺之戅不阿也夫孰與君令君而綰符握篆宰一邑一都列乎嶽牧則龔黃之循政楊氏之却暮夜金也夫孰與君令君又進與起居注則杜楮之君舉必書也夫孰與君此非臆與也以君操執已然者可槩驗也矧君學幾自得祀不祀又曷為有無而世之勸于君者則什伯乎尋常矣詎曰祀非宜豫既以是解或人之非所疑也因綴諸志末不獨郭有道不慚豫言而豫至是始不慚有道也遂以是銘墓山隂陳雲溪先生墓志銘往紹興諸太史為言胡總督鎮浙時怙勢樹黨境內同年第者朝附門夕可磊千金産一時遂為風靡獨其邑陳雲溪先生不可招既强致一拜别迄無請間語斯非吾邦逴偉丈夫哉胡子曰子知先生偉若邦而未知其偉斯世也先生昔宰豫鄉之分宜㑹今柄臣父子氣焰方灼即八座握銓大吏已頥指若舍中兒其舍中兒出如建槖緹騎靡不辟易先生之始下車也乃令民曰豫受命為兹邑長若圮度干憲養蠧豐苴豫固弗敢其或附麗炎要從臾其私人為若庶草毒則亦無用豫為也若等其毋自貽咎咎弗在豫于是聆者凜凜趨繩約而柄家人故自挾唐突來見先生直奴畜之有犯輒撻治弗少貸柄家欲有私干禁弗敢出口人或危之先生屹弗以動不穀直嘗至分宜見分宜人曰方是時有督學使者乃與其舍中兒均禮至為生童行關說視先生何如哉又曰先生英敏絶世事至輒若觀火聽斷如流庭無逋事四境細民一詢姓名不忘初試練若老吏大小躬裁吏抱文屏立廡下若土木無敢出氣一時例賂為洗民間有公門如水之謠邑賦故重有黠胥習為富戶嫁稅貧民坐致殷富人莫能詰先生廉得其情箠殺于市乃遂稽研故籍釐正分數時斂平衡盡塞其弊孔民皆歡欣出賦不越期而輸自竣劇盜張安邦乘公出劫帑攫金既旋偵知縳至戮之自是盜絶庚子大饑穀價翔貴先生賑散有法又平糴勸貸所活至不可算既蠲租詔下然有先輸匿里總手者先生嚴示立令給還民始食實惠邑為孔道供張儓騶費不資先生悉取而令甲之節靡裁濫以身率先民大蘇息然其心要為民樹長利若厚士興文禮賢易俗葺黌宫飭公舍完庾藏繕杠梁輒曰有司分也咸以次舉先生涖政急民隱明治體固如此此豈可與沾沾譾譾者比哉乃其竟事未嘗以隻字尺幣與柄家相問遺以是柄家銜次骨歷五嵗臺臣交薦循廉為天下第一癸卯以內召應補要職柄家乃抑授南大理評事又令人隂伺欲衊之時先生讞獄亭疑又赫然有聲更五年不得逞已酉遂升廣東按察司僉事是嵗仲冬先生甫臨任次年首春以覲察罷去公論為不平然雖譁而靡敢言若先生者所謂終始秉節逴逴偉一世者非與諸君相與嘆曰嗟哉偉人偉人蓋先生以庚子與江藩外簾適閲不穀直三試卷辱繆題曰是將與賈馬爭馳驟者然竟不録先生譙讓不已監臨者雖直其言已無逮矣不穀直舉癸卯先生仍在場既見喜名薦猶憾未冠先生愛才至篤切然而不穀直非其人也自庚戌到今壬午先生家食餘三十年不穀直雖登仕然靡足為知已報稱亦既碌碌伏林莽先生冢嗣某奔數千里踵門告曰先生先年辛已某月往矣遺命志銘屬子又示以新喻張翰林所記分宜去思碑不穀直拜受相對泣下讀記首曰毁譽之興如沸湯故聽者淆是非之定如止水故傳者信蓋記作于先生去任二十年後諒哉所謂止水評也然不穀直聞南北有事時歐陽冢宰握銓遴才難其人仰天嘆曰得一陳雲溪足矣寮屬愕眙問雲溪奚在公曰是人以不諧時去久矣聞者益用為詘夫為政可以取大吏當前之遇不可以得丘民去後之思可以致有力九遷之榮不可以徼無意一言之重可以賈虛聲于崇朝不可以永實譽于異代此其得失多寡世必辨之矣先生諱鵠字某别號雲溪世為山隂人生正德己巳某月距其卒享年七十有一初娶吳氏封孺人生女一適庠生何景賢繼朱孺人生子四長即大縉太學生次大統以明經第甲戌進士令景陵能世其循政次大綬大絅庠生側室張氏生子二大纓大綺縉娶潘氏生子二昌言鼎言女一適某統娶胡氏生子二法言巽言女一適某繼花氏生子某纓娶髙氏生子三可言正言至言綺娶梅氏綬娶周氏生子某絅娶汪氏天於先生不膴其位而昌其嗣可不謂既定而勝者哉是故叙其事可為官譜表其人可為士型獨慚不穀直言不足行逺而先生固有自不朽者存異時傳循吏者其又誰能刋之為之銘曰洪河天倒滂濞訇激匪礐者石疇為中屹嚴冬氷雪凌弭摧擊匪喬者松疇獨秀植於惟先生稽山搆貞際彼昏瘃操柄以傾大吏既偃小臣若崩曷啻洪河氷雪崚􅜤先生挺挺獨行其志倨百里長抗三公貴黑蜧𤣥貙禁弗得氣發摘拊綏乃曰餘事休而懸車耶水之側垂三十春睥世弗屑邑懷其循朝思其傑芳猷穹碑百代攸煜曷啻碣石嵩松飛節諒哉循良灼爚史牒矧曰天定奕奕後哲彼昏者徒腥穢萬葉衡廬續稿卷八
