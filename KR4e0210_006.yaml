body:
  text: 衡廬精舍藏稿卷六明胡直撰七言律詩越王臺懷古陳帝壘高屯虎豹越王臺敻築琉璃壘邊暮脫黃金甲臺上春傳白玉巵禾黍幾年雲斾斾鶯花三月樹離離古今霸業空流水日月江山有所思春日覺山寺江亭春樹花繁覆紫苔春晴騎馬隔花來不禁江漲千尋媚正聽林鶯百囀回谷口人同玄豹卧仙源興逐碧桃開登臨未效東山屐且向芳亭送野杯秋日江郊讀書感懷簡楊虛卿羅良弼歐陽文朝王尚涵茅堂苔徑俯江灣終嵗幽棲斷往還村雨雙鳩啼白社林煙一犬吠青山短衣最愛秋垂釣長劍能堪暮倚闌弱冠當年憐賈誼天門涕淚不知難初春雪霽遊嫵姥贈謝蕭晴川先生有序邑西南溪之里處士蕭晴川先生豫姻家丈也春日挈遊嫵姥尋龍王洞登虎鼻峯訪陶皮之遺并相羊踰日且曰昔碧山學士焚魚讀書吾欲子藏修山隂之古剎可乎豫感其意未逮也因為紀遊兼謝雅誼遂著之篇危巒仙閣臨霄靄絶壁丹梯躡晚霞雪霽千峯回黛色春還萬樹落天花坐看北斗依南斗行踏金華指玉華願假慈光分半席應將文史載三車送胡仰齋工曹北上工曹舊給諫以言事左遷十年今召還赤旌悵望在樓船翠蓋留連向綺筵催栁暖風薰别帳喚花嬌鳥雜離絃一尊且酬東山月十載還瞻北極天明到金門尋舊侣幾人猶是禁中仙擬訪座主王吉水明府阻漲懷寄江城索寞抱春愁江草芊綿獨倚樓積雨正淹徐稚耒停雲空望李膺舟黃鶯選樹枝枝濕碧藻翻泥岸岸流淺薄自知非賈誼吳公門下負相求春日歐陽曰守赴試京闈有司以官舟送江光草色曉煙縈才子乘春謁帝京鷁舫行隨歸塞鴈驪歌聲雜囀花鶯天邊此去應題籍闕下何人共請纓山國故交長卧病瑤華莫厭寄柴荆龍洲書屋題贈康東沔先生兼簡伯子而正二首珠浦澄波淨逺天龍洲玉樹淡林煙亭依壘翠初疑畫人出深蘿半似仙鸂鶒羣穿銀浪浴芙蓉盡帶錦霞鮮可憐中有詞人屋鳥雜書聲度渚蓮二洞中丘壑霧隂隂樹裏池臺日月深竹翠俯連青玉案荷風輕弄紫瓊琴並行木杪花交面散坐亭臯葉滿襟雅興林泉君不淺月高猶共踏江潯龍州書齋新霽客至芳洲綺樹接江城曲巷回軒霧細生弱栁窗中銜宿雨遊絲水面帶新晴林花點草粗成字山鳥呼朋自有名卧病一春蘿徑滿君來時復掃榛荆石蓮洞雪霽年來洞壑即吾廬怪木幽藤共索居懶學子雲答客難直題叔夜絶交書千尋翠壁寒禽下三徑松林大士鋤不向巖頭看雪霽野人那記嵗將除贈蕭孝子思齊我愛城西蕭孝子引刀刲股對青天朝昏涕淚眼雙赤風雨廬墓榻獨眠古道久違荆棘路百年誰頌蓼莪篇中流健爾孤根樹旌寵幾時來日邊贈曽都諫韶齡已抱平戎策盛世長飛諫獵書豹尾久從仙作侣龍顔親奉玉為廬邊庭老卒知名姓天上耆英記起居豈為才猷凌絳灌蚤令經濟落樵漁答周上舍冠裳太學且歸來嵗月螺溪舊釣臺蚤向江東稱竹箭佇看天上跨龍媒堂邊古木巢高鶴戶內寒流洗落梅共道周顒非俗客移文應不勒山隈山中懷寄康明府龍洲龍洲近隔碧山隅洲水澄江似鏡湖漢水丈人提甕好漆園敖吏著經無池邊古徑門因竹松裏行厨飯是菰若倚寒梅吟白雪好憑來鴈寄玄珠下第登太白樓李白騎鯨天上去獨留飛閣切昭回百代光隂悲過客五陵煙月憶仙才簷前岱嶽連遼海窗裏中原入楚臺鳷觀龍宫回首盡浮雲休擬日邊來昭陽對雪口號示李生雲橫海嶠接天黃坐看飛花積素光地變方壺珠作樹身疑玄圃玉為堂那誇絶調驚三楚為卜豐年入萬箱綺閣郎君休訝冷鐵衣都護在沙場久客昭陽懷寄李石麓殿撰二首海上羈棲歸未曽嚴冬冰雪劇崚嶒三江去楫誰相禁五老仙人祇見憎旅館端居成淨土鄉書絶寄似行僧更堪回首青冥上迢遞龍門憶李膺二天上逍遙紫禁廬海邊吟望去鴻疏曽聞三殿開紅仗劇想千門迓綵輿起草應同東觀侣齋心好似曲山居明時次第為霖雨不羡周南太史書元夜西苑燈山代歐陽先生應制春回元夜敞芳筵萬炬千燈北斗懸闕下神鼇當四極苑邊列宿麗高天光催五嶽三山曙瑞作瓊芝寶樹鮮不是競遊花月好漢宫祠祀重祈年西苑恭覩三楊學士錫遊之處擬作二首天遊祕苑勝蓬瀛休氣榮光接禁庭綺樹千行承黼幄瓊峯四繞疊金城攀龍自馴雙頭鹿雜鳳遙聞百囀鶯傳道賡歌三相國錫遊那數漢昆明二欒欒寶殿臨瑤水簇簇琁臺漾碧漪花映綺疏天上出栁搖金堞鏡中移當軒松偃蒼虬蓋夾岸筠翻翠鳳旗借問吹笙還宴鎬幾人欣奉萬年巵贈楊憲長二首關西家世更誰過江左風流近若何豸繡行經天下半霜旌晚在蜀中多詩篇老去追元亮禊事歸來學永和自是山中多相業不妨門外更施羅二已看去國身如葉却為憂時鬢盡絲家近華陽傳玉珮步從角里訪瓊芝樓前水碧魚吹靜席上山青鳥過遲為問玄經曽草就肯令載酒共探竒陪大司成尹洞山先生遊三茅山觀池中小龍和作并以為别二首金門仙客歸天上却度華陽訪紫清一望車箱連太乙回看洞壑接滄瀛題詩丹壁雲為墨把酒琳宫鳥獻笙此去台垣陪紫極空餘吟眺獨含情二千峯回合有三峯一徑斜懸出萬松巖石巧如迎笑語泉流曲似引行蹤煙霞暫作山中相風雨來觀洞裏龍莫擬東山足嘯傲鸞旗早晚待臨雍飲曹氏園名園芳宴款春宵苔徑蘿溪度石橋日麗千花明水院天晴萬竹上煙霄烏衣舊巷今誰問丹洞仙君早見招江左風光長不負卑栖那復嘆鵬鷦興化沈山人逃羈子舊别淮海近十年春杪忽走京師訪今學士李公方欣款遘遽復言别作贈之客中相見倍相憐憶别那堪又别筵逃世已甘玄尚白還家應笑白為玄短帆淮水飛鴻外長鋏燕臺落日邊最是李膺留未得因知郭泰勝登仙湖上幽居為淮海沈山人賦德勝湖邊靜者居幾年高卧著玄書花間放艇通溟海竹裏開畦引碧渠已識乾坤為泛梗細看鵬鷃總拘虛非熊定作磻溪老皓首那能只為魚詠董原漢鑿白雲樓東西二牖和高李二君二首登高忽似出籠樊坐看千山繞禁垣溟海東來通太液崑崙西控引中原且從嘯月留官閣耐可披雲呌帝閽詞客有懷能作賦不同王粲憶鄉園二金門病客慚真隱粉署高樓得並娛正與白雲同偃仰不妨明月坐跏趺窗中野雀間相聚席上山峯暝欲無共道樓居生逸思擬將官舍等蓬壺送樓兵備入蜀建節朝辭出五雲離亭落葉滿晴曛樓船直泛芙蓉水寶劍行當虎豹羣三峽回旌連鴈度兩川吹角雜猿聞懸知緩帶西南靜司馬無煩諭蜀文陪祀天夀山皇家陵墓俯郊圻璧殿瑤宫啓翠微夾道峯回瞻鳳翥當階雲起憶龍飛山腰燈火連珠斗樹杪香煙散羽旗委佩松隂零露濕共攀弓劍欲沾衣朝謁長陵同宋望之侍御作長陵丹闕倚蒼蔥萬柏分行輦路通山出恆宗來王氣水連瀛海扈靈宫瑤階羽衛晴天外玉殿罘罳宿霧中却看羣峯如躍馬還疑萬騎獵秋風唐荆川先生視師海上奉贈二首翩翩瑤節下煙霄嵗晏關河朔氣饒兵法久傳黃石略使旌遙指赤城標雪中鯨海銷氛祲春後鮫宫貢薄綃薊北越南均報主勛名那羡漢嫖姚二軍師強起白雲扉海上還知卧翠微日護貔貅仍習靜營開魚鳥試忘機絲綸早已推黃閣去住身看著白衣行過荆溪棲隱處莫因蘿薜繫驂騑餞别余午渠憲副之閩川芳郊寶剎傍金臺黃鳥關關碧樹隈花下熊轓千騎出日邊豸繡五雲開共憐粉署論交地不盡青春送逺杯傳道幔亭連九曲登高想見大夫才秋夜郢中高比部席懷令弟民部同李尚寶况膳部張職方鄒比部梁中翰得何字新秋雨歇淨庭柯憶别其如明月何客舍幾回瞻玉樹仙槎好似泛銀河當筵草色寒仍緑近塞鴻聲夜轉多莫道難兄懷不極天邊長賦郢中歌秋日諸君枉集望西山得新字節物秋驚落木頻天涯冠蓋笑相親開軒列嶂嶙峋出卷幔流霞合沓新醉裏金門堪避世望中巖桂正宜人不嫌擊築延歡賞歸路遲看月滿闉送王鵝泉侍御之南臺四門博士有聲名繡斧俄看别帝京舊闕還瞻雙鳳出新秋遙見一鷹橫籬邊叢菊當筵發天際長江帶月明南過鄉關應計日須知攬轡在澄清同諸君攜咀别何振卿得翩字省中長和白雲篇物外招邀兩騎聨忽聽驪歌悲舊社不堪煙景入新年和風栁變鶯初合積雪庭空月正圓此夜相看須酩酊朝來五馬去翩翩寄王陽岡都諫蜀中夕郎南竄已經年更道西移萬里天巫峽峯巒疑仗過錦江鴛鷺憶班聨愁中幾夢燕臺月醉裏翻悲蜀國絃遷客好同龍卧日還將梁甫續遺篇春日昆盧閣同張侍讀張廷尉二公得文字旃檀曉閣氣氤氲鸚鵡林開貝葉文近接金莖承惠露平依玉闕捧晴雲西山障塞千重出南紀關河一望分别有客愁無斷滅寥天欲叩恐難聞龍兵馬判真定金吾執戟羡中朝半刺今看佐郡遙别意已傾燕市月交情猶記廣陵潮御溝垂栁牽離席候館啼鶯伴去軺共道傷痍彌海宇那堪三輔轉蕭條承命楚臬過淮隂驛逢萬夀節遙祝志感干旄遙夜駐郵亭萬夀嵩呼儼禁庭幾載金門藏姓字一身湖海信飄零徘徊暗憶南端月咫尺還瞻北極星淺薄自知違報主擬將吾道付滄溟穆陵道上懷薑廷善林邦陽王少潛三兄炎日相看去北燕秋風忽到穆陵天藍輿曉度千峯月松閣遙聽萬壑泉不用吹鐃驚鹿豕試看衣袖滿雲煙自憐行役生佳况回首西南却惘然辛酉仲春抵楚城初渡漢陽感思舊遊因記所懷去嵗尋春傍玉隄今年遙在楚江西城隅攬轡花相引漢口移舟栁欲迷逝水定從廬屋繞嬌鶯一似省闈啼神京故里人俱逺悵望晴霄月滿溪傳報廣冦劫豫邑之西南燔殺慘甚羅文莊公舊宅劉兩江先生舍皆為煙燼為之掩涕傳聞烽火照青螺舊國其如戰伐何四海盡看悲劍戟三江無處慎風波鄴侯書架空飛焰陶令家園遍荷戈掩涕不能重借問洗兵誰為挽天河同萬思節藩參各乘小艇泛巨浪取疾赴景府之役奉和一首朝隨疲馬赴嚴程暮逐輕舠不載旌一望漁磯慚釣侣共乘煙浪笑浮生鳳凰山近難移舸鸚鵡洲回且聽鶯鞅掌自憐頭欲白同官獨喜得同聲蒲圻道上覩疊嶂長松率爾會心遲吳霽寰藩參共賞抵暮不至留詩一首冥冥青嶂列煙霄落落長松夾路饒行部正聨雙騎好懷人莫聽早鶯嬌驛邊坐對梅花淨天外回瞻鴈影遙不得當筵傳白雪空令待月自相邀九峯寺中飯朝朝行役度巖峋中飯長依野水濵路出九峯連杳靄溪穿千樹失風塵征袍盡帶煙霞色官騎時參鹿豕鄰只為舍人還避煬白鷗休道不相嗔京口逢繼甫出示登太嶽詩奉和一首郢路何期得再逢旌旄遙自太和宫開襟已出雲霄上作賦還爭嶽瀆雄塵裏停車分石髓雪中移席傍花叢追隨欲踏岣嶁月其奈明朝又轉蓬自大荆驛山中至湘隂度林子口時因暴雨停驂田父家又暮夜傳言有虎朝遊七澤暮三湘把炬傳餐夜未央世路不須防虎穴客心終是倦羊腸暫投茅屋雲相伴側聽楓江雨欲狂詎是停驂能問俗祇令道路嘆劻勷晚宿嶽廟官舍同周生乘月坐松隂下挈朋晚憩青霞館躡屩先登赤帝祠宿霧濛濛常作雨清泉裊裊自成池林間月霽移松影巖畔春深長桂枝自幸向平婚嫁早與君唯有白雲期至嶽廟次日風雨大作因為晴禱詰朝果霽聊書志喜愁見淫霖結暗氛中宵遙禮祝融君朝曦忽送千峯出宿漲奔依萬壑分渺渺塵途那計日飄飄雅志已凌雲捫蘿直到晴霄上金簡先披大禹文午登祝融峯四面忽起白霧漭不辨下上豫趺坐石上嗒然與之俱忘祝融吐霧晝漫漫趺坐中天白璧壇混沌未經七日鑿妙圓那用九年觀元夷使者金書逈南嶽夫人玉液寒從此仙遊非世侣便應巖下挂塵冠觀音巖僧圓寧樓上中飯賦贈圓寧為高僧楚石門徒上人崖畔厰靈宫戒律曽聞事逺公招客只供羅漢菜翻經時引大王風飛泉出石成甘露猛虎參堂學小空來此不緣求勝果將因結屋傍岩東同周生宿南臺寺池邊旋轉暮同登樹杪逢迎見一僧信宿每從禪室慣清齋寧與世情仍中宵風靜聞天籟虛谷雲開散佛燈共道石頭傳法盛空餘巖壑挂高藤九灣坡已躡絶頂其上又有峯如屏千盤磴道躡層巔縹眇還驚碧嶂懸豈有羽翰生白日翻憐車轂上青天雲深岐路曽迷聖地逺村醪正渴賢此地從來添素髮頓令身世欲長捐豫以癸亥夏至雅之官舍雅素稱多雨四山隂靄鮮見皎日初秋稍霽夜月倍明不覺躍然如晤交時亭中牆竹砌花頗茂有會於心為之賦詩一首長途且喜趍官舍病客渾忘歷瘴鄉入座水聲連枕席繞堂山色晃衣裳青青竹映桁楊冷片片花薰簿牒香隱吏只嫌明月少今逢皓彩若為狂初秋登雅州三峯閣同李六臺和韻客心已逐大江東且向江樓坐逺空雲淡千峯歸盞底日高百鳥散林叢登臨轉益煙霞癖潦倒那思管葛功家傍匡山何處是秋風回首夕陽中余錦衣奉命鶴鳴山建金書萬里護豐隆絳節三山職事雄方嶽已承虞舜典仙源遙問廣成風鶴鳴雲際占靈境龍御天齊坐法宫擊壤别看歌萬夀應知夷夏盡呼嵩九日三峯閣和李六臺二首重陽登閣當登臺絶國風煙短鬢催檻外江濤連雨急尊前山翠接天來吾衰已謝周公夢客賦無慚李白才若使柴桑歸更晚荒蕪寧有菊花開二秋江水碧浸芙蓉佳節憑高旅思濃浹月雨霪迷九日中天雲破露三峯思歸只合隨飛鳥濟世還應起卧龍頭有黃花能醉客直將烏帽挂高松新秋對月有懷王歐及鄒耿諸子新秋客夜坐虛堂院柏亭筠釀早涼西徼自無鴻鴈到東山已過薜蘿芳銀河影挂千峯淨碧月光連一水長此夜不禁思萬里吳天楚澤共微茫霧中山曉霽登頂其上有飛霞峯明月池曉陟山巔霽色縈碧雲踏破紫雲生應憐石髓勞仙餉共看曇花隱鹿行峯出飛霞真作護水流明月足為盟滕蘭一去無消息倦客從誰問化城名山道中逢伍魚山年兄奉延紫府飛霞洞和韻為别别離長憶帝京春邂逅相看各愴神絶域論心鄉語合中年作客故交親扳留喜就煙霞洞歸去應為水竹鄰南往北來同燕鴈前程莫不寄雙鱗飛霞閣追陪陳蒙山和韻因懷廬阜瑤草空階秋自青碧霞飛閣帶昏星仙關已覺無塵想澤畔應知有獨醒坐久溪山唯落葉醉來天地一浮萍相逢等是煙蘿境斷望還思九疊屏陳蒙山官舍後新創小樓題曰瞻峨且云是東望之意也豫為書之而識以詩仙人早自好樓居縹眇俄驚百尺餘高揖羣峯當戶出靜看修竹隔簾疏圖書曉映流霞外尊俎秋臨落月初共道主人心獨逺峨眉東望接匡廬甲子冬赴松潘過竇圌山厯明月關俱有羅兩華題迹時聞兩華以貴陽憲長歸矣懷望賦此竇圌山外隔仙蹤明月關頭路幾重遙憶故人思故國且從高躅躡高峯千尋飛棧天為盡萬折危巒鳥不逢獨羡陶潛歸去早一尊何處撫孤松過風洞嵿望雪山兼聞魏南臺使君開府諸蕃服屬邊烽始靜感懷書此預簡南臺雪山雪自開天積風洞風如捲地回絶徼盡看無草木嶢關且喜絶烽埃應同列子泠然至不似王猷倐爾回共道諸蕃前負弩年來朝漢有高臺嘉州凌雲山寺覽蒙山憲副題刻和韻懷寄江頭巖壑翠參差洞裏乾坤日月遲三水煙濤天際渺九峯春樹霧中疑青幃正帶曇花捲斑鬢羞同石髮垂坐看皇人仙室邇思君那共采金芝登烏尤山山在江水中相傳龍所開有郭璞注爾雅臺清江幻出紫嶔岑傳道龍開嵗月深孤標逺與金焦並靜窟長含霧雨隂朝逐巖雲來洞口晚留僧飯返叢林爾雅臺空那復問碧潭流水契無心坐雙飛橋寺僧出孫思邈丹竈藥爐制甚古留詩一首贈謝楚山上人朝出叢林入洞天捫蘿越午到巖巔千峯合作蓮花藏雙水高連玉液泉悟後丹砂俱幻法行邊修竹契真詮闍黎不用重留偈小坐崖亭意已傳是夜宿白水寺相傳冬春積雪封山諸獸皆逺伏及春深鹿開山人始行春深傳道鹿開山獨往飄然歷九關齋閣只同雲坐卧祗林唯趂鳥飛還豈無散聖遊方外信有諸天異世間欲夢周公吾老矣楚狂遺迹似堪攀過雷洞坪自坪上有八十四盤險絶冰巖霧谷窈無端飛鳥真看絶羽翰五夜雷轟僧自定萬年雪積鼠長餐青羊已度三千界白象寧憂八十盤衰病欲從顔闔老無如此地淨開壇至光相寺是為絶嵿七天歷盡到天都獨立飄颻萬仞孤世外身心雙寂寞光中樓閣總虛無崑崙西出堪為侣江海東流見一盂莫道神燈俱是幻好從名利照迷途自峨眉還眉州陳蒙山丈從錦城以詩訊問登山辭甚清妙依韻酬答名山幾句望中登御氣乘風恨未能春日偶然成獨往閻浮從此不堪憑眼觀大地原非相身到寥天别有燈為問浣花溪上客幾時還得共鶱騰閲山圖擬卜隱適有學憲新命陳子知豫之不能遽釋也以詩見嘲作此解之買山為傍百花潭野水修篁似鬱藍飛夢幾回歸谷口閲圖終日憶江南舊疴自信三宜黜新命其如七不堪為謝羊裘終莫負秋風鱸鱠定抽簮送喻兵憲歸南昌美人東去望迢迢天際冥鴻不可招世路親經九折坂勛名重見七擒橋西山藥室依丹桂南浦雲帆挂碧霄只恐金屏名姓在豈應玄髮老漁樵甲戌春小葺衡廬精舍二首舍紱歸來嵗又除依然谷口舊名愚門前雙鷺疑相引坐上千峯畫不如阿堵只藏徐稚耒匡床時檢伏羲書為嫌故社猶喧聒更向深山賦卜居二衡廬南北地相交結搆逢春剪白茅甫里先生聊作伴華巔胡老自成嘲園荒擬種千桃樹閣小平依萬竹梢白鹿朱陵隨所往遲看野鶴不須巢西粵舊寮三四君皆一時名士偶因便風裁述昔遊萍聚當年三四君粵山回首賦停雲戈船夜共灕江度銅柱朝看漢代勛洞窈追遊天外出桂香把酒月中聞相思半為交情稔更數名材世不羣贈郭柏岡太守太守華堂開北郭玄冬綺席照南辰無心再憶童騎竹有道誰憐雨折巾江上鱸蓴應好在簾前蘭茝自長春更看種柏還同老雙鬢何妨總似銀冬日毛右軍自螺川枉訪精舍賦贈并寄訊耿符臺忽承棨戟駐江濆入坐飄然意不羣談宗絶似先司馬草聖還追晉右軍野外淹留唯餐菊山中投贈倚停雲還朝為報符臺客種樹年來當策勳曽二潭郡伯曽魯原中丞見和精舍小作疊韻為謝新卜未能歸五老故遊空復憶三茅却憐皓首初辭祿豈為玄經作解嘲螺浦春回芳草色武峯雲接舊松梢南溟九萬須公等莫訝槍榆獨徙巢雪中龍澄源節推枉過精舍乍覩瓊花入座飛起看玉樹映山扉白頭索共牆梅笑青眼欣瞻羽節歸松下何辭穿敝履江邊誰伴坐漁磯高風詎數王猷興仙棹親勞到剡溪茶泉廷尉新第成賦贈幾年弭節謝金閨新卜江成傍故隄廷尉高門應不忝輞川佳致並誰題堂開罨畫雲長潤徑轉回闌月欲迷莫道主人今白髮才名早冠大江西題茶泉廷尉雲舫樓參差華館接平蕪縹眇飛樓引鏡湖絶勝雲中行畫舫還疑海上出蓬壺窗臨南斗天無際幔捲東林烏並呼珠樹即看春爛漫不妨高論擬潛夫奉答大司空鎮山朱公致政還家二首幾人師保冠羣公更覩河渠繼禹功此日情傾三徑客向來才敵萬夫雄五雲繞映宫袍色緑野春連玉樹叢莫羡東山能著屐虞廷還憶舊司空二天邊劍履賜歸來江上絲綸亦快哉世路久諳同蕉鹿家園真賞勝蓬萊芳尊幾共求羊醉佳句還追燕許才出谷春鶯聲正好肯容乘月放舟回中秋日同楊仁叔遊武姥登禮斗壇坐月聞桂香經時卧病掩柴關佳節還登禮斗壇落木遙通江月白高巖細瀉石泉寒身間麋鹿真為侣髮短雲霞已製冠坐愛天香移永夜年年來共醉中看六十生日避客嫵姥懷有訓虎鼻峯頭獨振衣龍王洞口御風歸正慚伯玉能知化曽共壺丘學杜機山靜絶聞羣雀噪天高遙見一鴻飛澄江回首真如練悵憶玄暉倚石扉戊寅冬再至石蓮洞余别石蓮十有六年去先生之逝亦十五年是冬負篋躡履為久住計所慚慨非一端也久以沈病不欲多言重感嵗月聊題數韻石蓮夫子去無還邈矣何人更叩關久别林巒知竦誚重來松竹似開顔泰山頽後吾安仰威鳳翔時世莫攀姑射重傷冰雪窈獨看明月滿高巖洞中雪後聞虎青巖為屋石為扉雨雪三冬客未歸一卧洞天傳辟穀獨留虎穴學忘機石中慈竹娟娟淨草裏香泉細細飛文史自憐吾未得雲山隨處有皈依秋日田間今嵗春田大半非秋田猶喜豆苗肥歡同禽鳥呼朋出行趂漁樵共路歸木落似延山入座霜寒曽製薜為衣農家濁酒堪忘世不為長生始息機仲冬尹鳳湖參軍過顧留宿殘冬那得似炎蒸驀地寒飈雨欲騰晚霽却看天似水夜深還見月如冰歡迎佳客留三徑坐挹高談勝百朋舉世交情金馬貴如今風致幾人曽辛巳春日泊舟神岡有懷見臺中丞因憶東坑之聚乃挂言者之口為之永嘆春風吹雨暗江城東望停雲曉霽生惆悵昔同玄豹隱沿洄今聽早鶯鳴石蓮衝暖花應麗雪浪橫江月自明誰道大鵬翔既逺猶煩羅罻重含情楊乾叔新搆其先君武東銀臺有作因追和之以贈乾叔師垣第宅國咸休奕奕銀臺世作求傑閣好藏先帝製高堂曽共故人留蘭蓀九畹浮佳氣華武千峯擁上遊最是後賢能肯搆關西清白自悠悠衡廬精舍藏稿卷六
