body:
  text: 衡廬精舍藏稿卷二十五明胡直撰墓志銘觀復王君墓志銘今世之談學問稱質有其行者良難以余之寡昧近取諸鄉逺訪聞於江漢嶺表海嶠其在黌校之間蓋有人焉若東海之永嘉王君其一也君叔父諱叔果今為兵曹世多稱賢又雅言君賢已而得讀君仲弟照所為狀益悼君不可置君諱勛字某少寡嗜弄目無游睇既十七八遂志聖人之學獨有得於孟氏之先立乎其大者且言本朝陽明王氏之推尊陸氏誠有獨契其揭云致良知者與其本心之㫖合蓋皆出於孟氏俾聆者反躬即得不至泛濫支離之弊遂手輯象山語略明其非禪而與晦翁晚年不相二者在此補邑庠弟子員為舉業貴意鬯屢試髙等君故業禮經以今業者傳訓故不達其㫖乃獨研求作者精意至儀章度數眇忽骫骳究其㫖歸乃已既後讀易至復卦則又渙然嘆曰惟復然後識良知之真體所謂儀章度數三千三百其莫不繇此與遂自號觀復子君沉毅莊重然與人居無城府數犯不較事父母戀若嬰兒教羣從弟子鄉人反復嘔其肺肝下臨臧獲終身無詬罵聲讀書至深夜雖盛暑不䙝服倉卒不作草書郡守洪公檄行鄉約首族人習禮衆感其勤慤皆樂為盡鄉閭觀而化者翕如也讀書半山十年雖手不釋卷而日不輟逰有終焉意嘗曰使吾老是山令所學有明於吾平生足矣而丙午夏忽遘疾遽謂家人曰吾將逝矣向八載前吾夢與顔子同壽今期至疾作其能久乎越數日又曰豫雖蚤世遺孕當子是天不絶豫者又十七日曰豫將以丙寅終已而乙丑日夜半介在丙寅竟卒卒之時矚弟照曰善事老親吾行矣奄然而逝訃聞貴士寒畯莫不痛憤涕洟者先是半山巨石夜崩比君卒人咸以為賢者之應邑士遂托遺行請於督學雷公欲列祀鄉賢繼請阮公二公遂為榜其閭旌之或者乃謂君無名位且夭又莫得名賢者為傳諸後於乎是不足以語君也古之人曰死生亦大矣而君獨輕若委蛻不少概於慮已幾乎知幾而神者名何足云名何足云使君不蚤殞則其質行不詭雋哲獨詣必能使斯道有明何啻彼之鄉族人而已此吾所以悼君而不已也君祖某父某母某氏娶某氏遺孕果生子某以某月日葬某山兵曹君使來請銘遂志其事而銘之曰悲王君乎有閼者形不閼者神靈珠淵墮復以返於真璇樹芝草世不可以常珍維顔有卓陟降帝庭既嫓其算亦幾其仁君無修短世曷戚欣巋丘千祀有道之墳鄭節婦張氏墓志銘鄭節婦張氏者慈溪勾章里人也生靜慧父某授論語孝經通大義許聘為里中鄭秀才煥者妻秀才方弱冠應解試不第嬰疾歸久弗愈親族議曰秀才年少才雋視無前今乃鬱鬱後人此病所以劇也於是求以廣秀才意者因請期迎婦廟見婦父母難之兄嫂以告婦愀然見顔面已而泣曰女業已許鄭家矣今病劇修短不可知吾奈何弗與面乎父母感其言歸之既歸而秀才病已革侍湯藥衣不解帶目不交睫越信宿秀才絶矣秀才之未絶也持婦泣曰吾死天也爾以我故至此如盛年何婦泫然曰君與妾皆天也君今且短世妾恨不得相從地下乃顧吝守死終身耶妾志决久矣君無虞也言已秀才竟卒婦撫棺哭不欲生已而絶復蘇者數矣逺近弔客聞皆悽惻涕橫下不獨慟鄭生而更慟婦也比禫歸寧母哀其少將别議婦知即號哭祈返夫家泣訴姑曰萬一吾母終弗諒吾必從吾夫地下死不憾矣姑亟為慰止繇是兩家知婦志卒不可奪也遂成其節行云婦之得已志也嵗時不御綺麗孝敬勤朴終舅姑世皆為人所難能而舅之從弟長沙守某憐之乃為擇猶子中賢者令子之而以時周焉既長沙君捐館家益落婦率子媳茹苦習耕織意淡如也已而嗣子某亦逝獨撫其孫儒令修舉子業時婦已遘風疾積羸且卒蓋嘉靖某年月日距其生天順某年月日年八十一葬某山有司請於朝表其宅里而余同年鄭君卿者婦之從孫也又以其從父某所為狀請余銘其墓余曰噫古稱貞女明白之節有矣然自童逮老若鄭節婦者蓋古今千百人一二而已為之銘曰伊其貞哉將上薄於青旻翊彼坤寧滄海枯為桑松柏摧為薪有皭者靈行乎涬溟濯濯輷輷歷千億祀而恆晶熒余焉用哆而銘封宜人羅母蕭氏墓志銘吾邑西岡羅文莊公家範有栁氏之嚴閫內憚之獨其仲子太守君珝配蕭宜人事事祗慎當公所矚宜人諱妙華性慧通書自韶齒入門即能簡服御涓簠簋宜室家其妯娌臧獲之間雍雍然悅也酒醴胾羮醯醬米鹽果飴篚匜靡密事井井然辨也字畜紡績浣紉劬劬然躬而時也公曰是能不墮吾家範者繼姑李夫人年相埒宜人事之終身恭順太守君仕光祿贊督府性貞介肖公宜人為扃內户無令有㸃既守馬湖曰吾倚宜人能事公也繇是得篤修官針稱良二千石者宜人力也始用光祿推恩封孺人繼受今封制詞兩稱賢婦縉紳家咸榮羡之子男三份企似女一適歐陽司空仲子鋭孫男二材楫孫女三以是知宜人母儀為咸備蕭氏先世自司空公以下科第蟬聮稱聮科里髙祖貫之為溧水令曽祖元憲祖珹以輸粟例授冠帶父廣為淮府典膳母大岡郭氏宜人自童孝敬最後事典膳公夫婦髙年尤備物而豫內子即典膳公猶子傑之女宜人聞豫內子將北歸日盻盻望之既歸乃知宜人以八月六日無疾而逝距其生𢎞治甲子二月二十一日得年五十有七而份兄弟又過豫要為志銘曰以是年十二月庚申葬本里龍塘之原丁山癸向豫內子聞之噭噭然泣也退而曰宜人之令模不可覩翔翔然思也其戚誼感動若此其他可知已遂為之銘銘曰人曰為婦難為羅氏婦尤難歐陽司空曰若蕭宜人不可謂稱也邪嗟難哉千春之遐欲稽文莊公父子家範峻潔視宜人此銘王母梁太夫人墓志銘嵗之癸亥豫歸自楚則聞王仲子有梁太夫人喪走而唁王仲子泣曰育仁以己未叨第出宰肥水過家為二大人上觴歡甚而吾母獨惻然出别語心竊疑之然顧視吾母健不忍虞也逮入官近三年私計得䝉貤典為二大人光寵詎謂吾母以壬戌六月之十一日暴病竟卒訃聞追恨别語又藥斂未躬慟不欲生然以家君髙年遂忍死還茲卜以某年某月某日奉葬於某山某向之原非得知言士為吾母昭揭其隱閼以宣吾悰吾寧恨死矣言訖復泣且拜出太夫人行狀屬之銘又曰太夫人生某年月日距其終得年六十有九子二伯曰某邑庠生娶某氏仲即育仁是也娶某氏女一適鳯岡廪生蕭某孫女幾豫同年都諫陽岡君為王仲子從叔雅曰克穀乃子者梁太夫人有焉豫蓋聆之習矣於是次第狀語而著之篇於太夫人系出長沙炳南唐兮濬源栁溪疏波廬陵宅婁岡兮祖燦侃侃飛英胄監判遐荒兮一峰白沙賡唱巨篇譜牒煌兮厥嚴曰奎世其誼範母則蕭兮笄歸東臯逮事翁姥敬恭昭兮桓桓厥翁為百夫特死冦桃兮室廬燔灼若彼喪風飄颻兮於太夫人拮据百千支鏬窳兮字畜績紡中饋有秩供祭旅兮姥延於疴內罄簮珥􅈤醫愈兮夫廬於墓憂虞毁瘠諭歸處兮彼東臯公性嚴以格訓子力兮程課弗逮色怒於室辭孔亟兮夫人于于贊督其子勤以飭兮延禮外傅手調滫瀡膚龜粟兮於太夫人為母儷栁婦儷孟兮慈德瀇漾含慶孕靈育麟鳯兮鸞綍貤恩焜耀泉扉不日羾兮封塋奕奕千齡之遐覩者頌兮外父蕭處士碧池翁墓志銘翁蕭姓傑諱世英字生而頎偉隆凖修髯故第之右池水洞碧娛之築其上曰舒嘯臺而性又喜酒時時挈客陟臺臨池婆婆然落落然引觴嚼客指示之曰碧哉池也豫樂之而號在是于時捾紳以下呼碧池先生既晚稱翁云上世自瀘源入國朝登制科者四世故稱聮科里髙祖貫之溧水令祖珹父序雖席先業傳翁漸約翁才足封殖然嵗取供伏臘辦滫瀡不覬贏餘與人絶甘分少趨急甚私唯義所在雖倒囊恐後或犯以非禮輒恀然見詞色不肯挫視世之淟涊干謁人雖貴膴蔑如也賔留輒引滿竟日不問家有無其賔於人亦然父性有度而遲翁獨敏捷父夙為懻忮者凌自翁有知始免伯兄某為邑廪生翁懼其佚業也百相左右竟貢為麻陽學諭嗟乎若翁者可謂豐於倫誼而眇於財利者矣母文溪康氏以𢎞治庚戌某月日生翁距其終為嘉靖壬戌某月日享年七十有三初娶童夭繼室鍾生女一絶愛之曰不畀凡子已乃委禽屬直曰吾期子後邑之先哲名卿貴顯次耳直至今碌碌學未聞道仕不禆時無以報塞方再解官適翁子朝選卜葬某山某向之原責為銘嗟嗟直固忍銘翁耶翁初未産子育姻家子曰朝祥後雖生選然室而業之不相甲乙厚可知已孫男某某選出某某祥出某某娶某氏為之銘曰世規穴金若抱榛棘翁獨引滿陶然以適世擁鳴珂淟涊孺兒翁獨伉直不阿以隨任似朱家不以俠揚達似伯倫不以酣狂産名家兮叶昌辰篤人綱兮鬯天真巋封表兮千祀宜子孫兮振振亡友歐陽生墓志銘豫觀世多言經濟才難然世非誠乏才世固有度踰包山才均剸犀力荷千鈞而氣吞九河者一旦試有司尺度纍黍不合則沉跡蓬虆歿齒殞牖下視漢唐士以褐衣叩闕及遇徵辟至列顯樹勳照後世者其事大相萬然則世之異才不多覯既覯又以尺度棄且死何其悲也嗟嗟以豫友歐陽生之才度與氣力居今時既不得合有司尺度假令在漢唐亦自不屑叩闕之事歐陽生固庶幾哉三代遺英矣乃亦終棄且死豈不尤悲與歐陽生者昌名蜀南其號家世賢科甲邑中曽祖某某郡守祖某監察御史父鑑齊先生某刑部郎中母為文和尹公孫以正德丙子生歐陽生生自童頴敏五嵗授書十嵗攻詩賦時侍御公以文著海內因生文日起遂字之曰文朝十三補弟子員縣令吕公濮陽人讀生文曰是當為名士督學使者舜澤蘇公亦濮陽人試其文髙等補廪生先後偕故通政使楊虛卿氏今廷尉王尚涵氏暨豫六七人者咸均硯席兼治古詩賦最久且密則豫及尚涵氏咸兄事生相期許以古人有無通共邑中談交道必推轂豫三人者以生之誼激深也方壯偕豫與曽思健氏事其族祖文莊公問學十年汰其宿嗜既强又偕豫與有訓氏事羅文恭公三年浸入於微雅曰學無踰髙逺躬行孝弟先耳事二親先志為悅從父被難傾資援救輯睦一門雖內外貴賤秩秩如也相惇愈愈如也鑑齊先生守廣德生携一僮步省官舍人莫知太守子先生意故倦游生輒贊成遂築堂曰愛日其知者謂生與先生父子間以道交相成不諒乎哉不諒乎哉豫既從仕越十年矣思老母逮生不置遂告歸豫歸以丁卯春生特顧豫持豫泣曰吾欲俯仰無愧子為吾書以相究豫遂書之七月生當貢期忽病痢遂困至殞年五十二訃聞無論識不識莫不浩痛雖市儈咸䀌然傷曰城西殞者真君子也嗟嗟生曷以致哉生天性廓達不設城府又益以問學湔滌世態其遇人情而有禮飲其和者蓋欣欣為傾矣讀書茶山凡三十年山鄰人相習狎賑貧拯溺一呼倒槖蓋待生而舉炊者凡數十家隱若保母然平居憂時愛國見之詞色開口論天下大計輒能破膠見中窽綮雖久涉世途者不能絶也嘗見生值紛拏艱結或以事請解者立剸决厭人情辟若游刃而批大郤有餘地先後邑侯至為請益質疑一不以義則生不假色詞以故邑縉紳莫不悲生經濟未試雖然豫所為悲生者詎止是豫又聞生方病革王有訓省疾生目逆而笑曰死無憾獨憾不終二親養或時呼豫名悲哉豫負生負生豫曷忍言今萬厯改元某月之某日鑑齊先生厝生六十一都銅家莊癸山丁向祔母尹夫人之塋又手述行誼屬其姻王信卿撰狀委豫志銘豫以為使生用當時其才度氣力其為救世之業特若窺左足出閫限外耳然世終莫得知及豫歸將與生相究繕其身以俟後世生又棄去悲哉豫負生耶生負豫耶豫曷忍言生初娶王氏繼陳氏子四伯斯敬增廣生婚王尚涵氏女側室陳氏某氏生敏聘王信卿女紋聘張淵女女一聘張海子孫男二一黌聘康汝良女一舉聘蕭某女生終豫既哭以文且作悲憤詞今又為之銘以復於先生銘曰世言銅爵必徵歷塊世言琥珀必徵拾芥惟生之為才不假徵而諒其槩辟彼楚梓雖靡匠石度必為梁辟彼崑玉雖靡追琢度必為章於悲嗟哉罔試而折世乃誣乏才猗其學身抑抑兮志嶽嶽世標表而道郛郭闃已矣乎長之天不憗遺摧幹而毁璞追疇昔兮莫從倘九原兮可作敕封賀母劉太孺人墓志銘曩嘉靖間豫客留京同年賀伯子為兵科都給事適島夷內噬兵帥無統幾撼留京賀伯子為言于朝始建制帥控馭三省終獲底定人以是偉伯子伯子曰是涇母督訓殷也退語豫曰涇母訓云若言官也慎無以老身逭報主大誼涇敢不勉于時伯子方以最上闕下貤封劉母為太孺人而薦紳間浸知太孺人母道為今時希覯豫固心識之踰二十年太孺人年八十有五考終命伯子走豫山中雪涕屬銘豫曰是當紀史氏豫曷庸辭太孺人諱某系出金竹冠纓名族自童婉嬺父某母某氏相攸得龍岡公既歸事姑髙孺人獨以恭慎當意姑怒輒悸伏伺稍間徐進甘言即解姑每歡然語所親曰賢婦賢婦時龍岡公遊庠弗問家孺人時脫簮躬紝以佐弗給始公負才名登鄉舉纍上春官弗第太孺人輒贊就銓選為養于是乃勉就銓得耒陽令再補麗水以方介忤時改應天府教授太孺人至鬻衣支旅費意恬如也公雅志姱修繼獲聞陽明先生致知之學鋭志以古賢自期太孺人靡不奉意以行故公得歷稱循吏蔚為儒宗實本內贊之力多也嵗丁未伯子成進士纍官至藩參憲伯太孺人時時舉龍岡公治行具言之且曰若寧負君父哉繼從子沂典郡牧從孫一桂官御史季子沚繼舉于鄉太孺人咸訓若伯子而賀氏一門官針遂踔踔擅郡望初太孺人已舉子輒又贊取側室張而睦若娣姒時已貴盛猶身衣皂綈嚴飭帷薄性最喜施絶甘分少至倒囊焚劵弗吝又逮下無猜人自弗欺談者謂太孺人婦德母道豈獨今所希覯雖古弗數數覩也其他細行蓋靡得而悉舉云既終雖疏逺者莫不悼痛生某年月日殁某年月日今以某年月日葬里中樟背山金鈎形首癸趾丁於乎天之報施太孺人可不謂純嘏令終哉為之銘曰璆琳菌芝嶜岑耀世孕必靈巖蒼虯綘螭雨澍下土産必囦潭顯允德門繽郁名哲人曰烈矣疇知聖善之為則猗與賀氏繩哉繩哉百世靡竭平樂府節推劉公墓志銘吉水龍山劉公以萬厯改元癸酉終于南洲里第其孤子韶子武涓甲戌臘之十四日奉柩葬西槎灘山之陽首乾趾巽蓋公所自卜稱吉壤云先期二孤持曽君于健狀走豫涕洟交下言曰昔先師羅文恭公語先府君吾兩人莫逆誰後死當為銘詎知師先往府君雖未逮銘然緦服茹蔬者月餘而今則孰銘先府君耶今不得師銘得與聞其學者銘其墓以昭永世甚幸故敢以纍子蓋豫嘗就公訂學而又偕二孤學於師門者也銘曷辭按狀稱公諱方興字東望號龍山始祖廷尉平由新淦來邑之南嶺再徙粉溪仕宋代有聞人國朝永樂丁酉鄉舉教鄲邯者是為公髙王父曽祖樞安祖大烈有隱德父文鳴號竹齊甫貢卒公竹齊公第五子也公生而修癯音吐洪鬯兩眸若炬竹齊公自憤不第不督公業舉至年二十一室楊孺人始從㬰治經學文踰年又從其伯赴館九江鄉先生廖憲副竒之迎教子姪而文遂蔚然尋補邑庠生試輒髙等然非其好也是時母楊夫人在堂公能率昆仲娛養以孝稱楊夫人逝公獨哀毁血症已乃聞陽明先生致良知之學心竊慕之訪其門有雩陽何善山黃洛村二君得先生緒論公遂走正洛村得讀傳習録憬然從事而黃遂以今興安令子褒從學為久要既歸則又走師鄒文莊聶貞襄二公而志彌篤矣已又偕先師文恭與周七泉諸君為玉虛之㑹同㑹倚以興立嵗嘉靖丁酉始以詩舉于鄉尤喜讀易故三試春官俱以易甲辰落第就選授廣西平樂府推官平樂當孔道又邊府江冦窟號難治公至適掌郡事而當道遽以兵相屬公為清賦讞獄撫猺治兵靡不斤斤然舉暇則課諸生語以學郡産蓮酒公既絶餽且不應索自是酒不病民囚有以四命抵一人死者久寃不服公竟辨釋其三梧州有白晝攫人殺行商於市疾散而莫知犯者遂坐居民濫逮數人公心疑之乃微行亷得凶首而數人始盡釋其亭疑雪寃類此故一時有劉青天之稱公天性嗜廉喜淡居衙𬞞食家人習之每承檄行郡查理帑藏叱例金各餘百兩繇是浸為同官忌一夕楊孺人夢人畀公弓矢且曰好積隂德即休官何傷以告公公方念諸兄淪逝夙有去意聞夢欣然亡何兩廣督府張公議征螺石黃峒等猺半屬賀縣特檄公署賀以調處軍務公涖賀不先理兵惟急疲民省供縮費釐正賦額禁絶包侵仍條刻家給以示永利民大歡悅而軍政亦以振舉且密計峒賊出沒鄉道分哨戰守糧粻舟楫咸豫且贍蓋不遑寢食者三閲月明年大兵數萬至賀民咸若袵席過師又能指山畫谷不遺尺寸張公大韙之藩臬籍籍推竒略云既事竣唯遁一賊首誤傳匿良民姜城村總兵監軍各帥咸擬移兵屠絶一村公抗論曰因一賊而欲殱良民數百以立功某寧死不願聞也議遂寢諸監帥積不能平又嘗忤謝督學因共排之公笑曰弓矢之夢驗矣遂力求去僚屬士民攀留不得道經名勝輒登覽賦咏以寄興意先是二孤為公卜隱南洲公歸大愜遂移家焉自是正祀訂譜丘隴社倉咸次第就理又日持子姪從先師文恭合舫聮車大㑹同志猶夷于雪浪石蓮青原白鷺之間罔間嵗月又常遊匡廬如安城無不偕之及退則謝客捐書對聖像晝夜默坐動踰半年又好樓居既靜久忽若天牖洞徹本真不參人力證諸經書靡不合㫖辛酉避閩廣冦寓居城東適佐先師清賦籍議賑濟咸井井可為後程隆慶丁卯公七十有四時文恭已去世四年矣公語諸孤曰吾後來日月有幾恐虛此生復杜門南洲孝友堂靜中有得或援筆書之其言曰妄念者邪欲障也意見者理道障也不學則都歸妄念既學則多增意見二者為心病則一焉孔子曰吾有知乎哉顔子屢空詩稱文王不識不知正謂無意見之知云耳公論學精確若是者多矣特姑記一二云居林端二十五年未嘗一千有司裳衣幔褥蕭然故物意所蓄一話不能茹必吐乃已竟後猶然而性又善忘故文恭謂其學得兩忘以陽里華子方之公自贊亦云蓋所自得者有在也生平無他疾先年除夕飲歡甚告子姓曰明嵗恐難得老夫語笑矣明嵗二月腹左積塊漸長太常曽公以醫來笑曰吾須醫耶蓋已口占有易簀之咏至屬纊慨然言曰吾心地光明去好去好頃之目且瞑矣實六月初八辰刻也嗟乎世之綰紳先生從結髮操舉子業逮長宦成輒曰身事酬矣疇不謂學贅若龍山公進好行其志退克茂所修其庶哉易所稱進非為邪退非離羣者矣觀其易簀屬纊之語則亦豈罔生者能測識哉第慚豫銘公不逮文恭足重且逺也雖然詎可已哉銘曰嗚呼世珍鏤氷棄白璧兮維公乎弗揚世寶康瓠棄周鼎兮維公乎早藏踔哉達人進不為邪退非離羣亶與道而翺翔昔蘧瑗左右吾夫子兮公千載其頡頏唯屬纊飄颻遊元化兮洵幾幾乎死而不亡銘兮其曷彰勑封張母廖安人墓志銘方廖安人之童而膚也父晴谷翁台愛最篤恆曰是子必嫁官人曷忍與凡子年及笄卜壻罵富人不與婚亡何翁弟永州同知言同水部張公峯上春官適水部失元配劉遂許安人繼室報翁翁欣然嘉靖辛丑水部公筮官令南海南海巖邑附㑹城最號難治安人則能佐水部成廉政嶽嶽有聲稱己而贈君石坡大夫終宦邸至不能辦槥安人方冲年遽解叉珥應辦事聞上官給助乃免叉珥水部免喪補令江浦安人相從甘節如從南海入子夜猶督治女紅不休水部判應天府陟治中晉水部尚書郎列官駸駸起矣先是以最貤恩贈石坡翁如已官廖氏封安人水部致政廖安人歸首翠鳳之冠肩雲鷺之帔棣棣煌煌拜堂廡間父母歡曰向使婚富人子寧有今耶安人始歸張也嚴奉丘嫂儼若厥姑水部故從王歐二先生學聖賢學喜延四方同志士安人辦治惟所命兢兢不敢後可不謂難乎安人曽祖膠州同知鑾祖仕父為晴谷翁取劉綱太守孫女以嘉靖甲申子月望日生安人距終隆慶己巳酉月朔日得年才四十有六生子憲卿補國子生恆飭令自樹故憲卿能世其家學雅亦從余遊女一適羅文莊公孫庠生雲書劉安人所出子二孝卿忠卿孝卿早世忠卿補邑庠生側室徐生子慤卿安人字若已出前側室孫生女一適廬陵王魁南孫女二適顔學龍庠生陳杏忠卿憲卿卜今年九月十三日奉水部命葬安人于同鄉第六都樟塘里艮山丁向以余為水部宿知乃介其姻家十洲尹大夫撰狀乞為志銘為之銘曰猗滄海乎明珠偉名閥乎良因翊夫子乎廉循飭嗣子乎席珍樟塘之水乎沄泓萬有千嵗乎含靈融乎溢乎衍螽斯乎繩繩衡廬精舍藏稿卷二十五
