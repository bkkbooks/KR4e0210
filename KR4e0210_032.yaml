body:
  text: 衡廬續稿巻二明胡直撰序贈余曉山郡侯入覲序内江曉山余侯以職方郎握符來守吉郡凡幾月例入覲郡僚貳守馬君通守孫君曹君節推茅君則以書抵胡子山中曰今守令蒞政淺者多無足以稱大計以天子有問治状無為獻今侯則不然侯始至語寮吏曰今之言吏治者恒外而不内不知此堂皇者固千百里之總萃也堂皇不脩則狐䑕憑廟社賈威福而射工之巧伺而恣噬也詎論且暮哉故其首治以身示型詰朝出踞堂治公牘爰書必親覽裁條教嚴簡訟訟毋得株牽其他蠲苛剔蠧削冗節靡一視令甲加宻一出必扄鑰郡門吏惟内辨文若抱氷霜迄不得與民相比為奸吉故喜訟繁盜至是則訟盜若喪窟宅而害立減侯故嚴重寡言然實惇大不設城府遇寮屬屬屬有禮愛士好文適學使者至校文侯則為士談經析義未嘗不載色笑亹亹乎言之也以故吉士文稍振頃得連袂冠省試葢吉前守為今監司楊公亦西蜀人楊公之政既偉而侯實繩之若乘春發榮至夏日而蔚然茂矣侯持是足獻天子某等念無以表殊政彰寮誼故以言累子胡子曰然夫駑馬十駕不能百里騏駵一日歴塊而越數都寧論久近往予督學西蜀侯方綰髪闖庠彦且從故少保趙文肅公學比予復柄楚學侯已踰冠登第為楚理官于時侯政稱㝡方佇内召以年例格遂補職方當此時天子已悉侯名姓矣侯之上計也果奚以久近論哉予嘗校楚士文借證于侯侯列粹媺瑕纇精及髮末時時出人表予以是知侯鑒天下事當若是精深也又嘗與侯登泰和之重巔裴回指顧頫秦晉梁楚咸在履舄下浩然若有凌厲六合之意予以是知侯之并包兼蓄當若是閎大也若諸君子之覩侯果得其粗且細爾侯今獻天子必問何以終治吉必且對曰臣不難為龔卓臣嘗學于師有所受請上之可也至是而侯之精深閎大者始可見崖略矣雖然斯非乆道不可以成是為贈贈賀毛白山公八十夀序世多稱古今人不相逮豈其然耶然予嘗求諸今人有能伯仲古人始不假型模而終相肖似者或千萬衆始覩見一夫或不啻千萬衆即通都邑不克覩見一夫此不知其何也然則以今肖古誠有通都邑不覩見一夫者則謂古今人之不相逮未可名誣也自予踰冠耳熟毛太保公之穹秩顯烈四方士爭躡屩曳裾頌道聲光者不可勝道其冢子白山先生矯然若獨翔寥泬略不以家第世貲滓其腹臆既早辭廕典矣又以先代腴業重器咸遜二弟曽不少恡生平不治生産剗跡公庭退與寒畯畸士㝡下劣者為埒予時心推高之己而辱與先生之冢子世卿同舉郷書以通家子謁先生一見迄無城府就問語出腎腸衣履皆皂布其製皆循𢎞治以前式範體若不自勝行必循牆迄未嘗御軒葢見者不知為太保公子予未嘗不􅋏然慕己又十年世卿世其高節遂謝南宫専侍養左右先生灑然曰兒不仕當為居守吾欲效向平高步四方君乃峙貲恣先生之所如往既涉吳楚歴中原乃抵京國予聞而叩寝焉覩先生皂布衣履猶然故𢎞治式也訊其來意則曰吾以是自適其適焉爾矣吾焉知京國予間為朝士言咸為􅋏慕曰世寧有是人哉有物色之者則已行不知所之矣若先生所謂通都邑未有見是人者也謂先生今之古人非歟今先生年且八十仲子某手其内兄中丞曽公之書抵予曰以子世誼必欲得一言祝之予以為紛華盛麗之蠱人心雖賢如子夏依歸至聖猶待於戰勝况其他乎故古之尊生者曰不見可欲使心不亂乃若先生累乘纓冠即襁褓宅紛麗之都藪矣然而天植其樸至與年而偕盛是古之見可欲不亂者之儔也非亂而後勝者之可擬也然則先生之為尊生葢有道矣而奚俟祝予獨慨𢎞正間衣冠耆舊僅有先生而世之競紛華仰機利者如日方新摵摵然若據氷山而鬭火宅其為身與後豈可恃哉視先生之沖然内適交食交樂有道以尊生有穀以貽孫子其事之勞逸享之多寡豈不亦瞭然辨之也而今之人胡為彼不為此予既驗古今人果不相逮而猶幸覩見有先生也故為祝願先生不獨長年将永為末世型模且以復中丞公刻陳兩湖先生全集序夫色以養目然而使之日親盛麗則眩味以養口然而使之日饜滫醲則害君子之於文也亦然文之生以明道而次為述事古之述事莫如書書雖以辭顯而亦未嘗不匠意以鬯乎道道鬯於意矣辭從而将之未有不鬯于意而獨主藻辭以相雄也是故苟知色之養目則三英九華非不庸之乃不如紈素之為常也苟知味之養口則八珍五齊非不庸之乃不如稻粱之為常也苟知文之明道則剞劂瓌瑋非不庸之乃不如辭達之為常也然而世既主藻辭矣又特聖司馬子長而剽獵其句字不敢一詭尺寸其極則盜哭為悲借笑為歡俗下其意而矜高其詞至艱詰不可讀陳之則上不知所明而下不知所承葢非獨以病道亦以病事彼見不襲句字而表裏古人之精神者反謷訾而詷喝之由今之道而欲求得古作者之本㫖則何啻千里予邑陳兩湖先生弱齡操時義冠江藩復冠南宫而偶不録一時若石淙浚川諸宗工覽之驚曰子長復出也當其時先生亦方推先子長即目無東京焉有唐宋今如集中遊仙顯政諸傳自時之藻辭者觀之孰有如先生之不詭尺寸者哉既登第官翰林雅善同郡羅文恭公又與毗陵温陵二君者友昕夕論文間及子固先生伏讀嘆曰是獨能表裏古人之精神為言者也吾今于子固乃益知子長今夫子長雖未知道然當其遊齊浮湘南窺㑹稽固已有攬結宇宙之逸志矣故其述八書等篇意匠自出咸有本末此豈可與今之工剽獵者言哉于時先生文為之一變持論造意大畧類子固而祖述未始不之六經而變化未始不之百氏而以平澹雍容發其剞劂瓌瑋雖不色澤子長實未始不之子長至其神穎絶出博極羣書搦筆動數千言瀇瀁磅礴引物連類不爽毫芒則又其天稟獨擅雖同聲者不能以不知傲也况其他乎然先生大㫖要在翼道豈亦猶古之佳公子者日御盛麗滫醲而厭之矣又下與布蔬者均饗此其志意非苟而世之崛起詞家者方拾所唾棄若欲以腐䑕嚇之一何其度量相遼逺哉然則語先生於子長固所謂議乎其将而拘拘焉以子固言亦未可謂深中所撰矣詩曰左之左之無不宜之右之右之無不有之由是推為兩湖先生之文可也先生孝友天至立朝㑹遭權奸不能安其位既歸益肆力所學葢其始遊於鄒文荘晩與文恭切琢為多其行誼詳同邑曽中丞誌銘中子太學生某庠生某等世其家學亟輯先生手刪龍津原稿合其詩凡如干巻為全集付諸梓以予辱先生忘年好而屬之序予喜得先生文示當時俾知先生今昔之所操趨則可以較然於所從矣乃不辭而序以發之送鄒汝瞻召還北上序初汝瞻氏從予遊予視其器逺且恬既登甲以言事謫戍夜郎過家非獨予勁之即孺兒子莫不詫竒節三年假歸方間闗無鞅掌態人服其度屬者䝉恩賜還旋有召用之命又走予辭而北上予締觀於酬應注措間而重偉其才葢嘆之曰夫古今非才則雖有夷由之節曽史之行亦無能大濟于世何則以無為将之者也予幸今日見有子才葢凡四見汝瞻而四異已而汝瞻論學則自擬貴大而又在識仁予益喜汝瞻之才之出於識仁非世之擅剸割揮斤而哆張之者之為才也雖然識仁不易矣世儒者多不得其故問其所由則推本之曰吾與人物同得天地之理氣為生是謂同體嗟乎此今之操翰童子類能言之然而疇見其同體于物哉且夫孩提至顓䝉而能愛親常人乍見孺子入井而惻隠自勃然生則又豈假反顧而後得哉是孰推孰本抑孰宰而施之是故得其所以宰則不下帶而天地萬物自我矣理氣自我矣而又奚屑屑焉懼其離也而推以合之又懼其混也而推以析之者哉今夫水以合水無弗合也然自溝澮而傾之渤海則猶有此彼焉今也不下帶而無不在我則以其本為至一而自不得以二之不假合故也故知仁則知一矣夫苟知一則非不器也而不以器見非不節也而不以節擅非不才度而不以才度専是則汝瞻之所以為大者乃實啓于微往汝瞻有同門篤友曰曽舜徵舜徵久未試故聞予言為習予與舜徵言微者數矣已而謂舜徵曰使吾心與斯言未一也則不待聲響消而二之也乆矣然則知一又豈易哉汝曕今來偕蕭希之去至都中咸朝夕舜徵以予言退相稽所以為微也則不患不為大亦不患不得孔門求仁嫡㫖且為語都中同志士無用以推測聲響求不然而自乖吾仁終身不復知一賀毛母李太孺人六十夀序方三洲君之與計偕也太保公適管握兵柄勲烈燀爚寵賚日有加天下士頌道功徳為公希豔祝無疆者併在君君且習聞先太守世業又躬親盛際視甲第勲烈則猶拾家珍耳乃至中嵗三上春官不第即飄然棄繻躬抱書從石蓮先生遊當此時君固以雲霞榮纓紱丘壑崇軒轝時時詠歌作為篇章若不欲有人間塵土氣石蓮先生視天下可與偕隠者莫在君右予時仕官鞅掌四方則以書訊友人君曷以能脱然若是也友人答曰君家大人白山公天性厭薄貴富君宿席風致而君内子李君實賛成之不然君且不免謝安石掩鼻矣其安能如志予以為家大人素偉丈夫宜然若内子罕哉又幾嵗予以書訊君有子否答者則又曰君藉李君貳室有子萬厯間予歸在田嵗必至石蓮時君已捐世且久而其友曽中丞公偕予同門文學王君御介毛生請曰自先君之見背也謙方八齡幸吾嫡母李太孺人腹鞠不啻已出又時訓督語逮先君則涕泗横下今謙稍長太孺人適六袠非得足下重之一語則無為不朽計予曰嘻君誠有子矣予見今世禄家凡子鮮不以豪侈自放棄至辱逮其先人疇知從學士長者為親規不朽之業哉矧予覩生之體貌言辭雍雍繭繭可以謂不自凡矣非誠有李太孺人訓督之殷其烏能然哉李太孺人始賛其夫以髙又訓其子以才若是可以夀矣然則生欲規報不朽則曷以生出而繩乃祖則立功處而紹父則立言豈不亦由已不由人哉雖然功與言之先有實物焉則生所急也不然三洲君所為從石蓮先生門豈顓在言乎生以是報太孺人則不朽之本也太孺人家世出谷村右族父南池翁廣西藩㕘葢先有閫教焉若太孺人可以夀矣衡廬續稿巻二
