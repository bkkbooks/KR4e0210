body:
  text: 衡廬續稿巻六明胡直撰行狀大理卿宋華陽先生行状萬厯丁丑華陽宋公解南京大理卿歸明年九月則期其友王公時槐偕予晤言于金牛寺公既稍自述撫南畿事状卒逮于學葢千餘言氣沛如也尋余踵公舟訪于南村里第遽報寝疾時延予榻次譚叙偶及死生之際慨然曰夫人死則死矣豈當作兒女子憐耶予壮其言然不謂公為永訣辭也别數日忽聞公以十月朔日捐世臨終問其友程君某曰日己午否或問家事不答惟以不盡報國暨所學未竟為憾而獨得訣别予為慰治命屬予状其行事次年其長子瑜次珝偕予邑張生來致公之遺命手其姪琯所叙世系年編投予讀之未嘗不哽咽涕横也曰嗟乎予曷忍無言于公哉按公諱儀望字望之初號陽山更號華陽山人上世出丹陽太守哲至幾世遷吉水洪洞宋嘉裕間徙永豐之滁溪為望族高祖某起鹽賈曾祖某應詔出粟濟邊事聞賜羊酒綵幣郷里榮之祖某七品散官父某號坦菴翁以公貴初贈吳縣令繼贈河南道監察御史初娶嚴氏繼鍾氏公則鍾夫人第四子也始鍾夫人夢黄衣人以幅錦盛明珠來獻光焰奪人目因受而含之不覺咽下遂有孕及生公果光爛一室家人駭異太夫人心知其為祥也先是坦菴翁以貲雄里中後遭流冦家日落公九齡乃得從塾師學句讀逾年能遍誦塾舍書塾師遜避年十七更從蕭經魁蚪山君學時已奮迅業舉而旁覽秦漢諸家文尤好杜詩一日讀史至秦檜殺岳忠武事悵然太息坦菴翁訊之答曰假令兒在側則當為忠武飲血擊檜翁喜謂太夫人曰吾兒異時當能忠諌為耳目臣又一日讀史涕下翁又訊之答曰兒讀裴晉公表云滅賊則朝天有期賊在則歸闕無日甚哉義氣之能感人故泣也翁復語太夫人曰吾兒異時當能宣力為股肱臣已而愀然曰惜吾不及見矣是年督學范公首録補邑博士弟子員明年從其從兄滁江君某業文遂聞正學即欣欣有嚮往意矣于時邑西有郭翁者嘗為女擇對諸富人求罵不與一見公遂奇許之又三年公已試冠等廩于庠夫人始來歸未幾坦菴翁寝疾公若不欲生翁諭曰吾有若不死矣既捐館公盡出奩物治􅀈具腆踰有力家親者為之嘆服哀毁至終喪如一日庚子服闋赴省試未第歸遇冦同行友沈死公為假貸成􅀈又二年始購得吉壤奉坦菴翁𦵏焉癸卯復下第公獨嘆曰吾無以酬吾母已而曰吾奚可鬱鬱泥一舉為孝乎乃結諸同志往來青原白鷺嚴事邑之聶貞襄公又師安成鄒文荘泰和歐文荘二公而觀磨于羅文恭公力究致良知之學四君子稔公穎悟卓朗咸大器重丙午赴省試既捷或用為悦公獨愴曰惜吾父未逮覩歸拜太夫人涕滂沱下太夫人亦泣不止觀者異之次年第進士觀政都察院遂迎太夫人養于京座主為翰林大洲趙公亟為延譽榜中推公與南昌胡子文太倉王元美齊名時公年三十三矣戊申得選蘇之吳縣乃偕太夫人如吳吳為蘇首邑賦甲東南民黠難理公悉以治家者治之首稽民隠病在勢家免差而細民苦役又莫甚運頭乃追古公田之義置役田以取給民獲蘇又置義塚易火𦵏節靡剔蠧咸為畫一創建文學書院祀子游羣邑雋月試之發其素所受于師者破崖岸為之講習一時名士爭出其門如今相申公侍郎王公劉公其最著也時北敵逼京城部議専官徵吳税之積逋者吏乘風恐刼民幾竄公方告郡守急出榜安民民始定辛亥部考循良第一士民為樹生祠壬子召入為河南道御史㑹大将仇鸞擁重兵居外既誘敵刼城下又挾敵要君陵壓在位人心震懼羣臣無敢言者公獨上言發鸞奸歴抵其罪疏雖留中而公之直氣已輷然壮中外矣亡何鸞暴病死而通敵事發詔剖棺梟示謝天下始皆嘆頌公之先見公又陳時務十二策議守三闗開通桑乾河以便運餉扶疎萬餘言皆能稽事實破膠見鑿鑿可措之行癸丑出按河東鹽政公為祛夙蠧通商賈禁藩室移貸之弊題請稽覈羣工賢否風裁凜凜如也時有武臣史某者坐强娶與私鹽事覈與其邑大臣有連大臣為闗説公必致諸法大臣銜公不置異時公被再謫則肇兹矣公以西北士雖知業舉然于正學未有聞乃建河東書院集名士廩之日課其藝因以論學又為刻陽明先生文粹以示嚮往自是西方學者益知遡河汾宗㫖矣事竣公思太夫人以病乞歸築象城山房迎養自為之記丙辰病痊赴部掌河南道并七道印綬與覲察事當此時廕臣隂持魁柄天下財輦入私門奮欲言草成為相知者煅之邑邑不自得已而獨疏論邊事六弊二難末及東南總督胡宗憲淫侈誤國請賜督責罷閩撫阮鶚之貪婪而二臣者皆廕臣心膂人也廕臣大不懌亡何肅皇帝詔監修復三殿及午門璫臣議工直日一錢公不可又欲盡易門石公請易所損者有富商囊五十金賄廕臣求與工事歐陽工部尚書聽其請公又執不可于是廕臣與尚書交銜公工竣序遷歐陽轉冢宰公轉大理寺寺丞時遷轉者例有餽謝公又不餽廕臣恨益次骨明年己未太夫人春秋愈高公乞假終養既歸侍太夫人不離左右辛酉太夫人卒公方守制㑹風霾言官請考察應變廕臣與歐陽計黜公以塞責總憲周簡肅公正色詘其議得免然竟署浮躁落職乙丑起復補夷陵州知州未任轉霸州僉事霸當孔道多響馬大盜白晝肝腦人公戒嚴捕治賊為屏息先是西寧侯舟次霸寇猝至侯倉皇避入水死公至始擒寇窮其窟宅題請豁洪武間養馬逋税民益感悦丙寅轉大名兵備邊報日警公曰防秋莫先積貯方臨六越月積鍰金至八千足備餉適河東大臣銜公者掌銓駕言倭寇浸盛移公福建監軍副使将以危公公辰聞報已即啓行以素無便文自營故能疾也至則飭武練兵嚴樹海防先事預備比倭至乃得與總兵戚君戮力挫倭破之八閩賴以大安戊辰大臣挾前意必欲罷公文選劉郎中某備言公才賢状且云今日必罷宋寺丞寧罷劉某某與宋生平無識面然知其才賢某不為言則如公論何大臣不得已竟署降調公棄監軍遊武夷賦詩見志有武夷漫稿已而歸理南村新第為終焉計期㑹同志寓講青原白鷺殆無虚嵗至辛未公年五十八矣而部臺薦剡凡十八疏乃起補公四川僉事未任轉福建提學副使先是提學例有條教然多靡文公獨慨曰卧碑教士迪正道崇正學今詎越此乎乃條引而敷宣之暇則為諸生發明大學致知入門正脈仍刻陽明文粹鄒歐兩文荘文選遍示諸生而興者丕變矣己未郭夫人訃至既哭嘆曰吾亦老且休矣遂舎紱而歸俄轉福建叅政不得已復赴閩以齎賀萬夀表行報陞大僕寺卿尋轉大理寺少卿是嵗復當天下羣工入覲公率諸縉紳偕諸覲臣講學靈濟宫亹亹多所發明時廷議王陽明先生從祀事議者拘牽舊文不能究竟其學至為聚訟公曰是未可以口舌爭也乃著為或問一篇反覆數千言大意謂堯舜開道心精一之傳未嘗求理于物牿心于外孔門大學一書首言明明徳明徳者即吾道心之靈覺不昧者而知識其末焉故明明徳之功要在致知後儒誤訓致知為推極其知識殊失大學知本之㫖陽明則指示之曰是致知者乃致吾之良知而非以知識先也以是見陽明實本堯舜孔門正㫖從祀允當一時聞者醒醒然卒未行甲戌廷推應天巡撫公習知江南民苦賦役既涖任首政均賦雖格異議然豪家欽戢不敢専持全免以肥已瘠人賦税得以通徵細民若獲所天江洋寇熾乃理兵儲緝海船修戎器更置将吏簡練行伍沿江編立保甲蕪湖盜刼庫竟捕滅之復築城禦後又銅陵望江青浦咸為城之春汛輒先事戒嚴已而果有倭船連艘擄掠公授畧三遣兵𠞰截殱之洋外其擒斬俘獲級口器仗不可勝計語具三捷疏中由是倭寇不得流突而内地以安當宁大悦詔陞公副都賜賚金帛有加鎮江各府水災民資蕩析公題請蠲租發廩賑濟若拯溺咸見疏中礦徒嘯聚出沒不可蹤公為設防禁伏迄不敢肆撫署寓蘇公至酌列郡道里均處改建于句曲㑹詔雪靖難死事諸臣公為建表忠祠于金陵宋忠臣楊公邦義吉水人也舊祠墓在江寧其後祠存遺址而墓堙乆矣公為訪民間得其墓表章之又復其祠其篤意忠義類此丙子冬陞南京大理寺正卿辭不允先是為鹽徒事與御史奏異同科臣叅劾公既辨明有詔轉北大理寺卿上疏乞罷温㫖不許公曰主上恩意渥矣然吾義不辱遂堅不出初吳有伊郎中者故病風常持刺候謁閽者懼其失言弗為通公竟未知也伊乃銜公騰謗而他不樂督公賦者和之當塗浸聞不平公反懼傷伊貽書解之聞者益服公之雅量然終不免論者之口自伊始也公歸杜門南村都中自元輔以下屢書督行皆未答曰身隠矣焉用文之先是公念豐邑歴科七未有薦者或請易學宮公居南大理時即捐金百以助修改既歸則専力改建而觀其成公孝友出天性方年十六時坦翁搆味琴樓成輒搦筆題其壁曰睦内睦外之志矢死不朽翁笑曰子異時其衣徳吾門乎公事父母養生送死事諸兄推産讓居亡論已自坦翁以上至高王父𦵏不吉者公必為卜吉兆厚棺斂而改厝焉諸兄有不吉者改厝如其祖父從子有不能婚嫁者公為擇婚嫁資必腆其諸從以逮族之疎逺資雖有差然無不食公之徳者如其從子姑之子孫太夫人之子孫内家之子孫與其密友之子孫資雖有差然無不食公之徳者如其諸從郷鄰有慕義者力詩書者掖之寒餓者周之喪者助之急難告者左右之四方士挾一藝者苟可用情無不厭其意通邑有利病苟可言無不盡言而視郷鄰與通邑四方如其家族葢公夙見良知之體通乎天地萬物而偉度足以勝之長才足以達之敏識足以鏡之勁節足以樹之乃至治劇應猝荷艱力重當其遊刃曽不動色而恢恢有餘地矣彼世之沾沾煦煦僬僬瞡瞡銖稱寸量自以為得者非其儔也故其際于得失利害崇下一不足以滓胸臆而易眉宇予與公郷國悦慕篤矣而綰結則在京都當時海内凡四五君子者咸以講學論文莫逆然咸推轂公浸以公之廓落好善固今文武濟時偉丈夫也葢在相國亦云公嘗貽示與相國徃復書牘彼已皆報主大義讀之可見一時之相與者非苟而已也然而予且快公之歸将與公薖軸林端淬礲末路究斯學之大歸石蓮雪浪之區青原白鷺之刹俟公舊矣孰謂天不弔憫乃一疾而奄忽其逝豈誠吾黨寡倖末世薄祜俾瑣瑣者延而獨殱此哲人也哉文章之弊久矣名賢反古濟濟麟麟然獨師匠史漢而刻意劌心雕鏤模擬其極至盜哭為悲借笑為歡而非其中心之誠然公每嘆其為中古影子曽未探六經之緒而窺道法之所由來惟公咏歌必本性情論議揆自道法絶不屑屑于雕鏤模擬而雄渾與質厚並至倬鑠與縝宻交見若無意繩削而自中其度其友曽中丞于野評公文出天才非人力易致豈不信哉公家食時喜邑之陽山遂著陽山賦題其詩曰陽山詩稿後在南畿愛句曲華陽之勝既以更號乃裒其詩文若干巻奏議若干巻總題曰華陽館稿姑蘇兩王公叙之皆極推高擬古作者是豈今之譾譾然縳步秦漢而違已失真者之可言哉予嘗括而論之九萬之翼非鸒斯所望重溟之淵非溝澮所擬此公之高大不可以小局小知追也銅爵騰都越國而以之捕䑕則詘龍淵斷蛟剸犀而以之羞臛則左此公之高大所以不得于小局小知昔也嗚呼公無憾矣公娶郭夫人難子乃以仲兄次子瑜後之瑜初娶藤田寗氏繼東湖劉某女劉號澄湖即公所作澄湖記者是也副室艾源艾氏高郵州郭氏又許氏李氏艾生子二珝娶聶祠部女玘娶永新劉知事女女一適廬陵習修撰季子某郭生子珽聘廬陵賀春元某女許李子俱殤孫一某珝出聘湯春元某女女孫一瑜出嫁為郭奉常冢孫某之配公生正徳甲戌年月日終萬厯戊寅十月朔日得年才六十有五公適寝疾而予猶幸造而執别也予曷忍無言瑜珝等卜𦵏公于某山某原将以某年月日襄事又以使來督為言乃為次第公之巨節顯行著之篇其細且隠者未逮也以為世之元夫碩哲必有與公應者是故挈其大而細可推發其顯而隠可覘而予亦無竢更僕數也謹状衡廬續稿巻六
