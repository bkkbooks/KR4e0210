body:
  text: 衡廬精舍藏稿巻十五明胡直撰議屯田議大司馬許公以軍餉日匱計脩屯政乃下羣屬議之于是觀政進士胡某議曰自三代之後兵農既分則兵有待食不足之慮農有餉兵不勝之累於是欲為寛民濟兵之䇿者則莫良於屯政故屯政者所以舒漕輓固守禦而古今足兵食之上計也乃若漢唐設屯記載昭灼雖各有用民用兵之不同然其寛民濟兵有利無害則一而已逮我國家經制各衞皆有屯田軍以十分為凖有事則七分守城三分屯耕無事則七分屯耕三分守城又於各道專設風憲官一員以督理之是於守禦之中而收耕穫之利其法視古无良然而承平既乆法玩政弛内地則私相貿易外邊則侵占荒閒雖有屯名而無其實矧邊徼連年冦警荷戈被甲尚稱乏人而復能分兵以耕乎又益以客兵則軍食日亟軍儲日匱往往出師百里未及三日卒以食盡至煩當宁屢出内帑以賑其乏乃者内帑又復告匱比年以來計國大吏始有意於屯政之脩若内地則增設撫臣以董其政外邊則勅遣重臣以稽其弊殆未甞不奮然求理也然旋設者復撤清稽者未行此其利害所在豈亦有難與圖成者與嗟乎此屯政所以貴熟講也今夫内地之田不過一風力使臣盡心清理則弊端可塞舊制可復至淮徐開荒亦可攝之兵備責之有司苟得其人其舉此非難也又奚必以疲病之地而増設一撫臣哉惟今日之勢莫急於邊亦莫難於邊葢常深思今日脩屯足邊之方則其說有六請為當事者陳之一曰復侵占夫九邊不遑槩舉今獨觀諸宣大可知彼宣府舊納本色二十一萬一百七十六石有零大同新舊本折一十二萬九百六十七石有零其屯利亦不可謂不厚矣嗣是侵占荒閒損十之五近年勅遣重臣清稽若指揮王鑵首出原種屯田四百畆軍人李天祐任仲義等告訐田地其數不貲而撫臣以為邊地當簡節濶目以鎮定之豈以其激則為變耶愚則以為行之有漸而措之有方雖變無繇也不然則豈弊端終不可稽而屯政終不可復與故今日得人則侵占不可以不復也二曰復紅牌昔者永樂之時各屯置立紅牌刋書各千百户指揮管轄旗軍姓名于上百户一員則轄旗軍若干名千户一員則轄百户若干員指揮一員則轄千户若干員都指揮則總其事專設僉事則稽其成至撫按邊郎督其入兵備守廵分其責故當時事皆脩舉而田亦不廢兵可得濟然則為今之計紅牌不設而欲屯政之脩是猶治亂絲而無其緒也其有能得其理者必不可㡬矣三曰築墩堡昔趙充國屯先零必乗塞列隊而後可耕韓重華耕振武亦屯堡相望而後敵不為暴此往事之較著者也聞近日墩堡為敵所破壊似當刻日脩補計里相望勢若牽環使耕者不為敵擾而刈穫有期不然則雖有李悝蒙恬以開地神禹后稷以導民萬未有能耕者也四曰增人户夫邊徼之地不患無田而患無人今每邊主兵不踰四萬其不可以贍耕明矣議者謂欲修祖宗流徙之法凡富民殘衆贓吏武職犯法情重者悉令徙邊夫富民贓吏武官皆有顧戀至於子弟臧獲之多又可以佐力而疾耕也誠舉而行之則與募民實塞其為利又大相懸矣五曰開荒蕪夫紅牌既設則田各有屬至于荒棄之地袤延至廣若能出令令各兵墾種期以三年之後若百户嵗增糧一百石草至五千束千户嵗増糧至五百石草至二萬五千束則即行陞用其有不及者亦量為賞酬庶㡬人樂為勸而荒閒不患于無耕矣六曰擇將帥夫屯政之脩其責非獨憲臣而已葢亦由將帥得人焉故初興之國將帥得人則我勢勝而兵力省糧餉舒矣以既舒之糧餉而屯政益脩者敵不得我擾故也繼盛之國將帥不得人則我勢弱而客兵煩糧餉亟矣以既亟之糧餉而屯政反不得修者我望敵而棄焉故也當今之時正客兵煩重糧餉孔棘之秋也俾不求將帥而専責於憲臣特恃乎墩堡是猶徒手搏虎而欲以樵採也亦不可㡬矣昔者越國既敗得范蠡則易敗為勝齊國既弱得穰苴則易弱為彊夫以諸侯之末世且然而况擁天下之大據豐亨之力勝彊之權猶為在我者乎今者當宁誠必求天下出羣之才置列大將以操其可為之權振其我勝之勢則客兵可以全省而屯政亦復可舉矣而建議者猶謂鹽法與屯政相表裏曩年鹽法未弊各商賈趨邊自築墩臺自備牛具代治屯田且種且輸至便利也今欲復屯政當令衆賈如曩種輸可也雖然此亦昔之將帥得人故也今將帥擁千萬衆尚不得以存其闗堡彼鹽賈將何恃以無恐故將帥苟不得人則非惟徒搏不樵而虎害益以不支雖督鹽賈加之斧鉞不能責其耕矣以愚之議自謂屯政大略計無有易此者或者又謂其田敲鹵不可耕則請拆之以王鑵李天祐之侵占非其敲鹵不可耕者乎乃若墩堡牛具之費則内儲必有可措設者不然則輟内地冗員冗費以給之其置此亦不難矣書生過計未識廟算謂何如也謹議說巽說夫聖人之學備於易而巽之說為盡之巽者一隂伏於二陽其象為風其徳為順是故聖人委於天地萬物順應而不窮者巽之謂也然巽上為旅下為兌不能通於旅與兌之義而巽之說不可見矣夫旅逆旅也非吾恒能有也兌說也無弗說諸心也世之人莫不以其身為萬萬不可壊毁自穹壤之大以至毛髪之細咸謂可執而有之是故視其身之膠於物若居不可出之狴而困不可解之梏當其時視世之為旅人於江湖間逍遥者其霄淵相絶也如此則觸其目攖其手足罔非逆胸迫腸之地而望其委順於天地萬物者必不可㡬矣不能委順於天地萬物而令求一瞬之說於心亦不可㡬矣以吾試觀於古今人何莫不然是故聖人旅其身旅其天地萬物旅其身則不有我旅其天地萬物則不有天地萬物我與天地萬物皆不相有而後隨萬物之低昂而委順以應之夫委順則無事矣故聖人繫曰巽稱而隠隠也者言無事也又曰巽以行權權即所以稱也學至於能權則以我宰乎天地萬物而我無天地萬物之累以天地萬物宰於我而天地萬物無我之累我無天地萬物之累故我適天地萬物無我之累故天地萬物適我與天地萬物不相有而相適則其悅諸心也豈獨加於南面王樂已乎然非始諸旅則靡所入非終于兌則不知其所歸得其所入所歸則巽之說見而易之義盡斯聖人之學為不詭矣永新劉某與余同學于念菴羅先生因出其先君巽屏册示予葢先生所撰諸薦紳作者咸在固以其簡末屬予夫予不能知君之行事然而知先生之學聖學也君能勅其子游先生之門則其人可知而以取諸其號之義吾亦可得而言乃於是作巽說貽某賀鳴甫字說永新賀夢凰氏始字為岐甫既來太學遘翰林殿撰唐君問字君以其嫌於山名又義無可繹遂以嗚甫易之賀子退語胡子以發其㫖且曰鳴世之事豈易承乎胡子曰不然世未知鳯凰又焉知所以鳴是無異其却而不敢承也今夫世之語鳯凰者必以其鱗翼龍形龜背燕項九像六苞五色三文然後交口而信之者是惑于形也亦必以其胎於火精産於丹穴棲必阿閣翔必紫庭然後交口而信之者是惑於地也夫形與地鳯也使隼行而鶚聲焉亦將從而鳯凰之乎然或有鳥焉雖不鱗龍龜燕其形火精丹穴其地静而黙固衆鳥也動而鳴則衆鳥之聲與之一是又不從而鳯凰之乎夫人亦然彼尊行魁德而號賢聖者固人之鳯凰也則亦必堯眉舜目必平陽蒲坂而後與之乎是皆不然所上於鳥者非以其形與地也以其鳴足以一衆鳥之音斯其為百鳥之王所上於人者亦非以其形與地也以其言足以一衆人之言斯其為衆人之宗夫鳴足以一衆鳥則鳴之先必有以伏衆鳥者言足以一衆人則言之先必有以伏衆人者然則殿撰君之命子者豈不逺哉子少而警敏友大學之英益滌其俗學其將不以形地自限且知所以為鳴者矣嗟夫子誠知之則雖不言不鳴可也雖世人不辨其形不信其地不謂之鳯凰亦可也不然則拘攣乎方隅擬議乎形似是宜其為希世為絶德而寡見其羽儀雝喈於斯世也歟子其勉之蝨說有壯男子焉始嘗擁貲江湖有聲既而以聲伎豪盡濵老遂衣敗絮着敝褌層複垢穢竟為蝨藪其多至斗之不盡以是寢疾骨立轉復蕃息蕾藂蟻犇相尋以食其未竭之血而爬梳薰沐勢不可復施膚既已漸土矣然後蝨亦随以盡滅惜之者曰彼其初壯男子其自以豪侈取匱病已不可追數然使斯人當病隙而烘蒸之則何遽以此物斃哉彼其終不然者亦由以微小槩之而層複之為藪澤者厚也豈不悲哉嗟乎豈惟斯人夫國亦然當其中葉即輦轂之近且多為敝兵冗員之所盤食而况其外而逺乎然人亦槩以微小而其所托於藪澤益厚故國愈匱病則兵愈増官愈浮蓋自古及今而少有不然者是故國不虞匱與病也吾獨虞其不蚤烘蒸以至於斗之不盡爬梳薰沐之不得施則又何獨壯男子也壯男子粤人嘆其事者亦粤人余感而著之說蟻說予平時見羣蟻奔營如有急難無停晷以為鬬也偶暇覩數小蟻擁半死蟬負移咫步蟬仰而躍羣蟻顛頓困不勝中一小蟻返穴次似鳩侣者未至值穴蟻出聚首若相語于是穴蟻復歸頃一蜉蚍巨若豆者領千百小蟻族出共負疾趨倒曳入穴户其豆蟻却弗入四顧彷徨復領羣小蟻魚貫出或挽蟲臂或推饌滓紛紜旋轉不能了予乃知蟻非為鬬口實忙耳予以天下至微唯蟻雖餐若蟣肝宜無弗充然奔營不已若此者是不可已乎又見雀鼠鷄豕終日奔營亦然未嘗不發哂一日予登髙山俯觀山足若駕者騎者負者擔者趨者憩者呼而招者跂而望者隊而來又復往者其奔營亦何異羣蟻之無停顧而思曰彼髙人逸士卧雲霞漱泉石泊然而沈冥者又不哂吾黨之為羣蟻乎或曰使人皆為雲霞之卧泉石之漱則天下莫為理矣彼髙人逸士曷以休哉禹八年不入膚焦不毛脛疾無胝孔子席不待溫接淅而行皇皇乎捐其身家以援天下然則彼皆非歟予曰不然禹孔子所以能捐身家援天下者以不為口實奔營故也向使禹孔子咸奔營若斯蟻則又烏能捐所切以援斯人乎是故舜之飯糗茹草若將終身伊尹囂然樂于畎畆夫然後能徴庸陟方上下五就援天下若斯之急也不然吾無哂於是蟻也人龍說夫鵬運而負天鷽决而控地鶴長鳬短鱣大鱦小各不相為者以局於隂而範於質也惟龍則不然龍禀陽德不可以質求無質故無方無方故倏大倏小倏出倏入簸蕩三光雨澤下土蟠身方尺細入幽眇龍無不可故大易以龍德語聖人之時蓋有取焉人生而有質質有剛柔善惡惡者固不足言矣其善者亦各因其質之近而成乎習夫既成乎習則沈潛髙明不得以相為而陽德微矣伯夷之清柳下惠之和雖聖人且不能以盡㤀而况衆人乎給舍沈子某天性純懿喜怒不色見氣質稱美矣比部羅子懼其範於質也因其請告歸山隂乃書册以贈題曰人龍而求説於予予以為人之生質剛而難柔者以不知剛故也柔而難剛者以不知柔故也大哉人心之知其諸所謂至陽赫赫者乎故質則有方有方則物而不化知則無象無象則神而能通君子之學以其無象而陶乎有方夫唯知而已矣故剛則可柔柔則可剛故曰知柔知剛萬夫之望贊陽德也是故靈知煌煌崇效乎天則可以時乗六龍變動不居孔子之時中是已充沈子願學之心知至至之則人將曰沈子其猶龍乎沈子勉之雜說四首客有為登守者為予言東海蜃氣成城墉樓臺五色縹緲出烟靄中髙鳥倦飛就棲輒堕氣中竟死海波相與嘆曰悲哉鳥乎予因憶昔時艤舟洞庭夜張燭羣蛾飛而赴者不下千百麾之不得去觸而灼死者盈案燭竟不能明予乃置盤水其側死水中者亦無算予時嘆曰彼赴而死者固可悲而燭為赴者之多至不能明尤可悲也此皆無異附勢而敗滅者固不足為有識道然古今才智士自作而自罹者踵相望也書之亦可為古今之一噱予嘗見孔雀雄者毛尾金翠殊絶非設色者能彷彿也詢之性果妬雖馴乆見童男女着錦綺必趂啄之山棲時先擇貯尾然後置身天雨尾濕羅者且至猶珍顧不復騫舉卒為所擒予又觀博物志言山鷩亦愛重其毛終日映水目眩輒溺翟雉長尾適雨雪惜其尾坐樹杪不下食以至餓死悲哉是三禽何其智于羽毛不智其命也古今學士文人役終生事藻繢詞既自没溺其性命猶自珍曰吾有詩若干文若干巻足表見於後世視三禽智愚同耶否耶莊子曰蚿憐夔夔憐蛇此各足其天不相憐可也西方有獸與卭卭岠虚者比急難則卭卭岠虚者負而走其名謂之蟨說者謂蟨足鼠前而兔後趨則頓走則顛故非附物不可以行水母無目以蝦為目此二物一借足而行一借目而視信可憐哉今之文士尊秦漢勝六經模擬句字不敢失黍米語大道罔知所始襲晚宋儒者所言是非争訟不肯下鮮不借足目於人者又奚二物之憐夫越人談象其齒退輒自匿土泥中乆復以鼻抓視存亡亡則怒而觸林木盡摧或傷人故人之取者恒潛為木齒易之又麝亦珍其香香滿臍痛劇即自以足抓出之覆穢溺中犬逼且死猶倒拱四足衞其臍客又言江海間有烏側魚八足能集足攅口縮口藏腹腹含墨值漁艇即唾墨令水黑以自混漁人視黒水占魚所在網輒獲此三物者或善藏其賄或巧䕶其身然皆不能免則何益矣余嘗喜莊生之言曰藏舟于壑夜半有力者負之而趨不如藏天下於天下貴無心也然莊子又嘗訾伯夷笑單豹而獨贊樗木與支離滑欲自處材不材之間則又與其言左矣老子云聖人不死以其動無之死地也夫死生之來雖聖人豈能以意違之哉天下有不自致而至者有避而不得趨而或免者矣則老子亦未可為通論也老子又曰福兮禍所倚禍兮福所伏斯言允矣孔子曰死生有命富貴在天是故堯舜不能違天而必其子文王不能違天而必其君周公不能違天而必其兄孔孟不能違天而必其時顔冉不能違天而必其壽故曰獲罪於天無所禱也言不自失其天而已予生平行止安危倚伏不自由百試百驗故余多罔所顧慮無象麝之貨也將焉藏無烏側之術也將焉混雖然唯不自失其天固有不以危危不以亡亡者存續知命說復耿伯子嵗之甲戌耿伯子年五十又一其友周子就問之曰夫子所謂五十知天命者子則云何耿伯子為之說以答周子大略言天之於人必有與而命之者堯舜以君禹臯以相孔子以師皆天寔命之唯知命在我不容辭故堯舜禹臯則若饑溺若内溝孔子則憤樂相尋教學相長矻矻無已時是夫子所謂知天命也已又介其徒劉生以緘示胡子胡子讀之曰淵哉命乎繇耿伯子言則可以知之矣劉生曰何謂也曰易不云窮理盡性以至于命唯至斯能宰唯宰斯能知辟之宰一家者則一家造自我矣故知一家宰一國者則一國造自我矣故知一國彼其至也乆矣奚復較量其容辭不容辭哉故曰繇此可以知之曰然則宰之自我者何謂也曰宰之自我者是造化我出宇宙在手而天者不毁矣又曷為窮通曷為治亂曷為生死曷為古今蓋非無窮通而窮亦通也非無治亂而亂亦治也非無死生而死亦生也非無古今而今亦古也易曰先天而天不違則知命之境也中庸曰知天地之化育又曰達天徳則知命之說也老莊列窺其内則曰死而不亡制命在内曰長于上古而不為老是未嘗有生死古今也唐李長源宋邵堯夫見其外則曰君相造命曰仲尼以萬世為土是未嘗有窮通治亂也然皆未易言是故命者誠非聖人不能知也曰若是則何以入曰從耿伯子之憤樂相尋教學相長矻矻無已時則皜皜乎盡性立命矣立命則能至而宰矣又何憂于知悲哉予獨後時未逮有類于寠而談金者也若世儒則又今之睡而聽古樂者其能有入也益難矣曰知命不敢言敢問命何物曰知性則知命矣子歸求諸耿伯子將終得之申説贈蕭希之太守北上有引蕭希之太守既解服而北轅也其同年友唐君令予邑雅相切琢無仕學之異瀕行為雜說致贈凡十有二章而謬逮予予與希之不能無省發雖予於希之不可㤀言亦未能有加於令君之深致也故特為之申說焉申之云者即荀氏所稱前鑒既明後復申之之義也諒哉非希之莫之契亦冀希之有以報我也其說亦凡十有二章孔門學仁為宗而孔子自訓之曰仁者人也人生之謂也孟子申訓之曰仁人心也心覺之謂也是豈有異哉夫覺則無弗生矣古之先覺者思天下之民匹夫匹婦有不被堯舜之澤若已推而内之溝中而况其近乎此非為大也其生道固然也而世之肝膽楚越門庭千里者則痿痺弗覺之為過也是故有覺德行自不愧屋漏始是道也可存而識不可以億而中可養而充不可以襲而行世之億度事理因襲往行者其樹非不偉然然與存久自著養盛自茂者有徑庭焉何則居貨者非家珍而經年成楮葉者異天葩也故由知止而至能慮由深造而達逄原其先存存乎語一國則凡出令行政曰此吾國君令使然也語一家則凡出命行事曰吾家長命使然也故為國君家長正則無弗正矣人心之宰物何異國之有君家之有長苟曰嫌二氏而諱言心切事功而緩言心是舍國君家長而求其行也左矣故學貴先知本善學者譬如種樹仁全樹也志根也師友栽培者也詩書灌溉者也君子誠有志則未嘗一日離師友廢詩書苟無志則師友為虛器詩書資詞章耳曽子曰士不可以不𢎞毅嗟夫予罕見有𢎞毅任仁急師友契詩書之原者也曩也常中夜思曰吾苟任仁則不節著不技揚可乎未可也何則孔子嘗言仁為道大又言仁之難成吾懼任仁之道大難成也已而思曰吾苟舍仁而他學則以節著以技揚可乎未可也何則孔子言志仁無惡又言仁者人也吾懼弗仁之瀕惡弗人也二者嘗交戰胸中矣已又思曰道雖大然舍之瀕惡必不可也仁雖難成然棄而弗人必不可也雖節也嶽嶽而中也蹙蹙技也章章而中也役役二者奚禆其天以是始戰勝仁為任古之明四目者言以四方之目為已目也非謂寄目于一人二人者也達四聰者言以四方之聰為已聰也非謂寄聰于一人二人者也夫寄目則多指而亂視寄聰則偏聽而生奸故君子慎辨之今之從政者有宴荒有奕荒此易知也有文荒有書荒此未易知也予昔為監司一日適治文且閱書未暇出已而開衙則候伺聽斷者有饑倦之色頃接郵報將迓往復酬荅宴㑹而官燭已然矣退而鞫讞磨勘倥偬畢事卒不能滿心者十之五六此非文荒書荒何哉此亦痿痺之一端也漢宣帝曰與我共理天下者良二千石斯言雖堯舜弗之易也然卒何以理哉孔子曰富之教之孟氏曰聖人治天下使民菽粟如水火而民焉有不仁者乎然則理天下富之不可後矣柳氏曰富民民之母也故君子為政雖篤志於益貧而亦不刻意於損富亦富之之道也古之大人以善養人而不以善服人以善養人者唯懼已不同人故常救人以善服人者唯懼人不同已故常方人學者是古非今臧否人物意匠顒然談鋒傑然口若馳鏌鋣心若懐詛盟則有不氷而寒不火而炎者焉此無他區别勝而愛憎繁也是故君子欲為益身莫若退然反觀廓然自舍鑑垢盡則明自燦泉竇闢則流自長我無心而物綜也古之修身以為教也有可必者有不可必者是故堯舜不能必於其子湯武不能必於其君周公不能必於其兄孔孟不能必於其室然而學者以是委焉則亦謂之痿痺故曰失諸正鵠反求諸其身又曰行有不得者皆反求諸已君子學苟至于中和蓋曰匪是無以成性非將曰吾以是立極於天下也功苟至于位育葢曰匪是無以盡性非將曰吾以是垂名於萬世也雖然為法天下可傳後世則極與名在其中矣而君子無心焉故曰君子依乎中庸遯世不見知而不悔洗心説示羅忠甫昔晦菴先生極言以心察心之非以為心一而已而又以一心察之是兩心也且又擬諸以口囁口以目視目者之為非不知洗心之訓出自易繫若是則以心洗心者亦將為非矣此當以意通難以文泥也洗心之義何居曰易無思也無為也觀諸蓍卦爻亦無思無為而已然能圓而神方以知易以貢此豈人力也哉聖人以此無思無為洗心藏宻至於知識不作聲臭俱無故亦能知來藏往固有不蓍而神不卦而知不爻而貢者在焉聖人洗心之妙至此蓋口與目有形者也物也故欲以口囁口以目視目而不可得心無形者也神也故以自心洗自心奚不可者而奚有兩心之累哉然則學者曷所入曰始焉日新又新則能江漢以濯秋陽以暴漸入於無思無為之本然而聖人之心在我矣乃若君子懲忿窒慾遷善改過則日新為近焉小子識之易說示張有書有引余以秋日遊龍門憩有書張生之别館臨别問學出手册請書余以老始學易因出易説數條書之與張生共勉焉其說凡七章初九潛龍勿用以卦爻之時位言當為潛龍之勿用非謂小人道盛時也龍者乾陽變化之象潛者隐而自修之義此正幼學者事也他時壯行為見為惕為躍為飛為旡首皆此潛徳為之故舜禹始潛至于有天下而不與不易乎世易即天下有道某不與易之易非啻不為世所移易者也樂則行之樂即上文無悶之意夫學者遯世無悶已為難矣至舍已是矣世不見是而亦無悶焉此則不以世之一毫毁譽動於其中程傳所謂自信自樂是也夫是乃為潛龍天德不以纎隂參也此學脉也見龍之德正中一惟庸言庸行之存其誠蓋惟潛而後能誠惟誠而後能善世而博不伐而化忠信所以進德忠信即誠也修辭立其誠所以居忠信之業德即體業即用凡業莫不始於言辭惟言辭無不誠則業無不居而德無不修矣可與㡬即惟㡬之㡬可與存義即理于義之義學以聚之聚即與敬德之聚義同蓋言凝也記曰苟不至德至道不凝言非學不凝也學即上文進德修業之事敬以直内言人之生也直㒺之則弗直弗直則非忠信故恒敬則弗㒺而直直則無弗忠信敬直未有不方外者也然必曰義以方外者即乾卦居業意也且直或易遂以義宜則大而不孤坤道固如此傾否必以同人而同人必于野而後亨古者邑外謂之牧牧外謂之郊郊外謂之野至于野則曠邈無隔雖四極九埏莫不相通故同人于野則誠以天下為一家中國為一人宜其大亨可涉險矣然五位中正二亦中正以應乎乾是以既統同以辨異又審異而致同則為君子之貞而與小人之比附者夐矣若夫六五同人于宗于宗固善矣然不免隘而吝上九同人于郊于郊廣于宗矣然亦不能無限隔故止無悔而已是故君子貴同人于野則無不亨無不通天下之志謙艮下坤上其象為山在地下夫山至髙地至卑以至髙而處至卑之下是有而不有卑而又卑其謙至矣故謙六爻咸吉無不利書曰有其善喪厥善矜其能喪厥功不謙而凶故也又曰汝惟不矜天下莫與汝争功汝惟不伐天下莫與汝争能謙而吉故也老氏得謙之一肢者也衡廬精舍藏稿巻十五
