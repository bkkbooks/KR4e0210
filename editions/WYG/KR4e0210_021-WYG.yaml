body:
  text: 衡廬精舍藏稿巻二十一明胡直撰碑勅賜霧中山開化禪寺碑猗兹霧山青霞紅崖内􅀢嶕嶢東峨西岷迤南瓦屋外若週繚􅀢巆􅀢㞧㫚洫幽隩中谽而豂曰彼天眼神覿斯竒内典攸標挺挺騰蘭創涉中夏寓錫維僑閔兹支郍鬭剚漸啓若奔捄燎爰肇蘭若闢婆羅門若疾沃焦伽䕶繩鉢圓澤嗣基名勝孔昭普達崛興欣我盛明來並迢遥恢恢帝度因艿彼法法宇爃岧假乃慈雲藉乃法雨覃化魅魈翊我禮樂熙我嵗時永無漓澆浩閻浮提緜億萬刼鞏我皇朝席文襄公祠堂碑苟有告末世之夫臣者曰若無以技能為也唯休休有容而國家保不笑則鮮不疑之若無以強智聞識為也唯好善而天下優於理不呵則鮮不笑之不知曾子孟子獨取而喜焉何哉嗟乎此古今學術政治之繇分也古大臣孰與伊尹伊訓曰德無常師主善為師善無常主協于克一後世唯不知一故不能斷斷無技必騖以強智聞識自己出學者承之至恥一物不知夫既恥已之不知也又烏能舍已師天下之善乎故以司馬公元賢至議役法遂不能上下蘇氏之言矧其他哉程伯子以為新法之弊吾黨當分任其過自匪知一者其孰能言之是故唯知一然後能虛唯虛然後能無我能無我矣然後艮其背不獲其身行其庭不見其人然後􅊶荒馮河不遐遺朋亡然後聞善言見善行沛然莫之能禦然後不矜不代天下莫與爭功能此古人有容好善學術政治逺絶後世者不繇兹歟今上龍飛入繼大統實凖聖祖兄終弟及之訓論者膠議先儒不能虛心觀善遂致紛紜嚄唶是非相攻善類一時幾盡唯蜀遂寧席文襄公議符祖制為張桂二公録奏仰當皇心簡任秩宗乃疏辭再四必不得已然後趍任方趍任聞異議諸臣伏闕被逮乃獨上書乞貸宥之既入效姚崇要説十二事其大者曰清心寡慾接見賢臣聽納忠言又言當今急務求賢尤重繼因時事疏薦少師楊公一清新建伯王公守仁最後上所修大禮集議繤要雖與前異議者駁論是非然遇人品良者未嘗不别白意不欲以言廢人也公又因世廟成享勸上倣宋郊覃恩寛異議諸臣以次宥放奏入嘉納褒荅然竟為執政中止已又疏舉吏部尚書羅公欽順自代當此時異議諸臣大憝張桂與公等張桂亦憝諸臣公獨上書力捄諸臣不憚委曲海内才猷稱楊公一清學術稱羅公欽順王公守仁此三公者皆天下名賢上選也時方百千忌阻而公不獨舉之又自以為不逮既特受主知眷禮非常繇前為異議者忿誣繇後為同議者媢忌公惟責躬求退未嘗怙恩一詆言者今自有識者觀之若公所為其庶幾哉休休有容好善優天下者是耶非耶末世之大臣有公之心者衆耶寡耶嗟嗟公豈獨異人哉方王公謫貴陽始倡聖人之學公首相推信贈之文其言曰君子先立其大不晦其明譬之開廣居懸藻鑑物來能容事至能應藴中為道德發言為文章措躬為事業大至叅天地贊化育而有餘又曰朱陸二氏各分門户從陸者謂為禪㑹從朱者謂為支離道至是一明亦至是一晦觀斯言也盖蒸蒸入至一無我之門矣悲哉三代而上非不用技能然先立其大因材自達亦以達人故能恊一若後世顓力技能自騖强智聞識馳精於物理鐫功於器數即其所樹非不有瑰瑋之節轟鍧之績適足堅人我是非之壘增伯術功利之藩其于至一之道有徑庭焉宋仁神間真儒挺出世不能用古今扼腕今公傳絶學明大本際遇令皇天縱睿哲學先敬一君臣道協心契誠孚可謂千載一時者矣向使蚤獲握樞天假以年將論道經邦明揚巨儒俾野無遺賢可以回三代而躋唐虞詎謂公入朝未幾天不慗遺遽騎箕尾此豈人為也哉抑天矣夫既卒皇上親製祭文曰學得真傳德惟一致胡端敏公不妄許可獨稱公曰斷斷休休唯善是好又曰近世以來未有及者盖實錄云直方為童子鄉先達稱近世都尊官不喜佞䛕磬折不以恩怨臧否人唯席元山一人聞之心嚮徃焉今年春予典學兹邦遂寧令某偕學官弟子員請為公祠且有故鄉賢空宇在斗城書院後將特祠焉某曰噫何晚也遂檄邑令修輯肖公像祀之巡臺近麓李公重韙其事允議編徭辦祀需公季子常德守某冡孫工部主政某枉三百里請為祠碑某曰此予夙志因摘述公大節闗學術政治者著之石以寓其意公名書字文同元山其號其他治行具國史并楊文襄胡端敏文中兹不載道州濓溪先生樓田洞中家廟碑御史大夫汝南趙公某撫楚之二年自鄂渚行部旋移旄鉞趨道州謁濓溪先生故里睠家廟觕隘屏在穹巖絶麓下甚非所以妥神而芘嗣也怳然登降得其故址樓田洞中諏所部吏曰是地故篤生大賢其果勝耶所部進曰地故稱勝因舉直曩謁時眡所勝語符公大恱尋下所部出鍰金若干属永郡理官崔君某成之先是直讀元歐陽𤣥所撰祠記稱左龍右豸之勝比承命督楚學坐廹場事弗遑躬閱明年自西粤歸乃取道謁拜先生里下獲尋故址以左龍右豸驗則當面南離矣然南面皆叢嶺閼塞靡足覩若北眄則前之數里林林竒峯列漢表可矚州大夫羅君進曰斗嚮視之北眄審矣是當為右龍左豸其庶幾青烏家協直因嘆昔之君子或未躬閱而相襲于傳聞之淆雖數百載其疇辨焉然則學術之傳以久而淆亦何異之有哉獨直以去楚轄力莫能復祠故處羅君曰斗也竊願就之尋即搆廟堂一區㑹覲行崔君攝守慨然有表章作新之志既奉公檄殫力夙夜與羅君先後増修正堂並列五楹中妥舊像又前闢儀門大門鑿沼藝蓮以識遺愛右居宗属旁立學舍嵬垣繚之丹堊文之垣之外故有五星墩誌載以為孕賢徴表咸封土復焉創始某年某月至某年月竣工二君又捐餼金買旁便腴田若干畆畀先生冢孫博士君某世守供祀曩見一荒區耳今猝睹言言翼翼膴膴鱗鱗蔚乎闕里之亞觀也非獨子孫雖逺近學士大夫忻忻奮躍若復瞻儀型駿奔其側宛有生氣而公與二三君崇報夙心其酬矣夫于是二三君暨愽士君戒仲子某季子某將公之意走八百里以廟碑告執筆且欲發先生絶學之槩直從雉髪讀先生書將壯浸聞父師訓始識先生聖誠之㫖無欲之功越千百年獨接堯舜孔孟之緒與後支末之學指夐今皓首學未就拜辱諸君命益低回不能言雖然言未可易也因撰叙始末納周氏伯季用復諸君歸加之石永詔來者若其故里山川之異遷徙世系之詳暨公之德猷二三君之懿政則各有志載者存祭文謁告南嶽文某聞人神之職均大以其均有尊貴之性故也自匪聖人徃徃窒於形氣弗能以至性為大通是故人之舉其職踐其尊貴者盖鮮惟神魁然超形象寥然絶覩聞鼓行崑崙之内宰割溟涬之間噓噏風雷吐吞雲雨凝洩寒燠揭日月為燭列山川為宇出王天闗旋轉地軸握禍福之柄尸慘舒之令雖以逺近顯㫚之異人物喜惡之殊其無所逃之明矣故能贊功天地撰德生民造命百物沛然而舉其職巍然而踐其尊貴以視之人則力易而功倍矧惟南嶽德秉炎精位正朱明胎孕南紀噴沫兩海其靈挾羣山為宗其秩視三公為儷其道自𤣥德之聖為賔其能噓噏吐吞洩凝出入旋轉握權尸令沛然而舉其職巍然而踐其尊貴以視之百神則其力尤易而其功尤倍是故語盡性希聖稱崇盛者唯嶽神為獨擅某無状自前年秉憲湖北欲謁未逮兹者道出衡陽枉奔山麓夕覩月星私多神惠比至五更烈風猛作再經翌日凌雨成雹息轡虛堂心疑形悄屏獨自思豈塵鞅未顓歟豈牲幣未脩歟豈以予曩政之窳神將力拒之歟雖然今之仕官以王事載馳謁岳容與者衆矣匪獨予也不可謂弗顓縣官告具牲幣予以非典祀也不欲煩民不可謂弗脩予曩政雖窳神念宿轄必有隂牖曷忍終拒嗟乎予知之矣予嘗自怙其尊貴大通之性猶不免形氣覩聞之窒妄謂聖人可學而斯之未信與神均大而未能質之不疑此神所為深隠而蹔却也神之教且彰彰予今請與神約所謂超形氣出覩聞者予惟必斯之信必可以質庶幾予之舉其職踐其尊貴冥符幽贊神不予違是亶在予若神于兹日斡禍福於須㬰回慘舒於猋忽易震風而興祥雲變凌雨而揭皦日詰朝之明升我祝融將翔身寥廓極目𢎞衍沐髪東陽舉首南極引頸六合之外既以卜神之果非予拒也又以知神亦舉其職踐其尊貴殊惪𤣥造天不神違是亶在神某謹採靈均之蘭茝擷湘妃之蘅杜命𤣥夷之使策黃鶴之仙奉瓣香以告神之左右惟神夙夜圖無忽謝雨文惟神與直並蒞兹土廼當首秋浹旬弗雨民來告曰禾之穗者漸墮田之汙者已龜直與文武諸司咸切憂咨方自引咎齋沐躬祈遽際甘霖越日淋漓不後而時不溢而滋民相歡呼曰至哉神德不假呌號覃霈厥施寔豫且慈報謝之典其敢弗飭牲酒既陳神鑒翼翼尚享歐陽母蕭太淑人誄文於昔鴻德孰不有先匪伊哲父胎教維甄三遷遐躅千春罕􅀈韓國紹之六一肇賢瑋兹洪族明德世延曠三百䙫母相後前猗母之生西華精搆寶婺昌暉皇姥贊厚璿式金相桂芳蘭茂磊砢岩翁六一景胄豪不事産鶉裳甕牖母昔相之德伉志偶少君婉嬺翟氏貞淳敬脩蘋藻孝飾椇榛絺綌載績雖耄猶殷彩翠明璫雖貴罕親匪母之瘁孰翊翁仁又孰俾翁賦詩酣醇坤德靈含育兹少宰母訓之學曰志其大少宰敬持希聖自待迪惟母言兢兢罔怠白首宦名母弟内慨嵗在涒灘翁也長辭母偕八袠噭噭孔悲孝子有懐篤念母耆擬卧林阿奉以逶蛇徴詔自天夷猶且疑母執不可督徃以期曰爾終養孰與以禄矧乃未究曷云終伏吾尚徤飯偕爾北轂少宰弗奪乃脂其軸上國三霜蔑不戬糓帝睠日崇喜且弗告維帝簡在將扶皇樞視母食幾為國休虞焜煌封典眷意則殊卜相淵𠂻龍章已書補天柱地可計居諸禱母百齡朝野一趨倐焉告祲收華委戢容軒朝改靈衣暮襲純孝擗毁呼天莫及哀徹九乾帝聞於邑逝者可悼行者可悒上公庶士同兹阨塞吁嗟母福純嘏彌臻偕耄伉儷猶踰十春式榖爾伯學漸聖鄰亦有叔子隨和希珍孫曽蟄蟄瓊樹石麟凢兹福德韓國莫倫某等誼綰兼玉情均子姓少宰之門昕夕就正母壽祺吉靡晨弗詗聞前之日緝紉維竟兀爾神遊聆者疑信天未回遹殱兹女聖登堂閴寂題凑已宮翠帟飛埃錦幰凄風酸心白旐眇泣房櫳悲豈一端能不忡癃灑奠晨輼曷罄哀𠂻代祭繆進士文於維先生挺髦韶稚鑽𤣥丘索遨精百氏揺藻飛華夙標瑰麗南斗躍鱗北闕奮翅治安天人期展恢議純孝結𠂻有懐不寐痛思慈堂榆日將墜勃焉舍紱反服初志晨夕潘輿宴林禊氾自視斑裳衮龍詎例彼惽庶草絶裾囓臂名閥雖熿㓕天傅穢先生巍峩夐超末裔生罄其歡沒而殘毁庶幾昔賢永思弗寘純懿天毓恬漠自味瑋兹明德頽風有禆逺期未伸戢景何易衆物新蕩賢者曷棄招揺堕彩少微隕嘒某也應乏升邦欽風托契寶厥懿璞渾淪莫刺慨兹龍淵霜光未試過車腹痛繚思莫置緬惟立德芳流百祀彼庸握樞雖髦曷貴先生長歸曽史奚媿感舊懐賢薄奠遥致代祭馬翰林母太夫人文嗟乎余聞太夫人之訃未嘗不摽心絫息蹙然怳然追嘆賢母之德痛傷孝子之心也雖然余又未嘗不為太夫人慰昔者臯魚少游四方故以不及母子相歡為痛子路得歡集矣則以不及鼎茵之奉為憾二者雖為人子之至悲然親之遇不遇亦有命焉自余蒞兹土得竊交翰林君知君之為養者甚盛而夫人之遇不可謂不厚始君以名才著江左至片撰隻字皆為海内珍慕夫人嘗用以解頥矣迄君起甲科翔翰苑人孰不君榮君曰吾豈可一日違膝下遂謝去金馬之庭疾返玉華之麓遺棄世俗之交日奉慈闈之座吳越珍技山海竒品圃則板輿溪則畫艇少可娛顔靡不戒陳既鮮臯魚離析之憐又罄子路鼎茵之欣矧夫人冠德名閥惠問昭閎相其夫子倫魁仕成祺壽多祜凡皆備至求之近世寔寡其儷夫人亦可以舍然自慰矣嗟乎余豈獨為夫人慰且亦為翰林君慰用馳薄奠敬奉斯忱於惟靈淑庶幾有聞代祭大總臺屠公文粤昔陶唐分能釐職契教繇形皓髦弗易譬人一身股行肱翼各奏其功乃凝庶績公生明時長立辨朝逮事今皇實際唐堯爰作副相憲臺握杓遂迄其身曷異于繇自公總臺有肅其紀外察百寮内贊銓㫖貶退稱揚黒白直指正色立朝衆莫敢睨世方鶼蹷公獨松栢世方炎熱公獨氷雪臺端風生門羅可設法冠表儀羣紳橛闑其止淵岳其動雲雷呉鈎剸象秦鑑擢眉國有大議定如灼龜當衆紛呶執義不回弱翁封奏延年法令思謙謇諤方平孤勁以公方之實兼而夐匪帝知深宮保曷命猗公生德􅉽出鴻系太宰兆興斌斌有繼丹穴飛鵷洼渥産驥玉幹瓊基瑰辭瑋藝登朝觧褐聲蜚已融爰自筮仕受命乗驄威稜崒嵂蚤已稱雄簡花飛霜筆端凛風持斧江藩鷹揚虎視䟦扈顔消神姦魄褫郡國藩臬竒績魁􅕲累級邅迴迺登卿貳載進司冦帝眷彌力復借法臺左右孰識蒼珮雄班絳騶夐秩匪公之鍊始終曷屹人皆幸公重休累吉鼎鉉台垣贊機决宻云胡傾阻慗遺弗戚天子震悼羣公淚溢穆穆天子禮憲是崇謚以昭德贈以榮終龍章鳯藻映邦輝宗豈獨焜煌賁於𤣥宫某等分綴末寮情均戚姓隠甫方嚴敢不承令循念夙昔徘徊悲哽懐德憶標憤悰各韞北望靈軒莫持紖紼緬惟我公終為世則後代有述終天靡没托辭布心曷究彷彿祭貞穆先生王九逵文於維先生胡可云亡孰緘來訃廹攪我腸始聞則號號詬彼蒼既諒猶疑疑益彷徨彼人生質儻蕩浮游才佻器狹位溢寵流此儕不延曷疑以愀我憶先生匪若之仇廣顙豐頦巨凖長耳其止山屹其行雲駛背可負天力可剸兕脩路方馳亡也豈理先生生德淳懿淵澄中年聞道恭嘿而凝觸之井井扣之鍧鍧酌江不竭注海不盈才也如䖍轗軻奚右器也如雄矧未有後志豐位儉德祥命疚維天操權尚滋其壽胡焉貞穆謚於莆陽胡焉靈輼歸返家堂張生之音瞭矣其詳彼蒼回遹先生果亡予少狂悻髙自摽已貌彼醜庸唾弗以齒先生顧笑欲規復止予觀其顔化吝消鄙於時先生强仕年踰名貴長行遜避碩儒廼忘年德降友于余靡日不談靡談不俞兩上春官同舟合舍庚戌之嵗閱涉春夏禮闈試蹶選部名挂㨿稱年例邑郡是借予曰不然曷審於兹薄書繳繞孰與學師朋怪僮怒先生罔移聞莆之教以聖為鵠以身為倡以志為鏃賢愚大小如炎斯浴如飲於河各􅂶其腹閩士之慶吾黨之悲猶期誨我豈曰長離我於先生骨肉契誼哭未憑棺奠莫躬觶燕臺别手遂成永棄已矣勿言期之夣寐蜀歸告歐陽文莊公墓文初吾師之薨也不肖某操血為文悲夫以重厚如勃之身馭變化猶龍之氣乃不得大斡斯世徒騎箕而疾返于斗維今吾師墓木已拱不肖某猶鞅掌濶絶未能早歸伏宿草而灑杯酒回視古人築場獨居之事邈乎遼哉即痛以殞其胡為贖不肖某宣力四方踰十年雖於道未有得然自是驗知吾師之學灼然可以繼堯舜孔孟之真者以出于仁體故也當師之時世之語學髙者溺虛寂而卑者入權術師慨而言曰是皆未見本心唯不忍人之心乃本心也一日不肖某陳述遭風舟顛不動為難師曰既不動而能討慮捄拯乃難嗚呼是乃見堯舜孔孟相傳仁體大而天地散而萬物逺而千萬世之上下四海九州之内外無不相通無不可盡者此也於乎吾師已矣獨恨不肖某不能以身發明痛毒何可勝言雖然師之道無先後亦無隠顯其致一也不肖某今雖病伏草野猶期晚節要不隳仁體具以上報罔極之德敬用粢體告師之墓惟師至仁尚黙相之初歸告先祖父文叨第十稔柄學二霜心欲有為而病適相左時方可效而氣未克充今荷皇命以歸寧寔藉先德之𢎞庇小子某敢不欽哉仰承我祖父忠孝一脉雖伏草野彌求無忝謹用清酌庶羞盟告我祖父之明靈呼程後臺太僕文嗚呼吾兄逝近載矣而某相去不千里尚不馳一奠寓一哀以告兄之靈某疎薄極矣然而痛兄莫某若也某徃實愞弱始遘金鄰荷相挈於道當時視兄行若飭氣若恬其語道若親又數年復遘燕臺當時兄别有得矣視兄行若達氣若徤其語道汪洋不可以畔岸某曰兄進矣已而疑之以書質於兄書之意曰人心有本然不動之體而無以氣魄當之有本然無為之用而無以氣機承之仁者不憂勇者不懼此本然不動者也若夫身臨矢石了無驚怖者雖亦不動特氣魄之雄耳故有持美人以悲歌面故君而戰悸則雄者餒矣而可以氣魄之雄槩認之為不動之體乎孩提知愛及長知敬此本然無為者也若夫好色一接忻愛隨生者雖亦無為特氣機之順耳故有對賢妃而斂容覩桑妻而生媿則順者阻矣而可以氣機之順槩認之為無為之用乎是故本然不動之體不以氣為雄餒者也本然無為之用不以氣為順逆者也盖性雖不離於氣亦不混於氣任氣混性去道逺而嗚乎某斯言也非獨書也邇年兄官僕丞某又以告而兄終未有以明見復也詎謂兄自認其學浸淫病且逝矣而予猶不忍不以斯言告兄之靈也嗚乎兄已超形氣翔大廓魁然與造物者㳺兄必有嘿以啓予者矣予獨憾不能盡於生前而徒申於死後也故也莫如某痛兄也鄒東廓先生誄文於昔姚姒執中啓傳文功紹之帝則以宣箕福之斂皇極攸先猗我尼聖獨纘其全從心不踰爰在傳年大哉斯矩靈承自天渾淪無朕萬感燦然裁成輔相維變所遷雖變無方天矩行焉微有低昻禍害孔延肆惟上聖兢兢業業亦惟上賢中庸斯擇晚宋之儒惑焉莫得弗揣其本外求物則探索紛紜訓故磔裂天啓粤賢獨禀靈特曰惟致知匪假推測致其本良匪外物格上遡中極千春一脉寔啓吾邦瑰哲駢昌煌煌鄒公登孔之堂繹公韶齒奮䇿帝傍左馬揚班非心所臧致知之學自信而當請事有年醇明堅剛國有大議精白飛章邅廻外服愈挫益揚孤忠碩節日月同光德聲義問四裔彰彰起佐青宮沃心孔亟圖上聖功施弗遑及嗣教成均士風是植匪惟多士朝紳有立爰及門墻達者匪一感事乞歸朝野共慼原公之志六合同室稽公之學位育可必既巻而懐憂道彌力豈同淺夫悻悻自逸大推所學與世共明繼絶開來仔肩攸承下逮寒畯上比公卿有扣斯應兩端盡傾如彼喬嶽不震不騰文梓枯樗鮮弗抽英乂若溟海瀇瀁瀰溋神龍毒鰐悠然並生公庶幾哉愽學難名維公道愽約之有主維公智員實方而矩行上庸德言無綺語孝弟之行神明可覩進退之操雲漢一羽細行必矜片善是取物俾得理人令𫉬所瞻其儀型慢者就度聆其磬咳狂者氣阻教脩林閭風加海宇乃當時士趣徑騖竒髙者悟性圎覺無迷妄者適情儻䓪載馳以是自堅蔑視典􅃔未及志學縱心委蛇取予進退謾無所持三千三百曰外威儀孔孟盈談迦周寔師流澌之弊桓文卑卑禍道之深豈曰支離獨賴我公正色自持手揭日月以開羣翳身為砥柱頽瀾寔支曰知本良唯致乃盡赫赫帝矩罔念為病全生全歸毅焉獨任豈謂今兹遂終正命豈孔之學壽筭亦並公無少憾世獨弗幸某與令子世誼維夐矧荷公教豈殊子姓倐聞公訃五内崩殞人孰無逝孰無可傷唯公之逝豈闗一方維世於公冀還亮弼堯舜君民寧論召畢終老洛社僉猶望之一朝傾徂天不慗遺斯世何辜斯道何阨公既徃矣魑魅晝列喬嶽若騫溟海若竭日月之懸雖明孰揭前年京歸走門請謁公面命之仁道是責我今復來誰為我惻我哭無聲我痛何烈期與令子共率公教帝矩之訓願言自斆惟公之神無間顯幽尚期翊我鑒兹黃流祭羅念菴先師文維嘉靖嵗之乙丑二月十又九日不肖門人胡某寓蜀之彭山縣官舍於時聞先師念菴先生之訃設位致哭易七日矣乃敢以香楮牲醴之儀矢心陳辭告靈位前言曰嗚呼某自初春寓蜀省客有言先生以去年中秋日棄去聞之皇懼如墜如摧欲言弗忍欲詢罔從然而情知先生之逝也果矣盖先生前年書云右臂不仁於夕死可矣為近已而去年六月書又云某固知先生之已躋於全歸而又不欲先生之數數語此也孰謂先生亟為永訣捐斯世而歸耶嗚呼痛矣夫善世者道善道者心自明道象山二先生之後學者仇心以索道辟諸掩目而求天至近世得陽明先生而一明得先生而天下始信今先生即長逝歸矣其若斯世之將復矇矇何哉嗚乎痛矣如小子某少負不覊長益駘宕方壯而耳學也身棄之踰壯從先生遊入恱也而出違之既近強年始稍知尋繹十稔以來粗謂從事然兩歸就正先生兩訶之曰是子所謂目長而足短者某聞言廩廩亟欲解組卒業終身而謀歸不勇旋成長别自是以後將孰為予訶而予證也天而喪予則喪予矣乃喪予先生予何歸哉某又何獨為先生痛為斯世悲已耶嗚乎生既不能就左右以終至教没又不能啓手足以聆遺音豈某也天厭之甚而先生遽絶之深耶報者云先生臨終沐浴冠服端拱而後化葢報者未知其為得先生之心也而某固已嘿覩之矣先生其誠全歸者與嗚乎某今年去先生之終少十有三年耳以先生之淵懿而不留也况若某者其能久乎使某之學誠以日為年則日且不足矣又安能望先生之全歸雖然舍全歸無用為生亦無為先生報異時曷從見先生九原無靦面耶嗚乎某之斯語心商之七晝夜而後敢告惟先生其終相焉嗚乎悲乎松原鬱鬱桐水湯湯哲人萎棄山川凄凉繹先生之末路雖閉户其皇皇胡靈鳥之不至將令天下仰日而違光睠衡霍之崩頽羌何依以相羊維予心之憤愠横大塊其靡藏魂乎乗九乾其飄䬙兮予獨覩儀型於秋陽爰矢心以報德瞻昊天之茫茫唯反躬以為歸兮或庶幾先生之毫芒神靈浩渺無不之兮驂雲氣以來嘗祭軍牙六纛文自昔元戎聲討逆命建牙樹纛鵾熊交映指揮三軍威靈甚盛今承帝㫖戡兹不靖大兵啓行吉辰協應惟神精光驅電毅氣乘風騎青龍而翊白虎握太一而叱豐隆招揺東指直殱元􅇯兵不血刃妖穴坐空克謐蜀土用昭我聖皇安民之功爰脩禡祭神其允從祭張南軒先生文自孟氏没而功利之習日倡日錮堯舜孔子仁義之道日以闇蔽漢唐儒者徒知矜其名象涉其藩垣然而功利之入人者未瘳辟之陷泥淖之中雖有強者左傾而右跋有能登其岸者彌寡唯宋濂洛崛興得千載不傳之緒以無欲為宗以天理為極其相繼而出者雖見有通塞得有淺深皆知求無欲以復天理總之歸於為仁盖皆嚮徃堯舜孔子之徒然人雖知功利之非亦或有依違其見不知念慮之微少有所為即與粹然無欲皦然天理者不相為矣南軒先生聞道甚早大本卓然先儒葢嘗稱之至其立教以無所為為義有所為為利然後斯人灼然知一念之有為者無論善惡咸出功利咸非無欲天理之真而天下學道者之趍始從以定是先生之有功於斯道吾不知其與紫陽夫子孰後先而逺近某少喜駘宕長乃聞學然質駁而習深將就而繼渙邇知媿奮恨無若先生者為之就正兹者繆執文柄過車遺里髙山仰止載瞻載奠意者以一時對越先生之心一無所為者即無欲天理之真將以此自終以此喻先生之鄉士俾皆繇仁義不入功利寧非先生之指先生鑒而牖之可也大益書院祭文具官某敢昭告於宋濂溪周先生之神維神崛興荆楚之介逺紹鄒魯之傳闡無欲之至教啓學聖之真詮心法廸乎來哲身範賁諸西川爰惟兹土嵗祀孔嚴暨明道程先生伊川程先生和靖尹先生譙先生南軒張先生鶴山魏先生大明敬軒薛先生道林蔣先生或宦逰而徃復或篤生以後先雖古今之殊代寔教澤之同源咸配享於無斁將佑啓乎來賢祭蕭晴川姑夫墓文惟公生於熙代醇氣未失故能以太樸為使純素為匹雖世故之多更而迄不知有竒衺之習育於仕門家範彌殷故能以詩書為腴禮讓為芬雖先業之克守而終不知有勢力之榮不含舊惡不責宿逋衆或病其寛也而公則自喜其無尤於世不跋湖山不踐公庭衆或譏其懦也而公則自安其無累於已求之古人閑家若龎德公之敬履世若李士謙之任公其或庶幾哉而無愧是雖謂公為遺民為處士葢今一鄉之靡有異喙直不榖辱為公夫人猶子爰自結髪粗諳詞章公愛若掌珠䕶若荆璧惟悸其或傷養若蘭芷望若把梓惟忻其日揚葢嘗舉先祖父之薄修以勗其大者又奚啻若世俗之冀以顯融而焜煌逮直壯領鄉書隨復連蹇世或見病公獨掉頭哂曰若子何虞不晚榮耶以公自負誠若古之氷鑑而直亦冐登一第官中大夫列職憲臣若足以償公之夙望然學不成身業不禆世顛毛半斑思報未能而公已仙遊無有之鄉矣兹者幸乞身於林莾懐知已之難忘尋龍洞之奥室采虎峯之幽芳憶儀型於故武裭百結之迴腸謁靈丘而灑泣痛欲報而莫將跪􅆽酒而陳詞擬明鑑之煌煌終何以酬德於九原耶期不靦顔乎斌姥之崇岡奠歐陽蜀南兄文於悲嗟哉兄乎兄乎乃曷為乎遽前予而長徃乃曷為乎遽履兹而中斷彼蒼蒼者既封殖其德矣乃曷為而不能引其年彼人人者既傾誦其懿矣乃曷為而不能衍其算予又曷忍搴帷憑棺燎香灑酒奮予臂也不能把兄之舊裾躡吾屩也乃復涉兄之㝛館兄之顧予愛而且望若属於毛若比於目聯則達弗聯則弗達不啻若世之所為肉骨予之視兄敬而相倚一為腹心一為藥醫有則生弗有則弗生不啻若詩之所稱塤箎維今之日翳誰之為有此懜懜乃裂吾属毛比目之親刲吾腹心藥石之重予曷繇自達自生竟天壤而抱長痛憶予綰髪操習時義妄獵古辭狂咤雄睨誤損髙鑒鐫心盟契有偉王生曰尚涵氏暨予三人陳雷自例鼎足交峙車輪互麗始從茶山龍洲相繼晨展共書夕眠合被廿年之間有離不季嬉笑罵怒寧知諱忌有亡臧否寧分此彼父同伯叔母成妯娌維妻與子各執分誼於頽波中特樹友紀孰使然哉唯兄之義豁達慷慨令人傾肺當此之辰兄出紈綺予孤且凉捉衿不蔽予反嗜狂兄獨陳義直諒貞風世孰為儷暨予壯齒折節慕學躬弗逮言屢興屢落間趍二氏兄心厭薄強仕天牖繆悟愽約兄聞欣欣蹶然而作月書嵗緘期共有獲晚復同師堅貞澡濯嚮道週饑聞過雀躍亦有王生有訓嶽嶽予􅀝兩君為鑰為郭唯兄毅然指瑕糾錯翊予恱親敦予體國小言繭繭重語諤諤是嵗之春予歸林壑茶山之刹襟簮復合予察兄志彌勵而卓兄訂予功若漸有覺追兩師門冀共光爚時云暮矣皓可無怍予喜得兄殘齡有托繇斯以言兄之于予豈曰友之盖友之上而師之末於悲嗟哉天而喪予則喪予矣前嵗殱吾師今嵗又殱吾友予果曷所依以畢此殘齡其為弗達弗生决矣予嘗較量以兄之詞翰雖文蹀栁李詩闖岑王可幾也兄獨中斂而不揚其芬以兄之經猷雖小為龔卓大為姚宋可幾也兄獨坎􅇄而未導其泓乃徒黴跡於黌序局步於江城豈弟被于鄉閭孝友範于家庭俾里之人士生而羣頌死而巷哭咸曰善人善人此盖千百中睹兄一人而已天乎懜懜曾不裒益乃不為千百中而延兹一人於悲嗟哉予歸未半期而兄以病聞予謂病常也抑有托也孰謂兄竟潦倒浸淫遂遄别而終冥若俾予徒懐萬斛而未逮一語若俾予共要千里而未升一程傳兄病殷亟呼予名豈兄計此將有云云予念及兹益靡為心今也挈帷胡不聞聲呼天大呌秪摧我膺雖然若在他人死則死耳於惟我兄其必炳靈余來哭此豈不聆音維兄髙堂自抱德馨余與二王起居必勤驥子麟孫日長以成久要之約豈獨世盟兄姑寧矣無悽以怦倘有來生猶冀長親於悲嗟哉兄生而期余逰五嶽覽重溟今兄翺翔太清靡所不之翩然而洙泗渺然而洛濵其將閔余聲之噭噭而笑余涕之淋淋者耶祭歐陽乾江兄文嗚呼嗚呼吾兄其果逝與抑非逝與其可逝與抑未可逝歟唯予創聞勃焉震墜既信猶疑既疑且悸疑信之間一欷百淚胡浩浩之回遹仇吾徒之特酷厝萬毒以藴隆莾一朝而隕禍肆之子之遽遺若駒迅而飊促延倉公而舌橋扣華生其駭矚辰搦筆以摛章已遊神於㝠録豈至寶之易毁抑吾道之竟孤爰雪涕以致詢偉孝誠其中紆依慈母之轒輼羌屏獨以云徂曰余偶兹竒運適寢瘵而避居徒撫枕以飛血吭欲絶而猶呼將呌天而無從急憑棺之未得増頷顑而侘傺彌菸邑而繚結緬思子之㓜儀濡夫子之貞則少醇懿而姱脩又益之以博物越既壯而雄飛冠多士以稱傑謁南宮而屢剥試中秘以獨馳台垣資其文彩同志倚為龜蓍維訏謨與讜議世食福而弗知旋為郎於都水屢宣力於曹司時瞻雲而惝怳尋遄車於孝思世方欽世德而景名才冀豹澤以大厥施何哲人之長萎若濟河而摧其巍桅嗚呼嗚呼人孰無死孰死於親唯兄之逝實孝之屯世孰無殀貴反於真兄年五八視耄尤珍翳予小子踰冠䓪宕造謁夫子禀學函丈誤題狂簡槩語以上退辨于兄粗識如徃閱歴歳年誼孚情鬯既均裘馬亦恊􅃦餉異胎同心殊宗一尚維予質駁多岐亡羊中年仕官取友四方徃轍徒悔來軒猶僵各成皓矣復合一堂期掎角於脩途補東隅於榆陽方將朝聞以夕死庶不赧夫子之門墻縱侈哆以百車獨相保於心銘念尺書之昨飛展宿墨之猶瑩何虞子之捨我曽不留信宿之為停乃一語之未訣雖千號其孰聆矧慈母之未歸兄豈忍忘於怔營且令予矢力於末路又誰為之啓扄亦孰芘而孰翊恫惟予之俜仃閴登堂而弗暏㷀諸孤以涕零奮百身以從之亦安能返子于幽軿知醴脯之空薦挈肺肝以敶明靈奠袁生文雩陽袁國用少從先府君學文今嵗萬厯甲戌春忽自雩獨身訪予山中盻予舍不里許移跬之間遽告終矣予創聞駭痛躑躅尋備棺􅀈殯之旁便地抵秋厥叔某遣迎其柩歸雩予適病不能送江滸情益愴惻乃治牲醴之儀為文將之其詞曰悲袁生乎悲袁生乎生昔者被服紈綺僕𨽻雲從乃兹則鶉衣擔簦獨行無徒胡豐約之異致也生昔者韶齒蕣華有力如虎乃兹獨孱骨愀容寄死道塗胡死生之變迅也子獨不知豐約者幻也幻不以先後執死生者常也常不以遲速避從古今不尠矣奚獨子哉然則人之寓世曷豐曷約曷死曷生如􅌲曷嗇如椿曷賒西昌曷旅雩陽曷家嗚呼靈其歸矣無滯以嗟同郡㑹祭雷太母文唯天孫有淑季字瑶姬而明靈睠秭歸之壤奥逼埵竈而氣蒸出黃牛之神峽溯峨岷而始平將間世其氲崇孕三楚之竒珍駕列星以為軫勅女須而導征既降芬於名閥㓜婉嬺而居貞厥相攸而獲樂逑君子以作盟彼君子之顯允偕令德以為行介和祉而祥發爰篤生此岐嶷鳯振輝以鳴漢驥驤首而騁逵庶淵騫而履順絢賈馬以文馳乃飛華而颺藻標瑰麗於彤墀亶執法於爽鳩為律魁而靡緇誕帝眷其洵美曰唯繇兹母儀既褒表以鳯冠又張之以嘉詞分大夫唯虎符牧下國其勿辭盍愉養以徹侯鼎五七而前施嗟此邦之湫陋獲神君與仁父首露冕以詢俗恫地瘠而吏窳袵白胔而肉之登沈溺於澳煦既露湛於嘉禾亦霜清乎狐䑕外䕃棠而瞿瞿内承萱以與與矧抱氷以璧仞疊九邑而風鼔合庶草之忻忻靡不歸顧腹於太母方伺母之休虞指遐齡於西華之姥胡大命之有極致眡䘲之遽告既大夫之崩穹亦吾氓之喪昊慨蘭茝之收華嘆驊駒之梗道誠吾邦之凉􅍈豈明賢之寡造嗚呼哀哉某等僉飲海而思河咸瞻璞而欽寶睹素旐之翩翻盼櫬舟之披縞外為民而灑血中憂思其如擣爰悼逝而愴離跽陳詞而薦藻同邑㑹奠劉軍門母太夫人嗚呼豫章之材橫絶百畆上負青旻下芘千乘而匠石者斵其末枝可棟王闕長河之流深灌地軸經帶秦晉潤澤中夏而都水者引其支􅉽可浮萬楫其功德若是烈也而不知其托於靈嶽發于名山貞靜愽厚之蓄固敷森瀇瀁者之攸植而攸溢昔者五嶺之粤楚閩之交雄虺卯蕃恣睢吞餐雖當事者破斧缺斨不能定也維中丞公開府仗鉞𢎞布條教間飛尺鐵噓噏尊爼三省坐帖又昔以繡衣操斧巨芘渥波浸被下國不啻豫章長河之烈而不知其出太夫人貞靜愽厚之遺澤人之言曰可為衆母不可為衆母母今太夫人衆母之母寔靡慚德矧聞聖善含祥紫金挺淑名族仇德髙閽母儀璿式婦則蘭馨近蹀申國遐儗桓君乃中丞公奉乗傳於江介萃海錯而山珍方衍祉于下方遽掩彩而歸真痛寶􅄔之墜曜愴天孫之闇明豈中丞之失恃洵吾邦之隕厥親倘逝者之可贖亦何恤千百乎斯民佇龍章之自天將焜爚于泉扄偉中丞之揚顯信振古而耀今嗚呼太夫人且逍遥從西華之軿而民士之將迓者又曷庸欷噓而掩襟某等或叨通家或激輿情悼逝悵離覿旐心崩抒悰寫詞薄奠聊陳於爍明靈翩焉居歆祭少司馬張公母太夫人文猗太夫人武閥焜嶐作嫓名哲轟振儒宗曷言振斯義方教崇毓驥渥北孕鳯河東溫溫少府循政稱雄暨少司馬灕水雙龍伊昔司馬爽鳩發軔時有重人繆操魁柄頤指朝紳從風奔命紛世澒洞寰海氛䘲英英司馬亭亭孤憤飛章熛闕借劒剸侫彼髯且都冠珮峨如聽咸縮頸語競全軀毎恃創至猝聞而愉大哉訓詞罔替乃初世之頌母女冠丈夫維漢滂母千載同符子戌夜郎母返西粤荏苒十霜國是再揭司馬登朝母惪彌赫鎮䖍撫楚脩能濊澤彼穀者疇繫母之烈帝曰允哉忠孝一轍簡倅樞府安攘是資視母徤否計國安危司馬伈伈曷忍倭遲回車覲母封疏自題臣母耄矣將母有期帝意未釋母壽遽違我知二難擗踊摧裂捾紳共悼帝聞孔悒猗太夫人上壽屹屹矧維賢嗣芳流靡極矧兹司馬歸慰且訣純嘏世稀誠孝天格某也憶自觧褐雲司共升司馬堂奥道義情忻邇侍楚臺飲德滋深今官兹土休戚同襟耳熟聖善日領徽音慚未摳衣拜母階庭薄奠遥馳於赫來歆祭歐陽鑑翁先生文於維乎翁遽作化人寢於大室令人哀擗如摧如擊某也爰自束髪好文負氣徬徨馮閎交游紛集所不雜者惟與令子文朝偕尚涵氏少同研筆長共衣裘瑕疵相箴德業相求出王衍㳺有若麗澤之為儔緣是承接翁之顔采而沃領其風猷誼次骨腑情通戚休誠非一言之可以酬獨唯昔者予自蜀歸翁已縣轂七􅐆髙年髪鶴顔玉予隨弁紳搆文為祝拜翁元配偕臨皓顛融融堂奥祖孫曽𤣥日宴賔友傾倒繾綣雖立酬百觥而令儀之不諼竊度翁之遐齡盖有巫咸莫能測算而司命莫能制年亡何某起楚學繼辭廣臬感先慈之衰孱再馳疏而舍紱獲覩翁之風度猶曩而慶翁之年齡及耋擬為翁賀情彌殷而意彌結乃今賀者未幾在門而吊者已即及乎庭闑又曷強為之哀些某也憶翁之慈祥性植孝友天畀愴先人之手澤雖耋年而隕涕仁睦三黨初終不替守廣德佐河間曾有部民夏氏藏金於茗簍翁則立拒峻却有若㧞刺盖既追崇公斷獄之求生而又嚴伯起四知之尤勵兩地士民實咸有來暮之歌而翩聮去思之繫頃以郎署疏歸雖故相推轂而拂衣罔滯迨抵家晉秩已近暮齒猶薾薾而若處女抑抑而逾壯穉或者語及干謁輒赭色掩耳而為之引避盖翁抱德煬和復謵不餽已外非譽而忘人似矣以故鄉衮子衿日相評議不云古之長者則曰今之善士夫以翁之居家當官以逮處鄉非啻寡過寔垂典型彼造物者雖假之純嘏而綏以百齡庶足荅姱脩而慰羣情胡天使難弟文子之溘喪淑配冡孫之繼亡翁以一人亢完休畢一門不二三年翁亦病足痿而退養於闒房以粗床敝席為佳趣以劬躬燾後為美場詎其食飲起居靡有竒尤乃焱歘乎乗東維騎箕尾而神游乎茫沆某也撫今悼昔又安知涕横之短長於維乎翁人之聚散死生懸諸大鈞猶之大壑然注焉而不能滿酌焉而不能傾若翁之令德冠鄉閭宿名重朝紳天壽八􅐆暢其緒業矧又有孫曾雲仍衍麟定之振振翁亦何憾而不為長瞑某自聞訃恫哭恨不飛越乃阻哀艱有功緦不吊之例然某與翁父子殊宗一體又詎可以例埓乃奠村醪乃宣積悰知翁之用物𢎞而取精豐溯虛泳爽冀必能憫鑒予之沉𠂻於維乎翁祭太僕少卿劉仁山文於乎銅爵逸足翠華是肩函牛九鼎弗以烹鮮大器重負自古則然悲嗟我公廼獨弗延百年長算短日而捐萬里脩途末路頓顛公乎至此豈天弗憐予始聞訃涕泣有摽適也居廬沈疴百繞幾為化人從公世表念至必吁談及生悄公秩僕卿秩若非尠公壽踰艾壽奚為殀所孔悲者匪世之曉維公巨才匪擬常局六飛未駕虛稱髙躅試為池沼豈罄淵谷世患無才才莫竟録既録而晚乃至中墮於悲嗟哉匪予也獨追惟疇昔盍簪駢轂當斯之時楚材寔繁磊砢廓落惟公軒軒祝融是孕雲夣可吞榜則連茹師乃同門情蒙例海學共探源予西公南各天異轅胡期西粤爰追熊轓職業既聮心腑彌結昕逰膏繼夜集曈輟身箴是琢民理均切于時覿公如揮巨闕星軺所指霆颭雨澤計耘小醜兵殱巨賊蹇蹇鞠躬䕫䕫許國蠻烟毒霧積憊疇知早不登公暮稍陟斯扶揺奮躍竟逺天墀一朝長委如山斯隳方窺牙纛竟塞鍾彛天既昧昧世則疇資矧予違世於公厚期公竟已矣百贖已遲公返夜臺今已三期掛劒有在絶絃為誰表墓緘愫病不身馳孰諒予悲公必諒而衡廬精舍藏稿巻二十一
