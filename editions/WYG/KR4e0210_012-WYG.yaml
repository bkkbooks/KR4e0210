body:
  text: 衡廬精舍藏稿巻十二明胡直撰記遊峨眉山記予以乙丑仲春之念六日晨發峨眉縣西城從了寳樓陟華嚴寺過楚狂接輿隱處潄玉液泉徘徊懐之西上為中峯牛心二寺為雙飛橋雙飛者以二水從山巓懸溜百千丈始合流於谷底震盪林木間聲轟如也南為後牛心寺為孫山洞寺僧出眎孫思邈丹竈藥爐制甚古西為白水寺寺後羣峯林林若笋然是夜宿寺閣詰朝卸去車從乘小籃輿上頂心坡坡嶃峭行若躡壁衆戒下窺予下窺自若也又上為九嶺崗長老坪猢孫梯咸斗絶又上至峯名初歡喜雪皚皚封崖壑猿鳥盡絶以為至矣己而厯蛇到退至梅子坡最險雪益塞道不能以輿乃與從者魚貫縋牽彳亍傴僂五管在上一休一升仰視峯腰咸雪白一色絶嵿蒼鬱髣髴倒出漢表雖自顧疲殆而神從景王不羽欲飛又上至雷洞坪坪上巨木凡㡬千章皆金鐡幹被緑髪苔雜冰雪磔格聲琤琤然中通一徑可七八尺許左右深陷倒視窈黒雲霧茫沆相逐不知幾千百丈也相傳雷雨居其下一聞人語鼓吹聲則雷大作過者毛骨洗然非人世矣豈亦所謂倒景非耶又上為八十四盤險踰前比上至峯名大歡喜路始平入天門石石雙峙如門厯七天橋抵光相寺寺殿皆鐡瓦是為絶頂環顧白雲滉瀁若身在混沌視天脚反在下有二鳥名佛見及異䑕咸就人取食若相然僧告予曰時暮矣明晨請暏光相予宿至晨起稍霽衆躍曰光必現矣比予跂崖巓隂霧漸塞靡所覩有儒者曰是不必見彼下有放光石焉當其雲蒸日麗與石相映盪之為光光不為異余曰唯唯有禪者曰是大不然此光出時一切見者於彼光中各見已像甲不覩乙乙不覩甲若此光者出於雲日則當如水中鏡中彼此互見今不互見乃知是異余曰唯唯於是峨眉曹尹進曰某去年侍訪院王公守廵楊王公公咸値光現各睹厥相果不互見今人譽其所常見而毁其所不常見姑不逺引即此蜀地若火井油泉皆所目徴若皆以常見毁之豈不誣哉子思子曰及其至也雖聖人有不知歐陽子曰聖人治其所可知置其所不可知者是謂之中道余亦曰唯唯至午有驛騎捉余歸下至梅子坡雨如注行者艱倍前日竟不得睹所謂光相佛燈及雪山瓦屋之竒下逮黑水龍門咸莫到焉至雙飛橋有僧楚山潛奥洞十年忽自牛心山後披荆莾間猿行出逆余訊曰山巓睹光相乎余告以登陟危阻未有所睹楚山囅然笑曰公豈以未陟峨眉為安乎彼未嘗安也以未覩光相為少乎此未嘗少也余又曰唯唯既還雅久之有峨眉馬鞌山僧某者自山五百里踵雅稽首乞予紀遊予憫其勤為書大畧貽之俾加諸石以諗來者謁蘇老泉墓記客為言蘇老泉墓前山水稔矣乙丑三月之四日余方寓眉乃偕鄉大夫張中丞徃謁焉先後出東門十里􅔰石龍里之柳家溝逶迤平岡間有墓在焉墓前列祠屋三間槩視前後山水無甚異里人曰墓湮久矣去兹有廣福寺盖宋哲宗勑建為老泉守墓者曩鄉大夫士疑墓在寺後已嘗加土特封不知眞墓隱兹地也乃近年鄉大夫士尋訪得之始又加封表以潁濵記墓有可龍里今稱石龍字相近又旁有井即老翁井所號老泉是也予與張公拜畢又走二三里至廣福寺寺後果有墓又有石刻廣福禪院字甚遒勁云潁濵書又云東坡未可知予二人咸感嘆暮歸過蟇頥觀覽四目仙人像相傳仙人有四目庭前丹洞先年龍出洞石迸裂龍所揚泥沙髙在屋壁予視良然既歸翊日有州氓萬錦者扣馬訴曰官府第逺尋蘇老泉墓不知近有萬閣老塋萬閣老名安錦祖也祖塋荷勑葬今塋道牧豪民馬牛樹木伐盡翁仲羊馬咸為鄉民某某舁去幾年矣力不能返故特訴理予曰嘻有是哉已而思曰蘇老泉宋布衣官主簿耳去今五百嵗其子孫無聞而大夫士哀其湮特封表之萬閣老國元輔近成化間諭葬夫㡬年其子孫尚存墓為人侵伐而大夫士若罔聞知此何以致焉嗚乎噫嘻孔子所稱夷齊齊景公之事數千載而下何其相埒也吾黨士可以鑒矣雖然豈獨蘇與萬哉因備書之以告凡百江源記書稱導江自岷山太史公以岷為汶故括地志稱岷山在蜀之汶川縣余嘗遡江走汶川求觀所謂岷山土人指一山無甚異問江出是山乎非也余又遡江行凡四日至松州見江愈隘可丈許以為源也而其人曰是江遡而上二日至彰臘繇彰臘而上不知㡬何日至岷州則江從出焉時余又訊之彰臘守備官良然蜀省方伯楊公賢山東人嘗為洮岷兵憲駐岷州予既歸省詢之荅曰岷城之北有岷山未知是江源否余退嘆曰事不目覩而獨信書雖千百禩名賢相傳猶然訛也矧其它乎余又考汶川縣古稱廣柔自隋乃有今名則非太史公所稱汶山之地明矣釋書者云岷山在湔氐道西徼外今自汶茂至松皆氐種所謂西徼是也而云猶在西徼之外其在岷州不可推乎或云岷州昔轄蜀故稱松岷而蜀山最著稱峨岷云余亦未竟其源者也因記所目嘗以啓後之窮源者果州正學書院記學一也而有正學何哉當漢太史公六家要指已置儒學雜刑名隂陽家列稱之則學之失正盖久矣其外不一家其後有訓詁家有辭章家漢明時泥洹教入為佛家近代有舉業家號名經義實與干禄字學無殊學龎極矣此正學繇别也均之學正學也則又有先本者有先末者二家亦自相詆訾並駕於天下然則正學奚取衷哉學不昉堯舜乎舜言道心惟微則自古未有外心語道者也精精是一一是則亦未有外心語學者也有知求諸心先其本者矣然又有躬行言説之異學墮言説凡皆同於不正而已矣不正之龎易指正之不正其龎難求此憂道君子不能不為之所也果州舊有書院嵗久圮壊予同年友愼齋伍君治果將取九州邑髦士彚教之乃撤書院之舊増修講堂一區學舍幾間後為祠屋祀先儒仕蜀若濂溪先生以下凡幾公產蜀若南軒先生以下凡幾公因予董學至果方進諸弟子以正學乃請匾之曰正學書院自予奉璽書曰崇正學迪正道竊嘗仰窺列聖學術逺追堯舜陋視漢唐卓乎偉哉今伍君又力以是訓諸學官弟子則自漢以下刺史罕有也漢文翁遣諸生入京不過傳訓故而已張叔最有名亦靡所建樹司馬相如工麗藻以蠱人心為古今作俑然文翁獨稱化蜀則亦正學既龎之過也今幸辨夫不正之龎矣為諸弟子者其務反諸躬行以無蹈於正之不正俾後刺史以正學化蜀自今始豈不休哉是又愼齋君矚望之至意也工既告成君以記請予與君均有厚責必與諸弟子交勉之是故力言以為之所世徳樓記貴陽南明先生性孝履厚口不臧否人甫弱冠以禮經魁多士筮士教犍為六年膺五薦遷保山令保山新置襍夷獠而屋先生治以廉信民翕然服為諸令冠六年凡六薦擢雲南府同知雲南府為滇都㑹號難治先生蒞三年事舉而民化凡三騰薦剡例當内陟以父監察公母宋孺人憂暨承重太母王恭人九年服闋戚䣊勸駕先生曰吾結髪期報主已乃碌碌郡邑間非吾意吾已矣夫時伯子山甫君已登上第遴翰苑補給舍名蒸蒸起方嚮用先生復曰將代吾有行者不在吾兒鰲乎遂焚牒不復出築廬之西為南明精舍植花卉果樹日引二三耆舊倡和薖軸視世味泊如也又好覽觀古今書史䆒探原本而尤精易乃又築學易齋日兀坐其中有以自得嵗丙寅先生已六十有二曰吾晩好樓居又築一樓扁曰世徳適山甫君以蜀州憲使歸省落成比至蜀告其友生某記之某聞古今稱樹徳士至自卜其子孫之興門閭之充已而酬若左契者何哉其感應之機固然也夫感應之機固然而人區區焉有意以為之又有心以卜之是可以言人徳未可言天徳也可以逮一世二世未可逮不世也易首言乾元天徳盖乾始能以美利利天下而不言所利無心於為徳故曰天徳先生既嘗利一方矣尋退而學易山甫君又將其徳以行於天下濊澤豐功嶽嶽然著而爵禄名譽一不以奸其衷盖方焦然為之而又㗳然忘之黽乎揭乎以盡夫人而恢乎遨乎以遊其天若先生父子豈非其以天徳相承者哉雖然乾元之道大矣人知乾之資始而不知資生之功皆乾也山甫君之學固奉乾賛元之學也宇宙生乎身而不為大造化運乎手而不為巧範圍不過曲成不遺而不為有増此先生之厚望於山甫君固不可以世計者也山甫君著書數萬言行闗以西江以南莫不滿家然多發闡先生易㫖不為葉言某與山甫君有弟昆之好亦嘗辱先生逺誨媿病不能從事故特推其意為山甫君誦之山甫君行且償先生所欲為者又奚假於某之葉言武功九龍山勝佛禪林記余郡名山大者盖稱武功山最友人鄒繼甫雅談其勝余恒耳之得神遊焉今年春有僧本教者三踵余門求記其九龍之勝佛禪林乃知九龍在武功山腹而勝又最本教祖號寧州者僧臘既髙自衡嶽柄教惠衆一旦攜其法侣某某等數十人始集兹境壤剔芟夷約逺虎蛇盡占其勝後築凈室中剙佛殿東西列飯堂禪堂兩楹列鐘鼓樓前闢三門門之前為止景橋橋下水入安成縣江可百三十里其左浮屠曰湼槃眞境右曰千僧寳塔最後峙一浮屠曰鎭塔摠題曰勝佛禪林覽之瑰嵬蓊蔚為武功冠自嘉靖癸丑創始至丙寅凡十有四年而竣自一瓦石至殿閣材費凡化八千金而强嗟乎何功之鉅且完也彼學大䧺氏者非獨能勤苦嚴果報恫喝人而得之盖亦有大同之義焉彼其初逃凈飯王居反丐居於袛園精舍捐身毒國禄反丐食於舍衛城中彼雖以是自摧折其慢相亦豈非示大同於人人者乎故其丐而得居也亦以居人無擇穢凈丐而得食也亦以食人無問貴賤彼固未嘗立物我而私之也則人之所繇感動施與而克就其事良亦非偶然矣不然何若是乎其鉅且完也徃余董學西土嘗檄有司緝先師廟取費官帑而就之反艱察其故乃以官為私之過也此豈吾儒之教使然哉盖大同之道本出吾儒今不得於此而徒見諸彼豈無故哉余重有感又寓思繼甫乃為記其本末且將撰杖尋屠坪之奥颺箕峯之曠灑然御飛雲於雷巖仙洞之巓覩廖廓中之果非有物我也當别為賦云甘白齋記甘白先生字國賔名仰生儒族治儒者書有年矣而顧好老氏又傳異人交乾履斗魁罡七元之術自署其居曰甘白齋遂號甘白子於是老之徒相與詰曰吾老氏之教知白守黒今先生乃獨白而甘之何也先生忻然應曰子以吾老氏之指專墨墨而黑乎今夫窈窈之内言有物㝠㝠之中稱見曉是殆有白存焉彼豈專守其窈㝠已哉若專守窈㝠而已者是墨墨而黑也故知白而守黒則黒非墨守黑以養白則白非皦子固安知白之不為黑黒之不為白子又安知白之非白黑之非黑者與詣者無以應而其族子直聞而異之乃趣告先生曰不聞吾儒者之道亦有白焉吾儒者皜不可尚是内白也涅不可淄是外白也先生曷捨此而從老氏其言唐然吾莫知所適矣先生乃俯躬唯唯亦若無以應雖然直嘗考先生之履矣先生少事父母生罄歡而死且骨立教二弟詩書弟亡教猶子如二弟又教授鄉之子弟懇篤如教猶子焉家故貧吟咏不輟娛情花草每宴坐一室焚香正襟人莫測其㫖嗟夫是乃先生所為自甘者也若先生豈亦所謂服乎儒而隱於老者耶今上隆慶改元先生年九十一矣直方從蜀臬請告歸謁先生耳目洞然步履翔然聲響鏗然神氣冲冲然指目直曰吾所署齋名子為記之直敬諾而未皇秋杪先生微疾自知終命呼弟姪端坐箴戒皆平時禮法語又為七言律一章貽直勉以忠孝晩節詞甚壯瑋詩畢端然而逝聞者誦曰是眞能不詭於儒者耶是眞隱於老者耶子冠魁冠朝世其清白一日以遺命責記乃撮其大者為之書王氏冠山墓記古墓制無傳而江南地湫繁蟻浸食骸遴葬者必循形家説族不一所從來久矣墓可無記也哉予友王有訓氏葬所後父春谷公祔七世祖妣曽氏之墓右稍後而左則自為壽藏東挾其故妻蕭西則妾劉也其外纍土苞為巨塜有訓特訪予鄂城委為記按王氏先虹溪先生名叔可宋大學生以孝著稱友揚文節胡忠簡二君語載省志配曽氏葬邑北四十里冠山㡬傳為稼軒翁即楊文貞所記稼軒是也子某生某某娶某氏實生春谷公某字于春者公少承家學獵經弋史抽錄古詩人傑句軒然哦咏至忘酬荅氣岸峭直不能容人過然孝友天至初母弟罹誣坐圄公為竭貲營解生平薄利厚義倒囊賑急人爭誦之盖公之節行偉矣然竟短世乏子其卒以正徳己卯正月十一日至嘉靖初始葬旱塘繼阡石壁咸為湫廢至癸亥十月有訓乃克定卜冠山以祔曽夫人之原豈亦其數然耶有訓名杔公仲弟拙逸公之季子出後公者也有訓與予偕事念菴先生聞學其營度公葬地祈免湫蟻凡幾窨試矣乃敢奉窆愼可知已有訓妻蕭孺人出南溪著姓父諱其訓母劉氏蕭孺人既生長巨宗嫺禮度又得有訓刑于故其賢最蕭孺人孝誠天至事有訓所生翁母與所後埓事春谷公妾易氏與其姑埒有訓從先師學取友四方逺越數千里近或百里多至踰年少或踰月浹旬盖不知其幾而孺人為緝衣峙粻脫簪卸珥亦不知其幾咸未嘗有怨色懟言故有訓得内罄孝友外獲友天下士蕭孺人之助翊膴矣蕭孺人產子一八嵗殤女五坤承嫁楊典瑩坤極嫁曽一唯坤止許聘蕭效恕坤過許聘劉仕鑾蕭孺人生正徳乙亥四月日没嘉靖甲寅八月日年才四十拙逸公哭之痛曰天殞我孝婦其祔葬墓左者則嵗之癸亥冬也嗟乎若蕭孺人其賢足祔矣予乃并為叙其閫行附墓記之末咸以昭徳闡幽誼不可以强辭承天府學田記徃滁陽孟令令黄黄人有以左道被幸得氣憾孟之貳已也遂誣奏危事中之詔遣禁衛臣劉君愷逮孟道余所轄武陵地相邂逅予語曰孟良吏也盍優之劉君曰何也予曰非良吏寧與左道貳乎劉君首肯遂禮孟賓之却其饋數百金引同撰飲久之孟得釋貽書道其事予曰嘻偉哉髙義禁衛臣乃有是是不可不為孟君報徳盖心藏之十年矣迺者予起田畆復督楚學遷秩過郢詢郡中學田博士弟子咸言田出劉錦衣捐貲計一百十有四石訊其名則即前所禮孟令人也予迺知君之為義良有本末又非獨卻金一事盖低回為之嘆羨已而劉君遂過顧予謁為之記予顧博士弟子語之曰今人多言古事寥廓不可近若劉君先後為義謂近於古事非與又或言宿衛貴近下直走馬長秋靡不辟易啣命建櫜之四方不啻徤鶻乳虎今若劉君始非三物之訓然能先後為義不漸靡於所習豈其所自為亦出於人心固然者非歟嗟夫等而上之大道之行天下為公若禹稷之已饑已溺伊尹之撻市瘝躬乃顓謂古人有之今人不可有又謂非人心所固然者可歟爾博士弟子本以固然之心浸彼三物之教昕夕食劉君惠貺感思髙義有不稷契伊尹其心者是重慚劉君也矧郢為先皇潛邸劉君先世起家從龍䝉被聖澤用能厚施爾諸弟子爾諸弟子涵育棫樸之化爭自奮為王國之楨其所自為之者又可獨後於劉君哉予故樂記其事以風諸弟子且報劉君云劉君字某相其事者君弟庠字某己未進士子某學廩生髙齋記昔夫子問二三子曰如或知爾則何以哉盖探其用也乃曽㸃獨欲挈侶為風浴詠歌事未嘗一挂於用而夫子亦獨稱與之出由求上豈以其髙致為哉以其心不繫物而與物偕也夫天下未有繫於物而能理物者也亦未有偕於物而不能通物者也紫陽先生主簿同安扁其廨舍曰髙士軒而以令甲所當為者大書揭之楣間豈亦不繫物之㫖與嵗之己巳予起田間督楚學又踰年遷佐西粤藩事四方同志勸予當告去者書不下四五函疇昔之夜夢人贈予詩有髙齋語予尋考髙齋乃趙清獻致歸扁室之名因自念曰予之當去非獨人言雖鬼神示之矣然余始亦有去意已而逶迤安之日親簿牒與蚩蚩者語反若有㑹間出涉竒巖奥洞臨流同二三君子逌然共適今忽忽遂忘前念予亦自不知其是且否也即移髙齋名姑名予廨舍方且治文書其閒暇則焚香展讀易書時復哦焉歌焉浩浩焉優優焉頽乎若虚舟之縱蕩於大壑也或曰子竟忘去乎曰行且告矣遊西粤龍隱巖記陽月之五日余先出東江門蕩小艇絶江抵東岸其友黄子劉子從之過花橋橋側巨石抜地數丈有樹相摟結倒影漾波余却觀裴囬循橋南山轉行又有石竪山角若卓杖愈南從怡雲亭址先入後洞至則二君已軒軒翔且歌矣洞面西俯江瞰城然不見城獨見羣山之巓雖隆冬翠冉冉飛几案間矣闊可坐二三千指髙不下數丈上懸若幢盖後壁稍左有宋磨刻二其一即蔡京所書元祐黨籍首司馬光呂公著蘇軾劉安世諸君子凡三百餘人其一為寧宗書字頗遒勁二君酌而吊宋之君臣曰彼京者憑天子命謂足以貶斯人百世矣不知反襃且逺也自今觀之則孰襃孰貶孰榮孰辱余曰天下有道則是非在上在當時天下無道則是非在下在後世相與嘆且笑出洞石多墻立磨刻宋方信儒三大字頗偉又有記儂智髙事折而東即龍隱處初入稍狹中乃穹朗上有龍跡夭矯長數十丈鱗鬛宛然疑龍從上躍出印石成文古稱龍拏石如泥其或然與穿巖而出即灕江支流下深不測春夏水瀰巖非舟不通今水落舟止停石下予與二君登舟酌酒放歌二君曰巖藏司馬諸君子名所謂龍隱非耶余曰龍神物非隱非不隱非顯非不顯故曰與時偕行龍何心為乃為歌曰山之谾兮維龍之宫兮與道冲兮山之闢兮維龍之隲兮與道適兮歌未闋遂鼓枻去而東遊省春巖記别龍隱巖視日未晡則捨舟北過七星山繞東度石橋循拖縑港並髙崖上類多睥睨下露齗齶臨巗有道人導而入中稍豁旁垂石乳狀若蛇鱉之首視其側有穴黝黑傴僂度之漸就虚明石乳垂益多後壁為道家莊嚴前架小廊題觀稼亭客曰王孫題且構也面俯平疇自堯山絡羣峯竒詭並獻余與二君倒壺酌盡歡微酡氣休休乎意􅛅􅛅乎浸不知身之所寄喪其所為歸寧知曩昔是非之攸存暝色漸合乃從别穴出歸時微月泛江波到舍已人定矣遊隱山六洞記余既遊龍隱則詫于其友合溪子合溪奮曰子不聞有形遊有神遊苟知神遊則天之寥地之𢎞日月山川之羅列與夫草木禽鳥羣物之糾紛何遇非遊奚必龍隱余曰富哉子言然孔子盖嘗登泰岱觀呂梁樂山樂水咸有天游存焉第貴勿溺耳故遊而溺者非非遊而溺者亦非奚必不遊於是至前之日合溪子命觴邀遊於隱山之六洞隱山者唐李渤吳武陵咸有稱述亦名山也是晨西出麗澤門里許至山下小亭憲長桂君都閫錢君咸來乃先尋南華洞洞水浮碧可鑑西轉北牖洞厯夕陽洞愈西至嘉蓮洞或云石似蓮又云昔有水產蓮折北躋一石廣長如床轉至白雀洞末乃穿谽谺入小門至老君巗即朝陽洞也東對獨秀山上鑱石成老君像左右垂石彷彿鶴鹿咸天造因共酌賞之愈北萬石巉㠑遂南步而酌于亭良久復南走里許登披雲閣閣據叢石之心延覽益遥或曰是閣當春花秋月彌佳閣内一石立如樹與羣樹混從後北轉為石藪益嵾嵯狀如蓮瓣如敗蕉葉又縱觀四面之山皆石也萬桂二君喜且酌且奕余坐其旁悠然思睡忽􅋜􅋜然鼾也諸君撞余起曰遊可寐乎余啽囈語曰余寐則不知天之寥地之𢎞日月山川之羅列與夫羣物之糾紛亦不知境之非我我之非境兀兀爾陶陶爾咸莫非遊也又奚必醒遊於是相携下山穿紅葉林而返遊七星巖記是山亦純石巒凡七而巖竅其腹余以孟秋遨其上巖竒之而未知下巖之竒之難狀也上巖始入有眞武閣囘觀灕水西北屈曲入人抱左顧羣峯旖旎雲攅把炬穿後穴抵巖寛可羅百座上湧濤文勢澎湃左右石柱凡三北則哆張而天入焉出口轉到下巖門外覩棲霞洞字遂返輒謂竒止此耳久之聞都督俞公談下巖之勝時維仲冬方伯萬公廉憲桂公暨予三人乃敦俞公偕遊於是盛張烈焰令道士前導下厯數十級旋就軒曠迸出平臺危數十丈上坐老君像下鑱仙李洞字旁有石鯉躍濤文中再進一色若白浪飛撞虬螭百千駕濤奔角力不可弛上有石乳倒垂者三滲泉滴下之三柱若相吻然又進則交撑疉闗漸束就狹道士告曰此地中天界也是為一天門入門有仙龍潭石欄䕶之已而厯第二門中立石柱從旁登降入三門愈益寥闊石乳垂數十丈者不可勝數變幻詭絶縱横萬䫉不啻闢秦宫漢苑飛閣叢臺複道井幹璇閨珠箔駢列錯映雜遝蔽虧抑亦啓甲乙之藏發牛渚之怪馳長楊之異獸森縣圃之若木覩者目眩神颺應接失次道士搪然指曰是為毬為㦸為床為架為獅為駝為網為氊為瓶為燭為將軍為諸佛為須彌普陀為百果又云穴通九疑名言固多然實巧畫不能設色瑰詞不能傳神不知孰生化孰經營至是也旁有大壑澄泓不測或曰羣龍家焉愈南窈窔偃􅏟傴僂行數十步又復𢎞衍其竒視前未肯下又數百步為曽公巖約共里許覩天日矣度石橋始出洞休慶林觀咸若超然自世外歸引觴各舉其竒不能悉胡子曰巖竒獨珍閟固隱不一暴其倪雖予亦嘗少之豈誠所謂深藏若虚者耶雖然使非能眞際其奥者縱獲聞予言尤不能悉還珠洞記還珠洞即伏波山前麓濵江穹起谺張中垂二石瑩㓗如磨一不及地線許志稱有紫白二蛟相向弗之類也左右石轉相通如夾道後有數穴相傳昔有漁父從穴深入覩物如犬熟寐旁有一珠拾歸或謂曰此龍珠也恐觸其怒戒令還之故名又云名由馬伏波載薏苡經此誤謂珠也皆不可知洞中獨宋刻最多其下皆平石懸水上若與波下上予欲延矚久矣適余友少微邊子從西蜀至因送之鎭邀共覽焉邊子謂蜀山雖崇峻選洞遜西粤矣同遊即萬桂二公錢將軍暨予凡五人學孔書院記始予友淮海孫公解大中丞歸而逺近問學者履盈户公乃選偉拔山之麓得其勝者止焉遂闢為書院以居學徒中為堂曰某堂齋曰某齋軒曰某軒亭曰某亭後為寢室旁兩楹為學舍凡若干間公自以平昔所學舍孔子無繇也因名曰學孔書院而以書抵不敏而屬之記凡四易載矣不敏豈故為緩哉誠以孔子至聖自鄉黨記其威儀言辭下逮服食莫不有法若是密也自家語諸家記其為政未㡬而誅正卯墮三都却萊夷若是勇也辨商羊萍實之繇對羵羊專車楛矢之異若是博也自宰我子貢有若賛其賢於堯舜罄生民未有之盛若是髙也自子思子述其祖述憲章上律下襲自孟氏稱其金聲玉振始終條理若是大且全也後之人苟有欲學之者猶之逐日有擬之者猶之繪天彼天與日豈終可得哉是故不敏非愛言也不能言也已而不敏亦以癸酉解粤臬歸而自顧老矣方不自揆將畢力所學以冀全歸則反思曰夫日至明矣必有所以明者天至大矣必有所以大者孔子至聖矣必有所以聖者昔者孔子嘗自名其學曰發憤夫憤何為也憤之文從心從賁誠以人心有至賁焉蔀且多矣孔子之發之也江漢以濯秋陽以暴極之於皜皜則意識盡冺而賁之全體見矣賁之全體見夫然後施于四體見于仕止久速其緒餘為政事其土苴為多能其不得已為六經之删述後之人從而稱其為密為勇為博為髙為大且全皆賁之至也即孔子自言志學而從心不踰者是也孔子豈嘗獵取之哉末儒者不得孔子所從入而遽欲討求其至者而學之未見其能孔也雖然不敏既慚于老無聞也而猶幸其晩而不迷于從入也又一年孫公復起大中丞仍鎭鄖臺使來督記不敏知公之得于孔子深矣而竟不能舍從入之言以相質正且以為公之在門告作學孔書院記端溪書院記百粤自島夷發難宼攘飈起連數十嵗不能平今少司馬古歙殷公兼大中丞秉鉞南來遂移鎭端州督師討平甫二期而殱夷凡數十窟民復安堵公乃奮然諭諸羣屬以講求刋亂之原于是兵憲豐城李君承公意㫖將遂營分司廢宇以大興于教化請於公允焉乃顔其堂曰某堂以專㑹講稍益其旁為房舍以居多士有池亭以寓游息下至庖湢廩廐有所題曰端溪書院既峻走使數千里委記于某某嘗讀詩至召虎江漢之師既告成功乃請于天子曰矢其文徳洽此四國古人敷文於經武之後何其汲汲也今公之功視江漢既烈乃又以興文屬之李君君不假官帑因仍舊貫咄嗟告成其事皆追蹤于古人雖然古人之為教豈若今之剿章句襲墨義取榮利已哉且夫章句墨義今之庠序其督課已顓矣而奚假于書院夫書院乃以補庠序之逸而考社學之成是故羣國之耆㓜月雜青衿而教之俾之翩翩乎連袂而興于豳風二雅之歌詩也蹌蹌乎駢足而肄于士相見冠射三禮之儀則也屬屬乎摩肩而服于小學所稱引孝弟之故實也而功令著矣則就其中之秀民頴士日語以大人之學俾日有明而時有邁將謂嶺海不為鄒魯吾不信也何則詩興民然後知狂呼怒跳之為暴也禮肄民然後知楬竿舞鍤之為鄙也孝弟服民然後知悖公死黨之為大戾也而又有大人之學以浸浹震鍧其間民其不鄒魯哉雖然大人之學難言久矣古大人之學先知本後世學失其本則治失其本亂何尤焉盖兵莫慘于志而鏌鋣為下志之所繇慘者以其生生之心滅熄故也生生之心滅熄則為暴為鄙為大戾何不至邪是故今之欲為知本之學則亦去其害生生者而已矣生生者之害去則豈獨生禮樂而服孝悌哉極其大至于彌綸而位育參天而貳地亦何不至耶然則大學之本即刋亂之原矣某昔仕粤臬與聞公指退而共朂于李君者也故不辭為端之民士告端民士其必有擇矣是為記雙鶴樓記邑大夫曙台唐侯以書抵山中曰頃鍾樓工竣竊已銘鍾而樓不可無名與記于時有鶴翻然翔集巍甍之巓僉曰鶴來異耶因遂扁雙鶴樓非足下記不可盖予邑宿有祝聖古刹旁列鍾樓峙居邑學左形家者以是稱控壓焉嘉靖間方毁寺遂逮樓邑父老類以樓之興廢卜邑之隆替㑹唐侯稽古樹表以作人文輒唶唶請復樓侯乃復其地建祝聖殿題曰萬壽宫繼建樓層三髙七丈又二廣若干而懸鍾最髙處視之尊据一方峻出乎大塔快閣之上登者四矚則南撫天柱達于五嶺東望王山放乎廬霍西北引盻華武極而瞻夫帝京其致凌太乙隘神區而浹乎無垠盖初不知鶴之所期兹乃蹁躚而翔集其上豈亦有類於漢之神爵感祥政而來者與矧曰侯之祥政皆希蹤於仁聖之遺非若世之標表為循良者也鶴靈禽其不先得乎哉休矣夫鶴之為侯祥矣侯曰鶴當為萬壽宫來此聖天子祥也吾何足以辱之予則以為聖人之祥在時豐民阜才賢丕興斯其大者然則謂侯以祥政被予邑之士民蒸蒸有興也則亦疇非聖天子之祥哉乃為燕鶴之歌歌曰載丹冠兮披𤣥裳横四海兮絶漢翔感徳光兮來下輿我侯兮帝鄉再歌曰聳修趾兮引員吭鳴九臯兮九天揚翊徳音兮來下啓下邑兮賢昌三歌曰鶴千年兮羽蒼蒼千六百兮侶鳯凰侶鳯凰兮來下介聖壽兮無彊先妣周太安人壙記先妣周氏出里中漆田古族父山字樂樵娶胡氏以𢎞治丁已年三月十三日生年十八歸先贈君晴岡先生諱天鳯字時鳴以不肖直官刑曹䝉恩贈先生刑部員外郎先妣封太安人始贈君卒太安人方三十有七窘匱絶難堪而太安人安貧奉姑誠孝天至晩稍貴慈煦儉樸如一日其細行見邑大夫唐侯所為誌銘中邑大夫非漫與可者也卒丁丑三月二十八日年八十有一次年四月卜塟在邑東四十七都鄭家原之牛欄丘艮脉庚向螺絲形其後列三員峯形家謂品字三台云前有池山水滙為之買諸廬陵蕭氏後界山巓左砂界山脊至前案右砂界山脊至廟背山左肩之外有寺曰蟠龍山楊梅寺創自唐不肖直方欲買田寺中為醮需未逮也佇當圖之右砂麓外有蕭松者守塜太安人生子三長即不肖直任嘉議大夫提刑按察使仲諒庠生季問先卒孫四順字進道庠生顒字進逵顯字進通頴字進逈孫女四嫁某某曽孫男五士紀士統士縉士經士綸曽孫女四聘某某地去吾家義和約五十里不肖直大懼異時湮没故為記焉於乎昊天罔極痛哉何言衡廬精舍藏稿巻十二
