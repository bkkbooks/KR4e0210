body:
  text: 衡廬精舎藏稿巻五明胡直撰五言律詩重别日表岸葉從窻入繁隂篆客衣白烟浮渚濶青草覆鷗肥䢴水分舟去豐江帶劍歸神京瞻尚邇綵處是黄扉下第留南京寄懐莊少府座主二首仙諜南華胄虬髯白玉姿珠從閩海貢駿逐帝京馳倜宕明時忤幽憂澤國羇懸知宣室問早晚詔彤墀二苑樹青無極壇雲紫欲流清時悲楚璧逆旅㸔吴鉤四海身浮梗千山客上樓問竒還載酒惆悵理南舟自城歸村中舊廬舊屋轉蕭然移家驚四年窻流蛛網月棟抱燕泥烟入座雲長濕穿樓樹欲聨年来塵土跡暫得浣林泉立秋夜月乍報秋回馭隨看月送涼花迎蓬隙照犬戲巷中光映樹山排畫侵荷水弄粧黄雞將白酒定醉野人觴江村步月言從琪樹裏步出碧江灣佳景哉生月流光蕩若環相逢人出洞為問客還山忽有香風至岩芳擬共攀歐陽文朝載酒同訪康東沔先生龍洲園居和作載酒尋陶令欣逢在綺園入門雞作鬭報客雀能言鴈影流緗帙梅花落錦尊賔游非梓澤風物擬桃源龍洲讀書窈窕繁花路高虚野甸居漸為逃世客懶答貴人書水閣依鷗鳥塵編養蠧魚日尋垂釣侣長在月明初乗醉同康東沔訪王武陽草堂共賦已醉烟花野還尋水竹居路迷隨老圃林敞散幽裾濕霧藤交座銜花鳥窺書主人躭野逸對客采畦蔬余少同歐陽文朝王尚涵讀書茶山今丙午復同文朝修業龍洲相去已十又三年矣感賦為贈結髪同鉛槧羈棲各壯身艸堂猶我共布褐轉情親山水依書案鶯花亂葛巾所欣無結駟班坐看江春文朝省試二首家世文章伯藏書蚤遍窺崑丘珠樹馥天路石麟竒豹隠休多戀龍驤看在兹傷痍南國盡何策獻明時二金川憐去棹玉峽嘆垂繻地濶山攅楚天長水漾吴芙蓉秋日麗鵰鶚曉霜孤暫去題鄉籍春能獻廟謨徙宅四首余舊家邑北螺溪以先廬圯甚嵗壬寅移住城西厭其市喧丙午秋改徙僻巷其傍便地可圃勃焉有抱甕之興康明府以書譏予方縶于世用不得遂所願因作詩解之并識其事徙宅何頻數逃喧豈擇安名山遲結社僻地當開壇破屋藏雲細頽垣放月寛柴門傾側慣日暮省關闌二浩蕩隨塵世支離信所居人生俱逆旅天地乃吾廬喜趂三家市移来萬巻書曽無儋石槖負載得輕虚三尤喜兼為圃攜鋤豈帶經看成蔣詡逕錯喚子雲亭紺橘淹霜脆紅葵抱日馨明府休移勒白首漢隂銘四家本江村住千重水樹幽花篩橋路月萍漾栁塘鷗娬姥丹臺舊槎灘禾黍秋年来塵市閙轉徙憶初遊觀山寺四首寂寞古琳宫縁山一徑通翛然吾喪我况復水澄空開俎青蕪石留僧緑樹叢綸巾依谷口人笑是愚公二留醉空王殿提壺更石門山深天亦迥巖古佛長尊曲澗浮觴慢幽花襯席繁高歌出洞口涼月在江村三頗識浮生幻幽尋不記蹤地同離垢國人在妙高峯雲起移前嶂谷虛答暮鐘過臨泉穴坐清詠起蟠龍四長思静者居此地即吾廬榻寄青龍藏經横白鹿車漁歌聞欸乃僧酒灌醍醐去住成泡影軒裳意轉疎擬遊匡廬豈不待婚嫁吾歸吾奈何世情先老絶遊興傍秋多五老鞭龍到三江摘葉過雲空從直上濯足於銀河丁未秋盡往廬山未果因留石蓮洞未果巖泉卧非闗嫁娶遲出門已解纜息轡滯尋師錦澗望中適天池夢裡追寄言雲外侣春共采金芝住石蓮洞贈念菴先生四首石洞何寥廓石蓮朶更竒竅從天地鑿花是鬼神為山曲藏蘭若雲深見肉芝種田真避世漁父尚無知二神仙留祕室今古待高賢到此真非世開門别有天人同谷口卧景即輞川姸七日叨觀局人間不記年三青蓮居士宅黄石老人書久已從吾好翛然應物虚澹雲空色相脩竹見真如凡骨㕘靈境蕭疎自喪吾四山坼竒無盡更疑琪樹層穿籬鹿豕慣爭席野人曽高落山巔水曲垂石竇藤逃名猶未巳住屋混禪僧石蓮後洞轉尋又一小洞二首不覺窺明見先從踏暗来忽然闢混沌那復有塵埃高竇容天入重闗付月開未須嫌閴寂作伴翠莓苔二一洞復一洞幽絶到無誰鹿女尋難至猿公望不知玉書應鳥篆丹竈自神泥薄暮仙人返披霞得共窺坐林中巖居一事稀移屧過林圍荒舎無沽酒隆寒未換衣坐深樟子落意静鳥聲微真有丘中况隨方得所歸同歐陽曰穡遊通天岩流光悲過客幽意托名山相與攜僧往悠然並鳥還層巔天共語曲洞石為闗夢裏聞鐘磬泠泠非世間過茶山覽亡友羅日表壁間題字追思曩昔愴然濕襟因識二首吾少談經地羅含後亦来人今餘故蹟世早失高才門戸留妻女文章落草莱當時開萬巻莫是玉樓催二夫君何處往遺墨使心疑想像行花逕依稀弄酒巵雖言長死别只憶是生離寂寞寒松影空依壁上詩和答興化顧秀才坐挹凌雲氣留傾巻霧談囊開千首賦宅傍百花潭攬轡瞻天北飛纓滯斗南見愁胡馬闊語罷淚猶含輓李光禄祖母令徳天孫降徽音澤國傾將鶵威鳳列奕世石麟生象服恩方渥魚軒罷可驚歸来李令伯江樹正秋聲别南刑部黎克芳蔡汝聘二首時淮陽方有寇警矯矯雙黄鵠南飛刷羽儀闗山衝暑雨淮海傍鯨鯢宦薄身應健時危别轉悲懸知匡嶽度幽夢鎮相隨二四海朋簪合兩君交誼殊貫星南共北征棹楚連吴叙齒皆為弟同心已喪吾但看明月共莫漫怨驪駒早春送蕭天寵之官莱蕪二首以舊同石蓮洞之遊復作他鄉别深悲故侣稀愁先江草合望斷嶽雲飛世路憑呼馬官曹當食豨知君兼吏隠且莫賦初衣二古邑鄰東岱三峯更接連去看民似鹿轉見吏為僊念我淹金馬因君想石蓮鄉心將别淚併入酒杯傳送鄒二下第南還憐君復不第歸去大江濵抱劍從兹往雕龍竟莫陳帆依彭蠡鴈裘滿薊門塵定遇匡山侣多應問逺人送周經歴空有連城璧當年竟莫售一官聊佐郡遙去越江頭霜重淹行騎塵昏辨故裘閶門如過棹莫更問吴鈎何封君社中二首即何振卿父也詎識山中相言從帝里過花間九老宴醉裏八仙歌大隠忘朝市清時狎罻羅為傳匡世畧愛子在鑾坡二上國開三逕燕歌異四愁支頥觀紫陌適意度青牛春院星恒聚秋臺月共酬莫須尋閬苑兹地勝崑丘吴郎中出守福州五馬似龍驤銅符發建章春陽隨蓋逺雪月蕩旌光首郡雄蠻國千峯接海防吴公政第一應為繼遐芳人日立春喜雪和胡子文太史人日春兼至天葩曉正飄禁扉同貼勝温樹不封條萬國瑤圖啟三時帝澤饒佇將多富夀歌舞頌神堯大朝門同午樓復建百官朝賀二首井幹復天都門成接斗樞螭蟠銜瑞榜鳳繞夾金鋪巽命承中禁離光照八區萬方何以慶擬上泰階符二軒閣看儀鳳堯階俯濯龍宸聰從此達獵疏擬誰封燎火光雲漢珂聲接曙鐘定應門下省承問獨從容同署范郎中出守淮陽二首華省正鳴鶯青門别思縈曉来五馬去春逐百花行古郡依東海危樓控兩京南邦愁帶甲到日有長城二聯珮鳴青瑣同曹住白雲欲成花下醉其若席前分鷁首瞻河曲龍光逼海氛預愁熊軾逺鐃吹鎮相聞况吉夫督學貴州紫届切文昌蘭芬天上郎新辭振鷺侣去近碧雞鄉劍珮穿蠻部文章被鬼方何妨輕萬里冠已著神羊重别吉夫爛漫黄花日難禁逺别情黔中希鴈到徼外劇猿鳴絶巘捫天上飛梁並鳥行不因文教重何自遣朝英詠况吉夫藥湖别業二首聞道湖中勝夫君宿所期涵天為泛宅浴日學咸池鮫室幽相逼蓬山浸欲移年今瞻太液瀲灧起遙思二輞水開南垞濠梁得上游魚吹聞枕畔荷氣到床頭嶼覆長生草波回不繫舟蛟龍今作雨曽是昔潛虬魏黄門册封汴藩便歸省覲二首金簡出天宫分封節使雄馬乗照夜白袍著鬱輪紅嵩嶽瑤幡駐龍沙鷁舫通還瞻雙白髪西母並東公二共羨朝陽翼東飛别帝廬到家仙作隊銜命玉為書錦被應裁扇蟠桃不羨魚花缸春爛漫讌樂復何如郊外别振卿初嵗韶光潤離筵落日催可憐燕市月遙挂嶺頭梅滄海看鵬運潁川訝鳳来還令羣島國朝漢有高臺贈别作尉明州去寒風春正初玉隄楊栁細折贈渺愁予邑里連鯨海干戈劇羽書如逢天北鴈秖寄釡中魚贈李太史承命奉二親歸豐城兼訊胡侍讀二首身將雙白髪遙返斗南隈寳饌分神鼎宫衣出上台堯階移舞去漢殿謁歸来堂上稱觴日還思獻夀杯二苑草半芊綿隄花開欲然獨憐供奉客遙理孝亷船别緒縈千里交情記十年豐江雙寳劍暫去㡬時旋每日省退歸舎馬上見西山淹留何所貪開戸面青嵐夏取峯雲慰冬宜樹雪諳三茅仍在望五老亦長㕘日日歸鞍上如同故侣談卧病省署同鄒繼甫作八首氣回丹鳳闕春入爽鳩司曲巷交槐影長廊掛栁絲才迂欣散局地僻得沖規更有談天衍知音勝子期二隠吏非慵吏官廬當草廬鶯聲流枕席竹影泛巾裾竟日幽憂病經年擁腫居欲尋芳杜去未敢即題書三椄槢經旬廢亭疑晝亦稀劇談松月出習静鳥聲微揚子𤣥為白䝉莊是亦非惟餘懐土念長在北山薇四掩閣烏同寂升堂鶴共遲亂花封印篋飛鳥掣文移公事癡能了隂符懶未窺散衙饒暇日春院緑隂滋五休沐仍居府閒情日上樓未能薖軸隠聊作逍遙遊省内開三逕窻中瞰九州迴看林靄合可以當冥搜六偶挂烏紗帽悠然脩竹林却看青玉署寧異白雲岑雪後生新籜風前裊素馨自非此君意誰明大隠心七脾病宜蔬食曲肱良在兹盆魚相吻沫砌草恣葳蕤坐接青雲侣閒傾白雪詞莫須懐禁近隨處是恩私八韶齡期學道老去尚迷陽日恐童心减年驚旅鬢蒼欲歸匡嶽去重使故交傷未寤人間世何由應帝王春夜袁沔陽枉尋水塘菴下榻談禪有獨往之興别後戲作却寄留之㕘侍給孤園皈依得世尊雙林一以寂半偈兩無言慧劍宜剸象禪枝足叩閽達人無不可莫羨隠空門春夜過銀錠橋在禁城外北海子都城佳麗地春夜喜重經巨浸通銀漢長橋挂碧汀雲移千樹月冰圻半湖星縹緲聞仙吹祈壇近苑亭贈李二守巖郡連燕甸官衙駐嶽雲班應聯刺史人共仰神君停騎春同到烹鮮日有聞好令箕潁客鼓腹事耕耘二少小結交歡依稀各鬢殘共客長安日翻悲㑹面難中年宦始達畏路夢相看故里吾將返岩巔望羽翰贈兠率菴僧是僧曽隨太平周都峯給舎步訪闗西楊斛山侍御遂遊華山而歸高迎泉灑落深踏石嶕嶢崖闢支為戸松頽卧竹橋女蘿藏犬吠仙吹和鶯嬌静者心能愜相看嘆鹿蕉二曽逐江東雋遙尋陜右賢聯翩登華嶽迢逓返衡巔口絶波旬語心依智顗禪還應有秘要知欲為誰傳予與鄒繼甫有嵗晩鄰舎翁之約時予赴楚便省過家見春流漫溢耒耜方興感思宿盟慨然増懐作客懐鄉井歸鄉憶友生以吾今日意知爾近年情四澤春流溢千林野鳥鳴何由同抱犢齊上隴頭耕初至武陵官舎續陳后岡先生作支離隨浪跡官舎武陵開花近秦人洞雲依善巻臺簿書銷日短椄槢感心哀敷政宜春令幽篁亦趂栽秋夜辰溪舟次對月懐萬思節憲長沿洄行未定明月滿孤航輪亞雙峯正光涵一水涼遙知吴地共其奈楚山長寂寞沅江芷因誰發故芳華容道中聞萬思節憲長以赴任延遲被言還陽羨思君不可見良夜若為酬行認同游騎愁登並濟舟雲鴻今已逺矰繳更何求洒掃張公洞予將共卧遊上封寺二首紫蓋接芙蓉層巒厯上封穿雲迷後侣失路聴前鐘世界歸天眼烟花入性宗莫矜凌絶頂猶有最高峯二客有泠然興隨予躡紫烟狂歌希散聖宴坐見諸天卧榻依南斗齋厨注細泉但同無愛染那用禮金仙别望之後追送二首以我沈冥客親君澹蕩人相看若比翼逺别自沾巾叢菊可憐色冥鴻欲避身才高休混俗且卧故園春二棘寺瞻雲切江洲逐鴈遲遙知花爛漫應對舞逶迤末路唯存道貧交只寄詩漢庭名已盛莫久戀陳陂吴武選謁詩貽其封君二首稼穡長為寳詩書亦間操自然真性在不為隠名高有道忘㕓市無機任桔槔應笑天刑子摵摵為誰勞二掉頭不肯仕乃復掛金章天語瑤華重皇恩奕世芳紫衣羣鹿豕烏帽照滄浪匡濟平生畧㡬語尚書郎過周平坡列十餘峯竒峭若笋林賦詩一首連山陟未竟嵂崒見兹岑合作青蓮朶分為翠玉簪可堪逢絶勝無暇恣登臨悵望青天暮逌然寄此心七月十三日夜坐月寄䝉山子忽爾飛天鏡猶疑掛夕曛竹光侵案泠花氣入書氛中年偏愛月游子劇瞻雲攬結難盈手那能持贈君五言律詩六句重贈念菴先生羨觀青瑣客早卧白雲壇屋裏登巖易床頭得月寛為謝餐霞意東山計恐難衡廬精舎藏稿巻五
