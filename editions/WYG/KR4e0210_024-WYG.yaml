body:
  text: 衡廬精舎藏稿巻二十四明胡直撰行狀歐陽乾江先生行狀嵗嘉靖壬寅歐陽文莊公方家食講學浩溪之上從者如雲予時方逡廵而公仲子乾江君先枉過若宿善遂得從君偕其族子昌介謁公門公不予凡教之若教君昆弟也乃君遂友予而實昆弟之久之公薨予怦怦然獨與君期二三十年間先後仕且返方倚君相携共老以幾全歸乃一旦朝飛書而夕報㝠逰矣嗚呼痛哉先是君寓京病脾萬厯壬申罹太夫人䘮哀毁病復作甲戌八月已踰禫以未逮襄事固持小祥服夕侍靈輼晨起盥櫛拜奠如平時或與門人論學反覆而君内覺病乃作醫戒以明身病貴治未然然君雖為戒而自妻孥以下咸莫測病殷也十月十四日方平且起坐與醫論病狀屹然不少亂頃刻痰熾遂端拱瞑目長遊君庶幾焉得正而斃矣嗚呼豈不痛哉二孤宗符宗翰將以某年月日卜葬某山某向謂交宻知深莫若予與萬安太僕卿蕭公乃以行狀屬予將乞銘蕭公予雖不忍言而誼不可諉按君諱紹慶字㓜承行二以家近横乾江上遂號乾江居士上世忠貞勲階見前相徐公所為文莊公碑誌中祖諱庸封奉直大夫六安州知州進贈通議大夫吏部左侍郎兼翰林院學士祖母蕭氏封太淑人父諱徳太子少保禮部尚書兼翰林院學士謚文莊母金灘康氏封夫人以正徳丁丑十二月十三日生君于栖隴陂􅀈上之第君生靈喆五齡入塾學端静若成人書過目成誦公歴官南北皆携行經山川古今事蹟咸能領畧年十二讀昌黎原道篇公試問以農之家一而食粟之家六君應聲對曰得非増老佛二家耶公大竒之公在翰林寡僮奴君為應門適渭崖霍公過訪覩君布衣革履儀度整暇目逆嘆曰此國器也翌日贈以大學衍義即手之不釋未幾通其大義是嵗戊子陽明先生訃至公製服設位率君兄弟哭奠君臨之未嘗不慤時君已知聲律作古體詩及初為舉子業皆有驚人語公乃屬令從雙溪曽公日治經義旁及外經史百家有餘力焉一日曽公試李斯學帝王之術論通篇罪荀卿不及斯惟結語乃逮斯曽公與公皆竒君不置公官南都凡八嵗二親在衙舎君適成嘉禮時年十六亟倣吕東萊故事月中摩編尚書禮記二經註以便研閱公時出郊寺講㑹君未嘗不從前相興化李公暨宣州貢州守𤣥畧沈叅議思畏凡一時名流咸欣慕願交焉時公結隣廣南湛公君一夕夢騎過湛公門邀留不肯下少旋瞻新敞第陽明先生坐大門三五門人侍遂下肅謁先生咲舉方寸印印君兩掌中又披襟印君心既覺後久之乃紀詩二十五韻以自朂丁酉君年二十一始自南都歸就試徐相國時督學異其文首選補邑庠繼三督學咸列首梓其文而晉江蔡公益竒君檄送白鹿洞讀書邑侯嵎齋王公尤重期許曰此必紹家學者壬寅公外艱服闋偕永豐聶公安成鄒公吉水羅公出㑹九邑同志君得聞所未聞退必劄記久遂盈帙方天下士遊公門者日盛故樂昌鄧君仲質永豐宋大理卿望之新喻張侍講仁伯萬安周方伯仲含蕭太僕子發安成鄒方伯繼甫邑庠友曽思健暨楊給舎汝容曽中丞思極其族子昌偕予先後受學與君相切磋咸稱莫逆暨公復起南北成均君復與貢沈及永嘉王大參某南昌余憲副餘姚楊正郎某暨諸名人訂學績文無少休至嘉靖壬子君始以易魁江省第二人時雖初薦而識者咸指目以碩儒稱矣是秋公内艱服闋起大宗伯君約予偕上春官并延禮思健為二子師益相砥奮斂退人不知大宗伯子也未幾公䝉召入直内廬君嚴閑私第河内鄭府假它封餽至百金君為痛拒疾火其書雖四方列餽一切為寢自是門無干請之私時公為穆皇帝請婚禁中激怒世皇帝故令議傳位禮公咸與君商而後進凡公所為毗主禆國君與有力而世莫得知之甲寅春公遘疾君侍湯藥躬便溺器至廢寢食世皇日遣中使問疾君為代草上謝尋竟不起君哀毁至柴立比䝉恩䕶柩南還予方迓于丹陽君為述公調持世皇父子間及調二相國其間曲折非公有道弗能行非君莫賛也予於是又與君相痛哭盖曰天不憗遺乃公不得秉衡佐泰階耶君歸臺司檄搜公文乃夙夜編摩付梓以傳且曰此非獨為先公文為斯道也丙辰閩廣流冦至君乃與仲父太僕及伯兄太守卜居邑城之東而邑大夫多折節造廬資問政俗凡關通邑利害有聞即言不及請託所報撫臺蔡公六事皆安民禦冦要畧辛酉冦至君倡各巨室捐芻粟酒脯餉兵樹防為力不細是冬君赴㑹試過山東之利國驛㑹值暴客掠其行槖盡君返止滕縣一寺舎杜門讀書蕭然弗為意翼日周方伯以入覲取道過訪覩君談笑自若因曰吾行也遽茲來也非為子之恐于虎口而有所䘮也吾以觀子也今子其可矣君方歩月乃遂作月吟叙之曰吾始也有而忘其非吾有也已而知其非吾有而猶未知其信非吾有也逢茲暴客乃幸遇良師矣雖然吾滋惑矣吾故固存吾何所䘮也始以為有者固惑茲以為失者益惑也是故君子廓如而與命為徒與物俱順時皓月在庭碧空如拭輙成短韻以復諗于周子噫觀茲言也而君之胸次若遨乎無物矣已而事聞于朝山東撫臣謝公致百金為助君固却之明年復下第乃返留京又結四方名士三十餘人為文㑹而因以程學舟過湖口觸目風濤有艤舟候税之艱遂惻然貽書觀察周公竟除其害戊辰君試累蹶㑹徐相國具題行吏部選下第舉人取有問學通國體者授試中書舎人入制勑房辦事仍聽㑹試於是合試諸下第士得四巻君與焉二三閣臣偉其文又喜其出君也既授軄日讀書中秘時穆皇登極綸制日頒閣臣分属各官而君獨倍君摛詞起草若不經意而莫不贍舉若勑諭諳達及獻俘樂章王文成公復爵贈官制誥咸出君手徐公曰此固非歐陽君莫辨也或以金酧悉却不受少暇輙合館院臺省部寺諸同志數十人㑹靈濟宫西瓦厰二所其間若趙翰林某徐議部某王太僕某習脩撰某魏給舎某咸昕夕切劘善類以興是秋奉欽差往河南周府掌行南陵王祭禮周府贈送金帛君移文長史司返之歸省康夫人㑹兄太守䘮亟草䟽乞養而康夫人竟不可君不得已留妻子侍養獨身復命在道途覩見民隱國是心不自已乃著為十二議擬陳而諸公以時忌格不上其間若處宗室酌久任明教學定驛規鍳祖訓博舉薦皆鑿鑿中當時事務庚午復命適纂修世皇實錄充收掌官日食大官䝉例賚獲與慶成宴是冬欽依實授中書舎人復賜白金十兩紵表裏各一迄辛未以篆書潞王冊寳及禮成又冊封妃獻俘禮成先後䝉賚凡四白金表裏各若干已而又充纂修玉牒官元相李公以故舊賔禮咨訪掄才必之君凡李公所為毗主薦賢君與有力而世亦莫得知之是時中外争議陽明從祀事君草一䟽其畧曰守仁以致良知立教其㫖在慎好惡之獨知以端治平之本遵皇極蕩平之道以承精一執中之傳識者謂君于陽明能識其大者又草乞養䟽俱格不上㑹徐州洪與治河相渉需才尤急秉銓者遂擢君工部都水司主事又便君迎養壬申蒞洪有議開泇河者輔臣托為訪騐君躬履輿參復書寢議獨陳䟽河事凡五條一曰審泛原二曰預泛備三曰嚴䟽濬四曰堅堤築五曰專責任盖意在䟽濬不必開鑿朝省以為確論先是河淤徐沛運塞貯虧朝命鎮山朱公兩溪萬公相繼督理而君分理其間乃疾馳沿河下上數百里起境山至梁山審視講求預條規畫明若觀火備陳二公遂創築兩岸河堤北岸梁山壩至李家庄而竟南岸自清凉寺下起至大港垍關家口而竟加築計萬丈餘君咸躬督一旦屹屹並峙黄河始復歸束君又為四議一言守堤當如守邊定為限期各夫役許挈家從事二言夫役既有信地每三里合建一舖四舖置一老人為督聽各夫耕牧如河南泰黄堤景象三言植栁四言復淺溜夫額銀設淺溜夫若干助挽朱萬二公韙其議行之已而茶城口及溜溝為洄流淤塞胡家庄二里泥淤旋挑旋塞遂稱積患君舟居野坐風飡雨廵鳩工集材造為束水活木壩兩岸對峙用木樁維繫空其中與閘口等置木􅉫箕分布夫役扒撈沙泥又編板障其空稍令水積輙起洩之時積時洩泥則隨溜水徑去每進半里許成一活木壩如前法始一日僅過二十艘萬公虞焉得君是䇿即數十里河溝如常越日遂過百三十艘三數日間艘盡行萬公手札慶曰竒哉遂下活木壩木􅉫箕式于張秋濟寜至今為成法焉自昔運艘禁越幇君獨于河濶處許其後先競勸而行愈疾萬公益喜以為運務未有若是速也工竣遂薦君智可觸機才堪御衆官舎不治而棲遲草莽之中舟楫為家而出入版築之地奉㫖紀錄叙用賚銀十兩徐洪舊立鈔關後移吕梁分司主之君至適船戸告非便朱萬二公劄行勘議復其舊制乃又為八議呈二公大要欲薄征為先其省役平稱防奸剔蠧咸周且當二公遂請諸朝輙著為令甲云君始用文學起家至臨政處艱大而石畫精智度越常人遊刃有餘地又憫恤人情省斥常費履任不半朞而忠猷濊澤禆益上下者厚矣朱萬二公稱曰豪傑之才譬若太阿斷蛟割玉隨投隨效衆咸曰然君初承康夫人迎養之命以漕事少佇事甫竣不虞康夫人訃音至自家君以不得親訣益恨痛號擗仆而絶者凡幾徐之士民日數百人排闥號呼若失慈母相與採石樹碑志思君聞力阻而百餘人者送至下邳乃止已援例陳乞䘏典上命有司給役成壙諭祭並文莊公既歸侍柩㒺間晝夜至大祥後始暫出近地㑹友有答或人書引文莊公語曰古人居䘮讀禮又立之相正恐太過不及失其本心則未免事親不以其道又曰卜葬之暇不可廢朋友講習此與忘哀營私者不同今某之㑹亦求免缺失已耳非敢違禮也甲戌八月偕予聮過青原㑹四方同志君以中秋時祭先返感發遂著學箴其畧曰學之不講孔子是憂厥講伊何義徙徳脩惟此徙義匪事外求義由心集心慊日休聞過自外改悉由中何者為主良知是宗是知本明雖愚不昧果能志脩道以志㑹志之不立雖知弗行如就深塹迷復自阬志堅且一知烱孰奪如日天中萬境盡豁又曰認識為悟翳蔽真知執識為真謂悟乃悞出以應物中和乖忤不咎其非乃謂未熟又作在田精舎記以見志讀者知君之晚修篤矣自是與予相期偕隠為終焉計予方􅇺不已詎曰聮舫白下合襟青原固即與君為長别之地永訣之期矣予安能不痛哉君天性孝友家範彌敦事仲父太僕如事公公直廬恩廕舎其子以遜仲父比兩從弟逝奉侍尤謹雖雨夜仲父未歸必伺歸乃寢兄太守諱餘慶性􅆟嚴峻事之彌慇家帑悉兄主雖婚嫁需一請諸兄終其身無違顔色兄入仕餘十年君家居侍養惟務悦親康太夫人􅆟念外家君竭力維植之其教從子弟不殊已子暨族戚故人子弟恩意靡不周洽歐陽氏族􅆟蕃君申飭先訓陳告郡邑遵行到今下逮臧獲咸有約誡生平豈弟温恭無貴賤智愚遇之皆出悃愊雖寒畯下士叩之無不欵曲當冗迫意氣藹然又豁如也嗟乎行誼見諸孝友學問敷之政治上不忝乎先徳下有濟于斯人若君揆諸古人可多覩耶君得年方五十八初娶灌塘尹氏生子二即宗符宗翰俱太學生世其家學繼寜村蕭氏皆贈安人又繼萬安蘇溪郭氏宗符娶夏潭胡氏宗翰娶萬安横塘張氏女二適南富京衛經歴王良鴻序班王良懷孫之京之畿之衡之同君自齔著作詩文頗富晚得代制草統凡若干巻予與君分友也而誼切昆弟逝時予哭之以辭曰胡浩浩之回遹仇吾徒之特酷厝萬毒以藴隆莽一朝而隕禍肆之子之遄遺若駒迅而飊促方掎角于脩途補東隅於榆陽將朝聞而夕死庻不赧夫子之門墻念尺書之予臨展宿墨之猶瑩何虞子之捨我曽不留信宿風馭之停乃一語之未訣雖千號其孰聆奮百身以從之亦安能返子于幽駢嗟乎辭不足以雪悲也乃幸狀君狀不足則幸有中丞吉水曽公太僕萬安蕭公為銘而少司馬南昌萬公為表足傳云先母周太安人行狀先太安人周氏生十二嵗失母胡而最末弟絶乳食太安人日含涕襁哺乞乳隣媪得活閫内嘆曰是何其天慈篤也父樵峰翁山伯兄某素仗氣槩矜門户私相愉曰吾家良娣不知當興誰氏已而先太父謙齋先生妁來則又私相愉曰自吾祖父見其家筆耕者幾世矣其後必有興允好良宜太安人年十八歸先刑部目擊窶迫慨曰若是將尊章曷以堪不月間盡脱其釵釧供晨夕謙齋先生承司訓府君家學言動一凖諸禮閭左右嚴事之姑蔡孺人端静有母儀太安人為少婦能閑内則蠲賔祭當尊章意既三年太安人初産子即不肖直也謙齋先生喜走筆書七言絶句詩報樵峰翁致期許語或言其過翁奮然曰吾女卜𦙍當大渠門詎謂過耶久之先刑部補邑庠弟子員贄幣出太安人紡車先刑部學陽明先生之學絲髮不妄取以故家益落嵗時多逺館然節縮操畫蒿目劌心俾翁夫鮮内顧之虞太安人力也嵗戊子謙翁先生猝中風竟卒先刑部舘雩陽太安人治䘮凡祔身物皆竭已奩力辦一一出手製族人有感嘆至泣下者尋先刑部病癧旋抱瘵太安人方病瘧閱半朞矣時家止一媮一僮耄且羸太安人獨力病躬藥膳至眩伏煬側氣奄奄弗支人莫之知也比先刑部捐棄哀毁濵絶者再亡何伯大父繼逝短後太安人曰是吾舅之伯也其辦治如舅䘮于時太安人年才三十有七撫不肖直携二幼子俜俜伶伶朝炊不夕謀㑹遘多難而奉姑彌殷常時作姑饍已惟嘗其餘相得歡若母女鄉族稱孝敬婦無䟽戚必曰周氏然負烈氣類偉丈夫有責逋者雖千百獰暴迄未肯下時時訓飭不肖等曰若等乏世産絶資斧吾止䕶遺書貽若等耳若知所自振乎又曰若等知先世行誼瞿瞿乎已而聞不肖直從歐羅二先生學曰是女父從事也則色喜又見交游中深分有歐陽文朝王尚㴠曽思健思極王有訓此六七君咸吉士也而六七君或時見母母輙又色喜癸卯春忽語不肖直曰吾夜夢九人歘從地騰起昇空其末女也女必勉之是秋直領鄉書名次九太安人曰數定矣輙又喜踰年太母病太安人侍寢卧起必躬持藥食必手上既終哭擗不忍聞不肖直既三上春官不第乃仰禄得教句曲奉抵衙舎才嵗聞隣封倭警思歸如命歸焉又踰年直成進士而太安人適六十設帨報至喜滋三年不肖直以刑曹滿考䝉貤典父贈刑部雲南司員外郎母封太安人㑹時宰見謂不肖直左右言者輙出為湖廣臬僉因得取道奉迎抵分司寓朗州太安人居衙日以慎刑恤艱誡詔不置口二年遷蜀藩請偕太安人曰楚可矣蜀險未可亟敕行既涖蜀駐雅黎尋督蜀學遘病時思太安人絶耗遂告歸見太安人色雖煦而心弗可不肖直察太安人之弗可也又三年承命起畎畆復督楚學廼奉抵楚居臬司又日以寛教無枉才誡詔若臬僉時二年參政西粤請偕太安人復曰楚可矣粤瘴未可敕行益厲時已覩太安人足抱濕間疼行猶豫懟曰吾健飯無他恙女惡可留行不肖直勉聽赴西粤二年轉東粤緫憲以覲行過家見太安人足未瘳因自上章乞養䝉可太安人徐曰可矣可矣自癸酉歴丙子凡四年太安人雖難履間伏枕饌飲猶自適嵗時諸孫詵詵羣從子姓舉觴輙娓娓于于談往罄歡丙子季春之十三日太安人春秋八十于時辱郡邑大夫諸名貴暨閭左右族戚逺迨朝賢致緋綺髓滫介祝名言為之充家太安人一一訊玩曰吾何脩以堪之戒將命者無輕失客戒雍人倫膚酒人優尊司庖者無以草惡享從戒諸孫咸知敬承又憮然語子婦曰惜女父未逮也是嵗終忽思還故居相去二里許留月頃若與諸婦决仍復新第丁丑正月痰作稍失聲稍愈再越月病泄夜數起泄止却穀食五日悉飲湯又五日飲水二月念六命取服飾散諸孫婦逮僮婦念八起坐訓飭諸孫悉孝敬語持季之孤屬不肖直曰女當殖其學盖季卒先十年矣至申刻却水長逝距其生𢎞治丁巳得年八十有一嗚呼痛哉天乎乃不殞予乃殞予聖善母耶于時又辱臺司郡邑大夫諸名貴暨閭左右族戚逺迨朝賢咸致奠詞絡繹如夀誕時而太安人無聞矣嗚呼痛可道哉太安人雖久居床笫然閾外事靡不洞曉病革神明不少憒子婦涕泣曰生死固有時吾時且未至何遽悲耶識度豁朗若無町畦方已匱聞人匱輙傾所有絶甘分少恨不出咽下食故其殁自妯娌子姓下逮臧獲哭也有泚思也有憾其感深矣性故喜儉雖貴且耄不易而最恬于殖利常戒曰吾家免貸于人足矣假有貸人無逐時多科子錢也雖季之孤素絶愛亦不令近利四方朋來訊所繇飭曰彼非利也無弛供饋平時雖聽召醫而不恱藥雖信鬼神而不凟禱雖朔望蔬食而不佞佛凡太安人大節類此其生平茹荼甘薺細行斤斤盖靡得名狀焉周之先自潭州來吾吉徙今漆田為右族里中周胡二姓世好埒陳雷子三直仕至廣東按察司按察使娶聨科里蕭氏諒庠生娶北門郭氏繼蕭氏戴氏問娶髙坪郭氏孫男四順庠生娶西門張氏顒娶唐福黄氏頴娶江口陳氏繼曲山蕭氏顯娶琅瑚趙氏繼槎富張氏孫女四長嫁梁某次郭隆沛次陳秉鏜次康宗軒曽孫三士綏士統士紀乃者卜兆得邑東鄭家園牛闌岡面庚之原卜日得是年之四月十六奉畢大事顧自悲鹵于養又凉於顯如母之沉脩何世有元夫作者操三不朽將徼一言托諸世世廼含血摭述大較如右衡廬精舎藏稿巻二十四
