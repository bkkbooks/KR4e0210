body:
  text: 衡廬精舎藏稿巻四明胡直撰七言古詩金陵曲初唐體金陵昔日盛繁華六代皇居接狹斜博望苑中珠委露太初宫内錦為霞花覆蒼龍填寳馬栁迷朱雀出金車九斿夜拂將軍第萬騎晨臨公主家主家甲第攢雲霧粧樓舞館歌鐘度金屏翠幕競三條綺瑟銀箏通萬戸一姓公侯盡貂冠滿門子弟皆紈袴兩兩鳴珂金馬門雙雙飛盖銅駝路金馬銅駝夾御溝帝在層城樂未休三千嬌女憑圖幸四十離宫判夜遊勾勾綺陌成宫市曲曲金塘起棹謳曽聞袁后承恩寵瞥見潘妃侍宴遊更道麗華髪似漆傾國傾城人第一結綺樓頭璧月新臨春閣上瓊枝密窈窕脩容夜掌箋婉嫕貴嬪晨簮筆可憐寵似日邊雲詎識人如花上日别有長干遊冶郎鬭雞蹴踘虎鞶囊蜃珧象骨粧繁弱龍藻龜文轉步光俠氣飛談排許史雄風帶酒揖金張不辭萬醉青樓曲不惜千金紅粉粧紅粉爭矜桃李豔青樓直擬芙蓉殿真珠簾外栁藏鶯雲母牕前花覆燕燕飛燕舞不禁春鶯啼鶯怨晩愁人七寳流蘇開斗帳九華瑪瑙結羅裀嬌向舞腰生宛轉香從歌口出氤氲此時願作鴛鴦鳥此日願為連理身共道青山盤龍虎詎知白紵移歌舞一從五馬度長波㡬見六龍更舊主陵夷宫闕成灰燼飄零臺館生蒿藺富貴驕奢能㡬時王侯將相應同盡秋水盈盈秋鴈飛山川猶是人民非獨有石頭城上月曽照當時歌舞衣憶昔行寄陳廷評南京初唐體昔逐南宫士曽驅北路轅飛纓入帝里射策呌天閽天閽遼遶隔層穹以額叩閽不可通校書天禄人難擬獻賦蓬萊事已空黑貂毛落空奔走紫鋏彈歌割斗酒騎馬明朝謝北燕挂帆一夜歸南斗故人東海陳夫子作宦南都法曹裏相逢相見重相憐一生一代一知已下馬即探千首賦開尊共論六家指半嵗猶成轅下趨一朝遂作雲間駛當筵意氣拂雲端共道移山不讓難逸興旁凌鳷鵲觀豪歌漫脫鵔鸃冠淹留五月菖蒲酒荏苒良宵苜蓿盤才高官薄君無惜客久時侵我更歡憐君作牧鈴陽縣執法飜令相國羨寳劍空驚魍魎悲神蛟未際風雷變伯玉由来感遇多孔璋生小詞場擅滕王閣下别經年廷尉堂前重接面經年接面已多違可憐歸棹復催歸花間恨别烏衣市月下含悽牛渚磯自予結髪操鉛槧欲參墳典凌周漢長歌直擬卿雲飛短賦嫌追白石爛古字陸離笑子雲竒篇􅀢嵂輕王粲寳璞翻干楚國誅韶音空使齊侯嘆側身天地有餘悲極目天門不可期九死不干楊意薦半生空負子期知棗花纂纂今三載楊栁隂隂連嵗改箇時緑綺向誰彈箇日春光空蘭茝借問上才遊西園何如高誼傾東海玉鯉傳書窈莫通金龜換酒誰為解金龜玉鯉兩悠悠采石鍾山望欲浮竹箭江東長自好蒲梢天北㡬時收晉朝定擬推承祚漢室俄看薦太丘長跪聊緘青鳥信何時並駕赤驎游君莫悲行贈人初唐體漢家天子重邊勲玉鉞登壇静塵氛大將旌旄天外落健兒鉦鼔地中聞三千劍客良家子八百材官太乙軍安排遁甲三方入開闔神兵五壘分霜重文犀六属鎧血凝匕首七星文雙彎明月能穿栁合隊流星似捲雲大軍朝飲長城窟勇騎宵臨瀚海碣闞虎聲呼撼地天長鯨陣湧翻溟渤出塞初覘太白髙踰河已射旄頭沒纛上先懸遫濮頭營中細截渾邪骨右地金人罷祭天左賢鐡騎空期月正直當年漢道昌坐看一日邊塵歇時来何用諳六韜天幸那須通九伐歸来天子賜龍駒綺閣雕甍隘九衢襁褓俱為左庶長盧兒盡是執金吾强弩將軍分食邑䕶軍校尉錫襜褕戸戸屏開金屈膝家家障擁錦屠蘇赫奕只知身尚主髠鉗誰識昔為奴軒皇廟畧還真假圮老兵書定有無獨有當年李驃騎三出無功怨數竒南山射虎空穿石世事悠悠君莫悲題羅巽溪太守所藏竹鶴老人山水圗歌羅公宅地名西岡誰將崑丘縣圃之若木更取三山珠玗樹灑然揮斤造化工逸思翩翩落毫素葱䝉並帶蒼梧烟縹緲還連赤城霧樹裏茅堂挂雲端雲屏石几蒼苔寒上有􅚱砑疊嶂崒峛之竒峯下有洄沿青錦湍居者不知㡬千嵗别有乾坤日月寛百尺飛梁駕長壑凡夫欲度心骨酸豈同栗里誇田廬應共桃源製衣冠此中真意竟難辨世人枉作畫圖看羅大夫丰骨皎若行玉山俯觀簪紱如浮埃㡬年賦就歸去来金髙北斗懸難買開心懐獨向碧水青山生神解興超意逺凌九垓老仙憐汝心魂僻手摘羣山滿幅尺郊居座上有羅浮清卧時時游丹丘嵐光樹色淋漓濕浸入緗帙翠欲流夫君自此得𤣥悟宴坐齋心心無住何必禽慶與向平萬壑千巒疲道路余亦愛山人覩此暢心神却借幽林色散入酒樽春醉来揮秃白雪毫為君添寫西岡月月光流滿千嶙峋伐木篇贈謝樂昌鄧先生有序鄧先生名魯字重質鈍峯號也先生生質合道閉闗杜機超然象外蓋古嚴君平孫登其流云戊申予館韶嶺侍先生將期磨徳領誨飫若飲海顧予無篤逺之志弗能臻於道奥懼負教督厚矣别後撰是篇寄謝先生并自警焉深山伐木響丁丁春日遲明鳥嚶嚶沃渥肺肝涵浸心欣予得者古先生挈予躬兮遨太清滌煩襟兮葆元靈遺濁世兮返居真安得駕兮雙玉驎翩其西遊隠姓名張玉屏京兆藏趙子昻所畫唐馬歌有序張大夫藏趙子昻畫馬十六索予題詠予未知十六之數何取也客曰杜子美寓韋録事宅詠曹將軍畫馬詩云其餘七匹亦殊絶迥若寒空動烟雪又云可憐九馬爭神駿顧視清高氣深穏以七合九此非十六馬乎余未知果出是數否也聊援其意為之題焉唐家櫪馬皆雄才月精降作飛龍胎鳳臆麟形赤岸開不用余吾産寧須崑閬来自從太宗開創功絶世除兇雪恥酬千祀九夷賔天馬至焉耆赤電三花明頡利紫鸞錦繡麗後来太僕馴養四十春乳成十萬六千之飛驎就中拳毛騧照夜白縱有江都不敢畫其餘七馬九馬總權竒傳真賴有將軍霸將軍去後豈無人祇能畫骨不畫魄子昻丹青近代雄身是龍孫異風格畫出七馬若鷹揚秦皇七騎百不易次第九馬翹陸飛漢家九逸那堪策但看飲江嚙草相為娱澤邊隠見羣龍趨雙雙瞳鏡懸萬里淋淋汗血墮三珠意態搖撼昆明水勃若神蛟欲變波浪麤應知唐家全盛日乗此可以西擊胡子昻家有元徳之的盧時不可兮馬不徂神物空令落畫圖至今觀者生意氣志在白狼黄沙青海隅坐看一日乗風騰九區朝蹀流沙暮越都誰能羈絡同凡駒吁嗟馬乎古今識者凡㡬徒前有九方聖後有張大夫張君好龍好真龍一覩神駿恨晚逢驪黄牝牡未暇閱思欲薦之齊景公當今海内昇平久縱有追風縳畎畝近聞鐵騎飲長城域内求之千瓊玖願君引上紫玉坡金旟綵仗相經過能使六飛平不頗不然驤首矯足出交河為君横行萬里盡沙陀歸来再圖凌煙績畫出雲螭照玉珂使君行送别使君動飛軒門填征馬喧蹀躞去何之持牘奏天閽天閽縹緲碧霄逺牛渚秋髙蘆花短紛紛尊罍臺垣英何以贈君雙彤管共言君是秦中豪才名早共終南髙佐邑只飲江東水感時欲釣海上鼇知君牢落情無極共傷賢士隠卑職莫因蓴鱸賦歸来且從省閣訪舊識不見老驥伏櫪思千里不聞烈士暮年心未巳此去叩闗訴九天此日江南命若蟻願天假臣七寳之龍淵水截蛟螭陸斫犀兕叱咤海若呼精衛盡填波浪平如砥坐看桑麻長作田然後拂衣謝天子謝天子難具陳見君飛躍心浩渺送君寂寞意嶙峋儂莫歌吴歈君莫唱秦音吴歈慘愴不堪道秦音悲壯愁人心不如與君兩置之江頭脈脈且分襟王母歌夀句曲王生母夫人吾聞昔日西王母鞭鸞宴罷瑤池侣萼緑雙成夾寳幡人間天上恣遊處爾来八萬六千春二見桑田復為滷鍊丹曽度魏夫人閱世應同皇太姥前年猶餐鍾山玉去年移家華陽曲華陽羣仙爭獻夀大茅起舞小茅續髙堂鶴髪雲作裳芳筵沆瀣羞鷫鵠吁嗟母兮不羨簫歌擁芳筵還見珠樹勝當年珠樹花開豔五色長與蟠桃共薦璇臺側送陳給舎之南省長短句疇昔遊南國羣彦列嶙峋廓落諧心期夫君意最親看君意氣同仲舉掃除天下宿自許大兒詎肯揖元龍小兒孔璋那曽數胷中礧砢凌匡霍詞源彭蠡春波濶綽約曽遊姑射山清淨寧同天禄閣幾年名姓注天宫新命南垣詔語崇聖明耳目重萬里况乃留都是故豐即看鳴玉辭金馬愁見征帆挂紫鴻挂帆一去大江落江外鯨鯢走郊郭腥風浩蕩簸五湖殺氣峻嶒滃大壑君今停杯投筯欲何為以額叩閽非爾時休將五餌捄時艱耐可三空獻帝墀送君行君莫悲僕也與君有夙期十五國風談未畢一曲雲和姑置之主人玉缸酒如乳相對那能不舉巵勸君臨岐且盡觴鳳臺牛首空相思贈魏翁先生閉簾諷道書七十朱顔鬢未疎曽共伯陽醉蒼液還同象罔索𤣥珠人間未肯留名字赤帝外臣無乃是七十二峯總遊遨八九雲夢吞無際更聞黄鶴復歸来㡬迴飛跨洞庭水春野唫大皥應節條風回沖氣韶光遍九垓青雲霈澤素冰開燕嬌南徂鴻北来睠春陽之可樂兮嘉平疇之于耜桑藹藹以娱蠶麥芃芃而覆雉羣花艷而鶯繁碧藻縈而魚麗偉佳人之獨抱飲醇和而並熈襭臯蘭以為佩綴江蘅以自嬉偕三五兮良儔登京岡兮夷猶舞恵風兮僊僊歌伐木兮悠悠循芳谷以薖軸撫流水而浮游汰梓澤之靡冶蕩牛山之沈愁將安排以齊化繫長繩於煦日縱予心於區外侣東皇之太一台嶽短歌二首贈王少冶郎中守台州鬱維台嶽刺天嶕嶢雲翳貝闕斗避元標金欞複道髙入神霄雙雙老公駕鹿驂飈度橋而下芝盖飄颻迎使君兮東来撫我曽孫兮逍遙二鬱維台嶽潛根十洲真人不殺海怪吞舟天吴軒鬛腥穢仙丘雙雙老公方瞳巻髟八百弟子吹竹鳴球迎使君兮東来殲彼毒蛟兮妖虯上夀詞奉夀宋母太夫人奉母七寳玻瓈盞盛以赤瑛之琱盤蘭漿桂液浮朱丹中厨饌出𤣥豹肝紫駝赤兕間熊蹯河伯神魚鱗斑斑左右侍列皆靡顔子夜歌聲繚雲端再拜獻夀為樂歡母不可兮安素澹有子食禄足時甘窮滋極欲非所躭猗與母德世鮮班願母千齡淳風還二奉母七綵芙蓉帳垂以靈珠玉旁唐硨磲倒挂青琳琅吴姬剪製九華裳上有朱鷩錯飛凰罽賔霧縠雲霞翔西方火浣綰明璫鷄舌五味鬱金香再拜獻夀為樂康母不可兮安素常六珈象服有輝光綺豔焜煌非所臧猗與母徳世鮮望願母千齡熾而昌三桂宫蘭寢侔天居璇臺井幹瞰八區朱爵文牕列綺疏丹穴藏金斗蠙珠方域阡陌皆膏腴曲池闌榭紫玉樞八百僮奴履紆朱七十鴛鴦羅階除再拜獻夀為母娱母不可兮安敝廬有子巳作殿廷儒家世仁義富倉庾猗與母徳世鮮如願母千齡為令模黎翰林維敬席上仙人騎白鹿圖歌僕本三十六帝之外臣好遊汗漫騎赤驎當時小僊王子晉驂駕白鹿来相親朝蹀崑丘嘯閬苑暮過員嶠宿渤濵函闗青牛那比跡洞庭黄鶴猶絶塵㡬年誤落人間世悵憶僊踪不可置朅来黎君髙堂午筵開見畫生綃宛相似復疑神車天上回頓覺風馬雲中駛金樓十二杳難期空向丹青起遙思吁嗟黎君生長羅浮之僊標駕鹿凌風度鐵橋笑揮百賦戲海若怒掃千詩擊山妖食苹已作周王客獻環身在軒轅朝明時金門稱大隠暇日黄花喜見招把君之黄花倒君之巵酒羨君且從䕫龍游與君終作麋鹿友雲間真侣有宿期畫上瓊山仍如舊年來蕉夢竟誰真醉後同歸無何有祝融峯用韓韻祝融插天天半起尊居擁䕶烟雲裏踏盡羣峯㡬千尋不知猶是孤峯底隠若賢人望大聖賢猶可擬聖難名吁嗟遐哉聖所際髙髙上極于太清欲遊方廣尋朱張舊蹟以積雨阻遂别衡嶽西去作長短句夜卧兠率宫朝返絡絲渡回瞻七十峯峯峯蔽雲霧忽然風捲重雲開紫盖朱陵似相顧遙觀祝融隔層穹空憶昨日經行處今日非昨日人間異天路余本烟霞人塵網寧自錮金簡粗探虞夏文蓮花未躡朱張步游蹤苦被隂霾隔元闗莫藉仙源度我聞峨嵋之山髙入天上有靈仙不知數即今不復倚躊躇驅車且向西遊去重来擬結魏元君不似桃源迷去住澄江秋水篇寄夀沔翁先生七袠見逺懐澄江秋水淨如拭龍洲萬樹森似織主人别業深樹深樓臺影落水中直自從身謝五斗榮一任鴻飛九天翼灌園耐可狎鷗眠洗硯還應供魚食詞賦八百敵離騷𤣥言五千凌道徳兒孫盡課雕龍文家僮只收伐檀值明月滿江江浸天天為主人開胷臆憶昔游從恣經過江頭花底奈春何香風庭際度蘭茝帆影軒前送棹歌竹靄厨烟色共碧鶯聲童語音相訛主人當日興絶倒一斗百篇不為多醉来共撫先生栁書罷還籠道士鵞管絃何必羨金谷觴詠真堪續永和主人早是丈人行從予結髪推宗匠共道談詩匡鼎来那知抱道羲皇上一别十年秋復秋萬里那由奉巾杖傳道今年七袠餘雙瞳似電神精王飜憐羇客錦江頭題詩招隠増惆悵嗟予何事老塵容舊約空悲五老峯猶思月色醉林亭遙想秋聲和夜鐘㑹須三江作釣侣還尋五嶽共遊蹤至日冒雪遊禾溪遲近湖族叔歸来忽踰年兩得逢至日長病盼春歸漸衰驚嵗疾朝来命車禾水頭撫景何辭竹林遊牽帷萬峯成燕婉俛仰已無千嵗憂乃知此方山水奥况聞先代芳跡留同宗同隠世莫得世外招攜不可即日晏梅花漾溪流悵望冥鴻天外翼賦得淡泉歌贈張君里内張君生綽約雅抱似欲翔寥廓家學早傳張仲景前身應是孫思邈曽飲長桑上池水視脈還如睹三膜投劑㡬迴死轉生捄人何啻饑連渴不將蓬虆異髙門當闗百喚百不諾吾衰歸卧衡廬交反闗謝客門羅雀三逕荒蕪竹樹新惟君来往穿林薄借問張君何所嗜生愛清泉恬自樂神方不藉九轉丹淡盡凡情即仙藥悲憤詞哭歐陽文朝日日相見不厭多一朝不見愁奈何㡬年不見君歸来就君歌君今忽往矣已而已而渺若江河一去不復来空有淚滂沱二日日相語不厭繁一朝不語心煩寃㡬年不共語歸来就君歡君今忽往矣已而已而渺若雲山一去不復還空有淚潺湲衡廬精舎藏稿巻四
