body:
  text: 衡廬精舎藏稿巻二明胡直撰古樂府劉生劉生氣若虹身跨五花驄西京然諾重北闗姓名雄結客三輔外揮盖萬人中直遶河源地歸来第一功紫騮馬三花汗墮紅萬里自䝠戎駔駿龍為友繽紛錦作幪獨乗元莬塞如馭大鵬風幸奉英雄駕狼居蚤勒功隴頭水隴水挂隴頭霜笳咽共幽那堪来去淚分作東西流飲馬寒仍渡磨刀夜未休直取樓蘭破東歸不顧侯卞和獻玉退怨之歌庚子年作桐栢水出荆山傍華精固結鬱以藏魍魎夜哭怖神芒穴山采之寳璞彰於以獻之楚兩王悲嗟嗟王胡不自中聴信讒人乃有賤工一言詬之雙足離躬嗚呼欷歔心之痛兮口不能訶足之離兮無可奈何吾獨悲哉寳璞而題以凡石真士而誣以誑賊悠悠蒼天曷其有極投彼讒人乃明白黑嗚呼欷歔寳璞可剖以自見我思王兮勞心惻明月篇朝發兮采石暮蕩兮馬當散炎靄於輕飈流皓魄於船艎耀江波之鱗鱗噴萬里兮珠光矯玉螭兮璇宫舞素娥兮霓裳渺下上兮混素浸無窮兮漭泱盪予目兮天外浮予躬兮銀潢彼湘纍與明妃邈不足以絓予腸予將騎白龍歌少皥挹南斗而酌酒漿又詎知鸒斯跔跔焉之控地大鵬羚羊角於蒼蒼柘枝詞有引余從京師初覩戎戲莫諳其節思必古柘枝之舞因作此詞寓有感焉將軍長劍倚西極志欲滅戎方閫外屯營三十萬鉦鼓震遐疆落日初挂崑崙側戰酣氣彌揚長鋌直擣河源外生縛吐谷王殺戎血作黄河水洗刀生赤鋩玉闗從此無亭燧喜氣發春陽天子御門賜顔色雙賜小蠻娘金鈴抃轉呼萬嵗萬載樂平康步出上東門行步出上東門回回起念思今日不作樂何復待来兹一解君家有清酒席上有琴鳴良遇心所歡可用解愁情二解舎下無斗粟囊中無半錢不肯學龍蛇自委蛇何不去而海上從彼辟穀仙三解騎當飛兔馬佩當步光劍男兒墮地雄竒必有為何能坐愁唧唧悲此寒與賤四解枯魚過河泣枯魚過洞庭延望波濤濶泣涕自漣洏感是舊棲托緘書報白龍慎哉勿輕躍風雲未有期懼為豫且獲所貴知徳希奫淵詎可脫銅雀臺君王營四海西伐復東征頓棄三分業空餘八佾情舞衣金薤葉歌調白楊聲妾恨非神女無由入夢傾昭君怨毳幕易璿房氈裘挂錦囊雪悲調粉白雲想換流黄未荷龍顔顧曽傳雞舌香得還故宫冷猶是沐恩光薤露歌步出北郭門遙望渭南里高墳倚石麟相對何纍纍借問何代人云是樗里子此人昔相秦自矜力與智拔藺如發䝉傾蒲等嘘蟻一朝號嚴君裂地銘金璽氣勢何灼爚韓魏焉敢訾自知百嵗後帝宫夾墓趾帝宫亦何存唯有荆與杞榮焰化飄風千秋若寸晷達人任元化龍蛇自逶迤得志成甘霖不得樂蓬累燕歌行寒風發發薄軒牕葭菼揭揭月蒼黄白露慘澹成清霜春風㡬日秋氣剛蟪蛄蟋蟀鳴我床羲和叱馭何劻勷回顧華髪變蒼蒼耿耿不眠夜何長起步落葉循階廂鳴絃惻惻奏清商借問客思何瀇洋乃在燕山北斗傍中有高樓五鳳皇紫貝雙闕白玉堂大明宫殿何煌煌上薄太清耀文昌嘘噏六合控朔方西壓崑崙東扶桑有美一人御八荒羣公左右儼成行九陌朝天珮玉鏘我獨何為限河梁欲往從之無輕航金芝采采逺莫將朝侣雞鶩暮麕獐愛而不見心煩傷中心懐思不可忘跂聞鳴鴈南飛翔不覺涕泗滿巾裳側身北望倚彷徨山中桂樹徒自芳緩歌行北溟有魚不知㡬千百里化為大鵬六月不飛培風鼓怒一徙天池鸒斯區區掉舌譏之余容與於蒿下奚以之九萬里而南為鄙夫睢盱射雉爭高任公日入而不獲一朝而引戴山之鼇矯矯淮隂胯下相遭起佐沛公促項如蒿何怪神龍取笑蛆蝦未見海若秋潦莫誇人各有心好尚舛差惡用相加莛乎撞鐘蠡乎測海焉知多寡之門大小之家當車以駕行上有蓍草下有靈龜下有茯苓上有兔絲同聲相應同氣相資流水髙山豈無子期火出陽燧水出方諸銅山未崩鐘聲四施龍興雲自蒸虎嘯風自馳生當逢堯與舜死不為商受鬼為我為彼仲尼之子何用苦栖栖聖人御天時㡬在兹龍馬出河鳳鳥載下敢告僕夫星言夙駕折楊栁思緒芳蕤密愁魂亂絮飄影隨粧鏡曉吹斷塞笳宵攀折心先碎緘題意共遙到應憔悴甚憐是故時條闗山月刁斗夜偏驚闗山月正晴那堪元塞影遙共故園明泠浸剸犀劍光翻翼虎營愁聞笳吹起併是斷腸聲公子行翩翩佳公子愛客日忘疲置酒臨飛觀挂席扶桑枝交牕侍玉女賔盖何葳蕤西園競紛葩灼灼映清池名香陳異域綺饌分天厨瑤觴傾桂醑鸞刀宰神魚燕姬左調瑟越豔右吹竽晝窮成宵宴綃幔華燈舒陳阮恒接轂丁王曳長裾發篇凌白雪妙曲鳳將雛各罄萬年觴良遇惜居諸偉長何恬漠獨竄箕山隅朱鷺舞朱鷺鷺之榆考賁鼓吹笙竽八簋陳九醖􅆽宴嘉賔樂相於講周禮進典謨歌祈招詩騶虞采豳風顯白駒邁三五握靈符謐坤戸轉乾樞光天下踰海隅賔吁咈主都俞諫者出色愉愉于胥樂福禄俱萬斯載承權輿雉子斑雉子斑文章一何陸離性行何剛狷十步一啄百步一飲朝飛不過林夕息乃在野田穉麥間安能逃彼蘇合丸秦人張羅巧若素空爾非爰爰者兔何能超其藩雖有哀響詎聞九天象以齒自焚麝以香自殘鬼神好晦惡用太姸雉子何不刳爾繡裳卸爾朱冠逺從王子喬棲息緱氏山弋人長繳詎能攀君馬黄君馬黄臣馬驪與君論毛色臣馬焉能希臣馬雖㣲賤来自竁域生權竒朝刷流沙千萬里暮蹀燕昭臺下墀君若建翠華能使和鸞齊君若張大纛早能識路岐啗脯糞金非所宜臣馬當獻君願假九方知艾如張艾如張羅艾如張羅熠熠翠鳥投艾迷羅客語主人鳥質㣲眇又無善鳴雖負黛色徒恱宫庭爰有神禽雲霞其羽雄鳴六律雌鳴六吕黼衣繡裳僕𨽻如雨汝何不以四海為羅羅此神禽豈無衆族来下来王汝莫鳥圄放鳥山堂主人熟視不忍釋竒毛神禽亦不家悲嗟嗟善哉行六解朱葩春榮黄葉秋飜逝者何迅一往無旋形不七尺命靡百年騰精宇宙營目九埏吉凶是非徽纆紛遷自匪仙道曷任燔煎丹經百巻妙藥一丸松喬邈矣傳者妄焉彈筝酒歌對之中悁駟車穹盖憂悲孔延不如澹素放心自然憶彼至人教我忘言芳樹芳樹結根乃在上林間吐朱華兮葳蕤上有雲霞照耀華姿下有湛湛之清池君王羅綃幕霓旌翳瓊枝玉醴酬紛葩佳賔咸来兹觀者忘疲宴者以委蛇惟願我君王萬嵗樂於斯芳樹同鄧林永老無離披行路難君不見烏生子坐巢秦氏桂樹端黄鵠摩天離哉翻二物紛紜遭射彈又不見嵇康遺榮志偓佺魏武鼎業期千年一身四海俱難全人生以天地為鈞隂陽為陶吉凶禍福隨變遷秦項雖雷威那能奸其權放勲之帝仁如天胡為浡潏洪濤震蕩於九埏鯨鯢食人噴蛟涎自非金書蒼水使沐日浸月知㡬年湯徳及魚鳥四海成乾枯顔生抱瓢有餘樂弱齡白髪摧黄壚威鳳祥麟三千年一間覩䲭鴞䝟貐無地無大者坱圠不可測何論魚目混靈珠切玉利鉛刀鹽車駕騊駼自昔孔孟已皆然何用怵迫生煩紆我今落魄若喪狗君亦胡為局促如轅駒君乎何不為神龍之變化用則甘霖霈四國不用還歸包山湖愚子藏舟深山壑達者藏天下於天下放心與化而俱徂忠信可以蹈吕梁太行未必摧輈軥揚雄美新誠淟涊屈原沈湘何太荼柱下首陽無工拙方朔依隠翻自拘與君今日相逢且為樂㑹須一倒三百壺安能白首長睢盱聞君躡屩尋五嶽我當搴衣叩元幄太公老作帝王師磻水當年卧寥邈雲龍風虎自有期翺翔大道長踔犖行矣山中路不難回首卞和羞獻璞聖人出聖人出黄星明天庭朗耀泰階清冠日月佩五雲驂駕飛龍揚霓旌恢帝網惠天心疎斥蝘蜓進龜麟濟六合奠八殥四靈咸集九夷賔流雅頌綿休禎億千萬禩地天寧結客少年場行赭汗溢金落驌驦若游龍手掣紅蓮劍腰插寳月弓左彎連雙鶻右挽殪𤣥熊探丸渭橋北鬭雞平陵東作使秦羅敷調笑漢叔通走馬揖司𨽻停車接上公從者五陵豪雙控鐡花驄借問誰氏子云是古俠雄生小特魁烈長欲盡西戎然諾五嶽重意氣萬夫宗坐待掃欃槍寧數貳師功飛檄傳烽火照灼甘泉宫天子徵六郡姓字達宸聰裂眥閃巖電怒髪指蒼穹慷慨生赤霓叱咤起剛風排陣龍隊踴開營虎翼從飲馬瀚海黑搖纛天山紅既奪休屠祭復作狼居封轉戰闐顔破移兵昆莫空震響播八區英聲蜚九重自非盖世勛那辨許國忠凱歸報明主雄名勒景鐘將進酒將進酒開華堂主人敬客黼衣𤣥黄周旋虎步磬折龍翔寒温各竟意氣恢張時哉惠風百卉菲芳旁唐為殷斚碼瑙為周觥羅列水陸陳椒漿鳴鳥暫歇雲和倡八音肉好和者一何喤喤主人前致辭上客莫停觴人生熻􅔚若隙光聚散靡常君胡為乎對酒不御捋髯吐氣而慨慷為君属之不醉不可歸房客跪謝主人人各有思腸結髪攬桑弧長大不得將沈吟日夜命各有當墨突孔車胡為皇皇幸當盛明之世朝野恱康䕫龍滿清廟諫鼓在堂皇龜龍游沼鳳鳥輝煌靈芝嵗三秀嘉禾獻四方才者宜征拙者宜退藏主人家殷富時吏不呵室家洋洋今我不樂焉能回戈於魯陽願言秉燭洗盞更湯人生貴適志何必綰金章鵬鷦匪大小鳬鶴何短長但願皇帝陛下聖夀無疆客請吸東海主為倒銀潢攜手崑丘巔醉卧王母旁睨觀當時焉知名物之不為桁楊將進酒樂未央古行路難丁未冬頗有子雲悔少之嗟作此篇郢人夸白雪後世珍其聲本非清廟􅞗徒為巴國傾不聞神人暢肅雝奏唐庭一鼓百獸舞再鼓鳳鳥鳴洋洋三鼔亂天地咸清寧嗤彼恵施臺胡然恱晉平暴風墮廊瓦三年宜驚奔誰能為此曲欽哉古放勛君子有所思行黄茂信嘉穀焉用雜稂莠稂莠何足言蟊賊竟長畝所以九苞羽翺翔千仞霄豈與鸛雀輩爭路鳴嘐嘐我願裁錦字寄聲於清飈為我語神禽無然困山椒孤竹歸西伯尼父無停鑣軒皇本神聖阿閣當来巢但恐良媒隔寂寂誰相招門有萬里客門有萬里客鬢髭結冰霜入聞南土音訊知来故鄉果得舊里閭共井復同裳戒庖烹伏雌延客敘温涼借問邦族間今昔㡬存亡客起訴主人閭里非故常吴越盛兵戈征輸劇吾疆疇日富舊穀今者但空箱空箱仍水盜屋廬半荆荒辭端未即竟攬衣涕淋浪收涕且勸客强飲豁中腸二門有萬里客車馬儼成行問客何方去駕言返舊鄉主人挽客泣去思何劻勷早晩寧鄉井為予語髙堂身雖遊上國夢寐懐本疆出入承明廬恩光詎可揚我家南山下田園成久荒兄弟共親鄰㡬載不同觴不如復里閭輸黍故山陽嵗宴列林麓酌醴膾元魴尼父稱大聖詎知沮溺良臨岐莫重歎與君别非長君行慎夙夜强飯戒風霜逺如期有引張伯端太史奉使而南也因覽樂府鼓吹曲有逺如期篇遂變其調犁為三章歌以贈之我欲登閬風之層巔兮我欲登閬風之層巔兮盧敖充我使豐隆駕我軒經歴縣圃俯睇九埏手擥日月出入天闗灼灼靈華獻于帝前帝令三光風雨靡愆匪佳人兮誰為先二我欲凌滄海之漭泱兮我欲凌滄海之漭泱兮天吴為僕御蒼虯服我箱東過王公西王母房員嶠雙闕六著相羊呼咤靈鼇堙殺波浪臛彼鯨鯢藝我稻梁匪佳人兮予誰望三夫何佳人之違此兮夫何佳人之違此兮照我靈珠貽我璠璵我何贈之采蘭及芷又何酌之桂英為醑瞻彼白鳩徒潔其羽翩翩神鳥不與予處停杯不言罷筯一語彈南風之琴奏清角之音我不如鼔嚨胡擊土鼔河梁之區愛慎爾軀祝融之巔誰者容與瞻望弗及兮思如縷臨髙臺臨髙臺髙臺上極于穹窿紫垣天市琱闌綺疏曲曲而相通崑崙縣圃瞠乎其下詎知三觀之與祝融靈光章華豈足崇臺中之人丹顔素髪稱老翁從臺謁帝翔天宫帝親挈之神符斥飛亷而鞭豐隆回羲和之飛御日吼雨而掣風六合搖搖若顛舟臺亦岌岌不可以久從况乎下有瀺灂萬仞之洪淙滄桑變幻兮人莫之窮嗟爾非柱下之老龍又非廣成子講道於崆峒胡為凌蒼昊駕汗漫將欲與天地乎長終猛虎行有序予既有感作臨髙臺然未盡也乃又作猛虎行以諗于龍徳君子三致其意謹藏而不敢出山下有龍山上有虎龍藏囦穴虎卧天府虎非獨燀威亦有靈心口銜帝符命令百神虎踞地長咆大塊盪搖睥天短嘘星晨紛拏虎雖耋矣有雛孔䐈闞而八翼吐舌九州軒牙四極啗兹下土曷其有息嗚乎下土亟矣無為語龍潛不辭奫無奮爾鱗遵養純熈乃登于天津我欲伐虎手無斧柯爾不潛深虎將囓噬爾如下土何如下土何戰城南有引余邑朱貳守佐揚州倭冦臨城獨出鬭死作此傷之海水蕩山搖南斗天吴軒鬛回九首官家戈矛如雲攅蹲蹲不敢出城口大夫腰有赤文之寳刀生平欲伐北潭蛟一日不殺氣長吼寧當開門格鬭死那能跼蹐嬰城守䝟貐四面重圍列十蕩不前蛇矛絶欲移碣石填滄海滄海茫茫臣力竭城中砲鼔聲如雷不捄城南戰骨折天地為我慘澹壯士為我飲血義氣高横狼島孤英魂暗作潮頭烈潮頭怒氣如山来人今戰死不復回人今戰死可奈何江東日夜愁洪波安得戈船將軍豪烈如大夫斬鯨盡種玉山禾戰城南君莫歌出塞曲月壯動邊聲良家七校營横戈穿虎落絶幕取龍城騎踏天山碎鞭搖瀚海傾不斷樓蘭頸韜中劍欲鳴二身將六將軍專征擊塞氛神兵動天地元甲起風雲戰奪休屠祭謀空遫濮羣平西報天子非取耀竒勲衡廬精舎藏稿巻二
