body:
  text: 衡廬精舍藏稿巻九明胡直撰序滄洲稿序予先世自義和徙今滄洲相距里許環洲水樹交錯平疇横浦逺山近岡足稱考槃然予從蜀歸即罹季弟及歐陽生變故宿病日加又嵗苦冦戒靡有薖軸之况自丙寅禁詩且謝避徴文間有不可已者誠非有意於為作也復起之楚収得文如干首因令童子錄藏備擇曰滄洲稿云念菴先生文集序文者聖人不得已而用之是故文非聖人不能柄也自孟氏没道術大裂文王孔子之文湮閼不著百氏襍出竄竊工巧而文柄遂旁落於能言者之家近代儒者所著若易通西銘若定性書易傳序彼能言者無容喙矣降是則不免於萎薾而近俚彼其視之不引而去則曰此文之别種此豈細故哉道術不一而枝末之析太繁也語道不昉于虞書乎書云道心惟微既曰道心則外心求之者未可以語道也既曰惟微則枝末承之者未可以識心也故語道莫善於一莫不善於析方其析之惟恐不至而不知萎苶近俚之言渙若摶沙彼傑然好言者且唾之矣惡能使繹而行之孟子曰言近而指逺者善言也守約而施愽者善道也夫唯不約是以不近此道術之益裂文柄之益落盖交相厲也此亦儒者之過也國家自𢎞正以前棟道之儒不嫺於文柄文之士不究於道盖亦不免於交厲之失唯白沙陽明二公之為道也巋然獨得於本心之微故其言不下帶指逺辭達有非能言之士所㡬念菴先生生兼江陜之秀挺出二公之後年甫十三已慕為古文比十五遂慨然以斯道為任方良知之學之既流也髙者憑几寂照而曰在是矣其次則或認識解氣機為良知之流行先生始嘗惑之既而悔曰惟無欲而後入微惟微而后知無不良今皆以欲機合微體將求道心不可得也故既壯之後其學一主無欲所舉主静歸寂辯荅數千言要皆不踰其㫖力踐之二十餘年然後廓然大悟沛然真得始自信於不惑之地所著異端論盖其徴也其教學者恒取證於靜無動有之語久之德與年偕邁矣則曰是未始有夫存與不存者又焉有夫動靜之有無寂感之先後盖􅆀微而一上達天德非膚學者能測也嘗試窺之先生之學凡三變而文亦因之先生少學文倣李空同棄之曰是未見端委者既入宫寮又與唐荆川趙浚谷相講磨大放於文久之語直曰吾無意為之矣移荅友人取辟於水曰古之人有能之者必其中有自得實見斯道之流行無所不在雖欲不為波濤湍瀾之類不可得也以是知先生之於文所謂一以貫之者也夫子曰文不在兹直於先生亦云文若干巻舊刻諸撫又刻南畿咸漏而泛先生病之邑前令王君某將營刻以内召未果今令蘇君某以先生生平力於道匪徒力文宜愼擇語學者彚編以相警發監司施君華江聞曰先生之文孰非道也宜併刻之乃徴吏部曽君見臺偕及門士分校語學各體編置於前仍其年次俾覧者知先生所得之繇其他酬應為外集又為别集統凡若干巻蘇君屬直序其端直慚從游之久既未聞道又焉知文乃為著其崖畧後之誦繹有知文柄必出道術則二三君子之嘉惠斯文功不尠矣悲夫先生之道未逮大行然見諸邦家徴諸遐邇皭然而經乎世明物察倫盡性達命咸出無欲之體可以考堯舜孔孟不繆質天地鬼神不疑百世俟聖人不惑者也奚俟直云重編王文端公文集序直嘗觀于古之盛際若五臣弼亮莫不與勛華相終始保衡耆矣而嗣君不惠猶隠忍保乂率惟有陳卒就配天之休君奭之告老非不殷也而竟留於固命之一言彼皆在平時而從容徊翔未嘗有艴然决去者此豈誠縻於圭爵哉彼古仁人視天下一家中國一人非故為示廣也内而父昆子姪外而君寮民人皆吾之不可解於心無所逃於身而迄無彼此之分為之大臣者時當劻勷而身繫安危一有不可則艴然亢必去之節若朔馬越鳥之不相戚揆諸古仁人之心有之乎必不然矣當宋之中艱李綱以不合求去其言曰吾知盡事君之道不可則全進退之節若綱之言誠足以媿世之縻圭爵蕩名檢者然槩之古仁人之心則或未也國家當正綂末運在位耆宿惟予邑王文端公獨存觀其處英廟景皇之變與屢疏以乞休既留而徐去庶㡬乎有古仁人之心者與公始以文學列禁近積官至冡宰方英廟議親征公獨不可率百官諫止既大駕北狩景皇嗣位公力求歸章凡二三十上上皆留以重語莫遂其請逮于沮南遷議監國請迎復至面頸發赤詞色奮厲聞者卒不敢貳而國是以定一何其壯也嗟乎使公不從容去就之間寧有是乎有識者誠得公之心以眎世之齗齗然决一去為韙者其大小相越何逺也向使公得柄大政與宻勿又安知不有早計囘六飛於北轅邪某自童仰止既冠友公之𤣥孫别駕于寅大愽翥從讀公集知公之著作最富皆足以敷王體賛鴻猷闡幽𦕈擅雄作者之林而偉度清德標表一時覽者咸可槩見若公之心則世之能考鏡者或鮮也公五世孫有霖屬梧守劉君教約舊本捐力重刻而委序於某某不敢辭乃為昭揭其大節以騐于後之論世者庶其見公心於百世之上郭母呉太夫人八十壽序天下之語水者至湘漢廣矣已乃適江河而失之比適於海則無江河夫海之大豈惟其瀇演不可以虚盈已哉海之中不知其㡬千萬洲島也計一洲一島又不知其㡬千萬里而海不有也不知其㡬千萬鯤鯨也計一鯤一鯨又不知其㡬千萬里而海不有也海之大類若此而學者之為見也亦然是故有能麾千金輕一秩者自謂廣矣而上此則難之又有却王石之富薄金張之貴者此其見誠廣矣然使臨一身之大利害則未可知也此為湘漢江河之分不得以强齊者夫惟前有不可試之險後有不可倖之虞君子以道忘情而屹無色怖彼其眎天下之勛名轟鍧者曽不足其一眎又况區區貴富已乎是則舍江河而觀於巨海不知其涯涘所極也而非聞於聖人之學不能也余友一厓郭君始起進士都給舍以讜議石畫受知先皇帝遂膺特簡以正使逺臨琉球固極海之東也方將犯稽天之浸涉鰻鱺之窟處人情之所必怖衆咸縮頸蹙額而君慨然承荷無可忴之色退惟念太夫人高年難割便道省謁逡廵不敢言太夫人聞亦無怖容且慰之行勉以致身之義一厓君覩太夫人神王氣愉占兆無疆乃行不疑既踰年歸天子加恩晉君卿佐太夫人喜曰吾子致其身而身安殆天相哉一時聞者謂君常聞聖人之學故能以道忘利害其為見固當與巨海絜長量大也已可謂至難矣若太夫人閨流耳乃亦無所怖懼勑其子以致身是不亦有海觀非耶又數歲一厓君正位大卿思念太夫人彌篤既遂解組罄歡林園陶陶融融與太夫人之康豫相為鬯悦不知世之有辱榮是非盖益坐進斯道矣是歲季春太夫人年登八袠族彦門士郭生移孝等謂非知言者不足以揭君之道而侈其至樂乃不逺三百里乞言于予予非能言請以海為太夫人祝將冀太夫人福壽若海之瀇演瀰漫不可以盈虛冀君之學若海之不見有洲島鯤鯨固相為無極也若夫稱􅄒海上神人員嶠蓬壺酌沆瀣神瀵誕其詞為太夫人娯媚則吾豈敢賀歐陽鑑齋先生七袠晉秩序山澤之癯與巖廊之工各相訾而不得相為豈故相毒哉彼其身世殊觀而不明于通一之撰故也不知古之仁賢都華膴者搰搰然為世瘁也而未始遺身樂恬漠者休休然為身珍矣而未始捐世夫是以身善世也世善身也身與世交相善而無不相為則通一之撰不可得異也是故召公固命新邦而雅切明農孔子浮雲富貴而夢寐周公彼一賢一聖者蓋不必易地而無不相為矣夫無不相為則無仕無隱而無不仕也而無不隱也而已矣而又曷相貲為吾邑歐陽鑑齋先生始嘗守廣德佐河間飡櫔服疏櫛星頮露嚴身危處子而煦民渥慈母到於今唫誦人口繼為比部擊目世事遽奮裾上書以去故相嚴公故世好也亟推轂不可得既歸遇鄉戚族人無老穉一出悃愊雖寒畯畸士俛若為之下恒犯而不攖年甫七袠磬折愈壯夫有召飲未嘗不造席終雖立繼百觥不亂或導之干謁輒色赭擁耳不願聞其自視猶然處子也猶然慈母也邑俗故厚十餘年間得先生益渠渠相敦矣故郡邑監司造請尊禮無敢後當道咨薦人材必以先生對若先生其于身與世何若也其所謂交相善而無不相為者耶其亦有得于通一之撰者非邪今皇御極詔舊臣致政十年者晉一秩而先生以年例遂得綰金服雀與鶴髪相映照方命至先生無喜色亦無倦容于時鄉戚子弟爭相誦曰是典也先生實宜之始先生以請告歸假令早自出詎一秩之崇已哉今先生自舍寘而上恩猶眷然是惟先生宜先生適七袠滿期以稽于徳咸尊矣用能不玷今天子新命是惟先生宜先生膺是異數浸知其德與年交相引長將永為世鵠俾鄉戚子弟日欽風而知刑也日瞻色而知敬也日䝉被其更端而知所承也豈不幸歟是惟先生宜而直以通家子欣從一陽之月將效誕辰之祝乃鄉戚諸士駢過而屬之言直謂予衷也猶慮先生辭避不可即已乃思之今聖天子隆三代之治將登先生憲老之重涓爵而問道不爾則問政之使下矣先生既有明于通一之撰則又曷得讓焉而况鄉戚小子跽而上一觴先生素灑然不百觥不已也夫亦何辭奉送陳寅齋赴召序予嘗游蜀登峨眉始自山麓仰瞻其巓若已跨金維翔太清髙拂井絡之間既乃捫天躡雲厯蛇鬼猨猱所却者而升之自謂至矣而視其上猶有所謂跨金維翔太清縹緲一巓也故雖壯夫徃徃登至其中瞠而休焉况靡者乎嗟乎此何其峻也峨眉之産在宋有蘇氏廼今數百年後復有寅齋陳君君生有竒質自其齠日記數萬言甫冠遂魁蜀士人曰此今之蘇長公也繼登制科出宰吉之安成踰年予道其治其士民為誦君之循政若出一口且曰君有氷雪之介水鑑之明父母保鞠之政卓乎殊矣然不自表見不設畛域盖自程松溪之後未有覩者而予兩接君其言動發自天真心益異之又二年君以異政􅂪内召行有日時予方深閟山隩而邑友王信卿君門士也叩關而責之言予曰予深山之芻言也何以贈君予也請以登峨之事終之今夫峨眉一也而人之登者異耳是故始之仰而瞻其髙者此賢人之操也一節可見者也其巓之上又有巓焉此聖人之學也其全體不可名言者也予嘗聞蜀人以蘇氏期君矣夫君文詞蘇氏也循政蘇氏也今者去為侍從行且指切天下利害以寤明主咸必蘇氏然予以為此山之仰而可瞻者也非君所為休也若君者其將期於巓之巓乎而蘇氏未盡君也雖然予昔登峨至其中意且休矣有芻者曰子誠休則雷洞天門倒景光相與夫接混濛攬崐丘撫兩丸而隘八埏者咸莫得之予感而躋其上固不能無德于芻者之一言也嗟乎異時傳峨眉之下有道濟天下出蘇氏之上者必吾陳君君亦必無㤀于予小子之芻言也於是乎言贈何宜山先生督撫閩臺序某嘗言天下事非必大也苟得人則補天柱地之績可以坐奏亦非必小也苟不得人則股疥脛癬之害不可以疾除聞者以為知言方倭夷之發難也旁海郡國膏野血川人莫能孰何朝議創列督府而一時秉鉞大吏皆便文自營未有亶忠于國之忱越十餘年海壖上下僅得揚之廟灣閩之平海兩戰克㨗差强人意以天下纓緌之衆而遏亂捄時若斯其鮮者則得人之艱也夫東南得人與西北殊西北仰給帑儲故獨急於鷹揚之士若東南則自揭其民力而以圖冦譬之治病攻伐蠱毒則重増尩羸非有秦越人之神技不可為也曩呉越揮金若灌漏卮民力坐憊然而内無潢池之警則以地力稍舒而民志尚固也若閩海則不然閩地雖腴而幅稍儉氓𨽻趨利不復覩害士或志急而喜族議方冦之攻興化也有力家止募伉徤内捍私門而當關呼守陴隍即誶而弗應久之沿海兵民反為倭嚮而弄戈潢池者猋若驚波不可止以是閩省數易督撫而獨成平海之㨗者則唯二華譚公與總戎戚公所謂有秦越人之神技者是也故談者以東南得人尤難若夫得安閩之人則又難矣頃天子重念邊隅下各大臣臺省察舉異才于時中外交舉臨海何公時公新除服即起家掌楚臬又不數月擢閩撫臺盖異數云楚藩臬寮宷方伯劉公憲副毛公索言於某以為之贈徃某薄遊建業時公居南省而南省稱傑節敏才必首公比某典蜀學時公去成都已先擢柄文西粤矣然蜀士民頌公德政謂公當艱大㠜然不稍動咄嗟事辦若操豪曺不擇犀象縉紳中語屬大事者亦必曰何公今某起病廢又得侍公楚臬益知公之文武才猷脫頴軼塵亦天植使然至决獄亭疑稱敏錬者公餘事耳若公豈亦所謂秦越人再見者歟公之閩必能以神技先易其肺腸然後調飬尩羸針砭蠱毒無不可也則今獨能安閩者孰與公賢而能誦公行事以相贈處亦孰與直核雖然以公文武才猷之殊匪獨安閩已也刻王太史詩序予昔與友人論詩獨珍神韻友人唯唯否否至或為論説相抵唯丹陽姜廷善潭州王少潛不予逆然神韻亦難言其上必有道君子之撰褐外而玉内又如稻麥食人無修醲溢味而非此弗生此豈可與妍色象矜名稱者論哉其次則如陶謝王儲崔孟李太白諸作咸飄飄有象外竒驟不躡塵闠之氣間渉世故亦無為艱難愁苦状盖物莫得而欺之者矣明作興者若何仲黙髙陳諸子或庶㡬其次焉此亦未可為不知者語也王少潛徃不多為詩間作輒近仲黙既卒之七年廷善官大司成始獲搜求凡若干首刻為小帙題曰王太史詩寄予山中而概言其少予憶與少潛宿金臺西直門外古刹㨿梧坐月談詩宛若昨朝今披讀其帙追撫徃事未嘗不悽然欲涕屬者予自畎畝再奉命入楚渉湘復吊問少潛家因出是帙屬朱令某刻諸潭示覧者廷善所謂得其一斑是也夫得其一斑以闚其全則少潛詩固非少也湖廣鄉試録後序主上執皇序尹天下閱四厯矣楚藩歲當比士考試官教諭黄某偕某等奉御史檄實典厥務故事某當叙諸簡末無讓方某之未被聘也聞楚山川甲天下已至望之祝融紫霄盤亘乎東南拂拭乎蒼旻曽不得肆足而馳騁相與誦之何若是乎其崴嵬莫躋也江漢洞庭沐浴乎日月窟宅乎蛟龍曽不得正視而容與焉相與誦之何若是其瀇瀁無際也踰時戾楚廩廩祗役㒺敢怠佚既竣録其士之登等者九十人評隲其文締觀其意指其質厚馴雅不詭於訓故者盖靡得詳稱云至其瑰偉俶儻不牽章句卓乎窮要眇而鑿乎當日用浩乎括天地而確乎中物理綽乎其不畸于古而鞠乎可措于當時異時則可以楨榦王國腹心帝猷者盖不敢謂無人焉嗟乎此豈非山川風氣使然哉不然何其與崴嵬瀇瀁相埒也雖然子多士固咸擅風氣之勝者也借曰擅之遂囿之焉某知不然也夫風氣之勝五方各殊自孟氏以後士囿風氣以表樹於天下豈獨楚哉聞諸楚之先自祝熊肇封而神農舜禹之蹕跡在焉盖古帝王之所從過化也厥後若倚相之慱物靈均之忠憤世世􅃩人口而或謂愽者溺文憤者踰中此又豈非囿于風氣之左騐與子多士不聞若國之先達有周子者學聖人之道其足以陶風氣以約于中者與雖然周子語道淵且閎矣然學聖要領則獨眎以無欲之一語是故使人人無欲則天下家國可坐理矣風氣曷足囿之何以明之夫士方伏草野業呫畢日啖不能重味歲衣不能十襲未嘗不安且愉也一旦宅民之尊握勢之便則雖列鼎不為厭雖霧縠不為華雖綺閣璇房不為適雖呉歈越唱不為豫其極不爲蠧亂不已則多欲之為害也子多士已與計偕行將宅尊握便有家國天下之寄矣自非無欲未見其能尊主芘民者也昔者伊尹道恊一徳功格于皇天世嘗誦其勛烈冠古今而不知其不視不顧者則根荄固也嗟乎此無欲令甲也非周子所望斯人以志之者與子多士姑無索其淵且閎者亟欲報明天子不恧于股肱腹心請相朂于無欲之訓敬書以竢贈賀大方伯吾南劉公考蹟序予頃居江介見岡隴巖嵁詰屈嶄㠑剷目劌心迄無燕豫𢎞衍之觀屬者以職事遍歴楚部涉雲夢之澤騁壇曼之墟卒然遇之心夷神曠若接混茫遨太清知南維有大觀也夫以江南輪廣㡬千百里獨得此此豈易遇哉徃予與今大方伯吾南劉公同鄉書又同郡居相邇見公雖少綽然温懿若老成人其顙頩似春覿者咸醉心焉及予始登仕公已舉進士為才大夫頎然稱先達其不相值者三十年矣比嵗己巳予起畎畝典蜀學乃獲附采末相見歡踰夙昔載炙德猷惇大體要澹若無事然紛挐靡密斤斤画一吏莫能奸裁大政決大議未嘗一動聲色楚連嵗大儉公斟酌贏縮裒益上下為民續命民以載寧兩臺承命察舉異才特首公公亦未嘗自見其能歆其德公遇人無猜腸不為甘詞縟禮亦不以微文苛節督過于人以是人莫不安公為公出力恐後又明年公以左轄三年報政期至藩寮檢菴李公劒湖顧公屬予書曰方岳報政希覯也子不可無言予乃慨然嘆曰嗟乎不履雲夢不知公之大也曩分宜秉政倚銓為市公家巨閥相距數舍聲相荅也使公少貶以叩閽户則已都華膴久矣而公獨不然今天下幸無大憝士爭自濯磨以懋績猷然議政者喜繳繞近督責建事者競鑱刻尚表見辟諸一岡一巒不越詰屈嶄㠑之竒非所以語於大觀者也何則天下不患無可見之功惟非作而致功斯上功也天下不患無可書之名惟非要而樹名斯令名也古之大臣以道事君次安社稷咸若瘝躬豈忍作且要哉有作且要則天下之元氣且坐削矣奚功名足云方今或以詰屈嶄㠑為竒而公獨得其大公非江以南之雲夢乎盖公自童已澡德家學夙志嚮道從州牧到今官介若抱冰故其神明内王不營而物綜焉公所為本末固如此公雖不善伐將書其績獻上惟上仁聖公孤咸敦尚大體必為公書曰是能為國植元氣者古有社稷臣某則近矣是惡可不在天子左右湖廣武舉鄉試録後序直甞覽觀國制至文武科之繼設未嘗不翔首頌服也自三代後登儁羅材若我國家何其周與何其周與然生長南紀覩大江東西少有以鷹鷙士樹魁磊之績者而獨楚之先則鬻熊吉甫傳頌甚遠厯漢底宋代有著稱迨我神祖造鼎金陵則康廖二子首摧勍敵以是東南武事咸推先楚士當春秋時楚負其傑虎視肆夏漢稱荆楚劍客竒材豈不諒哉今上登極之四年冬楚復當大比武士代廵燕野陳公飭紀督試其防檢眎文場埓焉直獲以監試式觀得雋之盛爰受末簡叙諸其後今夫國家不難羅材而難任材不難任材而難得材神祖聖宗創府創衛列爵置屯其育養世胄不可謂不腆今者繼鹿鳴䝉大饗異時樹牙振纛秉鉞專閫其簡用武臣不可謂不崇乃至嚮者倭夷内掠膏原血谷呉越佳麗猋為飛燼而傭師愞夫踆踆不敢出城口放一矢竄則畏影尾則怖形徃徃駢首委饑虎喙徒令儒紳士代以經武齊民既漕粟食兵乃又代荷戈而之死其極至借力象郡鬼國而未己若是者何也豈非羅材而不得其真與夫不得者非生靳之也人不習之繇也彼漢之嵩雋宋之飛錡咸當季運而成駿烈曷為際兹隆盛而將種寥閴若斯之至豈不亦悲乎爾諸材官良家子翩翩來也橋弓累弦礪鏃鳴羽自視為中鵠搦筆操楮入經出史自名為成章若可雄今而盖昔也不知卒然敵遇其不為踆踆不出城口其必内能坐䇿為鬻熊外能奏公為吉甫子將然耶否耶雖然今天下果非無材也材生于習習兆于志志胚于忠故君子質有報國之忠然後能有致身之志有志矣則習精而智鉅雖欲不為材不可得也子不聞霍去病深入闐顔致幕南無王廷岳武穆志復中原挫巨張席勝之敵彼豈皆倖至哉去病奮云匈奴未㓕何以家為武穆自為禆將已刻肌自矢盡忠此二君者謂成于忠志非與直所屬爾諸材官及良家子首必篤忠志増益其所習廓之慮在天下命曰訐謨引之計及萬世命曰遠猶材哉材哉雖拜自獻于司馬晉而腹心帝庭可也若夫任材之道則固有握樞者存直奚云奉贈劉撫公唐巖先生晉陟南少司空序直之始至楚也三寮大夫交語直曰若非今劉撫公閭右者與若國雖名獻纂纂然能保大刪難若劉撫公者則亦不數數矣若知公治楚耶公治務振紀急民時時為民湔弊剔墨然惇體尚要洞悉隱曲不為苛䌓遇人温恭語出至誠造次批答一字畫翼如也然未甞假人嚬笑難犯以私剸堅制變機決游刃之餘而智出漏船之表所措設必為民永利不騖近名楚水國堤固楚命也楚無完堤民與魚鱉游者餘十年公至邉江漢各樹堤計共千里費不征民且寓賑先是楚堤連遭漲壊自公築牢甚㑹無漲故民得有秋時謂公造楚動天矣楚故兵弱公選將督練遂成勁兵公之為之又非若玃挐競武者流一何其備德也又曰是奚足盡公曩公守嘉興倭冦猝至矢死捍禦創築各邑城棊布墩臺而嘉興地竟全大吏督師啣公不賂已檄公領兵海上驅之虎口公顔色不變率師出城父老子弟蟻集號留遮不得行時大吏自怙能生殺人臺臣以下靡若草矣忿公方最公未嘗求解免人曰公不避倭夷易不怖大吏難古所謂鐵人石心非耶公後十年三過嘉興海民咸先期出逆最末愈衆嗟嗟誠所謂備德也即若國豈多覩耶直聆其言踰嵗公提兵出討土夷縳其酋以歸于時公已晉陟南大理卿尋又晉少司空諸大夫復語直曰公兼資文武類如此某等迪教䝉休將謀贈于若以若戇不阿若無以鄉故辭直曰予言惡足有無雖然將曷踰諸大夫曩言哉夫古今人才非不希保大刪難而難於備德昔者臯陶論官必凖于九德未嘗及材智彼豈左材智弗尚哉誠以備德者所以孕真材釀鉅智也故人知智之智材之材之為用而不知德之材智之尤為用也衛文公秉心塞淵騋牝三千甞試號於人曰爾能塞淵則馬政蕃將孰信之乃不知塞淵之不獨蕃馬政也若公豈亦務為九德而塞淵其根抵與雖然豫章托崇山而明珠固不產淺淵也公之先自大司冦至端毅公忠孝衣德所從來遠矣至公繩而大之雖吾鄉果不數數覩也諸大夫曰若言未有加于公者諒哉戇不阿矣可以為贈曹中丞詩集序紀山先生起家詞林出為柱史繼踐藩臬涉左丞所至咸有賦咏總題曰曹翰林詩中嵗解政歸築佚老堂東湖之上有佚老堂稿又移嵗有善福閣藏山稿相繼梓行彚之曰曹中丞詩集胠貽鄂渚屬衡廬子序諸首衡廬子讀至末簡曰先生殆隠矣乃令弟子遡流設難而告之曰先生曷隠哉始讀先生詩中秘敷揚清廟之逸響也藩臬勞役屏翰之遺音也樂府塞上之什則采芑鐃歌之流聲也假令先生即仗鉞甌脱才力尚徤可以收金人十二鐫績闐顔不爾則當為巖廊型表胡為剷光收華而固隠為彼八十而感非熊九十而傳壁中書者抑何人也今先生年未耄又胡呶呶唯呂伏之逃而陶韋之是髙語未竟先生莞然應曰子惡知之自予歸佚荆南予方以東湖為神瀵奚羨洞庭西園為閬風奚羡衡武予堂與閣即清都天宫奚啻岩廊子固不知鵬鷦之大小彭顔之脩夭予又安知呂伏之為多而陶韋之為少子休矣勿言弟子不能難歸且報曰先生言大不可器局殆隠矣夫衡廬子囅然咲曰小子識之先生之言與所撰同可以興矣子又安知先生之隠非隠也夫遂書以識簡端贈瞿睿夫序予與子言内外吉凶之辨詳矣予言所可言而所不可言者亦靡不著辟人投之美食誠食之則㫖而思飫也彼耳食者終無以益饑亦猶之夢中談夢其談愈竒而夢益弗瘳浸淫而終身饑終身夢也能勿懼乎予慚無埤子子之鄉二顧丈者於予有對病良劑子歸當先予得之子且為予諗二丈以堯舜孔子之脉大仁體仁非在外也又為予諗耿伯子曰仁體愈微則愈大微非在内也世之恣汪洋者不足言而泥于見大猶未可語微而它喋喋唯微之語亦或耳食者流予駒隂踰百半猶􅙠􅙠焉瀕耳食也子當為予戚之子乃戚予粤署之孤過矣予之不孤由二三子之不耳食也不然雖終嵗促膝予孤彌甚子自信不忍予孤也當欣欣振䇿出西粤門東指九疑道五峯之麓眇若洞庭者什伯于胞臆矣何戚為贈總督李蟠峯公晉陟大司㓂序江藩稱人才舊矣繇上世閲今數千百禩凡夫瑰士霞蒸雲族麟麟炳炳為世魁宿大抵多子墨客卿禮園耆碩未有擁繡蝥牙纛騰龍豹之畧磊炎朔之勛總文武而憲萬邦者也正統嘉靖間始有羅公樹功薊門毛公耀武交南其它則寥寥一何其艱也至近代文武兼資翩焉繼作自克齋李公後爰有自湖呉公二華譚公兩溪萬公逮今大總督蟠峯李公並峙一時轟嵬逴絶焜煌宇内又何其盛也蟠峯公筮仕即以經術文學推轂名流繼乃颺歴楚粤總轄蜀藩祥政膴澤殊操石画聲實覃中外搢紳語文武才屬大事者屈指必公先皇特簡以大中丞鎮撫真保控扼北陲公至踰年老上之子不復敢彎弧南牧而公之名盖幕南矣屬者公既以常調陟南工侍適兩廣未靖議帥亟甚天子若曰匣豪曹之鋒閑銅爵之足欲求剸堅致逺非計之得也則又改公兵侍兼職臺憲仗鉞出鎮刻期平賊不一年間遂進剿兩廣蠻獞剋復古田邑疆未㡬連征東廣潮惠蕩夷冦窟不可殫紀又未剿殱倭海堧捉生尤夥䟽奏當宁偉公傑烈恩嘉腆重已又陟公南大司幾鄉之仕二廣列藩臬者五人咸相謀為報贈因屬直勉之某曩得侍公見大度長筭負荷𢎞碩屹然有措天下泰山之志然又抱冲業簡未嘗為突梯之行炙轂之辯又非若世之攘臂籍疆埸之利者也其有是成功豈非所謂允文允武者哉公既竣事即疏陳歸養當宁虞公去遂有是命意欲公取道拜大夫人請得就養留京地里最邇良便大夫人樂哉公徃哉某因觀古周人之詩既曰文武吉甫萬邦為憲乃又推本其友曰張仲孝友是吉甫之所繇憲萬邦者孝為之基而忠成之也某固繇公知古人矣公行且入承燕喜為龍為光上翊明明矢文四國庶㡬畢公忠貞之志孝徳之大是為贈鶯谷山房藏稿序洪都大司冦蟠峯李公自韶齒攻文學脩業鶯谷之山平時撰作若文與詩無論晦顯咸篋山房題曰鶯谷山房藏稿盖公之述作最富曰藏稿珍所擇也間出眎其門人藩㕘龔君君因校刻西粤之署乃公復緘貽以命不佞而為之序不佞曩甞趣承大雅習奉教於侍史矣聞之吾邦之詩派自天稷彭澤上矣不佞少讀彭澤詩超忽蛻埃􅅽冲融絶鑱刻意其獨得諸天非人力可勉企比長知問學稍能涉道之藩復讀其詩至神釋一篇反覆其意然後知彭澤之達道而子美未悉也其能蜕埃溘絶鑱刻者有㫖哉故人之為言不患不能蜕埃溘絶鑱刻而患不知道甚哉知道之難得也彭澤之後嗣其響者在洪郡莫若山谷山谷始甞踵杜與韓其末則能刳剔皮毛直詣精髓一不襲其畦徑繹其趣若幽入絶島饑餐古雪雖未得於道未甞瀕俗第令歌之不中金石被之絃管如擊稿然故近世作者多少之乃若近世作者獨喜追古轍朋相擬效于時洪郡則有熊士選氏士選詩酷擬杜不敢一失銖寸形模肖矣而以求山谷之精髓不可㡬也然則詩文亦難矣哉矧言道耶公古詩逼謝近體出入岑劉文則取法漢宋間然皆發諸肺腸語不屑銖寸之合而音中於金石之㑹至其澹足雍容雕琢靡事又庶㡬彭澤之沖融故公之言曰苟不見道曷貴於精公盖蒸然嚮斯道矣公豈與今作者爭鴈騖行哉公筮仕使滇升菴楊公一見推轂名才宦轍歴五嶽登遊逮四咸有咏賦唫人口屬者仗鉞南紀壯猶膚功語具兩廣㨗音䟽中若公所謂文武兼資坐操三不朽者非歟公之本末不佞别有述兹不載廣東鄉試録前序今上生而神靈乘乾統天是為萬厯紀元首禩于時聖學隆興敬惠重晞文治駿發武節猋横㑹東粤以地逖孽芽䧺虺卯滋蛋島鮫宫木樵水維之間訌然贅聚劉剚我民屢十嵗不能下上乃特嚴大吏握鉞平之山魅海氛詰朝而告清明九真以表暹球夷亶日域星􅒸之種貢艦賈舶來復舊壖無論象犀珠琲沈檀海山之精繽繽然葳蕤乎函夏天子若曰屬者嶺海用武豈若昔癉國之君唯方物是騖哉唯其材賢之足楨也而東粤嵗當賔興適應敷求之典迺巡按廣東監察御史張某振颺百紀鬯宣上徳彌篤譽髦士聽欽風咸翔翔容容興快覩之忱御史乃明典申制合提學副使王某所遴士二千五百有竒鎻闈試之凡三提調則左布政某右布政某監試則按察使某僉事某典試同試則以前廵按御史楊某檄聘教授某某教諭某暨百執事咸精簡從事御史夙夜嚴屬百司冀獲材賢足楨者以報明聖而翊文德凡得士登等者七十有五人并録其文之韙者上獻闕下某當有言以告茲登等士某惟國家掄才凖周制士始育學繼舉于鄉升之南宫晉與廷對即周所稱升司徒司馬告王者是也而今之日固成周再遘也東粤又昔重譯所繇入之舊鄉也諸士浸聞周之教乎今夫周教士稱三物曰六德六行六藝夫士既養以德行而又摩揉之以藝故其庸之足為國楨者此物此志耳世之副墨洛誦之子亦鮮不聞其説假令今日號諸士以六德則應者十且一二號以六行則應者四五號以六藝則應者七八何則教學之失其本匪一日矣今世教唯藝士自捉髪以藝學且藝非其藝矣矧曰行又矧曰德故驟而語曰若學務知仁蒸于聖義而極詣中和無異乎其目相睢盱口相嚄唶而重愳莫當也故應者希也唯髙者止愛䕶名檢卑者則曰吾取貴富華當世足矣焉用它此非獨海邦雖畿甸侯綏咸然某請姑説海為海邦士辟而解之今夫人見江河以為廣矣見江河之坻凡數十里焉必畫縣邑樹萬家至相競惜不􅀢捐尺寸及觀之海茫沆潤天地其間不知幾千萬洲島也計一洲一島不知幾千萬里又不知凡幾國都也而吾赤縣神州適據其中彼以江河一坻成縣邑者乃吾赤縣神州一鋭毳耳曽何足有無繇斯以談士之爭一藝之竒者辟之爭一坻之縣邑萬家彼皆未以海觀故也孟子曰觀於海者難為水柳氏曰海者聖人至道之本所以浩然遊息者也是故學者誠學於聖人之道則其觀進于海矣視彼一藝亦一鋭毳也又何足有無乃或取貴富華而已者則是執漚生以為已有益微以幻矣雖然百川學海與學者學聖人之道非躐取其大也原本先也子不觀海竇於原泉而聖人之道實本諸心是故心之覺為知覺而生生為仁生而無不通為聖通而宜為義其極為中和而六行以立六藝以正繇之而大業以出至不可名言此非外至也而覺且生其從入之要道也噫斯海説也子東粤士海觀習矣其先若始興逮余崔二君忠猷文采抑亦涉海之大洲大島者也而謂能得原本以竟其大用者則有間也明興辨朝海上有儒作焉亦庶㡬哉得原本者也以今校于諸士之文則皆翩翩忠猷文采之流光亦彷彿乎志其本矣某獨意今上濬哲訪落敬學將觀其原本皇乎巍乎攬斯道之大登明蹀三五有日矣東粤士既多海觀豈不能返其本以進其大而以學弼亮乎聖主永肩成周之治仰成國禛之矚者與又豈不令重譯以不波告禎弢長鋋强弩稇載之弗復試將世世稱東粤冠古今極盛者與斯則大自爾身諸士無愳其莫當也而士之為見恐終限于鋭毳終淪漚生之幻已耳不亦左乎是舉之先則前所稱握鉞大吏實維提督兩廣都察院右都御史兼兵部左侍郎殷某暨提督南贑都察院右僉都御史劉某以逮都督同知總兵張某左㕘政某右某某副使某某僉事某某其左參政某僉事某前期以入賀行都司某某咸有維繫于斯文者也故書廣西鄉試録後序今天子統承丕丕基握符紀元聿新鴻猷濬哲狥齊神資絶出聖學日蒸彰聞中外寤寐賢雋賔興海宇爰自畿甸達於侯綏江介嶺海之間甌脱斗辟之内士有章縫而呫畢者咸忻聖作而快先覩于時廵按御史唐某監臨廣西試事録成某以職事宜叙諸末簡某聞之重華南廵警蹕賁于衡湘聲教達於梧野西粤固古帝之流化區也秦漢以戈船載闢桂林象郡歴唐彌顯竒人墨士􅉨􅉨與桂蠧翠翿文犀馴象竝貢稱珍明興樹藩設學材賢彚征名卿碩輔勛猷代著下至酋長莫不慕義趨風解結投弩競列纓緌之林猗其盛哉然某甞涉湘浮灕攬結西粤之勝海陽中峙支嶂萬分攅㦸列珪翥鷟翔鴛甗錡柴虒岭嵤閜砢雲譎波詭不可狀陳而其間二三巍巒赤立乎漢表若偉丈人儒長者髙踞俯視羣子弟蒲伏趨走聽指授之不皇也又若元戎搴旗連百萬熊羆虎臣驍騎角力之恐後也斯其山川竒勝雖秦蜀莫之甲也盖蹶然嘆曰西粤材賢之衆多其間名公卿之勛猷以揆之今日其方權輿而未可津涯者與何則昆侖之氣鼓行域内自北徂南而西粤固南國之極壤精華之尤萃也以彼其山川而値精華之萃故曰今日未可以津涯也曩聞蒞茲土者惟固守簡闊舊畫多未甞事事曰吾無攖也已而虺穴木樵魋跣之餘孽卵育日繁豪噬我民其極至侵疆奪邑戕官剚吏嵗罔虛日襟喉為之鬲塞諸司猶然視曰吾無攖也頃得節鉞大吏繡斧使臣毅然議征於是古田先復府江繼通刋除蓊鬱旁鬯日南之遐談者則曰西粤之人事又何其與天運地靈相恊應也然則西粤材賢駿發而鴻宣引長而勿替斯又非其時與茲者大比賔興羅蒐卓犖諸士乘昌運遘盛時而適際聖作之期則三試之所揮霍有司之所鑑遴谹詞奥義鏗耳溢眥纚纚林林固足以進叩南宫矣不知其翊運應時仰對聖人求賢之實詎止斯藝已乎夫士之為藝談儒行則宗聖脩而詆老佛論治法則尊王道而卑五伯籌國計則上商周而下管桑非不彰彰著也然一朝布之中外較其行事與曩所言者若兩人焉何哉則以未達國家求賢之實者也詩曰濟濟多士維周之楨士胡以克楨哉書曰不惟逸豫惟以亂民詩又曰百爾君子百辟卿士不解於位民之攸暨是則國家自養士布列有位冀為國楨非斯世斯民無為也士自始學至列有位爰楨乃國非斯世斯民無事也此國家求賢之實亦士之自靖也士既不知其實而脩之方其學操翰輒私心卜曰吾得繇是飽刀泉華閭里足矣他吾奚有有晉是者曰吾得繇是樹名檢階顯融則身名兼之矣他吾奚有又有晉者則又曰吾得繇是抒猷悃垂後世可也是非無世與民之事也而其實非也既非其實則士雖日日操翰而宗聖脩是楮生聖脩也其行有老佛覆詆之者矣雖日日操翰而陳王道是楮生王道也其政有五伯覆卑之者矣日日操翰而偉商周是楮生商周也其計有管桑覆下之者矣夫國家求賢之實若此而士固如彼則世與民將焉賴國家亦焉用三試士為也是必有古之已飢已溺一夫引辜者作夫乃可以斡世而膏斯民則士於國家非獨楨之且龍之矣嗟夫今西粤士欲以翊運應時仰對聖人求賢之實安知不有若而人者繩繩繼繼賛睿徳而鬯鴻化也某滋望矣故曰今日未可以津涯也趙浚谷先生文序自易象以風水語文而文之變備矣彼水至大者莫如海鄒孟氏甞以海况聖言海固不易談已其次莫若江河予甞浮彭蠡絶淮泗固江河之巨滙也方其微風颺波紆紆容容涵雲霞之麗抱日月之晶覩者固已盪胷臆皇耳目矣已而噫氣噴薄􅗟雷震霆踶萬馬舞三軍鬭虬螭而咆熊虎覩者震掉不敢正視頃之則又恬如寂如放乎無有凡此不出晷刻而其變不可窮詰非獨彼水與風不得知雖造物者亦不知其然而然也此非天下之至神其孰與之自鄒孟氏以後其文之盡變有若此者唯莊荀司馬太史韓蘇數子擅之柳歐以下亦頗得其七八然予又觀江河下上有三峽龍門其變不在風而在石彼其石之􅏭嵲崱屶與波㫪撞天下希竒也而莊荀太史數子間極其變亦或有似之然不常有也何則使天下水咸為三峽龍門則利渉者阻矣故三峽龍門謂江河間出之竒可也非所以語於文之大凡也國家自𢎞正間文章復古學士詞人競尚剞劂徃徃語騖嵺崤而音入焦殺其極至襲古人勝語以相矜嚴此何異獨誇三峽龍門不復知江河風水自然之變亦少過矣嘉靖間三四君子起而定之若趙平凉之作髙者雄渾頓挫不襲一家而姿態不可繫視數子最為近予甞得平凉集未全稍録其粹予友鄒繼甫故平凉髙第弟子也將梓行之而屬予為序因尚論之如此萬安倉前周氏族譜序予聞漢人之語士曰脩之於家壊之於天子之庭嘗竊怪之以為士果脩也而又奚壊乃不知今之脩於官者或壊之於家則又何哉今夫君子之語修也以身而其所以為修者以仁身固一矣而仁尤至一夫惟君子之仁其身者無弗一也是故當其仁家則民與天地萬物未始違當其仁民與天地萬物則其家未始置至其異日釋而返服於家其素所教又未始更端也何則彼其所以為家國天下者疇非身也亦疇非仁也又惡有修此而壊彼哉故世之有修而有壊者非所謂修也予少與萬安周方伯洞巖君共事歐陽先生與聞求仁之學繼同舉又同朝昕夕通家予不能盡語君之修甞試觀之其梱内雍雍子弟翼翼僮僕魚魚如也其愛人無崇卑衆寡戚䟽屬屬如其當官侃侃憂國恤恤如其然諾石如辨是與非山如也其道人善規人過又挈予而道之規之繭繭誾誾如也已而出為郡為藩臬其眎采屬民庶胥𨽻盧兒猶其一家其刪難濟變猶治其家艱至於下上之間辨是與非導善規過猶曩之予導予規者然君竟以是取憝下上遂致而歸天下士共惜之而君弗以屑意惟日篤于睦宗輯譜教家飭族將興鄉人而趨焉君豈不知家國天下之異勢哉盖君之所欲以仁其身者一也而又奚有兩修兩壊之殊予聞君之先有游濂溪先生門者為某翁㡬世為方伯某翁又㡬世而有君從弟某舉進士令宣城咸以正學聞則周氏之為世修久矣其譜實自某公創修之至君凡㡬修而以序屬予予以為君之修譜者影也其修諸身者實也君將俾族之人索影而求其實則必自君之仁身者始由是而鄉之士與四方之士興焉將亦自君之族彦始然則君雖隱矣而君之欲為國與天下以達于天地萬物者今未始减曩也是在斯譜而君之修固亦與斯譜為無窮也金陵三勝紀略序夫覽觀方輿纂圖列勝此愽綜者為稽而已而非以為遊也登躡崇幽抒詞掞藻此遊觀者為適而已而非以為道也是故君子苟渉乎道則遊非遊矣舂陵古稱山水之域其大者若九嶷舜陵其次濂溪月巖稱三勝萬厯改元孟夏予掔二三子從湘源謁濂溪窺月巖濂溪去州舍許去元公廬不里許泉汩汩從石出相傳元公濯纓其下月巖又去濂溪舍許巖闢東西雙闕中空洞透天圍不啻百十丈遊者從西入視之類月下弦東入為上弦踞中則中天矣予行四方探陟有年未覩有若斯殊勝者也遂偕二三子留宿嘯歌不能去已而州大夫出三勝紀畧請序予披誦顧二三子曰為此編者其亦有鄉道之心乎昔者精一之㫖發自虞舜曠数千年闃乎寥寂無欲學聖之㫖又發自元公夫無欲精一之門也學不從無欲而自謂能入道者誣矣誣矣二三子識之而况舜之藏元公之生咸不越封内山川之靈疑若有屬今州大夫編次得之是豈為稽與適而已哉不然自三勝而下澹岩稱稀於天下矣大夫曷為其絀之也二三子識之于是予與二三子為九嶷之期别大夫而序以遺之大夫羅某銅仁人其先出予鄉之清江二三子蔣論曹學參全州人周鳴球羅田人衡廬精舍藏稿巻九
