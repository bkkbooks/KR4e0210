body:
  text: 明胡直撰行狀念菴先生行狀於乎念菴先生逝凡三雨露矣其孤世光以嘉靖乙丑七月十五日卜葬近里同江赤石潭之原又一年世光偕其戚曽于野同亨門人王暹曽乾亨羅徵竹等編纂其遺事以書抵西川告同門生直属為先生行狀同門茶陵劉應峰同邑王託歐陽昌繼以書曰是學術所係不可不勉直念先生逝之先三月尚無恙而移緘曰朝聞夕死喜為近之語若為永訣者直讀之䀌然遽求東歸乃先生竟棄去未能啓手足侍含禭摧心裂肝茹恨終天盖非獨侗淺不足發先生淵藴誠亦有不忍言焉第舎是則無為既厥衷矣直可已乎昔嵗乙卯聞先生僑寓楚山廢書塊坐三月恍然大覺貽書及友人道林蔣公信大略言此心中虛無物旁通無窮無内外可指動静可分上下四方往古來今渾然一片而吾一身乃其發竅非形迹能限是故縱吾之目天地不能滿吾視傾吾之耳天地不能出吾聴瞑吾之心天地不能迯吾思古人往矣其精神即吾之精神未嘗往也四海逺矣其疾痛即吾之疾痛未嘗逺也是故感於親而親吾無分於親也有分吾與親斯不親矣感於民而仁吾無分於民也有分吾與民斯不仁矣其感於物亦然是乃得之天者固然如是而後可以配天故曰誠者非自成已而已也盡已之性則亦盡人物之性故為天地立心萬物立命往聖繼絶學萬世開太平非自任也又曰知吾心體之大則回邪非僻之念自無所容得吾心體之存則營欲卜度之私自無所措然此特自知不以語諸人第謂此萬物一體舊説未有省也又嘗貽其門人尹轍亦云且曰陽明公萬物一體之論寔此為胚胎又曰陽明公後殊未見其比直時寓都中奉讀二書􅌶然嘆曰大哉淵乎何幸堯舜以來正脉逮茲罄洩此非先生言程陸二子寔言之程子曰仁者以天地萬物為一體莫非已也又曰此道與物無對大不足以名之天地之用皆我之用陸子曰宇宙内事即吾分内事吾分内事即宇宙内事非二子言孔子子思孟子寔言之孔子曰天下歸仁子思曰上下察孟子曰萬物皆備於我非孔子子思孟子言堯舜禹稷伊尹之心寔見之堯舜始以天下得人為憂終以天下與人為悦禹稷饑溺由已三過不入伊尹恥君不堯舜若撻諸市一夫不獲引為已辜此數聖人者豈皆好為其大者哉又非獨數聖人之心吾人之心實有之於乎自堯舜孔孟後乃得周程數子自周程數子後得陽明公當陽明公之始倡斯道及門得者誠有人矣其後漸渉異同今之語萬物一體者尤夥詰其所以則唯泥于西銘同理氣之説而不知天地民物之本出吾心也至數十年後私淑而自得者則惟先生一人而已雖然苟不至徳至道不凝先生其必有凝之者矣按先生羅氏諱洪先字達夫既長讀書至克念作聖遂自號念菴居士其先由豫章徙廬陵唐懿宗時諱崱者居戡村至十四世孫志大婚吉水谷村李氏始居谷村之橙溪遂為吉水人志大孫珙入國初舉茂材為仁和縣丞貶交趾子朋壽夭無子以姪昌壽子慶同後之慶同者即先生所傳善菴府君大度輕財者是也是為先生髙祖生曽祖良貢補廣海衛經歴生祖玉贈奉直大夫兵部武選司員外郎配周氏贈宜人生䨇泉公諱循字遵善公附籍陜之白河舉進士仕至山東按察司副使為人慷慨質厚初署武選首罷劉瑾𤓰牙凡二十八人尚書王敞至膝行瑾前祈免憝公持益堅尚書窘莫奪陜中同年李憲羽翼瑾得通政導公公却之瑾敗憲擯故黨縮匿公獨載酒郊别憲伏地哭曰公古人古人兩守劇郡咸以㢘惠著稱公配谷村李長史公某女封宜人以𢎞治甲子十月十四日子時生先生誕降之期適䨇泉公自白河挈家起復寓京師復除工曹理吕梁洪遂以命名先生神穎殊絶身不踰中人方面秀眉脩髯晢膚吐音鏗然目無游睇自童端重不為嬉弄才五嵗夣至通衢紅樓夾映百貨沓集市人肩摩自知為夢呼曰汝往來者皆吾夢中尚自攘攘何耶拍手大笑遂覺告李宜人聞者知非埃􅅽人也八嵗属對語竒長史公驚曰汝當為大丈夫九嵗始就塾師三年授尚書竊讀古文遂喜為古文辭慨然慕羅一峰之為人方十五聞陽明王公講學䖍臺心即嚮往之遂卑視舉子業常歛目端坐同舎生譙讓之曰是羅道學先生耶比傳習錄出先生奔假手抄玩讀忘寢往往脱頴見篇章間同舎生益驚避之年十九始就試補邑庠弟子員二十二舉於鄉時䨇泉公偶感疾遂輟㑹試侍疾適里中谷平李公中家食乃偕王魯直某周欽之子恭師事之公端嚴有守學以閑邪為訓語具先生所著谷平公傳年二十五赴㑹試明年舉南宫比廷試世皇帝親閱奉御批云學正有見言讜而意必忠宜擢之首者賜進士及第第一人官翰林院脩撰先生方聞報無矜喜色心怦怦念䨇泉公不置次年正月遂請告南歸至儀真病幾殆留數月愈乃謁谷平公浙邸訂其舊學方病時有瓜州富人王紀者坐事為同年項甌東某按治乃飾名姝介萬金謁求解已峻拒之矣而項聞之微以意嘗先生先生辭益厲項嘆服遂定交為深分既歸悔曰紀所遺當拒而罪不當死久之有同年饒比部録刑江北致書生之已弗逮矣為之憮然是後二年先生侍䨇泉公于家公訓飭不殊童穉言動少錯辭色必厲客至令衣冠行酒拂席授几無不忻忻從事又明年壬辰有詔覈諸告者過期公趨之行至京補原職時南野歐陽公徳今元相存齋徐公階共事館中先生每過從論學歸輙綴記久之遂載帙矣次年二月克經筵官躬展御書三月陪祀孔廟聽講彛倫堂俱錫宴五月忽夢别䨇泉公伏地哭大慟悲極而醒淚零枕席心掉不能出户日未晡而公訃音至矣先生痛欲絶奔歸至楊子江舟人難之先生曰吾不得見父奚用身為疾驅抵家即喪次三年啣哀不入室蔬食水飲葬祭以禮常携二弟壽先居先出寓近里玉虛觀四方士友來㑹頗衆同邑羅公僑貽書諷居䘮講學非宜先生復書畧云春來以弱體多疾因處舎旁之玉虛觀盖亦竊居廬之意而便静養之功求免於辱喪焉耳而周子欽之聚友切磋某亦或側坐聞其緒論其㑹則諸長者主之某不欲避嫌引去盖主於求益固非敢以開講為也若夫開講者以身淑人而非淑諸人者也是樂育者之責而非哀疚者之有事也昔者東萊吕子行之矣象山責之以為非禮夫以儼然衰服而乃納贄帛擁臯比則何異於墨衰即政非惟禮之弗宜顧精力有限亦恐有所弗暇也服既闋之二年李宜人病痺先生廢寢食躬飲饍藥必手烹溲必親覘衣不解帶者數月諸婦請代宜人不許曰出吾兒躬親者吾饗之安居䘮痛慕執禮彌殷一日讀楞嚴經得返聞之㫖遂覺此身在太虛視聽若寄世外友人覩其顔貌驚服先生忽自省曰嘻殆哉是將入禪那矣乃悔置前功篤志求孔孟正脉必繇濂溪之無欲遡而上之居常與同郡東廓鄒公守益及諸同志切劘無虛日次年遷厝䨇泉公李宜人于廬陵之盤龍山己亥推補宫寮改左春坊賛善赴召道南都兩入城晤同志與王龍溪畿極論無欲之㫖至維揚趨㑹心齋王公艮咸相質辨心齋一見期以孔子大成作歌贈焉先生登舟感切著冬遊記又為歌曰父母生我身師友成我仁我身如不仁形神皆不真聞歌乃易簀受言永書紳誰知百年内二義無踈親讀者咸為感奮踰嵗抵京入春坊進講與其友唐荆川順之趙浚谷時春居相比荆川每語先生之學輙傾誠嘆服而浚谷生西北未悉也一日邀先生出遊属其内子謁曽夫人闚室中一無有乃曰羅君内外皭然若此繇是三公交好浸宻日相期許以天下自任中外咸稱異之曰三翰林云時東宫未定朝儀浸聞有它異先生乃與二公各上䟽請預定東宫朝儀已而忤㫖謫為民先生出京與荆川各買小艇聨發角巾布袍蕭然世外每暇共編圖史日書字萬餘咸寓運甓意既歸二年二弟請析居先生盡推先世田宅咸令主焉乃于舎外别建一宅居之題云芸館先生自歸田削跡城市應酬禮文辭受取與咸裁以義世局時格秋毫靡狥人不敢干以私嘗曰此吾當然非為免毁譽而為之者素憫通邑多虛粮乃貽書上官力請丈量其廣阡陌者至為毁言撼阻先生曰病民孰踰此乎毁何可恤復為書促郡縣竟成之時郡中東廓南野二公及䨇江聶公豹咸家食又有彭石屋簮劉獅泉邦采先生每特往訪㑹者至數百人先生性撝謙抑抑求麗澤未嘗以言詞先人然瞻其容止者非僻為之潜消一時薦紳青衿快覩景行有不假言辭之末者矣仲弟壽先病返家視藥既卒哀楚累月寢食失常其友愛篤至如此久之遊衡岳門人尹轍王託劉天徤從為文盟告岳神及白沙先生祠語載集中山絶嵿為祝融峰峰下為㑹仙橋橋外石可二尺側出懸不測人無至者先生躡足而登放歌而坐徘徊乃返過觀音岩有僧楚石者不出岩八年矣至是迎見且曰吾嘗受異僧外丹無足傳者今以授公先生曰吾道自足寜湏此乎拒而不受丙午季弟居先如南雍送至金陵過毘陵訪荆川夜語契心相對躍曰庶幾千載一遇乎遂達旦不寐時先生與荆川皆以重名為海内宗依所至聚觀望之若仙然荆川自以愽大不如先生雅曰念菴之學平正而海内士亦以是定二公所詣云十月闢石蓮洞洞故虎穴荆莽蓊欝不知年矣先生異之遂加攘剔閱其中容可百餘人逺望類蓮花故名先生自是多洞居錢緒山徳洪偕龍溪邀㑹如青原士友同聲至者百數十人先生多告以去欲除根之方訂約擇龍虎山中為江浙㑹所先生遂預赴龍虎之僊岩過冲𤣥觀登愛山樓意甚悦之遲諸君子未至為書壁歸一日坐洞中有悟恍惚大汗洒然自得問者曰到此能無續斷乎先生哂曰今固去了又在也邑令王西石之誥以先生聚講無所遂脩𤣥潭之雪浪閣既成集士友大㑹西石自是日津津嚮學矣先是吉水兊米貯縣倉納戸市米襍穀沙移運水次展轉多費運户買補類破産先生惻焉乃言邑令率鄉人建倉同江水次納户就辦貯倉遂免前患已而五鄉咸因取法至今利之庚戌聞虜逼都城先生目不交睫者月餘已而病作幾不起于時友人有以仙學招者先生寓書拒之始先生謂儒者之學在經世而無欲為本夫唯無欲然後用之經世者智精而力鉅自後儒失傳盡主多識本末倒易久矣天地之運不息必有所寓以顯其神失此得彼不得不旁落釋老之徒若儒者能不自惑于本末之故取其所長以相激發比諸陶漁蒭蕘則周程大儒固有之矣故雅于二氏徒侣未嘗盡絶然不知者輙以相招至是寓書謝之然後知先生毅然一出于正非衆人能測識也先生又以晚宋號理學者無慮數十家其書連數千百巻往往轇於理氣動静之分漫衍贅􅃨益無以見聖人用意之微讀之使人心煩目眩亦孔氏一厄也至近時傳良知之學者又多失本指語知矣而不必良語良知矣而㒺致知之功一聞用功語輙生詫訝過在於任心流行而不復辨欲遂於聖賢所指凝聚兢業之功盡與掃除其弊將哆於晚宋支離之失使陽明公復生當為攅眉故其平時提誨學者多主周子無欲故静易繫寂然不動之語以為能静寂乃為知體之良能収攝保聚一切無染乃為主静而歸寂異時答郭平川應奎書其畧曰陽明公良知之教本之孟子故嘗以入井怵惕孩提愛敬平旦好惡三言為證入井怵惕盖指乍見之時未動納交要譽惡聲而言孩提愛敬盖指不學不慮自知自能而言平旦好惡盖指日夜所息未及反覆而言三者以其皆有未發者存故謂之良朱子以為良者自然之謂是也然以其一端之發見而未即復其全體故言怵惕矣必以擴充繼之言好惡矣必以長養繼之言愛敬矣必以達之天下繼之孟子之意可見矣陽明公得孟子之意者也故亦不以良知為足而以致知為功又曰思慮知覺與良知不可混良知者能發思慮知覺而不雜於思慮知覺者也繼又作良知辨讀者謂先生語良知盖盡發陽明公之本㫖數年先生簡出久之出晤荆川於康郎山訪周訥溪怡于九峰庵既歸習静天王寺癸丑先生年五十矣徙居陽田是秋遊玉笥山登九仙臺明年趙大洲公貞吉期㑹天池乃偕友人赴之至九江大洲公行矣遂展謁濂溪先生墓為書三碑托九江守更之于是龍溪適候先生㑹海天遂同舟西歸謂龍溪曰往年見談學者皆謂知善知惡即是良知依此行之即是致知予嘗從此用力竟無所入盖久而後悔之夫良知者言乎不學不慮自然之明覺盖即至善之謂也吾心之善吾知之吾心之惡吾知之不可謂非知也善惡交􅇎豈有為主於中者乎無所主而謂知本嘗明恐未可也知有未明依此行之而謂無乖戾於既發之後能順應於事物之來恐未可也龍溪曰近自覺何如先生曰一二年來與前又别盖當時之為収攝保聚偏矣識吾心之本然者猶未盡也夫謂感由寂發可也然不免求寂有處謂寂在感先可也然不免待感有時盖久而疑之夫人心一而已矣自其不出位而言謂之寂位有常尊非守内之謂也自其常通微而言謂之感發微而通非逐外之謂也寂非守内故未可言處感非逐外故未可言時此所謂収攝保聚之功君子知幾之學也龍溪曰今於感中寂得否先生喜曰切問也豈曰能之収攝保聚焉耳矣雖然其或免於適越而北轅矣乎返舟㑹𤣥潭龍溪再問先生以工夫不撓心為言已而龍溪曰何以贈我先生曰陽明先生之為聖學無疑矣惜也速亡未至究竟是門下之責也又曰公等諸人其與往來甚宻其受煆煉最久其得證問最明今年已過矣猶未能究竟此學以求先生所未至是非先生負諸人乃是公等負先生矣復何諉哉四方傳者以為使陽明先生復生不易斯語非啻諷龍溪也乙卯春先生將西遊白河舊廬留滯楚之旅舎時王龍溪至自浙遂共避暑山中先生居數月静久大覺即所貽蔣道林書自叙渾成一片者是也盖先生自丁酉後凢數悟然不能無少疑至是洞然徹矣尋病作不果白河之行至九月返舎而曾夫人卒先一旬矣踰年贛江水泛陽田居漂没因假借田家泊然不以干意先生自登第後臺省建坊咸力辭則又餽坊價多至百餘金先生悉却之然有司仍帑藏積凡數千金撫臺鍾陽馬公某知先生家故窶又以水廢檄理前金將併致然已入墨吏私囊久矣先生懼為官属累也致書馬公以悉領為辭事遂得寢聞者莫不嘆服學憲王敬所宗沐來問學又率邑令各致助少宰尹洞山公臺咸為分俸先生用搆正學堂于洞南曰吾以此集四方士則拜惠多矣戊午正月荆川邀㑹齊雲岩是時荆川以兵事起欲與先生共訂出山先生辭曰天下事為之非甲則乙某欲為未能者得兄任之即比自效可也奚必我出荆川意乃寢次年先生復徙居於今松原顔其堂曰體仁尋著覈丁記先是吉水藉多虛丁漫至九萬派差負苦先生力言當道覈其數為七萬一邑稱便時元相嚴公既推轂荆川公矣乃又致惠問自京師以出處嘗先生先生答書願畢志林壑辭婉而厲嚴公嘆曰是乃真不要官爵者入冬以病謝客屏居止止所中不復窺户盖先生自大覺後其語學者多言知止又曰欽厥止安女止此舜湯語學次第故扁其室曰止止所又製為半榻越冬春多嘿坐榻間自是心每前知凡鄉邑事巨細咸先得絶未嘗露一日有南昌儒生來乞書先生遣問其字未報已先知書之果然或問之曰是偶然不足道荆川訃至哭始下榻始先生雖在榻間然四方書問未嘗不應族戚交游之休虞與國事之然否聞之未嘗不致意盖㗳然𤣥嘿而物無不綜澹然無為而自無不為由是益明儒佛幾㣲之辨答䨇江公書乃駁其專主寂静又以佛氏之異吾儒其棄倫遺物之大者人未必入也其誤人易入者惟在幾㣲似是之間今後儒斷斷闢佛其身已遺本逐物反以阻其歸矣乃又止攻其棄倫遺物之大者則入之者曰是大者吾未有也彼方自信其未有而不使之知幾㣲似是之辨則趨者弗已也乃著異端論三篇專明似是之非斥釋氏精髓之弊語詳集中盖先生自叙已自信不惑矣故其書問論議咸為學者指迷决疑雖以考前聖不繆俟後聖不惑可也時同水鄉鄉約成適春饑先生預擇士友宻訪邑中窶人移書郡縣請賑得穀數千石舟載就哺量地艤船刻期散給按窶差等貧者必濟商價因以沸騰一邑賴之六月閩廣冦流突吉地官兵失利先生貽書兩臺得右轄敬所公及叚都司提兵捍臨吉時先生依然室中而宻畫賛佐居多同江一帯約令畫守鄉兵萬衆各相競勸軍容整飭聮數十舟上下警巡戒客舟毋得近岸賊莫得渡一境盡全次年邑當攅造先生念詭洒未絶乃戒同水鄉各都分置區域按畆出収擇士友公正者尸之俾人得自盡一時稱平於是黄冊道陳公就以冊事敦請先生處分先生慨然身任終日應酬往來紛拏一室之中環席雜語傾心剖割雖嫠婦窶兒咸輸其情故宿弊頓除貧苦者歡若更生獨富室以其厲已也故為嘵嘵冀撓其事先生屹不為動曰吾此中若天然毁譽好醜咸無與焉夫安得撓適王龍溪來訪先生延之止止所信宿語别作松原志晤先生嘗移書龍溪致規切至是復發其槩盖不欲盡也次年癸亥五月先生以觸寒失治痰遂病徤忘六月愈先是錢緒山來自浙以陽明先生年譜請校裁迨是編竣序之畧曰某嘗反覆先生之學如適途者顛仆沉迷泥淖中東起西䧟亦既困矣然卒不為休也久之得少蹊徑免於沾塗視昔險道有異焉在它人宜若可以已矣然卒不為休也久之得大康莊視昔之蹊徑又有異焉在它人宜可以已矣乃其意則以為出險道而一旦至是不可不為過幸彼其才力能特立而困猶夫我者固尚衆也則又極力呼號冀其偕來以共此樂而顛迷愈久呼號愈切其安焉而弗之覺者顧其呶呶至老死不休而翻以為笑不知先生盖有大不得已者惻于中嗚呼豈不尤異也乎故善學者竭才為上解悟次之聽言為下盖有宻證殊資嘿恃妙契而不知反躬自求實際以至不副夙期者多矣某談學三年而先生卒未嘗一日及門然於三者之辨今亦審矣學先生之學者視此何哉無亦曰是必有待乎其人而年譜固其影也閱者知先生意所慨望深矣是嵗先生年六十乃預為書謝絶友姻觴祝惟四方及門士相繼叩請日繁先生弗以病倦乃又於止止所後闢有斐亭于時杜偉自呉江周采自安成劉孟雷自廬陵曽乾亨羅徵竹即先生隣戚也咸先後禀學向往篤切及舊游諸君日聚襟亭中先生痛懲末世口耳其教先嘿識重躬行日以精神相蒸因材有造不事規條初至者誨令静坐反觀俟稍有疑然後隨機引入故泛常視者若未嘗施教而稍知尋求者則皆􅂶焉而各得其得也每日環坐先生相對黙然起立循闌吟哦上下或時浩歌從容指發一二語聞者莫不興起九月間復病痰右臂痛遂廢捉筆至甲子春夏集有斐亭者先後不絶時亭中竹樹交䕃林鳥和鳴歌聲日夜不輟先生日凡三至雖終日忘言而精神流溢真意融盎飲其和者自不覺其入之深也六月間郡推周少魯𢎞祖躬來請問先生親書冊以復章凡三其首曰凡與人解釋文義發揮道理此心甚是明白言説既畢此理無存如此只是説話説話不濟事者有所倚故也不知何物與道相當次曰落思想者不思即無落存守者不守即無欲得此理洞然隨用具足不由思得不由存來此中必有一竅生生夐然不類末曰言此學常存亦得言此學無存亦得常存者非執着無存者非放縱不存而存此非可以倖至也却從尋求中得來由人識取盖先生末年語學者既言知止又曰一念不漏曰幾先曰良知與物無對可謂淵矣然未嘗語其所得至是始發明一竅生生無存無不存之實此豈偶然也哉先生久謝棄文字八月初門人酃縣劉朝重穏乞其父合肥公墓表先生曰吾不文久矣重違朝重意竟為撰之又以子世光方省試親書白沙公一絶句走示之盖絶筆也方與諸生訂四季㑹令先聚𤣥潭㑹畢詣亭就正初七感脾痛移頃止至十三日痰作翼日漸熾語家人曰吾明日行矣家長老問疾覩室中無長物曰甚矣空囊也答曰吾平生無所餘窮固自好吾子歸以是語之姪國光再問笑曰死已矣復何説耶十五日中秋辰刻滃雲四起風雨交至震驚林木門人王託李希稷周嶅曽乾亨劉孟雷偕家族人環侍先生以意示欲起狀託等扶翼危坐先生正巾歛手端嘿如平日忽見精神若離連聲疾呼而先生長逝矣年六十有一時暴雨鳴簷天黯無光聚哭者充户雖山谷細民聞之灑泣訃聞四方大夫士識與不識無不悼曰天䘮斯文馳文告致奠賻者不逺數千里日踵于道邑諸生請於臺司祠列學宫之右門人設主奉入𤣥潭閤下邑令遂扁曰江陽書院方先生之歸田也攻苦淡鍊寒暑躍馬彎弧考圖觀史其大若天文地志儀禮典章漕餉邊防戰陣車介之事下逮隂陽卜筮靡不精覈至人才吏事國是民隠彌加諏詢曰苟當其職皆吾事也至五十前後覩時事日非始絶意仕宦然饑溺由已撻市引辜之衷未嘗一日不業業也當事者例薦特薦章㒺虛嵗天下士想望其出以卜治平雖先皇重于起廢臺臣有甘被廷杖而言不已者今天子即位多召用舊臣天下士咨嗟嘆曰悲夫念菴先生不逮直於是盖又有重悲焉先生嘗言孟子之後學者本末倒易信哉然禮記者猶曰自中出生于心未嘗主理為外也宋儒繼出發憤啓明濂溪明道倬乎尚矣厥後取必在物為理之一語遂斷斷主理而外之其析若縷其争若仇其多若九牛毛其極至竄易孔氏之言破除明道之語以自果其説其求堯舜禹稷伊尹之心則案跡以索其似其訓夫子之歸仁中庸之上下察孟子之萬物備程子之莫非已咸專主于外索苟有曰是皆自中出生于心則必詆曰是何異二氏之以心法起㓕天地山河大地之為妙明心中物也噫其左哉彼盖懲曰二氏之棄倫遺物咸有本心之失不知二氏之失非心之罪也今夫手主持足主行常也有惰者焉珍其手足不肯一舉而投是豈手足之罪哉心之體主明物察倫常也二氏珍其心不肯一用於倫物者彼盖有奪也今乃遂以罪心必曰理不生心可乎理之説昉易繫繫曰易簡理得道之説昉虞舜舜曰道心惟㣲中庸語道曰率性孟子語仁曰人心彼世儒不抹而置之則强解以附其説譬之索形于影索音于響索日月于重淵倀倀終其身道不與心謀學不與政通雖甚賢者亦皆隳於彼長而我長之為義訓詁者悦其似辭章者便其愽知謀者假其跡語唐虞三代者不求其本而齊其末而帝王之心政不可復希矣奚獨孔氏一厄已哉明興陳白沙公學為知本天下反詆為禪後數十年陽明公作獨手抉重隂掀揭白日身犯羣嘵號呼以挽天下之士其要在致吾心之良知於事事物物之間則事物得其理而無不格矣是謂致知格物其㫖與明物察倫雖數千載若出一語天下始疑為禪已而信之者衆及門之士翼而明之彰彰行矣其後有玩弄於知識縱任乎氣機馳騖于言説沉浮于老釋莫能實致其良知是盖知求道于心而又莫知吾心之有天則此孔子所以裁狂簡也氣質之不美者益恣益逺其極至妨人病物疑阻天下嚮往之心正先生所謂任心流行者之弊夫任心流行與離心言道者其為禍道埓焉斯又陽明公一厄也天佑我文先生中起兼江陜之靈秀禀隂陽之正氣孝友通神明忠誠堅金石潔白寒氷霜凝重峻山岳盖自少然也比長聞學邁往仔肩退乎恭黙遜以入也確乎躬行以日履也湛乎感應之常寂而非虛也烱乎先幾之常復而非念也兢兢乎嚴細行之矜而非小也属属乎盡人物天地之性而非大也浩乎環躒于四方而非動也寥乎屏坐于木榻而非静也至于一切知見氣機言説以逮老釋似是之非咸不得參故讀中年移道林之書則知其大覺之後經綸為已分讀末嵗告少魯之語則知真得之餘工夫不足言盖自其生平用志不分竭才凝道已駸駸乎達天徳入聖域若未見其止也矧窺其際乎爰自廿年以來天下尊慕師表奉其片言咸為取衷上自王公下迨畸士語天下真儒必曰先生故良知之訓先生與人同也至其不言而人莫不信不動而人莫不從俾天下皎然知末學之非而堯舜孔孟之緒必在於是則自先生而定先生不得與人同也此豈能以聲音笑貌為哉易繫曰苟非其人道不虛行又曰黙而成之不言而信存乎徳行先生以之先生才六十耳鄉使先生不大行得久存以極其所詣長為斯人指南又不知何如也今皆已矣此直所重悲也直少負不覊沉湎辭章既壯見以文辭先生勸歸身心乃北面而禀學焉當其時竊窺先生雖綜志聖功猶取二氏所長以相激發如嚮所叙者是也至其擇人而教慎物而與又若近於可者與之之流及直出而仕就正四方年比四十始知所往既歸聞先生謦欬而覩諸其行事崇而能卑介而勿劌至周而無比至近而不䙝藹乎達人倫日用之懿廓乎寡意必固我之私而醇然當天道人心之正最後讀異端論明辨幾㣲乃知先生之于二氏匪獨指瑕實乃攻堅其于彼之所長非拒之不動乃足乎此無待于彼是真不動也盖綽乎得堯舜孔孟之正脉二氏烏得而比之生平敬老慈幼哀惸属婦故人孤􅊔在數千里外者必托全之有誦孝㢘忠節事雖逺若自已出其見篇章未嘗不三致意雅誦程伯子盡分之語每書以示人意肫如也末年尤以成人材厚風俗為任尊賢容衆嘉善矜愚無論貴賤賢不肖接者無不醉心其教雖不事言説然頫焉若掬嬰孩而不以已主若食貧子而復誘以生道凡被教者蕩乎如覩蒼旻恢乎如遊溟海穆乎如滌條風而飲甘露煥乎如就春陽而臨秋水又如窶人見富人之樂取不皇乞金而返以鉛鉄雜物傾獻之者誠縻于虛而移于大也所謂樂取而與人為善者先生又身有焉當直之歸而求正也先生輙指訶曰是子所謂目長而足短者自數年來妄有禀質始䝉印可盖嘗以本心天則為請先生謂吾儒所以異二氏者正在是又復曰僕近於執事之學洞然無疑斯學其有賴乎方解官為終身依歸而先生先期往矣同門相見哭曰先生晚年期子甚不尠子歸晚矣然懷有終請憾不逮先生之存泰山頽矣江漢逺矣直將何所賴以不負終身此又直之所重悲也直舎是誠無以既厥衷乃承同門之命勉為狀述粗若編年雖不遺煩碎而靡敢緣飾要令觀者知先生之學與年俱升庶可以得指歸之大都矣然先生不事言説而直之言若繁而縟何哉嗚呼直豈好言哉直亦有不得已焉俾後之君子誠以是得先生之指歸則直之千百言猶無言也惟有道仁人秉斯文之正麾者其必垂採擇焉先生娶曽夫人太僕卿三符公某之女有賢徳生子即世光克世其學娶萬安劉郎中現女側室某氏生奕光孫某某先生少喜為文強年弗以屑意然四方謁文者履常填門著作為最富刻撫州南畿者漏且泛今吉水前令王君篆今令蘇君士潤謀輯全本分内外别三集方梓存邑中統凡若干巻王拙逸先生行狀直同邑友王有訓氏篤意聖人之學嘗先直事念菴先生已而偕侍門墻切磨最親邇因拜其父拙逸先生創瞻先生衣服容範知其有儒長者行又知有訓之沈脩有自也而先生尤愛好直若相導所為盖有若翁之誼焉嵗之已未十一月之十一日先生背棄又二年壬戌有訓偕其兄寵條先生遺事貽書楚邸告曰不肖孤不孝不天不即殞越將以某年某月日奉柩葬於某山某向之原痛惟先君隠徳懿行昭灼庭除然俾黯墨不顯白於世則不肖孤辠厚矣謹􅋦哀茹痛摭其大都属為狀文以乞銘於有道仁人將茂著於方來某於先生事誠習之矣曰篤倫曰急誼曰厚志此其三大者焉遂按而狀之曰先生姓王氏名音字于振號拙逸世居邑城西龍灣里晉大傅導之裔宋吉州刺史諱崇文由金陵徙居泰和越數世諱以道稱元鉅儒語載省誌以道生沂洪武三年被徵與諸王説書辭命歸沂生泰瓊州守祀名宦由瓊州公而上三世俱以文端公貴累贈至光祿大夫少傅兼太子太師吏部尚書瓊州公子二伯諱信字行敏號稼軒是為先生髙祖治春秋有隠徳楊文貞公擬薦以侍養辭仲即太保文端公也曽祖南坡府君諱仲祖木訥府君諱俊性孝慈好利濟人如奔嗜欲父培竹翁事祖母繼母以孝聞喜讀書其居身未嘗渉非義母清溪楊氏上舎崇明公之女慎脩孝道一如翁志先生自少奉翁教治周易年十六遊邑庠銳志四方以翁早世遂輟舉子業偕伯兄春谷先生慤養母志務得其歡心母孀居雅念翁輙慟哭幾絶先生數長跪榻下泣勸哭已乃起事無鉅細必請命行出告反面垂四十餘年不廢稍違即旬日不敢見嘗語其子曰子分曷繇盡如吾罪負萬矣言訖泣涕泗交横下春谷先生繼逝乏嗣先生命次子託後之誡曰吾兄種徳弗食汝當仰承無為兄辱汝也能子即吾也能弟矣故託惟兢兢服教不敢後以故伯嫂蕭孺人庶嫂易咸得以貞志終其身先生力也同舎生獨孤起凰者同先生硯席一日為貴介子所死而匿之後七日索屍於沼出焉其母誤誣先生與其從弟鼎邑長令執鼎抵死而釋先生先生曰兄弟同誣而我獨得釋忍乎乃赴訴監使者被萬苦不一回弟由是獲釋竟不死而家既落矣先世䘮弗能舉先生又身代營葬從兄玉湖先生明為王氏宗子有賢行遺孤二先生撫之同所生二孤弗延先生又命諸子各抽産若干供祀事焉王氏祠祭田久多堙没先生既割已田若干畆増二祀之需又嘗經畫為永永計此先生之篤倫其大者若此其細可知也里有繼母訟子不孝其姑欲貸其子而反訴其母俱及先生為證先生乃為諭其母曰子之於汝猶汝之於姑也汝訟而毒其子姑欲汝貸得乎母遂悔釋其子今二十年無間然醫人陳道者貧且獨先生客舎養之俾之有室病亡為棺殮葬之已地嵗令家人祀其墓有窶子林蘇者負先生子母錢莫能償將謀鬻其妻先生聞急還其劵且導之生甲辰嵗荒先生節已食以食至戚者又同從弟貞穆先生倡族人設粥濟活甚多終身迄無自徳之意此先生之急誼其大者若此其細可知也先生不妄言笑與人言輙出肺肝無有關城至辯是非曲直雖豪貴弗避生平無突梯孺兒態居嘗偃仰一室披閱古圖畫為娯非素知與雖權家視若無縉紳學士識與不識咸以三代直道頌服邑長令髙其行數以鄉飲禮賔請先生辭謝不往暮年其姻弟晴川劉公解詔獄歸先生獨相晨夕聆其論有㑹於心督子姪亟受學焉雅曰善不必求知分義當為名不可襲取造物最忌以是鞠躬砥行謙冲俟命終其身盖孳孳焉此先生之厚志其大者若此其細可知也盖先生天性孝友寛厚無猜人謂有婁師徳之度貞穆先生素慎許可每自稱曰先生産不逾中人而恤孤賑寡若飲食然非其心有契慕不可解者其能然乎直於先生亦云先生細行以直所覩聞不皇毛舉直故掇其大者著之篇以請於有道仁人倘無弗信也睠焉與之誌銘俾加諸堅石垂千億年則非獨為先生為先生子若孫慰其凢為士者勸且敦矣通政武東楊公行狀方嘉靖末廕臣竊魁柄頥指天下士平時爰書赫蹏以示銓臣列某當内某外某上某下一日飛數楮若傳閨閤語雖太宰以下咸拱聴奉若畫一私竊恐後而一時幽明慶罰之樞盡歸私家于時予邑武東楊公以銓部郎適管選事柄家挾所為又慿鄉故關説彌繁要在必從公心厭薄之久之以其來楮擲地作色不可柄家遂因大􅋦忌者乘之進熟譛傷公竟落職左官閩之將樂典史由是中外縉紳想望風采嘆曰是大浸將稽天乃有兹砥石何其特立也公之名遂燀布中外矣公既出一時當事者咸弭耳惕息争先為役士大夫風習為之大變嵗壬戌柄家既敗天下名流唯冀公一朝還朝與當塗上下共濟然公竟逡廵補外服稍遷至銀臺而病作矣未幾時公竟不起中外縉紳莫不痛曰是猶以巨艦出長河方未濟而折覆又何其失望也嗟乎此豈獨一邑一家之戚已哉公家居武山之東故號武東載鳴名虛卿字也上世華隂人南唐虞部侍郎輅來居廬陵二世徙吉水至宋盛時曰允素始繇吉水徙泰和又十三世為唫窓先生景行舉元進士官至翰林待制事載史傳又三世為文貞公士竒大顯于世以文貞貴追贈唫窓而下及本生祖某某皆少師又再世為太僕公昱乃公之曽大父也昱生雯雯生天柱公訓天柱公性嚴重有家範以貢補華亭學官遷岷府黎山王教授以公貴贈吏部員外郎娶七星劉先生女封太安人以正徳甲戌十月廿三日生公公生而方面或言類文貞㓜穎敏殊常兒五嵗就外傅静重不為佻弄七嵗業舉子至九嵗天柱公方試有司歸即以所試目試公公立就又嘗為族人著勿齋賦咸有竒思天柱公誨曰汝大賢人後當紹烈寜學近時士止科第著稱耶未幾著資聖錄一巻言治安事曰吾將執此以獻天柱公咲而火之曰是非汝小子先務也嵗戊子以童子就試邑侯及督學使者皆首諸生補弟子員嵗丁酉年踰冠今元相徐公督學試吉安士得公定名虛位論大加賞異曰是能從韓文脱胎換骨者江西第一巻也文名益大振是嵗舉省闈髙等戊戌第進士天柱公方教諭華亭先皇帝出幸承天公得從例歸省如華亭時人榮之己亥補廣東潮州府推官公天性方稜既居官益砥礪操節曰非獨官箴盖吾有家聲焉廣中吏故有貼班銀曰助衙錢公至首罷免有鄉官自閩寄香茶公不啓封還之餽遺請托盡絶至刑名出入未嘗不瞡瞡焉措意也常曰推官法吏法生殺人易耳一付吏人手鮮不為奸又或視上官指下上其手其謂法何故公於讞獄亭疑一主公正而行以詳慎文出躬裁吏人袖手供鈔鏌無能為弊穴者時公方盛年然穪敏練推第一云潮故有橋稅異時監者乾没其間入恒寡公監未一月輙倍其入以是常􅂪例外之旌在潮凡一嵗再被薦踰年丁外艱聞䘮即行毎痛天柱公未面訣語輙涕泣免䘮補登州府推官登海國嚚訟動連數百人當道聞公至則故知名也多委艱大事公亦畢力自効不避怨瘁不數時庭無滯獄囹圄遂空代廵党公荐公有氷清玉潔鑑空衡平之語時謂知言丁未行取補吏部稽勲司主事歴陞考功員外郎滿考得贈封其父母先公以推官既請封矣至是乞恩改封盖異典云公在部感激思報而當時士習事體日乖公隠于心乃退自淬厲力謝餽謁昒爽入坐署奥敕家人鑰宅舎務絶賔親之請以獨行一志然遇賢者未嘗不款接咨諏人材貇貇不自怠居部凡七稔始晉掌銓事時公於人材臧否既考鏡瞭䀿乃首擇其望而淹者拔若干人摘其圮而倖者抑若干人曹中吏多匿善缺市厚賄故應選士有數年不得出者選君未皇稽也公乃示應選者各呈報其鄉之缺官不踰月缺盡出公于三大選中按次除補無復壅滯歡聲為之載道往時外寮文慿付權貴家僮轉鬻各外省承差至必索厚利㢘吏尤苦之公建白按季類付廵按御史分致其属一時大便公管選凡五易月士論翕然顧獨與柄家私心剌繆或為公危公不之撼也甲寅春行取天下官員有推官郭某者素善文公少嘗偕友人讀其文韙之時在念至是因按其前考語最遂置取列而郭適以它事被參柄家遂摘此訾公而甘心之公既􅂪譴過家起居太安人即赴將樂未一嵗量移惠州推官道經嵢峽舟覆漂蕩五十里幸免于難方覆時公自檢考生平無欺君父傷人害物事可質天神决不當為死所既出未見有恇惑意捫髮幘猶故也識者異焉是夜宿野舎賦詩自慰又著為嵢峽志謝城隍祭役人咸有文門人黄侍御緝刻以傳而公自序題曰困喻錄公之至惠州也當道不欲煩以吏事公因固請中丞王公乃從士民願以惠志托公公殫精攄思凡五閲月書竣其有關郡邑利病兵賦善窳一篇之中反覆致意務為永鑑而隨事抒謨翼教衛道意肫如也學士文人傳誦謂足駕武功安陽二家矣未幾得召復為南吏部主事進考功郎中故事南考竣當陟卿寮公又以地望久次入也復因考察貳於舊寮再出為四川僉事時論滋不平而公分廵川西樹利剔蠧無幾㣲不堪之色時川有採木重役使者鱗鱗載道日費千百公條布慎委手註出納隨時批答事無少壅吏抱文書睨視莫敢出氣撫臺黄公代廵郭公相與嘆曰是絶無觖望之氣者二公不以常數遇薦皆重語亡何擢廣東督學副使公即毅然以復古道正士風為任其造士先徳行後文藝首揭義利為諸士辨别布行冠婚䘮祭飲射儀則而亮節峻履又足以表導之至文行品題明若觀火公若執衡士無敢譁潮令某者墨而苛公曰予奉璽書擊貪墨清化源是不可貸竟去之潮人至今樹石黌宫以志感頌廣大夫士謂自魏莊渠歐陽石江以來盖僅僅覩公云庚申夏轉福建叅政遭母䘮奉柩歸諸有司各􅐠金帛悉峻拒之既出境無敢以絲髪獻者持䘮必稽於禮參酌文貞公遺約不散帛不設葷舉樂為邑縉紳倡人咸服焉癸亥再免服入都僉議以公久淹當處京堂公蹙然曰仕無崇卑顧建樹何若耳今某免服再仕以時清行志有地庶不負所學以忝先臣何遽以崇秩相加豈謂某乘乏來也竟不能奪仍補河南叅政時論愈髙公謂公固難於權貴擠忌之日而尤難於廟堂推挽之辰公聞自若也公未至汴即有通政之擢海内志士聞者彈冠相慶而當軸益有意顯用之乃公竟不起以逝盖癸亥年之十月四日也嗟乎此豈人也哉公天性篤倫誼奉太安人曲盡至情友其兄寒松公及弟能卿無不怡怡寒松先逝撫遺孤尤厚遇天柱公故友雖下劣必侍坐出入四方謹奉文貞公像以隨曰異日吾得見烈祖無靦面也嘗經紀從叔給事公之䘮與殯送侍御党公周䘏其後士林義之公詩逼杜文睥睨周漢晚浸瀰王蘇汪洋無涯涘所著文集凡若干巻惠州志幾巻困喻錄一巻世多傳誦生平憐才好善若出饑渴見人一語之工無不嗟羡彌日或手自抄錄迄其身無倦意盖公自圖史之外無它嗜玩素不問家有無誨其子首上徳誼薄勢利不得口官勢呌􅅝鄉里又刻文貞公遺誡誡之家居未嘗一干有司其㢘隅有人或難堪者盖自守固嚴也嘗大書晚節二字于堂内盖有意乎再出之業也顧竟已矣悲哉方疾革無一語及家唯力一書上元相徐公末言深負師門仰慚天地意未能相從報國此為憾耳踰時竟卒其令終如此先娶龍安人繼室蕭氏側室邢氏子二伯寅亨仲寅弼咸有逸才足紹公之世烈亨娶王氏太保文端公孫女弼娶尹氏宗伯洞山公女女二長適尚寳丞陳公子文揚次未聘孫男三嘉𦙍嘉穀嘉祥女一人寅亨等奉公柩歸自京師以乙丑年十一月廿七日葬廬陵宣化鄉蔣演江邊艮山坤向穪吉兆云往公友邑中士有羅生夣傳歐陽生昌皆不易才也而直雖不肖咸得相朝夕直少亦妄學古文詞公見輙奬賞不置口公既先達視直濩落棄學文一無成公又慨惜不置口今羅歐與公皆先後逝矣唯直病廢苟延亨弼以直公宿與也委狀公行直誼不可辭嘗考公晚年為惠州學記其大畧曰今天下學者咸知談先王之道遵孔孟黜百家可謂盛矣而黌序之間三代之教未覩其科條之定於一而文辭之為藝者已失其故况於道徳之實乎惟教不出於黌序故縉紳先生時發明其學以待術黨之士而愽士諸生牽文義守成業不知究大道之原其稱有志者多為名髙而鮮實以譁世疑民甚者相訾詆矣又安望其道徳一而風俗同也哉其語學者之弊殊痛鬯盖嘗讀而傷曰若公之言豈獨其文章節行之都盛已哉惜也其背棄蚤世不得竟其所底於斯學也是故臨文為之三嘆尤不能已云謹狀衡廬精舎藏稿巻二十三
