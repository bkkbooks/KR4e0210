  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0210_WYG_007-1a, image: WYG1287/WYG1287-0284c.png}
body:
  text: 衡廬精舎藏稿卷七明胡直撰五言排律秋日自海智寺歸家即事高朋江寺合浹月始歸来老屋唯餘壁頽垣已作臺案書封積葉階水露新苔荒圃蒿萊遍柴門犬豕開餘橙霜後摘稀菜雨中裁乞菊纔題簡嘗茶一引杯自今幽事愜秋色共悠哉送李行人使琉球十韻漢節層霄下周官絶國通金書頒玉篋麟錦錫龍宫到海天為幛乗潮夜易曈吹鐃行碧落旌斾掛長虹兵謝陳稜武辭看陸賈雄鮫綃原入貢楛矢不求供天地同垂曜華夷並祝嵩少年臨異域别緒共飛蓬自是黿鼉國偏知造化功歸期麟閣畫名姓冠諸公送樵員外請告還蜀慢世縁多病為郎故守𤣥題書天竟許解纜雁先傳醉别燕山月思悲蜀國絃猿啼巫峽路楓落錦江船臛芋宜湔上誅茅記壘邊何心榮負弩詎說叩垂簾縱薄凌雲賦還来頌得賢萬通政承詔歸省十一韻澤國標英譽天官振藻詞初㕘鴛鷺侣已踐鳳凰池錯落連牛寳驃騰歴瑰竒含香三署首題柱九重知寵錫非常數雄飛自異資恭承丹鳳詔逺慰白雲思酒倩麻姑釀桃憐王母持遙知花漫爛應照舞逡迤康伯親能訓黄香孝可移征麾出紫甸祖席怨青驪佇挹黄花露台階見羽儀同姜廷善鄒繼甫王少潛胡祁禮遊西山宿碧雲香山二寺别後追作三十三韻化嶺連西極香山翊上京三闗増險阨九塞倚崢嶸脈度崑崙邇襟開遼海横飛神先鳥去挈侣遡泉行花密紅中騎蘿深緑外軿妙高凌帝釋巨麗眇仙瀛八水開功徳三車邁路程龍宫日月迥鷲苑殿堂閎亭俯多羅樹垣圍善見城硨磲分陛級瓔珞掛簷楹睥睨黄金屑罘罳赤玉瑛法輪迴象寳梵鐸震鯨聲鹿子游相亞獅王吼欲轟谷虛松韻逺園敞竹林瑩先帝留黄幄今皇駐綵旌龍神爭䕶蹕天女下彈筝蓄徳兼三昩觀風覽八紘詎異遊姑射應同問廣成慈雲浮濊潤慧日鎮常明自匪天遊豫那覘世太平賡歌前達蹟清賞此時情均有林中好曽無身外攖覺花悅淨性忍草愜幽貞古刹登雞足高僧得馬鳴勝招青雀鳥法度白猿精盛夏炎無暑中霄月正晴漱流不記處選洞更忘名靜窟同忉利寒崖過國清眼空南膳部身倚西長庚吾道原無外空門藉有醒天機自喪我真寂本無生回首塵寰客何心火宅爭相攜歸省闥還為語朝英中秋夜鄔使君邀登廣視堂後山翫月同舒少㕘管都閫佳節秋臨半英寮夜卜歡官堂登石壁客席挂林端皓月依人至中天任意看豈期法署窈坐攬衆山寛江漢浮杯杓軒裳集鳳鸞三星盞底出萬井膝邊攅香遞淮山桂情傾楚澤蘭醉題鸚鵡賦倒著鶡雞冠爽氣占元化清輝接廣寒露團光几案葉落間盤餐北海尊猶滿南樓興未闌那能羈世網耐可棄微官佳賞應難繼令人憶考槃五言絶句同羅日表下第歸至寳應日表議别舟先行敘别江岸酒樓花院移舟近筑歌落盞遲談深征袖濕非是怨當時王昭君五首有序自石季倫以後詠昭君者多矣唐宋人獨取白樂天二絶句以其語有眷國懐土之忱讀之良然最後讀郭代公詩乃知樂天有所祖郭詩云容顔日憔悴有甚畫圖時又云始知君惠重更遣畫蛾眉斯其藹然忠愛形言表矣今古蓋絶唱云友人歐陽曰守示余和白之作余因尾作五章非將以追步逸響聊亦各宣其所覩焉耳冰雪凋蟬鬢風沙涴綺裳愁容無復理不為學新粧二淚作冰霜結愁添塞草翻斷腸那假寐有寐是歸魂三自向金㣲去㡬度閱黄河妾心將妾淚㸃㸃逐東波四願作隨陽鳥秋風一度翔無恩承漢寵祇憶見君王五傳聞漢帝怒遣將靖邊氛安得從俘虜南隨霍冠軍嘲夢四絶儂别伊人去若個是相逢伊人别儂去若個道是儂二決絶復決絶不決當奈何愁令心血損望使鬢毛皤三夢有浮生相浮生即夢同浮生無用憶遮莫憶夢中四舊夢在何處新夢續相從舊空那可續新續總成空卧雪東林寺延望天池感賦五絶宿世天池客雲深世絶尋東舎匡仙館西家董奉林二一落何遲迴飈輪久莫馭悵望山頭雲徘徊山下路三層冰疊崔嵬凌凌不可度仙人代移文塵鞅吾當悟四寤寐香爐峯偃蹇東林寺朝飲虎溪水還共天池味五允矣當稅駕誅草傍巖竇入虎不亂羣巢鳥探其鷇度鑚天坡感懐四絶有序自桃花舖連陟峻嶺四十里至望州舖約十五里至蛇到退又上十五里至鬼見愁總之平地至此近六十里峻若登天行者未能不損神也甫下山僅十里上鑚天坡險如前然自古感詠者希豈其險絶不經人行者耶蛇鬼悲還怖梯天獨有人豈因徇斗禄臨危試此身二六合同一色二儀混莫分何處瞻親舎茫茫盡白雲三轅端凌太白馬首控青霄雅懐鸞鶴侣疑此得相邀四飛鳶看欲跕愁猿怯更唫前峯影天半那隔故園心白沙驛三絶雲封疑絶逕崖瀑似懸河回望經行處千峯攅若戈二峭壁前相識層巒後復盤坡陀開一掌古驛挂飛湍三披席雲同卧盤餐霧共傾等是烟霞境清夢繞南衡午日白沙驛阻漲感懐二首佳節深山度禽聲破寂寥坐愛溪蒲緑那須漬酒瓢二栁暗滄洲路山迴螺浦津羣兒環白髪應憶逺遊人予舎地名滄洲繞洲水名螺溪七言絶句庚戌之秋敵逼都城聞鴈有感二首鴻鴈翩翩向海邊来從北薊自燕然有無天上催飛將曽否山前縛左賢二我家匡山雲霞廬計程明日過山居倉皇顧影遙懐侣不次聞聲未勒書贈從妺壻張可大歸泰和二首髫齡獵藝擬飛纓紫鋏青貂謁帝京寳馬天邊来共羨春官門下振芳聲二南歸正逐鴈南翔暫度金陵返豫章即看孤帆匡嶽逺白雲遙指更迴腸題松贈李明府二絶翠巘臨流矗鏡中萬松倒挂碧巃嵸主人衣白辭山出應采龍形獻帝宫二虬飛夭矯樛枝勁蓋轉扶疎曲榦連但識棟嶐能柱國詎知霜雪㡬經年題况膳部扇景二絶平湖如練浸寒山耐可乗槎碧漢間㡬載釣鼇今已就絲綸那用羨漁竿二舟迴林麓行猶繫月出湖心碎却圓佳景當年遊不極更勞飛夢到江天桃源行四首斷隴横岡蒼霧屯停驂為問古桃源共言夜半傳飛檄正是當時花竹村二腐草樛枝架短橧傍床翁姥鬢鬙鬙笯雞甕粟輸租罄縱到漁郎莫款承三秦代衣冠何處誇蹊桃猶發晉時花若論今日衣完肘唯有桃川道士家四饑媪扶藜訴乞憐石壕悍吏索丁錢撞開籬落聲如豹道是官家入覲年過桃源洞再賦二首桃川道士路焚香指㸃秦人古洞傍引入高巖泉灑灑倒看石壑駕飛梁二北極宫前山似刀蘇黄渡口挂飛濤峯攅壁絶深難到應有秦人别種桃蒲圻道上搴帷忽覩疊嶂連霄酷類敝廬前山感憶仲弟共在天南水一鄉相看渺渺隔天長搴帷忽見青冥嶂指㸃還思喚二郎聞鴈憶兩舎弟翩翩好作一行飛孤影憐余鬢欲稀每憶高堂春酒熟夢中齊著老萊衣過澧懐屈大夫道可受兮不可傳虛以待之無為先江潭若肯從漁父芳芷幽蘭應自妍同蔡士備衝雨尋藥山古刹敘别二絶松韻還同說偈時峯頭誰度笑聲遲我来不乞山僧法莫擬重經李習之二官程苦被白雲牽載酒尋山敞别筵風雨莫憐分手地衡廬已締住山縁觀漲懐歐陽文朝自憐濟世本非才鞅掌長依楚水隈春到故園新漲滿昔時蘭槳共誰回䕫府官舎夢王尚涵三首故人天上跨龍媒旅夜翩然入夢来萬里愁聞䕫子國憐君遙度白鹽堆二少小交親白髪催每從南國望金臺故人不厭闗山隔清夢還期夜夜来三十二巫峯合沓新為雲為雨竟誰真青春卧穏啼猿夜不夢陽臺夢故人聴鶯懐鄒繼甫二絶鶯聲日日滿幽林宛轉長唫復短唫不見昔時同聴客啼鶯空作昔時音二旭日高槐啼欲斷午風深竹弄還長莫言絶域如天外猶有鶯聲似省廊度鐵索橋索橋宛似鵲填河詰曉凌風躡屩過始信當年蹈水客只憑忠信出洪波七天橋七天漭沆接虚無六合渾淪見一吾度後已知吾喪我不須象罔索𤣥珠天仙橋乘風飛度萬重雲親受皇人赤玉文為謝慇懃天上侣先天已向語前聞山頂晚霽八萬山河一掌寛四天應合作迴闌獨憐到此誰為耦坐共羲和倚日看下至梅子坡大雨非烟非霧爛銀光變作屯雲雨欲狂八部仙龍来頃刻共留汗漫九天翔䝉山丈從武陽驛放舟見憶春日同遊奉答二首平羌江上放孤舟想見峨眉影素秋正是謫仙吟自好那因相伴下渝洲二春日曽同聴棹謳青楊白舫共夷猶秋来依舊峨眉月獨羨綸巾照白鷗乙亥春日效長慶心身問答三首心問身心問身云何宴然春晨啼鳥尚高眠饒君安逸君知否不遂公車已一年身答心身答心云君莫誇君今住處我為家知君鈍拙家常累不遣家安總是差心復答身憐君傀儡不能收專為抽牽豈自由多少抽人隨線斷誰從未斷共君休衡廬精舎藏稿巻七
