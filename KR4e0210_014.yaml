body:
  text: 衡廬精舍藏稿卷十四明胡直撰論戒殺生論世儒語不殺生則必斥曰是慈氏之訓非聖人所為教是固未考於聖人之教而猥以習見論之也禮曰天子無故不殺牛諸侯無故不殺羊大夫無故不殺犬豕夫天子尊也諸侯大夫貴也然皆無故不得殺生夫無故不得殺則有故而殺者蓋無幾矣孟子曰見其生不忍見其死聞其聲不忍食其肉夫見生聞聲君子咸不食之則不出於見聞而食者蓋亦無幾矣聖人之教蓋如此世之儒者奈何以不殺歸慈氏而以樂殺歸聖人夫胡視慈氏之仁而視聖人之暴也聖人不得已有故而殺曰祭曰養曰賔三事而已然其養之有道其取之有時其用之有制獺未祭魚漁不登魚豺未祭獸獵不告狩鳩未化鷹不設罻羅草木未落不入山林昆蟲未蟄不以火田不麛不卵不殺胎不夭夭不覆巢不合圍不掩羣弋不射宿釣不以綱田不以禮曰暴天物聖人之愛惜生物何其周也聖人雖為祭而殺然在天子不過曰一元大武諸侯以下不過曰剛鬛柔毛曰肥腯翰音曰疏趾明視曰尹祭商祭其數可舉其義可陳而未嘗以四方之食供焉庶人之祭春韭以卵夏麥以魚秋黍以豚冬稻以鴈其數可舉其義可陳而未嘗有二修焉雖為養而殺然六十止食宿肉七十乃食二膳八十常珍又曰庶人耆老不徒食孟子亦曰七十非肉不飽則未至六七十者雖孝子不得以享其親雖為賔而殺然天子適諸侯諸侯乃膳以犢諸侯相朝灌用鬱鬯無籩豆之薦大夫聘禮以脯醢又曰大夫燕食有脯無膾有膾無脯士不二羮胾其在于詩其語嘉旨不過曰脾臄曰鱉鯉至矣其語富多不過曰四簋曰八簋極矣聖人何嘗教斯人日斷刲之以天子諸侯無故不殺之物乃取而饔飱焉一膳而斃數命一飲而殘百種舒鴈之外鱉鯉之餘乃至豹胎熊掌鹿胃麋膏麕麞虎兕以下誅逮犢麛殫山之族而醢脯之乃至鴈腎鴇奧梟胖雉腒鶖鵠爵鷃以下磋及卵胎殫林之族而熬淳之乃至鱣鮪鱘鱑黿鼉鯨鯢蝸螺蚌􅛔細極鱦鯫殫水之族而膾炙之秦漢儒者恣其叨餮附會記者則著之為教曰大者為軒小者為膾燔烈腫膷猶未饜也乃至薌之蓼之芥之蔥之桂之薑之梅之藙之椒之苽之粱之麥之極鼎爼之芳窮易牙之巧將使大羅氏之適藪澤見毳介之影則啞啞然笑憾不頓四極以為之網也大庖氏之入市肆覩魚肉之林則津津然涎憾不鼓龍泉而為之割也將使鳥愀然不安其林稚獸焦然不寧其穴其于天地之心太和之氣其不姦乎聖人之教寧有是乎甚矣世儒之愈於不仁之流也今夫人之一身膚甲為疏毛髮為最疏然俾人日殘膚甲而啖之雖悍夫不能日殘毛髮而啖之雖忍人不為聖人視喙動皆膚甲而草木毛髮也有一草一木不得其理聖人理之如理毛髮何至殘食膚甲而教人為堯舜之政三王之治能俾天地欣合隂陽和鬯胎生者不殰而卵生者不殈獸不狘鳥不獝魚鮪不淰四靈可以為畜故其稱曰鳥獸魚鱉咸若曰百獸率舞鳳凰來儀鳴呼此豈以殘殺能致之哉喙動之物莫不有性虎狼至毒而有父子螻蟻至微而有君臣鴻鴈之有兄弟雎鳩之有夫婦騶虞不履生蟲不踐生草烏鳥為其母反哺牛為人代耕犬為人居守此其為仁義何可勝數而人或不如斯物也反日殘而啖之可乎鹿斃于矢其麛反顧惻之射者未能不憮然也鶉將就食感主人以轉轂之詠聞者未能不動心也射鶉者引弓入林則一林之鳥皆鳴屠狗者帶索行市則一市之犬皆嘷彼物豈甘就死亡哉而世之悍夫忍人乃誣物為無知既日殘而啖之儒者又重佐其焰至誣為聖人之教甚矣世儒之愈於不仁之流也或曰子不聞伏羲氏之王也教民網罟以佃以漁王制月令季夏命漁師伐蛟而取鼉周禮天子之羞百二十品然則伏羲為非教而周之制豈未仁歟曰是不然當伏羲氏之王五穀未生鳥獸至多羽翮之健齒角之獰與人爭橧而居爭穴而處驁驁然相搏哆哆然相噬也生命之害大矣人不得已以其智勝而殺之茹其毛飲其血而害猶未損也伏羲氏則又不得已教以漁佃使善取之所以消人害而救􅑎腹也伏羲豈創教以殺生者乎禹驅蛇龍而放之菹湯德及禽魚周公驅虎豹犀象而逺之召公戒珍禽奇獸不貴異物吾聞之矣未聞聖王以伐蛟取鼉而為政者也禹菲飲食文王惟正之供日昃不遑暇食靈囿靈沼自麋鹿魚鱉之外靡有奇稱孔子不以四方之食供簿正吾聞之矣未聞聖王以百二十品為食者也月令周禮可盡信乎不然則周之生民其斃于供久矣漢武之射蛟于江唐憲之徴蚶于粵當時史氏非之廷臣諍之又何甚乎豫故曰秦漢儒者附會以愈於不仁之流者也曰若是則與慈氏何以别乎曰子以殺生為天地之心乎以不殺生為天地之心乎如以其不殺而已矣則吾知從天地之心以為仁可也又焉知聖人之與慈氏且夫聖人之教為養祭賔養之有道取之有時用之有制固未嘗無别也疑論夫事自聖人為之天下是之後世傳之苟吾求之有逆于心雖非之可也事自聖人為之天下是之後有聖人者作復從而稱道之苟吾求之有逆于心非之不可也疑而存之可也武王之伐紂非獨孟子稱之也孔子嘗稱之曰湯武革命順乎天而應乎人此所謂聖人為之天下是之後世又有聖人稱道之矣而蘇子獨非之謂武王不當以兵取紂又不當殺之是固蘇子求之有逆于心者也然而非之也亦過矣生民之初以其有欲而亂也然後相率就其仁能覆而智能宰者而君之焉非徒君之又從而服役之聽承其制令死生以之其極至不敢齒及路馬而蹙其芻若此者凡以寢亂而祈生也故曰惟天生民有欲無主乃亂克綏厥猷維后又曰天之立君以為民也孟子曰民為貴社稷次之君為輕此公天下之論也故以殷之天下觀天下則武王之殺紂為非以天下生民之命觀天下則武王之殺紂不為非也所謂順天而應人也蘇子非之過也豫固不敢以武王為非然因蘇子之論怵豫心而亦有逆焉蓋不能無疑者三事蘇子曰武王觀兵孟津而歸紂必改過否則殷人改立君武王之待殷亦若是已矣豫則不然豫以為成湯放桀夏之子孫無可托者故湯自為之若商尚有微箕二子者在箕子所陳洪範皇極之道逺紹執中使箕子有天下其錫福庶民豈下武王武王既誅紂釋箕子囚訪聞其道即尊而立之繼殷嗣可也非獨嗣殷也蓋箕子有敷錫庶民之道使為南面宜也武王素殷臣率天下尊之從而北面焉亦宜也縱使箕子不欲有天下則微子亦可王也武王豈必自為之乎武王必非如後世利天下者然而計不出此何也此豫所疑者一也昔者堯之將耄求可以生天下者唯舜當其時堯止一子二女而已自堯視之其捐天下甚易其捐二女俾從一夫此人情所難雖堯不免也堯不獨捐其天下又并捐二女不為情堯之欲得舜以生斯人者其為心若斯之篤且亟也武王既不能釋天下之歸已又不能強箕子以有天下則延留箕子置之中國天子師友而賔之大小臣工師事之又或分國而處之使中國之民咸被敷錫生人之澤則武王之心即堯心矣然終置之朝鮮異域使與中國眇然不相為何其左也此豫所疑者二也周之先世太王生太伯及仲雍王季斯時去武丁未逺也殷之澤方未艾天下未有紂之暴其天與人未厭殷也其時季厯雖有聖子如文王而太王臣道也惡得先有翦商之志太伯又惡用逆探其父之志遂逃荆蠻以避之謂其説誣則孔子所謂三讓天下又何以稱焉若太王果先有是志武王終取天下而家之則武王實成其先世篡竊之志即書所謂弋殷命者是己未為可也此豫所疑者三也豫嘗求之武王必不能釋天下之歸已箕子或果有不可強者存焉太伯之逃抑或以季厯父子足以當國而故讓之異日武王有天下是即以天下讓也豈必先世先有翦商之志哉噫斯言也未有豫證也今安得復有孔子孟子語豫以其故則無復以容豫喙作疑論名論上名何所昉乎自有真宰斯有天地有天地斯有人有人斯有性性立真宰竅矣竅乃有道道乃有物物乃有分數分數乃有稱謂蒼然穹而覆也吾無以謂之名曰天坱然塊而載也吾無以謂之名曰地若此者生於分之無以謂而強以謂之者也其凡為分名者類是也而分之實不在是也物有至寡吾無以謂也名曰一物有至多吾無以謂之名曰兆若此者生于數之無以謂而強以謂之者也其凡為數名者類是也而數之實不在是也辟之上古結繩以為治謂治在繩不可也南夷刻木以為信謂信在木不可也海外有國舉物不能為辭而以手示其形形果在手乎又有國焉以草木紀嵗以鳥獸紀官嵗與官果在草木鳥獸乎向使古之制名者名天以謂地名地以謂天奚不可也名兆以謂一名一以謂兆奚不可也又使之名鵠為黑名烏為白名鳬為長名鶴為短亦奚不可也然則人之有姓名其亦無以謂之而強以謂之者與嘗試觀之名何為乎號于口者聲音也書于簡者點畫也以視之斯人果一耶抑非耶是故古今名相如者三矣固不皆相如也名無忌者亦三矣固不皆無忌也而世之君子譽則喜毁則怒以為是非存焉貴則悅賤則悲以為榮辱存焉不知名固無名而何是非榮辱之足姦乎乃若搢紳之彥負介之子鉛槧之士閭巷之俠以逮一行一藝咸欲貌榮名施于無既三家之市三尺童子初無名師莫不喜名子不以情孝臣不以情忠兄弟不以情友朋徒不以情信藩垣起於屬毛而戈矛藏於投膠智競乎早力果乎誸而目則瞿瞿而身則捲捲而口含瓦礫而心懷詛盟焦形神捐死生以趨之則名之流禍深也吾知生無以救枵腹而死無以潤腐骼悲夫名論下甚哉世之以名為實以實為虛也是以老莊氏厭薄之譏曰名者實之賔曰德蕩于名其言足醒也乃老莊氏遂欲絶仁義棄禮樂羶視堯舜而駢拇曽史將并其實而廢之則失之矣吾以為君子非不名也貴實不貴名可也蓋聞之孟子孩提知愛及長知敬彼孩提雖堯舜之無欣也雖桀跖之無戚也豈故慮而知學而能哉其天性固然也今人乍見孺子入井必有怵惕惻隱方其乍見孺子固不知吾之誰何而吾亦不知孺子之誰何也豈暇惡其聲且納交要譽哉其天性固然也天性者天下之至實者也聖人為教唯欲天下咸得其天性返諸實而已非以名也故孔子惡夫似是孟子斥夫假仁其旨嚴矣而宋之范文正則曰聖人以名為教湯解網文王葬枯骨太公直鈎夷齊餓死仲尼聘七十國以行道無不涉乎名若此則數聖人咸偽焉耳又何淺之覿聖人也文正又謂忠臣烈士因名而勸則亦非矣夫忠臣烈士雖或出喜名亦天性勝也否則焉望其能之死不回也夫子疾沒世而名不稱非疾無名也疾名不稱實也四十五十而無聞非謂無聞問也謂未聞道也為已為人是聞非達夫子之戒名也暸然矣若夫聖人敦奬名教樹之風聲其曰積善成名令聞廣譽乃不得已以鼓下士亦使之因名求性返諸實而已咸非以名也是故名者所以取人而非以自取也所以用人而非以自用也不然是聖人重導為偽也非立教本指矣雖然聖如周孔亦不能免毁以全名况望之人人乎聖人之蒙毁辟之飽食者腹猶果然而人詆曰是區區枵腹者則未嘗為有無也此聖人之常也然今之學者又欲冒毁以直造于性命此則自枵其腹以動天下之飢又從為之辭斯益以逺矣名與實誠與偽王伯治亂之所從繫也吾膠縢于斯久矣今若粗有辨故著之論才論上夫聖人以道濟天下而天下之能事畢矣然而夫子復有慨于才難何哉曰辟之車然道為之軸而才為之輪善治車者雖有堅好之軸而棄輪則莫為之運是故才者其所以運之者也才乘於氣氣有通塞強弱故才有敏鈍長短巧拙精粗之不齊夫惟才之不齊故才為難而大才為尤難宋荆氏之楸八圍自謂能蔭及之江介見豫章焉其枝圍十畝其蔭芘千乘則縮然羞包山之湖自謂廣大及出東海則不啻十洲三島雖百物幽怪靡不有焉則恍然失此大小之辨也甚哉大才之不可多覯然而求合其正性不詭于道者則又難矣是故有聖人之才有聖人之道以聖人之才合聖人之道斯大之大也雖然大之中又有間焉何以明之昔堯至大也堯讓天下於數君子者屢矣數君子者卒不以自與而必於與舜舜之後又必與禹者何也彼遇舜之才尤大禹之才次大故非舜不足配堯非禹不足望舜而非舜禹亦不足以用數君子之才者也雖然此三聖人與數君子者其才固不一而道無不一故其一時上下莫不相通以道相通以道則非獨此數君子者能以道而御其才即其他敏鈍長短巧拙精粗之徒咸能共成其大而協贊唐虞之盛者亦良有此道耳自禹與數君子之後語君若湯與文武語臣若伊周孔子皆有聖人之才與道者也孔子雖未試而其才舜禹儔也自湯與文武伊周之後語君若漢髙漢武唐太宗所謂有聖人之才而未聞道者也語臣若孟子所謂有聖人之才與道而其才阿衡儔也孟子之後不可謂無人然其他敏鈍長短之徒彌有不齊而其道彌逺矣雖然使有近聖人之才學聖人之道或君或相興於其上亦必有以通乎其下而所謂共成其大者尤有在焉夫惡得千百載見之猶旦暮也此誠才之難也才論下聖人以道通乎其下者非他道也仁是也夫濟天下莫病乎無才尤莫病乎有才而不出于仁嘗試以人臣論人臣有才而不出於仁則不得不趨而為術其次則以氣其下以詐張子房始終為韓非不忠也而卒以術勝彼非好術勝道不勝術也賈生之䇿度越漢廷非不達也而卒以氣勝彼非好氣勝道不勝氣也至於詐則小為𢎞湯大為莽操禍至不可言乃若儒家者流窺竊古帝王之道依倣其近似以就事功又多以意行則子産叔向與諸葛孔明之流是也今夫術可以應變而不可以致理氣可以發謀而不可以成務若可以致理成務而善能持世者則莫如意然所謂共成其大以臻唐虞之盛彼卒未逮也何則彼固作於意而未始怵于仁焉故也譬之水焉水能潤能溉能漫能瀰其極至放海稽天而其源則始於山下之泉仁者才之泉源也不得其源而欲其放海稽天不可得也今夫人一也唯其生則膚甲怵于心腑其弗生則肝膽同於楚越此仁不仁之辨也聖人之心無弗生也則無弗怵也故其稱曰思天下有飢者由已飢之有溺者由已溺之又曰一夫不獲時豫之辜今夫人當飢溺臯盤怵于其躬則雖鈍者靡有不敏怯者靡有不勇短者靡有不長拙者靡有不工狹者靡有不廣彼其措畫而營救之者曽不知內交誰何也要譽誰何也惡聲誰何也而才不才非論矣聖人之怵而生者亦若此聖人豈復作而致其意哉夫意與仁奚别也意者欣於名義因于往迹生夫人自外入者也仁者觸於不忍發於一體生夫已自內出者也故曰大人耐以天下為一家中國為一人非意之也夫唯非意則存神過化上下與天地同流然則才者聖人之神用者也而術與氣不足言矣論文二篇答瞿睿夫古今論文若揚子雲劉協范曄顔之推歐陽永叔黃魯直等無慮數十家然豫獨喜陸士衡韓退之殷璠蘇子瞻四子者語最確士衡文賦詳矣然獨曰石縕玉而山輝水懷珠而川媚則知文當求之色澤之表韓退之曰氣水也言浮物也水大則物之浮者亦大又曰仁義之人其言藹如則文當先養氣而仁義實致養之原以是則小慚蒙謂小好大慚蒙謂大好小稱意而小怪大稱意而大怪果惡足以惑軌轍哉殷生曰文有神來氣來情來則知摹畫於步驟者神躓雕刻於體句者氣局組綴於藻麗者情涸蘇子曰吾文如萬斛源泉隨物賦形嘗行於不得不行止於不得不止夫行止由已者文之至難者也而非絶世好者莫能與近世唐應德有喉中轉氣管中轉聲之喻凡皆可謂善語文矣而未逮文之從生豫少不自揆見當時語文唯推先子長自謂當稅駕子長氏之廷長大涉道之藩然後知士非不學文之弊而不知己重之可憂嘗致書知己者曰士不知己重則無所為易時而為時所易無可為命世而為時所命逺捐萬世之猷而近貪一時之利內薄天壤之身而外厚蠅蝸之名苟患失之無所不至故抒為文辭皆唯奉習聞以應求遵成語以塞問童誦於家長獻於國白首身退問之而不知其指間有騖古之士則亦不過摽掠其標格而追逐其聲響寸而寸之不敢以語尺尺而尺之不敢以語丈甚則借笑為欣雖百娛笑不足以為樂盜哭為戚雖百號哭不足為悲以若所為即令字字語語同於子長其無所用之明矣故嘗以為今之時文辟鏤氷今之古文辟剪綵鏤氷者壽時剪綵者壽嵗二者有間其不足行逺均矣而士猶孶孶頊頊相矜相嚴以終其世愚竊笑而恥之嗟夫士之知道亦難矣道者非善其一身已也繇一家以逮天地羣物皆吾大一身也自大一身言則以家族準心腹以民庶準四體以天地準頭足羣物準毛甲故家族不得其任則殘心腹民庶不得其任則殘四體天地不得其任則殘頭足羣物不得其任則殘毛甲故君子和其家族使睦理其民庶使平相其天地使寧適其羣物使若皆所以調燮其身俾得其任而不殘也夫士以一身任羣物天地之大則以已易時時不得而易之以已命世世不得而命之如此則士之於已重矣士有重於此則雖山彼金璧莫能滑也雖立取卿孤莫能誘也雖刀鑊臨之志不可易也雖有璇閨綺閣姣顔膩理仙仙之舞靡靡之音極都麗之觀雖有汧渭之駿渥窪之龍躪飛兔而殪豝兕窮騰騖之樂曽不足引其盼回其聰也雖使近而一家逺而天下咸諾諾焉近而一家逺而天下咸諤諤焉曷足以易其作止也又尚何利祿為有無哉故士得其時則發其和家族理民庶相天地通羣物之道於上而謨訓誥戒狀疏表劄之文著不得其時則發其和家族理民庶相天地通羣物之道於下而論撰記述褒頌譏刺之文著蓋皆輸其成算而出其素有稽諸口實而申其事情當時用則治不用則亂後世循則成不循則壞辟之雷霆之鳴于春雖欲不鳴不可得也星辰之明于夜雖欲不明不可得也儉嵗之膏粱寒年之縑帛雖欲不適于用不可得也故六經語孟之語是非也若探其根而善敗之應也若見其果至若子長氏之為言也雖未能望孔孟之藩然猶發其中心之誠然者故欲為子長要亦有本末非今之士苟然茫然盜人哭笑以為悲樂者之能之也豫當時著此書語涉冗今櫽括大略讀者可以知文之從生矣異時豫又為董督府奏疏序其略曰有為進西崑之璧貢南海之珠者焉有為漕江東之粳運關西之粟者焉二者其孰良于用乎曰子不聞昔之人有握珠璧不得食而斃者未聞有積榖粟不得珠璧而飢者也當燕豫則庸璫嬖媛貴家紈袴之子寶珠與璧何啻千金一逮窘急則珠璧豈可與榖粟同年語哉有用之與無用不待較而明矣君子之獻言于君也亦然著封禪之書申典引之論非不馳騁天下之巨麗絢然如西崑之璧南海之珠然使人皆循其詞以陳事于上則上必不能曉辨以有行皆循其詞以諭事于下則下必不能曉辨以有承雖自享以千金之價其無救於生人之枵腹久矣則又將焉用之豫是書又似中近時顓騖辭勝者之弊作論文上篇古今文不一體學文者亦不能以一體局聖人之文大都在道其次在法法所以維道也翺翔道法因物成體者非獨時習亦正變者之自然也今夫文之有正變猶兵家之有正竒織家之有經緯雖六經不能違也變之中不一體猶奇之中不一機緯之中不一色此雖六經亦不能違也是故易有易之體而玩易者若不與書謀書有書之體而讀書者若不與詩謀詩有詩之體而誦詩者若不與三禮春秋謀彼其不相謀者非意也自然而然者變也自非有大觀若孔子者通易詩書禮春秋為一致則局易者必詆書局書者必詆詩局詩者必詆三禮春秋匪獨相詆且交相絀矣是故必有孔子然後知所以盡變孔子非好變也其道法通也繇是推之苟有近于道法則易之變為玄為老為南華沖虛參同為後之論説傳注不一體詩之變為成相為離騷為琴操樂府為後之賦頌五七言古近不一體書與春秋之變為左氏公榖為子長史記為漢紀厯代史列國志為後之書奏記述碑銘傳贊不一體周禮儀禮王制月令變為白虎通獨斷通典為後之通考諸書不一體學庸孟氏變為荀韓以下諸子為漢唐宋之論議不一體論語變為法言中説為後之語録不一體假令有孔子者作當必有所擇不有所局又繇是推之漢為漢體唐為唐體宋為宋體而宋尤道法最近者也則亦豈當為孔子局且詆哉然則孔子奚詆詆在道法離焉而已故道法離雖鄭衛出于春秋詞非不工也而聖人必刪而絀之道法合雖秦誓出於戎狄詞非獨工也聖人反存之列六經之中援之綴大學之末若是則聖人所為文其大槩可知己嘗試譬之今天下九州所共聞者唯華音而擅諳華音唯優伶然優伶之言不貴于時者非其音不純華也舜東夷人文王西夷人舜與文王豈必脫然於諸馮岐周之音哉而其言貴千萬世者非其音純華也然則孔子所詆者亦猶時之不取優伶焉已矣孔子未嘗詆文之變體為也今天下文盛矣然語者惟祖秦漢而忘六經推子長而薄孔孟韓蘇之文實孔孟出也則尤今世之所深詆自北郡倣效子長不欲一離黍米而後之相師成風亦唯知榮一家之體崇一代之辭引篇挈紙獨視有秦漢子長咳唾餘澌則相詫髙之假令誠有孔子之文而體涉六經辭近韓蘇則曰此别立門户甚則為鄭衛赤幟優伶左袒而駘宕後生大半贅道法而斥棄之然則塗天下耳目浸入六朝靡有旭旦非斯人之徒而誰歟嗟嗟豫將不暇憂文而憂斯世豫少雖喜文後自審才詘竟自捨置然於古今作者微有辨夫道法備于身不得已而文之不以一體局此上也孟氏以上是也是謂聖賢依倣道法而籠挫于百家囊括於羣體者中也莊荀屈子子長揚雄韓蘇以下諸子是也是謂文人贅視道法唯摹畫于步驟雕刻于體句組綴于藻豔者下也相如鄒枚曹劉潘陸顔謝以下及近世詞家是也是謂詞人然近世非獨局一體其實襲也豫嘗作喬氏文序針之其略曰古之文衆矣司馬子長與莊荀孫韓老左凡六七家咸未嘗相襲等而上之讀彖象者若未知有典謨讀雅頌者若未知有訓誥讀繫辭者若未知有語孟何則文者道法之所出不得而相襲故也辟之為居棟桷肖也然各一其材今曰阿房靈光材最古乃截古以益今而曰規矩在焉可乎今夫規矩特一物自巧匠運之為規而員出焉橫之為矩而方出焉故規矩者方員之母也而方員豈規矩哉是故道法者聖人之規矩也道法備而文言之以詔後世此規矩出方員之迹也方員之迹無定體故為典謨為訓誥為雅頌不可窮極執之則窒子長之豪健瓌瑋則亦方員之迹見於一體而已何乃踆踆焉執子長以為規矩而襲用之遂至廢百家眇六經是焉知規矩是序蓋與前意相出入乃豫又作羅文恭集序曰文者聖人不得已而用之是故文非聖人不能柄自孟氏沒道術大裂文王孔子之文湮閼不著百氏雜出竄竊工巧而文柄遂旁落於能言者之家近代儒者所著易通訂頑答定性序易傳彼能言者無容喙矣降是則不免於萎薾嚄唶而近俚彼傑然好言者且唾之矣惡能使繹而行之何者道術不一而枝末之析太繁也讀豫是序則知文之弊其責又有歸矣豫嚮者曰不暇憂文而憂世至是則不暇憂世且憂道矣噫安得有主宰道法正本達末以柄斯文則世在其中作論文下篇序曰昔豫督楚學獲二奇雋其一黃梅瞿子九思其一麻城周子𢎞禴知二子皆當以文名世豫嘗挈瞿子遊西粵旦夜問古文法豫慚非作者又懼奪之業舉未有復也今别四年瞿子巳與計偕名郁郁燀上下矣方千里走使訊豫山中故勉撰二篇復瞿子嗟嗟豫所屬瞿子文云乎哉文云乎哉衡廬精舍藏稿卷十四
