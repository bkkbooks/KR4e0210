body:
  text: 衡廬精舍藏稿卷二十八明胡直撰雜著言末上胡子間居二三子從遊孟山之陽咏歌螺水之濱返而休於長洲之館魚魚于于翼翼嶷嶷沛焉若有喻其所之已而避席請曰學如是而已矣蔑弗一也道如是而已矣蔑弗明也而世儒之爭之也有弗一弗明何哉意者言弗可已與胡子仰屋而盱癢然不能出語崖然嘆曰言何可恃也言何可恃也弟子曰道之弗明學之弗一不言已諸胡子曰道之弗明學之弗一則珍見者之為祟也珍見如雲健言如雨以珍見出健言而天下束書始嶪嶪乎若嶽汸汸乎若海矣夫道何病于見哉昔者孔子登東山而小魯登泰山而小天下魯與天下非故小也孔子見之綦全故也然孔子猶儉然自命曰吾有知乎哉無知也又曰豫欲無言孔子寧知其為見乎其不為見乎而烏為乎珍寧知其可言乎其不可言乎而烏為乎健雖然孔子固嘗循循為誘終日為語周易為之十翼春秋為之筆削未能一朝而膠口廢言也然而孔子言之几席非為近也而逺如天言之四時非為逺也而近如帶言之氄毛非為小也而大莫載言之昆侖非為大也而小莫入言之膚革非為淺也而幽者闡言之神髓非為深也而顯者藏言之瓦礫非為粗也而幾微著言之金玉非為精也而庸常見言之九乾上也而無不下言之九淵下也而無不上言之一二簡也而無不繁言之億兆繁也而無不簡言之三千三百外也而無不內言之無聲無臭內也而無不外平也如衡變也如權方也如律員也如蓍眉睫也而長上古旦夕也而挹千萬世孔子豈巧為持乎孔子亦亶得其全而已矣今夫窶人之子見一金一綺則唐然矜闤闠之士見一溪一壑則爽然詠唯夫宅通都而擁瓊庫戶莽蒼而臨巨浸則非不見非不不見非不言非不不言此全不全之分也古之聖人惟全故中中而之言焉則不隅唯全故悉悉而之言焉則不巵唯全故實實而之言焉則不裂唯全故化化而之言焉則不閼非獨聖人不自為隅為巵為裂為閼雖後之誦之者將腹臆而似之曰是隅耶巵耶裂耶閼耶亦不得而似之也易繫曰夫易廣矣大矣以言乎逺則不禦以言乎邇則靜而正以言乎天地之間備矣此明聖人之為言也而教無窮也世之為言則不然世之語近小淺粗繁下而外焉則之近小淺粗繁下而外焉健語逺大深精簡上而內焉則之逺大深精簡上而內焉健健於此則不得不詆於彼當其健雖君之王之不啻也當其詆雖仇之虜之不啻也彼惡覩斯道之全哉傳曰仁者見之謂之仁知者見之謂之知仁知非不韙也見仁則病知而亦以病仁見知則病仁而亦以病知蓋見之為祟久矣故珍見者其頴如錐頴脫未有不割者也其烈如火烈熖未有弗燎者也見珍而言健未有不割燎道真者也孟子曰所惡執一者為其賊道也舉一而廢百也此之謂也言末下何以明其然耶曰老氏曰三十輻共一轂當其無有車之用夫輻轂與無之兼為用也明矣唯老氏見無不見有夫斯以言無焉健彼固不知健無之賊于有也而賊有亦以病無也荀氏曰鉤木必待櫽括而後直鈍金必待礱礪而後利人之性惡必待師法而後正夫木之待櫽括金之待礱礪人之待師法皆其性之本具而後能也假令木之性若金金之性若木人之性若金木又惡能櫽括而直礱礪而利師法而正也哉人性之能為善也明矣荀氏見惡不見善夫斯以言惡焉健彼固不知健惡之賊於善也而賊善益以翊惡也楊朱曰人人不損一毛不利天下則天下治矣夫楊朱既不能損一毛利天下則又孰肯出身令天下不損不利哉為我之不足治天下也明矣楊朱見我不見人夫斯以言我焉健彼固不知健我之賊於人也而賊人亦以病我也墨氏曰仁者兼相愛交相利又曰勸之以賞譽威之以刑罰我以為人之兼相愛交相利猶火之炎上水之就下不可防止于天下夫賞罰並行則既不得以兼相愛矣况欲愛秦人之兄猶已之兄愛秦人之父猶已之父則雖有賞罰亦莫之能強矣兼愛之不足治天下也明矣墨氏唯見人不見我夫斯以言人焉而健彼固不知健人之賊於我也而賊我亦以病人也此四家者健而雄者也彼其隅耶巵耶裂耶閼耶彼弗皇省也嘗試辟之天地無弗全矣而見者自異天有高虛地有廣漠彼見而健言之則老氏之家似也天有冥晦地有險塞彼見而健言之則荀氏之家似也天之四時異運地之五方殊風彼各見而各健言之則楊墨之家似之四家者之後乃又有泥洹家彼泥洹者之為教也寥然見諸天地無物之先逖然遊乎天地有物之表故其為言滋健而世儒之病之也滋厲匪徒病之又且高壁深塹以拒之長鋋短矛以攻之矻矻無遺力天下莫不曉然白也雖然世猶有見者焉而天下未嘗曉然白也是則可憂也彼其為言曰日月星辰風雨露雷天之實盡是矣山川土石水火木金地之實盡是矣鰓鰓焉憑藉其實而健言之則世儒之家似也夫世儒豈為非哉亦唯珍而健之則與彼數家者之執一而賊道亦均而已其為隅耶巵耶裂耶閼耶尤弗皇省也今夫天下健其不可見以詆其可見則信者千一健其可見以詆其不可見則信者十九世儒者曰是器數是文章則帝王之鴻猷聖神之懿軌在焉是猶天之日月星辰地之山川土石而人之實盡是矣則天下孰不拱而信曰允哉言乎世儒又曰若凡古今士所稱心性原本皆窽言無實用此其流必為泥洹氏勿可以聼則天下又孰不拱而信曰允哉言乎非獨拱信之亦將高壘濬塹以為拒長鋋短戈以為攻有若驅泥洹氏不肯遺餘力豈皆甘器數文章而毒心性哉誠以器數文章可見而心性不可見也辟之指一江一淮示人曰此水之至也人莫不信談岷山之泉求桐柏之源曰是江淮之出也人反不信則見不見之異也然則夫人烏求其曉然白之日也世乃不知岷山泉涸桐柏源竭則焉有江淮是故不見固見之從生也然而多見先焉則真見蔀不聞固聞之從生也然而多聞先焉則真聞聵此世所為殱其根以戕其生鑿其真以乖其全雖天下偉夫纎人咸薨薨填填安也久矣有不然者厲而相彈而子欲奮舌軒楮並馳而明之雖孔孟生今時懼不能克而况其下乎豫故曰言不可恃也雖然吾不可已於二三子昔者子思之語天未嘗不取日月星辰然必曰維天之命於穆不已天之所以為天其語聖人未嘗不取器數文章然必曰於乎不顯文王之德之純文之所以為文蓋先其夲也此子思所為全也今之君子恂知文之所以為文夫然後能全全能全全則不以見見不以言言斯可與有言矣理問上弟子問曰先生之不恃言也亶哉雖然今之學術棼拏膠轕是非異同其爭若訟其拒若攻為理內外為辨各工弟子蓋聞之矣自漢儒來咸言物理至宋程叔子則訂之曰在物為理紫陽夫子推曰天下之物莫不有理窮理者窮究物之當然與其所以然之故則物格知至矣此非自儒者詩有之曰天生蒸民有物有則如有耳目則有聰明之德有父子則有慈孝之德未有物而無理者也則理之在物所從來逺矣乃近代儒者欲挽之入內曰理不外心而子故張之甚是不將絀古而溺今也哉吾懼後之覆議今也胡子曰嗟矣乎此非豫所謂難言者乎夫以千百載之惑而僅暴于近代之一言宜其緘縢而不可解聞聲而閧其非也言何用益聽雖然子安知古之為今而今之非古哉子不聞昔人有先世之廬稱穹廣焉不幸罹罪偕其妻孥幽于犴狴厥子長育圓扉罕覩天日一日釋罪復其故居厥子猶以圓扉為家日促母以歸母曰是乃家也子終恇惑己而其父證之然後肯信又有富人子自童亡外既長行乞過家而不識也其父識之引子復家授以帑藏退不敢當已而其祖證之然後肯從若此者彼豈不欲有先世之室廬慈父之帑藏哉彼固無以奪習見之先入也况夫理者非可以形體求而證佐定也又烏能回是非于先入哉故難言也雖然于今誠以為理在外與弟子曰吾嘗求之矣將為內乎則天髙地下萬物散殊雖三尺童知其在物也強為內不可也將為外乎則維皇降𠂻若有恆性雖三尺童知其在心也強為外亦不可也若是則果無內外與曰理豈有內外哉雖然子之信外非信理也而信程叔子之一言豫姑以叔子一言明之昔者先府君嘗讀叔子之言乃著論駁之曰既曰在物為理而又曰處物為義謂義非理也可乎既曰在物為理而又曰性即理也謂性為在物可乎是二語者可謂明矣叔子之非寧待攻而破哉惜先府君之論散佚不全而世之聽之亦猶圓扉行乞之子恇惑疑懼不肯自信非借證其父祖終必不信也請舉其證今夫理之説曷始乎詩曰我疆我理釋之者曰理定其溝塗也謂人定之也非謂溝塗自定也然則謂理在溝塗可乎書曰燮理隂陽釋之者曰燮理和調之也謂人調之也非謂隂陽之自調也然則謂理在隂陽可乎夫子贊易曰黃中通理言至正至中而理通焉未聞中正之在物也曰易簡而天下之理得言易知簡能而理得焉未聞知能之在物也最後曰和順於道德而理于義其下文即曰窮理盡性以至于命蓋言聖人作易咸理于吾性之義故窮理者窮斯盡性者盡斯以逮夫致命者咸繇之矣吾未聞理不在義而在物也亦未聞窮理之理非理于義之理也故夫子又明言之曰聖人之作易將以順性命之理嗟乎吾夫子固明言性命之理而世必以為在物何哉易書詩與吾孔子之語理若此是吾不得已借證于父祖之説也世既不自信又捨父祖而不信則誠莫之何焉已矣而又惡用言為弟子曰弟子得夫子性命之理一言己氷解十五矣不然是叛父絀祖而猥從衆子之謬也然詩所言有物有則何哉曰今子也以耳目父子語物以聰明慈孝語則近矣然謂聰明慈孝果在于物乎抑不在物乎世固有病風狂者矣其耳目父子人也曷為其不聰明慈孝也哉子也寧知聰明慈孝之則不則于耳目父子而則于人心也故謂則能則乎物可也謂則在物焉不可也是以詩人稱之曰秉彛又曰懿德審如世儒之説則秉彛懿德皆當為在物而不在人矣抑與書所稱降𠂻恆性記所稱生而靜孟子所言根心固有非由外鑠我者一何其盡戾也彼世儒者信子所謂叛父絀祖而不知反顧者耶而世之徒猶狂奔倒馳唯懼叛之不先絀之不至若怒濤然鼓晝夜而掀河海終不知風之自也悲哉故難言也理問下曰理之不在物弟子已氷解十七矣蓋嘗繇聰明孝慈推之則人之統為五常率為五倫發為四端修為四德敷為五教為五事為三物四術為五禮六樂其極為九德其事六府三事九疇九經其著為百行為萬善其放之凖四海施之天下後世無朝夕堯舜之禪湯武之伐周公之制作孔子之刪述為之裁成輔相為之範圍曲成斷天下之疑定天下之業成天下之亹亹贊天地之化育鮮不自人心出之是則內者乃未嘗不外也謂之無內外誠然也然而天之髙而覆也地之厚而載也日月之明而照也星辰之列而燦也雨露之潤雷風之薄四海之廣六合之大歲序之行而不紊鬼神之幽而不遺河海之流而不息山嶽之峙而不毁鳥獸草木之繁育不一其性火之炎水之潤木之文石之脈金之精玉之光是孰理之哉謂皆出人心可乎螻蟻之君臣虎狼之父子鴻鴈之昆弟雎鳩之夫婦騶之仁鵲之智烏之孝神羊之正犬馬之義麂鹿之慈獺之祭魚豺之祭獸玄鶴之珠黃雀之環象不拜叛而秦吉了之不願為夷是孰理之哉謂皆出人心可乎夫人之百骸九竅五臟三關莫不有經而醫之治也寒燥溫涼君臣制使投之各循其軌又孰理之哉謂皆出人心可乎是則弟子未之徹也子其謂何胡子於是復仰屋拊膺嘆曰是奚獨子一人未徹哉蓋昔者孔門語理咸不逺人而語之也故無內外今世之語理逺人而語之也故有外而已矣子惡得徹子不聞孟子之闢告子曰且謂長者義乎長之者義乎知義則知理矣子又不聞子思上下察之旨乎今夫鳶飛戾天自人視之鳶在上也而不知斯人與知與能者之上察也魚躍于淵自人視之魚在下也而不知斯人與知與能者之下察也大哉察乎其諸人心神理之昭誠之不可掩夫是故察之外無理也子知之乎曰聞諸先儒之言謂道之察也而未屬人也曰嗟乎此所謂逺人為道者也夫子思本以費隱言君子之道而世儒必欲推費隱於君子之外何其與孔門千百徑庭哉此正數千載之惑母父語之而不信者而奚子尤子見皎日乎吾請為子譬之方其未有皎日也黝墨荒忽未始有天地萬物也已而皎日照之則天地萬物列矣然是皎日也其體在天而其光與氣散於天地萬物之間人之執其光挹其氣者一盤盂一皎日也一甕盎一皎日也一淵谷一皎日也一江漢一河海有萬皎日也今如有夸父焉逐日於谷彼亦惡知皎日之體不在是也子知皎日之體之所在則知理之所繇來矣是故天者吾心為之高而覆也地者吾心為之厚而載也日月吾心為之明而照也星辰吾心為之列而燦也雨露者吾心之潤雷風者吾心之薄四時者吾心之行鬼神者吾心之幽者也江河山嶽鳥獸草木之流峙繁植也火炎水潤木文石脈疇非吾心也螻蟻虎狼鴻鴈雎鳩疇非吾心也一身而異竅百物而殊用疇非吾心也是故皎日者所以造天地萬物者也吾心者所以造日月與天地萬物者也其惟察乎匪是則亦黝墨荒忽而日月天地萬物熄矣日月天地萬物熄又惡覩夫所謂理哉豫故曰察之外無理也曰若是則子之言理亦猶夫燮理疆理之謂理即孟子長之者之謂義也所謂不逺人而語之也果非外亦非內也然則天地之髙厚日月之照臨萬物之各有區别卒不為理乎曰子之見皎日方其在盤盂甕盎池沼淵谷江漢河海雖指之曰是盤盂甕盎池沼淵谷江漢河海之日何不可也然而莫非在天之日之所括也天地之高厚日月之照臨萬物之區别雖指之曰是天地日月萬物之理亦何不可也然而莫非吾心之理之所察也故子思又曰君子之道造端乎夫婦及其至也察乎天地孟子承子思者也則又直指之曰萬物皆備於我程伯子得孟子於千載之後者也則又直指之曰仁者以天地萬物為一體莫非己也又曰天地之用皆我之用噫亦昄昄乎矣乃世之末儒棄母父而不信而猥從衆子之言則誠莫之何焉已矣曰理之不外心弟子已氷解十九矣雖然猶有請焉易言乾道變化詩言維天之命上天之載子思言天命之性孔子繫易曰立天之道立地之道曰天地之道貞觀日月之道貞明子思又曰天地之道可一言而盡凡皆自天地言之未可以人心槩也曰善乎而問之也夫君子之語道有語乎其所自者有語乎其所有者古之人恆語所自以明所有今之人則執所自以疑所有非徒疑之又從而仇之今夫先世之室廬慈父之帑藏方其在先世慈父則謂之父祖之物及其自人子承之則疇非子物也於此有人焉對人子而談曰此乃若先世之室廬慈父之帑藏若不得以有也則人子必艴然怒夫人子之怒非無故也誠以父祖之物自已承之即己物也而必執父祖而拒之謂人子不得有則將置人子何地人子惡得不艴然怒也故語父祖之所自以明人子之所有則可執父祖之所自以疑人子之非有則必不可乃若繫辭所言天地日月之道子思所言天地之道皆自父祖之物言也而亦莫非子物也推而語之則曰天地之道散而語之則曰萬物之道合而語之則疇能外吾心盤盂甕盎池沼淵谷江漢河海之皎日已詔之矣子則曷疑且也先天地長上古而不為老後天地毁萬物而不為敝者詎外是哉詎外是哉子未可語此也曰是未敢語然弟子知天下無心外物也况理乎曰若是則子能信其父祖進而自信幾夫六錮弟子曰旦旦乎先生之語理弟子已氷化矣然而世儒之訓熟爛乎耳目徽纆乎腑臟譬諸層崖隂黯非太陽為之曲照莫能覩也溝澮積淖非霖雨為之終日莫能滌也蓋二三子之錮于中者有六請竟宣之以瘳承學胡子曰何哉六錮曰世儒之所為爭而未肯降者則虛實也天人也心性也體用也循序與格物也此六者彼方挾以攻我我又安能令彼之有入哉夫彼之挾以攻我者非其故為也彼固有似是而難明者以錮于中也而近儒者語之未竟則是我固未盡於彼而欲彼之有入于我無異乎其矐然明而滃然塞也胡子曰然然則何謂虛實之錮曰昔者世儒立教以萬理為實是天地實天地萬物實萬物父子實父子君臣實君臣夫唯其實而後天下不以幻視若唯求理于心則將幻天地萬物於無何有矣又何有于父子君臣哉此與釋氏所稱三界惟心山河大地皆妙明心中物又何以殊也胡子曰然非也夫萬物之實豈端在物哉其謂實理即實心是也孟子曰萬物皆備於我而下文即繼之曰反身而誠樂莫大焉若實理皆在于物則萬物奚與于我又奚能反身以求誠哉何則人心唯誠則其視天地也實天地視萬物也實萬物父子之親君臣之義不可解于心者皆實理也若人心一偽彼且視父子君臣浮浮然也其極至弒父與君而弗之忌彼烏覩父子君臣之為實理哉彼其視天地萬物夢夢然也其極至褻天瀆地而弗之顧彼烏覩天地萬物之為實理哉故曰不誠無物者此也子欲求實理乎孩提之愛親敬長則實理較著焉今人乍見孺子入井有怵惕惻隱之心則實理較著焉見牛觳觫而不忍殺則實理較著焉豈當求實理于親長孺子以逮牛羊哉故理莫實于盡心而莫幻于索物而世儒者自幻視其本實之心而反瞿瞿焉獵獵焉索物以求理認外以為實曾不知其所索而認者乃其口吻之為名也楮墨之為書也影響之為傳也意念之為執也而自謂實也而實固不居乎此也是所謂以幻求幻其幻不可以究竟矣而強以為實而不亦左乎若夫釋氏所稱三界惟心山河大地為妙明心中物其言雖少偏而亦不至大繆蓋釋氏者雖知天地萬物之不外乎心而卒至于逃倫棄物若是異者非心之不實也則不盡心之過也蓋釋氏主在出世故其學止乎明心明心則雖照乎天地萬物而終歸于無有吾儒主在經世故其學貴盡心盡心則能察乎天地萬物而常處之有則是吾儒與釋氏異者則盡心與不盡心之分也所謂毫釐千里者此也而奚以罪心哉今夫心之能察物猶水之能流火之能炎也苟有人焉瀦水不流而欲其常澄宿火不炎而欲其常煴亦豈水火之罪哉而世乃獨以虛幻不實歸罪于人心則又烏取實哉雖然使世儒誠有得于盡心之旨則實者未嘗不虛而虛者乃所為實也實無不虛費而隱也無聲無臭是也虛無不實微之顯也三千三百是也其究一也而世儒未達也何謂天人之錮曰程叔子有言聖人本天釋氏本心本天者以為道之大原出于天故敘為天敘秩為天秩命為天命討為天討工為天工官為天官咸自天定之非人心所得增損者也聖人本之則曰物者理之所攸存故其求諸物理者將求出于天者以為定也而人心之私不與焉是故聖人之道達諸倫物以為經常行諸萬世以為凖則者誠得其天也彼釋氏者曰三界惟心山河大地皆妙明心中物是獨以心法起滅乎天地覩三界與山河大地不足有無於是焉屏居以覩空跏趺以求慧禪那足悅而寂滅為樂其極則逃倫棄物而卒為天下之大憝斯道之魁賊此非本心者之誤歟胡子曰然非也夫程叔子以聖人為本天將本其蒼蒼者歟抑本其所以為天者歟若蒼蒼者則莫為之本矣若天之所以為天則當其皇降之𠂻天命之性固已在人心久矣曩所謂先世之室廬慈父之帑藏莫非子物者是也然則聖人之本天舍人心又孰為本哉書曰惟天生萬物惟人萬物之靈孔子曰天地之性人為貴夫人之靈且貴者以是心之出于皇降天命者也所謂道之大原出于天者此也非心之外而别有天也是心也在詩曰帝則在書曰皇極曰天之明命在記曰天理在孟氏曰此天之所以與我儒者又字之曰天神天明曰天聰明又尊之曰天君故其達諸倫物曰天敘天秩行諸政治曰天命天討蓋不得以一私意姦於其間故曰天也苟一私意姦於其間則雖自悍夫行之必有厭然而不中慊苟一私意姦于其間則雖自愚夫當之必有咈然而不中甘彼悍夫愚夫豈嘗考物理哉則心天者為之也程伯子曰以心知天辟如在京師更不可别求長安言至一也審如叔子之言則天之生物莫不有理而人心獨無一理居焉何天之厚物而薄人者甚也其可通乎謂凡人之本心者即有釋氏之失則此心固為人之大祟人固不幸而有是心天亦不諶而畀人以心矣其可通乎若是則聖人謂人為靈且貴者咸歸之誣而帝則皇極明命天理皆當刳心剔性别有一物以索諸棼棼藝藝而後為得也其可通乎若是則仁義禮智不可謂根心愛親敬長不可謂良知而世之言根心良知者必皆獲罪於天而非吾人之所當本者也其卒可通乎審如叔子之言吾不知天者何在而本者又何物吾聞古之人有不雜知識以順帝則者矣未聞多其知識以求帝則于物者也有不作好惡以建皇極者矣未聞恣其好惡以求皇極于物者也有顧諟以奉明命反躬以窮天理者矣未聞不顧諟不反躬求明命天理于物者也有先立乎大以不失天之與我者矣未聞舍天之與我而别求諸物者也蓋惟不雜知識不作好惡反躬顧諟以先立乎其大則達諸倫物為天之敘秩行諸政治為天之命討運諸靈臺而通諸天下之志宰諸方寸而凖諸千萬世之𠂻將俾賢知者不以為少而愚不肖者不以為多千萬世之上不以為古千萬世之下不以為今所謂不得以私意增損其間者不增損其心天故也是所謂本天也伊尹之告太甲曰一哉王心周公之告成王曰既厥心殫厥心未聞外心以求天亦未聞本心之遽為釋氏也世儒者不能自信其心天也乃果焉索諸棼棼藝藝以求之吾見世儒者勤如算沙􅀈如射覆折如擢髮泛如望洋劈積磔裂膠固紛披不勝其推測不勝其安排思匠攢于戈矛心機馳于猿馬搜窮愈精比擬愈似而天者愈離曾不知意必勝而固我橫吾未見世儒之能本天也叔子之言亦自枉枉天矣曰然則釋氏曷為其棄倫逃物若是異哉曰釋氏之失吾前已言之其失在偏于出世而己何謂出世超死生是也即老氏所謂死而不亡莊氏所謂有旦宅而無情死獨與天地精神往來而不傲倪於萬物者其為學亦非有大戾于天者之比而吾聖門盡性至命之全則亦未嘗不馴至之而不必偏以為功也夫惟釋氏者之偏以為功則不得不逃倫棄物禪那寂滅以從事于不生不滅之歸矣吾前所謂宿火欲其長煴瀦水欲其長澄即彼之不生不滅是也是其見偏而學駁者之過也而未可謂心之罪也亦猶夫宿火瀦水者之過而未可為水火之罪也彼也自謂之先天矣而不知吾聖人合先後皆天也故為全彼也自謂之形上矣而不知吾聖人通上下皆道也故為大彼之火專宿而已矣而聖人之火宿而靡不炎炎而靡不燎也彼之水專瀦而己矣而吾聖人之水瀦而靡不泄泄而靡不灌也彼之心專寂而已矣而吾聖人之心寂而靡不通通而靡不盡也今不知咎在專寂以出世乃獨詆人心而罪之可乎夫聖人盡心而達天賢人存心而事天吾無庸言若二氏則遺物溺心任天于內世儒則執心徇物擬天于外二者均未得于心則均未得于天矣孰曰心與天二本哉何謂心性之錮曰先儒以為心者止于知覺而知覺所具之理為性故其言曰能覺者心所覺者理意者覺虛而理實則心虛而性實此心性大較也故心性雖不可離而尤不可混其果然歟胡子曰然非也夫先儒以知覺為心以實理為性固可謂不混矣然以理為在物則性亦當為在物是性雖不與心混而不免與物淆矣其可通乎曰先儒有言性者心之理又曰心統性情則未嘗不以性具于心者也獨未認知覺為性耳曰若是則先儒之語理與性也一以為在物一以為在心是在物在心其各相半焉已矣其又可通乎曰然則子將奚析曰心性奚能析嘗試譬之心猶之火性猶之明有一星之火即有一星之明明不在火之表性猶火之明情猶明之光有一星之明即有一星之光光不在明之後故謂火與明與光異號則可謂為異物則不可也謂心與性與情異文則可謂為異體則不可也子不見性之文從心從生夫人心惟覺則生弗覺則弗生惟生則理弗生則弗理假令捧土揭木儼若其形蒙以衮舄載以冔冕立傳而告之曰是為父子之親君臣之義蓋塊如也而况物理何者以土木無覺故也是以舍人心之覺則無性矣又焉有理哉是故藴而仁義禮智藏焉始非有物焉以分貯于中也則覺為之宰也感之惻隱羞惡辭讓是非形焉亦非有物焉以分布于外也則覺為之運也方其宰也而無不運雖天下之至虛而無不實也方其運也而無不宰雖天下之至實而無不虛也故覺即性非覺之外有性也性即理非性之外有理也又烏有夫覺虛理實心虛性實之謂哉夫覺何以若是至哉帝降之𠂻天命之性靈而則生生而能理故也是故帝堯之謂欽明帝舜之謂濬哲文王之謂緝熙太甲之謂明命成王之謂光明伊尹之謂先覺大學之謂明德衛武之謂有覺德行程伯子之謂明覺自然紫陽夫子亦謂之本體之明疇非是也曩子所謂五倫五教五事三物九德四術五禮六樂六府三事九疇九經以逮天地萬物無有端崖疇非是也然則所覺者即能覺者為之也向無能覺者則亦捧土揭木已爾亦烏有夫所覺者哉曰先儒又言覺於理則為道心覺於欲則為人心今先生以覺語性安知不覺於欲而為人心歟曰審如先儒之言是烏足以言覺古者醫書以手足痿痺為不仁言弗覺也誠覺則痛癢流行而仁理在其中矣豈覺之外而别有痛癢别有仁理哉是故覺即道心亦非覺之外而别有道心也人惟蔽其本覺而後為多欲為人心當其為多欲為人心則雖有聞見知識辨别物理亦均為痿痺而已而奚其覺然則謂覺為覺于欲者非也曰釋氏以作用為性若是則胡以異也曰吾儒之語性有專以體言者記所謂生而靜者是也有專以用言者孟子所謂惻隱羞惡辭讓是非是也若獨以作用罪釋氏則孟子亦失矣此未可以正其非夫覺性者儒釋一也而所以異者則盡與未盡繇分也吾嘗比釋氏於宿火瀦水而水火奚罪哉今奈何嫌于覺性之相近乃至跰栂物理以相别也可乎昔漢廷欲盡誅中常侍而濫及于無鬚者他凡無鬚者懼及己也乃皆畫鬚以自别今之儒者懼近釋氏而必求物理以自别是亦畫鬚者之自為贅也豈不過甚矣哉曰子固合心性而一之矣然夫子稱回曰其心三月不違仁孟子又以芻豢喻理義若是乎析也何哉曰世儒之藉口也久矣甚哉其泥文牽義之無瘳也信哉世儒之疑則仁亦為在物矣顔子又安得挽在物之仁而不違於心哉不知仁人心也心存則仁自不違非心外索仁也顔子雖大賢或不能盡存于三月之后夫子所以稱而激之豈謂仁與心為二物哉若夫理義芻豢人孰不知孟子之取辟也豈誠以理義之在物哉世儒外理而物之而義又可外乎甚哉泥文牽義之莫瘳也子姑反觀無滯啽囈惑也終身何謂體用之錮曰夫道有體有用未有有體而無用有用而無體者也記稱未發體也發而中節用也易繫稱寂然不動體也感而遂通用也性即體也情即用也體用曷可相遺哉今子也辨理以察而語性以覺無乃溺於用而遺於體歟胡子曰然非也夫發與未發寂與感雖有體用而無先後蓋嘗以火之明與光言之矣明與光亦有體用而無先後假令有人呼火之明曰是光也又呼光曰是明也則無不可者又不觀諸鑑乎鑑之未有物也其明與照自若也而非有損既有物也其明與照自若也而非有增明與照亦有體用而無先後假令有人呼鑑之明曰是照也呼照曰是明也則無不可者然則體用又曷可執言哉昔者樊遲問仁子曰愛人問知曰知人孟子之語性善曰乃若其情孔孟豈皆溺於用者歟古之君子語體而用無不存語用而體無不存以其心無不貫也豈若世儒語體則截然曰是不可為用語用則截然曰是不可為體彼其截然者以其不貫於心而局於字也是亦泥文牽義之為賊也亦猶為火爭明與光焉為鏡爭明與照焉爭者方紛然分别而火與鏡固未嘗分也豈不嚽哉且體用之義六經無有也唯釋氏有之釋氏曰吾言如黃葉止兒啼耳非可執也今吾儒襲用其義乃至語理語物必因體用而成四片自以為分更漏算繭絲不知其文義愈析其論辨愈執而道愈不謀矣其又不可悲乎然則謂心之覺為性為體謂心之察為情為用可也謂覺性兼體用可也謂覺即察察即覺體即用用即體亦無不可者然則語道而必曰有無虛實動靜內外體用截焉是誠無異乎其刻舟而劍已逺何謂循序之錮曰古者學不躐等教不凌節貴有序也否則欲益而賊之者至矣以孔子上聖猶曰下學而上達其教人也曰中人以上可以語上中人以下不可以語上是孔子且不能躐等而學凌節而教而况衆人乎故古之小學必習於少儀曲禮學於詩書禮樂未有先從事心性也今子嘐嘐然唯心性之務先靈覺之獨切吾恐先後序紊而中下者惘然弗之入矣然則書所稱學于古訓易所言多識蓄德則又何也胡子曰然非也不聞大學之教曰物有本末事有終始知所先後則近道矣古人以先本後末先始後終為序未聞先末與終之為序也猶之種樹必先植其根而為之培灌積日而纍月焉然後其枝幹葉葩從而敷茂其為序何漸也猶之治水必先濬其源而為之疏決積日而纍月焉然後江淮河漢從而涵浸其為序何漸也心性者學之根與源也古之大學欲明明德于天下國家者乃推極其夲曰先修其身而修身先正心正心先誠意誠意先致知而知即性也然則君子曷嘗不務先于心性哉其為序亦何異于植根濬源而積日纍月者之為漸也世儒乃反以先本為非必欲窮索物理而豫求于末終又何異種樹者先求其葩葉導水者先事于江河非獨凌節躐等亦將莫究其所底矣是不為紊也孰紊哉夫本末非二物也立本固以豐末而顓末未有能生本者也若孔子所謂語上語下下學上達要亦本末之間均有上下非謂以本為上以末為下也蓋自用力者而言謂之下自得力者而言謂之上孔子告顔淵仲弓則并其得力者而語之是所謂可語上者也若樊遲司馬牛則止曰恭忠敬曰訒言而未嘗及得力之事是所謂不可語上者也然仁即心也性也恭忠敬訒言即存心也養性也孔門曷嘗不以心性教亦曷嘗不以心性學哉蓋心性自不離乎言行而言行固皆出于心性苐曰心性本也而未可後焉爾非離言行為心性者也小學者習于少儀曲禮治於詩書禮樂皆將以收攝其心磨礱其性禁于未然而非專求其文義已也故曲禮發篇曰毋不敬風雅大旨曰思無邪孔子教弟子入孝出弟謹信親仁最先而學文特餘力耳然則聖人教學先後之序蓋可覩已豈嘗以先末為序哉且學於古訓者其孰為古歟蓋莫古於精一執中之學而人君尤務先焉人君者雖未可以廢書然一日二日萬幾若必如經生學究以討求乎物理其勢不可得矣堯舜之智不能遍物况後世乎經曰自天子至于庶人一是皆以修身為本若以理為在物從物物而索之則上必不能通於天子下必不能通於庶人又奚足以言理若夫前言往行亦莫非自古人心性出也故君子多識前言往行專以蓄德非曰泛然馳騖物理者倫也昔者謝顯道舉史不遺一字程伯子譏之曰玩物喪志然則古人之學古多識又可覩已亦豈以先末為序哉而世儒迄不自知其為紊也嗟嗟何謂格物之錮曰弟子荷明訓內反諸心外印諸經其於致知之旨瞭矣何則知也者即經文所謂明德是己致知者即經文所謂明明德是已以是知東越致良知之訓雖孔曾復生無以易也然東越訓格物曰正其不正以歸于正則似與正心義相涉矧初學者猝難了也蓋嘗聞之蒼頡觀鳥迹而作字奚仲觀轉蓬而造車中古聖人仰觀俯察制器尚象莫不取諸物觀冠員象天履方效地聘取圭璋樂徴律吕婚陳鴻鴈贄用雉羔授時假諸璿璣考祥驗諸蓍龜三公擬自三台五等法乎五行帝堯之十二章咸有取義故曰天生神物聖人則之天地變化聖人效之天垂象見吉凶聖人象之河出圖洛出書聖人則之聖人者雖未嘗索物求理亦鮮不因物觸心哉然則致吾良知而無遺物豈亦其旨歟胡子曰然非也夫以經訓經則經可明移經就己則義益晦世儒以至訓格矣乃轉而為窮以物語物矣乃增而為理是正所謂移經以就己經安得不晦焉經上文己曰物有本末而下文即以格物應是寧有二物哉格有通之義致知在格物者蓋言古人之致其良知雖曰循吾覺性無感不應而猶懼其泛也則恆在於通物之本末而無以末先其本夫是則知本即格物而致知之功不雜施矣故其下文曰一是皆以修身為本其本亂而末治者否矣其卒語曰此謂知本此謂知之至也噫亦明甚矣異時夫子曰反求諸其身孟子曰反求諸己又曰萬物皆備反身而誠皆格物疏義也括而言之曰知本而已夫致知非遺本也而其求端用力茲茲反顧尤在於本而後能不泛也而末學者未嘗一力其本乃先以窮索物理為事濫焉浩焉如賈舶之無所歸不倒置而拂經也哉彼既倒置矣而猶自以為知序不尤倒乎而子又以制字造車仰觀俯察制器尚象者言之是特以語聖王開物成務之故而無禆於學者求端用力之方此正謂先末後本先終後始其于大學之道不尤倒而重傷乎曰格物則然窮理何居曰窮之義盡也極也而非謂窮索也易繫曰窮神知化夫神不可致思矧可索乎故窮神有極神之義焉窮理則亦然矣記曰窮人欲滅天理得非謂極欲而滅理者耶誠使極天理則滅人欲矣窮理者即極夫天理之謂也豈在物哉是即所謂致知所謂明明德故程伯子曰才窮理即盡性至命更無次苐不可以窮理屬知之事而世之言窮索物理者逺哉曰先儒曰理有所當然所以然此非獨自人身雖一草一木亦皆有之曰一草一木則烏覩夫所當然所以然者哉儒者豈不曰草木之生有時而形有定此所謂理也然而有春花産乎冬實樗質生乎人面仆而髭伐而血者何哉人曰此草妖木怪也然謂有怪理可乎彼其所當然所以然則奚以窮也豈不曰天清地寧日晨月夕此所謂理也然而有裂陷朓朒仄慝暈珥晝星而夜日烏夾而霓貫其極則有雙月兩日日中見人馬戰鬭之異又有山移數里而蟲魚猝生雨毛隕石穴犬井羊之殊者何哉人曰此變象也然謂有變理可乎彼其所當然所以然則奚以窮也豈不曰大德受命作善降祥此所謂理也然而孔子旅人下惠三黜顔回夭折仲弓癩死者何哉人曰此異數也而謂有異理可乎彼其所當然所以然則奚以窮也曰弟子聞諸隂陽人物之失傳洪範者皆歸咎於人事乃至春秋以降明王不作則何疑於尼惠之不遇曰若是則理之在人不在物也益瞭矣知本之學可後乎哉衡廬精舍藏稿卷二十八
