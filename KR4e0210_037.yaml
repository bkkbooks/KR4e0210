body:
  text: 衡廬續稿巻七明胡直撰祭文祭尹洞山先生文唯郡有文盛啓六一雖涉道藩而靡入室唯國有文𢎞正稱踔雖極剞劂而道彌濶業業夫子挺生昌朝𤣥聰天牗姱姿神雕捉髪戯翰坐絶羣髦弱冠遨藝睥睨賈晁入對彤廷治安萬言世皇親嘉褒詔以傳既遴清切駿發文園總轡司馬揚班後先囊括百家涵浸萬彚杼軸堂構𢎞言奥義譬諸江河迤延遐裔浴乾盪坤孕怪育異朱􅦈緑烟陽氷隂火籠挫筆端物無不可又若廟堂朱甍青瑣言言獨聳翼翼無頗夫子之文雄瓌若兹魯多君子交益以滋昌其氣矣以道為師振其竒矣惟正是基匪直也文秉心淵碩志存孔姬忠希亮弼大政抗議回衺辟易聴者咸縮媢者彌力凡三典文藻識孰並權臣重臣策目殊勁為國樹人樹必以正兩教成均髦趨如競心期一躬風勵無前辭婚宰家謝𤣥帝壇傳奉而卿意所弗然貞孤不援遂貳南銓矯矯銓臣奕奕舊京手握衡鏡課必幽明尋登宗伯實逺帝庭帝念不置疇為同升遽意巻懐年始六袠飛章繾綣爰脱羈􅎗縱心圖史畢志泉石再起東山匪意攸懌世方矚目社稷休虞補天浴日實競延竚昊天不弔倐焉傾徂國殄老成士喪型模夫子文采世莫不知翳其勲伐匡救潜施如彼泰岱罔見波靡七十泉啓潤澤四馳某初拓落如石碌碌公獨不爾題為良玉一代一生知己則獨矧托婚媾再世情篤悲豈一端重悼者世不朽維文象賢維嗣翩焉騎箕靈爽如熾陟降下上倘臨斯觶祭大理卿宋陽山文夫九萬之穹鸒斯不能翔其顛重溟之浩鱦魚不能竟其極此言器大者不可以小局追也銅爵一朝騰都越國而以之捕䑕則遜于山貍龍淵一出斷蛟剸犀而以之羞臛則謝乎佩刀此言受大者不可以小知督也悲哉若吾友陽山宋公其可以末世之小局小知班乎其又可令斯世遽奪斯人乎惟吉盛時賢萃道茂蔚有我公挺生其後神穎出于天陶貞槩植乎性就承親則夀母樂志友悌則讓逮羣幼弱齡鶱翮僉屬冠英壮成甲第巋為老成製錦吳甸惠訓獨殷役田之設其濟也宏尋登蘭臺奮身許國出案鹺政罄洗黷墨方斯時也廕臣詭持邦衡頥指中外外鎮淫劉以逞冦攘益以榛塞公惟峻節喬立儼若松柏掊擊雄奸摧抑巨慝時雖以直聲動天下而媢者已恨恨乎次骨已而左斥遐服迄無愠色天下稍清既壓復起握憲畿甸柄學閩臬允文允武為世程則晩撫南畿憤欲為斯民剔積蠧樹長利身甘是壑而猥為方域異議者之所格然而濊澤浸于江介奇猷著于海壖瘝切民隠而不遺軍國公之勛勩已烈矣尋掌棘寺遽告休止方欲薖軸林端究斯學之大歸詎謂天不弔憫一疾而猋其奄忽悲哉某昔與公郷國悦慕京都綰結一語投膠百好調瑟嘗覩公之使才應猝馭繁荷大力重曽無變色誠所謂履屐間各得其任雅意同黨中文武勲名公偕譚大司馬實維其特未嘗不快濟艱之在吾徒而棟時之假俊傑顧乃未竟其庸而遄嗇其年是孰為通也抑孰為之塞文章之弊久矣濟濟時賢競曰反古然獨聖秦漢而凡六經公每嘆其取裁者皆中古之影子而未嘗一探作者精意之所宅惟公論議揆自道法而詠歌必本性情搦筆成篇不假竄易而炳朗𢎞碩自中節㑹雖宿搆者有不能蹀而公猶自署為鄙小子之鍾期相期許於前修予又何能躡轡驟而規髣髴葢公蚤遊賢儒之門逺探洙泗之㫖既歸将與予淬勵全歸志欲衍千聖於一脈視彼勲伐文辭特剰業耳而天不假年竟止于斯吾黨寡倖末世薄祜俾瑣瑣者延而殲此英哲十年之間合襟無幾崇朝促席適公寝疾而猶幸執别以成永訣於乎吾雖攬匡阜為辭傾章水為涕莫以抒其憤愠乃閲再霜而始臨哭其靈牀公必不謂戚疏于存殁也雖然其終無以解予之惻惻㑹祭徐存翁閣老文天下大器或傾且窳自匪天人疇掖疇補公降自天嶽巆海瀦多才蹀姬柔嘉邁甫掌制玉廬夙擅鴻筆抗議孔祀斥謫靡戚典學兩藩若噴澌液青宫既還講筵日弼遂晉秩宗惟清惟恭帝曰汝才亦惟汝忠簡佐大政位亞上公宻承睠倚實亮天工迺際巨慝上黷下墨讒説肆行訿訿言翕言翕公居其艱惟忠而哲靡敢昌言獨進宻勿曰惟國楨人才是務救援奨提甄收愛護蹇蹇䕫䕫匪躬之故既祓孔壬爰握鈞衡貪熻未息島夷毒横戈船四遣機決廟庭南東鯨鯢一朝告平爰扶穆皇乾清坤謐學術是先力賛皇極手抉雲霾斯道如日惟公之功匪啻社稷晩遘横臣如蜩如沸公孫碩膚赤舄几几飛章累乞遂復田里衛武徳業既耄猶勵令公子孫頷示頥指世方矚公耆頥重庥再斡鼎軸邦國無憂云胡傾徂騎箕神遊元老既謝巨儒逓休某等誼辱門牆宿蒙振拂聞訃失聲有涕横頰東望輀車莫由引紼千里緘辭曷既心惻奠耿封君静翁年伯文嗚呼自静翁之訃至也小子某為翁悲者浩渺而彌為中丞公戚夫大人耐以天下為一家中國為一人其天責固然也方中丞公致養林端日以皤髭華顛曲躬鼎俎之調脅息衾縟之置蒿目杖履之撰屏跡厠牏之涓姁姁旋于周閣子舎而傱傱翊于園圃田疇以從臾其所嗜翁固陶陶焉樂而忘老公亦洩洩焉不知天下何樂之可代然而朝家不能一日釋公天下競引天責更相盻伺翁又督迫于内公不得不起而仗鉞以臨疆埸當此時公所願翁不啻岡陵翁自計亦翔健難老中外咸從而盱祝之疇謂翁一旦遽以長棄公之恫詎可言故某之彌為公戚者此也夫江啓于岷嶺淮啓于桐柏天下不幾江幾淮也則岷與桐柏之功詎不為鉅且尊哉今天下學道任天責之重者如公固幾人而翁喬然為天下岷嶺桐柏天下誦歌仰繫至崇厚天子加恩甚盛穀禄夀考子孫蕃碩既貴如貫既賢如林翁既以舎然無悲矣然某不能無悲與戚者葢辱中丞公以天責固然者挈之大道之中相與匪獨交契視翁骨肉伯叔等也矧昔侍翁上京炙樸飲醇翁亦子姓近之今忽忽餘廿年某獨浸淫沈疴欲奔千里圖伸一芻動左足者數矣而病紲之某之悲故不已而戚亦詎可言乃越翌嵗敬馳椒醑先寄遥思尚佇躬祖嗚呼尚饗衡廬續稿巻七
